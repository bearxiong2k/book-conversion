  - 'region "Preface to the New Edition: The Idea''s Constipation?" [ref=e42]':
    - 'heading "Preface to the New Edition: The Idea''s Constipation?" [level=2] [ref=e43]':
      - text: "Preface to the New Edition:"
      - emphasis [ref=e44]: The Idea's Constipation?
    - paragraph [ref=e45]: "When a discipline is in crisis, attempts are made to change or supplement its theses within the terms of its basic framework - a procedure one might call 'Ptolemization' (since when data poured in which clashed with Ptolemy's earth-centred astronomy, his partisans introduced additional complications to account for the anomalies). But the true 'Copernican' revolution takes place when, instead of just adding complications and changing minor premises, the basic framework itself undergoes a transformation. So, when we are dealing with a self-professed 'scientific revolution', the question to ask is always: is this truly a Copernican revolution, or merely a Ptolemization of the old paradigm?"
    - paragraph [ref=e46]:
      - text: "Two examples of Ptolemization: there are good reasons to claim that 'string theory', which claims to provide the foundations for a unified theory (a single theoretical framework describing the four fundamental interactions between subatomic particles that were previously explained separately by relativity theory or quantum physics), remains an attempt at Ptolemization, and that we are still waiting for a new beginning which will require an even more radical change in the basic presuppositions (something like abandoning time or space as the basic constituent of reality)."
      - superscript [ref=e48]:
        - link "1" [ref=e49]:
          - /url: "#fn-1"
      - text: Likewise, in social theory, there are good reasons to claim that all the 'new paradigm' proposals about the nature of the contemporary world (that we are entering a post-industrial society, a postmodern society, a risk society, an informational society...) remain so many Ptolemizations of the 'old paradigm' of classic sociological models.
    - paragraph [ref=e50]: "The question is then: how do things stand with psychoanalysis? Although Freud presented his discovery as a Copernican revolution, the fundamental premise of the cognitive sciences is that psychoanalysis remains a 'Ptolemization' of classical psychology, failing to abandon its most basic premises. (Post-classical economists, incidentally, make the same claim about Marx: his critique of Smith and Ricardo amounts to a Ptolemization.) The Sublime Object of Ideology tries to answer this question by way of rehabilitating psychoanalysis in its philosophical core - as a theory indebted to Hegel's dialectics and readable only against this background. This cannot but appear, perhaps, as the worst possible move to have made: trying to save psychoanalysis, a discredited theory (and practice), by reference to an even more discredited theory, the worst kind of speculative philosophy rendered irrelevant by the progress of modern science."
    - paragraph [ref=e51]: However, as Lacan taught us, when we are confronted with an apparently clear choice, sometimes the correct thing to do is choose the worst option. Thus my wager was (and is) that, through their interaction (reading Hegel through Lacan and vice versa), psychoanalysis and Hegelian dialectics may simultaneously redeem themselves, shedding their old skins and emerging in a new unexpected shape.
    - paragraph [ref=e52]: "Let us take Hegel's dialectics at its most 'idealist' - with the notion of the sublation [Aufhebung] of all immediate-material reality. The fundamental operation of Aufhebung is reduction: the sublated thing survives, but in an 'abridged' edition, as it were, torn out of its life-world context, stripped down to its essential features, all the movement and wealth of its life reduced to a fixed mark. It is not that, after the abstraction of Reason has done its mortifying job with its fixed categories or notional determinations, speculative 'concrete universality' somehow returns us to the fresh greenness of Life; rather, once we pass from empirical reality to its notional Aufhebung, the immediacy of Life is lost forever. There is nothing more foreign to Hegel than a lamentation for the richness of reality that gets lost when we proceed to its conceptual grasp. Recall Hegel's unambiguous celebration of the absolute power of Understanding from his Foreword to the Phenomenology: 'The action of separating the elements is the exercise of the force of Understanding, the most astonishing and greatest of all powers, or rather the absolute power.' This celebration is in no way qualified; that is, Hegel's point is not that this power is nonetheless later 'sublated' into a subordinate moment of the unifying totality of Reason."
    - paragraph [ref=e53]: The problem with Understanding is, rather, that it does not unleash this power to the end, that it takes it as external to the thing itself-hence the standard notion that it is merely our Understanding ('mind') that separates in its imagination what in 'reality' belongs together, so that the Understanding's 'absolute power' is merely the power of our imagination, which in no way concerns the reality of the thing so analysed. We pass from Understanding to Reason not when this analysis, or tearing apart, is overcome in a synthesis that brings us back to the wealth of reality, but when this power of 'tearing apart' is displaced from being 'merely in our mind' into things themselves, as their inherent power of negativity.
    - paragraph [ref=e54]: "Back in the 1960s, one 'progressive' theorist of education touched a chord when he published the results of a simple experiment: he asked a group of five-year-olds to draw an image of themselves playing at home; then, he asked the same group to do it again two years later, after they had been through a year and a half of primary school. The difference was striking: the self-portraits of the five-year-olds were exuberant, lively, full of colours, surrealistically playful; two years later, the portraits were much more rigid and subdued, with a large majority of the children spontaneously choosing only the grey of the ordinary pencil, although other colours were at their disposal. Quite predictably, this experiment was taken as proof of the 'oppressiveness' of the school apparatus, of how the drill and discipline of school squash children's spontaneous creativity, and so on and so forth. From a Hegelian standpoint, however, one should, on the contrary, celebrate this shift as an indication of crucial spiritual progress: nothing is lost in this reduction of lively colourfulness to grey discipline; in fact, everything is gained - the power of the spirit is precisely to progress from the 'green' immediacy of life to its 'grey' conceptual structure, and to reproduce in this reduced medium the essential determinations to which our immediate experience blinds us."
    - paragraph [ref=e55]:
      - text: "The same mortification occurs in historical memory and monuments of the past where what survive are objects deprived of their living souls. Here is Hegel's comment apropos Ancient Greece: 'The statues are now only stones from which the living soul has flown, just as the hymns are words from which belief has gone.'"
      - superscript [ref=e57]:
        - link "2" [ref=e58]:
          - /url: "#fn-2"
      - text: "As with the passage from substantial God to the Holy Spirit, the properly dialectical reanimation is to be sought in this very medium of 'grey' notional determination: The understanding, through the form of abstract universality, does give [the varieties of the sensuous], so to speak, a rigidity of being... but, at the same time through this simplification it spiritually animates them and so sharpens them."
      - superscript [ref=e60]:
        - link "3" [ref=e61]:
          - /url: "#fn-3"
    - paragraph [ref=e62]:
      - text: "This 'simplification' is precisely what Lacan, referring to Freud, deployed as the reduction of a thing to le trait unaire [der einzige Zug, the unary feature]: we are dealing with a kind of epitomization by means of which the multitude of properties is reduced to a single dominant characteristic, so that we get 'a concrete shape in which one determination predominates, the others being present only in blurred outline': 'the content is already the actuality reduced to a possibility [zur Möglichkeit getilgte Wirklichkeit], its immediacy overcome, the embodied shape reduced to abbreviated, simple determinations of thought'."
      - superscript [ref=e64]:
        - link "4" [ref=e65]:
          - /url: "#fn-4"
    - paragraph [ref=e66]: "The dialectical approach is usually perceived as trying to locate the phenomenon-to-be-analysed in the totality to which it belongs, to bring to light the wealth of its links to other things, and thus to break the spell of fetishizing abstraction: from a dialectical perspective, one should see not just the thing in front of oneself, but this thing as it is embedded in all the wealth of its concrete historical context. This, however, is the most dangerous trap to be avoided; for Hegel, the true problem is precisely the opposite one: the fact that, when we observe a thing, we see too much in it, we fall under the spell of the wealth of empirical detail which prevents us from clearly perceiving the notional determination which forms the core of the thing. The problem is thus not that of how to grasp the multiplicity of determinations, but rather of how to abstract from them, how to constrain our gaze and teach it to grasp only the notional determination."
    - paragraph [ref=e67]: "Hegel's formulation is here very precise: the reduction to the signifying 'unary feature' contracts actuality to possibility, in the precise Platonic sense in which the notion (idea) of a thing always has a deontological dimension to it, designating what the thing should become in order to be fully what it is. 'Potentiality' is thus not simply the name for the essence of a thing actualized in the multitude of empirical things (the idea of a chair as a potentiality actualized in empirical chairs). The multitude of a thing's actual properties is not simply reduced to the inner core of this thing's 'true reality'; what is more important is that the signifying reduction accentuates (profiles) the thing's inner potential. When I call someone 'my teacher', I thereby outline the horizon of what I expect from him; when I refer to a thing as 'chair', I profile the way I intend to use it in future. When I observe the world around me through the lenses of a language, I perceive its actuality through the lenses of the potentialities hidden, latently present, in it."
    - paragraph [ref=e68]: "What this means is that potentiality appears 'as such', becomes actual as potentiality, only through language: it is the appellation of a thing that brings to light ('posits') its potentials."
    - paragraph [ref=e69]:
      - text: "Once we grasp Aufhebung in this way, we can immediately see what is wrong with one of the main topics of the pseudo-Freudian dismissal of Hegel: the notion of Hegel's System as being the highest and most overblown expression of an oral economy. Is not the Hegelian Idea effectively a voracious devourer which 'swallows up' every object it comes upon? No wonder Hegel saw himself as Christian: for him, the ritual eating of bread transubstantiated into Christ's flesh signals that the Christian subject can integrate and digest God himself without remainder. Is, consequently, the Hegelian conceiving/grasping not a sublimated version of digestion? Hegel writes: If the individual human being does something, achieves something, attains a goal, this fact must be grounded in the way the thing itself, in its concept, acts and behaves. If I eat an apple, I destroy its organic self-identity and assimilate it to myself. That I can do this entails that the apple in itself, already, in advance, before I take hold of it, has in its nature the determination of being subject to destruction, having in itself a homogeneity with my digestive organs such that I can make it homogeneous with myself."
      - superscript [ref=e71]:
        - link "5" [ref=e72]:
          - /url: "#fn-5"
    - paragraph [ref=e73]:
      - text: "Is what he offers not a lower version of the cognition process itself in which, as he likes to point out, we can only grasp the object if this object itself already 'wants to be with/by us'? One should push this metaphor to the end: the standard critical reading constructs the Hegelian absolute Substance-Subject as thoroughly constipated - retaining within itself the swallowed content. Or, as Adorno put it in one of his biting remarks (which, as is all too often the case with him, misses the mark), Hegel's system 'is the belly turned mind',"
      - superscript [ref=e75]:
        - link "6" [ref=e76]:
          - /url: "#fn-6"
      - text: "pretending that it swallowed the entire indigestible Otherness... But what about the counter-movement: Hegelian shitting? Is the subject of what Hegel calls 'absolute Knowledge' not also a thoroughly emptied subject, a subject reduced to the role of pure observer (or, rather, registrar) of the self-movement of the content itself? The richest is therefore the most concrete and most subjective, and that which withdraws itself into the simplest depth is the mightiest and most all-embracing. The highest, most concentrated point is the pure personality which, solely through the absolute dialectic which is its nature, no less embraces and holds everything within itself"
      - superscript [ref=e78]:
        - link "7" [ref=e79]:
          - /url: "#fn-7"
    - paragraph [ref=e80]: "In this strict sense, the subject itself is the abrogated/cleansed substance, a substance reduced to the void of the empty form of self-relating negativity, emptied of all the wealth of 'personality' - in Lacanese, the move from substance to subject is the one from S to ɼ, that is, the subject is the barred substance. (Adorno and Horkheimer, in Dialectic of Enlightenment, make the critical point that the Self bent on mere survival has to sacrifice all content that would make such a survival worthwhile; Hegel, on the contrary, views such a constitutive sacrifice positively.) Schelling referred to this same move as contraction (again, with the excremental connotation of squeezing the shit out of oneself, dropping it out): the subject is the contracted substance."
    - paragraph [ref=e81]:
      - text: Does then the final subjective position of the Hegelian system not compel us to turn the digestive metaphor around? The supreme (and, for many, the most problematic) case of this counter-movement occurs at the very end of the Logic, when, after the notional deployment is completed, reaching the full circle of the absolute Idea, the Idea, in its resolve/decision, 'freely releases itself into Nature, lets Nature go, leaves it off, discards it, pushes it away from itself, and thus liberates it.'
      - superscript [ref=e83]:
        - link "8" [ref=e84]:
          - /url: "#fn-8"
      - text: "Which is why, for Hegel, the philosophy of nature is not a violent reappropriation of this externality; it rather involves the passive attitude of an observer: as he puts it in the Philosophy of Mind, 'philosophy has, as it were, simply to watch how nature itself sublates its externality'."
      - superscript [ref=e86]:
        - link "9" [ref=e87]:
          - /url: "#fn-9"
    - paragraph [ref=e88]: The same move is accomplished by God himself who, in the guise of Christ, this finite mortal, also 'freely releases himself into temporal existence. The same goes for early modern art, where Hegel accounts for the rise of 'dead nature' paintings (not only landscapes and flowers, etc., but even pieces of food or dead animals) as being due precisely to the fact that, in the development of art, subjectivity no longer needs the visual medium as its principal means of expression - that is, because the accent has shifted to poetry as a more direct presentation of the subject's inner life, the natural environs are 'released' from the burden of expressing subjectivity and, thus freed, can be asserted on their own terms. Furthermore, as some perspicuous readers of Hegel have already pointed out, the very sublation of art itself in the philosophical sciences (in conceptual thought), the fact that art is no longer obliged to serve as the principal medium of the expression of the spirit, frees it, allows it to gain autonomy and stand on its own. Is this not the very definition of the birth of modern art proper, an art no longer subordinated to the task of representing spiritual reality?
    - paragraph [ref=e89]:
      - text: "The way abrogation relates to sublation is not that of a simple succession or external opposition, not 'first you eat, then you shit'. Shitting is the immanent conclusion of the entire process: without it, we would be dealing with the 'spurious infinity' of an endless process of sublation. The process of sublation itself can only reach its end by way of the counter-move: contrary to what one would initially imagine, these two processes of sublation and abrogation are completely interdependent. Considering the last moment of absolute spirit [philosophy], one readily notes the synonymy between the verbs aufheben and befreien ['to liberate'], as well as ablegen ['to discard', 'to remove', 'to take away']. Speculative abrogation, in no way alien to the process of Aufhebung, is indeed its fulfilment. Abrogation is a sublation of sublation, the result of the Aufhebung's work on itself and, as such, its transformation. The movement of suppression and preservation produces this transformation at a certain moment in history, the moment of Absolute Knowledge. Speculative abrogation is the absolute sublation, if by 'absolute' we mean a relief or sublation that frees from a certain type of attachment."
      - superscript [ref=e91]:
        - link "10" [ref=e92]:
          - /url: "#fn-10"
    - paragraph [ref=e93]: "True cognition is thus not only the notional 'appropriation' of its object: the process of appropriation goes on only as long as cognition remains incomplete. The sign of its completion is that it liberates its object, lets it be, drops it. This is why and how the movement of sublation has to culminate in the self-relating gesture of sublating itself."
    - paragraph [ref=e94]: So, what about the obvious counter-argument? Is the part which is abrogated, released, not precisely the arbitrary, passing aspect of the object, that which the notional mediation/reduction can afford to drop as being the part which is in itself worthless? This, precisely, is the illusion to be avoided, for two reasons. First, it is precisely as discarded that the released part is, on the contrary, and if one may be permitted to insist on the excremental metaphor, the manure of spiritual development, the ground out of which further development will grow. The release of Nature into its own thus lays the foundation of Spirit proper, which can develop itself only out of Nature as its inherent self-sublation. Second (and more fundamentally), what is released into its own being in speculative cognition is ultimately the object of cognition itself which, when truly grasped [begriffen], no longer has to rely on the subject's active intervention, but develops itself following its own conceptual automatism, with the subject reduced to a passive observer who, allowing the thing to deploy its potential without any intervention of his own (Zutun), merely registers the process.
    - paragraph [ref=e95]: This is why Hegelian cognition is simultaneously both active and passive, but in a sense which radically displaces the Kantian notion of cognition as the unity of activity and passivity. In Kant, the subject actively synthesizes (confers unity on) the content (sensuous multiplicity) by which he is passively affected.
    - paragraph [ref=e96]:
      - text: "For Hegel, on the contrary, at the level of Absolute Knowledge, the cognizing subject is thoroughly passivized: he no longer intervenes in the object, but merely registers the immanent movement of the object's self-differentiation/self-determination (or, to use a more contemporary term, the object's autopoietic self-organization). The subject is thus, at its most radical, not the agent of the process: the agent is the System (of knowledge) itself, which 'automatically' deploys itself without any need for external pushes or impetuses. However, this utter passivity simultaneously involves the greatest activity: it takes the most strenuous effort for the subject to 'erase itself in its particular content, as the agent intervening in the object, and to expose itself as a neutral medium, the site of the System's self-deployment. Hegel thereby overcomes the standard dualism between System and Freedom, between the Spinozist notion of a substantial deus sive natura of which I am a part, caught up in its determinism, and the Fichtean notion of the subject as the agent opposed to inert matter, trying to dominate and appropriate it: the supreme moment of the subject's freedom is to set free its object, to leave it free to deploy itself: 'The Idea's absolute freedom consists in [the fact] that it resolves to freely let go out of itself the moment of its particularity.'"
      - superscript [ref=e98]:
        - link "11" [ref=e99]:
          - /url: "#fn-11"
    - paragraph [ref=e100]: "'Absolute freedom' is here literally absolute in the etymological sense of absolvere: releasing, letting go. Schelling was the first to criticize this move as illegitimate: after Hegel completed the circle of the logical self-development of the Notion, and being aware that the whole of this development took place in the abstract medium of thought, he had somehow to make the passage back to real life - however, since there were no categories in his logic to accomplish this passage, he had to resort to terms like 'decision' (the Idea 'decides' to release Nature from itself), terms which are not categories of logic, but of the will and practical life. This critique clearly misses the way the act of releasing the other is thoroughly immanent to the dialectical process, is its conclusive moment, the sign of the conclusion of a dialectical circle. Is this not the Hegelian version of Gelassenheit?"
    - paragraph [ref=e101]:
      - text: "This is how one should read Hegel's 'third syllogism of Philosophy', Spirit-Logic-Nature: the starting point of the speculative movement rendered by this syllogism is spiritual substance into which subjects are immersed; then, through strenuous conceptual work, the wealth of this substance is reduced to its underlying elementary logical/notional structure; once this task is accomplished, the fully developed logical Idea can release Nature out of itself. Here is the key passage: The Idea, namely, in positing itself as absolute unity of the pure Notion and its reality and thus contracting itself into the immediacy of being, is the totality in this form - nature."
      - superscript [ref=e103]:
        - link "12" [ref=e104]:
          - /url: "#fn-12"
    - paragraph [ref=e105]:
      - text: But this determination has not issued from a process of becoming, nor is it a transition, as when above, the subjective Notion in its totality becomes objectivity, and the subjective end becomes life. On the contrary, the pure Idea in which the determinateness or reality of the Notion is itself raised into Notion, is an absolute liberation for which there is no longer any immediate determination that is not equally posited and itself Notion; in this freedom, therefore, no transition takes place; the simple being to which the Idea determines itself remains perfectly transparent to it and is the Notion that, in its determination, abides with itself. The passage is therefore to be understood here rather in this manner, that the Idea freely releases itself in its absolute self-assurance and inner poise. By reason of this freedom, the form of its determinateness is also utterly free - the externality of space and time existing absolutely on its own account without the moment of subjectivity.
      - superscript [ref=e107]:
        - link "13" [ref=e108]:
          - /url: "#fn-13"
      - text: "Hegel repeatedly insists here on this 'absolute liberation' being thoroughly different from the standard dialectical 'transition'. But how? The suspicion lurks that Hegel's 'absolute liberation' relies on the absolute mediation of all otherness: I set the Other free only after I have completely internalized it... However, is this really the case?"
    - paragraph [ref=e109]: "One should here reread Lacan's critique of Hegel: what if, far from denying what Lacan calls the 'subjective disjunction', Hegel on the contrary asserts a previously unheard-of division that runs through the (particular) subject as well as through the (universal) substantial order of 'collectivity', uniting the two? That is to say, what if the 'reconciliation' between the Particular and the Universal occurs precisely through the division that cuts across the two? The basic 'postmodern' reproach to Hegel - that his dialectics admits antagonisms and splits only to resolve them magically in a higher synthesis-mediation - strangely contrasts with the good old Marxist reproach (already formulated by Schelling) according to which Hegel resolves antagonisms only in 'thought', through conceptual mediation, while in reality they remain unresolved. One is tempted to accept this second reproach at face value and use it against the first one: what if this is the proper answer to the accusation that Hegelian dialectics magically resolves antagonisms? What if, for Hegel, the point, precisely, is to not 'resolve' antagonisms 'in reality', but simply to enact a parallax shift by means of which antagonisms are recognized 'as such' and thereby perceived in their 'positive' role?"
    - paragraph [ref=e110]: "The passage from Kant to Hegel is thus much more convoluted than it may appear: let us approach it again by way of their different attitudes to the ontological proof of God's existence. Kant's rejection of this proof takes as its starting point his thesis that being is not a predicate: if one knows all the predicates of an entity, its being (existence) does not follow, that is, one cannot conclude a being from a notion. (The anti-Leibniz line is obvious here, since, according to Leibniz, two objects are indistinguishable if all of their predicates are the same.) The implication for the ontological proof of God is clear: in the same way that I can have a perfect notion of 100 thalers and yet still not have them in my pocket, I can have a perfect notion of God and yet God still may not exist. Hegel's first remark on this line of reasoning is that 'being' is the poorest, most imperfect, notional determination (everything 'is' in some way, even my craziest phantasmagorias); it is only through further notional determinations that we get to existence, to reality, to actuality, which are all much more than mere being. His second remark is that the gap between notion and existence is precisely the mark of finitude; it holds for finite objects like 100 thalers, but not for God: God is not something I can have (or not have) in my pocket..."
    - paragraph [ref=e111]: "On a first approach, it may seem that the opposition between Kant and Hegel is here ultimately that between materialism and idealism: Kant insists on a minimum of materialism (the independence of reality with regard to notional determinations), while Hegel totally dissolves reality in its notional determinations. However, Hegel's true point lies elsewhere: it involves a much more radical 'materialist' claim that a complete notional determination of an entity - to which one would only have to add 'being' in order to arrive at its existence - is in itself an abstract notion, an empty abstract possibility. The lack of (a certain mode of) being is always also an inherent lack of some notional determination - say, for a thing to exist as part of opaque material reality, a whole set of notional conditions-determinations have to be met (and other determinations have to be lacking). With regard to 100 thalers (or any other empirical object), this means that their notional determination is abstract, which is why they possess an opaque empirical being and not full actuality. So when Kant draws a parallel between God and the 100 thalers, one should ask a simple and naive question: does Kant really possess a (fully developed) concept of God?"
    - paragraph [ref=e112]: "This brings us to the true finesse of Hegel's argumentation, which is directed in two ways, both against Kant and against Anselm's classic version of the ontological proof of God. Hegel's argument against Anselm's proof is not that it is too conceptual, but that it is not conceptual enough: Anselm does not develop the concept of God, he just refers to it as the sum of all perfections which, as such, is precisely beyond the comprehension of our finite human minds. Anselm merely presupposes 'God' as an impenetrable reality beyond our comprehension (i.e., outside the notional domain), in other words, his God is precisely not a concept (something posited by our conceptual work), but a purely presupposed pre-or non-conceptual reality."
    - paragraph [ref=e113]: "Along the same lines, albeit in the opposite sense, one should note the irony in the fact that Kant talks about thalers, that is, about money, whose existence as money is not 'objective', but depends on 'notional' determinations. It is true, as Kant says, that having a concept of 100 thalers is not the same as having them in your pocket; but let us imagine a process of rapid inflation which totally devalues the 100 thalers in your pocket; in this case, the same object is there in reality, but it is no longer money, having become a meaningless and worthless coin. In other words, money is precisely an object whose status depends on how we 'think' about it: if people no longer treat this piece of metal as money, if they no longer 'believe' in it as money, it no longer is money."
    - paragraph [ref=e114]: "With regard to material reality, the ontological proof of God's existence should thus be turned around: the existence of material reality bears witness to the fact that the Notion is not fully actualized. Things 'materially exist' not when they meet certain notional requirements, but when they fail to meet them - material reality is as such a sign of imperfection. With regard to truth, this means that, for Hegel, the truth of a proposition is inherently notional, determined by the immanent notional content, not a matter of comparison between notion and reality - in Lacanian terms, there is a non-All (pas-tout) of truth. It may sound strange to invoke Hegel apropos the non-All: is Hegel not the philosopher of All par excellence? However, Hegelian truth is precisely without any external limitation/exception that would serve as its measure or standard, which is why its criterion is absolutely immanent: one compares a statement with itself, with its own process of enunciation."
    - paragraph [ref=e115]:
      - text: When Alain Badiou emphasizes the undecidability of a Truth-Event, his position is radically different from the standard deconstructionist notion of undecidability.
      - superscript [ref=e117]:
        - link "14" [ref=e118]:
          - /url: "#fn-14"
      - text: "For Badiou, undecidability means that there are no neutral 'objective' criteria for an Event: an Event appears as such only to those who recognize themselves in its call; or, as Badiou puts it, an Event is self-relating, it includes itself - its own nomination - among its components. While this does mean that one has to decide about an Event, such an ultimately groundless decision is not 'undecidable' in the standard sense; it is, rather, uncannily similar to the Hegelian dialectical process in which, as Hegel himself made clear already in the Introduction to his Phenomenology, a 'figure of consciousness' is not measured by any external standard of truth but in an absolutely immanent way, through the gap between itself and its own exemplification/staging. An Event is thus 'non-All' in the precise Lacanian sense of the term: it is never fully verified precisely because it is infinite/unlimited, that is, because there is no external limit to it. And the conclusion to be drawn here is that, for the very same reason, the Hegelian 'totality' is also 'non-All'."
    - paragraph [ref=e119]: Back to our main line of argument.
    - paragraph [ref=e120]: "What this means is that the externality of Nature with regard to the Idea is not that of the Idea's constitutive exception: it is not that Nature is set free as the exception that guarantees the Wholeness of the Idea's self-mediation. It is not the case that, once this mediation is completed (that is, after the Idea's dialectical progress can no longer be propelled by the Idea's own incompleteness - its failure to correspond to its own notion), the completed Idea needs an external Other (Nature) to sustain the complete and closed circle of its self-mediation. Nature is, rather, the mark of the non-All of the Idea's totality."
    - paragraph [ref=e121]: So, to pursue the rather tasteless metaphor, Hegel was not a sublimated coprophagist, as the usual notion of the dialectical process would lead us to believe. The matrix of the dialectical process is not that of excrementation-externalization followed by a swallowing (reappropriation) of the externalized content, but, on the contrary, of appropriation followed by the excremental move of dropping it, releasing it, letting it go.
    - paragraph [ref=e122]: "What this means is that one should not equate externalization with alienation. The externalization which concludes a cycle of dialectical process is not alienation, it is the highest point of dis-alienation: one really reconciles oneself with some objective content not when one still has to strive to master and control it, but when one can afford the supreme sovereign gesture of releasing this content from oneself, of setting it free. Which is why, incidentally, and as some of the sharper interpreters have pointed out, far from subduing nature totally to man, Hegel opens up an unexpected space for ecological awareness: for Hegel, the drive to exploit nature technologically is still a mark of man's finitude; in such an attitude, nature is perceived as an external object, an opposing force to be dominated, while a philosopher, from his standpoint of Absolute Knowledge, experiences nature not as a threatening force to be controlled and dominated, but as something to be left to follow its inherent path."
    - paragraph [ref=e123]: "What this means is that the Hegelian Subject-Substance has nothing to do with any kind of mega-Subject controlling the dialectical process: there is no one pulling the strings or controlling the process - the Hegelian System is a plane without a pilot. Here, Louis Althusser went wrong when he opposed the Hegelian Subject-Substance, the 'teleological' process-with-a-subject, to the materialist-dialectical 'process without a subject'. The Hegelian dialectical process is in fact the most radical version of a 'process without a subject', in the sense of an agent controlling and directing the process, be it God or humanity or class as a collective subject. In his later writings, Althusser was becoming aware of this, while remaining thoroughly unaware of how the fact that the Hegelian dialectical process is a 'process without a subject' means exactly the same as Hegel's fundamental thesis that 'it is crucial to grasp the Absolute not only as Substance, but also as Subject': the emergence of a pure subject qua void is strictly correlative to the notion of 'System' as the self-deployment of the object itself with no need for any subjective agent to push it forward or to direct it."
    - paragraph [ref=e124]: Perhaps what the critics of Hegel's voracity need, then, is a dose of an effective laxative.
  - region "Introduction" [ref=e125]:
    - heading "Introduction" [level=2] [ref=e126]
    - paragraph [ref=e127]: "In that book of Habermas's which specifically addresses the issue of so-called 'post-structuralism', Der philosophische Diskurs der Moderne, there is a curious detail concerning Lacan's name: it is mentioned only five times and each time in conjunction with other names. (Let us cite all five instances: p. 70 - 'von Hegel und Marx bis Nietzsche und Heidegger, von Bataille und Lacan bis Foucault und Derrida'; p. 120 - 'Bataille, Lacan und Foucault'; p. 311 - 'mit Levi-Strauss und Lacan'; p. 313 - 'den zeitgenossischen Strukturalismus, die Ethnologie von Levi-Strauss und die Lacanische Psychoanalyse'; p. 359 - von Freud oder c. G. Jung, von Lacan oder Levi-Strauss'.) Lacanian theory is not, then, perceived as a specific entity; it is - to use Laclau and Mouffe's term - always articulated in a series of equivalences. Why this refusal to confront Lacan directly, in a book which includes lengthy discussions of Bataille, Derrida and, above all, Foucault, the real partner of Habermas?"
    - paragraph [ref=e128]:
      - text: "The answer to this enigma is to be found in another curiosity of the Habermas book, in a curious incident concerning Althusser. of course, we are using the term 'curious incident' in a Sherlock Holmesian sense: Althusser's name is not even mentioned in Habermas's book, and that is the curious incident. So our first thesis would be that the great debate occupying the foreground of today's intellectual scene, the Habermas-Foucault debate, is masking another opposition, another debate which is theoretically more far-reaching: the Althusser-Lacan debate. There is something enigmatic in the sudden eclipse of the Althusserian school: it cannot be explained away in terms of a theoretical defeat. It is more as if there were, in Althusser's theory"
      - superscript [ref=e130]:
        - link "2" [ref=e131]:
          - /url: "#fn-intro-2"
      - text: ", a traumatic kernel which had to be quickly forgotten, 'repressed'; it is an effective case of theoretical amnesia."
    - paragraph [ref=e132]: Why, then, was the opposition Althusser-Lacan replaced, in a kind of metaphorical substitution, by the opposition Habermas-Foucault? At stake here are four different ethical positions, and at the same time four different notions of the subject.
    - paragraph [ref=e133]: With Habermas, we have the ethics of the unbroken communication, the Ideal of the universal, transparent intersubjective community; the notion of the subject behind this is, of course, the philosophy-of-language version of the old subject of transcendental reflection.
    - paragraph [ref=e134]:
      - text: "With Foucault, we have a turn against that universalist ethics which results in a kind of aestheticization of ethics: each subject must, without any support from universal rules, build his own mode of self-mastery; he must harmonize the antagonism of the powers within himself-invent himself, so to speak, produce himself as subject, find his own particular art of living. This is why Foucault was so fascinated by marginal lifestyles constructing their particular mode of subjectivity (the sadomasochistic homosexual universe)."
      - superscript [ref=e136]:
        - link "1" [ref=e137]:
          - /url: "#fn-intro-1"
    - paragraph [ref=e138]: "It is not very difficult to detect how this Foucauldian notion of subject enters the humanist-elitist tradition: its closest realization would be the Renaissance ideal of the 'all-round personality' mastering the passions within himself and making out of his own life a work of art. Foucault's notion of the subject is, rather, a classical one: subject as the power of self-mediation and harmonizing the antagonistic forces, as a way of mastering the 'use of pleasures' through a restoration of the image of self. Here Habermas and Foucault are two sides of the same coin - the real break is represented by Althusser, by his insistence on the fact that a certain cleft, a certain fissure, misrecognition, characterizes the human condition as such: by the thesis that the idea of the possible end of ideology is an ideological idea par excellence!"
    - paragraph [ref=e139]: Although Althusser has not written extensively about ethical problems, it is clear that the whole of his work embodies a certain radical ethical attitude which we might call the heroism of alienation or of subjective destitution (although, or rather, precisely because Althusser refuses the very notion of 'alienation' as ideological). The point is not just that we must unmask the structural mechanism which is producing the effect of subject as ideological misrecognition, but that we must at the same time fully acknowledge this misrecognition as unavoidable - that is, we must accept a certain delusion as a condition of our historical activity, of assuming a role as agent of the historical process.
    - paragraph [ref=e140]:
      - text: "In this perspective, the subject as such is constituted through a certain misrecognition: the process of ideological interpellation through which the subject 'recognizes' itself as the addressee in the calling up of the ideological cause implies necessarily a certain short circuit, an illusion of the type 'I was already there' which, as Michel Pêcheux - who has given us the most elaborated version of the theory of interpellation - pointed out, is not without its comical effects: the short circuit of 'no wonder you were interpellated as proletarian, when you are a proletarian'."
      - superscript [ref=e142]:
        - link "3" [ref=e143]:
          - /url: "#fn-intro-3"
      - text: "Here, Pêcheux is supplementing Marxism with the Marx Brothers, whose well-known joke goes: 'You remind me of Emanuel Ravelli.' 'But I am Emanuel Ravelli.' 'Then no wonder you look like him!'"
    - paragraph [ref=e144]: "In contrast to this Althusserian ethics of alienation in the symbolic 'process without subject', we may denote the ethics implied by Lacanian psychoanalysis as that of separation. The famous Lacanian motto not to give way on one's desire (ne pas céder sur son désir) - is aimed at the fact that we must not obliterate the distance separating the Real from its symbolization: it is this surplus of the Real over every symbolization that functions as the object-cause of desire. To come to terms with this surplus (or, more precisely, leftover) means to acknowledge a fundamental deadlock ('antagonism'), a kernel resisting symbolic integration-dissolution. The best way to locate such an ethical position is via its opposition to the traditional Marxist notion of social antagonism."
    - paragraph [ref=e145]: "This traditional notion implies two interconnected features: (1) there exists a certain fundamental antagonism possessing an ontological priority to 'mediate' all other antagonisms, determining their place and their specific weight (class antagonism, economic exploitation); (2) historical development brings about, if not a necessity, at least an 'objective possibility' of solving this fundamental antagonism and, in this way, mediating all other antagonisms - to recall the well-known Marxist formulation, the same logic which drove mankind into alienation and class division also creates the condition for its abolition - 'die Wunde schliesst der Speer nur, der sie schlug' [the wound can be healed only by the spear which made it] -as Wagner, Marx's contemporary, said through the mouth of Parsifal.."
    - paragraph [ref=e146]: "It is upon the unity of these two features that the Marxist notion of the revolution, of the revolutionary situation, is founded: a situation of metaphorical condensation in which it finally becomes clear to the everyday consciousness that it is not possible to solve any particular question without solving them all - that is, without solving the fundamental question which embodies the antagonistic character of the social totality. In a 'normal', pre-revolutionary state of things, everybody is fighting his own particular battles (workers are striking for better wages, feminists are fighting for the rights of women, democrats for political and social freedoms, ecologists against the exploitation of nature, participants in the peace movements against the danger of war, and so on). Marxists are using all their skill and adroitness of argument to convince the participants in these particular struggles that the only real solution to their problem is to be found in the global revolution: as long as social relations are dominated by Capital, there will always be sexism in relations between the sexes, there will always be a threat of global war, there will always be a danger that political and social freedoms will be suspended, nature itself will always remain an object of ruthless exploitation... The global revolution will then abolish the basic social antagonism, enabling the formation of a transparent, rationally governed society."
    - paragraph [ref=e147]:
      - text: "The basic feature of so-called 'post-Marxism' is, of course, the break with this logic - which, incidentally, does not necessarily have a Marxist connotation: almost any of the antagonisms which, in the light of Marxism, appear to be secondary can take over this essential role of mediator for all the others. We have, for example, feminist fundamentalism (no global liberation without the emancipation of women, without the abolition of sexism); democratic fundamentalism (democracy as the fundamental value of Western civilization; all other struggles - economic, feminist, of minorities, and so on - are simply further applications of the basic democratic, egalitarian principle); ecological fundamentalism (ecological deadlock as the fundamental problem of mankind); and - why not? - also psychoanalytic fundamentalism as articulated in Marcuse's Eros and Civilization (the key to liberation lies in changing the repressive libidinal structure)."
      - superscript [ref=e149]:
        - link "4" [ref=e150]:
          - /url: "#fn-intro-4"
    - paragraph [ref=e151]: Psychoanalytic 'essentialism' is paradoxical in so far as it is precisely psychoanalysis - at least in its Lacanian reading - which presents the real break with essentialist logic.
    - paragraph [ref=e152]: "That is to say, Lacanian psychoanalysis goes a decisive step further than the usual 'post-Marxist' anti-essentialism affirming the irreducible plurality of particular struggles - in other words, demonstrating how their articulation into a series of equivalences depends always on the radical contingency of the social-historical process: it enables us to grasp this plurality itself as a multitude of responses to the same impossible-real kernel. Let us take the Freudian notion of the 'death drive'. of course, we have to abstract Freud's biologism: 'death drive' is not a biological fact but a notion indicating that the human psychic apparatus is subordinated to a blind automatism of repetition beyond pleasure-seeking, self-preservation, accordance between man and his milieu. Man is - Hegel dixit - 'an animal sick unto death', an animal extorted by an insatiable parasite (reason, logos, language)."
    - paragraph [ref=e153]: "In this perspective, the 'death drive', this dimension of radical negativity, cannot be reduced to an expression of alienated social conditions, it defines la condition humaine as such: there is no solution, no escape from it; the thing to do is not to 'overcome', to 'abolish' it, but to come to terms with it, to learn to recognize it in its terrifying dimension and then, on the basis of this fundamental recognition, to try to articulate a modus vivendi with it."
    - paragraph [ref=e154]: "All 'culture' is in a way a reaction-formation, an attempt to limit, canalize - to cultivate this imbalance, this traumatic kernel, this radical antagonism through which man cuts his umbilical cord with nature, with animal homeostasis. It is not only that the aim is no longer to abolish this drive antagonism, but the aspiration to abolish it is precisely the source of totalitarian temptation: the greatest mass murders and holocausts have always been perpetrated in the name of man as harmonious being, of a New Man without antagonistic tension."
    - paragraph [ref=e155]: "We have the same logic with ecology: man as such is 'the wound of nature', there is no return to the natural balance; to accord with his milieu, the only thing man can do is accept fully this cleft, this fissure, this structural rooting-out, and to try as far as possible to patch things up afterwards; all other solutions - the illusion of a possible return to nature, the idea of a total socialization of nature - are a direct path to totalitarianism."
    - paragraph [ref=e156]: "We have the same logic with feminism: 'there is no sexual relationship': that is, the relation between sexes is by definition 'impossible', antagonistic; there is no final solution, and the only basis for a somewhat bearable relation between the sexes is an acknowledgement of this basic antagonism, this basic impossibility."
    - paragraph [ref=e157]: "We have the same logic with democracy: it is - to use the worn-out phrase attributed to Churchill - the worst of all possible systems; the only problem is that there is no other which would be better."
    - paragraph [ref=e158]: "That is to say, democracy always entails the possibility of corruption, of the rule of dull mediocrity, the only problem is that every attempt to elude this inherent risk and to restore 'real' democracy necessarily brings about its opposite - it ends in the abolition of democracy itself. Here it would be possible to defend a thesis that the first post-Marxist was none other than Hegel himself: according to Hegel, the antagonism of civil society cannot be suppressed without a fall into totalitarian terrorism - only afterwards can the state limit its disastrous effects."
    - paragraph [ref=e159]: It is the merit of Ernest Laclau and Chantal Mouffe that they have, in Hegemony and Socialist Strategy, developed a theory of the social field founded on such a notion of antagonism - on an acknowledgement of an original 'trauma', an impossible kernel which resists symbolization, totalization, symbolic integration.
    - paragraph [ref=e160]: "Every attempt at symbolization-totalization comes afterwards: it is an attempt to suture an original cleft - an attempt which is, in the last resort, by definition doomed to failure. They emphasize that we must not be 'radical' in the sense of aiming at a radical solution: we always live in an interspace and in borrowed time; every solution is provisional and temporary, a kind of postponing of a fundamental impossibility. Their term 'radical democracy' is thus to be taken somehow paradoxically: it is precisely not 'radical' in the sense of pure, true democracy; its radical character implies, on the contrary, that we can save democracy only by taking into account its own radical impossibility."
    - paragraph [ref=e161]: "Here we can see how we have reached the opposite extreme of the traditional Marxist standpoint: in traditional Marxism, the global solution-revolution is the condition of the effective solution of all particular problems, while here every provisional, temporarily successful solution of a particular problem entails an acknowledgement of the global radical deadlock, impossibility, the acknowledgement of a fundamental antagonism. My thesis (developed in Le plus sublime des hystériques: Hegel passe) is that the most consistent model of such an acknowledgement of antagonism is offered by Hegelian dialectics: far from being a story of its progressive overcoming, dialectics is for Hegel a systematic notation of the failure of all such attempts - 'absolute knowledge' denotes a subjective position which finally accepts 'contradiction' as an internal condition of every identity. In other words, Hegelian 'reconciliation' is not a 'panlogicist' sublation of all reality in the Concept but a final consent to the fact that the Concept itself is 'not-all' (to use this Lacanian term). In this sense we can repeat the thesis of Hegel as the first post-Marxist: he opened up the field of a certain fissure subsequently 'sutured' by Marxism. Such an understanding of Hegel inevitably runs counter to the accepted notion of 'absolute knowledge' as a monster of conceptual totality devouring every contingency; this commonplace of Hegel simply shoots too fast, like the patrolling soldier of the well-known joke from Jaruzelski's Poland immediately after the military coup. At that time, military patrols had the right to shoot without warning at people walking on the streets after curfew (ten o'clock); one of the two soldiers on patrol sees somebody in a hurry at ten minutes to ten and shoots him immediately. When his colleague asks him why he shot when it was only ten to ten, he answers: 'I knew the fellow - he lived far from here and in any case would not be able to reach his home in ten minutes, so to simplify matters, I shot him now... ' This is exactly how the critics of Hegel's presumed 'panlogicism' proceed: they condemn absolute knowledge 'before it is ten o'clock', without reaching it - that is, they refute nothing with their criticism but their own prejudices about it."
    - paragraph [ref=e162]: "The aim of this book is thus threefold:"
    - paragraph [ref=e163]: "• to serve as an introduction to some of the fundamental concepts of Lacanian psychoanalysis: against the distorted picture of Lacan as belonging to the field of 'post-structuralism', the book articulates his radical break with 'post-structuralism'; against the distorted picture of Lacan's obscurantism, it locates him in the lineage of rationalism. Lacanian theory is perhaps the most radical contemporary version of the Enlightenment."
    - paragraph [ref=e164]: "• to accomplish a kind of 'return to Hegel' - to reactualize Hegelian dialectics by giving it a new reading on the basis of Lacanian psychoanalysis. The current image of Hegel as an 'idealist-monist' is totally misleading: what we find in Hegel is the strongest affirmation yet of difference and contingency - 'absolute knowledge' itself is nothing but a name for the acknowledgement of a certain radical loss."
    - paragraph [ref=e165]: "• to contribute to the theory of ideology via a new reading of some well-known, classical motifs (commodity fetishism, and so on) and of some crucial Lacanian concepts which, on a first approach, have nothing to offer to the theory of ideology: the 'quilting point' (le point de capiton: 'upholstery button'), sublime object, surplus-enjoyment, and so on."
    - paragraph [ref=e166]: "It is my belief that these three aims are deeply connected: the only way to 'save Hegel' is through Lacan, and this Lacanian reading of Hegel and the Hegelian heritage opens up a new approach to ideology, allowing us to grasp contemporary ideological phenomena (cynicism, 'totalitarianism', the fragile status of democracy) without falling prey to any kind of 'postmodernist' traps (such as the illusion that we live in a 'post-ideological' condition)."
  - region "Part I The Symptom" [ref=e167]:
    - heading "Part I The Symptom" [level=2] [ref=e168]:
      - text: Part I
      - text: The Symptom
  - region "1. How Did Marx Invent the Symptom?" [ref=e169]:
    - heading "1. How Did Marx Invent the Symptom?" [level=2] [ref=e170]
    - 'heading "Marx, Freud: The Analysis of Form" [level=3] [ref=e171]'
    - paragraph [ref=e172]: "According to Lacan, it was none other than Karl Marx who invented the notion of symptom. Is this Lacanian thesis just a sally of wit, a vague analogy, or does it possess a pertinent theoretical foundation? If Marx really articulated the notion of the symptom as it is also at work in the Freudian field, then we must ask ourselves the Kantian question, concerning the epistemological 'conditions of possibility' of such an encounter: how was it possible for Marx, in his analysis of the world of commodities, to produce a notion which applies also to the analysis of dreams, hysterical phenomena, and so on? The answer is that there is a fundamental homology between the interpretative procedure of Marx and Freud - more precisely, between their analysis of commodity and of dreams. In both cases the point is to avoid the properly fetishistic fascination of the 'content' supposedly hidden behind the form: the 'secret' to be unveiled through analysis is not the content hidden by the form (the form of commodities, the form of dreams) but, on the contrary, the secret of this form itself. The theoretical intelligence of the form of dreams does not consist in penetrating from the manifest content to its 'hidden kernel', to the latent dream-thoughts; it consists in the answer to the question: why have the latent dream-thoughts assumed such a form, why were they transposed into the form of a dream?"
    - paragraph [ref=e173]: "It is the same with commodities: the real problem is not to penetrate to the 'hidden kernel' of the commodity - the determination of its value by the quantity of the work consumed in its production - but to explain why work assumed the form of the value of a commodity, why it can affirm its social character only in the commodity-form of its product."
    - paragraph [ref=e174]:
      - text: "The notorious reproach of 'pansexualism' addressed at the Freudian interpretation of dreams is already a commonplace. Hans-Jürgen Eysenck, a severe critic of psychoanalysis, long ago observed a crucial paradox in the Freudian approach to dreams: according to Freud, the desire articulated in a dream is supposed to be - as a rule, at least - unconscious and at the same time of a sexual nature, which contradicts the majority of examples analysed by Freud himself, starting with the dream he chose as an introductory case to exemplify the logic of dreams, the famous dream of Irma's injection. The latent thought articulated in this dream is Freud's attempt to get rid of the responsibility for the failure of his treatment of Irma, a patient of his, by means of arguments of the type 'it was not my fault, it was caused by a series of circumstances...'; but this 'desire', the meaning of the dream, is obviously neither of a sexual nature (it rather concerns professional ethics) nor unconscious (the failure of Irma's treatment was troubling Freud day and night)."
      - superscript [ref=e176]:
        - link "1" [ref=e177]:
          - /url: "#fn-ch1-1"
    - paragraph [ref=e178]: "This kind of reproach is based on a fundamental theoretical error: the identification of the unconscious desire at work in the dream with the 'latent thought' - that is, the signification of the dream. But as Freud continually emphasizes, there is nothing 'unconscious' in the 'latent dream-thought': this thought is an entirely 'normal' thought which can be articulated in the syntax of everyday, common language; topologically, it belongs to the system of, consciousness/preconsciousness'; the subject is usually aware of it, even excessively so; it harasses him all the time... Under certain conditions this thought is pushed away, forced out of the consciousness, drawn into the unconscious - that is, submitted to the laws of the 'primary process', translated into the 'language of the unconscious'. The relationship between the 'latent thought' and what is called the 'manifest content' of a dream - the text of the dream, the dream in its literal phenomenality - is therefore that between some entirely 'normal', (pre)conscious thought and its translation into the 'rebus' of the dream. The essential constitution of dream is thus not its 'latent thought' but this work (the mechanisms of displacement and condensation, the figuration of the contents of words or syllables) which confers on it the form of a dream."
    - paragraph [ref=e179]:
      - text: "Herein, then, lies the basic misunderstanding: if we seek the 'secret of the dream' in the latent content hidden by the manifest text, we are doomed to disappointment: all we find is some entirely 'normal' - albeit usually unpleasant - thought, the nature of which is mostly non-sexual and definitely not 'unconscious'. This 'normal', conscious/preconscious thought is not drawn towards the unconscious, repressed simply because of its 'disagreeable' character for the conscious, but because it achieves a kind of 'short circuit' between it and another desire which is already repressed, located in the unconscious, a desire which has nothing whatsoever to do with the 'latent dream-thoughts' 'A normal train of thought' - normal and therefore one which can be articulated in common, everyday language: that is, in the syntax of the 'secondary process' - 'is only submitted to the abnormal psychical treatment of the sort we have been describing' - to the dream-work, to the mechanisms of the 'primary process' - 'if an unconscious wish, derived from infancy and in a state of repression, has been transferred on to it'"
      - superscript [ref=e181]:
        - link "2" [ref=e182]:
          - /url: "#fn-ch1-2"
    - paragraph [ref=e183]: It is this unconscious/sexual desire which cannot be reduced to a 'normal train of thought' because it is, from the very beginning, constitutively repressed (Freud's Urverdrängung) - because it has no 'original' in the 'normal' language of everyday communication, in the syntax of the conscious/preconscious; its only place is in the mechanisms of the 'primary process'.
    - paragraph [ref=e184]: "This is why we should not reduce the interpretation of dreams, or symptoms in general, to the retranslation of the 'latent dream-thought' into the 'normal', everyday common language of inter-subjective communication (Habermas's formula). The structure is always triple; there are always three elements at work: the manifest dream-text, the latent dream content or thought and the unconscious desire articulated in a dream. This desire attaches itself to the dream, it intercalates itself in the interspace between the latent thought and the manifest text; it is therefore not 'more concealed, deeper' in relation to the latent thought, it is decidedly more 'on the surface', consisting entirely of the signifier's mechanisms, of the treatment to which the latent thought is submitted."
    - paragraph [ref=e185]: "In other words, its only place is in the form of the 'dream': the real subject matter of the dream (the unconscious desire) articulates itself in the dream-work, in the elaboration of its 'latent content'."
    - paragraph [ref=e186]:
      - text: "As is often the case with Freud, what he formulates as an empirical observation (although of' quite surprising frequency') announces a funda mental, universal principle: 'The form of a dream or the form in which it is dreamt is used with quite surprising frequency for representing its concealed subject matter'."
      - superscript [ref=e188]:
        - link "3" [ref=e189]:
          - /url: "#fn-ch1-3"
      - text: "This, then, is the basic paradox of the dream: the unconscious desire, that which is supposedly its most hidden kernel, articulates itself precisely through the dissimulation work of the 'kernel' of a dream, its latent thought, through the work of disguising this content-kernel by means of its translation into the dream-rebus. Again, as characteristically, Freud gave this paradox its final formulation in a footnote added in a later edition:"
    - paragraph [ref=e190]: I used at one time to find it extraordinarily difficult to accustom readers to the distinction between the manifest content of dreams and the latent dream-thoughts. Again and again arguments and objections would be brought up based upon some uninterpreted dream in the form in which it had been retained in the memory, and the need to interpret it would be ignored. But now that analysts at least have become reconciled to replacing the manifest dream by the meaning revealed by its interpretation, many of them have become guilty of falling into another confusion which they cling to with an equal obstinacy. They seek to find the essence of dreams in their latent content and in so doing they overlook the distinction between the latent dream-thoughts and the dream-work.
    - paragraph [ref=e191]:
      - text: At bottom, dreams are nothing other than a particular form of thinking, made possible by the conditions of the state of sleep. It is the dream-work which creates that form, and it alone is the essence of dreaming - the explanation of its peculiar nature.
      - superscript [ref=e193]:
        - link "4" [ref=e194]:
          - /url: "#fn-ch1-4"
    - paragraph [ref=e195]: "Freud proceeds here in two stages:"
    - paragraph [ref=e196]: • First, we must break the appearance according to which a dream is nothing but a simple and meaningless confusion, a disorder caused by physiological processes and as such having nothing whatsoever to do with signification.
    - paragraph [ref=e197]: In other words, we must accomplish a crucial step towards a hermeneutical approach and conceive the dream as a meaningful phenomenon, as something transmitting a repressed message which has to be discovered by an interpretative procedure;
    - paragraph [ref=e198]: • Then we must get rid of the fascination in this kernel of signification, in the 'hidden meaning' of the dream - that is to say, in the content concealed behind the form of a dream - and centre our attention on this form itself, on the dream-work to which the 'latent dream-thoughts' were submitted.
    - paragraph [ref=e199]: "The crucial thing to note here is that we find exactly the same articulation in two stages with Marx, in his analysis of the 'secret of the commodity form':"
    - paragraph [ref=e200]:
      - text: "• First, we must break the appearance according to which the value of a commodity depends on pure hazard - on an accidental interplay between supply and demand, for example. We must accomplish the crucial step of conceiving the hidden 'meaning' behind the commodity-form, the signification 'expressed' by this form; we must penetrate the 'secret' of the value of commodities: The determination of the magnitude of value by labour-time is therefore a secret, hidden under the apparent fluctuations in the relative values of commodities. Its discovery, while removing all appearance of mere accidentality from the determination of the magnitude of the values of products, yet in no way alters the mode in which that determination takes place."
      - superscript [ref=e202]:
        - link "5" [ref=e203]:
          - /url: "#fn-ch1-5"
    - paragraph [ref=e204]: "• But as Marx points out, there is a certain 'yet': the unmasking of the secret is not sufficient. Classical bourgeois political economy has already discovered the 'secret' of the commodity-form; its limit is that it is not able to disengage itself from this fascination in the secret hidden behind the commodity-form - that its attention is captivated by labour as the true source of wealth."
    - paragraph [ref=e205]: "In other words, classical political economy is interested only in contents concealed behind the commodity-form, which is why it cannot explain the true secret, not the secret behind the form but the secret of this form itself In spite of its quite correct explanation of the 'secret of the magnitude of value', the commodity remains for classical political economy a mysterious, enigmatic thing - it is the same as with the dream: even after we have explained its hidden meaning, its latent thought, the dream remains an enigmatic phenomenon; what is not yet explained is simply its form, the process by means of which the hidden meaning disguised itself in such a form."
    - paragraph [ref=e206]:
      - text: "We must, then, accomplish another crucial step and analyse the genesis of the commodity-form itself It is not sufficient to reduce the form to the essence, to the hidden kernel, we must also examine the process - homologous to the 'dream-work' - by means of which the concealed content assumes such a form, because, as Marx points out: 'Whence, then, arises the enigmatical character of the product of labour, as soon as it assumes the form of commodities? Clearly from this form itself'."
      - superscript [ref=e208]:
        - link "6" [ref=e209]:
          - /url: "#fn-ch1-6"
      - text: "It is this step towards the genesis of the form that classical political economy cannot accomplish, and this is its crucial weakness: political economy has indeed analysed value and its magnitude, however incompletely, and has uncovered the content concealed within these forms. But it has never once asked the question why this content has assumed that particular form, that is to say, why labour is expressed in value, and why the measurement of labour by its duration is expressed in the magnitude of the value of the product."
      - superscript [ref=e211]:
        - link "7" [ref=e212]:
          - /url: "#fn-ch1-7"
    - heading "The Unconscious of the Commodity-Form" [level=3] [ref=e213]
    - paragraph [ref=e214]: "Why did the Marxian analysis of the commodity-form - which, prima facie, concerns a purely economic question - exert such an influence in the general field of social sciences; why has it fascinated generations of philosophers, sociologists, art historians, and others? Because it offers a kind of matrix enabling us to generate all other forms of the 'fetishistic inversion': it is as if the dialectics ofthe commodity-form presents us with a pure distilled, so to speak - version of a mechanism offering us a key to the theoretical understanding of phenomena which, at first sight, have nothing whatsoever to do with the field of political economy (law, religion, and so on). In the commodity-form there is definitely more at stake than the commodity-form itself, and it was precisely this 'more' which exerted such a fascinating power of attraction."
    - paragraph [ref=e215]:
      - text: The theoretician who has gone furthest in unfolding the universal reach of the commodity-form is indubitably Alfred Sohn-Rethel, one of the 'fellow-travellers' of the Frankfurt School. His fundamental thesis was that the formal analysis of the commodity holds the key not only to the critique of political economy, but also to the historical explanation of the abstract conceptual mode of thinking and of the division of intellectual and manual labour which came into existence with it.
      - superscript [ref=e217]:
        - link "8" [ref=e218]:
          - /url: "#fn-ch1-8"
    - paragraph [ref=e219]: "In other words, in the structure of the commodity-form it is possible to find the transcendental subject: the commodity-form articulates in advance the anatomy, the skeleton of the Kantian transcendental subject - that is, the network of transcendental categories which constitute the a priori frame of'objective' scientific knowledge."
    - paragraph [ref=e220]: "Herein lies the paradox of the commodity-form: it - this inner-worldly, 'pathological' (in the Kantian meaning of the word) phenomenon - offers us a key to solving the fundamental question of the theory of knowledge: objective knowledge with universal validity - how is this possible?"
    - paragraph [ref=e221]: "After a series of detailed analyses, Sohn-Rethel came to the following conclusion: the apparatus of categories presupposed, implied by the scientific procedure (that, of course, of the Newtonian science of nature), the network of notions by means of which it seizes nature, is already present in the social effectivity, already at work in the act of commodity exchange. Before thought could arrive at pure abstraction, the abstraction was already at work in the social effectivity of the market."
    - paragraph [ref=e222]: "The exchange of commodities implies a double abstraction: the abstraction from the changeable character of the commodity during the act of exchange and the abstraction from the concrete, empirical, sensual, particular character of the commodity (in the act of exchange, the distinct, particular qualitative determination of a commodity is not taken into account; a commodity is reduced to an abstract entity which - irrespective of its particular nature, of its 'use-value' - possesses 'the same value' as another commodity for which it is being exchanged). Before thought could arrive at the idea of a purely quantitative determination, a sine qua non of the modern science of nature, pure quantity was already at work in money, that commodity which renders possible the commensurability of the value of all other commodities notwithstanding their particular qualitative determination. Before physics could articulate the notion of a purely abstract movement going on in a geometric space, independently of all qualitative determinations of the moving objects, the social act of exchange had already realized such a 'pure', abstract movement which leaves totally intact the concrete-sensual properties of the object caught in movement: the transference of property. And Sohn-Rethel demonstrated the same about the relationship of substance and its accidents, about the notion of causality operative in Newtonian science - in short, about the whole network of categories of pure reason. In this way, the transcendental subject, the support of the net of a priori categories, is confronted with the disquieting fact that it depends, in its very formal genesis, on some inner-worldly, 'pathological' process - a scandal, a nonsensical impossibility from the transcendental point of view, in so far as the formal-transcendental a priori is by definition independent of all positive contents: a scandal corresponding perfectly to the 'scandalous' character of the Freudian unconscious, which is also unbearable from the transcendental-philosophical perspective. That is to say, if we look closely at the ontological status of what Sohn-Rethel calls the 'real abstraction' [die reale Abstraktion] (that is, the act of abstraction at work in the very effective process of the exchange of commodities), the homology between its status and that of the unconscious, this signifying chain which persists on 'another Scene', is striking: the 'real abstraction' is the unconscious of the transcendental subject, the support of objective-universal scientific knowledge. On the one hand, the 'real abstraction' is of course not 'real' in the sense of the real, effective properties of commodities as material objects: the object-commodity does not contain 'value' in the same way as it possesses a set of particular properties determining its 'use-value' (its form, colour, taste, and so on)."
    - paragraph [ref=e223]:
      - text: "As Sohn-Rethel pointed out, its nature is that of a postulate implied by the effective act of exchange - in other words, that of a certain 'as if [als obJ: during the act of exchange, individuals proceed as if the commodity is not submitted to physical, material exchanges; as if it is excluded from the natural cycle of generation and corruption; although on the level of their 'consciousness' they 'know very well' that this is not the case. The easiest way to detect the effectivity of this postulate is to think of the way we behave towards the materiality of money: we know very well that money, like all other material objects, suffers the effects of use, that its material body changes through time, but in the social effectivity of the market we none the less treat coins as if they consist 'of an immutable substance, a substance over which time has no power, and which stands in antithetic contrast to any matter found in nature'."
      - superscript [ref=e225]:
        - link "9" [ref=e226]:
          - /url: "#fn-ch1-9"
    - paragraph [ref=e227]: "How tempting to recall here the formula of fetishistic disavowal: '1 know very well, but still... '. To the current exemplifications of this formula ('I know that Mother has not got a phallus, but still... [I believe she has got one],; 'I know that Jews are people like us, but still... [there is something in them],) we must undoubtedly add also the variant of money: 'I know that money is a material object like others, but still... [it is as if it were made of a special substance over which time has no power)'."
    - paragraph [ref=e228]: "Here we have touched a problem unsolved by Marx, that of the material character of money: not of the empirical, material stuff money is made of, but of the sublime material, of that other 'indestructible and immutable' body which persists beyond the corruption of the body physical - this other body of money is like the corpse of the Sadeian victim which endures all torments and survives with its beauty immaculate. This immaterial corporality of the 'body within the body' gives us a precise definition of the sublime object, and it is in this sense only that the psychoanalytic notion of money as a 'pre-phallic', 'anal' object is acceptable - provided that we do not forget how this postulated existence of the sublime body depends on the symbolic order: the indestructible 'body-within-the-body' exempted from the effects of wear and tear is always sustained by the guarantee of some symbolic authority:"
    - paragraph [ref=e229]:
      - text: A coin has it stamped upon its body that it is to serve as a means of exchange and not as an object of use. Its weight and metallic purity are guaranteed by the issuing authority so that, if by the wear and tear of circulation it has lost in weight, full replacement is provided. Its physical matter has visibly become a mere carrier of its social function.
      - superscript [ref=e231]:
        - link "10" [ref=e232]:
          - /url: "#fn-ch1-10"
    - paragraph [ref=e233]: "If, then, the 'real abstraction' has nothing to do with the level of'reality', of the effective properties, of an object, it would be wrong for that reason to conceive of it as a 'thought-abstraction', as a process taking place in the 'interior' of the thinking subject: in relation to this 'interior', the abstraction appertaining to the act of exchange is in an irreducible way external, decentred - or, to quote Sohn-Rethel's concise formulation: 'The exchange abstraction is not thought, but it has the form of thought.'"
    - paragraph [ref=e234]: "Here we have one of the possible definitions of the unconscious: the form of thought whose ontological status is not that of thought, that is to say, the form of thought external to the thought itself - in short, some Other Scene external to the thought whereby the form of the thought is already articulated in advance."
    - paragraph [ref=e235]: "The symbolic order is precisely such a formal order which supplements and/or disrupts the dual relationship of 'external' factual reality and 'internal' subjective experience; Sohn-Rethel is thus quite justified in his criticism of Althusser, who conceives abstraction as a process taking place entirely in the domain of knowledge and refuses for that reason the category of 'real abstraction' as the expression of an 'epistemological confusion'. The 'real abstraction' is unthinkable in the frame of the fundamental Althusserian epistemological distinction between the 'real object' and the 'object of knowledge' in so far as it introduces a third element which subverts the very field of this distinction: the form of the thought previous and external to the thought - in short: the symbolic order."
    - paragraph [ref=e236]: "We are now able to formulate precisely the 'scandalous' nature of Sohn-Rethel's undertaking for philosophical reflection: he has confronted the closed circle of philosophical reflection with an external place where its form is already 'staged'. Philosophical reflection is thus subjected to an uncanny experience similar to the one summarized by the old oriental formula 'thou art that': there, in the external effectivity of the exchange process, is your proper place; there is the theatre in which your truth was performed before you took cognizance of it. The confrontation with this place is unbearable because philosophy as such is defined by its blindness to this place: it cannot take it into consideration without dissolving itself, without losing its consistency."
    - paragraph [ref=e237]: This does not mean, on the other hand, that everyday 'practical' consciousness, as opposed to the philosophical-theoretical one - the consciousness of the individuals partaking in the act of exchange - is not also subjected to a complementary blindness.
    - paragraph [ref=e238]:
      - text: "During the act of exchange, individuals proceed as 'practical solipsists', they misrecognize the socio-synthetic function of exchange: that is the level of the 'real abstraction' as the form of socialization of private production through the medium of the market: 'What the commodity owners do in an exchange relation is practical solipsism - irrespective of what they think and say about it'."
      - superscript [ref=e240]:
        - link "11" [ref=e241]:
          - /url: "#fn-ch1-11"
    - paragraph [ref=e242]: "Such a misrecognition is the sine qua non of the effectuation of an act of exchange - if the participants were to take note of the dimension of'real abstraction', the 'effective' act of exchange itself would no longer be possible:"
    - paragraph [ref=e243]:
      - text: Thus, in speaking of the abstractness of exchange we must be careful not to apply the term to the consciousness of the exchange agents. They are supposed to be occupied with the use of the commodities they see, but occupied in their imagination only. It is the action of exchange, and the action alone, that is abstract... the abstractness of that action cannot be noted when it happens because the consciousness of its agents is taken up with their business and with the empirical appearance of things which pertain to their use. One could say that the abstractness of their action is beyond realization by the actors because their very consciousness stands in the way. Were the abstractness to catch their minds their action would cease to be exchange and the abstraction would not arise.
      - superscript [ref=e245]:
        - link "12" [ref=e246]:
          - /url: "#fn-ch1-12"
    - paragraph [ref=e247]: "This misrecognition brings about the fissure of the consciousness into 'practical' and 'theoretical': the proprietor partaking in the act of exchange proceeds as a 'practical solipsist': he overlooks the universal, socio-synthetic dimension of his act, reducing it to a casual encounter of atomized individuals in the market. This 'repressed' social dimension of his act emerges thereupon in the form of its contrary - as universal Reason turned towards the observation of nature (the network of categories of 'pure reason' as the conceptual frame of natural sciences)."
    - paragraph [ref=e248]: "The crucial paradox of this relationship between the social effectivity of the commodity exchange and the 'consciousness' of it is that - to use again a concise formulation by Sohn-Rethel - 'this non-knowledge of the reality is part of its very essence': the social effectivity of the exchange process is a kind of reality which is possible only on condition that the individuals partaking in it are not aware of its proper logic; that is, a kind of reality whose very ontological consistency implies a certain non-knowledge of its participants - if we come to 'know too much', to pierce the true functioning of social reality, this reality would dissolve itself"
    - paragraph [ref=e249]: "This is probably the fundamental dimension of'ideology': ideology is not simply a 'false consciousness', an illusory representation of reality, it is rather this reality itself which is already to be conceived as 'ideological' - 'ideological' is a social reality whose very existence implies the non-knowledge of its partidpants as to its essence - that is, the social effectivity, the very repro duction of which implies that the individuals 'do not know what they are doing'. 'Ideolo8ical'is not the false consdousness' ofa (soda/) bein8 but this beil18 itse!fin so.far as it is supported f?y Jalse consa\"ousnes: Thus we have finally reached the dimension of the symptom, because one of its possible defi nitions would also be 'a formation whose very consistency implies a certain non-knowledge on the part of the subject': the subject can 'enjoy his symptom' only in so far as its logic escapes him - the measure of the success of its interpretation is precisely its dissolution. The sodal!JImptom"
    - paragraph [ref=e250]: How, then, can we define the Marxian symptom?
    - paragraph [ref=e251]: "Marx 'invented the symptom' (Lacan) by means of detecting a certain fissure, an asymmetry, a certain 'pathological' imbalance which belies the universalism of the bourgeois 'rights and duties'. This imbalance, far from announcing the 'imperfect realization' of these univƮrsal principles - that is, an insuffi ciency to be abolished by further development - functions as their consti tutive moment: the 'symptom' is, strictly speaking, a particular element which subverts its own universal foundation, a species subverting its own genus. In this sense, we can say that the elementary Marxian procedure of 'criticism of ideology' is already 'symptomatic': it consists in detecting a point of breakdown hetero8enous to a given ideological field and at the same time necessary for that field to achieve its do sun:, its accomplished form. This procedure thus implies a certain logic of exception: every ideolog ical Universal - for example freedom, equality - is 'false' in so far as it necessarily includes a specific case which breaks its unity, lays open its falsity. Freedom, for example: a universal notion comprising a number of species (freedom of speech and press, freedom of consciousness, freedom of commerce, political freedom, and so on) but also, by means of a structural freedom is the very opposite of effective freedom: by selling his labour 'freely', the worker loses his freedom - the real content of this free act of sale is the worker's enslavement to capitaL"
    - paragraph [ref=e252]: "The crucial point is, of course, that it is precisely this paradoxical freedom, the form of its opposite, which closes the circle of 'bourgeois freedoms'. The same can also be shown for fair, equivalent exchange, this ideal of the market. When, in pre-capitalist society, the production of commodities has not yet attained universal character - that is, when it is still so-called 'natural production' which predominates - the proprietors of the means of production are still themselves producers (as a rule, at least): it is artisan production; the proprietors themselves work and sell their products on the market. At this stage of development there is no exploitation (in principle, at least - that is, if we do not consider the exploitation of apprentices, and so on); the exchange on the market is equivalent, every commodity is paid its full value. But as soon as production for the market prevails in the economic edifice of a given society, this generalization is necessarily accompanied by the appearance of a new, paradoxical type of commodity: the labour force, the workers who are not themselves proprietors of the means of production and who are consequently obliged to sell on the market their own labour instead of the products of their labour. With this new commodity, the equivalent exchange becomes its own negation - the very form of exploitation, of appropriation of the surplusvalue."
    - paragraph [ref=e253]: "The crucial point not to be missed here is that this negation is strictly intemalto equivalent exchange, not its simple violation: the labour force is not 'exploited' in the sense that its full value is not remunerated; in principle at least, the exchange between labour and capital is wholly equivalent and equitable. The catch is that the labour force is a peculiar commodity, the use of which - labour itself- produces a certain surplusvalue, and it is this surplus over the value of the labour force itself which is appropriated by the capitalist. We have here again a certain ideological Universal, that of equivalent and equitable exchange, and a particular paradoxical exchange - that of the labour force for its wages - which, precisely as an equivalent, functions as the very form of exploitation."
    - paragraph [ref=e254]: The 'quantitative' development itself, the universalization of the production of commodities, brings about a new 'quality', the emergence of a new commodity representing the internal negation of the universal principle of equivalent exchange of commodities; in other words, it brings about a symptom.
    - paragraph [ref=e255]: And in the Marxian perspective, utopian socialism consists in the very belief that a society is possible in which the relations of exchange are universalized and production for the market predominates, but workers themselves none the less remain proprietors of their means of production and are therefore not exploited - in short, 'utopian' conveys a belief in the possibility of a universality without itssymptom, without the point of exception functioning as its internal negation.
    - paragraph [ref=e256]: "This is also the logic of the Marxian critique of Hegel, of the Hegelian notion of society as a rational totality: as soon as we try to conceive the existing social order as a rational totality, we must include in it a paradoxical element which, without ceasing to be its internal constituent, functions as its symptom - subverts the very universal rational principle of this totality. For Marx, this 'irrational' element of the existing society was, of course, the proletariat, 'the unreason of reason itself (Marx), the point at which the Reason embodied in the existing social order encounters its own unreason."
    - heading "Commodity Fetishism" [level=3] [ref=e257]
    - paragraph [ref=e258]:
      - text: "In his attribution of the discovery of the symptom to Marx, Lacan is, however, more distinct: he locates this discovery in the way Marx conceived the passage from feudalism to capitalism: 'One has to look for the origins of the notion of symptom not in Hippocrates but in Marx, in the connection he was first to establish between capitalism and what? - the good old times, what we call the feudal times."
      - superscript [ref=e260]:
        - link "13" [ref=e261]:
          - /url: "#fn-ch1-13"
    - paragraph [ref=e262]: To grasp the logic of this passage from feudalism to capitalism we have first to elucidate its theoretical background, the Marxian notion of commodity fetishism.
    - paragraph [ref=e263]:
      - text: In a first approach, commodity fetishism is 'a definite social relation between men, that assumes, in their eyes, the fantastic form of a relation between things'.
      - superscript [ref=e265]:
        - link "14" [ref=e266]:
          - /url: "#fn-ch1-14"
      - text: "The value of a certain commodity, which is effectively an insignia of a network of social relations between producers of diverse commodities, assumes the form of a quasi-'natural' property of another thing-commodity, money: we say that the value of a certain commodity is such-and-such amount of money."
    - paragraph [ref=e267]: "Consequently, the essential feature of commodity fetishism does not consist of the famous replacement of men with things ('a relation between men assumes the form of a relation between things'); rather, it consists of a certain misrecognition which concerns the relation between a structured network and one of its elements: what is really a structural effect, an effect of the network of relations between elements, appears as an immediate property of one of the elements, as if this property also belongs to it outside its relation with other elements."
    - paragraph [ref=e268]: Such a misrecognition can take place in a 'relation between things' as well as in a 'relation between men' - Marx states this explicitly apropos of the simple form of the value-expression.
    - paragraph [ref=e269]: "The commodity A can express its value only by referring itself to another commodity, B, which thus becomes its equivalent: in the value relationship, the natural form of the commodity B (its use-value, its positive, empirical properties) functions as a form of value of the commodity A; in other words, the body of B becomes for A the mirror of its value. To these reflections, Marx added the following note:"
    - paragraph [ref=e270]:
      - text: In a sort of way, it is with man as with commodities. Since he comes into the world neither with a looking-glass in his hand, nor as a Fichtian philosopher, to whom 'I am I' is sufficient, man first sees and recognizes himself in other men. Peter only establishes his own identity as a man by first comparing himself with Paul as being of the kind. And thereby Paul, just as he stands in his Pauline personality, becomes to Peter the type of the genus homo.
      - superscript [ref=e272]:
        - link "15" [ref=e273]:
          - /url: "#fn-ch1-15"
    - paragraph [ref=e274]: "This short note anticipates in a way the Lacanian theory of the mirror stage: only by being reflected in another man - that is, in so far as this other man offers it an image of its unity - can the ego arrive at its self-identity; identity and alienation are thus strictly correlative."
    - paragraph [ref=e275]: "Marx pursues this homology: the other commodity (B) is an equivalent only in so far as A relates to it as to the form-of-appearance of its own value, only within this relationship. But the appearance -and herein lies the effect of inversion proper to fetishism - the appearance is exactly opposite: A seems to relate to B as if, for B, to be an equivalent of A would not be a 'reflexive determination' (Marx) of A - that is as if B would already in itself be the equivalent of A; the property of 'being-an-equivalent' appears to belong to it even outside its relation to A, on the same level as its other 'natural' effective properties constituting its use-value. To these reflections, Marx again added a very interesting note:"
    - paragraph [ref=e276]:
      - text: Such expressions of relations in general, called by Hegel reflex-categories, form a very curious class. For instance, one man is king only because other men stand in the relation of subjects to him. They, on the contrary, imagine that they are subjects because he is king.
      - superscript [ref=e278]:
        - link "16" [ref=e279]:
          - /url: "#fn-ch1-16"
    - paragraph [ref=e280]: "'Being-a-king' is an effect of the network of social relations between a 'king' and his 'subjects'; but - and here is the fetishistic misrecognition to the participants of this social bond, the relationship appears necessarily in an inverse form: they think that they are subjects giving the king royal treatment because the king is already in himself, outside the relationship to his subjects, a king; as if the determination of 'being-a-king' were a 'natural' property of the person of a king."
    - paragraph [ref=e281]: How can one not remind oneself here of the famous Lacanian affirmation that a madman who believes himself to be a king is no more mad than a king who believes himself to be a king - who, that is, identifies immediately with the mandate 'king'?
    - paragraph [ref=e282]: "What we have here is thus a parallel between two modes of fetishism, and the crucial question concerns the exact relationship between these two levels. That is to say, this relationship is by no means a simple homology: we cannot say that in societies in which production for the market predominates - ultimately, that is, in capitalist societies -'it is with man as with commodities'. Precisely the opposite is true: commodity fetishism occurs in capitalist societies, but in capitalism relations between men are definitely not 'fetishized'; what we have here are relations between 'free' people, each following his or her proper egoistic interest The predominant and determining form of their interrelations is not domination and servitude but a contract between free people who are equal in the eyes of the law. Its model is the market exchange: here, two subjects meet, their relation is free of all the lumber of veneration of the Master, of the Master's patronage and care for his subjects; they meet as two persons whose activity is thoroughly determined by their egoistic interest, every one of them proceeds as a good utilitarian; the other person is for him wholly delivered of all mystical aura; all he sees in his partner is another subject who follows his interest and interests him only in so far as he possesses something - a commodity - that could satisfy some of his needs."
    - paragraph [ref=e283]: "The two forms of fetishism are thus incompatible: in societies in which commodity fetishism reigns, the 'relations between men' are totally defetishized, while in societies in which there is fetishism in 'relations between men' - in pre-capitalist societies - commodity fetishism is not yet developed, because it is 'natural' production, not production for the market, which predominates."
    - paragraph [ref=e284]:
      - text: "This fetishism in relations between men has to be called by its proper name: what we have here are, as Marx points out, 'relations of domination and servitude' - that is to say, precisely the relation of Lordship and Bondage in a Hegelian sense;"
      - superscript [ref=e286]:
        - link "17" [ref=e287]:
          - /url: "#fn-ch1-17"
      - text: "and it is as if the 17 'Lordship' and 'bondage' are the terms used in the translation we refer to (Hegel, Plzenomenolo8Yo/Spirit); following Kojeve, Lacan uses 'mahre' and 'esclave', which are then translated as 'master' and 'slave'. retreat of the Master in capitalism was only a displacement: as if the defetishization in the 'relations between men' was paid for by the emergence of fetishism in the 'relations between things' - by commodity fetishism. The place of fetishism has just shifted from inter-subjective relations to relations 'between things': the crucial social relations, those of production, are no longer immediately transparent in the form of the interpersonal relations of domination and servitude (of the Lord and his serfs, and so on); they disguise themselves - to use Marx's accurate formula - 'under the shape of social relations between things, between the products of labour'."
    - paragraph [ref=e288]: This is why one has to look for the discovery of the symptom in the way Marx conceived the passage from feudalism to capitalism.
    - paragraph [ref=e289]:
      - text: "With the establishment of bourgeois society, the relations of domination and servitude are repressed: formally, we are apparently concerned with free subjects whose interpersonal relations are discharged of all fetishism; the repressed truth - that of the persistence of domination and servitude emerges in a symptom which subverts the ideological appearance of equality, freedom, and so on. This symptom, the point of emergence of the truth about social relations, is precisely the 'social relations between things' - in contrast to feudal society, where no matter what we may think of the parts played by the different classes of people themselves in this society, the social relations between individuals in the performance of their labour appear at all events as their own mutual personal relations, and are not disguised under the shape of social relations between things, between the products of labour."
      - superscript [ref=e291]:
        - link "18" [ref=e292]:
          - /url: "#fn-ch1-18"
      - text: "'Instead of appearing at all events as their own mutual relations, the social relations between individuals are disguised under the shape of social relations between things' - here we have a precise definition of the hysterical symptom, of the 'hysteria of conversion' proper to capitalism."
    - heading "Totalitarian Laughter" [level=3] [ref=e293]
    - paragraph [ref=e294]: "Here Marx is more subversive than the majority of his contemporary critics who discard the dialectics of commodity fetishism as outdated: this dialectics can still help us to grasp the phenomenon of so-called 'totalitarianism'. Let us take as our starting point Umberto Eco's Name f! the Rose, precisely because there is something wrong with this book. This criticism does not apply only to its ideology, which might be called - on the model of spaghetti Westerns - spaghetti structuralism: a kind of simplified, mass-culture version of structuralist and post-structuralist ideas (there is no final reality, we all live in a world of signs referring to other signs...). What should bother us about this book is its basic underlying thesis: the source of totalitarianism is a dogmatic attachment to the official word: the lack of laughter, of ironic detachment. An excessive commitment to Good may in itselfhecome the greatest Evil: real Evil is any kind offanatical dogmatism, especially that exerted in the name of the supreme Good. This thesis is already part of the enlightened version of religious belief itself: if we become too obsessed with the Good and with a corresponding hate for the secular, our obsession with Good may itself turn into a force of Evil, a form of destructive hatred for all that fails to correspond to our idea of Good. The real Evil is the supposedly innocent gaze which perceives in the world nothing but Evil, as in The Tum cifthe Screw by Henry James, in which the real Evil is, of course, the gaze of the storyteller (the young governess) herself... First, this idea of an obsession with (a fanatical devotion to) Good turning into Evil masks the inverse experience, which is much more disquieting: how an obsessive, fanatical attachment to Evil may in itself acquire the status of an ethical position, of a position which is not guided by our egoistical interests. Consider only Mozart's Don Giovanni at the end of the opera, when he is confronted with the following choice: ifhe confesses his sins, he can still achieve salvation; if he persists, he will be damned for ever. From the viewpoint of the pleasure principle, the proper thing to do would be to renounce his past, but he does not, he persists in his Evil, although he knows that by persisting he will be damned for ever. Paradoxically, with his final choice of Evil, he acquires the status of an ethical hero - that is, of someone who is guided by fundamental principles 'beyond the pleasure principle' and not just by the search for pleasure or material gain. What is really disturbing about The Name of tile Rose, however, is the underlying belief in the liberating, anti-totalitarian force oflaughter, of ironic distance. Our thesis here is almost the exact opposite of this under lying premiss of Eco's novel: in contemporary societies, democratic or totalitarian, that cynical distance, laughter, irony, are, so to speak, part of the game. The ruling ideology is not meant to be taken seriously or literally. Perhaps the greatest danger for totalitarianism is people who take its ideology literally - even in Eco's novel, poor old Jorge, the incarnation of dogmatic belief who does not laugh, is rather a tragic figure: outdated, a kind of living dead, a remnant of the past, certainly not a person representing the existing social and political powers. What conclusion should we draw from this? Should we say that we live in a post-ideological society? Perhaps it would be better, first, to try to specify what we mean by ideology."
    - heading "Cynicism as a Form of Ideology" [level=3] [ref=e295]
    - paragraph [ref=e296]: "The most elementary definition of ideology is probably the well-known phrase from Marx's Capital: 'sie wissen das nicht, aber sie tun es' - 'thry do not know it, but tl are doin,g it'. The very concept of ideology implies a kind ofbasic, constitutive naivete: the misrecognition of its own presuppositions, of its own effective conditions, a distance, a divergence between so-called social reality and our distorted representation, our false consciousness of it. That is why such a 'naive consciousness' can be submitted to a critical-ideological procedure. The aim of this procedure is to lead the naive ideological consciousness to a point at which it can recognize its own effective conditions, the social reality that it is distorting, and through this very act dissolve itself In the more sophisticated versions of the critics of ideology - that developed by the Frankfurt School, for example - it is not just a question of seeing things (that is, social reality] as they 'really are', of throwing away the distorting spectacles of ideology; the main point is to see how the reality itself cannot reproduce itself without this so-called ideological mystification. The mask is not simply hiding the real state of things; the ideological distortion is written into its very essence. We find, then, the paradox of a being which can reproduce itself only in so far as it is misrecognized and overlooked: the moment we see it 'as it really is', this being dissolves itself into nothingness or, more precisely, it changes into another kind of reality. That is why we must avoid the simple metaphors of dernasking, of throwing away the veils which are supposed to hide the naked reality. We can see why Lacan, in his seminar on The Ethic of Psychoanalysis, distances himself from the liberating gesture of saying finally that 'the emperor has no clothes'."
    - paragraph [ref=e297]:
      - text: "The point is, as Lacan puts it, that the emperor is naked only beneath his clothes, so if there is an unmasking gesture of psychoanalysis, it is closer to Alphonse Allais's well-known joke, quoted by Lacan: somebody points at a woman and utters a horrified cry, 'Look at her, what a shame, under her clothes, she is totally naked'."
      - superscript [ref=e299]:
        - link "19" [ref=e300]:
          - /url: "#fn-ch1-19"
    - paragraph [ref=e301]: "But all this is already well known: it is the classic concept of ideology as 'false consciousness', misrecognition of the social reality which is part of this reality itself"
    - paragraph [ref=e302]: "Our question is: Does this concept of ideology as a naive consciousness still apply to today's world? Is it still operating today? In the Critique of Cynical Reason, a great bestseller in Germany, Peter Sloterdijk puts forward the thesis that ideology's dominant mode of functioning is cynical, which renders impossible - or, more precisely, vain - the classic critical-ideological procedure."
    - paragraph [ref=e303]: The cynical subject is quite aware of the distance between the ideological mask and the social reality, but he none the less still insists upon the mask.
    - paragraph [ref=e304]: "The formula, as proposed by Sloterdijk, would then be: 'they know very well what they are doing, but still, they are doing it'. Cynical reason is no longer naive, but is a paradox of an enlightened false consciousness: one knows the falsehood very well, one is well aware of a particular interest hidden behind an ideological universality, but still one does not renounce it. We must distinguish this cynical position strictly from what Sloterdijk calls kynicism. Kynicism represents the popular, plebeian rejection of the official culture by means of irony and sarcasm: the classical kynical procedure is to confront the pathetic phrases of the ruling official ideology its solemn, grave tonality - with everyday banality and to hold them up to ridicule, thus exposing behind the sublime noblesse of the ideological phrases the egotistical interests, the violence, the brutal claims to power. This procedure, then, is more pragmatic than argumentative: it subverts the official proposition by confronting it with the situation of its enunciation; it proceeds ad hominem (for example when a politician preaches the duty of patriotic sacrifice, kynicism exposes the personal gain he is making from the sacrifice of others). Cynicism is the answer of the ruling culture to this kynical subversion: it recognizes, it takes into account, the particular interest behind the ideological universality, the distance between the ideological mask and the reality, but it still finds reasons to retain the mask. This cynicism is not a direct position of immorality, it is more like morality itself put in the service of immorality - the model of cynical wisdom is to conceive probity, integrity, as a supreme form of dishonesty, and morals as a supreme form of profligacy, the truth as the most effective form of a lie. This cynicism is therefore a kind of perverted 'negation of the negation' of the official ideology: confronted with illegal enrichment, with robbery, the cynical reaction consists in saying that legal enrichment is a lot more effective and, moreover, protected by the law. As Berrolt Brecht puts it in his Threepenny Opera: 'what is the robbery of a bank compared to the founding of a new bank?' It is clear, therefore, that confronted with such cynical reason, the traditional critique of ideology no longer works. We can no longer subject the ideological text to 'symptomatic reading', confronting it with its blank spots, with what it must repress to organize itself, to preserve its consistency - cynical reason takes this distance into account in advance. Is then the only issue left to us to affirm that, with the reign of cynical reason, we find ourselves in the so-called post-ideological world? Even Adorno came to this conclusion, starting from the premiss that ideology is, strictly speaking, only a system which makes a claim to the truth that is, which is not simply a lie but a lie experienced as truth, a lie which pretends to be taken seriously. Totalitarian ideology no longer has this pretension."
    - paragraph [ref=e305]: "It is no longer meant, even by its authors, to be taken seriously - its status is just that of a means of manipulation, purely external and instrumental; its rule is secured not by its truth-value but by simple extraideological violence and promise of gain. It is here, at this point, that the distinction between!ymptom andfantasy must be introduced in order to show how the idea that we live in a postideological society proceeds a little too quickly: cynical reason, with all its ironic detachment, leaves untouched the fundamental level ofideological fantasy, the level on which ideology structures the social reality itself"
    - heading "Ideological Fantasy" [level=3] [ref=e306]
    - paragraph [ref=e307]: "If we want to grasp this dimension of fantasy, we must return to the Marxian formula 'they do not know it, but they are doing it', and pose ourselves a very simple question: where is the place of ideological illusion, in the 'knowing or in the 'doini in the reality itself?"
    - paragraph [ref=e308]: "At first sight, the answer seems obvious: ideological illusion lies in the 'knowing'. It is a matter of a discordance between what people are effectively doing and what they think they are doing - ideology consists in the very fact that the people 'do not know what they are really doing', that they have a false representation of the social reality to which they belong (the distortion produced, of course, by the same reality). Let us take again the classic Marxian example of so-called commodity fetishism: money is in reality just an embodiment, a condensation, a materialization of a network of social relations - the fact that it functions as a universal equivalent of all commodities is conditioned by its position in the texture of social relations. But to the individuals themselves, this function of money - to be the embodiment of wealth - appears as an immediate, natural property of a thing called 'money', as if money is already in itself, in its immediate material reality, the embodiment of wealth. Here, we have touched upon the classic Marxist motive of'reification': behind the things, the relation between things, we must detect the social relations, the relations between human subjects. But such a reading of the Marxian formula leaves out an illusion, an error, a distortion which is already at work in the social reality itself, at the level of what the individuals are doing, and not only what they think or know they are doing. When individuals use money, they know very well that there is nothing magical about it - that money, in its materiality, is simply an expression of social relations. The everyday spontaneous ideology reduces money to a simple sign giving the individual possessing it a right to a certain part of the social product. So, on an everyday level, the individuals know very well that there are relations between people behind the relations between things."
    - paragraph [ref=e309]:
      - text: "The problem is that in their social activity itself, in what they are doing, they are acting as if money, in its material reality, is the immediate embodiment of wealth as such. They are fetishists in practice, not in theory. What they' do not know', what they misrecognize, is the fact that in their social reality itself, in their social activity - in the act of commodity exchange - they are guided by the fetishistic illusion. To make this clear, let us again take the classic Marxian motive of the speculative inversion of the relationship between the Universal and the Particular. The Universal is just a property of particular objects which really exist, but when we are victims of commodity fetishism it appears as if the concrete content of a commodity (its use-value) is an expression of its abstract universality (its exchange-value) - the abstract Universal, the Value, appears as a real Substance which successively incarnates itself in a series of concrete objects. That is the basic Marxian thesis: it is already the effective world of commodities which behaves like a Hegelian subjectsubstance, like a Universal going through a series of particular embodiments. Marx speaks about 'commodity metaphysics', about the 'religion of everyday life'. The roots of philosophical speculative idealism are in the social reality of the world of commodities; it is this world which behaves 'idealistically' - or, as Marx puts it in the first chapter of the first edition of Capital: This inversion through which what is sensible and concrete counts only as a phenomenal form of what is abstract and universal, contrary to the real state of things where the abstract and the universal count only as a property of the concrete - such an inversion is characteristic of the expression of value, and it is this inversion which, at the same time, makes the understanding of this expression so difficult. If I say: Roman law and German law are both laws, it is something which goes by itself But if, on the contrary, I say: THE Law, this abstract thing, realizes itself in Roman law and in German law, i.e. in these concrete laws, the interconnection becomes mystical."
      - superscript [ref=e311]:
        - link "20" [ref=e312]:
          - /url: "#fn-ch1-20"
      - text: "The question to ask again is: where is the illusion here? We must not forget that the bourgeois individual, in his everyday ideology, is definitely not a speculative Hegelian: he does not conceive the particular contentas resulting from an autonomous movement of the universal Idea. He is, on the contrary, a good Anglo-Saxon nominalist, thinking that the Universal is a property of the Particular - that is, of really existing things. Value in itself does not exist, there are just individual things which, among other properties, have value."
    - paragraph [ref=e313]: "The problem is that in his practice, in his real activity, he acts as if the particular things (the commodities) were just so many embodiments of universal Value. To rephrase Marx: He knows ve!J' well that Roman law and Genan law arejust two kinds oflaw, but in his practice, he acts as (the Law itself, this abstract end!)!, realizes itseffin Roman law and in German law."
    - paragraph [ref=e314]: "So now we have made a decisive step forward; we have established a new way to read the Marxian formula 'they do not know it, but they are doing it': the illusion is not on the side of knowledge, it is already on the side of reality itself, of what the people are doing. What they do not know is that their social reality itself, their activity, is guided by an illusion, by a fetishistic inversion."
    - paragraph [ref=e315]: "What they overlook, what they misrecognize, is not the reality but the illusion which is structuring their reality, their real social activity. They know very well how things really are, but still they are doing it as if they did not know. The illusion is therefore double: it consists in overlooking the illusion which is structuring our real, effective relationship to reality. And this overlooked, unconscious illusion is what may be called the ideolo8ica1fantasy. If our concept of ideology remains the classic one in which the illusion is located in knowledge, then today's society must appear post-ideological: the prevailing ideology is that of cynicism; people no longer believe in ideological truth; they do not take ideological propositions seriously."
    - paragraph [ref=e316]: "The fundamental level of ideology, however, is not that of an illusion masking the real state of things but that of an (unconscious) fantasy structuring our social reality itself And at this level, we are of course far from being a post-ideological society. Cynical distance is just one way - one of many ways - to blind ourselves to the structuring power of ideological fantasy: even if we do not take things seriously, even if we keep an ironical distance, we are still doing them. It is from this standpoint that we can account for the formula of cynical reason proposed by Sloterdijk: 'they know very well what they are doing, but still, they are doing it'."
    - paragraph [ref=e317]: "If the illusion were on the side of knowledge, then the cynical position would really be a post-ideological position, simply a position without illusions: 'they know what they are doing, and they are doing it'. But if the place of the illusion is in the reality of doing itself, then this formula can be read in quite another way: 'they know that, in their activity, they are following an illusion, but still, they are doing it'. For example, they know that their idea of Freedom is masking a particular form of exploitation, but they still continue to follow this idea of Freedom."
    - heading "The Objectivity of Belief" [level=3] [ref=e318]
    - paragraph [ref=e319]: "From this standpoint, it would also be worth rereading the elementary Marxian formulation of so-called commodity fetishism: in a society in which the products of human labour acquire the form of commodities, the crucial relations between people take on the form of relations between things, between commodities - instead of immediate relations between people, we have social relations between things. In the 1960s and 1970s, this whole problem was discredited throughAlthusserian anti-humanism. The principal reproach of the Althusserians was that the Marxian theory of commodity fetishism is based on a naive, ideological, epistemologically unfounded opposition between persons (human subjects) and things. But a Lacanian reading can give this formulation a new, unexpected twist: the subversive power of Marx's approach lies precisely in the way he uses the opposition of persons and things. In feudalism, as we have seen, relations between people are mystified, mediated through a web of ideological beliefs and superstitions. They are the relations between the master and his servant, whereby the master exerts his charismatic power of fascination, and so forth. Although in capitalism the subjects are emancipated, perceiving themselves as free from medieval religious superstitions, when they deal with one another they do so as rational utilitarians, guided only by their selfish interests. The point of Marx' s analysis, however, is that the things (commodities) themselves believe in their place, instead of the subjects: it is as if all their beliefs, super stitions and metaphysical mystifications, supposedly surmounted by the rational, utilitarian personality, are embodied in the 'social relations between things'. They no longer believe, but the things themselves believe for them. This seems also to be a basic Lacanian proposition, contrary to the usual thesis that a beliefis something interior and knowledge something exterior (in the sense that it can be verified through an external procedure). Rather, it is belief which is radically exterior, embodied in the practical, effective prayer on a paper, put the rolled paper into a wheel, and turn it automatically, without thinking (or, if you want to proceed according to the Hegelian 'cunning of reason', you attach it to a windmill, so that it is moved around by the wind). In this way, the wheel itself is praying for me, instead of me - or, more precisely, I myself am praying through the medium of the wheel."
    - paragraph [ref=e320]: The beauty of it all is that in my psychological inferiority I can think about whatever I want, I can yield to the most dirty and obscene fantasies, and it does not matter because - to use a good old Stalinist expression - whatever I am thinking, objectively I am praying.
    - paragraph [ref=e321]:
      - text: "This is how we should grasp the fundamental Lacanian proposition that psychoanalysis is not a psychology: the most intimate beliefs, even the most intimate emotions such as compassion, crying, sorrow, laughter, can be transferred, delegated to others without losing their sincerity. In his seminar on The Ethic o/psychoanalysis, Lacan speaks of the role of the Chorus in classical tragedy: we, the spectators, came to the theatre worried, full of everyday problems, unable to adj ust without reserve to the problems of the play, that is to feel the required fears and compassions - but no problem, there is the Chorus, who feels the sorrow and the compassion instead of us - or, more precisely, we feel the required emotions through the medium of the Chorus: 'You are then relieved of all worries, even if you do not feel anything, the Chorus will do so in your place'."
      - superscript [ref=e323]:
        - link "21" [ref=e324]:
          - /url: "#fn-ch1-21"
    - paragraph [ref=e325]: Even if we, the spectators, are just drowsily watching the show, objectively - to use again the old Stalinist expression - we are doing our duty of compassion for the heroes.
    - paragraph [ref=e326]: "In so-called primitive societies we find the same phenomenon in the form of'weepers', women hired to cry instead of us: so, through the medium of the other, we accomplish our duty of mourning, while we can spend our time on more profitable exploits disputing the division of the inheritance of the deceased, for example."
    - paragraph [ref=e327]: "But to avoid the impression that this exteriorization, this transference of our most intimate feeling, is simply a characteristic of the so-called primitive stages of development, let us remind ourselves of a phenomenon quite usual in popular television shows or serials: 'canned laughter'. After some supposedly funny or witty remark, you can hear the laughter and applause included in the soundtrack of the show itself- here we have the exact counterpart of the chorus in classical tragedy; it is here that we have to look for 'living Antiquity'. That is to say, why this laughter? The first possible answer - that it serves to remind us when to laugh - is interesting enough, because it implies the paradox that laughter is a matter of duty and not of some spontaneous feeling; but this answer is not sufficient because we do not usually laugh. The only correct answer would be that the other - embodied in the television set - is relieving us even of our duty to laugh - is laughing instead of us. So even if, tired from a hard day's stupid work, all evening we did nothing but gaze drowsily into the television screen, we can say afterwards that objectively, through the medium of the other,· we had a really good time. If we do not take into account this objective status of belief, we might finish like the fool from a well-known joke who thought he was a grain of corn. After some time in a mental hospital, he was finally cured: now he knew that he was not a grain but a man. So they let him out; but soon afterwards he came running back, saying: 'I met a hen and I was afraid she would eat me.' The doctors tried to calm him: 'But what are you afraid of? Now you know that you are not a grain but a man.' The fool answered: 'Yes, of course, [ know that, but does the hen know that I am no longer a grain?'"
    - heading "'Law is Law'" [level=3] [ref=e328]
    - paragraph [ref=e329]: "The lesson to be drawn from this concerning the social field is above all that belief, far from being an 'intimate', purely mental state, is always materializedin our effective social activity: belief supports the fantasy which regulates social reality. Let us take the case of Kafka: it is usually said that in the 'irrational' universe of his novels, Kafka has given an 'exaggerated', 'fantastic', 'subjectively distorted' expression to modern bureaucracy and the fate of the individual within it. In saying this we overlook the crucial fact that it is this very 'exaggeration' which articulates the fantasy regulating the libidinal functioning of the 'effective', 'real' bureaucracy itself. The so-called 'Kafka's universe' is not a 'fantasy-image of social reality' but, on the contrary, the mise-en-scene of the fantasy which is at work in the midst ofsocial reali9' itself. we all know very well that bureaucracy is not all-powerful, but our 'effective' conduct in the presence of bureaucratic machinery is already regulated by a beliefin its almightiness..."
    - paragraph [ref=e330]: In contrast to the usual 'criticism of ideology' trying to deduce the ideological form of a determinate society from the conjunction of its effective social relations, the analytical approach aims above all at the ideological fantasy efficient in social reality itself
    - paragraph [ref=e331]: What we call 'social reality' is in the last resort an ethical construction; it is supported by a certain as if(we act as ffwe believe in the almightiness of bureaucracy, as ffthe President incarnates the will of the People, as if the Party expresses the objective interest of the working class...).
    - paragraph [ref=e332]: "As soon as the belief(which, let us remind ourselves again, is definitely not to be conceived at a 'psychological' level: it is embodied, materialized, in the effective functioning of the social field) is lost, the very texture of the social field disintegrates."
    - paragraph [ref=e333]: This was already articulated by Pascal, one ofAlthusser's principal points of reference, in his attempt to develop the concept of'Ideological State Apparatuses'.
    - paragraph [ref=e334]:
      - text: "According to Pascal, the interiority of our reasoning is determined by the external, nonsensical 'machine' - automatism of the signifier, of the symbolic network in which the subjects are caught: For we must make no mistake about ourselves: we are as much automaton as mind... proofs only convince the mind; habit provides the strongest proofs and those that are most believed. It inclines the automaton, which leads the mind unconsciously along with it."
      - superscript [ref=e336]:
        - link "22" [ref=e337]:
          - /url: "#fn-ch1-22"
    - paragraph [ref=e338]: "Here Pascal produces the very Lacanian definition of the unconscious: 'the automaton (i.e. the dead, senseless letter), which leads the mind unconsciously [sans Ie savoiż with it'."
    - paragraph [ref=e339]: "It follows, from this constitutively senseless character of the Law, that we must obey it not because it is just, good or even beneficial, but simply because it is the law - this tautology articulates the vicious circle of its authority, the fact that the last foundation of the Law's authority lies in its process of enunciation:"
    - paragraph [ref=e340]:
      - text: Custom is the whole of equity for the sole reason that it is accepted. That is the mystic basis of its authority. Anyone who tries to bring it back to its first principle destroys it.
      - superscript [ref=e342]:
        - link "23" [ref=e343]:
          - /url: "#fn-ch1-23"
    - paragraph [ref=e344]: "The only real obedience, then, is an 'external' one: obedience out of conviction is not real obedience because it is already 'mediated' through our subjectivity - that is, we are not really obeying the authority but simply following our judgement, which tells us that the authority deserves to be obeyed in so far as it is good, wise, beneficent..."
    - paragraph [ref=e345]: Even more than for our relation to 'external' social authority, this inversion applies to our obedience to the internal authority of belief it was Kierkegaard who wrote that to believe in Christ because we consider him wise and good is a dreadful blasphemy - it is, on the contrary, only the act of belief itself which can give us an insight into his goodness and wisdom.
    - paragraph [ref=e346]: Certainly we must search for rational reasons which can substantiate our belief, our obedience to the religious command, but the crucial religious experience is that these reasons reveal themselves only to those who already believe - we find reasons attesting our belief because we already believe; we do not believe because we have found sufficient good reasons to believe.
    - paragraph [ref=e347]: "'External' obedience to the Law is thus not submission to external pressure, to so-called non-ideological 'brute force', but obedience to the Command in so far as it is 'incomprehensible', not understood; in so far as it retains a 'traumatic', 'irrational' character: far from hiding its full authority, this traumatic, non-integrated character of the Law is a positive condition ofit."
    - paragraph [ref=e348]: "This is the fundamental feature of the psychoanalytic concept of the supere80: an injunction which is experienced as traumatic, 'senseless' - that is, which ·cannot be integrated into the symbolic universe of the subject."
    - paragraph [ref=e349]: "But for the Law to function 'normally', this traumatic fact that 'custom is the whole of equity for the sole reason that it is accepted' - the dependence of the Law on its process of enunciation or, to use a concept developed by Laclau and Mouffe, its radically contingent character - must be repressed into the unconscious, through the ideological, imaginary experience of the 'meaning' of the Law, of its foundation in Justice, Truth (or, in a more modern way, functionality):"
    - paragraph [ref=e350]:
      - text: It would therefore be a good thing for us to obey laws and customs because they are laws... But people are not amenable to this doctrine, and thus, believing that truth can be found and resides in laws and customs, they believe them and take their antiquity as a proof of their truth (and not just of their authority, without truth).
      - superscript [ref=e352]:
        - link "24" [ref=e353]:
          - /url: "#fn-ch1-24"
    - paragraph [ref=e354]:
      - text: "It is highly significant that we find exactly the same formulation in Kafka's Trial, at the end of the conversation between K. and the priest: 'I do not agree with that point of view,' said K., shaking his head, 'for if one accepts it, one must accept as true everything the door-keeper says. But you yourselfhave sufficiently proved how impossible it is to do that.' 'No,' said the priest, 'it is not necessary to accept everything as true, one must only accept it as necessary.' 'A melancholy conclusion,' said K. 'It turns lying into a universal principle."
      - superscript [ref=e356]:
        - link "25" [ref=e357]:
          - /url: "#fn-ch1-25"
    - paragraph [ref=e358]: What is 'repressed' then, is not some obscure origin of the Law but the very fact that the Law is not to be accepted as true, only as necessary - the fact that its authority is without truth.
    - paragraph [ref=e359]: "The necessary structural illusion which drives people to believe that truth can be found in laws describes precisely the mechanism of transference: transference is this supposition of a Truth, of a Meaning behind the stupid, traumatic, inconsistent fact of the Law."
    - paragraph [ref=e360]: "In other words, 'transference' names the vicious circle of belief: the reasons why we should believe are persuasive only to those who already believe."
    - paragraph [ref=e361]:
      - text: "The crucial text of Pascal here is the famous Fragment 233 on the necessity of the wager; the first, largest part of it demonstrates at length why it is rationally sensible to 'bet on God', but this argument is invalidated by the following remark of Pascal's imaginary partner in dialogue: my hands are tied and my lips are sealed; I am being forced to wager and I am not free; I am being held fast and I am so made that I cannot believe. What do you want me to do then? - 'That is true, but at least get it into your head that, if you are unable to believe, it is because of your passions, since reason impels you to believe and yet you cannot do so. Concentrate then not on convincing yourselfby multiplying proofs of God' s existence but by diminishing your passions. You want to find faith and you do not know the road. You want to be cured of unbelief and you ask for the remedy: learn from those who were once bound like you and who now wager all they have. These are people who know the road you wish to follow, who have been cured of the affliction of which you wish to be cured: follow the way by which they began. They behaved just as if they did believe, taking holy water, having masses said, and so on. That will make you believe quite naturally, and will make you more docile. 'Now what harm will come to you from choosing this course? You will be faithful, honest, humble, grateful, full of good works, a sincere, true friend... It is true you will not enjoy noxious pleasures, glory and good living, but will you not have others? 'I tell you that you will gain even in this life, and that at every step you take along this road you will see that your gain is so certain and your risk so negligible that in the end you will realize, that you have wagered on something certain and infinite for which you have paid nothing."
      - superscript [ref=e363]:
        - link "26" [ref=e364]:
          - /url: "#fn-ch1-26"
      - text: "Pascal's final answer, then, is: leave rational argumentation and submit yourself simply to ideological ritual, stupefy yourself by repeating the meaningless gestures, act as fyou already believe, and the belief will come by itself"
    - paragraph [ref=e365]: "Far from being limited to Catholicism, such a procedure for obtaining ideological conversion has universal application, which is why, in a certain epoch, it was very popular among French Communists. The Marxist version of the theme of, wager' tuns as follows: the bourgeois intellectual has his hands tied and his lips sealed. Apparently he is free, bound only to the argument of his reason, but in reality he is permeated by bourgeois prejudices. These prejudices do not let him go, so he cannot believe in the sense of history, in the historical mission of the working class. So what can he do? The answer: first, he should at least recognize his impotence, his inca pacity to believe in the sense of history; even if his reason leans towards the truth, the passions and prejudices produced by his class position prevent him from accepting it. So he should not exert himself with proving the truth of the historical mission of the working class; rather, he should learn to subdue his petty-bourgeois passions and prejudices. He should take lessons from those who were once as impotent as he is now but are ready to risk all for the revolutionary Cause. He should imitate the way they began: they behaved just as if they did believe in the mission of the working class, they became active in the Party, they collected money to help strikers, propagate the workers' movement, and so on. This stupefied them and made them believe quite naturally. And really, what harm has come to them through choosing this course? They became faithful, full of good works, sincere and noble... It is true that they had to renounce a few noxious petty-bourgeois pleasures, their egocentrist intellectualist trifling, their false sense of individual freedom, but on the other hand - and notwithstanding the factual truth of their belief - they gained a lot: they live a meaningful life, free of doubts and uncertainty; all their everyday What distinguishes this Pascalian 'custom' from insipid behaviourist wisdom (,the content of your belief is conditioned by your factual behav iour1 is the paradoxical status of a beliefbefore beli by following a custom, the subject believes without knowing it, so that the final conversion is merely a formal act by means of which we recognize what we have already believed."
    - paragraph [ref=e366]: "In other words, what the behaviourist reading of Pascalian 'custom' misses is the crucial fact that the external custom is always a material support for the subject's unconscious. The main achievement of Marek Kaniewska's film Another Countty is to designate, in a sensitive and delicate way, this precarious status of 'believing without knowing it' - precisely apropos of the conversion to Communism. Another Countty is a film a clef about the relationship between two Cambridge students, the Communist Judd (real model: John Cornford, idol of the Oxford student left, who died in 1936 in Spain) and the rich homosexual Guy Bennett, who later becomes a Russian spy and tells the story in retrospect to an English journalist who visits him in his Moscow exilω (real model: Guy Burgess, of course). There is no sexual relationship between them; Judd is the only one who is not sensitive to Guy's charm ('the exception to the Bennett rule', as Guy puts it): precisely for that reason, he is the point of Guy's transferential identification. The action occurs in the 'public school' environment of the thirties: the patriotic empty talk, the terror of the student-heads (,gods') over ordi nary students; yet in all this terror there is something non-binding, not quite serious; it has the ring of an amusing travesty concealing a universe in which enjoyment actually reigns in all its obscenity, above all in the form of a ramified network of homosexual relations - the real terror is, rather, the unbearable pressure of enjoyment. It is for this reason that Oxford and Cambridge in the 1930S offered such a rich field for the KGB: not only because of the 'guilt complex' of rich students doing so well in the midst of the economic and social crisis, but above all because of this stuffy atmosphere of enjoyment, the very inertia of which creates an unbearable tension, a tension which could be dissolved only by a 'totali who knew how to occupy the place of this appeal; in England, at least among the elite students, the KGB hunters were best versed in it."
    - paragraph [ref=e367]: "The film is worth mentioning for the way it depicts Guy's conversion: its delicacy is attested by the very fact that it does not depict it, that it only lays all the elements for it. That is to say, the flashback to the 1930S which occupies the main part of the film stops at the precise point at which Guy is already converted, although he does not yet know it - the film is delicate enough to leave out the formal act of conversion; it suspends the flashback in a situation homologous to one in which somebody is already in love but is not yet aware of it, and for this reason gives expression to his love in the form of an excessively cynical attitude and defensive agressivity towards the person with whom he is in love. What is, then, looking doser, the denouement of the film? Two reactions to this situation of stuffy enjoyment are opposed: Judd's renunciation, his openly declared Communism (it is for this reason that he couldn't be a KGB agent), and on the other side Guy as a representative of the extreme, putrefied hedonism whose game, however, starts to £all apart (the 'gods' have humiliated him by a ritual beating because his personal enemy, a patriotic career seeker, has unmasked his homosexual relationship with a younger student: in this way, Guy lost a promised opportunity to become a 'god' himself the following year). At this point, Guy becomes aware of the fact that the key to the dissolution of his untenable situation lies in his transferential relationship to Judd: this is nicely indicated by two details. First, he reproaches Judd for not himselfbeing liberated from bourgeois prejudices - in spite of all his talk about equality and fraternity, he still thinks that 'some persons are better than others because of the way they make love'; in short, he catches the subject on whom he has a transference in his inconsistency, in his lack. Second, he reveals to the naive Judd the very mechanism of transference: Judd thinks that his belief in the truth of Communism results from his thorough study of history and the texts of Marx, to which Guy replies, 'You are not a Communist because you - that is to say, Judd understands Marx because he presupposes in advance that Marx is the bearer ofknowledge enabling access to the truth ofhistory, like the Christian believer who does not believe in Christ because he has been convinced by theological arguments but, on the contrary, is susceptible to theological arguments because he is already illuminated by the grace of belie£ In a first, naive approach it could appear that because of these two features Guy is on the brink ofliberating himself from his transference on Judd (he catches Judd in his inconsistency, and even unmasks the very mechanism of transference to boot), but the truth is none the less the opposite: these two features only confirm how 'those in the know are lost' [/cr non-dupcr eTTentJ, as Lacan would say. Precisely as one 'in the know', Guy is caught in transference - both reproaches of Judd receive their mean ing only against the background that his relationship with Judd is already a transferential one (as with the analysand who finds such pleasure in discovering small weaknesses and mistakes in the analyst precisely because the transference is already at work). The state in which Guy finds himselfimmediately before his conversion, this state of extreme tension, is best rendered by his own answer to Judd's reproach that he is himself to blame for the mess he is in (ifhe had only proceeded with a little discretion and hidden his homosexuality instead of flaunting it in a provocative and defiant way, there would have been no unpleasant disclosure to ruin him): 'What better cover for someone like me than total indiscretion?' This is, of course, the very Lacanian defi nition of deception in its specifically human dimension, where we deceive the Other by means of the truth itself: in a universe in which all are looking for the true face beneath the mask, the best way to lead them astray is to wear the mask of truth itself But it is impossible to maintain the coincidence of mask and truth: far from gaining us a kind of'immediate contact with our fellow-men', this coincidence renders the situation unbearable; all communication is impossible because we are totally isolated through the very disclosure - the sine qua non of successful communication"
    - paragraph [ref=e368]: "The only door open is thus escape into belief in the transcendent 'another country' (Communism) and into conspiracy (becoming a KGB agent), which introduces a radical gap between the mask and the true face. So when, in the last scene of the flashback, Judd and Guy traverse the college courtyard, Guy is already a believer: his fate is sealed, even if he does not yet know it. His introductory words, 'Wouldn't it be wonderful if Communism were really true?', reveal his belief, which is for the time being still delegated, transferred on to another - and so we can immediately pass on to the Moscow exile decades later where the only leftover of enjoy ment binding the old and crippled Guy to his country is the memory of cricket."
    - heading "Kafka, Critic of Althusser" [level=3] [ref=e369]
    - paragraph [ref=e370]: "The externality of the symbolic machine (,automaton') is therefore not simply external: it is at the same time the place where the fate of our internal, most 'sincere' and 'intimate' beliefs is in advance staged and decided."
    - paragraph [ref=e371]: When we subject ourselves to the machine of a religious ritual, we already believe without knowing it; our belief is already materialized in the exter nal ritual; in other words, we already believe unconsciously, because it is from this external character of the symbolic machine that we can explain the status of the unconscious as radically external - that of a dead letter.
    - paragraph [ref=e372]: Belief is an affair of obedience to the dead, uncomprehended letter.
    - paragraph [ref=e373]:
      - text: It is this short-circuit between the intimate belief and the external 'machine' which is the most subversive kernel of Pascalian theology. of course, in his theory ofIdeological State Apparatuses, Althusser gave an elaborated, contemporary version of this Pascalian 'machine';
      - superscript [ref=e375]:
        - link "27" [ref=e376]:
          - /url: "#fn-ch1-27"
      - text: "but the weak point ofhis theory is that he or his school never succeeded in thinking out the link between Ideological State Apparatuses and ideological interpellation: how does the Ideological State Apparatus (the Pascalian 'machine', the signifying automatism) 'internalize' itself; how does it produce the effect of ideological belief in a Cause and the interconnecting effect of subjectivarion, of recognition of one's ideological position? The answer to this is, as we have seen, that this external 'machine' of State Apparatuses exercises its force only in so far as it is experienced, in the unconscious economy of the subject, as a traumatic, senseless injunction. Althusser speaks only of the process of ideological interpellation through which the symbolic machine ofideology is 'internalized' into the ideological experience of Meaning and Truth: but we can learn from pascal that this 'internalization', by structural necessity, never fully succeeds, that there is always a residue, a leftover, a stain of traumatic irrationality and senselessness sticking to it, and that this leftover, far from hindering the full submission of the subject to the ideological command, is the very condition of it: it is precisely this non-integrated surplus of senseless traumatism which confers on the Law its unconditional authority: in other words, which - in so far as it escapes ideological sense - sustains what we might call the ideological jouis-sense, enjoyment-in-sense (enjoy-meant), proper to ideology."
    - paragraph [ref=e377]: "And again, it was no accident that we mentioned the name ofKafka: concerning this ideological jouis-sense we can say that Kafka develops a kind of criticism of Althusser avant la lettre, in letting us see that which is constitutive of the gap between 'machine' and its 'internalization'. Is not Kafka's 'irrational' bureaucracy, this blind, gigantic, nonsensical apparatus, precisely the Ideological State Apparatus with which a subject is confronted before any identification, any recognition - any subjectivation takes place? What, then, can we learn from Kafka?"
    - paragraph [ref=e378]: "In a first approach, the starting point in Kafka's novels is that of an interpellation: the Kafkaesque subject is interpellated by a mysterious bureaucratic entity (Law, Castle). But this interpellation has a somewhat strange look: it is, so to say, an interpellation without identification/ subjectivation; it does not offer us a Cause with which to identify - the Kafkaesque subject is the subject desperately seeking a trait with which to identify, he does not understand the meaning of the call of the Other."
    - paragraph [ref=e379]: "This is the dimension overlooked in the Althusserian account of recognition/misrecognition, the subject ($) is trapped by the Other through a paradoxical object-cause of desire in the midst of it (a), through this secret supposed to be hidden in the Other: $Oa - the Lacanian formula of fantasy."
    - paragraph [ref=e380]: "What does it mean, more precisely, to say that ideological fantasy structures reality itself? Let us explain by starting from the fundamental Lacanian thesis that in the opposition between dream and reality, fantasy is on the side of reality: it is, as Lacan once said, the support that gives consistency to what we call 'reality'. In his seminar on the Four Fundamental Concepts of Psycho-Analysis, Lacan develops this through an interpretation of the well-known dream about the 'burning child':"
    - paragraph [ref=e381]:
      - text: "A father had been watching beside his child's sick-bed for days and nights on end. After the child had died, he went into the next room to lie down, but left the door open so that he could see from his bedroom into the room in which his child's body was laid out, with tall candles standing round it. An old man had been engaged to keep watch over it, and sat beside the body murmuring prayers. After a few hours' sleep, the father had a dream that his child was standing beside his bed, caught him by the arm and whispered to him reproachfully: 'Father, don't you see I'm burning?' He woke up, noticed a bright glare of light from the next room, hurried into it and found the old watchman had dropped off to sleep and that the wrappings and one of the arms of his beloved child's dead body had been burned by a lighted candle that had fallen on them."
      - superscript [ref=e383]:
        - link "28" [ref=e384]:
          - /url: "#fn-ch1-28"
    - paragraph [ref=e385]: "The usual interpretation of this dream is based on a thesis that one of the functions of the dream is to enable the dreamer to prolong his sleep. The sleeper is suddenly exposed to an exterior irritation, a stimulus coming from reality (the ringing of an alarm clock, knocking on the door or, in this case, the smell of smoke), and to prolong his sleep he quickly, on the spot, constructs a dream: a little scene, a small story, which includes this irritating element. However, the external irritation soon becomes too strong and the subject is awakened."
    - paragraph [ref=e386]: "The Lacanian reading is directly opposed to this. The subject does not awake himself when the external irritation becomes too strong; the logic of his awakening is quite different. First he constructs a dream, a story which enables him to prolong his sleep, to avoid awakening into reality. But the thing that he encounters in the dream, the reality of his desire, the Lacanian Real - in our case, the reality of the child's reproach to his father, 'Can't you see that I am burning?', implying the father's fundamental guilt - is more terrifying than so-called external reality itself and that is why he awakens: to escape the Real of his desire, which announces itself in the terrifying dream. He escapes into so-called reality to be able to continue to sleep, to maintain his blindness, to elude awakening into the Real of his desire."
    - paragraph [ref=e387]:
      - text: "We can rephrase here the old 'hippy' motto of the 1960s: reality is for those who cannot support the dream. 'Reality' is a fantasy-construction which enables us to mask the Real of our desire."
      - superscript [ref=e389]:
        - link "29" [ref=e390]:
          - /url: "#fn-ch1-29"
    - paragraph [ref=e391]: "It is exactly the same with ideology. Ideology is not a dreamlike illusion that we build to escape insupportable reality; in its basic dimension it is a fantasy-construction which serves as a support for our 'reality' itself: an 'illusion' which structures our effective, real social relations and thereby masks some insupportable, real, impossible kernel (conceptualized by Emesto Laclau and Chantal Mouffe as 'antagonism': a traumatic social division which cannot be symbolized). The function of ideology is not to offer us a point of escape from our reality but to offer us the social reality itself as an escape from some traumatic, real kernel."
    - paragraph [ref=e392]:
      - text: To explain this logic, let us refer again to The Four Fundamental Concepts of Psycho-Analysis.
      - superscript [ref=e394]:
        - link "30" [ref=e395]:
          - /url: "#fn-ch1-30"
    - paragraph [ref=e396]: "Here Lacan mentions the well-known paradox of Zhuang Zi, who dreamt of being a butterfly, and after his awakening posed himself a question: how does he know that he is not now a butterfly dreaming of being Zhuang Zi? Lacan's commentary is that this question is justified, for two reasons. First, it proves that Zhuang Zi was not a fool. The Lacanian definition of a fool is somebody who believes in his immediate identity with himself; somebody who is not capable of a dialectically mediated distance towards himself, like a king who thinks he is a king, who takes his being-a-king as his immediate property and not as a symbolic mandate imposed on him by a network of intersubjective relations of which he is a part (example of a king who was a fool thinking he was a king: Ludwig II of Bavaria, Wagner's patron). However, this is not all; if it were, the subject could be reduced to a void, to an empty place in which his or her whole content is procured by others, by the symbolic network of intersubjective relations: I am 'in myself a nothingness, the positive content of myself is what I am for others."
    - paragraph [ref=e397]: "In other words, if this were all, Lacan's last word would be a radical alienation of the subject. His content, 'what he is', would be determined by an exterior signifying network offering him the points of symbolic identification, conferring on him certain symbolic mandates. But Lacan's basic thesis, at least in his last works, is that there is a possi bility for the subject to obtain some contents, some kind of positive consistency, also outside the big Other, the alienating symbolic network. This other possibility is that offered by fantasy: equating the subject to an object of fantasy. When he was thinking that he was a butterfly dreaming of being Zhuang Zi, Zhuang Zi was in a way correct. The butterfly was the object which constituted the frame, the backbone, of his fantasy identity (the relationship Zhuang Zi-butterfly can be written $Oa). In the symbolic reality he was Zhuang Zi, but in the Real of his desire he was a butterfly. Being a butterfly was the whole consistency of his positive being outside the symbolic network. Perhaps it is not quite by accident that we find a kind of echo of this in Terry Gilliam's film Brazil, which depicts, in a disgustingly funny way, a totalitarian society: the hero finds"
    - paragraph [ref=e398]: "At first sight, what we have here is a simple symmetrical inversion of the so-called normal, ordinary perspective. In our everyday understanding, Zhuang Zi is the 'real' person dreaming of being a butterfly, and here we have something which is 'really' a butterfly dreaming of being Zhuang Zi. But as Lacan points out, this symmetrical relationship is an illusion: when Zhuang Zi is awakened, he can think to himself that he is Zhuang Zi who dreamed of being a butterfly, but in his dream, when he is a butterfly, he cannot ask himself if when awoken, when he thought he was Zhuang Zi, he was not this butterfly that is now dreaming ofbeing Zhuang Zi. The question, the dialectical split, is possible only when we are awake."
    - paragraph [ref=e399]: "In other words, the illusion cannot be symmetrical, it cannot run both ways, because if it did we would find ourselves in a nonsensical situation described - again - by Alphonse Allais: Raoul and Marguerite, two lovers, arrange to meet at a masked ball; there they skip into a hidden corner, embrace and fondle each other. Finally, they both put down their masks, and - surprise - Raoul finds that he is embracing the wrong woman, that she is not Marguerite, and Marguerite also finds that the other person is not Raoul but some unknown stranger..."
    - heading "Fantasy as a Support of Reality" [level=3] [ref=e400]
    - paragraph [ref=e401]: "This problem must be approached from the Lacanian thesis that it is only in the dream that we come close to the real awakening - that is, to the Real of our desire. When Lacan says that the last support of what we call 'reality' is a fantasy, this is definitely not to be understood in the sense of 'life is just a dream', 'what we call reality is just an illusion', and so forth. We find such a theme in many science-fiction stories: reality as a generalized dream or illusion. The story is usually told from the perspective of a hero who gradually makes the horrifying discovery that all the people around him are not really human beings but some kind of automatons, robots, who only look and act like real human beings; the final point of these stories is of course the hero's discovery that he himself is also such impossible: we find the same paradox in a well-known drawing by Escher of two hands drawing each other."
    - paragraph [ref=e402]: The Lacanian thesis is, on the contrary, that there is always a hard kernel, a leftover which persists and cannot be reduced to a universal play of illusory mirroring. The difference between Lacan and 'naive realism' is that for Lacan, the only point at which we approach this hard kernel of the Real is indeed the dream. When we awaken into reality after a dream, we usually say to ourselves 'it was just a dream', thereby blinding ourselves to the fact that in our everyday, wakening reality we are nothing but a consciousness of this dream. It was only in the dream that we approached the fantasy framework which determines our activity, our mode of acting in reality itself
    - paragraph [ref=e403]: "It is the same with the ideological dream, with the determination of ideology as a dreamlike construction hindering us from seeing the real state of things, reality as such. In vain do we try to break out of the ideo logical dream by 'opening our eyes and trying to see reality as it is', by throwing away the ideological spectacles: as the subjects of such a postideological, objective, sober look, free of so-called ideological prejudices, as the subjects of a look which views the facts as they are, we remain throughout 'the consciousness of our ideological dream'. The only way to break the power of our ideological dream is to confront the Real of our desire which announces itself in this dream."
    - paragraph [ref=e404]: Let us examine anti-Semitism. It is not enough to say that we must liberate ourselves from so-called 'anti-Semitic prejudices' and learn to see Jews as they really are - in this way we will certainly remain victims of these so-called prejudices. We must confront ourselves with how the ideological figure of the 'Jew' is invested with our unconscious desire, with how we have constructed this figure to escape a certain deadlock of our desire.
    - paragraph [ref=e405]: "Let us suppose, for example, that an objective look would confirm - why not? - that Jews really do financially exploit the rest of the population, real roots of our anti-Semitism? Here, we have only to remember the Lacan ian proposition concerning the pathologically jealous husband: even if all the facts he quotes in support of his jealousy are true, even if his wife really is sleeping around with other men, this does not change one bit the fact that his jealousy is a pathological, paranoid construction. Let us ask ourselves a simple question: in the Germany of the late 1930S, what would be the result of such a non-ideological, objective approach? Probably something like: 'The Nazis are condemning the Jews too hastily, without proper argument, so let us take a cool, sober look and see if they are really guilty or not; let us see if there is some truth in the accusations against them.' Is it really necessary to add that such an approach would merely confirm our so-called 'unconscious prejudices' with additional rationalizations? The proper answer to anti-Semitism is therefore not 'Jews are really not like that' but 'the anti-Semitic idea ofJew has nothing to do with Jews; the ideological figure of a Jew is a way to stitch up the incon sistency of our own ideological system.' That is why we are also unable to shake so-called ideological prejudices by taking into account the pre-ideological level of everyday experience. The basis of this argument is that the ideological construction always finds its limits in the field of everyday experience - that it is unable to reduce, to contain, to absorb and annihilate this level. Let us again take a typical individual in Germany in the late 1930S. He is bombarded by anti-Semitic propaganda depicting a Jew as a monstrous incarnation of Evil, the great wire-puller, and so on. But when he returns home he encounters Mr Stern, his neighbour, a good man to chat with in the evenings, whose children play with his. Does not this everyday experience offer an irreducible resistance to the ideological construction? The answer is, of course, no. If everyday experience offers such a resist ance, then the anti-Semitic ideology has not yet really grasped us. An ideology is really 'holding us' only when we do not feel any opposition between it and reality - that is, when the ideology succeeds in determining the mode of our everyday experience of reality itself How then would our ideological figure of the Jew (schemer, wire-puller, exploiting our brave men and so on) and the common everyday experience of his good neighbour, Mr Stern? His answer would be to turn this gap, this discrepancy itself, into an argument for anti-Semitism: 'You see how dangerous they really are? It is difficult to recognize their real nature. They hide it behind the mask of everyday appearance - and it is exactly this hiding of one's real nature, this duplicity, that is a basic feature of the Jewish nature.' An ideology really succeeds when even the facts which at first sight contradict it start to function as arguments in its favour."
    - heading "Surplus-Value and Surplus-Enjoyment" [level=3] [ref=e406]
    - paragraph [ref=e407]: "Herein lies the difference from Marxism: in the predominant Marxist perspective the ideological gaze is a partial gaze overlooking the totality of social relations, whereas in the Lacanian perspective ideology rather designates a totality setting effacing the traces of its own impossibility. This difference corresponds to the one which distinguishes the Freudian from the Marxian notion of fetishism: in Marxism a fetish conceals the positive network of social relations, whereas in Freud a fetish conceals the lack ('castration,) around which the symbolic network is articulated. In so far as we conceive the Real as that which 'always returns to the same place', we can deduce another, no less crucial difference. From the Marxist point of view, the ideological procedure par excellence is that of false eternalization and/or universalization: a state which depends on a concrete historical conjunction appears as an eternal, universal feature of the human condition; the interest of a particular class disguises itself as universal human interest ... and the aim of the 'criticism of ideology' is to denounce this false universality, to detect behind man in general the bourgeois individual; behind the universal rights of man the form which renders possible capitalist exploitation; behind the 'nuclear family' as a trans-historical constant the historically specified and limited form of kinship relations, and so on. externalization: an over-rapid historicization. Let us take one of the common places of the Marxist-feminist criticism of psychoanalysis, the idea that its insistence on the crucial role of the Oedipus complex and the nuclear family triangle transforms a historically conditioned form of patriarchal family into a feature of the universal human condition: is not this effort to historicize the family triangle precisely an attempt to elude the 'hard kernel' which announces itself through the 'patriarchal family' - the Real of the Law, the rock of castration?"
    - paragraph [ref=e408]: In other words, if over-rapid universal ization produces a quasi-universal Image whose function is to make us blind to its historical, socio-symbolic determination, over-rapid historicization makes us blind to the real kernel which returns as the same through diverse historicizations/symbolizations.
    - paragraph [ref=e409]: "It is the same with a phenomenon that designates most accurately the 'perverse' obverse of twentieth-century civilization: concentration camps. All the different attempts to attach this phenomenon to a concrete image ('Holocaust', 'Gulag'.. \"), to reduce it to a product of a concrete social order (Fascism, Stalinism...) - what are they if not so many attempts to elude the fact that we are dealing here with the 'real' of our civilization which returns as the same traumatic kernel in all social systems? (We should not forget that concentration camps were an invention of 'liberal' England, dating from the Boer War; that they were also used in the US to isolate the Japanese population, and so on.) Marxism, then, did not succeed in taking into account, coming to terms with, the surplus-object, the leftover of the Real eluding symbolization - a fact all the more surprising if we recall that Lacan modelled his notion of surplus-enjoyment on the Marxian notion of surplus-value. The proof that Marxian surplus-value announces effectively the logic of the Lacanian objet petit a as the embodiment of surplus-enjoyment is already provided by the decisive formula used by Marx, in the third volume of Capital, to designate the logical-historical limit of capitalism: 'the limit of capital is capital itself, i.e. the capitalist mode of production'."
    - paragraph [ref=e410]: "This formula can be read in two ways. The first, usual historicist paradigm of the dialectics of productive forces and relations of production, as that of' content' and 'form'. This paradigm follows roughly the metaphor of the serpent which, from time to time, sheds its skin, which has grown too tight: one posits as the last impetus of social development - as its (so to speak) 'natural', 'spontaneous' constant - the incessant growth of the productive forces (as a rule reduced to technical development); this 'spontaneous' growth is then followed, with a greater or lesser degree of delay, by the inert, dependent moment, the relationship of production. We have thus epochs in which the relations of production are in accordance with the productive forces, then those forces develop and outgrow their 'social clothes', the frame of relationships; this frame becomes an obstacle to their further development, until social revolution again co-ordinates forces and relations by replacing the old relations with new ones which correspond to the new state of forces. If we conceive the formula of capital as its own limit from this point of view, it means simply that the capitalist relation of production which at first made possible the fast development of productive forces became at a certain point an obstacle to their further development: that these forces have outgrown their frame and demand a new form of social relations. Marx himself is of course far from such a simplistic evolutionary idea. If we need convincing of this, we have only to look at the passages in Capitalwhere he deals with the relation between formal and real subsump tion of the process of production under Capital: the formal subsumption precedesthe real one; that is, Capital first subsumes the process of production as it found it (artisans, and so on), and only subsequently does it change the productive forces step by step, shaping them in such a way as to create correspondence. Contrary to the above-mentioned simplistic idea, it is then the form of the relation of production which drives the development of productive forces - that is, of its 'content'."
    - paragraph [ref=e411]: "All we have to do to render impossible the simplistic evolutionary albeit only an ideal one - at which the capitalist relation of production become an obstacle to the further development of the productive forces? Or the obverse of the same question: when can we speak of an accordance between productive forces and relation of production in the capitalist mode of production? Strict analysis leads to only one possible answer: never. This is exactly how capitalism differs from other, previous modes of production: in the latter, we can speak of periods of'accordance' when the process of social production and reproduction goes on as a quiet, circular movement, and of periods of convulsion when the contradiction between forces and relations aggravates itself; whereas in capitalism this contradiction, the discord forces/relations, is contained in its very concept (in the form of the contradiction between the social mode of production and the individual, private mode of appropriation). It is this internal contradiction which compels capitalism to permanent extended repro duction - to the incessant development of its own conditions of production, in contrast to previous modes of production where, at least in their 'normal' state, [re)production goes on as a circular movement. If this is so, then the evolutionist reading of the formula of capital as its own limit is inadequate: the point is not that, at a certain moment of its development, the frame of the relation of production starts ro constrict further development of the productive forces; the point is that it is t/zis very immanent limit, this 'internal contradiction΢ which drives capitalism into permanent development. The 'normal' state of capitalism is the permanent revolutionizing of its own conditions of existence: from the very beginning capitalism 'putrefies', it is branded by a crippling contradiction, discord, by an immanent want of balance: this is exactly why it changes, develops incessantly - incessant development is the only way for it to resolve again and again, come to terms with, its own fundamental, constitutive imbalance, 'contradiction'. Far from constricting, its limit is thus the very impetus of its development."
    - paragraph [ref=e412]: "Herein lies the paradox proper to capitalism, its last resort: capitalism is capable of transforming its lim,it, its very its immanent contradiction is aggravated, the more it must revolutionize itself to survive. It is this paradox which defines surplus-enjoyment: it is not a surplus which simply attaches itself to some 'normal', fundamental enjoyment, because etyo/ment as such emer,ges only in this surplus, because it is constitu tively an 'excess'. If we subtract the surplus we lose enjoyment itself, just as capitalism, which can survive only by incessantly revolutionizing its own material conditions, ceases to exist if it 'stays the same', if it achieves an internal balance. This, then, is the homology between surplus-value the 'cause' which sets in motion the capitalist process of production - and surplus-enjoyment, the object-cause of desire. Is not the paradoxical topology of the movement of capital, the fundamental blockage which resolves and reproduces itself through frenetic activity, excessive power as the very form of appearance of a fundamental impotence - this immediate passage, this coincidence oflimit and excess, oflack and surplus - precisely that of the Lacanian objet petit a, of the leftover which embodies the fundamental, constitutive lack? All this, of course, Marx 'knows very well... and yet': and yet, in the crucial formulation in the Preface to the Critique if Political he proceeds as if he does not know it, by describing the very passage from capitalism to socialism in terms of the above-mentioned vulgar evolu tionist dialectics of productive forces and the relations of production: when the forces surpass a certain degree, capitalist relations become an obstacle to their further development: this discord brings about the need for social ist revolution, the function of which is to co-ordinate again forces and relations; that is, to establish relations of production rendering possible the intensified development of the productive forces as the end-in-itself of the historical process."
    - paragraph [ref=e413]: How can we not detect in this formulation the fact that Marx failed to cope with the paradoxes of surplus-enj oyment? And the ironic vengeance of history for this failure is that today there exists a society which seems Marx. Is it not already a commonplace to assert that 'real socialism' rendered possible rapid industrialization, but that as soon as the productive forces reached a certain level of development (usually designated by the vague term 'post-industrial society'), 'real socialist' social relationships began to constrict their further growth?