  - 'region "Preface to the New Edition: The Idea''s Constipation?" [ref=e42]':
    - 'heading "Preface to the New Edition: The Idea''s Constipation?" [level=2] [ref=e43]':
      - text: "Preface to the New Edition:"
      - emphasis [ref=e44]: The Idea's Constipation?
    - paragraph [ref=e45]: "When a discipline is in crisis, attempts are made to change or supplement its theses within the terms of its basic framework - a procedure one might call 'Ptolemization' (since when data poured in which clashed with Ptolemy's earth-centred astronomy, his partisans introduced additional complications to account for the anomalies). But the true 'Copernican' revolution takes place when, instead of just adding complications and changing minor premises, the basic framework itself undergoes a transformation. So, when we are dealing with a self-professed 'scientific revolution', the question to ask is always: is this truly a Copernican revolution, or merely a Ptolemization of the old paradigm?"
    - paragraph [ref=e46]:
      - text: "Two examples of Ptolemization: there are good reasons to claim that 'string theory', which claims to provide the foundations for a unified theory (a single theoretical framework describing the four fundamental interactions between subatomic particles that were previously explained separately by relativity theory or quantum physics), remains an attempt at Ptolemization, and that we are still waiting for a new beginning which will require an even more radical change in the basic presuppositions (something like abandoning time or space as the basic constituent of reality)."
      - superscript [ref=e48]:
        - link "1" [ref=e49]:
          - /url: "#fn-1"
      - text: Likewise, in social theory, there are good reasons to claim that all the 'new paradigm' proposals about the nature of the contemporary world (that we are entering a post-industrial society, a postmodern society, a risk society, an informational society...) remain so many Ptolemizations of the 'old paradigm' of classic sociological models.
    - paragraph [ref=e50]: "The question is then: how do things stand with psychoanalysis? Although Freud presented his discovery as a Copernican revolution, the fundamental premise of the cognitive sciences is that psychoanalysis remains a 'Ptolemization' of classical psychology, failing to abandon its most basic premises. (Post-classical economists, incidentally, make the same claim about Marx: his critique of Smith and Ricardo amounts to a Ptolemization.) The Sublime Object of Ideology tries to answer this question by way of rehabilitating psychoanalysis in its philosophical core - as a theory indebted to Hegel's dialectics and readable only against this background. This cannot but appear, perhaps, as the worst possible move to have made: trying to save psychoanalysis, a discredited theory (and practice), by reference to an even more discredited theory, the worst kind of speculative philosophy rendered irrelevant by the progress of modern science."
    - paragraph [ref=e51]: However, as Lacan taught us, when we are confronted with an apparently clear choice, sometimes the correct thing to do is choose the worst option. Thus my wager was (and is) that, through their interaction (reading Hegel through Lacan and vice versa), psychoanalysis and Hegelian dialectics may simultaneously redeem themselves, shedding their old skins and emerging in a new unexpected shape.
    - paragraph [ref=e52]: "Let us take Hegel's dialectics at its most 'idealist' - with the notion of the sublation [Aufhebung] of all immediate-material reality. The fundamental operation of Aufhebung is reduction: the sublated thing survives, but in an 'abridged' edition, as it were, torn out of its life-world context, stripped down to its essential features, all the movement and wealth of its life reduced to a fixed mark. It is not that, after the abstraction of Reason has done its mortifying job with its fixed categories or notional determinations, speculative 'concrete universality' somehow returns us to the fresh greenness of Life; rather, once we pass from empirical reality to its notional Aufhebung, the immediacy of Life is lost forever. There is nothing more foreign to Hegel than a lamentation for the richness of reality that gets lost when we proceed to its conceptual grasp. Recall Hegel's unambiguous celebration of the absolute power of Understanding from his Foreword to the Phenomenology: 'The action of separating the elements is the exercise of the force of Understanding, the most astonishing and greatest of all powers, or rather the absolute power.' This celebration is in no way qualified; that is, Hegel's point is not that this power is nonetheless later 'sublated' into a subordinate moment of the unifying totality of Reason."
    - paragraph [ref=e53]: The problem with Understanding is, rather, that it does not unleash this power to the end, that it takes it as external to the thing itself-hence the standard notion that it is merely our Understanding ('mind') that separates in its imagination what in 'reality' belongs together, so that the Understanding's 'absolute power' is merely the power of our imagination, which in no way concerns the reality of the thing so analysed. We pass from Understanding to Reason not when this analysis, or tearing apart, is overcome in a synthesis that brings us back to the wealth of reality, but when this power of 'tearing apart' is displaced from being 'merely in our mind' into things themselves, as their inherent power of negativity.
    - paragraph [ref=e54]: "Back in the 1960s, one 'progressive' theorist of education touched a chord when he published the results of a simple experiment: he asked a group of five-year-olds to draw an image of themselves playing at home; then, he asked the same group to do it again two years later, after they had been through a year and a half of primary school. The difference was striking: the self-portraits of the five-year-olds were exuberant, lively, full of colours, surrealistically playful; two years later, the portraits were much more rigid and subdued, with a large majority of the children spontaneously choosing only the grey of the ordinary pencil, although other colours were at their disposal. Quite predictably, this experiment was taken as proof of the 'oppressiveness' of the school apparatus, of how the drill and discipline of school squash children's spontaneous creativity, and so on and so forth. From a Hegelian standpoint, however, one should, on the contrary, celebrate this shift as an indication of crucial spiritual progress: nothing is lost in this reduction of lively colourfulness to grey discipline; in fact, everything is gained - the power of the spirit is precisely to progress from the 'green' immediacy of life to its 'grey' conceptual structure, and to reproduce in this reduced medium the essential determinations to which our immediate experience blinds us."
    - paragraph [ref=e55]:
      - text: "The same mortification occurs in historical memory and monuments of the past where what survive are objects deprived of their living souls. Here is Hegel's comment apropos Ancient Greece: 'The statues are now only stones from which the living soul has flown, just as the hymns are words from which belief has gone.'"
      - superscript [ref=e57]:
        - link "2" [ref=e58]:
          - /url: "#fn-2"
      - text: "As with the passage from substantial God to the Holy Spirit, the properly dialectical reanimation is to be sought in this very medium of 'grey' notional determination: The understanding, through the form of abstract universality, does give [the varieties of the sensuous], so to speak, a rigidity of being... but, at the same time through this simplification it spiritually animates them and so sharpens them."
      - superscript [ref=e60]:
        - link "3" [ref=e61]:
          - /url: "#fn-3"
    - paragraph [ref=e62]:
      - text: "This 'simplification' is precisely what Lacan, referring to Freud, deployed as the reduction of a thing to le trait unaire [der einzige Zug, the unary feature]: we are dealing with a kind of epitomization by means of which the multitude of properties is reduced to a single dominant characteristic, so that we get 'a concrete shape in which one determination predominates, the others being present only in blurred outline': 'the content is already the actuality reduced to a possibility [zur Möglichkeit getilgte Wirklichkeit], its immediacy overcome, the embodied shape reduced to abbreviated, simple determinations of thought'."
      - superscript [ref=e64]:
        - link "4" [ref=e65]:
          - /url: "#fn-4"
    - paragraph [ref=e66]: "The dialectical approach is usually perceived as trying to locate the phenomenon-to-be-analysed in the totality to which it belongs, to bring to light the wealth of its links to other things, and thus to break the spell of fetishizing abstraction: from a dialectical perspective, one should see not just the thing in front of oneself, but this thing as it is embedded in all the wealth of its concrete historical context. This, however, is the most dangerous trap to be avoided; for Hegel, the true problem is precisely the opposite one: the fact that, when we observe a thing, we see too much in it, we fall under the spell of the wealth of empirical detail which prevents us from clearly perceiving the notional determination which forms the core of the thing. The problem is thus not that of how to grasp the multiplicity of determinations, but rather of how to abstract from them, how to constrain our gaze and teach it to grasp only the notional determination."
    - paragraph [ref=e67]: "Hegel's formulation is here very precise: the reduction to the signifying 'unary feature' contracts actuality to possibility, in the precise Platonic sense in which the notion (idea) of a thing always has a deontological dimension to it, designating what the thing should become in order to be fully what it is. 'Potentiality' is thus not simply the name for the essence of a thing actualized in the multitude of empirical things (the idea of a chair as a potentiality actualized in empirical chairs). The multitude of a thing's actual properties is not simply reduced to the inner core of this thing's 'true reality'; what is more important is that the signifying reduction accentuates (profiles) the thing's inner potential. When I call someone 'my teacher', I thereby outline the horizon of what I expect from him; when I refer to a thing as 'chair', I profile the way I intend to use it in future. When I observe the world around me through the lenses of a language, I perceive its actuality through the lenses of the potentialities hidden, latently present, in it."
    - paragraph [ref=e68]: "What this means is that potentiality appears 'as such', becomes actual as potentiality, only through language: it is the appellation of a thing that brings to light ('posits') its potentials."
    - paragraph [ref=e69]:
      - text: "Once we grasp Aufhebung in this way, we can immediately see what is wrong with one of the main topics of the pseudo-Freudian dismissal of Hegel: the notion of Hegel's System as being the highest and most overblown expression of an oral economy. Is not the Hegelian Idea effectively a voracious devourer which 'swallows up' every object it comes upon? No wonder Hegel saw himself as Christian: for him, the ritual eating of bread transubstantiated into Christ's flesh signals that the Christian subject can integrate and digest God himself without remainder. Is, consequently, the Hegelian conceiving/grasping not a sublimated version of digestion? Hegel writes: If the individual human being does something, achieves something, attains a goal, this fact must be grounded in the way the thing itself, in its concept, acts and behaves. If I eat an apple, I destroy its organic self-identity and assimilate it to myself. That I can do this entails that the apple in itself, already, in advance, before I take hold of it, has in its nature the determination of being subject to destruction, having in itself a homogeneity with my digestive organs such that I can make it homogeneous with myself."
      - superscript [ref=e71]:
        - link "5" [ref=e72]:
          - /url: "#fn-5"
    - paragraph [ref=e73]:
      - text: "Is what he offers not a lower version of the cognition process itself in which, as he likes to point out, we can only grasp the object if this object itself already 'wants to be with/by us'? One should push this metaphor to the end: the standard critical reading constructs the Hegelian absolute Substance-Subject as thoroughly constipated - retaining within itself the swallowed content. Or, as Adorno put it in one of his biting remarks (which, as is all too often the case with him, misses the mark), Hegel's system 'is the belly turned mind',"
      - superscript [ref=e75]:
        - link "6" [ref=e76]:
          - /url: "#fn-6"
      - text: "pretending that it swallowed the entire indigestible Otherness... But what about the counter-movement: Hegelian shitting? Is the subject of what Hegel calls 'absolute Knowledge' not also a thoroughly emptied subject, a subject reduced to the role of pure observer (or, rather, registrar) of the self-movement of the content itself? The richest is therefore the most concrete and most subjective, and that which withdraws itself into the simplest depth is the mightiest and most all-embracing. The highest, most concentrated point is the pure personality which, solely through the absolute dialectic which is its nature, no less embraces and holds everything within itself"
      - superscript [ref=e78]:
        - link "7" [ref=e79]:
          - /url: "#fn-7"
    - paragraph [ref=e80]: "In this strict sense, the subject itself is the abrogated/cleansed substance, a substance reduced to the void of the empty form of self-relating negativity, emptied of all the wealth of 'personality' - in Lacanese, the move from substance to subject is the one from S to ɼ, that is, the subject is the barred substance. (Adorno and Horkheimer, in Dialectic of Enlightenment, make the critical point that the Self bent on mere survival has to sacrifice all content that would make such a survival worthwhile; Hegel, on the contrary, views such a constitutive sacrifice positively.) Schelling referred to this same move as contraction (again, with the excremental connotation of squeezing the shit out of oneself, dropping it out): the subject is the contracted substance."
    - paragraph [ref=e81]:
      - text: Does then the final subjective position of the Hegelian system not compel us to turn the digestive metaphor around? The supreme (and, for many, the most problematic) case of this counter-movement occurs at the very end of the Logic, when, after the notional deployment is completed, reaching the full circle of the absolute Idea, the Idea, in its resolve/decision, 'freely releases itself into Nature, lets Nature go, leaves it off, discards it, pushes it away from itself, and thus liberates it.'
      - superscript [ref=e83]:
        - link "8" [ref=e84]:
          - /url: "#fn-8"
      - text: "Which is why, for Hegel, the philosophy of nature is not a violent reappropriation of this externality; it rather involves the passive attitude of an observer: as he puts it in the Philosophy of Mind, 'philosophy has, as it were, simply to watch how nature itself sublates its externality'."
      - superscript [ref=e86]:
        - link "9" [ref=e87]:
          - /url: "#fn-9"
    - paragraph [ref=e88]: The same move is accomplished by God himself who, in the guise of Christ, this finite mortal, also 'freely releases himself into temporal existence. The same goes for early modern art, where Hegel accounts for the rise of 'dead nature' paintings (not only landscapes and flowers, etc., but even pieces of food or dead animals) as being due precisely to the fact that, in the development of art, subjectivity no longer needs the visual medium as its principal means of expression - that is, because the accent has shifted to poetry as a more direct presentation of the subject's inner life, the natural environs are 'released' from the burden of expressing subjectivity and, thus freed, can be asserted on their own terms. Furthermore, as some perspicuous readers of Hegel have already pointed out, the very sublation of art itself in the philosophical sciences (in conceptual thought), the fact that art is no longer obliged to serve as the principal medium of the expression of the spirit, frees it, allows it to gain autonomy and stand on its own. Is this not the very definition of the birth of modern art proper, an art no longer subordinated to the task of representing spiritual reality?
    - paragraph [ref=e89]:
      - text: "The way abrogation relates to sublation is not that of a simple succession or external opposition, not 'first you eat, then you shit'. Shitting is the immanent conclusion of the entire process: without it, we would be dealing with the 'spurious infinity' of an endless process of sublation. The process of sublation itself can only reach its end by way of the counter-move: contrary to what one would initially imagine, these two processes of sublation and abrogation are completely interdependent. Considering the last moment of absolute spirit [philosophy], one readily notes the synonymy between the verbs aufheben and befreien ['to liberate'], as well as ablegen ['to discard', 'to remove', 'to take away']. Speculative abrogation, in no way alien to the process of Aufhebung, is indeed its fulfilment. Abrogation is a sublation of sublation, the result of the Aufhebung's work on itself and, as such, its transformation. The movement of suppression and preservation produces this transformation at a certain moment in history, the moment of Absolute Knowledge. Speculative abrogation is the absolute sublation, if by 'absolute' we mean a relief or sublation that frees from a certain type of attachment."
      - superscript [ref=e91]:
        - link "10" [ref=e92]:
          - /url: "#fn-10"
    - paragraph [ref=e93]: "True cognition is thus not only the notional 'appropriation' of its object: the process of appropriation goes on only as long as cognition remains incomplete. The sign of its completion is that it liberates its object, lets it be, drops it. This is why and how the movement of sublation has to culminate in the self-relating gesture of sublating itself."
    - paragraph [ref=e94]: So, what about the obvious counter-argument? Is the part which is abrogated, released, not precisely the arbitrary, passing aspect of the object, that which the notional mediation/reduction can afford to drop as being the part which is in itself worthless? This, precisely, is the illusion to be avoided, for two reasons. First, it is precisely as discarded that the released part is, on the contrary, and if one may be permitted to insist on the excremental metaphor, the manure of spiritual development, the ground out of which further development will grow. The release of Nature into its own thus lays the foundation of Spirit proper, which can develop itself only out of Nature as its inherent self-sublation. Second (and more fundamentally), what is released into its own being in speculative cognition is ultimately the object of cognition itself which, when truly grasped [begriffen], no longer has to rely on the subject's active intervention, but develops itself following its own conceptual automatism, with the subject reduced to a passive observer who, allowing the thing to deploy its potential without any intervention of his own (Zutun), merely registers the process.
    - paragraph [ref=e95]: This is why Hegelian cognition is simultaneously both active and passive, but in a sense which radically displaces the Kantian notion of cognition as the unity of activity and passivity. In Kant, the subject actively synthesizes (confers unity on) the content (sensuous multiplicity) by which he is passively affected.
    - paragraph [ref=e96]:
      - text: "For Hegel, on the contrary, at the level of Absolute Knowledge, the cognizing subject is thoroughly passivized: he no longer intervenes in the object, but merely registers the immanent movement of the object's self-differentiation/self-determination (or, to use a more contemporary term, the object's autopoietic self-organization). The subject is thus, at its most radical, not the agent of the process: the agent is the System (of knowledge) itself, which 'automatically' deploys itself without any need for external pushes or impetuses. However, this utter passivity simultaneously involves the greatest activity: it takes the most strenuous effort for the subject to 'erase itself in its particular content, as the agent intervening in the object, and to expose itself as a neutral medium, the site of the System's self-deployment. Hegel thereby overcomes the standard dualism between System and Freedom, between the Spinozist notion of a substantial deus sive natura of which I am a part, caught up in its determinism, and the Fichtean notion of the subject as the agent opposed to inert matter, trying to dominate and appropriate it: the supreme moment of the subject's freedom is to set free its object, to leave it free to deploy itself: 'The Idea's absolute freedom consists in [the fact] that it resolves to freely let go out of itself the moment of its particularity.'"
      - superscript [ref=e98]:
        - link "11" [ref=e99]:
          - /url: "#fn-11"
    - paragraph [ref=e100]: "'Absolute freedom' is here literally absolute in the etymological sense of absolvere: releasing, letting go. Schelling was the first to criticize this move as illegitimate: after Hegel completed the circle of the logical self-development of the Notion, and being aware that the whole of this development took place in the abstract medium of thought, he had somehow to make the passage back to real life - however, since there were no categories in his logic to accomplish this passage, he had to resort to terms like 'decision' (the Idea 'decides' to release Nature from itself), terms which are not categories of logic, but of the will and practical life. This critique clearly misses the way the act of releasing the other is thoroughly immanent to the dialectical process, is its conclusive moment, the sign of the conclusion of a dialectical circle. Is this not the Hegelian version of Gelassenheit?"
    - paragraph [ref=e101]:
      - text: "This is how one should read Hegel's 'third syllogism of Philosophy', Spirit-Logic-Nature: the starting point of the speculative movement rendered by this syllogism is spiritual substance into which subjects are immersed; then, through strenuous conceptual work, the wealth of this substance is reduced to its underlying elementary logical/notional structure; once this task is accomplished, the fully developed logical Idea can release Nature out of itself. Here is the key passage: The Idea, namely, in positing itself as absolute unity of the pure Notion and its reality and thus contracting itself into the immediacy of being, is the totality in this form - nature."
      - superscript [ref=e103]:
        - link "12" [ref=e104]:
          - /url: "#fn-12"
    - paragraph [ref=e105]:
      - text: But this determination has not issued from a process of becoming, nor is it a transition, as when above, the subjective Notion in its totality becomes objectivity, and the subjective end becomes life. On the contrary, the pure Idea in which the determinateness or reality of the Notion is itself raised into Notion, is an absolute liberation for which there is no longer any immediate determination that is not equally posited and itself Notion; in this freedom, therefore, no transition takes place; the simple being to which the Idea determines itself remains perfectly transparent to it and is the Notion that, in its determination, abides with itself. The passage is therefore to be understood here rather in this manner, that the Idea freely releases itself in its absolute self-assurance and inner poise. By reason of this freedom, the form of its determinateness is also utterly free - the externality of space and time existing absolutely on its own account without the moment of subjectivity.
      - superscript [ref=e107]:
        - link "13" [ref=e108]:
          - /url: "#fn-13"
      - text: "Hegel repeatedly insists here on this 'absolute liberation' being thoroughly different from the standard dialectical 'transition'. But how? The suspicion lurks that Hegel's 'absolute liberation' relies on the absolute mediation of all otherness: I set the Other free only after I have completely internalized it... However, is this really the case?"
    - paragraph [ref=e109]: "One should here reread Lacan's critique of Hegel: what if, far from denying what Lacan calls the 'subjective disjunction', Hegel on the contrary asserts a previously unheard-of division that runs through the (particular) subject as well as through the (universal) substantial order of 'collectivity', uniting the two? That is to say, what if the 'reconciliation' between the Particular and the Universal occurs precisely through the division that cuts across the two? The basic 'postmodern' reproach to Hegel - that his dialectics admits antagonisms and splits only to resolve them magically in a higher synthesis-mediation - strangely contrasts with the good old Marxist reproach (already formulated by Schelling) according to which Hegel resolves antagonisms only in 'thought', through conceptual mediation, while in reality they remain unresolved. One is tempted to accept this second reproach at face value and use it against the first one: what if this is the proper answer to the accusation that Hegelian dialectics magically resolves antagonisms? What if, for Hegel, the point, precisely, is to not 'resolve' antagonisms 'in reality', but simply to enact a parallax shift by means of which antagonisms are recognized 'as such' and thereby perceived in their 'positive' role?"
    - paragraph [ref=e110]: "The passage from Kant to Hegel is thus much more convoluted than it may appear: let us approach it again by way of their different attitudes to the ontological proof of God's existence. Kant's rejection of this proof takes as its starting point his thesis that being is not a predicate: if one knows all the predicates of an entity, its being (existence) does not follow, that is, one cannot conclude a being from a notion. (The anti-Leibniz line is obvious here, since, according to Leibniz, two objects are indistinguishable if all of their predicates are the same.) The implication for the ontological proof of God is clear: in the same way that I can have a perfect notion of 100 thalers and yet still not have them in my pocket, I can have a perfect notion of God and yet God still may not exist. Hegel's first remark on this line of reasoning is that 'being' is the poorest, most imperfect, notional determination (everything 'is' in some way, even my craziest phantasmagorias); it is only through further notional determinations that we get to existence, to reality, to actuality, which are all much more than mere being. His second remark is that the gap between notion and existence is precisely the mark of finitude; it holds for finite objects like 100 thalers, but not for God: God is not something I can have (or not have) in my pocket..."
    - paragraph [ref=e111]: "On a first approach, it may seem that the opposition between Kant and Hegel is here ultimately that between materialism and idealism: Kant insists on a minimum of materialism (the independence of reality with regard to notional determinations), while Hegel totally dissolves reality in its notional determinations. However, Hegel's true point lies elsewhere: it involves a much more radical 'materialist' claim that a complete notional determination of an entity - to which one would only have to add 'being' in order to arrive at its existence - is in itself an abstract notion, an empty abstract possibility. The lack of (a certain mode of) being is always also an inherent lack of some notional determination - say, for a thing to exist as part of opaque material reality, a whole set of notional conditions-determinations have to be met (and other determinations have to be lacking). With regard to 100 thalers (or any other empirical object), this means that their notional determination is abstract, which is why they possess an opaque empirical being and not full actuality. So when Kant draws a parallel between God and the 100 thalers, one should ask a simple and naive question: does Kant really possess a (fully developed) concept of God?"
    - paragraph [ref=e112]: "This brings us to the true finesse of Hegel's argumentation, which is directed in two ways, both against Kant and against Anselm's classic version of the ontological proof of God. Hegel's argument against Anselm's proof is not that it is too conceptual, but that it is not conceptual enough: Anselm does not develop the concept of God, he just refers to it as the sum of all perfections which, as such, is precisely beyond the comprehension of our finite human minds. Anselm merely presupposes 'God' as an impenetrable reality beyond our comprehension (i.e., outside the notional domain), in other words, his God is precisely not a concept (something posited by our conceptual work), but a purely presupposed pre-or non-conceptual reality."
    - paragraph [ref=e113]: "Along the same lines, albeit in the opposite sense, one should note the irony in the fact that Kant talks about thalers, that is, about money, whose existence as money is not 'objective', but depends on 'notional' determinations. It is true, as Kant says, that having a concept of 100 thalers is not the same as having them in your pocket; but let us imagine a process of rapid inflation which totally devalues the 100 thalers in your pocket; in this case, the same object is there in reality, but it is no longer money, having become a meaningless and worthless coin. In other words, money is precisely an object whose status depends on how we 'think' about it: if people no longer treat this piece of metal as money, if they no longer 'believe' in it as money, it no longer is money."
    - paragraph [ref=e114]: "With regard to material reality, the ontological proof of God's existence should thus be turned around: the existence of material reality bears witness to the fact that the Notion is not fully actualized. Things 'materially exist' not when they meet certain notional requirements, but when they fail to meet them - material reality is as such a sign of imperfection. With regard to truth, this means that, for Hegel, the truth of a proposition is inherently notional, determined by the immanent notional content, not a matter of comparison between notion and reality - in Lacanian terms, there is a non-All (pas-tout) of truth. It may sound strange to invoke Hegel apropos the non-All: is Hegel not the philosopher of All par excellence? However, Hegelian truth is precisely without any external limitation/exception that would serve as its measure or standard, which is why its criterion is absolutely immanent: one compares a statement with itself, with its own process of enunciation."
    - paragraph [ref=e115]:
      - text: When Alain Badiou emphasizes the undecidability of a Truth-Event, his position is radically different from the standard deconstructionist notion of undecidability.
      - superscript [ref=e117]:
        - link "14" [ref=e118]:
          - /url: "#fn-14"
      - text: "For Badiou, undecidability means that there are no neutral 'objective' criteria for an Event: an Event appears as such only to those who recognize themselves in its call; or, as Badiou puts it, an Event is self-relating, it includes itself - its own nomination - among its components. While this does mean that one has to decide about an Event, such an ultimately groundless decision is not 'undecidable' in the standard sense; it is, rather, uncannily similar to the Hegelian dialectical process in which, as Hegel himself made clear already in the Introduction to his Phenomenology, a 'figure of consciousness' is not measured by any external standard of truth but in an absolutely immanent way, through the gap between itself and its own exemplification/staging. An Event is thus 'non-All' in the precise Lacanian sense of the term: it is never fully verified precisely because it is infinite/unlimited, that is, because there is no external limit to it. And the conclusion to be drawn here is that, for the very same reason, the Hegelian 'totality' is also 'non-All'."
    - paragraph [ref=e119]: Back to our main line of argument.
    - paragraph [ref=e120]: "What this means is that the externality of Nature with regard to the Idea is not that of the Idea's constitutive exception: it is not that Nature is set free as the exception that guarantees the Wholeness of the Idea's self-mediation. It is not the case that, once this mediation is completed (that is, after the Idea's dialectical progress can no longer be propelled by the Idea's own incompleteness - its failure to correspond to its own notion), the completed Idea needs an external Other (Nature) to sustain the complete and closed circle of its self-mediation. Nature is, rather, the mark of the non-All of the Idea's totality."
    - paragraph [ref=e121]: So, to pursue the rather tasteless metaphor, Hegel was not a sublimated coprophagist, as the usual notion of the dialectical process would lead us to believe. The matrix of the dialectical process is not that of excrementation-externalization followed by a swallowing (reappropriation) of the externalized content, but, on the contrary, of appropriation followed by the excremental move of dropping it, releasing it, letting it go.
    - paragraph [ref=e122]: "What this means is that one should not equate externalization with alienation. The externalization which concludes a cycle of dialectical process is not alienation, it is the highest point of dis-alienation: one really reconciles oneself with some objective content not when one still has to strive to master and control it, but when one can afford the supreme sovereign gesture of releasing this content from oneself, of setting it free. Which is why, incidentally, and as some of the sharper interpreters have pointed out, far from subduing nature totally to man, Hegel opens up an unexpected space for ecological awareness: for Hegel, the drive to exploit nature technologically is still a mark of man's finitude; in such an attitude, nature is perceived as an external object, an opposing force to be dominated, while a philosopher, from his standpoint of Absolute Knowledge, experiences nature not as a threatening force to be controlled and dominated, but as something to be left to follow its inherent path."
    - paragraph [ref=e123]: "What this means is that the Hegelian Subject-Substance has nothing to do with any kind of mega-Subject controlling the dialectical process: there is no one pulling the strings or controlling the process - the Hegelian System is a plane without a pilot. Here, Louis Althusser went wrong when he opposed the Hegelian Subject-Substance, the 'teleological' process-with-a-subject, to the materialist-dialectical 'process without a subject'. The Hegelian dialectical process is in fact the most radical version of a 'process without a subject', in the sense of an agent controlling and directing the process, be it God or humanity or class as a collective subject. In his later writings, Althusser was becoming aware of this, while remaining thoroughly unaware of how the fact that the Hegelian dialectical process is a 'process without a subject' means exactly the same as Hegel's fundamental thesis that 'it is crucial to grasp the Absolute not only as Substance, but also as Subject': the emergence of a pure subject qua void is strictly correlative to the notion of 'System' as the self-deployment of the object itself with no need for any subjective agent to push it forward or to direct it."
    - paragraph [ref=e124]: Perhaps what the critics of Hegel's voracity need, then, is a dose of an effective laxative.
  - region "Introduction" [ref=e125]:
    - heading "Introduction" [level=2] [ref=e126]
    - paragraph [ref=e127]: "In that book of Habermas's which specifically addresses the issue of so-called 'post-structuralism', Der philosophische Diskurs der Moderne, there is a curious detail concerning Lacan's name: it is mentioned only five times and each time in conjunction with other names. (Let us cite all five instances: p. 70 - 'von Hegel und Marx bis Nietzsche und Heidegger, von Bataille und Lacan bis Foucault und Derrida'; p. 120 - 'Bataille, Lacan und Foucault'; p. 311 - 'mit Levi-Strauss und Lacan'; p. 313 - 'den zeitgenossischen Strukturalismus, die Ethnologie von Levi-Strauss und die Lacanische Psychoanalyse'; p. 359 - von Freud oder c. G. Jung, von Lacan oder Levi-Strauss'.) Lacanian theory is not, then, perceived as a specific entity; it is - to use Laclau and Mouffe's term - always articulated in a series of equivalences. Why this refusal to confront Lacan directly, in a book which includes lengthy discussions of Bataille, Derrida and, above all, Foucault, the real partner of Habermas?"
    - paragraph [ref=e128]:
      - text: "The answer to this enigma is to be found in another curiosity of the Habermas book, in a curious incident concerning Althusser. of course, we are using the term 'curious incident' in a Sherlock Holmesian sense: Althusser's name is not even mentioned in Habermas's book, and that is the curious incident. So our first thesis would be that the great debate occupying the foreground of today's intellectual scene, the Habermas-Foucault debate, is masking another opposition, another debate which is theoretically more far-reaching: the Althusser-Lacan debate. There is something enigmatic in the sudden eclipse of the Althusserian school: it cannot be explained away in terms of a theoretical defeat. It is more as if there were, in Althusser's theory"
      - superscript [ref=e130]:
        - link "2" [ref=e131]:
          - /url: "#fn-intro-2"
      - text: ", a traumatic kernel which had to be quickly forgotten, 'repressed'; it is an effective case of theoretical amnesia."
    - paragraph [ref=e132]: Why, then, was the opposition Althusser-Lacan replaced, in a kind of metaphorical substitution, by the opposition Habermas-Foucault? At stake here are four different ethical positions, and at the same time four different notions of the subject.
    - paragraph [ref=e133]: With Habermas, we have the ethics of the unbroken communication, the Ideal of the universal, transparent intersubjective community; the notion of the subject behind this is, of course, the philosophy-of-language version of the old subject of transcendental reflection.
    - paragraph [ref=e134]:
      - text: "With Foucault, we have a turn against that universalist ethics which results in a kind of aestheticization of ethics: each subject must, without any support from universal rules, build his own mode of self-mastery; he must harmonize the antagonism of the powers within himself-invent himself, so to speak, produce himself as subject, find his own particular art of living. This is why Foucault was so fascinated by marginal lifestyles constructing their particular mode of subjectivity (the sadomasochistic homosexual universe)."
      - superscript [ref=e136]:
        - link "1" [ref=e137]:
          - /url: "#fn-intro-1"
    - paragraph [ref=e138]: "It is not very difficult to detect how this Foucauldian notion of subject enters the humanist-elitist tradition: its closest realization would be the Renaissance ideal of the 'all-round personality' mastering the passions within himself and making out of his own life a work of art. Foucault's notion of the subject is, rather, a classical one: subject as the power of self-mediation and harmonizing the antagonistic forces, as a way of mastering the 'use of pleasures' through a restoration of the image of self. Here Habermas and Foucault are two sides of the same coin - the real break is represented by Althusser, by his insistence on the fact that a certain cleft, a certain fissure, misrecognition, characterizes the human condition as such: by the thesis that the idea of the possible end of ideology is an ideological idea par excellence!"
    - paragraph [ref=e139]: Although Althusser has not written extensively about ethical problems, it is clear that the whole of his work embodies a certain radical ethical attitude which we might call the heroism of alienation or of subjective destitution (although, or rather, precisely because Althusser refuses the very notion of 'alienation' as ideological). The point is not just that we must unmask the structural mechanism which is producing the effect of subject as ideological misrecognition, but that we must at the same time fully acknowledge this misrecognition as unavoidable - that is, we must accept a certain delusion as a condition of our historical activity, of assuming a role as agent of the historical process.
    - paragraph [ref=e140]:
      - text: "In this perspective, the subject as such is constituted through a certain misrecognition: the process of ideological interpellation through which the subject 'recognizes' itself as the addressee in the calling up of the ideological cause implies necessarily a certain short circuit, an illusion of the type 'I was already there' which, as Michel Pêcheux - who has given us the most elaborated version of the theory of interpellation - pointed out, is not without its comical effects: the short circuit of 'no wonder you were interpellated as proletarian, when you are a proletarian'."
      - superscript [ref=e142]:
        - link "3" [ref=e143]:
          - /url: "#fn-intro-3"
      - text: "Here, Pêcheux is supplementing Marxism with the Marx Brothers, whose well-known joke goes: 'You remind me of Emanuel Ravelli.' 'But I am Emanuel Ravelli.' 'Then no wonder you look like him!'"
    - paragraph [ref=e144]: "In contrast to this Althusserian ethics of alienation in the symbolic 'process without subject', we may denote the ethics implied by Lacanian psychoanalysis as that of separation. The famous Lacanian motto not to give way on one's desire (ne pas céder sur son désir) - is aimed at the fact that we must not obliterate the distance separating the Real from its symbolization: it is this surplus of the Real over every symbolization that functions as the object-cause of desire. To come to terms with this surplus (or, more precisely, leftover) means to acknowledge a fundamental deadlock ('antagonism'), a kernel resisting symbolic integration-dissolution. The best way to locate such an ethical position is via its opposition to the traditional Marxist notion of social antagonism."
    - paragraph [ref=e145]: "This traditional notion implies two interconnected features: (1) there exists a certain fundamental antagonism possessing an ontological priority to 'mediate' all other antagonisms, determining their place and their specific weight (class antagonism, economic exploitation); (2) historical development brings about, if not a necessity, at least an 'objective possibility' of solving this fundamental antagonism and, in this way, mediating all other antagonisms - to recall the well-known Marxist formulation, the same logic which drove mankind into alienation and class division also creates the condition for its abolition - 'die Wunde schliesst der Speer nur, der sie schlug' [the wound can be healed only by the spear which made it] -as Wagner, Marx's contemporary, said through the mouth of Parsifal.."
    - paragraph [ref=e146]: "It is upon the unity of these two features that the Marxist notion of the revolution, of the revolutionary situation, is founded: a situation of metaphorical condensation in which it finally becomes clear to the everyday consciousness that it is not possible to solve any particular question without solving them all - that is, without solving the fundamental question which embodies the antagonistic character of the social totality. In a 'normal', pre-revolutionary state of things, everybody is fighting his own particular battles (workers are striking for better wages, feminists are fighting for the rights of women, democrats for political and social freedoms, ecologists against the exploitation of nature, participants in the peace movements against the danger of war, and so on). Marxists are using all their skill and adroitness of argument to convince the participants in these particular struggles that the only real solution to their problem is to be found in the global revolution: as long as social relations are dominated by Capital, there will always be sexism in relations between the sexes, there will always be a threat of global war, there will always be a danger that political and social freedoms will be suspended, nature itself will always remain an object of ruthless exploitation... The global revolution will then abolish the basic social antagonism, enabling the formation of a transparent, rationally governed society."
    - paragraph [ref=e147]:
      - text: "The basic feature of so-called 'post-Marxism' is, of course, the break with this logic - which, incidentally, does not necessarily have a Marxist connotation: almost any of the antagonisms which, in the light of Marxism, appear to be secondary can take over this essential role of mediator for all the others. We have, for example, feminist fundamentalism (no global liberation without the emancipation of women, without the abolition of sexism); democratic fundamentalism (democracy as the fundamental value of Western civilization; all other struggles - economic, feminist, of minorities, and so on - are simply further applications of the basic democratic, egalitarian principle); ecological fundamentalism (ecological deadlock as the fundamental problem of mankind); and - why not? - also psychoanalytic fundamentalism as articulated in Marcuse's Eros and Civilization (the key to liberation lies in changing the repressive libidinal structure)."
      - superscript [ref=e149]:
        - link "4" [ref=e150]:
          - /url: "#fn-intro-4"
    - paragraph [ref=e151]: Psychoanalytic 'essentialism' is paradoxical in so far as it is precisely psychoanalysis - at least in its Lacanian reading - which presents the real break with essentialist logic.
    - paragraph [ref=e152]: "That is to say, Lacanian psychoanalysis goes a decisive step further than the usual 'post-Marxist' anti-essentialism affirming the irreducible plurality of particular struggles - in other words, demonstrating how their articulation into a series of equivalences depends always on the radical contingency of the social-historical process: it enables us to grasp this plurality itself as a multitude of responses to the same impossible-real kernel. Let us take the Freudian notion of the 'death drive'. of course, we have to abstract Freud's biologism: 'death drive' is not a biological fact but a notion indicating that the human psychic apparatus is subordinated to a blind automatism of repetition beyond pleasure-seeking, self-preservation, accordance between man and his milieu. Man is - Hegel dixit - 'an animal sick unto death', an animal extorted by an insatiable parasite (reason, logos, language)."
    - paragraph [ref=e153]: "In this perspective, the 'death drive', this dimension of radical negativity, cannot be reduced to an expression of alienated social conditions, it defines la condition humaine as such: there is no solution, no escape from it; the thing to do is not to 'overcome', to 'abolish' it, but to come to terms with it, to learn to recognize it in its terrifying dimension and then, on the basis of this fundamental recognition, to try to articulate a modus vivendi with it."
    - paragraph [ref=e154]: "All 'culture' is in a way a reaction-formation, an attempt to limit, canalize - to cultivate this imbalance, this traumatic kernel, this radical antagonism through which man cuts his umbilical cord with nature, with animal homeostasis. It is not only that the aim is no longer to abolish this drive antagonism, but the aspiration to abolish it is precisely the source of totalitarian temptation: the greatest mass murders and holocausts have always been perpetrated in the name of man as harmonious being, of a New Man without antagonistic tension."
    - paragraph [ref=e155]: "We have the same logic with ecology: man as such is 'the wound of nature', there is no return to the natural balance; to accord with his milieu, the only thing man can do is accept fully this cleft, this fissure, this structural rooting-out, and to try as far as possible to patch things up afterwards; all other solutions - the illusion of a possible return to nature, the idea of a total socialization of nature - are a direct path to totalitarianism."
    - paragraph [ref=e156]: "We have the same logic with feminism: 'there is no sexual relationship': that is, the relation between sexes is by definition 'impossible', antagonistic; there is no final solution, and the only basis for a somewhat bearable relation between the sexes is an acknowledgement of this basic antagonism, this basic impossibility."
    - paragraph [ref=e157]: "We have the same logic with democracy: it is - to use the worn-out phrase attributed to Churchill - the worst of all possible systems; the only problem is that there is no other which would be better."
    - paragraph [ref=e158]: "That is to say, democracy always entails the possibility of corruption, of the rule of dull mediocrity, the only problem is that every attempt to elude this inherent risk and to restore 'real' democracy necessarily brings about its opposite - it ends in the abolition of democracy itself. Here it would be possible to defend a thesis that the first post-Marxist was none other than Hegel himself: according to Hegel, the antagonism of civil society cannot be suppressed without a fall into totalitarian terrorism - only afterwards can the state limit its disastrous effects."
    - paragraph [ref=e159]: It is the merit of Ernest Laclau and Chantal Mouffe that they have, in Hegemony and Socialist Strategy, developed a theory of the social field founded on such a notion of antagonism - on an acknowledgement of an original 'trauma', an impossible kernel which resists symbolization, totalization, symbolic integration.
    - paragraph [ref=e160]: "Every attempt at symbolization-totalization comes afterwards: it is an attempt to suture an original cleft - an attempt which is, in the last resort, by definition doomed to failure. They emphasize that we must not be 'radical' in the sense of aiming at a radical solution: we always live in an interspace and in borrowed time; every solution is provisional and temporary, a kind of postponing of a fundamental impossibility. Their term 'radical democracy' is thus to be taken somehow paradoxically: it is precisely not 'radical' in the sense of pure, true democracy; its radical character implies, on the contrary, that we can save democracy only by taking into account its own radical impossibility."
    - paragraph [ref=e161]: "Here we can see how we have reached the opposite extreme of the traditional Marxist standpoint: in traditional Marxism, the global solution-revolution is the condition of the effective solution of all particular problems, while here every provisional, temporarily successful solution of a particular problem entails an acknowledgement of the global radical deadlock, impossibility, the acknowledgement of a fundamental antagonism. My thesis (developed in Le plus sublime des hystériques: Hegel passe) is that the most consistent model of such an acknowledgement of antagonism is offered by Hegelian dialectics: far from being a story of its progressive overcoming, dialectics is for Hegel a systematic notation of the failure of all such attempts - 'absolute knowledge' denotes a subjective position which finally accepts 'contradiction' as an internal condition of every identity. In other words, Hegelian 'reconciliation' is not a 'panlogicist' sublation of all reality in the Concept but a final consent to the fact that the Concept itself is 'not-all' (to use this Lacanian term). In this sense we can repeat the thesis of Hegel as the first post-Marxist: he opened up the field of a certain fissure subsequently 'sutured' by Marxism. Such an understanding of Hegel inevitably runs counter to the accepted notion of 'absolute knowledge' as a monster of conceptual totality devouring every contingency; this commonplace of Hegel simply shoots too fast, like the patrolling soldier of the well-known joke from Jaruzelski's Poland immediately after the military coup. At that time, military patrols had the right to shoot without warning at people walking on the streets after curfew (ten o'clock); one of the two soldiers on patrol sees somebody in a hurry at ten minutes to ten and shoots him immediately. When his colleague asks him why he shot when it was only ten to ten, he answers: 'I knew the fellow - he lived far from here and in any case would not be able to reach his home in ten minutes, so to simplify matters, I shot him now... ' This is exactly how the critics of Hegel's presumed 'panlogicism' proceed: they condemn absolute knowledge 'before it is ten o'clock', without reaching it - that is, they refute nothing with their criticism but their own prejudices about it."
    - paragraph [ref=e162]: "The aim of this book is thus threefold:"
    - paragraph [ref=e163]: "• to serve as an introduction to some of the fundamental concepts of Lacanian psychoanalysis: against the distorted picture of Lacan as belonging to the field of 'post-structuralism', the book articulates his radical break with 'post-structuralism'; against the distorted picture of Lacan's obscurantism, it locates him in the lineage of rationalism. Lacanian theory is perhaps the most radical contemporary version of the Enlightenment."
    - paragraph [ref=e164]: "• to accomplish a kind of 'return to Hegel' - to reactualize Hegelian dialectics by giving it a new reading on the basis of Lacanian psychoanalysis. The current image of Hegel as an 'idealist-monist' is totally misleading: what we find in Hegel is the strongest affirmation yet of difference and contingency - 'absolute knowledge' itself is nothing but a name for the acknowledgement of a certain radical loss."
    - paragraph [ref=e165]: "• to contribute to the theory of ideology via a new reading of some well-known, classical motifs (commodity fetishism, and so on) and of some crucial Lacanian concepts which, on a first approach, have nothing to offer to the theory of ideology: the 'quilting point' (le point de capiton: 'upholstery button'), sublime object, surplus-enjoyment, and so on."
    - paragraph [ref=e166]: "It is my belief that these three aims are deeply connected: the only way to 'save Hegel' is through Lacan, and this Lacanian reading of Hegel and the Hegelian heritage opens up a new approach to ideology, allowing us to grasp contemporary ideological phenomena (cynicism, 'totalitarianism', the fragile status of democracy) without falling prey to any kind of 'postmodernist' traps (such as the illusion that we live in a 'post-ideological' condition)."
  - region "Part I The Symptom" [ref=e167]:
    - heading "Part I The Symptom" [level=2] [ref=e168]:
      - text: Part I
      - text: The Symptom
  - region "1. How Did Marx Invent the Symptom?" [ref=e169]:
    - heading "1. How Did Marx Invent the Symptom?" [level=2] [ref=e170]
    - 'heading "Marx, Freud: The Analysis of Form" [level=3] [ref=e171]'
    - paragraph [ref=e172]: "According to Lacan, it was none other than Karl Marx who invented the notion of symptom. Is this Lacanian thesis just a sally of wit, a vague analogy, or does it possess a pertinent theoretical foundation? If Marx really articulated the notion of the symptom as it is also at work in the Freudian field, then we must ask ourselves the Kantian question, concerning the epistemological 'conditions of possibility' of such an encounter: how was it possible for Marx, in his analysis of the world of commodities, to produce a notion which applies also to the analysis of dreams, hysterical phenomena, and so on? The answer is that there is a fundamental homology between the interpretative procedure of Marx and Freud - more precisely, between their analysis of commodity and of dreams. In both cases the point is to avoid the properly fetishistic fascination of the 'content' supposedly hidden behind the form: the 'secret' to be unveiled through analysis is not the content hidden by the form (the form of commodities, the form of dreams) but, on the contrary, the secret of this form itself. The theoretical intelligence of the form of dreams does not consist in penetrating from the manifest content to its 'hidden kernel', to the latent dream-thoughts; it consists in the answer to the question: why have the latent dream-thoughts assumed such a form, why were they transposed into the form of a dream?"
    - paragraph [ref=e173]: "It is the same with commodities: the real problem is not to penetrate to the 'hidden kernel' of the commodity - the determination of its value by the quantity of the work consumed in its production - but to explain why work assumed the form of the value of a commodity, why it can affirm its social character only in the commodity-form of its product."
    - paragraph [ref=e174]:
      - text: "The notorious reproach of 'pansexualism' addressed at the Freudian interpretation of dreams is already a commonplace. Hans-Jürgen Eysenck, a severe critic of psychoanalysis, long ago observed a crucial paradox in the Freudian approach to dreams: according to Freud, the desire articulated in a dream is supposed to be - as a rule, at least - unconscious and at the same time of a sexual nature, which contradicts the majority of examples analysed by Freud himself, starting with the dream he chose as an introductory case to exemplify the logic of dreams, the famous dream of Irma's injection. The latent thought articulated in this dream is Freud's attempt to get rid of the responsibility for the failure of his treatment of Irma, a patient of his, by means of arguments of the type 'it was not my fault, it was caused by a series of circumstances...'; but this 'desire', the meaning of the dream, is obviously neither of a sexual nature (it rather concerns professional ethics) nor unconscious (the failure of Irma's treatment was troubling Freud day and night)."
      - superscript [ref=e176]:
        - link "1" [ref=e177]:
          - /url: "#fn-ch1-1"
    - paragraph [ref=e178]: "This kind of reproach is based on a fundamental theoretical error: the identification of the unconscious desire at work in the dream with the 'latent thought' - that is, the signification of the dream. But as Freud continually emphasizes, there is nothing 'unconscious' in the 'latent dream-thought': this thought is an entirely 'normal' thought which can be articulated in the syntax of everyday, common language; topologically, it belongs to the system of, consciousness/preconsciousness'; the subject is usually aware of it, even excessively so; it harasses him all the time... Under certain conditions this thought is pushed away, forced out of the consciousness, drawn into the unconscious - that is, submitted to the laws of the 'primary process', translated into the 'language of the unconscious'. The relationship between the 'latent thought' and what is called the 'manifest content' of a dream - the text of the dream, the dream in its literal phenomenality - is therefore that between some entirely 'normal', (pre)conscious thought and its translation into the 'rebus' of the dream. The essential constitution of dream is thus not its 'latent thought' but this work (the mechanisms of displacement and condensation, the figuration of the contents of words or syllables) which confers on it the form of a dream."
    - paragraph [ref=e179]:
      - text: "Herein, then, lies the basic misunderstanding: if we seek the 'secret of the dream' in the latent content hidden by the manifest text, we are doomed to disappointment: all we find is some entirely 'normal' - albeit usually unpleasant - thought, the nature of which is mostly non-sexual and definitely not 'unconscious'. This 'normal', conscious/preconscious thought is not drawn towards the unconscious, repressed simply because of its 'disagreeable' character for the conscious, but because it achieves a kind of 'short circuit' between it and another desire which is already repressed, located in the unconscious, a desire which has nothing whatsoever to do with the 'latent dream-thoughts' 'A normal train of thought' - normal and therefore one which can be articulated in common, everyday language: that is, in the syntax of the 'secondary process' - 'is only submitted to the abnormal psychical treatment of the sort we have been describing' - to the dream-work, to the mechanisms of the 'primary process' - 'if an unconscious wish, derived from infancy and in a state of repression, has been transferred on to it'"
      - superscript [ref=e181]:
        - link "2" [ref=e182]:
          - /url: "#fn-ch1-2"
    - paragraph [ref=e183]: It is this unconscious/sexual desire which cannot be reduced to a 'normal train of thought' because it is, from the very beginning, constitutively repressed (Freud's Urverdrängung) - because it has no 'original' in the 'normal' language of everyday communication, in the syntax of the conscious/preconscious; its only place is in the mechanisms of the 'primary process'.
    - paragraph [ref=e184]: "This is why we should not reduce the interpretation of dreams, or symptoms in general, to the retranslation of the 'latent dream-thought' into the 'normal', everyday common language of inter-subjective communication (Habermas's formula). The structure is always triple; there are always three elements at work: the manifest dream-text, the latent dream content or thought and the unconscious desire articulated in a dream. This desire attaches itself to the dream, it intercalates itself in the interspace between the latent thought and the manifest text; it is therefore not 'more concealed, deeper' in relation to the latent thought, it is decidedly more 'on the surface', consisting entirely of the signifier's mechanisms, of the treatment to which the latent thought is submitted."
    - paragraph [ref=e185]: "In other words, its only place is in the form of the 'dream': the real subject matter of the dream (the unconscious desire) articulates itself in the dream-work, in the elaboration of its 'latent content'."
    - paragraph [ref=e186]:
      - text: "As is often the case with Freud, what he formulates as an empirical observation (although of' quite surprising frequency') announces a fundamental, universal principle: 'The form of a dream or the form in which it is dreamt is used with quite surprising frequency for representing its concealed subject matter'."
      - superscript [ref=e188]:
        - link "3" [ref=e189]:
          - /url: "#fn-ch1-3"
      - text: "This, then, is the basic paradox of the dream: the unconscious desire, that which is supposedly its most hidden kernel, articulates itself precisely through the dissimulation work of the 'kernel' of a dream, its latent thought, through the work of disguising this content-kernel by means of its translation into the dream-rebus. Again, as characteristically, Freud gave this paradox its final formulation in a footnote added in a later edition:"
    - paragraph [ref=e190]: I used at one time to find it extraordinarily difficult to accustom readers to the distinction between the manifest content of dreams and the latent dream-thoughts. Again and again arguments and objections would be brought up based upon some uninterpreted dream in the form in which it had been retained in the memory, and the need to interpret it would be ignored. But now that analysts at least have become reconciled to replacing the manifest dream by the meaning revealed by its interpretation, many of them have become guilty of falling into another confusion which they cling to with an equal obstinacy. They seek to find the essence of dreams in their latent content and in so doing they overlook the distinction between the latent dream-thoughts and the dream-work.
    - paragraph [ref=e191]:
      - text: At bottom, dreams are nothing other than a particular form of thinking, made possible by the conditions of the state of sleep. It is the dream-work which creates that form, and it alone is the essence of dreaming - the explanation of its peculiar nature.
      - superscript [ref=e193]:
        - link "4" [ref=e194]:
          - /url: "#fn-ch1-4"
    - paragraph [ref=e195]: "Freud proceeds here in two stages:"
    - paragraph [ref=e196]: • First, we must break the appearance according to which a dream is nothing but a simple and meaningless confusion, a disorder caused by physiological processes and as such having nothing whatsoever to do with signification.
    - paragraph [ref=e197]: In other words, we must accomplish a crucial step towards a hermeneutical approach and conceive the dream as a meaningful phenomenon, as something transmitting a repressed message which has to be discovered by an interpretative procedure;
    - paragraph [ref=e198]: • Then we must get rid of the fascination in this kernel of signification, in the 'hidden meaning' of the dream - that is to say, in the content concealed behind the form of a dream - and centre our attention on this form itself, on the dream-work to which the 'latent dream-thoughts' were submitted.
    - paragraph [ref=e199]: "The crucial thing to note here is that we find exactly the same articulation in two stages with Marx, in his analysis of the 'secret of the commodity form':"
    - paragraph [ref=e200]:
      - text: "• First, we must break the appearance according to which the value of a commodity depends on pure hazard - on an accidental interplay between supply and demand, for example. We must accomplish the crucial step of conceiving the hidden 'meaning' behind the commodity-form, the signification 'expressed' by this form; we must penetrate the 'secret' of the value of commodities: The determination of the magnitude of value by labour-time is therefore a secret, hidden under the apparent fluctuations in the relative values of commodities. Its discovery, while removing all appearance of mere accidentality from the determination of the magnitude of the values of products, yet in no way alters the mode in which that determination takes place."
      - superscript [ref=e202]:
        - link "5" [ref=e203]:
          - /url: "#fn-ch1-5"
    - paragraph [ref=e204]: "• But as Marx points out, there is a certain 'yet': the unmasking of the secret is not sufficient. Classical bourgeois political economy has already discovered the 'secret' of the commodity-form; its limit is that it is not able to disengage itself from this fascination in the secret hidden behind the commodity-form - that its attention is captivated by labour as the true source of wealth."
    - paragraph [ref=e205]: "In other words, classical political economy is interested only in contents concealed behind the commodity-form, which is why it cannot explain the true secret, not the secret behind the form but the secret of this form itself In spite of its quite correct explanation of the 'secret of the magnitude of value', the commodity remains for classical political economy a mysterious, enigmatic thing - it is the same as with the dream: even after we have explained its hidden meaning, its latent thought, the dream remains an enigmatic phenomenon; what is not yet explained is simply its form, the process by means of which the hidden meaning disguised itself in such a form."
    - paragraph [ref=e206]:
      - text: "We must, then, accomplish another crucial step and analyse the genesis of the commodity-form itself It is not sufficient to reduce the form to the essence, to the hidden kernel, we must also examine the process - homologous to the 'dream-work' - by means of which the concealed content assumes such a form, because, as Marx points out: 'Whence, then, arises the enigmatical character of the product of labour, as soon as it assumes the form of commodities? Clearly from this form itself'."
      - superscript [ref=e208]:
        - link "6" [ref=e209]:
          - /url: "#fn-ch1-6"
      - text: "It is this step towards the genesis of the form that classical political economy cannot accomplish, and this is its crucial weakness: political economy has indeed analysed value and its magnitude, however incompletely, and has uncovered the content concealed within these forms. But it has never once asked the question why this content has assumed that particular form, that is to say, why labour is expressed in value, and why the measurement of labour by its duration is expressed in the magnitude of the value of the product."
      - superscript [ref=e211]:
        - link "7" [ref=e212]:
          - /url: "#fn-ch1-7"
    - heading "The Unconscious of the Commodity-Form" [level=3] [ref=e213]
    - paragraph [ref=e214]: "Why did the Marxian analysis of the commodity-form - which, prima facie, concerns a purely economic question - exert such an influence in the general field of social sciences; why has it fascinated generations of philosophers, sociologists, art historians, and others? Because it offers a kind of matrix enabling us to generate all other forms of the 'fetishistic inversion': it is as if the dialectics ofthe commodity-form presents us with a pure distilled, so to speak - version of a mechanism offering us a key to the theoretical understanding of phenomena which, at first sight, have nothing whatsoever to do with the field of political economy (law, religion, and so on). In the commodity-form there is definitely more at stake than the commodity-form itself, and it was precisely this 'more' which exerted such a fascinating power of attraction."
    - paragraph [ref=e215]:
      - text: The theoretician who has gone furthest in unfolding the universal reach of the commodity-form is indubitably Alfred Sohn-Rethel, one of the 'fellow-travellers' of the Frankfurt School. His fundamental thesis was that the formal analysis of the commodity holds the key not only to the critique of political economy, but also to the historical explanation of the abstract conceptual mode of thinking and of the division of intellectual and manual labour which came into existence with it.
      - superscript [ref=e217]:
        - link "8" [ref=e218]:
          - /url: "#fn-ch1-8"
    - paragraph [ref=e219]: "In other words, in the structure of the commodity-form it is possible to find the transcendental subject: the commodity-form articulates in advance the anatomy, the skeleton of the Kantian transcendental subject - that is, the network of transcendental categories which constitute the a priori frame of'objective' scientific knowledge."
    - paragraph [ref=e220]: "Herein lies the paradox of the commodity-form: it - this inner-worldly, 'pathological' (in the Kantian meaning of the word) phenomenon - offers us a key to solving the fundamental question of the theory of knowledge: objective knowledge with universal validity - how is this possible?"
    - paragraph [ref=e221]: "After a series of detailed analyses, Sohn-Rethel came to the following conclusion: the apparatus of categories presupposed, implied by the scientific procedure (that, of course, of the Newtonian science of nature), the network of notions by means of which it seizes nature, is already present in the social effectivity, already at work in the act of commodity exchange. Before thought could arrive at pure abstraction, the abstraction was already at work in the social effectivity of the market."
    - paragraph [ref=e222]: "The exchange of commodities implies a double abstraction: the abstraction from the changeable character of the commodity during the act of exchange and the abstraction from the concrete, empirical, sensual, particular character of the commodity (in the act of exchange, the distinct, particular qualitative determination of a commodity is not taken into account; a commodity is reduced to an abstract entity which - irrespective of its particular nature, of its 'use-value' - possesses 'the same value' as another commodity for which it is being exchanged). Before thought could arrive at the idea of a purely quantitative determination, a sine qua non of the modern science of nature, pure quantity was already at work in money, that commodity which renders possible the commensurability of the value of all other commodities notwithstanding their particular qualitative determination. Before physics could articulate the notion of a purely abstract movement going on in a geometric space, independently of all qualitative determinations of the moving objects, the social act of exchange had already realized such a 'pure', abstract movement which leaves totally intact the concrete-sensual properties of the object caught in movement: the transference of property. And Sohn-Rethel demonstrated the same about the relationship of substance and its accidents, about the notion of causality operative in Newtonian science - in short, about the whole network of categories of pure reason. In this way, the transcendental subject, the support of the net of a priori categories, is confronted with the disquieting fact that it depends, in its very formal genesis, on some inner-worldly, 'pathological' process - a scandal, a nonsensical impossibility from the transcendental point of view, in so far as the formal-transcendental a priori is by definition independent of all positive contents: a scandal corresponding perfectly to the 'scandalous' character of the Freudian unconscious, which is also unbearable from the transcendental-philosophical perspective. That is to say, if we look closely at the ontological status of what Sohn-Rethel calls the 'real abstraction' [die reale Abstraktion] (that is, the act of abstraction at work in the very effective process of the exchange of commodities), the homology between its status and that of the unconscious, this signifying chain which persists on 'another Scene', is striking: the 'real abstraction' is the unconscious of the transcendental subject, the support of objective-universal scientific knowledge. On the one hand, the 'real abstraction' is of course not 'real' in the sense of the real, effective properties of commodities as material objects: the object-commodity does not contain 'value' in the same way as it possesses a set of particular properties determining its 'use-value' (its form, colour, taste, and so on)."
    - paragraph [ref=e223]:
      - text: "As Sohn-Rethel pointed out, its nature is that of a postulate implied by the effective act of exchange - in other words, that of a certain 'as if [als obJ: during the act of exchange, individuals proceed as if the commodity is not submitted to physical, material exchanges; as if it is excluded from the natural cycle of generation and corruption; although on the level of their 'consciousness' they 'know very well' that this is not the case. The easiest way to detect the effectivity of this postulate is to think of the way we behave towards the materiality of money: we know very well that money, like all other material objects, suffers the effects of use, that its material body changes through time, but in the social effectivity of the market we none the less treat coins as if they consist 'of an immutable substance, a substance over which time has no power, and which stands in antithetic contrast to any matter found in nature'."
      - superscript [ref=e225]:
        - link "9" [ref=e226]:
          - /url: "#fn-ch1-9"
    - paragraph [ref=e227]: "How tempting to recall here the formula of fetishistic disavowal: '1 know very well, but still... '. To the current exemplifications of this formula ('I know that Mother has not got a phallus, but still... [I believe she has got one],; 'I know that Jews are people like us, but still... [there is something in them],) we must undoubtedly add also the variant of money: 'I know that money is a material object like others, but still... [it is as if it were made of a special substance over which time has no power)'."
    - paragraph [ref=e228]: "Here we have touched a problem unsolved by Marx, that of the material character of money: not of the empirical, material stuff money is made of, but of the sublime material, of that other 'indestructible and immutable' body which persists beyond the corruption of the body physical - this other body of money is like the corpse of the Sadeian victim which endures all torments and survives with its beauty immaculate. This immaterial corporality of the 'body within the body' gives us a precise definition of the sublime object, and it is in this sense only that the psychoanalytic notion of money as a 'pre-phallic', 'anal' object is acceptable - provided that we do not forget how this postulated existence of the sublime body depends on the symbolic order: the indestructible 'body-within-the-body' exempted from the effects of wear and tear is always sustained by the guarantee of some symbolic authority:"
    - paragraph [ref=e229]:
      - text: A coin has it stamped upon its body that it is to serve as a means of exchange and not as an object of use. Its weight and metallic purity are guaranteed by the issuing authority so that, if by the wear and tear of circulation it has lost in weight, full replacement is provided. Its physical matter has visibly become a mere carrier of its social function.
      - superscript [ref=e231]:
        - link "10" [ref=e232]:
          - /url: "#fn-ch1-10"
    - paragraph [ref=e233]: "If, then, the 'real abstraction' has nothing to do with the level of'reality', of the effective properties, of an object, it would be wrong for that reason to conceive of it as a 'thought-abstraction', as a process taking place in the 'interior' of the thinking subject: in relation to this 'interior', the abstraction appertaining to the act of exchange is in an irreducible way external, decentred - or, to quote Sohn-Rethel's concise formulation: 'The exchange abstraction is not thought, but it has the form of thought.'"
    - paragraph [ref=e234]: "Here we have one of the possible definitions of the unconscious: the form of thought whose ontological status is not that of thought, that is to say, the form of thought external to the thought itself - in short, some Other Scene external to the thought whereby the form of the thought is already articulated in advance."
    - paragraph [ref=e235]: "The symbolic order is precisely such a formal order which supplements and/or disrupts the dual relationship of 'external' factual reality and 'internal' subjective experience; Sohn-Rethel is thus quite justified in his criticism of Althusser, who conceives abstraction as a process taking place entirely in the domain of knowledge and refuses for that reason the category of 'real abstraction' as the expression of an 'epistemological confusion'. The 'real abstraction' is unthinkable in the frame of the fundamental Althusserian epistemological distinction between the 'real object' and the 'object of knowledge' in so far as it introduces a third element which subverts the very field of this distinction: the form of the thought previous and external to the thought - in short: the symbolic order."
    - paragraph [ref=e236]: "We are now able to formulate precisely the 'scandalous' nature of Sohn-Rethel's undertaking for philosophical reflection: he has confronted the closed circle of philosophical reflection with an external place where its form is already 'staged'. Philosophical reflection is thus subjected to an uncanny experience similar to the one summarized by the old oriental formula 'thou art that': there, in the external effectivity of the exchange process, is your proper place; there is the theatre in which your truth was performed before you took cognizance of it. The confrontation with this place is unbearable because philosophy as such is defined by its blindness to this place: it cannot take it into consideration without dissolving itself, without losing its consistency."
    - paragraph [ref=e237]: This does not mean, on the other hand, that everyday 'practical' consciousness, as opposed to the philosophical-theoretical one - the consciousness of the individuals partaking in the act of exchange - is not also subjected to a complementary blindness.
    - paragraph [ref=e238]:
      - text: "During the act of exchange, individuals proceed as 'practical solipsists', they misrecognize the socio-synthetic function of exchange: that is the level of the 'real abstraction' as the form of socialization of private production through the medium of the market: 'What the commodity owners do in an exchange relation is practical solipsism - irrespective of what they think and say about it'."
      - superscript [ref=e240]:
        - link "11" [ref=e241]:
          - /url: "#fn-ch1-11"
    - paragraph [ref=e242]: "Such a misrecognition is the sine qua non of the effectuation of an act of exchange - if the participants were to take note of the dimension of'real abstraction', the 'effective' act of exchange itself would no longer be possible:"
    - paragraph [ref=e243]:
      - text: Thus, in speaking of the abstractness of exchange we must be careful not to apply the term to the consciousness of the exchange agents. They are supposed to be occupied with the use of the commodities they see, but occupied in their imagination only. It is the action of exchange, and the action alone, that is abstract... the abstractness of that action cannot be noted when it happens because the consciousness of its agents is taken up with their business and with the empirical appearance of things which pertain to their use. One could say that the abstractness of their action is beyond realization by the actors because their very consciousness stands in the way. Were the abstractness to catch their minds their action would cease to be exchange and the abstraction would not arise.
      - superscript [ref=e245]:
        - link "12" [ref=e246]:
          - /url: "#fn-ch1-12"
    - paragraph [ref=e247]: "This misrecognition brings about the fissure of the consciousness into 'practical' and 'theoretical': the proprietor partaking in the act of exchange proceeds as a 'practical solipsist': he overlooks the universal, socio-synthetic dimension of his act, reducing it to a casual encounter of atomized individuals in the market. This 'repressed' social dimension of his act emerges thereupon in the form of its contrary - as universal Reason turned towards the observation of nature (the network of categories of 'pure reason' as the conceptual frame of natural sciences)."
    - paragraph [ref=e248]: "The crucial paradox of this relationship between the social effectivity of the commodity exchange and the 'consciousness' of it is that - to use again a concise formulation by Sohn-Rethel - 'this non-knowledge of the reality is part of its very essence': the social effectivity of the exchange process is a kind of reality which is possible only on condition that the individuals partaking in it are not aware of its proper logic; that is, a kind of reality whose very ontological consistency implies a certain non-knowledge of its participants - if we come to 'know too much', to pierce the true functioning of social reality, this reality would dissolve itself."
    - paragraph [ref=e249]: "This is probably the fundamental dimension of 'ideology': ideology is not simply a 'false consciousness', an illusory representation of reality, it is rather this reality itself which is already to be conceived as 'ideological' - 'ideological' is a social reality whose very existence implies the non-knowledge of its participants as to its essence - that is, the social effectivity, the very reproduction of which implies that the individuals 'do not know what they are doing'. 'Ideological' is not the 'false consciousness' of a (social) being but this being itself in so far as it is supported by 'false consciousness'. Thus we have finally reached the dimension of the symptom, because one of its possible definitions would also be 'a formation whose very consistency implies a certain non-knowledge on the part of the subject': the subject can 'enjoy his symptom' only in so far as its logic escapes him - the measure of the success of its interpretation is precisely its dissolution."
    - heading "The Social Symptom" [level=3] [ref=e250]
    - paragraph [ref=e251]: How, then, can we define the Marxian symptom?
    - paragraph [ref=e252]: "Marx 'invented the symptom' (Lacan) by means of detecting a certain fissure, an asymmetry, a certain 'pathological' imbalance which belies the universalism of the bourgeois 'rights and duties'. This imbalance, far from announcing the 'imperfect realization' of these univƮrsal principles - that is, an insuffi ciency to be abolished by further development - functions as their consti tutive moment: the 'symptom' is, strictly speaking, a particular element which subverts its own universal foundation, a species subverting its own genus. In this sense, we can say that the elementary Marxian procedure of 'criticism of ideology' is already 'symptomatic': it consists in detecting a point of breakdown hetero8enous to a given ideological field and at the same time necessary for that field to achieve its do sun:, its accomplished form. This procedure thus implies a certain logic of exception: every ideolog ical Universal - for example freedom, equality - is 'false' in so far as it necessarily includes a specific case which breaks its unity, lays open its falsity. Freedom, for example: a universal notion comprising a number of species (freedom of speech and press, freedom of consciousness, freedom of commerce, political freedom, and so on) but also, by means of a structural freedom is the very opposite of effective freedom: by selling his labour 'freely', the worker loses his freedom - the real content of this free act of sale is the worker's enslavement to capitaL"
    - paragraph [ref=e253]: "The crucial point is, of course, that it is precisely this paradoxical freedom, the form of its opposite, which closes the circle of 'bourgeois freedoms'. The same can also be shown for fair, equivalent exchange, this ideal of the market. When, in pre-capitalist society, the production of commodities has not yet attained universal character - that is, when it is still so-called 'natural production' which predominates - the proprietors of the means of production are still themselves producers (as a rule, at least): it is artisan production; the proprietors themselves work and sell their products on the market. At this stage of development there is no exploitation (in principle, at least - that is, if we do not consider the exploitation of apprentices, and so on); the exchange on the market is equivalent, every commodity is paid its full value. But as soon as production for the market prevails in the economic edifice of a given society, this generalization is necessarily accompanied by the appearance of a new, paradoxical type of commodity: the labour force, the workers who are not themselves proprietors of the means of production and who are consequently obliged to sell on the market their own labour instead of the products of their labour. With this new commodity, the equivalent exchange becomes its own negation - the very form of exploitation, of appropriation of the surplusvalue."
    - paragraph [ref=e254]: "The crucial point not to be missed here is that this negation is strictly intemalto equivalent exchange, not its simple violation: the labour force is not 'exploited' in the sense that its full value is not remunerated; in principle at least, the exchange between labour and capital is wholly equivalent and equitable. The catch is that the labour force is a peculiar commodity, the use of which - labour itself- produces a certain surplusvalue, and it is this surplus over the value of the labour force itself which is appropriated by the capitalist. We have here again a certain ideological Universal, that of equivalent and equitable exchange, and a particular paradoxical exchange - that of the labour force for its wages - which, precisely as an equivalent, functions as the very form of exploitation."
    - paragraph [ref=e255]: The 'quantitative' development itself, the universalization of the production of commodities, brings about a new 'quality', the emergence of a new commodity representing the internal negation of the universal principle of equivalent exchange of commodities; in other words, it brings about a symptom.
    - paragraph [ref=e256]: And in the Marxian perspective, utopian socialism consists in the very belief that a society is possible in which the relations of exchange are universalized and production for the market predominates, but workers themselves none the less remain proprietors of their means of production and are therefore not exploited - in short, 'utopian' conveys a belief in the possibility of a universality without itssymptom, without the point of exception functioning as its internal negation.
    - paragraph [ref=e257]: "This is also the logic of the Marxian critique of Hegel, of the Hegelian notion of society as a rational totality: as soon as we try to conceive the existing social order as a rational totality, we must include in it a paradoxical element which, without ceasing to be its internal constituent, functions as its symptom - subverts the very universal rational principle of this totality. For Marx, this 'irrational' element of the existing society was, of course, the proletariat, 'the unreason of reason itself (Marx), the point at which the Reason embodied in the existing social order encounters its own unreason."
    - heading "Commodity Fetishism" [level=3] [ref=e258]
    - paragraph [ref=e259]:
      - text: "In his attribution of the discovery of the symptom to Marx, Lacan is, however, more distinct: he locates this discovery in the way Marx conceived the passage from feudalism to capitalism: 'One has to look for the origins of the notion of symptom not in Hippocrates but in Marx, in the connection he was first to establish between capitalism and what? - the good old times, what we call the feudal times."
      - superscript [ref=e261]:
        - link "13" [ref=e262]:
          - /url: "#fn-ch1-13"
    - paragraph [ref=e263]: To grasp the logic of this passage from feudalism to capitalism we have first to elucidate its theoretical background, the Marxian notion of commodity fetishism.
    - paragraph [ref=e264]:
      - text: In a first approach, commodity fetishism is 'a definite social relation between men, that assumes, in their eyes, the fantastic form of a relation between things'.
      - superscript [ref=e266]:
        - link "14" [ref=e267]:
          - /url: "#fn-ch1-14"
      - text: "The value of a certain commodity, which is effectively an insignia of a network of social relations between producers of diverse commodities, assumes the form of a quasi-'natural' property of another thing-commodity, money: we say that the value of a certain commodity is such-and-such amount of money."
    - paragraph [ref=e268]: "Consequently, the essential feature of commodity fetishism does not consist of the famous replacement of men with things ('a relation between men assumes the form of a relation between things'); rather, it consists of a certain misrecognition which concerns the relation between a structured network and one of its elements: what is really a structural effect, an effect of the network of relations between elements, appears as an immediate property of one of the elements, as if this property also belongs to it outside its relation with other elements."
    - paragraph [ref=e269]: Such a misrecognition can take place in a 'relation between things' as well as in a 'relation between men' - Marx states this explicitly apropos of the simple form of the value-expression.
    - paragraph [ref=e270]: "The commodity A can express its value only by referring itself to another commodity, B, which thus becomes its equivalent: in the value relationship, the natural form of the commodity B (its use-value, its positive, empirical properties) functions as a form of value of the commodity A; in other words, the body of B becomes for A the mirror of its value. To these reflections, Marx added the following note:"
    - paragraph [ref=e271]:
      - text: In a sort of way, it is with man as with commodities. Since he comes into the world neither with a looking-glass in his hand, nor as a Fichtian philosopher, to whom 'I am I' is sufficient, man first sees and recognizes himself in other men. Peter only establishes his own identity as a man by first comparing himself with Paul as being of the kind. And thereby Paul, just as he stands in his Pauline personality, becomes to Peter the type of the genus homo.
      - superscript [ref=e273]:
        - link "15" [ref=e274]:
          - /url: "#fn-ch1-15"
    - paragraph [ref=e275]: "This short note anticipates in a way the Lacanian theory of the mirror stage: only by being reflected in another man - that is, in so far as this other man offers it an image of its unity - can the ego arrive at its self-identity; identity and alienation are thus strictly correlative."
    - paragraph [ref=e276]: "Marx pursues this homology: the other commodity (B) is an equivalent only in so far as A relates to it as to the form-of-appearance of its own value, only within this relationship. But the appearance -and herein lies the effect of inversion proper to fetishism - the appearance is exactly opposite: A seems to relate to B as if, for B, to be an equivalent of A would not be a 'reflexive determination' (Marx) of A - that is as if B would already in itself be the equivalent of A; the property of 'being-an-equivalent' appears to belong to it even outside its relation to A, on the same level as its other 'natural' effective properties constituting its use-value. To these reflections, Marx again added a very interesting note:"
    - paragraph [ref=e277]:
      - text: Such expressions of relations in general, called by Hegel reflex-categories, form a very curious class. For instance, one man is king only because other men stand in the relation of subjects to him. They, on the contrary, imagine that they are subjects because he is king.
      - superscript [ref=e279]:
        - link "16" [ref=e280]:
          - /url: "#fn-ch1-16"
    - paragraph [ref=e281]: "'Being-a-king' is an effect of the network of social relations between a 'king' and his 'subjects'; but - and here is the fetishistic misrecognition to the participants of this social bond, the relationship appears necessarily in an inverse form: they think that they are subjects giving the king royal treatment because the king is already in himself, outside the relationship to his subjects, a king; as if the determination of 'being-a-king' were a 'natural' property of the person of a king."
    - paragraph [ref=e282]: How can one not remind oneself here of the famous Lacanian affirmation that a madman who believes himself to be a king is no more mad than a king who believes himself to be a king - who, that is, identifies immediately with the mandate 'king'?
    - paragraph [ref=e283]: "What we have here is thus a parallel between two modes of fetishism, and the crucial question concerns the exact relationship between these two levels. That is to say, this relationship is by no means a simple homology: we cannot say that in societies in which production for the market predominates - ultimately, that is, in capitalist societies -'it is with man as with commodities'. Precisely the opposite is true: commodity fetishism occurs in capitalist societies, but in capitalism relations between men are definitely not 'fetishized'; what we have here are relations between 'free' people, each following his or her proper egoistic interest The predominant and determining form of their interrelations is not domination and servitude but a contract between free people who are equal in the eyes of the law. Its model is the market exchange: here, two subjects meet, their relation is free of all the lumber of veneration of the Master, of the Master's patronage and care for his subjects; they meet as two persons whose activity is thoroughly determined by their egoistic interest, every one of them proceeds as a good utilitarian; the other person is for him wholly delivered of all mystical aura; all he sees in his partner is another subject who follows his interest and interests him only in so far as he possesses something - a commodity - that could satisfy some of his needs."
    - paragraph [ref=e284]: "The two forms of fetishism are thus incompatible: in societies in which commodity fetishism reigns, the 'relations between men' are totally defetishized, while in societies in which there is fetishism in 'relations between men' - in pre-capitalist societies - commodity fetishism is not yet developed, because it is 'natural' production, not production for the market, which predominates."
    - paragraph [ref=e285]:
      - text: "This fetishism in relations between men has to be called by its proper name: what we have here are, as Marx points out, 'relations of domination and servitude' - that is to say, precisely the relation of Lordship and Bondage in a Hegelian sense;"
      - superscript [ref=e287]:
        - link "17" [ref=e288]:
          - /url: "#fn-ch1-17"
      - text: "and it is as if the retreat of the Master in capitalism was only a displacement: as if the defetishization in the 'relations between men' was paid for by the emergence of fetishism in the 'relations between things' - by commodity fetishism. The place of fetishism has just shifted from inter-subjective relations to relations 'between things': the crucial social relations, those of production, are no longer immediately transparent in the form of the interpersonal relations of domination and servitude (of the Lord and his serfs, and so on); they disguise themselves - to use Marx's accurate formula - 'under the shape of social relations between things, between the products of labour'."
    - paragraph [ref=e289]: This is why one has to look for the discovery of the symptom in the way Marx conceived the passage from feudalism to capitalism.
    - paragraph [ref=e290]:
      - text: "With the establishment of bourgeois society, the relations of domination and servitude are repressed: formally, we are apparently concerned with free subjects whose interpersonal relations are discharged of all fetishism; the repressed truth - that of the persistence of domination and servitude emerges in a symptom which subverts the ideological appearance of equality, freedom, and so on. This symptom, the point of emergence of the truth about social relations, is precisely the 'social relations between things' - in contrast to feudal society, where no matter what we may think of the parts played by the different classes of people themselves in this society, the social relations between individuals in the performance of their labour appear at all events as their own mutual personal relations, and are not disguised under the shape of social relations between things, between the products of labour."
      - superscript [ref=e292]:
        - link "18" [ref=e293]:
          - /url: "#fn-ch1-18"
      - text: "'Instead of appearing at all events as their own mutual relations, the social relations between individuals are disguised under the shape of social relations between things' - here we have a precise definition of the hysterical symptom, of the 'hysteria of conversion' proper to capitalism."
    - heading "Totalitarian Laughter" [level=3] [ref=e294]
    - paragraph [ref=e295]: "Here Marx is more subversive than the majority of his contemporary critics who discard the dialectics of commodity fetishism as outdated: this dialectics can still help us to grasp the phenomenon of so-called 'totalitarianism'. Let us take as our starting point Umberto Eco's Name f! the Rose, precisely because there is something wrong with this book. This criticism does not apply only to its ideology, which might be called - on the model of spaghetti Westerns - spaghetti structuralism: a kind of simplified, mass-culture version of structuralist and post-structuralist ideas (there is no final reality, we all live in a world of signs referring to other signs...). What should bother us about this book is its basic underlying thesis: the source of totalitarianism is a dogmatic attachment to the official word: the lack of laughter, of ironic detachment. An excessive commitment to Good may in itselfhecome the greatest Evil: real Evil is any kind offanatical dogmatism, especially that exerted in the name of the supreme Good. This thesis is already part of the enlightened version of religious belief itself: if we become too obsessed with the Good and with a corresponding hate for the secular, our obsession with Good may itself turn into a force of Evil, a form of destructive hatred for all that fails to correspond to our idea of Good. The real Evil is the supposedly innocent gaze which perceives in the world nothing but Evil, as in The Tum cifthe Screw by Henry James, in which the real Evil is, of course, the gaze of the storyteller (the young governess) herself... First, this idea of an obsession with (a fanatical devotion to) Good turning into Evil masks the inverse experience, which is much more disquieting: how an obsessive, fanatical attachment to Evil may in itself acquire the status of an ethical position, of a position which is not guided by our egoistical interests. Consider only Mozart's Don Giovanni at the end of the opera, when he is confronted with the following choice: if he confesses his sins, he can still achieve salvation; if he persists, he will be damned for ever. From the viewpoint of the pleasure principle, the proper thing to do would be to renounce his past, but he does not, he persists in his Evil, although he knows that by persisting he will be damned for ever. Paradoxically, with his final choice of Evil, he acquires the status of an ethical hero - that is, of someone who is guided by fundamental principles 'beyond the pleasure principle' and not just by the search for pleasure or material gain. What is really disturbing about The Name of tile Rose, however, is the underlying belief in the liberating, anti-totalitarian force oflaughter, of ironic distance. Our thesis here is almost the exact opposite of this under lying premiss of Eco's novel: in contemporary societies, democratic or totalitarian, that cynical distance, laughter, irony, are, so to speak, part of the game. The ruling ideology is not meant to be taken seriously or literally. Perhaps the greatest danger for totalitarianism is people who take its ideology literally - even in Eco's novel, poor old Jorge, the incarnation of dogmatic belief who does not laugh, is rather a tragic figure: outdated, a kind of living dead, a remnant of the past, certainly not a person representing the existing social and political powers. What conclusion should we draw from this? Should we say that we live in a post-ideological society? Perhaps it would be better, first, to try to specify what we mean by ideology."
    - heading "Cynicism as a Form of Ideology" [level=3] [ref=e296]
    - paragraph [ref=e297]: "The most elementary definition of ideology is probably the well-known phrase from Marx's Capital: 'sie wissen das nicht, aber sie tun es' - 'they do not know it, but they are doing it'. The very concept of ideology implies a kind of basic, constitutive naivete: the misrecognition of its own presuppositions, of its own effective conditions, a distance, a divergence between so-called social reality and our distorted representation, our false consciousness of it. That is why such a 'naive consciousness' can be submitted to a critical-ideological procedure. The aim of this procedure is to lead the naive ideological consciousness to a point at which it can recognize its own effective conditions, the social reality that it is distorting, and through this very act dissolve itself In the more sophisticated versions of the critics of ideology - that developed by the Frankfurt School, for example - it is not just a question of seeing things (that is, social reality] as they 'really are', of throwing away the distorting spectacles of ideology; the main point is to see how the reality itself cannot reproduce itself without this so-called ideological mystification. The mask is not simply hiding the real state of things; the ideological distortion is written into its very essence. We find, then, the paradox of a being which can reproduce itself only in so far as it is misrecognized and overlooked: the moment we see it 'as it really is', this being dissolves itself into nothingness or, more precisely, it changes into another kind of reality. That is why we must avoid the simple metaphors of dernasking, of throwing away the veils which are supposed to hide the naked reality. We can see why Lacan, in his seminar on The Ethic of Psychoanalysis, distances himself from the liberating gesture of saying finally that 'the emperor has no clothes'."
    - paragraph [ref=e298]:
      - text: "The point is, as Lacan puts it, that the emperor is naked only beneath his clothes, so if there is an unmasking gesture of psychoanalysis, it is closer to Alphonse Allais's well-known joke, quoted by Lacan: somebody points at a woman and utters a horrified cry, 'Look at her, what a shame, under her clothes, she is totally naked'."
      - superscript [ref=e300]:
        - link "19" [ref=e301]:
          - /url: "#fn-ch1-19"
    - paragraph [ref=e302]: "But all this is already well known: it is the classic concept of ideology as 'false consciousness', misrecognition of the social reality which is part of this reality itself"
    - paragraph [ref=e303]: "Our question is: Does this concept of ideology as a naive consciousness still apply to today's world? Is it still operating today? In the Critique of Cynical Reason, a great bestseller in Germany, Peter Sloterdijk puts forward the thesis that ideology's dominant mode of functioning is cynical, which renders impossible - or, more precisely, vain - the classic critical-ideological procedure."
    - paragraph [ref=e304]: The cynical subject is quite aware of the distance between the ideological mask and the social reality, but he none the less still insists upon the mask.
    - paragraph [ref=e305]: "The formula, as proposed by Sloterdijk, would then be: 'they know very well what they are doing, but still, they are doing it'. Cynical reason is no longer naive, but is a paradox of an enlightened false consciousness: one knows the falsehood very well, one is well aware of a particular interest hidden behind an ideological universality, but still one does not renounce it. We must distinguish this cynical position strictly from what Sloterdijk calls kynicism. Kynicism represents the popular, plebeian rejection of the official culture by means of irony and sarcasm: the classical kynical procedure is to confront the pathetic phrases of the ruling official ideology its solemn, grave tonality - with everyday banality and to hold them up to ridicule, thus exposing behind the sublime noblesse of the ideological phrases the egotistical interests, the violence, the brutal claims to power. This procedure, then, is more pragmatic than argumentative: it subverts the official proposition by confronting it with the situation of its enunciation; it proceeds ad hominem (for example when a politician preaches the duty of patriotic sacrifice, kynicism exposes the personal gain he is making from the sacrifice of others). Cynicism is the answer of the ruling culture to this kynical subversion: it recognizes, it takes into account, the particular interest behind the ideological universality, the distance between the ideological mask and the reality, but it still finds reasons to retain the mask. This cynicism is not a direct position of immorality, it is more like morality itself put in the service of immorality - the model of cynical wisdom is to conceive probity, integrity, as a supreme form of dishonesty, and morals as a supreme form of profligacy, the truth as the most effective form of a lie. This cynicism is therefore a kind of perverted 'negation of the negation' of the official ideology: confronted with illegal enrichment, with robbery, the cynical reaction consists in saying that legal enrichment is a lot more effective and, moreover, protected by the law. As Berrolt Brecht puts it in his Threepenny Opera: 'what is the robbery of a bank compared to the founding of a new bank?' It is clear, therefore, that confronted with such cynical reason, the traditional critique of ideology no longer works. We can no longer subject the ideological text to 'symptomatic reading', confronting it with its blank spots, with what it must repress to organize itself, to preserve its consistency - cynical reason takes this distance into account in advance. Is then the only issue left to us to affirm that, with the reign of cynical reason, we find ourselves in the so-called post-ideological world? Even Adorno came to this conclusion, starting from the premiss that ideology is, strictly speaking, only a system which makes a claim to the truth that is, which is not simply a lie but a lie experienced as truth, a lie which pretends to be taken seriously. Totalitarian ideology no longer has this pretension."
    - paragraph [ref=e306]: "It is no longer meant, even by its authors, to be taken seriously - its status is just that of a means of manipulation, purely external and instrumental; its rule is secured not by its truth-value but by simple extraideological violence and promise of gain. It is here, at this point, that the distinction between!ymptom andfantasy must be introduced in order to show how the idea that we live in a postideological society proceeds a little too quickly: cynical reason, with all its ironic detachment, leaves untouched the fundamental level ofideological fantasy, the level on which ideology structures the social reality itself"
    - heading "Ideological Fantasy" [level=3] [ref=e307]
    - paragraph [ref=e308]: "If we want to grasp this dimension of fantasy, we must return to the Marxian formula 'they do not know it, but they are doing it', and pose ourselves a very simple question: where is the place of ideological illusion, in the 'knowing or in the 'doini in the reality itself?"
    - paragraph [ref=e309]: "At first sight, the answer seems obvious: ideological illusion lies in the 'knowing'. It is a matter of a discordance between what people are effectively doing and what they think they are doing - ideology consists in the very fact that the people 'do not know what they are really doing', that they have a false representation of the social reality to which they belong (the distortion produced, of course, by the same reality). Let us take again the classic Marxian example of so-called commodity fetishism: money is in reality just an embodiment, a condensation, a materialization of a network of social relations - the fact that it functions as a universal equivalent of all commodities is conditioned by its position in the texture of social relations. But to the individuals themselves, this function of money - to be the embodiment of wealth - appears as an immediate, natural property of a thing called 'money', as if money is already in itself, in its immediate material reality, the embodiment of wealth. Here, we have touched upon the classic Marxist motive of'reification': behind the things, the relation between things, we must detect the social relations, the relations between human subjects. But such a reading of the Marxian formula leaves out an illusion, an error, a distortion which is already at work in the social reality itself, at the level of what the individuals are doing, and not only what they think or know they are doing. When individuals use money, they know very well that there is nothing magical about it - that money, in its materiality, is simply an expression of social relations. The everyday spontaneous ideology reduces money to a simple sign giving the individual possessing it a right to a certain part of the social product. So, on an everyday level, the individuals know very well that there are relations between people behind the relations between things."
    - paragraph [ref=e310]:
      - text: "The problem is that in their social activity itself, in what they are doing, they are acting as if money, in its material reality, is the immediate embodiment of wealth as such. They are fetishists in practice, not in theory. What they' do not know', what they misrecognize, is the fact that in their social reality itself, in their social activity - in the act of commodity exchange - they are guided by the fetishistic illusion. To make this clear, let us again take the classic Marxian motive of the speculative inversion of the relationship between the Universal and the Particular. The Universal is just a property of particular objects which really exist, but when we are victims of commodity fetishism it appears as if the concrete content of a commodity (its use-value) is an expression of its abstract universality (its exchange-value) - the abstract Universal, the Value, appears as a real Substance which successively incarnates itself in a series of concrete objects. That is the basic Marxian thesis: it is already the effective world of commodities which behaves like a Hegelian subjectsubstance, like a Universal going through a series of particular embodiments. Marx speaks about 'commodity metaphysics', about the 'religion of everyday life'. The roots of philosophical speculative idealism are in the social reality of the world of commodities; it is this world which behaves 'idealistically' - or, as Marx puts it in the first chapter of the first edition of Capital: This inversion through which what is sensible and concrete counts only as a phenomenal form of what is abstract and universal, contrary to the real state of things where the abstract and the universal count only as a property of the concrete - such an inversion is characteristic of the expression of value, and it is this inversion which, at the same time, makes the understanding of this expression so difficult. If I say: Roman law and German law are both laws, it is something which goes by itself But if, on the contrary, I say: THE Law, this abstract thing, realizes itself in Roman law and in German law, i.e. in these concrete laws, the interconnection becomes mystical."
      - superscript [ref=e312]:
        - link "20" [ref=e313]:
          - /url: "#fn-ch1-20"
      - text: "The question to ask again is: where is the illusion here? We must not forget that the bourgeois individual, in his everyday ideology, is definitely not a speculative Hegelian: he does not conceive the particular contentas resulting from an autonomous movement of the universal Idea. He is, on the contrary, a good Anglo-Saxon nominalist, thinking that the Universal is a property of the Particular - that is, of really existing things. Value in itself does not exist, there are just individual things which, among other properties, have value."
    - paragraph [ref=e314]: "The problem is that in his practice, in his real activity, he acts as if the particular things (the commodities) were just so many embodiments of universal Value. To rephrase Marx: He knows ve!J' well that Roman law and Genan law arejust two kinds oflaw, but in his practice, he acts as (the Law itself, this abstract end!)!, realizes itseffin Roman law and in German law."
    - paragraph [ref=e315]: "So now we have made a decisive step forward; we have established a new way to read the Marxian formula 'they do not know it, but they are doing it': the illusion is not on the side of knowledge, it is already on the side of reality itself, of what the people are doing. What they do not know is that their social reality itself, their activity, is guided by an illusion, by a fetishistic inversion."
    - paragraph [ref=e316]: "What they overlook, what they misrecognize, is not the reality but the illusion which is structuring their reality, their real social activity. They know very well how things really are, but still they are doing it as if they did not know. The illusion is therefore double: it consists in overlooking the illusion which is structuring our real, effective relationship to reality. And this overlooked, unconscious illusion is what may be called the ideolo8ica1fantasy. If our concept of ideology remains the classic one in which the illusion is located in knowledge, then today's society must appear post-ideological: the prevailing ideology is that of cynicism; people no longer believe in ideological truth; they do not take ideological propositions seriously."
    - paragraph [ref=e317]: "The fundamental level of ideology, however, is not that of an illusion masking the real state of things but that of an (unconscious) fantasy structuring our social reality itself And at this level, we are of course far from being a post-ideological society. Cynical distance is just one way - one of many ways - to blind ourselves to the structuring power of ideological fantasy: even if we do not take things seriously, even if we keep an ironical distance, we are still doing them. It is from this standpoint that we can account for the formula of cynical reason proposed by Sloterdijk: 'they know very well what they are doing, but still, they are doing it'."
    - paragraph [ref=e318]: "If the illusion were on the side of knowledge, then the cynical position would really be a post-ideological position, simply a position without illusions: 'they know what they are doing, and they are doing it'. But if the place of the illusion is in the reality of doing itself, then this formula can be read in quite another way: 'they know that, in their activity, they are following an illusion, but still, they are doing it'. For example, they know that their idea of Freedom is masking a particular form of exploitation, but they still continue to follow this idea of Freedom."
    - heading "The Objectivity of Belief" [level=3] [ref=e319]
    - paragraph [ref=e320]: "From this standpoint, it would also be worth rereading the elementary Marxian formulation of so-called commodity fetishism: in a society in which the products of human labour acquire the form of commodities, the crucial relations between people take on the form of relations between things, between commodities - instead of immediate relations between people, we have social relations between things. In the 1960s and 1970s, this whole problem was discredited throughAlthusserian anti-humanism. The principal reproach of the Althusserians was that the Marxian theory of commodity fetishism is based on a naive, ideological, epistemologically unfounded opposition between persons (human subjects) and things. But a Lacanian reading can give this formulation a new, unexpected twist: the subversive power of Marx's approach lies precisely in the way he uses the opposition of persons and things. In feudalism, as we have seen, relations between people are mystified, mediated through a web of ideological beliefs and superstitions. They are the relations between the master and his servant, whereby the master exerts his charismatic power of fascination, and so forth. Although in capitalism the subjects are emancipated, perceiving themselves as free from medieval religious superstitions, when they deal with one another they do so as rational utilitarians, guided only by their selfish interests. The point of Marx' s analysis, however, is that the things (commodities) themselves believe in their place, instead of the subjects: it is as if all their beliefs, super stitions and metaphysical mystifications, supposedly surmounted by the rational, utilitarian personality, are embodied in the 'social relations between things'. They no longer believe, but the things themselves believe for them. This seems also to be a basic Lacanian proposition, contrary to the usual thesis that a beliefis something interior and knowledge something exterior (in the sense that it can be verified through an external procedure). Rather, it is belief which is radically exterior, embodied in the practical, effective prayer on a paper, put the rolled paper into a wheel, and turn it automatically, without thinking (or, if you want to proceed according to the Hegelian 'cunning of reason', you attach it to a windmill, so that it is moved around by the wind). In this way, the wheel itself is praying for me, instead of me - or, more precisely, I myself am praying through the medium of the wheel."
    - paragraph [ref=e321]: The beauty of it all is that in my psychological inferiority I can think about whatever I want, I can yield to the most dirty and obscene fantasies, and it does not matter because - to use a good old Stalinist expression - whatever I am thinking, objectively I am praying.
    - paragraph [ref=e322]:
      - text: "This is how we should grasp the fundamental Lacanian proposition that psychoanalysis is not a psychology: the most intimate beliefs, even the most intimate emotions such as compassion, crying, sorrow, laughter, can be transferred, delegated to others without losing their sincerity. In his seminar on The Ethic o/psychoanalysis, Lacan speaks of the role of the Chorus in classical tragedy: we, the spectators, came to the theatre worried, full of everyday problems, unable to adj ust without reserve to the problems of the play, that is to feel the required fears and compassions - but no problem, there is the Chorus, who feels the sorrow and the compassion instead of us - or, more precisely, we feel the required emotions through the medium of the Chorus: 'You are then relieved of all worries, even if you do not feel anything, the Chorus will do so in your place'."
      - superscript [ref=e324]:
        - link "21" [ref=e325]:
          - /url: "#fn-ch1-21"
    - paragraph [ref=e326]: Even if we, the spectators, are just drowsily watching the show, objectively - to use again the old Stalinist expression - we are doing our duty of compassion for the heroes.
    - paragraph [ref=e327]: "In so-called primitive societies we find the same phenomenon in the form of'weepers', women hired to cry instead of us: so, through the medium of the other, we accomplish our duty of mourning, while we can spend our time on more profitable exploits disputing the division of the inheritance of the deceased, for example."
    - paragraph [ref=e328]: "But to avoid the impression that this exteriorization, this transference of our most intimate feeling, is simply a characteristic of the so-called primitive stages of development, let us remind ourselves of a phenomenon quite usual in popular television shows or serials: 'canned laughter'. After some supposedly funny or witty remark, you can hear the laughter and applause included in the soundtrack of the show itself- here we have the exact counterpart of the chorus in classical tragedy; it is here that we have to look for 'living Antiquity'. That is to say, why this laughter? The first possible answer - that it serves to remind us when to laugh - is interesting enough, because it implies the paradox that laughter is a matter of duty and not of some spontaneous feeling; but this answer is not sufficient because we do not usually laugh. The only correct answer would be that the other - embodied in the television set - is relieving us even of our duty to laugh - is laughing instead of us. So even if, tired from a hard day's stupid work, all evening we did nothing but gaze drowsily into the television screen, we can say afterwards that objectively, through the medium of the other,· we had a really good time. If we do not take into account this objective status of belief, we might finish like the fool from a well-known joke who thought he was a grain of corn. After some time in a mental hospital, he was finally cured: now he knew that he was not a grain but a man. So they let him out; but soon afterwards he came running back, saying: 'I met a hen and I was afraid she would eat me.' The doctors tried to calm him: 'But what are you afraid of? Now you know that you are not a grain but a man.' The fool answered: 'Yes, of course, [ know that, but does the hen know that I am no longer a grain?'"
    - heading "'Law is Law'" [level=3] [ref=e329]
    - paragraph [ref=e330]: "The lesson to be drawn from this concerning the social field is above all that belief, far from being an 'intimate', purely mental state, is always materializedin our effective social activity: belief supports the fantasy which regulates social reality. Let us take the case of Kafka: it is usually said that in the 'irrational' universe of his novels, Kafka has given an 'exaggerated', 'fantastic', 'subjectively distorted' expression to modern bureaucracy and the fate of the individual within it. In saying this we overlook the crucial fact that it is this very 'exaggeration' which articulates the fantasy regulating the libidinal functioning of the 'effective', 'real' bureaucracy itself. The so-called 'Kafka's universe' is not a 'fantasy-image of social reality' but, on the contrary, the mise-en-scene of the fantasy which is at work in the midst ofsocial reali9' itself. we all know very well that bureaucracy is not all-powerful, but our 'effective' conduct in the presence of bureaucratic machinery is already regulated by a belief in its almightiness..."
    - paragraph [ref=e331]: In contrast to the usual 'criticism of ideology' trying to deduce the ideological form of a determinate society from the conjunction of its effective social relations, the analytical approach aims above all at the ideological fantasy efficient in social reality itself
    - paragraph [ref=e332]: What we call 'social reality' is in the last resort an ethical construction; it is supported by a certain as if(we act as ffwe believe in the almightiness of bureaucracy, as ffthe President incarnates the will of the People, as if the Party expresses the objective interest of the working class...).
    - paragraph [ref=e333]: "As soon as the belief(which, let us remind ourselves again, is definitely not to be conceived at a 'psychological' level: it is embodied, materialized, in the effective functioning of the social field) is lost, the very texture of the social field disintegrates."
    - paragraph [ref=e334]: This was already articulated by Pascal, one ofAlthusser's principal points of reference, in his attempt to develop the concept of'Ideological State Apparatuses'.
    - paragraph [ref=e335]:
      - text: "According to Pascal, the interiority of our reasoning is determined by the external, nonsensical 'machine' - automatism of the signifier, of the symbolic network in which the subjects are caught: For we must make no mistake about ourselves: we are as much automaton as mind... proofs only convince the mind; habit provides the strongest proofs and those that are most believed. It inclines the automaton, which leads the mind unconsciously along with it."
      - superscript [ref=e337]:
        - link "22" [ref=e338]:
          - /url: "#fn-ch1-22"
    - paragraph [ref=e339]: "Here Pascal produces the very Lacanian definition of the unconscious: 'the automaton (i.e. the dead, senseless letter), which leads the mind unconsciously [sans Ie savoiż with it'."
    - paragraph [ref=e340]: "It follows, from this constitutively senseless character of the Law, that we must obey it not because it is just, good or even beneficial, but simply because it is the law - this tautology articulates the vicious circle of its authority, the fact that the last foundation of the Law's authority lies in its process of enunciation:"
    - paragraph [ref=e341]:
      - text: Custom is the whole of equity for the sole reason that it is accepted. That is the mystic basis of its authority. Anyone who tries to bring it back to its first principle destroys it.
      - superscript [ref=e343]:
        - link "23" [ref=e344]:
          - /url: "#fn-ch1-23"
    - paragraph [ref=e345]: "The only real obedience, then, is an 'external' one: obedience out of conviction is not real obedience because it is already 'mediated' through our subjectivity - that is, we are not really obeying the authority but simply following our judgement, which tells us that the authority deserves to be obeyed in so far as it is good, wise, beneficent..."
    - paragraph [ref=e346]: Even more than for our relation to 'external' social authority, this inversion applies to our obedience to the internal authority of belief it was Kierkegaard who wrote that to believe in Christ because we consider him wise and good is a dreadful blasphemy - it is, on the contrary, only the act of belief itself which can give us an insight into his goodness and wisdom.
    - paragraph [ref=e347]: Certainly we must search for rational reasons which can substantiate our belief, our obedience to the religious command, but the crucial religious experience is that these reasons reveal themselves only to those who already believe - we find reasons attesting our belief because we already believe; we do not believe because we have found sufficient good reasons to believe.
    - paragraph [ref=e348]: "'External' obedience to the Law is thus not submission to external pressure, to so-called non-ideological 'brute force', but obedience to the Command in so far as it is 'incomprehensible', not understood; in so far as it retains a 'traumatic', 'irrational' character: far from hiding its full authority, this traumatic, non-integrated character of the Law is a positive condition ofit."
    - paragraph [ref=e349]: "This is the fundamental feature of the psychoanalytic concept of the supere80: an injunction which is experienced as traumatic, 'senseless' - that is, which ·cannot be integrated into the symbolic universe of the subject."
    - paragraph [ref=e350]: "But for the Law to function 'normally', this traumatic fact that 'custom is the whole of equity for the sole reason that it is accepted' - the dependence of the Law on its process of enunciation or, to use a concept developed by Laclau and Mouffe, its radically contingent character - must be repressed into the unconscious, through the ideological, imaginary experience of the 'meaning' of the Law, of its foundation in Justice, Truth (or, in a more modern way, functionality):"
    - paragraph [ref=e351]:
      - text: It would therefore be a good thing for us to obey laws and customs because they are laws... But people are not amenable to this doctrine, and thus, believing that truth can be found and resides in laws and customs, they believe them and take their antiquity as a proof of their truth (and not just of their authority, without truth).
      - superscript [ref=e353]:
        - link "24" [ref=e354]:
          - /url: "#fn-ch1-24"
    - paragraph [ref=e355]:
      - text: "It is highly significant that we find exactly the same formulation in Kafka's Trial, at the end of the conversation between K. and the priest: 'I do not agree with that point of view,' said K., shaking his head, 'for if one accepts it, one must accept as true everything the door-keeper says. But you yourselfhave sufficiently proved how impossible it is to do that.' 'No,' said the priest, 'it is not necessary to accept everything as true, one must only accept it as necessary.' 'A melancholy conclusion,' said K. 'It turns lying into a universal principle."
      - superscript [ref=e357]:
        - link "25" [ref=e358]:
          - /url: "#fn-ch1-25"
    - paragraph [ref=e359]: What is 'repressed' then, is not some obscure origin of the Law but the very fact that the Law is not to be accepted as true, only as necessary - the fact that its authority is without truth.
    - paragraph [ref=e360]: "The necessary structural illusion which drives people to believe that truth can be found in laws describes precisely the mechanism of transference: transference is this supposition of a Truth, of a Meaning behind the stupid, traumatic, inconsistent fact of the Law."
    - paragraph [ref=e361]: "In other words, 'transference' names the vicious circle of belief: the reasons why we should believe are persuasive only to those who already believe."
    - paragraph [ref=e362]:
      - text: "The crucial text of Pascal here is the famous Fragment 233 on the necessity of the wager; the first, largest part of it demonstrates at length why it is rationally sensible to 'bet on God', but this argument is invalidated by the following remark of Pascal's imaginary partner in dialogue: my hands are tied and my lips are sealed; I am being forced to wager and I am not free; I am being held fast and I am so made that I cannot believe. What do you want me to do then? - 'That is true, but at least get it into your head that, if you are unable to believe, it is because of your passions, since reason impels you to believe and yet you cannot do so. Concentrate then not on convincing yourselfby multiplying proofs of God' s existence but by diminishing your passions. You want to find faith and you do not know the road. You want to be cured of unbelief and you ask for the remedy: learn from those who were once bound like you and who now wager all they have. These are people who know the road you wish to follow, who have been cured of the affliction of which you wish to be cured: follow the way by which they began. They behaved just as if they did believe, taking holy water, having masses said, and so on. That will make you believe quite naturally, and will make you more docile. 'Now what harm will come to you from choosing this course? You will be faithful, honest, humble, grateful, full of good works, a sincere, true friend... It is true you will not enjoy noxious pleasures, glory and good living, but will you not have others? 'I tell you that you will gain even in this life, and that at every step you take along this road you will see that your gain is so certain and your risk so negligible that in the end you will realize, that you have wagered on something certain and infinite for which you have paid nothing."
      - superscript [ref=e364]:
        - link "26" [ref=e365]:
          - /url: "#fn-ch1-26"
      - text: "Pascal's final answer, then, is: leave rational argumentation and submit yourself simply to ideological ritual, stupefy yourself by repeating the meaningless gestures, act as fyou already believe, and the belief will come by itself"
    - paragraph [ref=e366]: "Far from being limited to Catholicism, such a procedure for obtaining ideological conversion has universal application, which is why, in a certain epoch, it was very popular among French Communists. The Marxist version of the theme of, wager' tuns as follows: the bourgeois intellectual has his hands tied and his lips sealed. Apparently he is free, bound only to the argument of his reason, but in reality he is permeated by bourgeois prejudices. These prejudices do not let him go, so he cannot believe in the sense of history, in the historical mission of the working class. So what can he do? The answer: first, he should at least recognize his impotence, his inca pacity to believe in the sense of history; even if his reason leans towards the truth, the passions and prejudices produced by his class position prevent him from accepting it. So he should not exert himself with proving the truth of the historical mission of the working class; rather, he should learn to subdue his petty-bourgeois passions and prejudices. He should take lessons from those who were once as impotent as he is now but are ready to risk all for the revolutionary Cause. He should imitate the way they began: they behaved just as if they did believe in the mission of the working class, they became active in the Party, they collected money to help strikers, propagate the workers' movement, and so on. This stupefied them and made them believe quite naturally. And really, what harm has come to them through choosing this course? They became faithful, full of good works, sincere and noble... It is true that they had to renounce a few noxious petty-bourgeois pleasures, their egocentrist intellectualist trifling, their false sense of individual freedom, but on the other hand - and notwithstanding the factual truth of their belief - they gained a lot: they live a meaningful life, free of doubts and uncertainty; all their everyday What distinguishes this Pascalian 'custom' from insipid behaviourist wisdom (,the content of your belief is conditioned by your factual behav iour1 is the paradoxical status of a beliefbefore beli by following a custom, the subject believes without knowing it, so that the final conversion is merely a formal act by means of which we recognize what we have already believed."
    - paragraph [ref=e367]: "In other words, what the behaviourist reading of Pascalian 'custom' misses is the crucial fact that the external custom is always a material support for the subject's unconscious. The main achievement of Marek Kaniewska's film Another Countty is to designate, in a sensitive and delicate way, this precarious status of 'believing without knowing it' - precisely apropos of the conversion to Communism. Another Countty is a film a clef about the relationship between two Cambridge students, the Communist Judd (real model: John Cornford, idol of the Oxford student left, who died in 1936 in Spain) and the rich homosexual Guy Bennett, who later becomes a Russian spy and tells the story in retrospect to an English journalist who visits him in his Moscow exilω (real model: Guy Burgess, of course). There is no sexual relationship between them; Judd is the only one who is not sensitive to Guy's charm ('the exception to the Bennett rule', as Guy puts it): precisely for that reason, he is the point of Guy's transferential identification. The action occurs in the 'public school' environment of the thirties: the patriotic empty talk, the terror of the student-heads (,gods') over ordi nary students; yet in all this terror there is something non-binding, not quite serious; it has the ring of an amusing travesty concealing a universe in which enjoyment actually reigns in all its obscenity, above all in the form of a ramified network of homosexual relations - the real terror is, rather, the unbearable pressure of enjoyment. It is for this reason that Oxford and Cambridge in the 1930S offered such a rich field for the KGB: not only because of the 'guilt complex' of rich students doing so well in the midst of the economic and social crisis, but above all because of this stuffy atmosphere of enjoyment, the very inertia of which creates an unbearable tension, a tension which could be dissolved only by a 'totali who knew how to occupy the place of this appeal; in England, at least among the elite students, the KGB hunters were best versed in it."
    - paragraph [ref=e368]: "The film is worth mentioning for the way it depicts Guy's conversion: its delicacy is attested by the very fact that it does not depict it, that it only lays all the elements for it. That is to say, the flashback to the 1930S which occupies the main part of the film stops at the precise point at which Guy is already converted, although he does not yet know it - the film is delicate enough to leave out the formal act of conversion; it suspends the flashback in a situation homologous to one in which somebody is already in love but is not yet aware of it, and for this reason gives expression to his love in the form of an excessively cynical attitude and defensive agressivity towards the person with whom he is in love. What is, then, looking doser, the denouement of the film? Two reactions to this situation of stuffy enjoyment are opposed: Judd's renunciation, his openly declared Communism (it is for this reason that he couldn't be a KGB agent), and on the other side Guy as a representative of the extreme, putrefied hedonism whose game, however, starts to £all apart (the 'gods' have humiliated him by a ritual beating because his personal enemy, a patriotic career seeker, has unmasked his homosexual relationship with a younger student: in this way, Guy lost a promised opportunity to become a 'god' himself the following year). At this point, Guy becomes aware of the fact that the key to the dissolution of his untenable situation lies in his transferential relationship to Judd: this is nicely indicated by two details. First, he reproaches Judd for not himselfbeing liberated from bourgeois prejudices - in spite of all his talk about equality and fraternity, he still thinks that 'some persons are better than others because of the way they make love'; in short, he catches the subject on whom he has a transference in his inconsistency, in his lack. Second, he reveals to the naive Judd the very mechanism of transference: Judd thinks that his belief in the truth of Communism results from his thorough study of history and the texts of Marx, to which Guy replies, 'You are not a Communist because you - that is to say, Judd understands Marx because he presupposes in advance that Marx is the bearer ofknowledge enabling access to the truth ofhistory, like the Christian believer who does not believe in Christ because he has been convinced by theological arguments but, on the contrary, is susceptible to theological arguments because he is already illuminated by the grace of belie£ In a first, naive approach it could appear that because of these two features Guy is on the brink ofliberating himself from his transference on Judd (he catches Judd in his inconsistency, and even unmasks the very mechanism of transference to boot), but the truth is none the less the opposite: these two features only confirm how 'those in the know are lost' [/cr non-dupcr eTTentJ, as Lacan would say. Precisely as one 'in the know', Guy is caught in transference - both reproaches of Judd receive their mean ing only against the background that his relationship with Judd is already a transferential one (as with the analysand who finds such pleasure in discovering small weaknesses and mistakes in the analyst precisely because the transference is already at work). The state in which Guy finds himselfimmediately before his conversion, this state of extreme tension, is best rendered by his own answer to Judd's reproach that he is himself to blame for the mess he is in (if he had only proceeded with a little discretion and hidden his homosexuality instead of flaunting it in a provocative and defiant way, there would have been no unpleasant disclosure to ruin him): 'What better cover for someone like me than total indiscretion?' This is, of course, the very Lacanian defi nition of deception in its specifically human dimension, where we deceive the Other by means of the truth itself: in a universe in which all are looking for the true face beneath the mask, the best way to lead them astray is to wear the mask of truth itself But it is impossible to maintain the coincidence of mask and truth: far from gaining us a kind of'immediate contact with our fellow-men', this coincidence renders the situation unbearable; all communication is impossible because we are totally isolated through the very disclosure - the sine qua non of successful communication"
    - paragraph [ref=e369]: "The only door open is thus escape into belief in the transcendent 'another country' (Communism) and into conspiracy (becoming a KGB agent), which introduces a radical gap between the mask and the true face. So when, in the last scene of the flashback, Judd and Guy traverse the college courtyard, Guy is already a believer: his fate is sealed, even if he does not yet know it. His introductory words, 'Wouldn't it be wonderful if Communism were really true?', reveal his belief, which is for the time being still delegated, transferred on to another - and so we can immediately pass on to the Moscow exile decades later where the only leftover of enjoyment binding the old and crippled Guy to his country is the memory of cricket."
    - heading "Kafka, Critic of Althusser" [level=3] [ref=e370]
    - paragraph [ref=e371]: "The externality of the symbolic machine (,automaton') is therefore not simply external: it is at the same time the place where the fate of our internal, most 'sincere' and 'intimate' beliefs is in advance staged and decided."
    - paragraph [ref=e372]: When we subject ourselves to the machine of a religious ritual, we already believe without knowing it; our belief is already materialized in the exter nal ritual; in other words, we already believe unconsciously, because it is from this external character of the symbolic machine that we can explain the status of the unconscious as radically external - that of a dead letter.
    - paragraph [ref=e373]: Belief is an affair of obedience to the dead, uncomprehended letter.
    - paragraph [ref=e374]:
      - text: It is this short-circuit between the intimate belief and the external 'machine' which is the most subversive kernel of Pascalian theology. of course, in his theory ofIdeological State Apparatuses, Althusser gave an elaborated, contemporary version of this Pascalian 'machine';
      - superscript [ref=e376]:
        - link "27" [ref=e377]:
          - /url: "#fn-ch1-27"
      - text: "but the weak point ofhis theory is that he or his school never succeeded in thinking out the link between Ideological State Apparatuses and ideological interpellation: how does the Ideological State Apparatus (the Pascalian 'machine', the signifying automatism) 'internalize' itself; how does it produce the effect of ideological belief in a Cause and the interconnecting effect of subjectivarion, of recognition of one's ideological position? The answer to this is, as we have seen, that this external 'machine' of State Apparatuses exercises its force only in so far as it is experienced, in the unconscious economy of the subject, as a traumatic, senseless injunction. Althusser speaks only of the process of ideological interpellation through which the symbolic machine of ideology is 'internalized' into the ideological experience of Meaning and Truth: but we can learn from pascal that this 'internalization', by structural necessity, never fully succeeds, that there is always a residue, a leftover, a stain of traumatic irrationality and senselessness sticking to it, and that this leftover, far from hindering the full submission of the subject to the ideological command, is the very condition of it: it is precisely this non-integrated surplus of senseless traumatism which confers on the Law its unconditional authority: in other words, which - in so far as it escapes ideological sense - sustains what we might call the ideological jouis-sense, enjoyment-in-sense (enjoy-meant), proper to ideology."
    - paragraph [ref=e378]: "And again, it was no accident that we mentioned the name ofKafka: concerning this ideological jouis-sense we can say that Kafka develops a kind of criticism of Althusser avant la lettre, in letting us see that which is constitutive of the gap between 'machine' and its 'internalization'. Is not Kafka's 'irrational' bureaucracy, this blind, gigantic, nonsensical apparatus, precisely the Ideological State Apparatus with which a subject is confronted before any identification, any recognition - any subjectivation takes place? What, then, can we learn from Kafka?"
    - paragraph [ref=e379]: "In a first approach, the starting point in Kafka's novels is that of an interpellation: the Kafkaesque subject is interpellated by a mysterious bureaucratic entity (Law, Castle). But this interpellation has a somewhat strange look: it is, so to say, an interpellation without identification/ subjectivation; it does not offer us a Cause with which to identify - the Kafkaesque subject is the subject desperately seeking a trait with which to identify, he does not understand the meaning of the call of the Other."
    - paragraph [ref=e380]: "This is the dimension overlooked in the Althusserian account of recognition/misrecognition, the subject ($) is trapped by the Other through a paradoxical object-cause of desire in the midst of it (a), through this secret supposed to be hidden in the Other: $Oa - the Lacanian formula of fantasy."
    - paragraph [ref=e381]: "What does it mean, more precisely, to say that ideological fantasy structures reality itself? Let us explain by starting from the fundamental Lacanian thesis that in the opposition between dream and reality, fantasy is on the side of reality: it is, as Lacan once said, the support that gives consistency to what we call 'reality'. In his seminar on the Four Fundamental Concepts of Psycho-Analysis, Lacan develops this through an interpretation of the well-known dream about the 'burning child':"
    - paragraph [ref=e382]:
      - text: "A father had been watching beside his child's sick-bed for days and nights on end. After the child had died, he went into the next room to lie down, but left the door open so that he could see from his bedroom into the room in which his child's body was laid out, with tall candles standing round it. An old man had been engaged to keep watch over it, and sat beside the body murmuring prayers. After a few hours' sleep, the father had a dream that his child was standing beside his bed, caught him by the arm and whispered to him reproachfully: 'Father, don't you see I'm burning?' He woke up, noticed a bright glare of light from the next room, hurried into it and found the old watchman had dropped off to sleep and that the wrappings and one of the arms of his beloved child's dead body had been burned by a lighted candle that had fallen on them."
      - superscript [ref=e384]:
        - link "28" [ref=e385]:
          - /url: "#fn-ch1-28"
    - paragraph [ref=e386]: "The usual interpretation of this dream is based on a thesis that one of the functions of the dream is to enable the dreamer to prolong his sleep. The sleeper is suddenly exposed to an exterior irritation, a stimulus coming from reality (the ringing of an alarm clock, knocking on the door or, in this case, the smell of smoke), and to prolong his sleep he quickly, on the spot, constructs a dream: a little scene, a small story, which includes this irritating element. However, the external irritation soon becomes too strong and the subject is awakened."
    - paragraph [ref=e387]: "The Lacanian reading is directly opposed to this. The subject does not awake himself when the external irritation becomes too strong; the logic of his awakening is quite different. First he constructs a dream, a story which enables him to prolong his sleep, to avoid awakening into reality. But the thing that he encounters in the dream, the reality of his desire, the Lacanian Real - in our case, the reality of the child's reproach to his father, 'Can't you see that I am burning?', implying the father's fundamental guilt - is more terrifying than so-called external reality itself and that is why he awakens: to escape the Real of his desire, which announces itself in the terrifying dream. He escapes into so-called reality to be able to continue to sleep, to maintain his blindness, to elude awakening into the Real of his desire."
    - paragraph [ref=e388]:
      - text: "We can rephrase here the old 'hippy' motto of the 1960s: reality is for those who cannot support the dream. 'Reality' is a fantasy-construction which enables us to mask the Real of our desire."
      - superscript [ref=e390]:
        - link "29" [ref=e391]:
          - /url: "#fn-ch1-29"
    - paragraph [ref=e392]: "It is exactly the same with ideology. Ideology is not a dreamlike illusion that we build to escape insupportable reality; in its basic dimension it is a fantasy-construction which serves as a support for our 'reality' itself: an 'illusion' which structures our effective, real social relations and thereby masks some insupportable, real, impossible kernel (conceptualized by Emesto Laclau and Chantal Mouffe as 'antagonism': a traumatic social division which cannot be symbolized). The function of ideology is not to offer us a point of escape from our reality but to offer us the social reality itself as an escape from some traumatic, real kernel."
    - paragraph [ref=e393]:
      - text: To explain this logic, let us refer again to The Four Fundamental Concepts of Psycho-Analysis.
      - superscript [ref=e395]:
        - link "30" [ref=e396]:
          - /url: "#fn-ch1-30"
    - paragraph [ref=e397]: "Here Lacan mentions the well-known paradox of Zhuang Zi, who dreamt of being a butterfly, and after his awakening posed himself a question: how does he know that he is not now a butterfly dreaming of being Zhuang Zi? Lacan's commentary is that this question is justified, for two reasons. First, it proves that Zhuang Zi was not a fool. The Lacanian definition of a fool is somebody who believes in his immediate identity with himself; somebody who is not capable of a dialectically mediated distance towards himself, like a king who thinks he is a king, who takes his being-a-king as his immediate property and not as a symbolic mandate imposed on him by a network of intersubjective relations of which he is a part (example of a king who was a fool thinking he was a king: Ludwig II of Bavaria, Wagner's patron). However, this is not all; if it were, the subject could be reduced to a void, to an empty place in which his or her whole content is procured by others, by the symbolic network of intersubjective relations: I am 'in myself a nothingness, the positive content of myself is what I am for others."
    - paragraph [ref=e398]: "In other words, if this were all, Lacan's last word would be a radical alienation of the subject. His content, 'what he is', would be determined by an exterior signifying network offering him the points of symbolic identification, conferring on him certain symbolic mandates. But Lacan's basic thesis, at least in his last works, is that there is a possi bility for the subject to obtain some contents, some kind of positive consistency, also outside the big Other, the alienating symbolic network. This other possibility is that offered by fantasy: equating the subject to an object of fantasy. When he was thinking that he was a butterfly dreaming of being Zhuang Zi, Zhuang Zi was in a way correct. The butterfly was the object which constituted the frame, the backbone, of his fantasy identity (the relationship Zhuang Zi-butterfly can be written $Oa). In the symbolic reality he was Zhuang Zi, but in the Real of his desire he was a butterfly. Being a butterfly was the whole consistency of his positive being outside the symbolic network. Perhaps it is not quite by accident that we find a kind of echo of this in Terry Gilliam's film Brazil, which depicts, in a disgustingly funny way, a totalitarian society: the hero finds"
    - paragraph [ref=e399]: "At first sight, what we have here is a simple symmetrical inversion of the so-called normal, ordinary perspective. In our everyday understanding, Zhuang Zi is the 'real' person dreaming of being a butterfly, and here we have something which is 'really' a butterfly dreaming of being Zhuang Zi. But as Lacan points out, this symmetrical relationship is an illusion: when Zhuang Zi is awakened, he can think to himself that he is Zhuang Zi who dreamed of being a butterfly, but in his dream, when he is a butterfly, he cannot ask himself if when awoken, when he thought he was Zhuang Zi, he was not this butterfly that is now dreaming ofbeing Zhuang Zi. The question, the dialectical split, is possible only when we are awake."
    - paragraph [ref=e400]: "In other words, the illusion cannot be symmetrical, it cannot run both ways, because if it did we would find ourselves in a nonsensical situation described - again - by Alphonse Allais: Raoul and Marguerite, two lovers, arrange to meet at a masked ball; there they skip into a hidden corner, embrace and fondle each other. Finally, they both put down their masks, and - surprise - Raoul finds that he is embracing the wrong woman, that she is not Marguerite, and Marguerite also finds that the other person is not Raoul but some unknown stranger..."
    - heading "Fantasy as a Support of Reality" [level=3] [ref=e401]
    - paragraph [ref=e402]: "This problem must be approached from the Lacanian thesis that it is only in the dream that we come close to the real awakening - that is, to the Real of our desire. When Lacan says that the last support of what we call 'reality' is a fantasy, this is definitely not to be understood in the sense of 'life is just a dream', 'what we call reality is just an illusion', and so forth. We find such a theme in many science-fiction stories: reality as a generalized dream or illusion. The story is usually told from the perspective of a hero who gradually makes the horrifying discovery that all the people around him are not really human beings but some kind of automatons, robots, who only look and act like real human beings; the final point of these stories is of course the hero's discovery that he himself is also such impossible: we find the same paradox in a well-known drawing by Escher of two hands drawing each other."
    - paragraph [ref=e403]: The Lacanian thesis is, on the contrary, that there is always a hard kernel, a leftover which persists and cannot be reduced to a universal play of illusory mirroring. The difference between Lacan and 'naive realism' is that for Lacan, the only point at which we approach this hard kernel of the Real is indeed the dream. When we awaken into reality after a dream, we usually say to ourselves 'it was just a dream', thereby blinding ourselves to the fact that in our everyday, wakening reality we are nothing but a consciousness of this dream. It was only in the dream that we approached the fantasy framework which determines our activity, our mode of acting in reality itself
    - paragraph [ref=e404]: "It is the same with the ideological dream, with the determination of ideology as a dreamlike construction hindering us from seeing the real state of things, reality as such. In vain do we try to break out of the ideo logical dream by 'opening our eyes and trying to see reality as it is', by throwing away the ideological spectacles: as the subjects of such a postideological, objective, sober look, free of so-called ideological prejudices, as the subjects of a look which views the facts as they are, we remain throughout 'the consciousness of our ideological dream'. The only way to break the power of our ideological dream is to confront the Real of our desire which announces itself in this dream."
    - paragraph [ref=e405]: Let us examine anti-Semitism. It is not enough to say that we must liberate ourselves from so-called 'anti-Semitic prejudices' and learn to see Jews as they really are - in this way we will certainly remain victims of these so-called prejudices. We must confront ourselves with how the ideological figure of the 'Jew' is invested with our unconscious desire, with how we have constructed this figure to escape a certain deadlock of our desire.
    - paragraph [ref=e406]: "Let us suppose, for example, that an objective look would confirm - why not? - that Jews really do financially exploit the rest of the population, real roots of our anti-Semitism? Here, we have only to remember the Lacan ian proposition concerning the pathologically jealous husband: even if all the facts he quotes in support of his jealousy are true, even if his wife really is sleeping around with other men, this does not change one bit the fact that his jealousy is a pathological, paranoid construction. Let us ask ourselves a simple question: in the Germany of the late 1930S, what would be the result of such a non-ideological, objective approach? Probably something like: 'The Nazis are condemning the Jews too hastily, without proper argument, so let us take a cool, sober look and see if they are really guilty or not; let us see if there is some truth in the accusations against them.' Is it really necessary to add that such an approach would merely confirm our so-called 'unconscious prejudices' with additional rationalizations? The proper answer to anti-Semitism is therefore not 'Jews are really not like that' but 'the anti-Semitic idea ofJew has nothing to do with Jews; the ideological figure of a Jew is a way to stitch up the incon sistency of our own ideological system.' That is why we are also unable to shake so-called ideological prejudices by taking into account the pre-ideological level of everyday experience. The basis of this argument is that the ideological construction always finds its limits in the field of everyday experience - that it is unable to reduce, to contain, to absorb and annihilate this level. Let us again take a typical individual in Germany in the late 1930S. He is bombarded by anti-Semitic propaganda depicting a Jew as a monstrous incarnation of Evil, the great wire-puller, and so on. But when he returns home he encounters Mr Stern, his neighbour, a good man to chat with in the evenings, whose children play with his. Does not this everyday experience offer an irreducible resistance to the ideological construction? The answer is, of course, no. If everyday experience offers such a resist ance, then the anti-Semitic ideology has not yet really grasped us. An ideology is really 'holding us' only when we do not feel any opposition between it and reality - that is, when the ideology succeeds in determining the mode of our everyday experience of reality itself How then would our ideological figure of the Jew (schemer, wire-puller, exploiting our brave men and so on) and the common everyday experience of his good neighbour, Mr Stern? His answer would be to turn this gap, this discrepancy itself, into an argument for anti-Semitism: 'You see how dangerous they really are? It is difficult to recognize their real nature. They hide it behind the mask of everyday appearance - and it is exactly this hiding of one's real nature, this duplicity, that is a basic feature of the Jewish nature.' An ideology really succeeds when even the facts which at first sight contradict it start to function as arguments in its favour."
    - heading "Surplus-Value and Surplus-Enjoyment" [level=3] [ref=e407]
    - paragraph [ref=e408]: "Herein lies the difference from Marxism: in the predominant Marxist perspective the ideological gaze is a partial gaze overlooking the totality of social relations, whereas in the Lacanian perspective ideology rather designates a totality setting effacing the traces of its own impossibility. This difference corresponds to the one which distinguishes the Freudian from the Marxian notion of fetishism: in Marxism a fetish conceals the positive network of social relations, whereas in Freud a fetish conceals the lack ('castration,) around which the symbolic network is articulated. In so far as we conceive the Real as that which 'always returns to the same place', we can deduce another, no less crucial difference. From the Marxist point of view, the ideological procedure par excellence is that of false eternalization and/or universalization: a state which depends on a concrete historical conjunction appears as an eternal, universal feature of the human condition; the interest of a particular class disguises itself as universal human interest ... and the aim of the 'criticism of ideology' is to denounce this false universality, to detect behind man in general the bourgeois individual; behind the universal rights of man the form which renders possible capitalist exploitation; behind the 'nuclear family' as a trans-historical constant the historically specified and limited form of kinship relations, and so on. externalization: an over-rapid historicization. Let us take one of the common places of the Marxist-feminist criticism of psychoanalysis, the idea that its insistence on the crucial role of the Oedipus complex and the nuclear family triangle transforms a historically conditioned form of patriarchal family into a feature of the universal human condition: is not this effort to historicize the family triangle precisely an attempt to elude the 'hard kernel' which announces itself through the 'patriarchal family' - the Real of the Law, the rock of castration?"
    - paragraph [ref=e409]: In other words, if over-rapid universal ization produces a quasi-universal Image whose function is to make us blind to its historical, socio-symbolic determination, over-rapid historicization makes us blind to the real kernel which returns as the same through diverse historicizations/symbolizations.
    - paragraph [ref=e410]: "It is the same with a phenomenon that designates most accurately the 'perverse' obverse of twentieth-century civilization: concentration camps. All the different attempts to attach this phenomenon to a concrete image ('Holocaust', 'Gulag'.. \"), to reduce it to a product of a concrete social order (Fascism, Stalinism...) - what are they if not so many attempts to elude the fact that we are dealing here with the 'real' of our civilization which returns as the same traumatic kernel in all social systems? (We should not forget that concentration camps were an invention of 'liberal' England, dating from the Boer War; that they were also used in the US to isolate the Japanese population, and so on.) Marxism, then, did not succeed in taking into account, coming to terms with, the surplus-object, the leftover of the Real eluding symbolization - a fact all the more surprising if we recall that Lacan modelled his notion of surplus-enjoyment on the Marxian notion of surplus-value. The proof that Marxian surplus-value announces effectively the logic of the Lacanian objet petit a as the embodiment of surplus-enjoyment is already provided by the decisive formula used by Marx, in the third volume of Capital, to designate the logical-historical limit of capitalism: 'the limit of capital is capital itself, i.e. the capitalist mode of production'."
    - paragraph [ref=e411]: "This formula can be read in two ways. The first, usual historicist paradigm of the dialectics of productive forces and relations of production, as that of' content' and 'form'. This paradigm follows roughly the metaphor of the serpent which, from time to time, sheds its skin, which has grown too tight: one posits as the last impetus of social development - as its (so to speak) 'natural', 'spontaneous' constant - the incessant growth of the productive forces (as a rule reduced to technical development); this 'spontaneous' growth is then followed, with a greater or lesser degree of delay, by the inert, dependent moment, the relationship of production. We have thus epochs in which the relations of production are in accordance with the productive forces, then those forces develop and outgrow their 'social clothes', the frame of relationships; this frame becomes an obstacle to their further development, until social revolution again co-ordinates forces and relations by replacing the old relations with new ones which correspond to the new state of forces. If we conceive the formula of capital as its own limit from this point of view, it means simply that the capitalist relation of production which at first made possible the fast development of productive forces became at a certain point an obstacle to their further development: that these forces have outgrown their frame and demand a new form of social relations. Marx himself is of course far from such a simplistic evolutionary idea. If we need convincing of this, we have only to look at the passages in Capitalwhere he deals with the relation between formal and real subsump tion of the process of production under Capital: the formal subsumption precedesthe real one; that is, Capital first subsumes the process of production as it found it (artisans, and so on), and only subsequently does it change the productive forces step by step, shaping them in such a way as to create correspondence. Contrary to the above-mentioned simplistic idea, it is then the form of the relation of production which drives the development of productive forces - that is, of its 'content'."
    - paragraph [ref=e412]: "All we have to do to render impossible the simplistic evolutionary albeit only an ideal one - at which the capitalist relation of production become an obstacle to the further development of the productive forces? Or the obverse of the same question: when can we speak of an accordance between productive forces and relation of production in the capitalist mode of production? Strict analysis leads to only one possible answer: never. This is exactly how capitalism differs from other, previous modes of production: in the latter, we can speak of periods of'accordance' when the process of social production and reproduction goes on as a quiet, circular movement, and of periods of convulsion when the contradiction between forces and relations aggravates itself; whereas in capitalism this contradiction, the discord forces/relations, is contained in its very concept (in the form of the contradiction between the social mode of production and the individual, private mode of appropriation). It is this internal contradiction which compels capitalism to permanent extended reproduction - to the incessant development of its own conditions of production, in contrast to previous modes of production where, at least in their 'normal' state, [re)production goes on as a circular movement. If this is so, then the evolutionist reading of the formula of capital as its own limit is inadequate: the point is not that, at a certain moment of its development, the frame of the relation of production starts ro constrict further development of the productive forces; the point is that it is t/zis very immanent limit, this 'internal contradiction΢ which drives capitalism into permanent development. The 'normal' state of capitalism is the permanent revolutionizing of its own conditions of existence: from the very beginning capitalism 'putrefies', it is branded by a crippling contradiction, discord, by an immanent want of balance: this is exactly why it changes, develops incessantly - incessant development is the only way for it to resolve again and again, come to terms with, its own fundamental, constitutive imbalance, 'contradiction'. Far from constricting, its limit is thus the very impetus of its development."
    - paragraph [ref=e413]: "Herein lies the paradox proper to capitalism, its last resort: capitalism is capable of transforming its lim,it, its very its immanent contradiction is aggravated, the more it must revolutionize itself to survive. It is this paradox which defines surplus-enjoyment: it is not a surplus which simply attaches itself to some 'normal', fundamental enjoyment, because etyo/ment as such emer,ges only in this surplus, because it is constitu tively an 'excess'. If we subtract the surplus we lose enjoyment itself, just as capitalism, which can survive only by incessantly revolutionizing its own material conditions, ceases to exist if it 'stays the same', if it achieves an internal balance. This, then, is the homology between surplus-value the 'cause' which sets in motion the capitalist process of production - and surplus-enjoyment, the object-cause of desire. Is not the paradoxical topology of the movement of capital, the fundamental blockage which resolves and reproduces itself through frenetic activity, excessive power as the very form of appearance of a fundamental impotence - this immediate passage, this coincidence oflimit and excess, of lack and surplus - precisely that of the Lacanian objet petit a, of the leftover which embodies the fundamental, constitutive lack? All this, of course, Marx 'knows very well... and yet': and yet, in the crucial formulation in the Preface to the Critique if Political he proceeds as if he does not know it, by describing the very passage from capitalism to socialism in terms of the above-mentioned vulgar evolu tionist dialectics of productive forces and the relations of production: when the forces surpass a certain degree, capitalist relations become an obstacle to their further development: this discord brings about the need for social ist revolution, the function of which is to co-ordinate again forces and relations; that is, to establish relations of production rendering possible the intensified development of the productive forces as the end-in-itself of the historical process."
    - paragraph [ref=e414]: How can we not detect in this formulation the fact that Marx failed to cope with the paradoxes of surplus-enj oyment? And the ironic vengeance of history for this failure is that today there exists a society which seems Marx. Is it not already a commonplace to assert that 'real socialism' rendered possible rapid industrialization, but that as soon as the productive forces reached a certain level of development (usually designated by the vague term 'post-industrial society'), 'real socialist' social relationships began to constrict their further growth?
  - region "2. From Symptom to Sinthome" [ref=e415]:
    - heading "2. From Symptom to Sinthome" [level=2] [ref=e416]
    - heading "The Dialectics of the Symptom" [level=3] [ref=e417]
    - heading "Back to the Future" [level=4] [ref=e418]
    - paragraph [ref=e419]: "The only reference to the domain of science fiction in Lacan's work concerns the time paradox: in his first seminar, Lacan uses Norbert Wiener's metaphor of the inverted direction of time to explain the symptom as a 'return of the repressed':"
    - paragraph [ref=e420]:
      - text: Wiener posits two beings each of whose temporal dimensions moves in the opposite direction from the other. To be sure, that means nothing, and that is how things which mean nothing all of a sudden signify something, but in a quite different domain. If one of them sends a message to the other, for example a square, the being going in the opposite direction will first of all see the square vanishing, before seeing the square. That is what we see as well. The symptom initially appears to us as a trace, which will only ever be a trace, one which will continue not to be understood until the analysis has got quite a long way, and until we have realized its meaning.
      - superscript [ref=e422]:
        - link "1" [ref=e423]:
          - /url: "#fn-ch2-1"
    - paragraph [ref=e424]:
      - text: "The analysis is thus conceived as a symbolization, a symbolic integration of meaningless imaginary traces; this conception implies a fundamentally imaginary character of the unconscious: it is made of'imaginary fixations which could not have been assimilated to the symbolic development' of the subject's history; consequently, it is 'something which will be realized in the Symbolic, or, more precisely, something which, thanks to the symbolic progress which takes place in the analysis, will have been'."
      - superscript [ref=e426]:
        - link "2" [ref=e427]:
          - /url: "#fn-ch2-2"
    - paragraph [ref=e428]: The Lacanian answer to the question 'From where does the repressed return?' is therefore, paradoxically, 'From the future.'
    - paragraph [ref=e429]: Symptoms are meaningless traces, their meaning is not discovered, excavated from the hidden depth of the past, but constructed retroactively - the analysis produces the truth; that is, the signifying frame which gives the symptoms their symbolic place and meaning.
    - paragraph [ref=e430]: As soon as we enter the symbolic order, the past is always present in the form of historical tradition and the meaning of these traces is not given; it changes continually with the transformations of the signifier's network. Every historical rupture, every advent of a new master-signifier, changes retroactively the meaning of all tradition, restructures the narration of the past, makes it readable in another, new way.
    - paragraph [ref=e431]: Thus, 'things which mean nothing all of a sudden signify something, but in a quite different domain'. What is a 'journey into the future' if not this 'overtaking' by means of which we suppose in advance the presence in the Other of a certain knowledge - knowledge about the meaning of our symptoms - what is it, then, if not the transference itself?
    - paragraph [ref=e432]: This knowledge is an illusion, it does not really exist in the other, the other does not really possess it, it is constituted afterwards, through our - the subject's - signifier's working; but it is at the same time a necessary illusion, because we can paradoxically elaborate this knowledge only by means of the illusion that the other already possesses it and that we are only discovering it.
    - paragraph [ref=e433]: "If - as Lacan points out - in the symptom, the repressed content is returning from the future and not from the past, then the transference - the actualization of the reality of the unconscious - must transpose us into the future, not into the past. And what is the 'journey into the past' if not this retroactive working-through, elaboration, of the signifier itself? - a kind of hallucinatory mise-en-scene of the fact that in the field of the signifier and only in this field, we can change, we can bring about the past? The past exists as it is included, as it enters (into) the synchronous net of the signifier - that is, as it is symbolized in the texture of the historical memory -and that is why we are all the time 'rewriting history', retroactively giving the elements their symbolic weight by including them in new textures - it is this elaboration which decides retroactively what they 'will have been'. The Oxford philosopher Michael Dummett has written two very interesting articles included in his collection of essays Truth and Other Enigmas: 'Can an Effect Precede its Cause?' and 'Bringing About the Past': the Lacanian answer to these two enigmas would be: yes, because the symptom as a 'return of the repressed' is precisely such an effect which precedes its cause (its hidden kernel, its meaning), and in working through the symptom we are precisely 'bringing about the past' - we are producing the symbolic reality of past, long-forgotten traumatic events. One is therefore tempted to see in the 'time paradox' of science-fiction novels a kind of hallucinatory 'apparition in the Real' of the elementary structure of the symbolic process, the so-called internal, internally inverted eight: a circular movement, a kind of snare where we can progress only in such a manner that we 'overtake' ourselves in the transference, to find ourselves later at a point at which we have already been. The paradox consists in the fact that this superfluous detour, this supplementary snare of overtaking ourselves ('voyage into the future') and then reversing the time direction ('voyage into the past') is not just a subjective illusion, a perception of an objective process taking place in so-called reality independently of these illusions. That supplementary snare is, rather, an internal condition, an internal constituent of the so-called 'objective' process itself only through this additional detour does the past itself, the 'objective' state of things, become retroactively what it always was."
    - paragraph [ref=e434]: Transference is, then, an illusion, but the point is that we cannot bypass the illusion proper to the transference - 'the Truth arises from misrecognition' (Lacan).
    - paragraph [ref=e435]: If this paradoxical structure is not yet clear, let us take another science-fiction example, William Tenn's well-known story 'The Discovery of Mordiel Mathaway'.
    - paragraph [ref=e436]: A distinguished art historian takes a journey in a time machine from the twenty-fifth century to our day to visit and study in vivo the immortal Mordiel Mathaway, a painter not appreciated in our time but later discovered to have been the greatest painter of the era.
    - paragraph [ref=e437]: When he encounters him, the art historian finds no trace of a genius, just an imposter, a megalomaniac, even a swindler who steals his time machine from him and escapes into the future, so that the poor art historian stays tied to our time.
    - paragraph [ref=e438]: The only action open to him is to assume the identity of the escaped Mathaway and to paint under his name all his masterpieces that he remembers from the future - it is he himself who is really the misrecognized genius he was looking for!
    - paragraph [ref=e439]: "This, therefore, is the basic paradox we are aiming at: the subject is confronted with a scene from the past that he wants to change, to meddle with, to intervene in; he takes a journey into the past, intervenes in the scene, and it is not that he 'cannot change anything' - quite the contrary, only through his intervention does the scene from the past become what it always was: his intervention was from the beginning comprised, included."
    - paragraph [ref=e440]:
      - text: The initial 'illusion' of the subject consists in simply forgetting to include in the scene his own act - that is, to overlook how 'it counts, it is counted, and the one who counts is already included in the account'.
      - superscript [ref=e442]:
        - link "3" [ref=e443]:
          - /url: "#fn-ch2-3"
    - paragraph [ref=e444]: "This introduces a relationship between truth and misrecognition/misapprehension by which the Truth, literally, arises from misrecognition, as in the well known story about the 'appointment in Samarra' (from Somerset Maugham's play Sheppey'): DEATH: There was a merchant in Bagdad who sent his servant to market to buy provisions and in a little while the servant came back, white and trembling, and said, Master, just now when I was in the market-place, I was jostled by a woman in the crowd and when I turned I saw it was death that jostled me. She looked at me and made a threat ening gesture; now, lend me your horse, and I will ride away from this city and avoid my fate. I will go to Sarnarra and there death will not find me. The merchant lent him his horse, and the servant mounted it, and he dug his spurs in its flanks and as fast as the horse could gallop he went. Then the merchant went down to the marketplace and he saw me standing in the crowd and he carne to me and said, Why did you make a threatening gesture to my servant when you saw him this morning? That was not a threatening gesture, I said, it was only a start of surprise. I was astonished to see him in Bagdad, for I had an appointment with him tonight in Samarra."
    - paragraph [ref=e445]: "We find the same structure in the myth of Oedipus: it is predicted to Oedi pus's father that his son will kill him and marry his mother, and the prophecy realizes itself, 'becomes true', through the father's attempt to evade it (he exposes his little son in the forest, and so Oedipus, not recog nizing him when he encounters him twenty years later, kills him... J."
    - paragraph [ref=e446]: "In other words, the prophecy becomes true by means of its being commu nicated to the persons it affects and by means of his or her attempt to elude it: one knows in advance one's destiny, one tries to evade it, and it is by means of this very attempt that the predicted destiny realizes itself Without the prophecy, the little Oedipus would live happily with his parents and there would be no 'Oedipus complex'..."
    - heading "Repetition in History" [level=4] [ref=e447]
    - paragraph [ref=e448]: "The time structure with which we are concerned here is such that it is mediated through subjectivity: the subjective 'mistake', 'fault', 'error', misrecognition, arrives paradoxically before the truth in relation to which we are designating it as 'error', because this 'truth' itself becomes true only through - or, to use a Hegelian term, by mediation of - the error. deceives us: the unconscious is not a kind of transcendent, unattainable thing of which we are unable to take cognizance, it is rather - to follow Lacan's wordplay-translation of Unbewusste- une bivue, an overlooking: we overlook the way our act is already part of the state of things we are looking at, the way our error is part of the Truth itself This paradoxical structure in which the Truth arises from misrecognition also gives us the answer to the question: why is the transference necessary, why must the analysis go through it?"
    - paragraph [ref=e449]: The transference is an essential illusion by means of which the final Truth (the meaning of a symptom) is produced.
    - paragraph [ref=e450]: We find the same logic of the error as an internal condition of truth with Rosa Luxemburg, with her description of the dialectics of the revo lutionary process.
    - paragraph [ref=e451]: "We are alluding here to her argument against Eduard Bernstein, against his revisionist fear of seizing power 'too soon', 'prema turely', before the so-called 'objective conditions' had ripened - this was, as is well known, Bernstein's main reproach to the revolutionary wing of social democracy: they are too impatient, they want to hasten, to outrun the objective logic of historical development. Rosa Luxemburg's answer is that the first seizures of power are necessarily 'premature': the only way for the working class to reach its 'maturity', to await the arrival of the 'appropriate moment' for the seizure of power, is to form itself, to educate itself for this act of seizure, and the only possible way of achieving this education is precisely the 'premature' attempts..."
    - paragraph [ref=e452]: "If we merely wait for the 'appropriate moment' we will never live to see it, because this 'appropriate moment' cannot arrive without the subjective conditions of the maturity of the revolutionary force (subject) being fulfilled - that is, it , can arrive only after a series of'premature', failed attempts. The opposition to the 'premature' seizure of power is thus revealed as opposition to the seizure of power as such, in general: to repeat Robespierre's famous phrase, the revisionists want a 'revolution without revolution'."
    - paragraph [ref=e453]: "If we look at this closely, we perceive that what is at stake in Rosa Luxemburg's argument is precisely the impossibility of metalanguage in the revolutionary process: the revolutionary subject does not 'conduct', this process, and because of this - because the temporality of the revolution passes through subjectivity - we cannot 'make the revolution at the right moment' without the previous 'premature', failed attempts. Here, in the opposition between Bernstein and Luxemburg, we have the opposition between the obsessional (man) and the hysterical (woman): the obsessional is delaying, putting off the act, waiting for the right moment, while the hysteric (so to speak) overtakes herself in her act and thus unmasks the falsity of the obsessional's position."
    - paragraph [ref=e454]: "This is also what is at stake in Hegel's theory of the role of repetition in history: 'a political revolution is generally sanctioned by the opinion of the people only when it is renewed' - that is, it can succeed only as a repetition of a first failed attempt."
    - paragraph [ref=e455]: Why this need for repetition?
    - paragraph [ref=e456]:
      - text: "Hegel developed his theory of repetition apropos of the case of Julius Caesar's death: when Caesar consolidated his personal power and strengthened it to imperial proportions, he acted 'objectively' (in itself) in accordance with historical truth, historical necessity - the Republican form was losing its validity, the only form of government which could save the unity of the Roman state was monarchy, a state based upon the will of a single individual; but it was still the Republic which prevailed formally (for itself, in the opinion of the people) - the Republic 'was still alive only because she forgot that she was already dead', to paraphrase the famous Freudian dream of the father who did not know he was already dead: 'His father was alive once more and was talking to him in his usual way, but [the remarkable thing was that he had really died, only he did not know it."
      - superscript [ref=e458]:
        - link "4" [ref=e459]:
          - /url: "#fn-ch2-4"
    - paragraph [ref=e460]: "To the 'opinion' which still believed in the Republic, Caesar's amassing of personal power - which was, of course, contrary to the spirit of the Republic - appeared an arbitrary act, an expression of contingent individual self-will: the conclusion was that if this individual (Caesar) were to be removed, the Republic would regain its full splendour. But it was precisely the conspirators against Caesar (Brutus, Cassius, and the others) who - following the logic of the 'cunning of reason' - attested the Truth (that is, the historical necessity) of Caesar: the final result, the outcome of Caesar's murder, was the reign of Augustus, the first caesar."
    - paragraph [ref=e461]:
      - text: "The Truth thus arose from failure itself in failing, in missing its express goal, the murder of Caesar fulfilled the task which was, in a Machiavellian way, assigned to it by history: to exhibit the historical necessity by denouncing its own non-truth - its own arbitrary, contingent character."
      - superscript [ref=e463]:
        - link "5" [ref=e464]:
          - /url: "#fn-ch2-5"
    - paragraph [ref=e465]: "The whole problem of repetition is here: in this passage from Caesar (the name of an individual) to caesar (title of the Roman emperor). The murder of Caesar - historical personality - provoked, as its final result, the installation of caesarism: Caesar-person repeats itself as caesar-title."
    - paragraph [ref=e466]: What is the reason, the driving force, of this repetition?
    - paragraph [ref=e467]: "At first sight the answer seems to be clear: the delay of the consciousness as to the 'objective' historical necessity. A certain act through which breaks historical necessity is perceived by the consciousness (the 'opinion of the people') as arbitrary, as something which also could not have happened; because of this perception people try to do away with its consequences, to restore the old state of things, but when this act repeats itselfit is finally perceived as an expression of the underlying historical necessity."
    - paragraph [ref=e468]: In other words, repetition is the way historical necessity asserts itself in the eyes of'opinion'.
    - paragraph [ref=e469]: But such an idea of repetition rests upon the epistemologically naive presupposition of an objective historical necessity, persisting independently of consciousness (of the 'opinion of the people') and asserting itself finally through repetition. What is lost in this notion is the way so-called historical necessity itself is constituted through misrecognition, through the initial failure of'opinion' to recognize its true character - that is, the way truth itself arises from misrecognition.
    - paragraph [ref=e470]: "The crucial point here is the changed symbolic status of an event: when it erupts for the first time it is experienced as a contingent trauma, as an intrusion of a certain non-symbolized Real; only through repetition is this event recognized in its symbolic necessity - it finds its place in the symbolic network; it is realized in the symbolic order. But as with Moses in Freud's analysis, this recognition-through-repetition presupposes necessarily the crime, the act of murder: to realize himself in his symbolic necessity - as a power-title - Caesar has to die as an empirical, flesh-and-blood personality, precisely because the 'necessity' in question is a symbolic one."
    - paragraph [ref=e471]: It is not only that in its first form of appearance, the event (for example, Caesar's amassing of individual power) was too traumatic for the people to grasp its real signification - the misrecognition of its first advent is immediately 'internal' to its symbolic necessity, it is an immediate constituent of its final recognition.
    - paragraph [ref=e472]: The first murder (the parricide of Caesar) opened up the guilt, and it was this guilt, this debt, which was the real driving force of the repetition. The event did not repeat itself because of some objective necessity, independent of our subjective inclination and thus irresistible, but because its repetition was a repayment of our symbolic debt.
    - paragraph [ref=e473]: "In other words, the repetition announces the advent of the Law, of the Name-of-the-Father in place of the dead, assassinated father: the event which repeats itself receives its law retroactively, through repetition."
    - paragraph [ref=e474]: That is why we can grasp Hegelian repetition as a passage from a lawless series to a lawlike series, as the inclusion of a lawless series - as a gesture of interpretation par excellence, as a symbolic appropriation of a traumatic, non-symbolized event (according to Lacan, interpretation always proceeds under the sign of the Name-of-the-Father).
    - paragraph [ref=e475]: "Hegel was thus probably the first to articulate the delay which is constitutive of the act of interpretation: the interpretation always sets in too late, with some delay, when the event which is to be interpreted repeats itself; the event cannot already be lawlike in its first advent. This same delay is also formulated in the Preface to Hegel's Philosophy of Right, in the famous passage about the owl of Minerva (that is, the philosophical comprehension of a certain epoch), which takes flight only in the evening after this epoch has already come to its end."
    - paragraph [ref=e476]: "The fact that the 'opinion of the people' saw in Caesar's action an therefore not a simple case of'delay of the consciousness in relation to the effectivity': the point is that this necessity itself- which was misrecognized by opinion in its first manifestation; that is, mistaken for a contingent self-will - constitutes itself, realizes itself, through this misrecognition. And we should not be surprised to find the same logic of repetition in the history of the psychoanalytic movement: it was necessary for Lacan to repeat his split with the International Psycho-Analytical Association."
    - paragraph [ref=e477]: The first split (in 1953) was still experienced as a traumatic contingency - Lacanians were still trying to patch things up with the IPA, to regain admission - but in 1964 it also became clear to their 'opinion' that there was a necessity in this split, so they cut their links with the IPA and Lacan constituted his own School.
    - heading "Hegel with Austen" [level=4] [ref=e478]
    - paragraph [ref=e479]: "Austen, not Austin: it is Jane Austen who is perhaps the only counterpart to Hegel in literature: Pride and Prejudice is the literary Phenomenology oj Spirit; Mansfield Park the Sdence oj\"Logic and Emma the Encyclopaedia... No wonder, then, that we find in Pride and Prejudice the perfect case of this dialectic of truth arising from misrecognition. Although they belong to different social classes - he is from an extremely rich aristocratic family, she from the impoverished middle classes - Elizabeth and Darcy feel a strong mutual attraction. Because of his pride, his love appears to Darcy as something unworthy; when he asks for Elizabeth's hand he confesses openly his contempt for the world to which she belongs and expects her to accept his proposition as an unheard-of honour. But because of her prejudice, Elizabeth sees him as ostentatious, arrogant and vain: his condescending proposal humiliates her, and she refuses him."
    - paragraph [ref=e480]: "This double failure, this mutual misrecognition, possesses a structure of a double movement of communication where each subject receives from the other its own message in the inverse form: Elizabeth wants to present herself to Darcy as a young cultivated woman, fun of wit, and she gets full of false finesse; Darcy wants to present himself to her as a proud gentle man, and he gets from her the message 'your pride is nothing but contemptible arrogance'. After the break in their relationship each discovers, through a series of accidents, the true nature of the other - she the sensitive and tender nature of Darcy, he her real dignity and wit - and the novel ends as it should, with their marriage. The theoretical interest of this story lies in the fact that the failure of their first encounter, the double misrecognition concerning the real nature of the other, functions as a positive condition of the final outcome: we cannot go directly for the truth, we cannot say, 'If, from the very beginning, she had recognized his real nature and he hers, their story could have ended at once with their marriage.'"
    - paragraph [ref=e481]: "Let us take as a comical hypothesis that the first encounter of the future lovers. was a success - that Elizabeth had accepted Darcy's first proposal. What would happen? Instead ofbeing bound together in true love they would become a vulgar everyday couple, a liaison of an arrogant, rich man and a pretentious, empty-minded young girl. If we want to spare ourselves the painful roundabout route through the misrecognition, we miss the Truth itself: only the 'working-through' of the misrecognition allows us to accede to the true nature of the other and at the same time to overcome our own deficiency - for Darcy, to free himself of his false pride; for Elizabeth, to get rid of her prejudices. These two movements are interconnected because Elizabeth encoun ters, in Darcy's pride, the inverse image of her own prejudices; and Darcy, in Elizabeth's vanity, the inverse image of his own false pride."
    - paragraph [ref=e482]: "In other words, Darcy's pride is not a simple, positive state of things existing independently of his relationship with Elizabeth, an immediate property ofhis nature; it takes place, it appears, only flom the perspective ofher prgudices, vice versa, Elizabeth is a pretentious empty-minded girl only in Darry's arrogant view. To articulate things in Hegelian terms: in the perceived deficiency of the other, each perceives- - without knowing it - the fllsity 0/ his/herownsuijective position; the deficiency of the other is simply an objec Two Hegelian jokes There is a well-known, very Hegelian joke that illustrates perfectly the way truth arises from misrecognition - the way our path towards truth coincides with the truth itself"
    - paragraph [ref=e483]: "At the beginning of this century, a Pole and a Jew were sitting in a train, facing each other. The Pole was shifting nervously, watching the Jew all the time; something was irritating him; finally, unable to restrain himself any longer, he exploded: 'Tell me, how do you Jews succeed in extracting from people the last small coin and in this way accumulate all your wealth?' The Jew replied: 'OK, I will tell you, but not for nothing; first, you give me five zloty [Polish money].' After receiving the required amount, the Jew began: 'First, you take a dead fish; you cut offher head and put her entrails in a glass of water. Then, around midnight, when the moon is full, you must bury this glass in a churchyard... ''And: the Pole interrupted him greedily, 'if I do all this, will I also become rich?' 'Not too quickly: replied the Jew; 'This is not all you must do; but if you want to hear the rest, you must pay me another five zloty!' After receiving the money again, the Jew continued his story; soon afterwards, he again demanded more money, and so on, until finally the Pole exploded in fury: 'You dirty rascal, do you really think I did not notice what you were aiming at? There is no secret at all, you simply want to extract the last small coin from mel' The Jew answered him calmly and with resignation: 'Well, now you see how we, the Jews... ' Everything in this small story is susceptible to interpretation, starting with the curious, inquisitive way the Pole looks at the Jew - it means that from the very beginning the Pole is caught in a relationship of transference: that the Jew embodies for him the 'subject presumed to know' - to know the secret of extracting money from people. The point of the story is of course that the Jew has not deceived the Pole: he kept his promise and taught him how to extract money from people. What is crucial here is the Pole blurts out 'There is no secret at all, you simply want to extract the last small coin from me!', he is already telling the truth without knowing it - that is to say, he sees, in the Jew's manipulation, a simple deception. What he misses is that through this very deception the Jew kept his word, delivered him what he was paid for (the secret of how the Jews...). The Pole's error is simply his perspective: he looks forward ro the 'secret' being revealed somewhere at the end; he situates the Jew's narration as a path to the final revelation of the 'secret'; but the real 'secret' is already in the nartation itself: in the way the Jew, through his narration, captures the Pole's desire; in the way the Pole is absorbed in this narration and prepared to pay for it. The Jew's 'secret' lies, then, in our own (the Pole's) desire: in the fact that the Jew knows how to take our desire into account."
    - paragraph [ref=e484]:
      - text: "That is why we can say that the final tum of the story, with its double twist, corresponds to the final moment of the psychoanalytic cure, the dissolution of trans ference and 'going through the fantasy': when the Pole breaks out in fury he has already stepped out of transference, but he has yet to traverse his fantasy - this is achieved only by realizing how, through his deception, the Jew has kept his word. The fascinating' secret' which drives us to follow the Jew's narration carefully is precisely the Lacanian objet petit a, the chimerical object of fantasy, the object causing our desire and at the same time - this is its paradox - posed retroactively by this desire; in 'going through the fmtasy' we experience how this fantasy-object (the 'secret') only materializes the void of our desire. Another well-known joke possesses exactly the same structure, but this is usually overlooked - we are referring, of course, to the joke about the Door of the Law from the ninth chapter of Kafka's Trial, to its final turn around when the dying man from the country asks the door-keeper: 'Everyone strives to attain the law, how does it come about, then, that in all these years no one has come seeking admittance but me?' The door-keeper perceives that the man is at the end of his strength and gain admittance through this door, since the door was intended only for you. I am now going to shut it."
      - superscript [ref=e486]:
        - link "6" [ref=e487]:
          - /url: "#fn-ch2-6"
      - text: "This final twist is perfectly homologous to the one at the end of the story about the Pole and the Jew: the subject experiences how he (his desire) was part of the game from the very beginning, how the entrance was meant only for him, how the stake of the narration was only to capture his desire. We could even invent another ending for Kafka's story to bring it nearer to the joke about the Pole and the Jew: after the long wait, the man from the country breaks out in fury and begins to cry at the door keeper: 'You dirty rascal, why do you pretend to guard the entrance to some enormous secret, when you know very well that there is no secret beyond the door, that this door is intended only for me, to capture my desire!' and the door-keeper (if he were an analyst) would answer him calmly: 'You see, now you've discovered the real secret: beyond the door is only what your desire introduces there... ' In both cases, the nature of the final twist follows the Hegelian logic of surmounting, of abolishing the 'bad infinity'. That is to say, in both cases the starting point is the same: the subject is confronted with some substantial Truth, a secret from which he is excluded, which evades him ad infinitum - the inaccessible heart of the Law beyond the infinite series of doors; the unattainable last answer, the last secret of how the Jews extract money from us, awaiting us at the end of the Jew's narration (which could go on ad infinitum). And the solution is the same in both cases: the subject has to grasp how, from the very start of the game, the door conceal ing the secret was meant only for him, how the real secret at the end of the Jew's narration is his own desire - in short, how his external position vis-a-vis the Other (the fact that he experiences himself as excluded from the secret of the Other) is internal to the Other itself."
    - paragraph [ref=e488]: "Here we encounter a kind of, reflexivity' which cannot be reduced to philosophical reflection: the very feature which seems to exclude the subject from the Other (his desire to penetrate the secret of the Other - the secret of the Law, the secret of how the Jews...) is already a 'reflexive determination' of the Other; precisely as excluded from the Other, we are already part of its game."
    - heading "A Time Trap" [level=4] [ref=e489]
    - paragraph [ref=e490]:
      - text: "The positivity proper to the misrecognition - the fact that the misrecognition functions as a 'productive' instance - is to be conceived in an even more radical way: not only is the misrecognition an immanent condition of the final advent of the truth, but it already possesses in itself, so to speak, a positive ontological dimension: it founds, it renders possible a certain positive entity. To exemplify this let us refer again to science fiction, to one of the classic science-fiction novels, The Door into Summer by Robert A. Heinlein. The hypothesis of this novel (written in 1957) is that in 1970 hibernation has become an ordinary procedure, managed by numerous agencies. The hero, a young engineer by the name of Daniel Boone Davis, hibernates himself as a professional deception for thirty years. After his awakening in December 2000, he encounters - among other adventures - the old Dr Twitchell, a kind of 'mad genius' who has constructed a time machine; Davis persuades Dr Twitchell to use this machine on him and to transpose him back into the year 1970. There our hero arranges his affairs (by invest ing his money in a company that he knows, from his voyage to 2000, will be a great success in thirty years' time, and even by arranging for his own wedding in 2000: he organizes also the hibernation of his furure bride) and then hibernates himself again for thirty years; the date of his second awakening is 27 April 2001. This way, all ends well - there is just one small detail annoying the hero: in the year 2000, the newspapers publish, beside 'Births', 'Deaths' and 'Marriages', also the column 'Awakenings', listing the names of all persons roused from hibernation. His first stay in the years 2000 and 2(101 lasted from December 2000 until June 2001; this means that Doc Twitchell has transposed him back to the past ofterthe date of his second awakening in name in the list of those awakened on Friday 27 April: 'D. B. Davis'. Why did he, during his first stay in 2001, miss his own name among the 'Awakenings', although he was all the time a very attentive reader of this column? Was this an accidental oversight? But what would I have done ifI had seen it? Gone there, met myself and gone stark mad? No, for if! had seen it, I would not have done the things I did afterward - 'afterward' for me - which led up to it. Therefore it could never have happened that way. The control is a negative feedback type, with a built-in 'fail safe', because the very existence of that line of print depended on my not seeing it; the apparent possibility that I might have seen it is one of the excluded 'not possibles' on the basic circuit design. 'There's a divinity that shapes our ends, rough-hew them how we will.' Free will and predestination in one sentence and both true."
      - superscript [ref=e492]:
        - link "7" [ref=e493]:
          - /url: "#fn-ch2-7"
    - paragraph [ref=e494]: "Here we have the literal definition of the 'agency of the letter in the uncon scious': the line 'the very existence of [which] depended on my not seeing it'."
    - paragraph [ref=e495]: "If, during his first stay in 2001, the subject had perceived his own name in the newspaper - if he had perceived during his first stay the trace of his second stay in 2001 - he would have acted thereupon in a different manner (he would not have travelled back into the past, and so on): that is, he would have acted in a way that would have prevented his name from appearing in the newspaper:"
    - paragraph [ref=e496]: "The oversight itself therefore has, so to speak, a negative ontological dimension: it is the 'condition of the possibility' of the letter that it must be overlooked, that we must not take notice of it - its very existence depends on its not being seen by the subject."
    - paragraph [ref=e497]: "Here we have a kind of inversion of the traditional esse -perain: it is the non-percipi which is the condition of esse."
    - paragraph [ref=e498]: "This is perhaps the right way to conceive the 'pre ontological' status of the unconscious (evoked by Lacan in his Seminar Xl): the unconscious is a paradoxical letter which insistfonly in so far as it does not exist ontologically."
    - paragraph [ref=e499]: In a homologous way, we could also determine the status of knowledge in psychoanalysis.
    - paragraph [ref=e500]: The knowledge at work here is knowledge concerning the most intimate, traumatic being of the subject, knowledge about the particular logic of his enjoyment. In his everyday attitude, the subject refers to the objects of his Umwelt, of the world that surrounds him, as to some given positivity; psychoanalysis brings about a dizzy experience of how this given positivity exists and retains its consistency only in so far as somewhere else (on another scene, an einem anderen Schau platz) some fundamental non-knowledge insists - it brings about the terrifying expe rience that if we come to know too much, we may lose our very being.
    - paragraph [ref=e501]: "Let us take, for example, the Lacanian notion of the imaginary self: this self exists only on the basis of the misrecognition of its own conditions; it is the effect of this misrecognition. So Lacan's emphasis is not on the supposed incapacity of the self to reflect, to grasp its own conditions - on its being the plaything of inaccessible unconscious forces: his point is that the subject can pay for such a reflection with the loss of his very ontological consistency. It is in this sense that the knowledge which we approach through psychoanalysis is impossible-real: we are on dangerous ground; in getting too close to it we observe suddenly how our consistency, our positivity, is dissolving itself In psychoanalysis, knowledge is marked by a lethal dimension: the subject must pay the approach to it with his own being."
    - paragraph [ref=e502]: "In other words, to abolish the misrecognition means at the same time to abolish, to dissolve, the 'substance' which was supposed to hide itself behind the form-illusion of misrecognition. This 'substance' - the only one recognized in psychoanalysis - is, according to Lacan, enjoyment [joUissanceJ: access to knowledge is then paid with the loss of enjoyment - enjoyment, in its stupidity, is possible only on the basis of certain non-knowledge, ignorance. No wonder, then, that the reaction of the analysand to the analyst is often paranoid: by driving him towards knowledge about his desire, the analyst wants effectively to steal from him his most intimate treasure, the kernel of his enjoyment."
    - heading "Symptom as Real" [level=3] [ref=e503]
    - heading "The 'Titanic' as Symptom" [level=4] [ref=e504]
    - paragraph [ref=e505]: "This dialectics of overtaking ourselves towards the future and simultaneous retroactive modification of the past - dialectics by which the error is internal to the truth, by which the misrecognition possesses a positive ontological dimension - has, however, its limits; it stumbles on to a rock upon which it becomes suspended. This rock is of course the Real, that which resists symbolization: the traumatic point which is always missed but none the less always returns, although we try - through a set of different strategies - to neutralize it, to integrate it into the symbolic order. In the perspective of the last stage of Lacanian teaching, it is precisely the symptom which is conceived as such a real kernel of enjoyment, which persists as a surplus and returns through all attempts to domesticate it, to gentrify it (if we may be permitted to use this term adapted to designate strategies to domesticate the slums as 'symptoms' of our cities), to dissolve it by means of explication, of putting-into-words its meaning. To exemplify this shift of emphasis in the concept of symptom in Lacan's teaching, let us take a case which is today again attracting public attention: the wreck of the Titanic."
    - paragraph [ref=e506]: "Of course, it is already a commonplace to read Titanic as a symptom in the sense of 'knot of meanings': the sinking of the Titanic had a traumatic effect, it was a shock, 'the impossible happened', the unsinkable ship had sunk; but the point is that precisely as a shock, this sinking arrived at its proper time - 'the time was waiting for it': even before it actually happened, there was already a place opened, reserved for it in fantasy-space. It had such a terrific impact on the 'social imaginary' by virtue of the fact that it was expected. It was foretold in amazing detail: In 1898 a struggling author named Morgan Robertson concocted a novel about a fabulous Atlantic liner, far larger than any that had ever been built. Robertson loaded his ship with rich and complacent people and then wrecked it one cold April night on an iceberg."
    - paragraph [ref=e507]: This somehow showed the futility of everything, and in fact, the book was called Futility when it appeared that year, published by the firm of M. F. Mansfield.
    - paragraph [ref=e508]: Fourteen years later a British shipping company named the White Star Line built a steamer remarkably like the one in Robertson's novel. The new liner was 66,000 tons displacement; Robertson's was 70,000. The real ship was 882.5 feet long; the fictional one was 800 feet. Both vessels were triple screw and could make 24-25 knots. Both could carry about 3,000 people, and both had enough lifeboats for only a fraction of this number. But, then, this did not seem to matter because both were labeled 'unsinkable'.
    - paragraph [ref=e509]: On April 10, 1912, the real ship left Southampton on her maiden voyage to New York. Her cargo included a priceless copy of the Rubaiyat of Omar Khayyam and a list of passengers collectively worth two hundred and fifty million dollars. On her way over she too struck an iceberg and went down on a cold April night.
    - paragraph [ref=e510]:
      - text: Robertson called his ship the Titan; the White Star Line called its ship the Titanic.
      - superscript [ref=e512]:
        - link "8" [ref=e513]:
          - /url: "#fn-ch2-8"
    - paragraph [ref=e514]: "The reasons, the background for this incredible coincidence, are not difficult to guess: at the turn of the century, it was already part of the Zeitgeist that a certain age was coming to an end - the age of peaceful progress, of well-defined and stable class distinctions, and so on: that is, the long period from 1850 until the First World War."
    - paragraph [ref=e515]: New dangers were hanging in the air (labour movements, eruptions of nationalism, anti-Semitism, the danger of war) which would soon tarnish the idyllic image of Western civilization, releasing its 'barbaric' potentials.
    - paragraph [ref=e516]: "And if there was a phenomenon which, at the turn of the century, embodied the end of this age, it was the great transatlantic liners: floating palaces, wonders of technical progress; incredibly complicated and well-functioning machines, and at the same time the meeting-place of the cream of society; a kind of microcosm of the social structure, an image of society not as it really was but seen as society wanted to be seen in order to appear likeable, as a stable totality with well-defined class distinctions, and so on - in brief the ego-ideal of society."
    - paragraph [ref=e517]: "In other words, the wreck of the Titanic made such a tremendous impact not because of the immediate material dimensions of the catastrophe but because of its symbolic overdetermination, because of the ideological meaning invested in it: it was read as a 'symbol', as a condensed, metaphorical representation of the approaching catastrophe of European civilization itself. The wreck of the Titanic was a form in which society lived the experience of its own death, and it is interesting to note how both the traditional rightist and leftist readings retain this same perspective, with only shifts of emphasis. From the traditional perspective, the Titanic is a nostalgic monument of a bygone era of gallantry lost in today's world of vulgarity; from the leftist viewpoint, it is a story about the impotence of an ossified class society. But all these are commonplaces that could be found in any report on the Titanic - we can easily explain, in this way, the metaphorical overdetermination which confers on the Titanic its symbolic weight. The problem is that this is not all. We can easily convince ourselves of this by looking at the photos of the wreck of the Titanic taken recently by undersea cameras - where lies the terrifying power of fascination exercised by these pictures? It is, so to speak, intuitively clear that this fascinating power cannot be explained by the symbolic overdetermination, by the metaphorical meaning of the Titanic: its last resort is not that of representation but that of a certain inert presence. The Titanic is a Thing in the Lacanian sense: the material leftover, the materialization of the terrifying, impossible jouissance. By looking at the wreck we gain an insight into the forbidden domain, into a space that should be left unseen: visible fragments are a kind of coagulated remnant of the liquid flux of jouissance, precisely, it is a meaning permeated with enjoyment, a Lacanian jouis-sense. The wreck of the Titanic therefore functions as a sublime object: a positive, material object elevated to the status of the impossible Thing. And perhaps all the effort to articulate the metaphorical meaning of the Titanic is nothing but an attempt to escape this terrifying impact of the Thing, an attempt to domesticate the Thing by reducing it to its symbolic status, by providing it with a meaning. We usually say that the fascinating presence of a Thing obscures its meaning; here, the opposite is true: the meaning obscures the terrifying impact of its presence. From symptom to sinthome"
    - paragraph [ref=e518]: "This, then, is the symptom - and it is on the basis of this notion of the symptom that we must locate the fact that in the final years of Lacan's teaching we find a kind of universalization of the symptom: almost every thing that is becomes in a way symptom, so that finally even woman is determined as the symptom of man. We can even say that 'symptom' is Lacan's final answer to the eternal philosophical question 'Why is there something instead of nothing?' - this 'something' which 'is' instead of nothing is indeed the symptom. The general reference of the philosophical discussion is usually the triangle world - language-subject, the relation of the subject to the world of objects, mediated through language; Lacan is usually reproached for his 'absolutism of the signifier' - the reproach is that he does not take into account the objective world, that he limits his theory to the interplay of subject and language; as if the objective world does not exist, as if it is only the imaginary effect-illusion of the signifier's play. But"
    - paragraph [ref=e519]: "Lacan's answer to this reproach is that not only does the world - as a given whole of objects - not exist, but that neither do language and subject exist: it is already a classic Lacanian thesis that 'the big Other [that is, the symbolic order as a consistent, closed totality] does not exist', and the subject is denoted by $, the crossed, blocked S, a void, an empty place in the signifier's"
    - paragraph [ref=e520]: "At this point we must of course ask ourselves the naive but necessary question: if the world and language and subject do not exist, what does exist; more precisely: what confers on existing phenomena their consistency?"
    - paragraph [ref=e521]: "Lacan's answer is, as we have already indicated, symptom. To this answer, we must give its whole anti-post-structuralist emphasis: the fundamental gesture of post-structuralism is to deconstruct every substantial identity, to denounce behind its solid consistency an interplay of symbolic overdetermination -briefly, to dissolve the substantial identity into a network of non-substantial, differential relations; the notion of symptom is the necessary counterpoint to it, the substance of enjoyment, the real kernel around which this signifying interplay is structured."
    - paragraph [ref=e522]: To seize the logic of this universalization of symptom, we must connect it with another universalization, that of foreclosure (Verwerfung). In his unpublished Seminar, J.-A. Miller ironically spoke of the passage from special to general theory of foreclosure (alluding, of course, to Einstein's passage from special to general theory of relativity).
    - paragraph [ref=e523]: When Lacan introduced the notion of foreclosure in the 1950S, it designated a specific phenomenon of the exclusion of a certain key-signifier (point de capiton, Name-of-the-Father) from the symbolic order, triggering the psychotic process; here, the foreclosure is not proper to language as such but a distinctive feature of the psychotic phenomena. And, as Lacan reformulated Freud, what was foreclosed from the Symbolic returns in the Real - in the form of hallucinatory phenomena, for example.
    - paragraph [ref=e524]: "However, in the last years of his teaching Lacan gave universal range to this function of foreclosure: there is a certain foreclosure proper to the order of signifier as such; whenever we have a symbolic structure it is structured around a certain void, it implies the foreclosure of a certain key-signifier. The symbolic structuring of sexuality implies the lack of a signifier of the sexual relationship, it implies that 'there is no sexual rela tionship', that the sexual relation cannot be symbolized - that it is an impossible, 'antagonistic' relationship. And to seize the interconnection between the two universalizations, we must simply again apply the proposition 'woman is a symptom': woman does not exist, her signifier is originally foreclosed, and that is why she returns as a symptom of man."
    - paragraph [ref=e525]: "Symptom as real - this seems directly opposed to the classic Lacanian thesis that the unconscious is structured like a language: is not the symptom a symbolic formation par excellence, a cyphered, coded message which can be dissolved through interpretation because it is already in itself a signifier? Is nbt the whole point of Lacan that we must detect, behind the corporeal-imaginary mask (for example, of a hysterical symptom), its symbolic overdetermination? To explain this apparent contradiction, we must take into account the different stages of Lacan's development."
    - paragraph [ref=e526]: We can use the concept of symptom as a kind of clue, or index, allowing us to differentiate the main stages of Lacan's theoretical development.
    - paragraph [ref=e527]: At the beginning, in the early 1950S, a symptom was conceived as a symbolic, signifying formation, as a kind of cypher, a coded message addressed to the big Other which later was supposed to confer on it its true meaning.
    - paragraph [ref=e528]: "The symptom arises where the world failed, where the circuit of the symbolic communication was broken: it is a kind of'prolongation of the communication by other means'; the failed, repressed word articulates itself in a coded, cyphered form. The implication of this is that the symptom can not only be interpreted but is, so to speak, already formed with an eye to its interpretation: it is addressed to the big Other presumed to contain its meaning."
    - paragraph [ref=e529]: "In other words, there is no symptom without its addressee: in the psychoanalytic cure the symptom is always addressed to the analyst, it is an appeal to him to deliver its hidden meaning. We can also say that there is no symptom without transference, without the position of some subject presumed to know its meaning. Precisely as an enigma, the symptom, so to speak, announces its dissolution through interpretation: the aim of psychoanalysis is to re-establish the broken network of communi cation by allowing the patient to verbalize the meaning of his symptom: through this verbalization, the symptom is automatically dissolved."
    - paragraph [ref=e530]: "This, then, is the basic point: in its very constitution, the symptom implies the field of the big Other as consistent, complete, because its very formation"
    - paragraph [ref=e531]: "But here the problems began: why, in spite of its interpretation, does the symptom not dissolve itself; why does it persist?"
    - paragraph [ref=e532]: The Lacanian answer is, of course, e'Y·qyment. The symptom is not only a cyphered message, it is at the same time a way for the subject to organize his enjoyment - that is why, even after the completed interpretation, the subject is not prepared to renounce his symptom; that is why he 'loves his symptom more than himself.
    - paragraph [ref=e533]: "In locating this dimension of enjoyment in the symptom, Lacan proceeded in two stages. First, he tried to isolate this dimension of enjoyment as that of fantasy, and to oppose symptom and fantasy through a whole set of distinctive features: symptom is a signifying formation which, so to speak, 'overtakes itself towards its interpretation - that is, which can be analysed; fantasy is an inert construction which cannot be analysed, which resists interpre tation. Symptom implies and addresses some non-barred, consistent big Other which will retroactively confer on it its meaning; fantasy implies a crossed-out, blocked, barred, non-whole, inconsistent Other - that is to say, it is filling out a void in the Other. Symptom (for example, a slip of the tongue) causes discomfort and displeasure when it occurs, but we embrace its interpretation with pleasure; we explain gladly to others the meaning of our slips; their 'intersubjective recognition' is usually a source of intellectual satisfaction. When we abandon ourselves to fantasy (for example, in daydreaming) we feel immense pleasure, but on the contrary it causes us great discomfort and shame to confess our fantasies to others."
    - paragraph [ref=e534]: "In this way we can also articulate two stages of the psychoanalytic process: interpretation of symptoms - going through fantasy. When we are confronted with the patient's symptoms, we must first interpret them and penetrate through them to the fundamental fantasy as the kernel of enjoyment which is blocking the further movement of interpretation; then we must accomplish the crucial step of going through the fantasy, of obtaining distance from it, of experiencing how the fantasy-formation just masks, fills out a certain void, lack, empty place in the Other. obtained distance from the fantasy-framework of their reality, but whose key symptom still persists? How do we explain this fact? What do we do with a symptom, with this pathological formation which persists not only beyond its interpretation but even beyond fantasy?"
    - paragraph [ref=e535]:
      - text: Lacan tried to answer this challenge with the concept of sinthome, a neologism containing a set of associations (synthetic-artificial man, synthesis between symptom and fantasy, Saint Thomas, the saint...).
      - superscript [ref=e537]:
        - link "9" [ref=e538]:
          - /url: "#fn-ch2-9"
    - heading "Symptom as Sinthome" [level=4] [ref=e539]
    - paragraph [ref=e540]: "is a certain signifying formation penetrated with enjoyment: it is a signifier as a bearer ofjouis-sense, enjoyment-in-sense."
    - paragraph [ref=e541]: "What we must bear in mind here is the radical ontological status of symptom: symptom, conceived as sinthome, is literally our only substance, the only positive support of our being, the only point that gives consistency to the subject."
    - paragraph [ref=e542]: In other words, symptom is the way we - the subjects - 'avoid madness', the way we 'choose something (the symptom-formation) instead of nothing (radical psychotic autism, the destruction of the symbolic universe)' through the binding of our enjoyment to a certain signifying, symbolic formation which assures a minimum of consistency to our being-in-the-world.
    - paragraph [ref=e543]: "If the symptom in this radical dimension is unbound, it means literally 'the end of the world' - the only alternative to the symptom is nothing: pure autism, a psychic suicide, surrender to the death drive, even to the total destruction of the symbolic universe."
    - paragraph [ref=e544]: That is why the final Lacanian definition of the end of the psychoanalytic process is Identification with the symptom.
    - paragraph [ref=e545]: "The analysis achieves its end when the patient is able to recognize, in the Real of his symptom, the only support of his being. That is how we must read Freud's wo es war, soli ich werden: you, the subject, must identify yourself with the place where your symptom already was; in its 'pathological' particularity you must recognize the element which gives consistency to your being."
    - paragraph [ref=e546]: "This, then, is a symptom: a particular, 'pathological', signifying formation, a binding of enjoyment, an inert stain resisting communication and interpretation, a stain which cannot be included in the circuit of discourse, of social bond network, but is at the same time a positive condition of it."
    - paragraph [ref=e547]: "Now it is perhaps clear why woman is, according to Lacan, a symptom of man - to explain this, we need only remember the well-known male chauvinist wisdom often referred to by Freud: women are impossible to bear, a source of eternal nuisance, but still, they are the best thing we have of their kind; without them, it would be even worse."
    - paragraph [ref=e548]: So if woman does not exist, man is perhaps simply a woman who thinks that she does exist.
    - heading "'In You More Than Yourself'" [level=4] [ref=e549]
    - paragraph [ref=e550]: In so far as the sinthome is a certain signifier which is not enchained in a network but immediately filled, penetrated with enjoyment, its status is by definition 'psychosomatic', that of a terrifYing bodily mark which is merely a mute attestation bearing witness to a disgusting enjoyment, without representing anything or anyone.
    - paragraph [ref=e551]: Is not Franz Kafka's story 'A Country Doctor' therefore the story of a sinthome in its pure - distilled, so to speak - form? The open wound growing luxuriantly on the child's body, this nauseous, verminous aperture - what is it if not the embodiment of vitality as such, of the life-substance in its most radical dimension of meaningless enjoyment?
    - paragraph [ref=e552]:
      - text: In his right side, near the hip, was an open wound as big as the palm of my hand. Rose-red, in many variations of shade, dark in the grooves, lighter at the edges, softly granulated, with irregular clots of blood, open as a surface-mine to the daylight. That was how it looked from a distance. But on a closer inspection there was another complication. I could not help a low whistle of surprise. Worms, as thick and as long as my little finger, themselves rose-red and blood-spotted as well, were wriggling from their fastness in the interior of the wound towards the light, with small white heads and many little legs. Poor young man, he was past helping. I had discovered his great wound; this blossom in his side was destroying him"
      - superscript [ref=e554]:
        - link "10" [ref=e555]:
          - /url: "#fn-ch2-10"
      - text: "'In his right side, near the hips... '- exactly like Christ's wound, although its closest forerunner is the suffering of Amfortas in Wagner's Parsifal Amfortas's problem is that as long as his wound bleeds he cannot die, he cannot find peace in death; his attendants insist that he must do his duty and perfonn the Grail' s ritual, regardless ofhis suffering, while he desperately asks them to have mercy on him and put an end to his suffering by simply killing him - exactly like the child in 'A Country Doctor', who addresses the narrator-doctor with the desperate request: 'Doctor, let me die'."
    - paragraph [ref=e556]: "At first sight, Wagner and Kafka are as far apart as they can be: on one hand, we have the late-Romantic revival of a medieval legend; on the other, the description of the fate of the individual in contemporary totalitarian bureaucracy... but if we look closely we perceive that the fundamental problem of Parsifal is eminently a bureaucratic one: the incapacity, the incompetence of Am fort as in performing his ritual-bureaucratic duty. The terrifying voice of Amfortas's father Titurel, this superego-injunction of the living dead, addresses his impotent son in the first act with the words: 'Mein Sohn Amfortas, bist du am Amt?', to which we have to give all bureaucratic weight: Are you at your post? Are you ready to officiate? In a somewhat perfunctory sociological manner, we could say that Wagner's Parsifal is staging the historical fact that the classical Master (Amfortas) is no longer capable of reigning in the conditions of totalitarian bureaucracy and that he must be replaced by a new figure of a Leader (Parsifal). In his film version of Parsifal, Hans-Jürgen Syberberg demonstrated by a series of changes to Wagner's original - that he was well aware of this fact. First there is his manipulation of the sexual difference: at the crucial moment of inversion in the second act - after Kundry's kiss - Parsifal changes his sex: the male actor is replaced by a young, cold female; what is at stake here is no ideology of hermaphroditism but a shrewd insight into the 'feminine' nature of totalitarian power, totalitarian Law is an obscene Law, penetrated by enjoyment, a Law which has lost its formal neutrality. But what is crucial for us here is another feature ofSyberberg's version: the fact that he has externalized Amfortas's wound - it is carried an aperture resembling vaginal lips, trickles blood."
    - paragraph [ref=e557]: "Here we have the contiguity with Kafka: it is as if the child's wound from 'A Country Doctor' has externalized itself, becoming a separate object, gaining independent existence or - to use Lacan's style - ex-sistence."
    - paragraph [ref=e558]: "That is why Syberberg stages the scene where, just before the final denouement, Amfortas desperately begs his attendants to run their swords through his body and so relieve him of his unbearable torments, in a way which differs radically from the customary way: Already I feel the darkness of death enshroud me, and must I yet again return to life? Madmen! Who would force me to live? Could you but grant me death! (He tears open his garment) Here I am - here is the open wound! Here flows my blood, that poisons me. Draw your weapons! Plunge your swords in deep - deep, up to the hilt!"
    - paragraph [ref=e559]: "The wound is Amfortas's symptom - it embodies his filthy, nauseous enjoyment, it is his thickened, condensed life-substance which does not let him die. His words 'Here I am - here is the open wound!' are thus to be taken literally: all his being is in this wound; if we annihilate it, he himself will lose his positive ontological consistency and cease to exist. This scene is usually staged in accordance with Wagner's instructions: Amfortas tears open his garment and points at the bleeding wound on his body; with Syberberg, who has eternalized the wound, Amfortas points at the nauseous partial object outside himself- that is, he does not point back at himself but there outside, in the sense of 'there outside I am, in that disgusting piece of the real consists all my substance!' How should we read this externality?"
    - paragraph [ref=e560]: "The first, most obvious solution is to conceive this wound as a symbolic one: the wound is externalized to show that it does not concern the body it simply: the real reason for Amfortas's impotence, and therewith for the decay of his kingdom, is a certain blockage, a certain snag in the network of symbolic relations. 'Something is rotten' in this country where the ruler has trespassed a fundamental prohibition (he allowed himself to be seduced by Kundry); the wound is then just a materialization of a moral-symbolic decay."
    - paragraph [ref=e561]:
      - text: "But there is another, perhaps more radical reading: in so far as it sticks out from the (symbolic and symbolized) reality of the body, the wound is 'a little piece of real', a disgusting protuberance which cannot be integrated into the totality of 'our own body', a materialization of that which is 'in Amfortas more than Amfortas' and is thereby - according to the classic Lacanian formula - destroying him."
      - superscript [ref=e563]:
        - link "11" [ref=e564]:
          - /url: "#fn-ch2-11"
      - text: It is destroying him, but at the same time it is the only thing which gives him consistency.
    - paragraph [ref=e565]: "This is the paradox of the psychoanalytic concept of the symptom: symptom is an element clinging on like a kind of parasite and 'spoiling the game', but if we annihilate it things get even worse: we lose all we had - even the rest which was threatened but not yet destroyed by the symptom. Confronted with the symptom we are always in a position of an impossible choice; illustrated by a well-known joke about the chief editor of one of Hearst' s newspapers: in spite of persuasion from Hearst, he did not want to take well-deserved leave. When Hearst asked him why he did not want to go on his holidays, the editor's answer was: 'I am afraid that if! were absent for a couple of weeks, the sales of the newspaper would fall; but I am even more afraid that in spite of my absence, the sales would not fall!' This is the symptom: an element which causes a great deal of trouble, but its absence would mean even greater trouble: total catastrophe."
    - paragraph [ref=e566]: "To take, as a final example, Ridley Scott's film Alien: is not the disgusting parasite which jumps out of the body of poor John Hurt precisely such a symptom, is not its status precisely the same as that of Amfortas's externalized wound? The cave on the desert planet into which the space travellers enter when the computer registers signs of life in it, and where the polyp-like parasite sticks on to Hurt's face, has the status of the pre symbolic Thing - that is, of the maternal body, of the living substance of enjoyment. The utero-vaginal associations aroused by this cave are almost too intrusive. The parasite adhering to Hurt's face is thus a kind of a 'sprout of enjoyment', a leftover of the maternal Thing which then functions as a symptom - the Real of enjoyment - of the group marooned in the wandering spaceship: it threatens them and at the same time constitutes them as a closed group."
    - paragraph [ref=e567]: "The fact that this parasitical object incessantly changes its form merely confirms its anamorphic status: it is a pure being of semblance. The 'alien', the eighth, supplementary passenger, is an object which, being nothing at all in itself, must none the less be added, annexed as an anamorphic surplus. It is the Real at its purest: a semblance, something which on a strictly symbolic level does not exist at all but at the same time the only thing in the whole film which actually exists, the thing against which the whole reality is utterly defenceless. One has only to remember the spine-chilling scene when the liquid pouring from the polyp-like parasite after the doctor makes an incision with a scalpel dissolves the metal floor of the space ship..."
    - paragraph [ref=e568]: "From this perspective of sinthome, truth and enjoyment are radically incompatible: the dimension of truth is opened through our mis recognition of the traumatic Thing, embodying the impossible jouissance."
    - heading "Ideological Jouissance" [level=4] [ref=e569]
    - paragraph [ref=e570]: With the designation of an inconsistency of the socio-symbolic Other, the positive side of which is obscene enjoyment, have we not consented also to the usual 'postmodernist' anti-Enlightenment ressentiment?
    - paragraph [ref=e571]: "The text on the cover of the French edition of Lacan's Écrits already belies such an understanding: Lacan conceives there his theoretical effort explicitly as a prolongation of the old struggle of Enlightenment."
    - paragraph [ref=e572]: "The Lacanian criticism of the autonomous subject and his power of reflection, of reflexive appro well-known Marxian formula of capital itself as the limit of capitalism, we should say that according to Lacan the limit of Enlightenment is Enlightenment itself, its usually forgotten obverse already articulated in Descartes and Kant. The leading motif of the Enlightenment is, of course, some variation of the injunction 'Reason autonomously!': 'Use your own head, free yourself of all prejudices, do not accept anything without questioning its rational foundations, always preserve a critical distance... '. But Kant had already, in his famous article 'What is Enlightenment?', added to this an unpleasant, disquieting supplement, introducing a certain fissure into the very heart of the Enlightenment project: 'Reason about whatever you want and as much as you want - but obey!' That is to say: as the autonomous subject of theoretical reflection, addressing the enlightened public, you can think freely, you can question all authority; but as a part of the social 'machine', as a subject in the other meaning of the word, you must obey unconditionally the orders of your superiors. This fissure is proper to the project of Enlightenment as such: we find it already with Descartes, in his Discourse on Method. The obverse of the cogito doubting everything, questioning the very existence of the world, is the Cartesian 'provisional morality', a set of rules established by Descartes to enable him to survive in the everyday existence of his philosophical journey: the very first rule emphasizes the need to accept and obey the customs and laws of the country into which we were born without questioning their authority. The main point is to perceive how this acceptance of given empirical, 'pathological' (Kant) customs and rules is not some kind of preEnlightenment remnant - a remnant of the traditional authoritarian attitude - but, on the contrary, the necessary obverse qfthe Enlightenment itse!f: through this acceptance of the customs and rules of social life in their nonsensical, given character, through acceptance of the fact that 'Law is law', we are internally freed from its constraints - the way is open for free theoretical reflection."
    - paragraph [ref=e573]: "In other words, we render unto Caesar what is Caesar's, so that we can calmly reflect on everything. This experience of the given, non-founded character of customs and social rules entails in itself a kind of distance from them. In the traditional, pre-enlightened universe, the authority of the Law is never experienced as nonsensical and unfounded; on the contrary, the Law is always illuminated by the charismatic power of fascination. Only to the already enlightened view does the universe of social customs and rule appear as a nonsensical 'machine' that must be accepted as such. of course, we could say that the principal illusion of the Enlightenment consists in the idea that we can preserve a simple distance from the external 'machine' of social customs and thus keep the space of our inner reflection spotless, unblemished by the externality of customs. But this criticism does not affect Kant in so far as in his affirmation of the categorical imperative he has taken into account the traumatic, truth-less, non-sensical character of the internal, moral Law itself. The Kantian categorical imperative is precisely a Law which has a necessary, unconditional authority, without being true: it is - in Kant's own words - a kind of'transcendcntal fact', a given fact the truth of which cannot be theoretically demonstrated; but its unconditional validity should nonetheless be presupposed for our moral activity to have any sense. We can contrast this moral Law and the 'pathological', empirically given social laws through a whole set of distinctive features: social laws structure a field of social reali!)!, moral Law is the Real of an unconditional imperative which takes no consideration of the limitations imposed on us by reality - it is an impossible injunction. 'You can, because you must! [Du kannst, denn du sollst.1'; social laws pacify our egotism and regulate social homeostasis; moral Law creates imbalance in this homeostasis by introducing an element of unconditional compulsion. The ultimate paradox of Kant is this priority of practical over theoretical reason: we can free ourselves of external social constraints and achieve the maturity proper to the autonomous enlightened subject precisely by submitting to the 'irrational' compulsion of the categorical imperative. It is a commonplace of Lacanian theory to emphasize how this Kantian moral imperative conceals an obscene superego injunction: 'Enjoy!' - the voice of the Other impelling us to follow our duty for the sake of duty is a traumatic irruption of an appeal to impossible jouissance, disrupting the homeostasis of the pleasure principle and its prolongation, the reality principle."
    - paragraph [ref=e574]:
      - text: "This is why Lacan conceives Sade as the truth of Kant: 'Kant avec Sade'."
      - superscript [ref=e576]:
        - link "12" [ref=e577]:
          - /url: "#fn-ch2-12"
    - paragraph [ref=e578]: But in what precisely does this obscenity of the moral Law consist?
    - paragraph [ref=e579]: Not in some remnants, leftovers of the empirical 'pathological' contents sticking to the pure form of the Law and smudging it, but in this film itself.
    - paragraph [ref=e580]: "The moral Law is obscene in so far as it is its form itself which functions as a motivating force driving us to obey its command - that is, in so far as we obey moral Law because it is law and not because of a set of positive reasons: the obscenity of moral Law is the obverse of its formal character. of course, the elementary feature of Kant's ethics is to exclude all empirical, 'pathological' contents - in other words, all objects producing pleasure (or displeasure) - as the locus of our moral activity, but what remains hidden in Kant is the way this renunciation itself produces a certain surplus-enjoyment (the Lacanian plus-de-jouir."
    - paragraph [ref=e581]: "Let us take the case of Fascism - the Fascist ideology is based upon a purely formal imperative: Obey, because you must!"
    - paragraph [ref=e582]: "In other words, renounce enjoyment, sacrifice yourself and do not ask about the meaning of it - the value of the sacrifice lies in its very meaninglessness; true sacrifice is for its own end; you must find positive fulfilment in the sacrifice itself, not in its instrumental value: it is this renunciation, this giving up of enjoyment itself, which produces a certain surplus-enjoyment."
    - paragraph [ref=e583]: This surplus produced through renunciation is the Lacanian objet petit a, the embodiment of surplus-enjoyment; here we can also grasp why Lacan coined the notion of surplus-enjoyment on the model of the Marxian notion of surplus-value - with Marx, surplus-value also implies a certain renunciation of'pathological', empirical use-value.
    - paragraph [ref=e584]: "And Fascism is obscene in so far as it perceives directly the ideological form as its own end, as an end in itself- remember Mussolini's famous answer to the question 'How do the Fascists justify their claim to rule Italy? What is their programme?' 'Our programme is very simple: we want to rule Italy!'"
    - paragraph [ref=e585]: "The ideological power of Fascism lies precisely in the feature which was perceived by liberal or leftist critics as its greatest weakness: in the utterly void, formal character of its appeal, in the fact that it demands obedience and sacrifice for their own sake. For Fascist ideology, the point is not the instrumental value of the sacrifice, it is the very form of sacrifice itself, 'the spirit of sacrifice', which is the cure against the liberal-decadent disease. It is also dear why Fascism was so terrified by psychoanalysis: psychoanalysis enables us to locate an obscene enjoyment at work in this act of formal sacrifice."
    - paragraph [ref=e586]:
      - text: "This is the hidden perverse, obscene dimension of Kantian moral formalism finally appearing in Fascism: it is here that Kantian formalism rejoins - or, more precisely, explicates - the logic of the second of Descartes' s maxims of provisional morality: ... that of being as firm and resolute in my actions as I could be, and not to follow less faithfully opinions the most dubious, when my mind was once made up regarding them, than if these had been beyond doubt. In this I should be following the example of travellers, who, finding themselves lost in a forest, know that they ought not to wander first to one side and then to the other, nor, still less, to stop in one place, but understand that they should continue to walk as straight as they can in one direction, not diverging for any slight reason, even though it was possibly chance alone that first determined them in their choice. By this means if they do not go exactly where they wish, they will at least arrive somewhere at the end, where probably they will be better off than in the middle of a forest."
      - superscript [ref=e588]:
        - link "13" [ref=e589]:
          - /url: "#fn-ch2-13"
    - paragraph [ref=e590]: "In this passage, Descartes is in a way revealing the hidden cards of ideology as such: the real aim of ideology is the attitude demanded by it, the consistency of the ideological form, the fact that we 'continue to walk as straight as we can in one direction'; the positive reasons given by ideology to justify this request - to make us obey ideological form - are there only to conceal this fact: in other words, to conceal the surplus-enjoyment proper to the ideological form as such."
    - paragraph [ref=e591]: "Here we could refer to the notion, introduced by Jon Elster, of 'states that are essentially by-products' - that is, states that could be produced only as non-intended, as the side-effect of our activity: as soon as we aim directly at them, as soon as our activity is directly motivated by them, our procedure becomes self-defeating."
    - paragraph [ref=e592]:
      - text: "From a whole series of ideological examples evoked by Elster, let us take Tocqueville's justification of the jury system: 'I do not know whether a jury is useful to the litigants, but I am sure that it is very good for those who have to decide the case. I regard it as one of the most effective means of popular education at society's disposal.' Elster's comment on this is that a necessary condition for the jury system to have the educational effects on the jurors for which Tocqueville recommended it is their belief that they are doing something that is worthwhile and important, beyond their own personal development."
      - superscript [ref=e594]:
        - link "14" [ref=e595]:
          - /url: "#fn-ch2-14"
    - paragraph [ref=e596]: In other words, as soon as the jurors become aware that the judicial effects of their work are rather null and that the real point of it is its effect on their own civic spirit - its educational value - this educational effect is spoilt.
    - paragraph [ref=e597]: "It is the same with Pascal, with his argument for the religious wager: even if we are wrong in our wager, even if there is no God, my belief in God and my acting upon it will have many beneficial effects in my terrestrial life - I will lead a dignified, calm, moral, satisfying life, free of perturbations and doubts."
    - paragraph [ref=e598]: "But the point is again that I can achieve this terrestrial profit only if I really believe in God, in the religious beyond; this is probably the hidden, rather cynical logic of Pascal's argument: although the real stake of religion is the terrestrial profit achieved by the religious attitude, this gain is a 'state that is essentially a by-product' - it can be produced only as a non-intended result of our belief in a religious beyond. It should be no surprise to us that we find exactly the same argument in Rosa Luxemburg's description of the revolutionary process: at the beginning, the first workers' struggles are doomed to fail, their direct aims cannot be achieved, but although they necessarily end in failure, their overall balance sheet is none the less positive because their main gain is educational - that is to say, they serve the formation of the working class into the revolutionary subject. And again, the point is that if we (the Party) say directly to the fighting workers: 'It does not matter if you fail, the main point of your struggle is its educational effect on you', the educational effect will be lost. It is as if Descartes, in the quoted passage, is giving us, perhaps for the first time, the pure form of this fundamental ideological paradox: what is really at stake in ideology is its form, the fact that we continue to walk as straight as we can in one direction, that we follow even the most dubious opinions once our mind has been made up regarding them; but this ideological attitude can be achieved only as a 'state that is essentially byproduct': the ideological subjects, 'travellers lost in a forest', must conceal from themselves the fact that 'it was possibly chance alone that first determined them in their choice'; they must believe that their decision is well founded, that it will lead to their Goal."
    - paragraph [ref=e599]: "As soon as they perceive that the realgoal is the consistent)' of the ideological attitude itself, the effect is self-defeating. We can see how ideology works in a way exactly opposed to the popular idea of Jesuit morals: the aim here is to justify the means. Why must this inversion of the relation of aim and means remain hidden, why is its revelation self-defeating? Because it would reveal the enjoyment which is at work in ideology, in the ideological renunciation itself"
    - paragraph [ref=e600]: In other words, it would reveal that ideology serves only its own purpose, that it does not serve anything - which is precisely the Lacanian definition of jouissance.
  - region "Part II Lack in the Other" [ref=e601]:
    - heading "Part II Lack in the Other" [level=2] [ref=e602]:
      - text: Part II
      - text: Lack in the Other
  - region "3. ‘Che Vuoi?’" [ref=e603]:
    - heading "3. ‘Che Vuoi?’" [level=2] [ref=e604]
    - heading "Identity" [level=3] [ref=e605]
    - heading "The Ideological Quilt" [level=4] [ref=e606]
    - paragraph [ref=e607]: "What creates and sustains the identity of a given ideological field beyond all possible variations of its positive content? Hegemony and Socialist Strategy delineates what is probably the definitive answer to this crucial question of the theory of ideology: the multitude of 'floating signifiers', of proto-ideological elements, is structured into a unified field through the intervention of a certain 'nodal point' (the Lacanian point de capiton) which 'quilts' them, stops their sliding and fixes their meaning. Ideological space is made of non-bound, non-tied elements, 'floating signifiers', whose very identity is 'open', overdetermined by their articulation in a chain with other elements - that is, their 'literal' signification depends on their metaphorical surplus-signification. Ecologism, for example: its connection with other ideological elements is not determined in advance; one can be a state-orientated ecologist (if one believes that only the intervention of a strong state can save us from catastrophe), a socialist ecologist (if one locates the source of merciless exploitation of nature in the capitalist system), a conservative ecologist [if one preaches that man must again become deeply rooted in his native soil), and so on;feminism can be socialist, apolitical; even racism could be elitist or populist... The 'quilting' performs the totalization by means of which this free floating of ideological elements is halted, fixed - that is to say, by means of which they become parts of the structured network of meaning. If we 'quilt' the floating signifiers through 'Communism', for example, 'class struggle' confers a precise and fixed signification to all other elements: to democracy (so-called 'real democracy' as opposed to 'bourgeois formal democracy' as a legal form of exploitation); to feminism (the exploitation of women as resulting from the class-conditioned division of labour); to ecologism (the destruction of natural resources as a logical consequence of profit-orientated capitalist production); to the peace movement (the principal danger to peace is adventuristic imperialism), and so on."
    - paragraph [ref=e608]: "What is at stake in the ideological struggle is which of the 'nodal points', points de capiton, will totalize, include in its series of equivalences, these free-floating elements. Today, for example, the stake of the struggle between neo-conservatism and social democracy is 'freedom': neo-conservatives try to demonstrate how egalirarian democracy, embodied in the welfare state, necessarily leads to new forms of serfdom, to the dependency of the individual on the totalitarian state, while social democrats stress how individual freedom, to have any meaning at all, must be based upon democratic social life, equality of economic opportunity, and so forth."
    - paragraph [ref=e609]: "In this way, every element of a given ideological field is part of a series of equivalences: its metaphorical surplus, through which it is connected with all other elements, determines retroactively its very identity (in a Communist perspective, to fight for peace means to fight against the capitalist order, and so on). But this enchainment is possible only qn condition that a certain signifier - the Lacanian 'One' - 'quilts' the whole field and, by embodying it, effectuates its identity."
    - paragraph [ref=e610]: "Let us take the Laclau/Mouffe project of radical democracy: here, we have an articulation of particular struggles (for peace, ecology, feminism, human rights, and so on), none of which pretends to be the 'Truth', the last Signified, the 'true Meaning' of all the others; but the title 'radical democracy' itself indicates how the very possibility of their articulation implies the 'nodal', determining role of a certain struggle which, precisely as a particular struggle, outlines the horizon of all the other struggles. This determining role belongs, of course, to democracy, to 'democratic invention': according to Laclau and Mouffe, all other struggles (socialist, feminist...) could be conceived as the gradual radicalization, extension, application of the democratic project to new domains (of economic relations, of the relations between sexes...). The dialectical paradox lies in the fact that the particular struggle playing a hegemonic role, far from enforcing a violent suppression of the differences, opens the very space for the relative autonomy of the particular struggles: the feminist struggle, for example, is made possible only through reference to democratic-egalitarian political discourse. The first task of the analysis is therefore to isolate, in a given ideological field, the particular struggle which at the same time determines the horizon of its totality - to put it in Hegelian terms, the species which is its own universal kind. But this is the crucial theoretical problem: how does this determining, totalizing role of a particular struggle differ from the traditionally conceived 'hegemony' by which a certain struggle (work ers' struggle in Marxism) appears as the Truth of all the others, so that all other struggles are in the last resort only forms of its expression, and victory in this struggle offers us the key to victory in other domains? Or, as the usual Marxist line of argument runs: only successful socialist revolution will render possible the abolition of women's repression, the end of the destructive exploitation of nature, relief from the threat of nuclear destruction..."
    - paragraph [ref=e611]: "In other words: how do we formulate the determining role of a particular domain without falling into a trap of essentialism? My thesis is that Saul Kripke's antidescriptivism offers us the conceptual tools to solve this problem."
    - heading "Descriptivism versus Antidescriptivism" [level=4] [ref=e612]
    - paragraph [ref=e613]: "We could call the basic experience upon which Kripke's antidescriptivism is founded invasion of the body snatchers, after the well-known 1950S science-fiction film: an invasion of creatures from outer space which assume human shape - they look exactly like human beings, they have all their properties, but in some sense this makes them all the more uncannily strange. This problem is the same as anti-Semitism (and for that reason Invasion of the Body Snatchers can be read as a metaphor for McCarthyite anti-Communism in the 1950S): Jews are 'like us'; it is difficult to recognize them, to determine at the level of positive reality that surplus, that evasive feature, which differentiates them from all other people. The stake of the dispute between descriptivism and antidescriptivism is the most elementary one: how do names refer to the objects they denote? Why does the word 'table' refer to a table? The descriptivist answer is the obvious one: because of its meaning; every word is in the first place the bearer of a certain meaning - that is, it means a cluster of descriptive features ('table' means an object of a certain shape, serving certain purposes) and subsequently refers to objects in reality in so far as they possess properties designated by the cluster of descriptions. 'Table' means a table because a table has properties comprised in the meaning of the word 'table'. Intention thus has logical priority over extension: extension (a set of objects referred to by a word) is determined by intention (by universal properties comprised in its meaning)."
    - paragraph [ref=e614]: The antidescriptivist answer, in contrast, is that a word is connected to an object or a set of objects through an act of'primal baptism', and this link maintains itself even if the cluster of descriptive features which initially determined the meaning of the word changes completely.
    - paragraph [ref=e615]:
      - text: "Let us take a simplified example from Kripke: if we ask the general public for an identifying description of'Kurt Godel', the answer would be 'the author of the proof of the incompleteness of arithmetic'; but suppose that the proof was written by another man, Schmidt, a friend of Godel, and that Godel murdered him and appropriated to himself the discovery of the proof mentioned; in this case, the name 'Kurt Godel' would still refer to the same Godel, although the identifying description would no longer apply to him. The point is that the name 'Godel' has been linked to a certain object (person) through a 'primal baptism', and this link holds even if the original identifying description proves false."
      - superscript [ref=e617]:
        - link "1" [ref=e618]:
          - /url: "#fn-ch3-1"
      - text: "This is the core of the dispute: descriptivists emphasize the immanent, internal 'intentional contents' of a word, while antidescriptivists regard as decisive the external causal link, the way a word has been transmitted from subject to subject in a chain of tradition. Here, a first charge offers itself: is not the obvious answer to this dispute that we are concerned with two different types of names: with notions denoting (universal) kinds and with proper names? Is not its solution simply that descriptivism accounts for the way generic notions function and antidescriptivism for the way proper names function? If we refer to somebody as 'fat', it is clear that he must at least possess the property of being excessively corpulent, but if we refer to somebody as 'Peter', we cannot infer any of his effective properties - the name 'Peter' refers to him simply because he was baptized 'Peter'. But such a solution, in trying to get rid of a problem by a simple classificatory distinction, misses completely what is at stake in the dispute: both descriptivism and antidescriptivism aim at a general theory of referring functions. For descriptivism, proper names themselves are merely abbreviated or disguised definite descriptions, while for antidescriptivism the external causal chain determines reference even in the case of generic notions, at least those which designate natural kinds. Let us again take a somewhat simplified example from Kripke: at a certain point in prehistory, a certain kind of object was baptized 'gold', and this name was at that point linked to a cluster of descriptive features (a heavy glittering yellow metal which can be beautifully fashioned, and so on); over the centuries, this cluster of descriptions has been multiplying and changing according to the development of human knowledge, so that today we identify 'gold' with its specification within the periodic table and its protons, neutrons, electrons, spectra, and so forth; but let us suppose that today a scientist should discover that all the world was wrong about all properties of the object called 'gold' (the impression that it has a glittering yellow colour was produced by a universal optical illusion, and so on) - in this case, the word 'gold' would continue to refer to the same object as before i.e. we would say 'gold doesn't possess the properties ascribed to it until now', not 'the object that we have until now taken for gold is not really gold.'"
    - paragraph [ref=e619]:
      - text: "The same also applies to the opposite counterfactual situation: it is possible that there might be a substance which has all the identifying marks we commonly attributed to gold and used to identify it in the first place, but which is not the same kind of thing, which is not the same substance. We would say of such a thing that though it has all the appearances we initially used to identify gold, it is not gold!"
      - superscript [ref=e621]:
        - link "2" [ref=e622]:
          - /url: "#fn-ch3-2"
      - text: Why? Because this substance is not linked to the name 'gold' through a causal chain which reaches back to the 'primal baptism' establishing the reference of 'gold'. For the same reason it must be said that even if archaeologists or geologists were to discover tomorrow some fossils conclusively showing the existence of animals in the past satisfying everything we know about unicorns from the myth of the unicorn, that would not show that there were unicorns.)
      - superscript [ref=e624]:
        - link "3" [ref=e625]:
          - /url: "#fn-ch3-3"
    - paragraph [ref=e626]: In other words, even if these quasi-unicorns correspond perfectly to the cluster of descriptive features comprised by the meaning of the word 'unicorn', we cannot be sure that it was they who were the original reference of the mythical notion of'unicorn' - that is, the object to which the word 'unicorn' was fastened in the 'primal baptism'... How could we overlook the libidinal contents of these propositions of Kripke?
    - paragraph [ref=e627]: "What is at stake here is precisely the problem of the 'fulfilment of desire': when we encounter in reality an object which has all the properties of the fantasized object of desire, we are nevertheless necessarily somewhat disappointed; we experience a certain 'this is not it'; it becomes evident that the finally found real object is not the reference of desire even though it possesses all the required properties. It is perhaps no accident that Kripke selects as examples objects with an extreme libidinal connotation, objects which already embody desire in common mythology: gold, unicorn..."
    - heading "The Two Myths" [level=4] [ref=e628]
    - paragraph [ref=e629]: Bearing in mind how the very terrain of the dispute between descriptivism and antidescriptivism is thus permeated by an undercurrent of the economy of desire, it should come as no surprise that Lacanian theory can help us to clarify the terms of this dispute, not in the sense of any quasi-dialectical 'synthesis' between the two opposing views but, on the contrary, by pointing out how both descriptivism and antidescriptivism miss the same crucial point - the radical contingency of naming.
    - paragraph [ref=e630]: "The proof of this is that to defend their solution, both positions have to resort to a myth, to invent a myth: a myth of a primitive tribe in Searle, a myth of 'omniscient observer of history' in Donnellan."
    - paragraph [ref=e631]: "To refute antidescriptivism, Searle invents a primitive hunter-gatherer community with a language containing proper names:"
    - paragraph [ref=e632]:
      - text: "Imagine that everybody in the tribe knows everybody else and that newborn members of the tribe are baptized at ceremonies attended by the entire tribe. Imagine, furthermore, that as the children grow up they learn the names of people as well as the local names of mountains, lakes, streets, houses, etc. by ostension. Suppose also that there is a strict taboo in this tribe against speaking of the dead, so that no one's name is ever mentioned after his death. Now the point of the fantasy is simply this: As I have described it, this tribe has an institution of proper names used for reference in exactly the same way that our names are used for reference, but there is not a single use of a name in the tribe that satisfies the causal chain of communication theory."
      - superscript [ref=e634]:
        - link "4" [ref=e635]:
          - /url: "#fn-ch3-4"
    - paragraph [ref=e636]: "In other words, in this tribe every use of the name satisfies the descriptivist claim: the reference is determined exclusively by a cluster of descriptive features. Searle knows, of course, that such a tribe never existed; his point is only that the way naming functions in this tribe is logicalfy primordiaf. that all the counter-examples used by antidescriptivists are logically secondary, they are 'parasitic', they imply prior 'descriptivist' functioning. When all we know about somebody is that his name is Smith - when the only intentional content of'Smith' is 'the person others refer to as Smith' - such a condition logically presupposes the existence of at least one other subject who knows a lot more about Smith - to whom the name 'Smith' is connected with a whole cluster of descriptive features (an old fat gentleman giving a course on the history of pornography...)."
    - paragraph [ref=e637]: In other words, the case offered by antidescriptivism as 'normal' (the transmission of the reference through an external causal chain) is only an' external' description (a description leaving out of consideration the intentional content) of a functioning which is 'parasitic' - that is, logically secondary.
    - paragraph [ref=e638]: "To refute Searle, we have to demonstrate that his primitive tribe, in which language functions exclusively in a descriptive way, is not only empirically but also logically impossible. The Derridean procedure would, of course, be to show how the 'parasitic' use always corrodes, and has from the very start corroded, the purely descriptive functioning: how Searle's myth of a primitive tribe presents just another version of a totally trans parent community in which referring is not blurred by any absence, by any lack. The Lacanian approach would emphasize another feature: there is simply something missing in Searle's description of his tribe. If we are really concerned with language in a strict sense, with language as a social network in which meaning exists only in so far as it is intersubjectively recognized - with language which, by definition, cannot be 'private' then it must be part of the meaning of each name that it refers to a certain object because this is its name, because others use this name to designate the object in question: every name, in so far as it is part of common language, implies this self-referential, circular moment. 'Others', of course, cannot be reduced to empirical others; they rather point to the Lacanian 'big Other', to the symbolic order itself."
    - paragraph [ref=e639]:
      - text: "Here we encounter the dogmatic stupidity proper to a signifier as such, the stupidity which assumes the shape of a tautology: a name refers to an object because this object is called that - this impersonal form ('it is called') announces the dimension of the 'big Other' beyond other subjects. The example evoked by Searle as an epitome of parasitism - the example of speakers who know nothing about the object of which they are speaking and whose 'only intentional content might be that they are using the name to refer to what others are using it to refer to'"
      - superscript [ref=e641]:
        - link "5" [ref=e642]:
          - /url: "#fn-ch3-5"
      - text: "- indicates, on the contrary, a necessary constituent of every 'normal' use of names in language as a social bond - and this tautological constituent is the Lacanian master-signifier, the 'signifier without signified'."
    - paragraph [ref=e643]: "The ironic part of it is that this lack is actually inscribed in Searle's description in the form of a prohibition ('... there is a strict taboo in this tribe against speaking of the dead'): Searle's mythical tribe is thus a tribe of psychotics which - because of the taboo concerning names of dead persons - forecloses the function of the Name-of-the-Father - that is to say, prevents the transformation of the dead father into the rule of his Name."
    - paragraph [ref=e644]: "If, consequently, Searle's descriptivism misses the dimension of the big Other, antidescriptivism - at least in its predominant version - misses the small other, the dimension of the object as Real in the Lacanian sense: the distinction Real/reality."
    - paragraph [ref=e645]: This is why it looks for that x, for the feature guaranteeing the identity of a reference through all changes of its descriptive properties, in the reality itself; this is why it must invent its own myth, a kind of counterpoint to Searle's primitive tribe, Donnellan's myth of an 'omniscient observer of history'.
    - paragraph [ref=e646]: "Donnellan has constructed the following ingenious counterfactual example:"
    - paragraph [ref=e647]: Suppose that all that a certain speaker knows or thinks he knows about Thales is that he is the Greek philosopher who said that all is water. But suppose there never was a Greek philosopher who said such a thing.
    - paragraph [ref=e648]:
      - text: Suppose that Aristotle and Herodotus were referring to a well digger who said, 'I wish all were water so I wouldn't have to dig these damned wells'. In such a case, when the speaker uses the name 'Thales' he is referring to that well digger. Furthermore, suppose there was a hermit who never had any dealings with anyone, who actually held that all was water. Still, when we say 'Thales' we are plainly not referring to that hermit.
      - superscript [ref=e650]:
        - link "6" [ref=e651]:
          - /url: "#fn-ch3-6"
    - paragraph [ref=e652]: Today, the original reference, the starting point of a causal chain - the poor well digger - is unknown to us; but an 'omniscient observer of history' capable offollowing the causal chain to the act of'primal baptism' would know how to restore the original link connecting the word 'Thales' to its reference.
    - paragraph [ref=e653]: Why is this myth, this antidescriptivist version of the Lacanian 'subject presumed to know', necessary?
    - paragraph [ref=e654]: The basic problem of antidescriptivism is to determine what constitutes the identity of the designated object beyond the ever-changing cluster of descriptive features - what makes an object identical-to-itself even if all its properties have changed; in other words, how to conceive the objective correlative to the 'rigid designator', to the name in so far as it denotes the same object in all possible worlds, in all counterfactual situations.
    - paragraph [ref=e655]: "What is overlooked, at least in the standard version of antidescriptivism, is that this guaranteeing the identity of an object in all counterfactual situations - through a change of all its descriptive features - is the retroactive efct of naming itself. it is the name itself, the signifier, which supports the identity of the object. That 'surplus' in the object which stays the same in all possible worlds is 'something in it more than itself, that is to say the Lacanian objet petit a: we search in vain for it in positive reality because it has no positive consistency - because it is just an objectification of a void, of a discontinuity opened in reality by the emergence of the signifier. It is the same with gold; we search in vain in its positive, physical features for that X which makes of it the embodiment of richness; or, to use an example from Marx, it is the same with a commodity: we search in vain among its positive properties for the feaUlre which constitutes its value (and not only its use-value). What is missed by the antidescriptivist idea of an external causal chain of communication through which reference is transmitted is therefore the radical contingency of naming, the fact that naming itself retroactively constitutes its reference. Naming is necessary but it is, so to speak, necessary afterwards, retroactively, once we are already c ·., lU lt. The role of the myth of the 'omniscient observer of history' therefore corresponds exactly to that of Searle' s myth of the primitive tribe: in both cases its function is to limit, to restrain the radical contingency of naming - to construct an agency guaranteeing its necessity. In the first instance, the reference is guaranteed by the 'intentional content' immanent to the name; in the second, it is guaranteed by the causal chain which brings us to the 'primal baptism' linking the word to the object. If, in this dispute between descriptivism and antidescriptivism, the 'truth' lies, for all that, in antidescriptivism, it is because antidescriptivism's error is of another kind: in its myth, antidescriptivism blinds itself to its own result, to what it 'has produced without knowing it'. The main achievement of antidescriptivism is to enable us to conceive objet a as the real-impossible correlative of the 'rigid designator' - that is, of the point de capiton as 'pure' signifier."
    - heading "Rigid Designator and Objet a" [level=4] [ref=e656]
    - paragraph [ref=e657]: "If we maintain that the point de capiton is a 'nodal point', a kind of knot of meanings, this does not imply that it is simply the 'richest' word, the word in which is condensed all the richness of meaning of the field it 'quilts': the point de capiton is rather the word which, asa word, on the level of the signifier itself, unifies a given field, constiUltes its identity: it is, so to speak, the wotd to which 'things' themselves refer to recognize themselves in their unity."
    - paragraph [ref=e658]: "Let us take the case of the famous advertisement for Marlboro: the picture of the bronzed cowboy, the wide prairie plains, and so on - all this 'connotes', of course, a certain image of America (the land of hard, honest people, oflimitless horizons...) but the effect of' quilting' occurs only when a certain inversion takes place; it does not occur until 'real' Americans start to identify themselves (in their ideological self experience) with the image created by the Marlboro advertisement - until America itself is experienced as 'Marlboro country'. It is the same for all so-called 'mass-media symbols' of America - CocaCola, for example: the point is not that Coca-Cola 'connotes' a certain ideological experience-vision of America (the freshness of its sharp, cold. taste, and so on); the point is that this vision of America itself achieves its identity by identifying itself with the signifier 'Coke' - 'America, this is Coke!' could be the wording of an imbecile publicity device. The crucial point to grasp is that this device - 'Amenca [the ideological vision of a land in all its diversity], this is Coke [this signifier]!' - could not be inverted as 'Coke [this signifier], this is [this means] AmericaI' The only possible answer to the question 'What is Coke?' is already given in the advertisements: it is the impersonal 'it' ('Coke, this is itl') - 'the real thing', the unattainable X, the object-cause of desire. Precisely because of this surplus-X, the operation of, quilting' is not circular-symmetrical - we cannot say that we gain nothing from it because Coke first connotes 'the spirit of America', and this 'spirit of America' (the cluster offeatures supposed to express it) is then condensed in Coke as its signifier, its signifying representative: what we gain from this simple inversion is precisely the surplus-X, the object-cause of desire, that 'unattainable something' which is 'in Coke more than Coke' and which, according to the Lacanian formula, could suddenly change into excrement, into undrinkable mud (it is enough for Coke to be served warm and stale). The logic of this inversion producing a surplus could be made clear apropos of anti-Semitism: at first, 'Jew' appears as a signifier connoting a cluster of supposedly 'effective' properties (intriguing spirit, greedy for gain, and so on), but this is not yet anti-Semitism proper. To achieve that, we must invert the relation and say: they are like that (greedy, intriguing...) because thΡ are Jews. This inversion seems at first sight purely tautological - we could retort: of course it is so, because 'Jewish' means precisely greedy, intriguing, dirty... But this appearance of tautology is false: 'Jew' in 'because they are Jews' does not connote a series of effective properties, it refers again to that unattainable X, to what is 'in Jew more than Jew' and what Nazism tried so desperately to seize, measure, change into a positive property enabling us to identify Jews in an objective-scientific way. The 'rigid designator' aims, then, at that impossible-real kernel, at what is 'in an object more than the object', at this surplus produced by the signifying operation. And the crucial point to grasp is the connection between the radical contingency of naming and the logic of emergence of the 'rigid designator' through which a given object achieves its identity. The radical contingency of naming implies an irreducible gap between the Real and modes of its symbolization: a certain historical constellation can be symbolized in different ways; the Real itself contains no necessary mode of its symbolization."
    - paragraph [ref=e659]: "Let us take the defeat of France in 1940: the key to Petain's success was that his symbolization of the trauma of defeat (,the defeat is a result of a long degenerated tradition of democracy and Jewish antisocial influence; as such, it has a sobering effect in offering France a new chance to build its social body on new, corporatist, organic foundations... ') prevailed."
    - paragraph [ref=e660]: "In this way, what had been experienced a moment ago as traumatic, incomprehensible loss became readable, obtained meaning. But the point is that this symbolization was not inscribed in the Real itself: never do we reach the point at which 'the circumstances themselves begin to speak', the point at which language starts to function immediately as 'language of the Real': the predominance ofPetain's symbolization was a result of a struggle for ideological hegemony. It is because the Real itself offers no support for a direct symbolization of it - because every symbolization is in the last resort contingent - that the only way the experience of a given historic reality can achieve its unity"
    - paragraph [ref=e661]: "It is not the real object which guarantees as the point of reference the unity and identity of a certain ideological experience - on the contrary, it is the reference to a 'pure' signifier which gives unity and identity to our experience of historical reality itself Historical reality is of course always symbolized; the way we experience it is always mediated through different modes of symbolization: all Lacan adds to this phenomenological common wisdom is the fact that the unity of a given 'experience of meaning', itself the horizon of an ideological field of meaning, is supported by some 'pure', meaningless 'signifier without the signified'."
    - heading "The Ideological Anamorphosis" [level=4] [ref=e662]
    - paragraph [ref=e663]: We can now see how the Kripkean theory of'rigid designator' - of a certain pure signifier which designates, and at the same time constitutes, the identity of a given object beyond the variable cluster of its descriptive properties - offers a conceptual apparatus enabling us to conceive precisely the status ofLaclau's 'anti-essentialism'.
    - paragraph [ref=e664]: "Let us take, for example, notions like 'democracy', 'socialism', 'Marxism': the essentialist illusion consists in the belief that it is possible to determine a definite cluster of features, of positive properties, however minimal, which defines the permanent essence of 'democracy' and similar terms - every phenomenon which pretends to be classified as 'democratic' should fulfil the condition of possessing this cluster offeatures. In contrast to this 'essentialist illusion', Laclau's anti-essentialism compels us to conclude that it is impossible to define any such essence, any cluster of positive properties which would remain the same in 'all possible worlds' - in all counterfactual situations. In the last resort, the only way to define 'democracy' is to say that it contains all political movements and organizations which legitimize, designate themselves as 'democratic'; the only way to define 'Marxism' is to say that this term designates all movements and theories which legit imize themselves through reference to Marx, and so on."
    - paragraph [ref=e665]: "In other words, the only possible definition of an object in its identity is that this is the object which is always designated by the same signifier - tied to the same signifier. It is the signifier which constitutes the kernel of the object's 'identity'. Let us return again to 'democracy': is there - on the level of positive, descriptive features - really anything in common between the liberalindividualist notion of democracy and the real-socialist theory, according to which the basic feature of 'real democracy' is the leading role of the Party representing the ttue interests of the people and thus assuring their effective rule? Here we should not be misled by the obvious but false solution that the real-socialist notion of democracy is simply wrong, degenerated, a kind of perverse travesty of true democracy - in the final analysis, 'democracy' is defined not by the positive content of this notion (its signified) but only by its positional-relational identity - by its opposition, its differential relation to 'non-democratic' - whereas the concrete content can vary in the extreme: to mutual exclusion (for real socialist Marxists, the term 'democratic' designates the very phenomena which, for a traditional liberalist, are the embodiment of anti-democratic totalitarianism). This then is the fundamental paradox of the point de capiton: the 'rigid designator', which totalizes an ideology by bringing to a halt the metonymic sliding of its signified, is not a point of supreme density of Meaning, a kind of Guarantee which, by being itself excepted from the differential interplay of elements, would serve as a stable and fixed point of reference. On the contrary, it is the element which represents the agency of the signifier within the field of the signified. In itself it is nothing but a 'pure difference': its role is purely structural, its nature is purely performative - its signification coincides with its own act of enunciation; in short, it is a 'signifier without the signified'. The crucial step in the analysis of an ideological edifice is thus to detect, behind the dazzling splendour of the element which holds it together ('God', 'Country', 'Party', 'class'...), this self-referential, tautological, performative operation. A 'Jew', for example, is in the last resort one who is stigmatized with the signifier 'Jew'; all the phantasmic richness of the traits supposed to characterize Jews (avidity, the spirit of intrigue, and so on) is here to conceal not the fact that 'Jews are really not like that', not the empirical reality ofJews, but the fact that in the anti-Semitic construction of a 'Jew', we are concerned with a purely structural function. The properly 'ideological' dimension is therefore the effect of a certain 'error of perspective'; the element which represents within the field of Meaning, the agency of pure signifier - the element through which the signifier's non-sense erupts in the midst of Meaning - is perceived as a point of extreme saturation of Meaning, as the point which' gives meaning' to all the others and thus totalizes the field of (ideological) meaning. The element which represents, in the structure of the utterance, the immanence of its own process of enunciation is experienced as a kind of transcendent Guarantee, the element which only holds the place of a certain lack, which is in its bodily presence nothing but an embodiment of a certain lack, is perceived as a point of supreme plenitude. In short, pure difference is perceived as Identity exempted from the relational-differential interplay and guaranteeing its homogeneity. We could denote this 'error of perspective' as ideological anamorphosis. Lacan often refers to Holbein's 'Ambassadors': if we look at what appears from the frontal view as an extended, 'erected' meaningless spot, from the right perspective we notice the contours of a skulL The criticism of ideology must perform a somewhat homological operation: if we look at the element which holds together the ideological edifice, at this 'phallic', erected Guarantee of Meaning, from the right (or, more precisely - politically speaking - left) perspective, we are able to recognize in it the embodiment of a lack, of a chasm of non-sense gaping in the midst of ideological meaning."
    - heading "Identification (Lower Level of the Graph of Desire)" [level=3] [ref=e666]
    - heading "Retroactivity of Meaning" [level=4] [ref=e667]
    - paragraph [ref=e668]: "Now, having clarified the way the point de capiton functions as 'rigid designator' - as the signifier maintaining its identity through all variations of its signified - we have reached the real problem: does this totalizing of a given ideological field through the operation of 'quilting', which fixes its meaning, result in the absence of remnants; does it abolish the endless floating of signifiers without residue? If not, how do we conceive the dimension which escapes it?"
    - paragraph [ref=e669]:
      - text: The answer is obtained by the Lacanian graph of desire.
      - superscript [ref=e671]:
        - link "7" [ref=e672]:
          - /url: "#fn-ch3-7"
    - heading "Graph I" [level=4] [ref=e673]
    - paragraph [ref=e674]: Lacan articulated this graph in four successive forms; in explaining it we should not limit ourselves to the last, complete form, because the succession of the four forms cannot be reduced to a linear gradual completion; it implies the retroactive changing of preceding forms.
    - paragraph [ref=e675]:
      - text: For example, the last, complete form, containing the articulation of the upper level of the graph (the vector from ɼ (0) to S OD*),
      - superscript [ref=e677]:
        - link "8" [ref=e678]:
          - /url: "#fn-ch3-8"
      - text: "can be grasped only if we read it as an elaboration of the question 'che vuoi?' marked by the preceding form: if we forget that this upper level is nothing but an articulation of the inner structure of a question emanating from the Other to which the subject is confronted beyond symbolic identification, we necessarily miss its point."
    - paragraph [ref=e679]: Let us then begin with the first form, with the 'elementary cell of desire' (see Graph I above).
    - paragraph [ref=e680]: "What we have here is simply the graphic presentation of the relation between signifier and signified. As is well known, Saussure visualized this relation as two parallel undulating lines or two surfaces of the same sheet: the linear progression of the signified runs parallel to the linear articulation of the signifier. Lacan structures this double movement quite differently: some mythical, pre-symbolic intention (marked Δ) 'quilts' the signifier's chain, the series of the signifier marked by the vector S'. The product of this quilting (what 'comes out on the other side' after the mythical - real - intention goes through the signifier and steps out of it) is the subject marked by the matheme $ (the divided, split subject, and at the same time the effaced signifier, the lack of signifier, the void, an empty space in the signifier's network). This minimal articulation already attests to the fact that we are dealing with the process of interpellation oJindividuals (this pre-symbolic, mythical entity - with Althusser, roo, the 'individual' which is interpellated into subject is not conceptually defined, it is simply a hypothetical X which must be presupposed) into subjects."
    - paragraph [ref=e681]: The point de capiton is the point through which the subject is 'sewn' to the signifier, and at the same time the point which interpellates individual into subject by addressing it with the call of a certain master-signifier ('Communism', 'God', 'Freedom', 'America') - in a word, it is the point of the subjectivation of the signifier's chain.
    - paragraph [ref=e682]: "A crucial feature at this elementary level of the graph is the fact that the vector of the subjective intention quilts the vector of the signifier's chain backwards, in a retroactive direction: it steps out of the chain at a point preceding the point at which it has pierced it. Lacan's emphasis is precisely on this retroactive character of the effect of signification with respect to the signifier, on this staying behind of the signified with respect to the progression of the signifier's chain: the effect of meaning is always produced backwards, apres coup. Signifiers which are still in a 'floating' state - whose signification is not yet fixed - follow one another. Then, at a certain point - precisely the point at which the intention pierces the signifier's chain, traverses it - some signifier fIXes tetroacti vel y the meaning of the chain, sews the meaning to the signifiet, halts the sliding of the meamng."
    - paragraph [ref=e683]: "To grasp this fully, we have only to remember the above-mentioned example of ideological 'quilting': in the ideological space float signifiers like 'freedom', 'state', 'justice', 'peace'... and then their chain is supple mented with some master-signifier ('Communism') which retroactively determines their (Communist) meaning: 'freedom' is effective only through surmounting bourgeois formal freedom, which is merely a form of slavery; the 'state' is the means by which the ruling class guarantees the conditions of its rule; market exchange cannot be 'just and equitable' because the very form of equivalent exchange between labour and capital implies exploitation; 'war' is inherent to class society as such; only the socialist revolution can bring about lasting 'peace', and so forth. (Liberal democratic 'quilting' would, of course, produce a quite different articula tion of meaning; conservative 'quilting' a meaning opposed to both previous fields, and so on.)"
    - paragraph [ref=e684]: "Already, at this elementary level, we can locate the logic of transference - the basic mechanism that produces the illusion proper to the phenomena of transference: transference is the obverse of the sদaying behind of the signi fied with respect to the stream of the signifiers; it consists of the illusion that the meaning of a certain element (which was retroactively fixed by the intervention of the master-signifier) was present in it from the very begin ning as its immanent essence. We are 'in transference' when it appears to us that real freedom is 'in its very nature' opposed to bourgeois formal free dom, that the state is 'in its very nature' only a tool of class domination, and so on."
    - paragraph [ref=e685]: "The paradox lies, of course, in the fact that this transferential illusion is necessary, it is the very measure of success of the operation of 'quilting':"
    - heading "The 'Effect of Retroversion'" [level=4] [ref=e686]
    - paragraph [ref=e687]: "This therefore is the fundamental Lacanian thesis concerning the relation between signifier and signified: instead of the linear, immanent, necessary progression according to which meaning unfolds itself from some initial kernel, we have a radically contingent process of retroactive production of meaning."
    - paragraph [ref=e688]: "In this way, we have arrived at the second form of the graph of desire - at the specification of the two points at which the intention (L\\) cuts the signifying chain: 0 and.s(O), the big Other and the signified as its function:"
    - heading "Graph II" [level=4] [ref=e689]
    - paragraph [ref=e690]: "Why do we find 0 - that is, the big Other as the synchronous symbolic code - at the point de capiton? Is not the point de capiton precisely the One, a singular signifier occupying an exceptional place with respect to the paradigmatic network of the code? To understand this apparent incoherence, we have only to remember that the pointdecapiton fixes the meaning of the preceding elements: that is to say, it retroactively submits them to some code, it regulates their mutual relations according to this c૪de (for example, in the case we mentioned, according to the code which regulates the Communist universe of meaning). We could say that the pointdecapiton represents, holds the place of, the big Other, the synchronous code, in the diachronous signifier's chain: a proper Lacanian paradox in which a synchronous, paradigmatic structure exists only in so far as it is itself again embodied in One, in an exceptional singular element. From what we have just said, it is also clear why the other cross point of the two vectots is marked by.s(0): at this point we find the signified, the meaning, which is a function of the big Other - which is produced as a retroactive effect of 'quilting', backwards from the point at which the relation between floating signifiers is fixed through reference to the synchronous symbolic code. And why is the right, last part of the vector of the signifier S-S' - the part subsequent to the point de capitol! - designated as 'Voice'? To solve this enigma, we must conceive the voice in a strictly Lacanian way: not as a bearer of plenitude and self-presence of meaning (as with Derrida) but as a meaningless object, as an objectal remnant, leftover, of the signifying operation, of the capitonnage: the voice is what is left over after we subtract from the signifier the retroactive operation of, quilting' which produces meaning. The clearest concrete embodiment of this objectal status of the voice is the hypnotic voice: when the same word is repeated to us indefinitely we become disorientated, the word loses the last traces of its meaning, all that is left is its inert presence exerting a kind of somniferous hypnotic power - this is the voice as 'object', as the objectal leftover of the signifying operation. There is yet another feature of the second form of the graph to be explained: the change at its bottom. Instead of the mythical intention (L\\) and the subject ($) produced when this intention traverses the signifying chain, we have at the bottom right the subject which pierces the signifying chain, and the product of this operation is now marked as 1(0). So, first: why is the subject displaced from left (result) to right (starting point of the vector)? Lacan himself points out that we are dealing here with the 'effect of retroversion' - with the transferential illusion according to which the subject becomes at every stage 'what it always already was': a retroactive effect is experienced as something which was already there from the beginning. Second point: why have we now at the bottom left, as the result of the subject's vector, I(O)? Here we have finally arrived at identjfication: 1(0) stands for symbolic identification, for the identification of the subject with some signifying feature, trait (I), in the big Other, in the symbolic order. This feature is the one which, according to the Lacanian definition of the signifier, 'represents the subject for another signifier'; it assumes concrete, recognizable shape in a name or in a mandate that the subject takes upon himself and/or that is bestowed on him. This symbolic identification is to be distinguished from imaginary identification marked by a new level inserted between the vector of the signifier (S-S') and the symbolic identification: the axis connecting imaginary ego (e) and its imaginary other, i(o) - to achieve self-identity, the subject must identify himself with the imaginary other, he must alienate himself - put his identity outside himself, so to speak, into the image of his double. The 'effect of retroversion' is based precisely upon this imaginary level - it is supported by the illusion of the self as the autonomous agent which is present from the very beginning as the origin of its acts: this imaginary self-experience is for the subject the way to misrecognize his radical dependence on the big Other, on the symbolic order as his decentred cause. But instead of repeating this thesis of the ego's constitutive alienation in its imaginary Other - the Lacanian theory of the mirror stage which is to be situated precisely on the axis e-i(o)- we should rather focus our attention on the crucial difference between imaginary and symbolic identification."
    - heading "Image and Gaze" [level=4] [ref=e691]
    - paragraph [ref=e692]: "The relation between imaginary and symbolic identification - between the ideal ego [Idealich] and the ego-ideal [Ich-Ideaċ - is - to use the distinction made by Jacques-Alain Miller (in his unpublished Seminar) - that between 'constituted' and 'constitutive' identification: to put it simply, imaginary identification is identification with the image in which we appear likeable to ourselves, with the image representing 'what we would like to be', and symbolic identification, identification with the very place ftom where we are being observed,ftom where we look at ourselves so that we appear to ourselves likeable, worthy oflove. Our predominant, spontaneous idea of identification is that ofimitating models, ideals, image-makers: it is noted (usually from the condescending 'mature' perspective) how young people identify with popular heroes, pop singers, film stars, sportsmen... This spontaneous notion is doubly misleading. First, the feature, the trait on the basis of which we identifjr with someone, is usually hidden - it is by no means necessarily a glamorous feature. Neglecting this paradox can lead to serious political miscalculations; let us mention only the 1986 Austrian presidential campaign, with the controversial figure ofWaldheim at its centre. Starting from the assumption that Waldheim was attracting voters because of his great-statesman image, leftists put the emphasis of their campaign on proving to the public that not only is Waldheim a man with a dubious past (probably involved in war crimes) but also a man who is not prepared to confront his past, a man who evades crucial questions concerning it - in short, a man whose basic feature is a refusal to 'work through' the traumatic past. What they overlooked was that it was precisely this feature with which the majority of centrist voters identified. Post-war Austria is a country whose very existence is based on a refusal to 'work through' its traumatic Nazi past - proving that Waldheim was evading confrontation with his past emphasized the exact trait-of-.identification of the majority of voters. The theoretical lesson to be learned from this is that the trait-ofidentification can also be a certain failure, weakness, guilt of the other, so that by pointing out the failure we can unwittingly reinforce the identification. Rightist ideology in particular is very adroit at offering people weakness or guilt as an identifjring trait: we find traces of this even with Hider. In his public appearances, people specifically identified themselves with what were hysterical outbursts of impotent rage - that is, they 'recognized' themselves in this hysterical acting out But the second, even more serious error is to overlook the fact that imaginary identification is always identification on beha!fqfa certaingoze in the Other. So, apropos of every imitation of a model-image, apropos of every 'playing a role', the question to ask is:.forwhom is the subject enacting this role? which gaze is considered when the subject identifies himself with a certain image? This gap between the way I see myself and the point from which I am being observed to appear likeable to myself is crucial for grasping hysteria (and obsessional neurosis as its subspecies) - for so-called hysterical theatre: when we take the hysterical woman in the act of such a theatrical outburst, it is of course clear that she is doing this to offer herself to the Other as the object of its desire, but concrete analysis has to discover who - which subject - embodies for her the Other. Behind an extremely 'feminine' imaginary figure, we can thus generally discover some kind of masculine, paternal identification: she is enacting fragile femininity, but on the symbolic level she is in fact identified with the paternal gaze, to which she wants to appear likeable. This gap is brought to its extreme with the obsessional neurotic: on the 'constituted', imaginary, phenomenal level he is of course caught in the masochistic logic of his compulsive acts, he is humiliating himself, preventing his success, organizing his failure, and so on; but the crucial question is again how to locate the vicious, superego gaze for which he is humiliating himself, for which this obsessional organizing of failure procures pleasure. This gap can best be articulated with the help of the Hegelian couple 'for-the-other'l'for-itself: the hysterical neurotic is experiencing himself as somebody who is enacting a role for the other, his imaginary identification is his 'being-for-the-other', and the crucial break that psychoanalysis must accomplish is to induce him to realize how he is himself this other for whom he is enacting a role - how his. being-forthe-other is his being-for-himself, because he is himself already symbolically identified with the gaze for which he is playing his role. To make this difference between imaginary and symbolic identification clear, let us take some non-clinical examples. In his piercing analysis of Chaplin, Eisenstein exposed as a crucial feature of his burlesques a vicious, sadistic, humiliating attitude towards children: in Chaplin's films, children are not treated with the usual sweetness: they are teased, mocked, laughed at for their failures, food is scattered for them as if they were chickens, and so on. The question to ask here, however, is from which point must we look at children so that they appear to us as objects of teasing and mocking, not gentle creatures needing protection?"
    - paragraph [ref=e693]: "The answer, of course, is the gaze ofthe children themselves - only children themselves treat their fellows this way; sadistic distance towards children thus implies the symbolic identification with the gaze of the children themselves. At the opposite extreme, we find the Dickensian admiration of the 'good common people', the imaginary identification with their poor but happy, close, unspoiled world, free of the cruel struggle for power and money. But (and therein lies the falsity of Dickens) from where is the Dickensian gaze peering at the 'good common people' so that they appear likeable; from where if not from the point of view of the corrupted world of power and money? We perceive the same gap in Brueghel's late idyllic paintings of scenes from peasant life (country festivity, reapers during midday rest, and so on): Arnold Hauser pointed out that these paintings are as far removed as possible from any real plebeian ai:titude, from any mingling with the working classes. Their gaze is, on the contrary, the external gaze of the aristocracy upon the peasants' idyll, not the gaze of the peasants themselves upon their life. The same goes, of course, for the Stalinist elevation of the dignity of the socialist 'ordinary working people': this idealized image of the working class is staged for rhe gaze of the ruling Party bureaucracy - it serves to legitimize their rule. That is why Milos Forman's Czech films were so subversive in mocking small, ordinary people: in showing their undignified ways, the futility of their dreams... this gesture was far more dangerous than making fun of the ruling bureaucracy. Forman did not want to destroy the bureaucrat's imaginary identification; he wisely preferred to subvert his symbolic identification by unmasking the spectacle enacted for his gaze. From. (0) to I{O) This difference between i(oJ and 1(0) - between ideal ego and ego-ideal can be further exemplified by the way nicknames function in American and Soviet culture."
    - paragraph [ref=e694]: "Let us take two individuals, each of whom represents the supreme achievement of these two cultures: Charles 'Lucky' Luciano and IosifVissarionovich Dzhugash viii 'Stalin'. In the first case the nickname tends to replace the first name (we usually speak simply of'Lucky Luciano'), while in the second it regularly replaces the family name ('Iosif Vissarionovich Stalin'). In the first case the nickname alludes to some extraordinary event which has marked the individual (Charles Luciano was 'lucky' to have survived the savage torture of his gangster enemies) it alludes, that is, to a positive, descriptive feature which fascinates us; it marks something that sticks out on the individual, something that offers itself to our gaze, something seen, not the point from which we observe the individual. However, in the case ofIosifVissarionovich, it would be entirely erroneous to conclude in a homologous way that 'Stalin' (Russian for '[made] of steel') alludes to some steely, inexorable characteristic of Stalin himself: what is really inexorable and steely are the laws of the historical progress, the iron necessity of the disintegration of capitalism and of the passage to socialism in the name of which Stalin, this empirical individual, is acting - the perspective from which he is observing himself and judging his activity. We could say, then, that 'Stalin' is the ideal point from which 'IosifVissarionovich', this empirical individual, this person of flesh and blood, is observing himself so that he appears likeable. We find the same split in a late writing of Rousseau, from the time of his psychotic delirium, entitled 'jean-jacques ju,geparRolisu' Oean-Jacques judged by Rousseau). It would be possible to conceive this as a. draft of the Lacanian theory of forename and family name: the first name designates the ideal ego, the point of imaginary identification, while the family name comes from the father - it designates, as the Name-of-the Father, the point of symbolic identification, the agency through which we observe and judge ourselves. The fact that should not be overlooked in this distinction is that ItO) is always already subordinated to I(O): it is the symbolic identification (the point from which we are observed) which dominates and determines the image, the imaginary form in which we appear to ourselves likeable. On the level offormal functioning, this subordination is attested by the fact that the nickname which marks 1(0) also functions as a rigid designator, not as a simple description. To take another example from the domain of gangsters: if a certain individual is nicknamed 'Scarface', this does not signify only the simple fact that his face is full of scars; it implies at the same time that we are dealing with somebody who is designated as 'Scarface' and will remain so even if, for example, all his scars were removed by plastic surgery. Ideological designations function in the same way: 'Communism' means (in the perspective of the Communist, of course) progress in democracy and freedom, even if - on the factual, descriptive level - the political regime legitimized as 'Communist' produces extremely repressive and tyrannical phenomena. To use Kripke's terms again: 'Communism' designates in all possible worlds, in all counterfactual situations, 'democracy-and-freedom', and that is why this connection cannot be refuted empirically, through reference to a factual state of things. The analysis of ideology must then direct its attention to the points at which names which prima fide signify positive descriptive features already function as 'rigid designators'. But why precisely is this difference between how we see ourselves and the point from which we are being observed the difference between imaginary and symbolic? In a first approach, we could say that in imaginary identification we imitate the other at the level of resemblance - we identify ourselves with the image of the other inasmuch as we are 'like him', while in symbolic identification we identify ourselves with the other precisely at a point at which he is inimitable, at the point which eludes resemblance. To explain this crucial distinction, let us take Woody Allen's film pI'!)' it Again, Sam. The movie starts with the famous final scene from Casablanca, but soon afterwards we notice that this was only a 'film-within-a-film' and that the real story concerns a hysterical New York intellectual whose sex life is a mess: his wife has just left him; throughout the film, a Humphrey Bogart figure appears to him: advising him, making ironic comments on his behaviour, and so on. The end of the film resolves his relation to the Bogart figure: after spending the night with his best friend's wife, the hero has a dramatic meeting with both of them at the airport; he renounces her and lets her go with her husband, thus repeating in real life the final scene from Casablanca which opened the film. When his lover says of his parting words 'It's beautiful', he answers: 'It's from Casablanca. I waited my whole life to say it.' After this denouement the Bogart figure appears for the last time, saying that by renouncing a woman because of a friendship the hero finally 'got some style'; and no longer needs him. How should we read this withdrawal of the Bogart figure? The most obvious reading would be the one indicated by the final words of the hero to the Bogart figure: 'I guess the secret is not being you, it's being me.'"
    - paragraph [ref=e695]: "In other words, as long as the hero is a weak, frail hysteric he needs an ideal ego to identify with, a figure to guide him; but as soon as he finally matures and 'gets some style' he no longer needs an external point of identification because he has achieved identity with himself - he 'has become himself, an autonomous personality. But the words that follow the quoted phrase immediately subvert such a reading: 'True, you're not too tall and kind of ugly, but what the hell, I'm short enough and ugly enough to succeed on my own.'"
    - paragraph [ref=e696]: "In other words, far from 'outgrowing identification with Bogart', it is when he becomes an 'autonomous personality' that the hero really identifies with Bogart - more precisely: he becomes an 'autonomous personality' through his identification with Bogart. The only difference is that now identification is no longer imaginary (Bogart as a model to imitate) but, at least in its fundamental dimension, symbolic - that is, structural: the hero realizes this identification by enacting in reality Bogart's role from Casablanca - by assuming a certain 'mandate', by occupying a certain place in the intersubjective symbolic network (sacrificing a woman for friendship...). It is this symbolic identification that dissolves the imaginary identification (makes the Bogart figure disappear) - more precisely: that radically changes its contents. On the imaginary level, the hero can now identify with Bogart through features which are repellent: his smallness, his ugliness."
    - heading "Beyond Identification (Upper Level of the Graph of Desire)" [level=3] [ref=e697]
    - heading "'Che Vuoi?'" [level=4] [ref=e698]
    - paragraph [ref=e699]:
      - text: "This interplay of imaginary and symbolic identification under the domination of symbolic identification constitutes the mechanism by means of which the subject is integrated into a given socio-symbolic field - the way he/she assumes certain 'mandates', as was perfectly clear to Lacan himself: Lacan knew how to extract from Freud's text the difference between ideal ego, marked by him i, and ego-ideal, I. On the level ofI, you can without difficulties introduce the social. The I of the ideal can be in a superior and legitimate way constructed as a social and ideological function. It was moreover Lacan himself who did this in his Écrits. He situates a certain politics in the very foundations of psychology, so that the thesis that all psychology is social can be treated as Lacanian. If not on the level at which we are examining lȦ then at least on the level at which we fix it."
      - superscript [ref=e701]:
        - link "9" [ref=e702]:
          - /url: "#fn-ch3-9"
    - paragraph [ref=e703]: The only problem is that this 'square of the circle' of interpellation, this circular movement between symbolic and imaginary identification, never comes out without a certain leftover.
    - paragraph [ref=e704]: After every 'quilting' of the signifier's chain which retroactively fixes its meaning, there always remains a certain gap, an opening which is rendered in the third form of the graph by the famous 'che vuoi?' - 'You're telling me that, but what do you want with it, what are you aiming at?'
    - paragraph [ref=e705]: "This question mark arising above the curve of'quilting' thus indicates the persistence of a gap between utterance and its enunciation: at the level of utterance you're saying this, but what do you want to tell me with it,"
    - heading "Graph III" [level=4] [ref=e706]
    - paragraph [ref=e707]: "through it? (In the established terms of speech act theory, we could of course denote this gap as the difference between locution and the illocutionary force of a given utterance.) And it is at this exact place of the question arising above the utterance, at the place of, Why are you telling me this?', that we have to locate derire (small d in the graph) in its difference to demand: you demand something of me, but what do you really want, what are you aiming at through this demand? This split between demand and desire is what defines the position of the hysterical subject: according to the classic lacanian formula, the logic of the hysterical demand is 'I'm demanding this of you, but what I'm really demanding of you is to refute my demand because this is not it!' It is this intuition which is behind the ill-famed male chauvinist wisdom that 'woman is a whore': woman is a whore because we never really know what she means - for example, she says 'No!' to our advances, but we can never be sure that this 'No!' does not really mean a double 'Yes!' - an appeal to an even more aggressive approach; in this case, her real desire is the very opposite of her demand."
    - paragraph [ref=e708]: "In other words, 'woman is a whore' is a vulgar version of the unanswerable Freudian question 'Was The same intuition is probably at wotk behind another common wisdom, which tells us that politics is also a whore: it is not simply that the domain of politics is corrupted, treacherous, and so on; the point is rather that every political demand is always caught in a dialectics in which it aims at something other than its literal meaning: for example, it can function as a provocation intending to be refused (in which case the best way to frustrate it is to comply with it, to consent to it without reservation). As is well known, this was Lacan's reproach to the students' revolt of 1968: that is was basically a hysterical rebellion asking for a new Master. This 'Che vuoi?' is perhaps best illustrated by the starting point of Hitchcock's film North by Northwest. To lead the Russian agents off the right track, the CIA invents a non-existent agent named George Kaplan. Rooms are reserved for him in hotels, phone calls are made in his name, plane tickets purchased, and so on -all this to convince the Russian agents that Kaplan really exists, when in reality it is just a void, a name without a bearer. At the beginning of the film the hero, an ordinary American named Roger O. Thornhill, finds himself in the lounge of a hotel under observation by the Russians because the mysterious Kaplan is supposed to be staying there. A hotel clerk enters the lounge saying: 'phone call for Mr Kaplan. Is Mr Kaplan here?' Exactly at that same moment, by pure coincidence, Thornhill makes a sign to this clerk, wanting to send a telegram to his mother. The Russians who are overseeing the scene mistake him for Kaplan. When he wants to leave the hotel they kidnap him, take him to a lonely villa, and ask him to tell them all about his espionage work. of course, Thornhill knows nothing about it, but his professions of innocence pass for a double game. Where lies the - one might call it - psychologically convincing nature of this scene, based nevertheless on an almost unbelievable coincidence? Thornhill's situation corresponds to a fundamental situation of a human being as a being-of-Ianguage (parletre, to use Lacan's condensed writing)."
    - paragraph [ref=e709]: "The subject is always fastened, pinned, to a signifier which represents him for the other, and through this pinning he is loaded with a symbolic mandate, he is given a place in the intersubjective network of symbolic relations. The point is that this mandate is ultimately always arbitrary: since its nature is performative, it cannot be accounted for by reference to the 'real' properties and capacities of the subject. So, loaded with this mandate, the subject is automatically confronted with a certain' Che vuoi?', with a question of the Other."
    - paragraph [ref=e710]: The Other is addressing him as if he himself possesses the answer to the question of why he has this mandate, but the question is, of course, unanswerable.
    - paragraph [ref=e711]: "The subject does not know why he is occupying this place in the symbolic network. His own answer to this 'che vuoi! of the Other can only be the hysterical question: 'Why am I what I'm supposed to be, why have I this mandate? Why am I [a teacher, a master, a king... or George KaplanJ?' Briefly: 'Wly! am I what you [the big Other] are saying that I am?' And the final moment of the psychoanalytic process is, for the analysand, precisely when he gets rid of this question - that is, when he accepts his being as non-justified by the big Other."
    - paragraph [ref=e712]:
      - text: "This is why psychoanalysis began with the interpretation of hysterical symptoms, why its 'native soil' was the experience of female hysteria: in the last resort, what is hysteria if not precisely the effect and testimony of a failed interpellation; what is the hysterical question if not an articulation of the incapacity of the subject to fulfil the symbolic identification, to assume fully and without restraint the symbolic mandate? Lacan formulates the hysterical question as a certain 'Why am I what you're telling me that I am?' - that is, which is that surplus-object in me that caused the Other to interpellate me, to 'hail' me as... [king, master, wife... ]?'"
      - superscript [ref=e714]:
        - link "10" [ref=e715]:
          - /url: "#fn-ch3-10"
      - text: The hysterical question opens the gap of what is 'in the subject more than the subject', of the object in subject which resists interpellation - subordination of the subject, its inclusion in the symbolic network.
    - paragraph [ref=e716]: "Perhaps the strongest artistic depiction of this moment of hystericization is Rossetti's famous painting 'Ecce Ancilla Domini', showing Mary at the very moment of interpellation - when the Archangel Gabriel reveals to her her mission: to conceive immaculately and to give birth to the son of God."
    - paragraph [ref=e717]: How does Mary react to this astonishing message, to this original 'Hail Mary'?
    - paragraph [ref=e718]: "The painting shows her frightened, with a bad conscience, withdrawing from the archangel into a comer, as if asking herself Why was I selected for this stupid mission? Why me? What does this repulsive ghost really want of me?' The exhausted, pale face and the dark eyeteeth are telltale enough: we have before us a woman with a turbulent sex life, a licentious sinner - in short, an Eve-like figure; and the painting depicts 'Eve interpellated into Mary', her hysterical reaction to it."
    - paragraph [ref=e719]:
      - text: "Martin Scorsese's film The Last Temptation of Christ goes a step further in this direction: its theme is simply the hystericization of Jesus Christ himself, it shows us an ordinary, carnal, passionate man discovering gradually, with fascination and horror, that he is the son of God, bearer of the dreadful but magnificent mission to redeem humanity through his sacrifice. The problem is that he cannot come to terms with this interpellation: the meaning of his 'temptations' lies precisely in the hysterical resistance to his mandate, in his doubts about it, in his attempts to evade it even when he is already nailed to the cross."
      - superscript [ref=e721]:
        - link "11" [ref=e722]:
          - /url: "#fn-ch3-11"
    - heading "The Jew and Antigone" [level=4] [ref=e723]
    - paragraph [ref=e724]: We come across this 'che vuoi?' everywhere in the political domain, including the 1988 American election struggle in which, after Jesse Jackson's first successes, the press started to ask 'What does Jackson really want?' Overtones of racism were easy to detect in this question, because it was never raised about other candidates.
    - paragraph [ref=e725]: "The conclusion that we are here dealing with racism is further confirmed by the fact that this 'Che vuoi?' erupts most violently in the purest, so to say distilled, form of racism, in antiSemitism: in the anti-Semitic perspective, the Jew is precisely a person about whom it is never clear 'what he really wants' - that is, his actions are always suspected of being guided by some hidden motives (the Jewish conspiracy, world domination and the moral corruption of Gentiles, and so on). The case of anti-Semitism also illustrates perfectly why Lacan put, at the end of the curve designating the question 'Che vuoi?' the formula of fantasy ($ 00): fantasy is an allfwerto this 'che vuoi?'; it is an attempt to fill out the gap of the question with an answer. In the case of anti-Semitism, the answer to 'What does the Jew want?' is a fantasy of'Jewish conspiracy': a mysterious power of Jews to manipulate events, to pull the strings behind the scenes. The crucial point that must be made here on a theoretical level is that fantasy functions as a construction, as an imaginary scenario filling out the void, the opening of the desire of the Other. by giving us a definite answer to the question 'What does the Other want?', it enables us to evade the unbearable deadlock in which the Other wants something from us, but we are at the same time incapable of translating this desire of the Other into a positive interpellation, into a mandate with which to identify. Now we can also understand why it has been the Jews who have been chosen as the object of racism par excellence: is not the Jewish God the purest embodiment of this 'Che vuoi?', of the desire of the Other in its terrifying abyss, with the formal prohibition on 'making an image of God' - on filling out the gap of the Other's desire with a positive fantasyscenario? Even when, as in the case of Abraham, this God pronounces a concrete demand (ordering Abraham to slaughter his own son), it remains quite open what he really wants from it: to say that with this horrible act Abraham must attest to his infinite trust and devotion to God is already an inadmissible simplification. The basic position of a Jewish believer is, then, that of Job: not so much lamentation as incomprehension, perplexity, even horror at what the Other (God) wants with the series of calamities that are being inflicted upon him. This horrified perplexity marks the initial, founding relationship of the Jewish believer to God, the pact that God concluded with the Jewish people. The fact that Jews perceive themselves as the 'chosen people' has nothing to do with a belief in their superiority; they do not possess any special qualities; before the pact with God they were a people like any other, no more and no less corrupted, living their ordinary life - when suddenly, like a traumatic flash, they came to know (through Moses... J that the Other had chosen them. The choice was thus not at the beginning, it did not determine the 'original character' of the Jews - to use Kripkean terminology again, it has nothing to do with their descriptive features. Why were they chosen, why did they suddenly find themselves occupying the position of a debtor towards God? What does God really want from them?"
    - paragraph [ref=e726]: The answer is - to repeat the paradoxical formula of the prohibition of incest - impossible and prohibited at the same time.
    - paragraph [ref=e727]: "In other words, the Jewish position could be denoted as a position of God btyond - or prior to - the HOfy, in contrast to the pagan affirmation of the Holy as prior to gods. This strange god that occludes the dimension of the Holy is not the 'philosopher's god', the rational manager of the universe rendering impossible sacred ecstasy as a means of communication with him: it is simply the unbearable point of the desire of the Other, of the gap, the void in the Other concealed by the fascinating presence of the Holy. Jews persist in this enigma of the Other's desire, in this ttaumatic point of pure 'Che vuoi?' which provokes an unbearable anxiety insofar as it cannot be symbolized, 'gentrified', through sacrifice or loving devotion. It is precisely at this level that we should situate the break between Christianity and the Jewish religion - the fact that in contrast to the Jewish religion of anxie£)!, Christianity is a religion of love. The term 'love' is to be conceived here as articulated in Lacanian theory - that is, in its dimension of fundamental deception: we try to fill out the unbearable gap of 'che ruOl\"?', the opening of the Other's desire, by offering ourselves to the Other as the object of its desire. In this sense love is, as Lacan pointed out, an interpretation of the desire of the Other: the answer oflove is 'I am what is lacking in you; with my devotion to you, with my sacrifice for you, I will fill you out, I will complete you.' The operation oflove is therefore double: the subject fills in his own lack by offering himself to the other as the object filling out the lack in the Other - love's deception is that this overlapping of two lacks annuls lack as such in a mutual completion. Christianity is therefore to be conceived as an attempt to 'gentri£Y' the Jewish 'Che VUOl?' through the act oflove and sacrifice. The greatest possible sacrifice, the Crucifixion, the death of the son of God, is precisely the final proof that God-Father loves us with an all-embracing, infinite love, thereby delivering us from the anxiety of'che VUOl?'. The Passion of Christ, this fascinating image which cancels all other images, this fantasy-scenario which condenses all the libidinal economy of the Christian religion, acquires its meaning only against the background of the unbearable enigma of the desire of the Other (God). We are, of course, far from implying that Christianity entails a kind of return to the pagan relationship of man to god: that this is not so is already attested by the fact that, contrary to superficial appearance, Christianity follows the Jewish religion in occluding the dimension of the Holy. What we do find in Christianity is something of quite another order: the idea of the saint, which is the exact opposite of the priest in service of the Holy. The priest is a 'functionary of the Holy'; there is no Holy without its officials, without the bureaucratic machinery supporting it, organizing its ritual, from the Aztecs' official of human sacrifice to the modern sacred state or army rituals. The saint, on the contrary, occupies the place of objet petit a, of pure object, of somebody undergoing radical subjective destitution. He enacts no ritual, he conjures nothing, he just persists in his inert presence."
    - paragraph [ref=e728]: "We can now understand why Lacan saw in Antigone a forerunner of Christ's sacrifice: in her persistence, Antigone is a saint, definitely not priestess."
    - paragraph [ref=e729]: This is why we must oppose all attempts to domesticate her, to tame her by concealing the frightening strangeness, 'inhumanity', apathetic character of her figure, making of her a gentle protectress offamily and household who evokes our compassion and offers herself as a point of identification. In Sophocles' Antigone, the figure with which we can identify is her sister Ismene - kind, considerate, sensitive, prepared to give way and compromise, pathetic, 'human', in contrast to Antigone, who goes to the limit, who 'doesn't give way on her desire' (Lacan) and becomes, in this persistence in the 'death drive', in the being-to wards-death, frighteningly ruthless, exempted from the circle of everyday feelings and considerations, passions and fears.
    - paragraph [ref=e730]: "In other words, it is Antigone herself who necessarily evokes in us, pathetic everyday compassionate creatures, the question 'What does she really want?', the question which precludes any identification with her. In European literature, the couple Antigone-Ismene repeats itself in de Sade's work, in the shape of the couple Juliette-Justine: here, Justine is likewise a pathetic victim, as opposed to Juliette, this a-pathetic rake who also 'doesn't give way on her desire'. Finally, why should we not locate a third version of the couple Antigone-Ismene in Margaretha von Trotta's film The Times ifPlumb, in the couple of the RAF (Red Army Fraction)-terrorist (based on the model of Gudrun Ensslin) and her pathetic-compassionate sister who 'tries to understand her' and from whose viewpoint the story is told. (The Schlondorf episode in the omnibus film Germa'9' in Autumn was based on the parallel between Antigone and Gudrun Ensslin.) Three at first sight totally incompatible figures: the dignified Antigone sacrificing herself for her brother's memory; the promiscuous Juliette giving herself over to enjoyment beyond all limits (that is precisely beyond the limit at which enjoyment still gives pleasure); the fanatical-ascetic Gudrun wanting to awaken the world from its everyday pleasures and routines with her terrorist acts - Lacan enables us ro recognize in all three the same ethical position, that of'not giving way on one's desire'. That is why all three of them provoke the same 'che vuoi?', the same 'What do they really want?': Antigone with her obstinate persistence, Juliette with her a-pathetic promiscuity, Gudrun with her 'senseless' terrorist acts: all three put in question the Good embodied in the State and common morals."
    - heading "Fantasy as a Screen for the Desire of the Other" [level=4] [ref=e731]
    - paragraph [ref=e732]: Fantasy appears, then, as an answer to 'Che yuoi?', to the unbearable enigma of the desire of the Other, of the lack in the Other, but it is at the same time fantasy itself which, so to speak, provides the co-ordinates of our desire - which constructs the frame enabling us to desire something.
    - paragraph [ref=e733]: "The usual definition of fantasy ('an imagined scenario representing the realization of desire') is therefore somewhat misleading, or at least ambiguous: in the fantasy-scene the desire is not fulfilled, 'satisfied', but constituted (given its objects, and so on) - through fontasy, we learn 'how to desireɚ In this intermediate position lies the paradox of fantasy: it is the frame co-ordinating our desire, but at the same time a defence against' che yuoi?', a screen concealing the gap, the abyss of the desire of the Other. Sharpening the paradox to its utmost - to tautology - we could say that desire itself is a difence against desire: the desire structured through fantasy is a defence against the desire of the Other, against this 'pure', trans-phantasmic desire (i.e. the 'death drive' in its pure form)."
    - paragraph [ref=e734]: "We can now see why the maxim of psychoanalytic ethics as formulated by Lacan ('not to give way on one's desire') coincides with the closing moment of the psychoanalytic process, the 'going through the fantasy': the desire with regard to which we must not 'give way' is not the desire supported by fantasy but the desire of the Other beyond fantasy. 'Not to give way on desire' implies a radical renunciation of all the I;ichness of desires based upon fantasy-scenarios. In the psychoanalytic process, this desire of the Other assumes the form of the analyst's desire: the analysand tries at first to evade its abyss by means of transference - that is, by means of offering himself as the object of the analyst's love; the 'dissolution of transference' takes place when the analysand renounces filling out the void, the lack in the Other. (We find a logic homologous to the paradox of desire as defence against desire in the Lacanian thesis that the cause is always the cause of something which goes wrong, which is amiss [the French 'ࠬ cloche': it limps]: it could be said that causality - the usual, 'normal' linear chain of causes - is a defence against the cause with which we are concerned in psychoanalysis; this cause appears precisely where 'normal' causality fails, breaks down."
    - paragraph [ref=e735]:
      - text: "For example, when we make a slip of the tongue, when we say something other than what we intended to say - that is, when the causal chain regulating our 'normal' speech activity breaks down - at this point that question of the cause is imposed upon us: 'Why did it happen?') The way fantasy functions can be explained through reference to Kant's Critique of Pure Reason: the role of fantasy in the economy of desire is homologous to that of transcendental schematism in the process of knowledge."
      - superscript [ref=e737]:
        - link "12" [ref=e738]:
          - /url: "#fn-ch3-12"
      - text: "In Kant, transcendental schematism is a mediator, an intermediary agency between empirical content (contingent, inner-worldly, empirical objects of experience) and the network of transcendental categories: it is the name of the mechanism through which empirical objects are included in the network of transcendental categories which determines the way we perceive and conceive them (as substances with properties, submitted to causal links, and so on). A homologous mechanism is at work with fantasy: how does an empirical, positively given object become an object of desire; how does it begin to contain some X, some unknown quality, something which is 'in it more than it' and makes it worthy of our desire?"
    - paragraph [ref=e739]: By entering the framework of fantasy, by being included in a fantasy-scene which gives consistency to the subject's desire.
    - paragraph [ref=e740]: "Let us take Hitchcock's Rear Window: the window through whichJames Stewart, disabled and confined to a wheelchair, gazes continually is clearly a fantasy-window - his desire is fascinated by what he can see through the window. And the problem of the unfortunate Grace Kelly is that by proposing to him she acts as an obstacle, a stain disturbing his view through the window, instead of fascinating him with her beauty."
    - paragraph [ref=e741]: "How does she succeed, finally, in becoming worthy of his desire? By literally entering the frame of his fantasy; by crossing the courtyard and appearing 'on the other side' where he can see her through the window. When Stewart sees her in the murderer's apartment his gaze is immediately fascinated, greedy, desirous of her: she has found her place in his fantasy-space. This would be Lacan's 'male chauvinist' lesson: man can relate to woman only in so far as she enters the frame of his fantasy. At a certain naive level, this is not unknown to the psychoanalytic doxa which claims that every man seeks, in a woman he chooses as his sexual partner, his mother's substitute: a man falls in love with a woman when some feature of her reminds him of his mother. The only thing Lacan adds to this traditional view is to emphasize its usually overlooked negative dimension: in fantasy, mother is reduced to a limited set of (symbolic) features; as soon as an object too close to the Mother-Thing - an object which is not linked with the maternal Thing only through certain reduced features but is immediately attached to it - appears in the fantasy-frame, the desire is suffocated in incestuous claustrophobia. Here we again encounter the paradoxical intermediate role of fantasy: it is a construction enabling us to seek maternal substitutes, but at the same time a screen shielding us from getting too close to the maternal Thing - keeping us at a distance from it."
    - paragraph [ref=e742]: "This is why it would be wrong to conclude that any empirical, positively given object could take its place in the fantasy-frame, thereby starting to function as an object of desire: some objects (those which are too close to the traumatic Thing) are definitely excluded from it; if, by any chance, they intrude into the fantasy-space, the effect is extremely disturbing and disgusting: the fantasy loses its fascinating power and changes into a nauseating object Again Hitchcock, this time in Vertigo, offers us an example of such a transformation: the hero - James Stewart again - is passionately in love with Madeleine and follows her to a museum where she admires the portrait of Charlotte, a long-dead woman with whom Madeleine identifies: to play a practical joke on him, his everyday maternal friend, an amateur painter, sets up an unpleasant surprise for him: she paints an exact copy of charlotte's portrait with white lace dress, a bunch of red flowers in her lap, and so on, but instead of Charlotte's fatally beautiful face she puts her own common face with spectacles... the effect is terrifying: depressive, broken and disgusted, Stewart leaves her. (We find the same procedure in Hitchcock's Rebecca, where Joan Fontaine - to charm her husband, whom she supposes to be stiU in love with his late wife, Rebecca - appears at a formal reception in a gown Rebecca once wore on a similar occasion - the effect is again grotesque and the husband drives her furiously away...) It is dear, then, why Lacan developed his graph of desire apropos of Shakespeare's Hamlet: is not Hamlet, in the last analysis, a drama o(failed interpellation? At the beginning we have interpellation in its pure form: the ghost of the father-king interpellates Hamlet-individual into subject - that is, Hamlet recognizes himself as the addressee of the imposed mandate or mission (to avenge his father's murder); but the father's ghost enigmatically supplements his command with the request that Hamlet should not in any way harm his mother. And what prevents Hamlet from acting, from accomplishing the imposed revenge, is precisely the confrontation with the 'che vuoi?' of the desire of the Other: the key scene of the whole drama is the long dialogue between Hamlet and his mother, in which he is seized by doubt as to his mother's desire - what does she really want? What if she really eryiv's her filthy, promiscuous relationship with his unde? Hamlet is therefore hindered not by indecision as to his own desire; it is not that 'he doesn't know what he really wants' - he knows that very dearly: he wants to avenge his father - what hinders him is doubt concerning the desire 0/ the other, the confrontation of a certain 'che vuoi?' which announces the abyss of some terrifying, filthy enjoyment. If the Name-of-the-Father functions as the agency of interpellation, of symbolic identification, the mother's desire, with its fathomless' clze vuoi?', marks a certain limit at which every interpellation necessarily fails."
    - heading "The Inconsistent Other of Jouissance" [level=4] [ref=e743]
    - paragraph [ref=e744]: "In this way we have already reached the fourth, last, complete form of the graph of desire, because what is added in this last form is a new vector of enjoyment [jouissanceJ intersecting the vector of the symbolically structured desire:"
    - heading "Completed Graph" [level=4] [ref=e745]
    - paragraph [ref=e746]: "The complete graph is thus divided into two levels, which can be designated as the level of meaning and the level of enjoyment. The problem of the first (lower) level is how the intersection of the signifying chain and of a mythical intention (A) produces the effect of meaning, with all its internal articulation: the retroactive character of meaning in so far as it is the function of the big Other - in so far, that is, as it is conditioned by the place of the Other, the signifier's battery (s (0)); the imaginary (i(o)) and the symbolic (1(0)) - identification of the subject based on this retroactive production of meaning, and so on. The problem of the second (upper) level is what happens when this very field of the signifier's order, of the big Other, is perforated, penetrated by a pre-symbolic (real) stream of enjoyment - what happens when the pre-symbolic 'substance', the body as materialized, incarnated enjoyment, becomes enmeshed in the signifier's network. Its general result is clear: by being filtered through the sieve of the signifier, the body is submitted to castration, enjoyment is evacuated from it, the body survives as dismembered, mortified."
    - paragraph [ref=e747]: In other words, the order of the signifier (the big Other) and that of enjoyment (the Thing as its embodiment) are radically heterogeneous, inconsistent; any accordance between them is structurally impossible.
    - paragraph [ref=e748]: "This is why we find on the lefthand side of the upper level of the graph - at the first point ofintersection between enjoyment and signifier, S(0) - the signifier of the lack in the Other, of the inconsistency of the Other: as soon as the field of the signifier is penetrated by enjoyment it becomes inconsistent, porous, perforated the enjoyment is what cannot be symbolized, its presence in the field of the signifier can be detected only through the holes and inconsistencies of this field, so the only possible signifier of enjoyment is the signifier of the lack in the Other, the signifier of its inconsistency. Today, it is a commonplace that the Lacanian subject is divided, crossedout, identical to a lack in a signifying chain. However, the most radical dimension of Lacanian theory lies not in recognizing this fact but in realizing that the big Other, the symbolic order itself, is also bam!, crossedout, by a fundamental impossibility, structured around an impossible/ traumatic kernel, around a central lack. Without this lack in the Other, the Other would be a closed structure and the only possibility open to the subject would be his radical alienation in the Other. So it is precisely this lack in the Other which enables the subject to achieve a kind of 'dealienation' caned by Lacan separation: not in the sense that the subject experiences that now he is separated for ever from the object by the barrier of language, but that the ol?ject is separated.from the Other itself, that the Other itself 'hasn't got it', hasn't got the final answer - that is to say, is in itself blocked, desiring; that there is also a desire of the Other. This lack in the Other gives the subject - so to speak - a breathing space, it enables him to avoid the total alienation in the signifier not by filling out his lack but by allowing him to identify himself, his own lack, with the lack in the Other. The three levels of the descending vector on the left side of the graph can thus be conceived in view of the logic that regulates their succession. First, we have S(0): the mark of the lack of the Other, of the inconsistency of the symbolic order when it is penetrated by jouissance: then S Oo, the formula of fantasy: the function of fantasy is to serve as a screen concealing this inconsistency; finally.l(O), the effect of the signification as dominated by fantasy: fantasy functions as 'absolute signification' (Lacan); it constitutes the frame through which we experience the world as consistent and meaningful - the a priori space within which the particular effects of signification take place. The last point to be clarified is why we find on the other, right-hand point of intersection between enjoyment and signifier the formula of drive ($OD)?"
    - paragraph [ref=e749]: "We have already said that the signifier dismembers the body, that it evacuates enjoyment from the body, but this 'evacuation' Uacques-Alain Miller) is never fully accomplished; scattered around the desert of the symbolic Other, there are always some leftovers, oases of enjoyment, so-called 'erogenous zones', fragments still penetrated with enjoyment - and it is precisely these remnants to which Freudian drive is tied: it circulates, it pulses around them. These erogenous zones are designated with D (symbolic demand) because there is nothing 'natural', 'biological', in them: which part of the body will survive the 'evacuation of enjoyment' is determined not by physiology but by the way the body has been dissected through the signifier (as is confirmed by those hysterical symptoms in which the parts of the body from which enjoyment is 'normally' evacuated become again eroticized - neck, nose...). Perhaps we should take a risk and read $OD retroactively, from Lacan's later theoretical development, as the formula of sinthome: a particular signifying formation which is immediately permeated with enjoyment that is, the impossible junction of enjoyment with the signifier. Such a reading gives us a key to the upper level, to the upper square of the graph of desire in its opposition to the lower square: instead of imaginary identification (the relation between imaginary ego and its constitutive image, its ideal ego) we have here desire (dJ supported by fantasy ($0 0); the function of fantasy is to fill the opening in the Other, to conceal its inconsistency - as for instance the fascinating presence of some sexual scenario serving as a screen to mask the impossibility of the sexual relationship. Fantasy conceals the fact that the Other, the symbolic order, is structured around some traumatic impossibility, around something which cannot be symbolized - i.e. the real ofjouissance: through fantasy,jouissance is domesticated, 'gentrified' - so what happens with desire after we 'traverse' fantasy? Lacan's answer, in the last pages of his Seminar XI, is drive, ultimately the death drive: 'beyond fantasy' there is no yearning or any kindred sublime phenomenon, 'beyond fantasy' we find only drive, its pulsation around the sinthome. 'Going-through-the-fantasy' is therefore strictly correlative to identification with a sinthome. '"
    - heading "'Going Through' the Social Fantasy" [level=4] [ref=e750]
    - paragraph [ref=e751]: "In this way, we could read the whole upper (second) level of the graph as designating the dimension 'beyond interpellation': the impossible 'square of the circle' of symbolic and/or imaginary identification never results in the absence of any remainder, there is always a leftover which opens the space for desire and makes the Other (the symbolic order) inconsistent, with fantasy as an attempt to overcome, to conceal this inconsistency, this gap in the Other. And now we can finally return to the problematics of ideology: the crucial weakness of hitherto '(post-)structuralist' essays in the theory of ideology descending from the Althusserian theory of interpellation was to limit themselves to the lower level, to the lower square of Lacan's graph of desire - to aim at grasping the efficiency of an ideology exclusively through the mechanisms of imaginary and symbolic identification. The dimension 'beyond interpellation' which was thus left out has nothing to do with some kind of irreducible dispersion and plurality of the signifying process - with the fact that the metonymic sliding always subverts every fixation of meaning, every 'quilting' of the floating signifiers (as it would appear in a 'post-structuralist' perspective). 'Beyond interpellation' is the square of desire, fantasy, lack in the Other and drive pulsating around some unbearable surplus-enjoyment. What does this mean for the theory of ideology? At first sight it could seem that what is pertinent in an analysis of ideology is only the way it functions as a discourse, the way the series offloating signifiers is totalized, transformed into a unified field through the intervention of certain 'nodal points'. Briefly: the way the discursive mechanisms constitute the field of ideological meaning; in this perspective the enjoyment-in-signifier would be simply pre-ideological, irrelevant for ideology as a social bond. But the case of so-called 'totalitarianism' demonstrates what applies to every ideology, to ideology as such: the last support of the ideological effect (of the way an ideological network of signifiers 'holds' us) is the nonsensical, pre-ideological kernel of enjoyment. In ideology 'all is not ideology (that is, ideological meaning)', but it is this very surplus which is the last support of ideology. That is why we could say that there are also two complementary procedures of the 'criticism of ideology': • one is discursive, the 'symptomal reading' of the ideological text bringing about the 'deconstruction' of the spontaneous experience of its meaning - that is, demonstrating how a given ideological field is a result of a montage of heterogeneous 'floating signifiers', of their totalization through the intervention of certain 'nodal points'; • the other aims at extracting the kernel of e,yo/ment, at articulating the way in which - beyond the field of meaning but at the same time internal to it - an ideology implies, manipulates, produces a pre-ideological enjoyment structured in fantasy. To exemplify this necessity of supplementing the analysis of discourse with the logic of enjoyment we have only to look again at the special case of ideology, which is perhaps the purest incarnation of ideology as such: anti-Semitism. To put it bluntly: 'Society doesn't exist', and the Jew is its symptom. On the level of discourse analysis, it is not difficult to articulate the network of symbolic overdetermination invested in the figure of the Jew. First, there is displacement: the basic trick of anti-Semitism is to displace social antagonism into antagonism between the sound social texture, social body, and the Jew as the force corroding it, the force of corruption. Thus it is not society itself which is 'impossible', based on antagonism the source of corruption is located in a particular entity, the Jew. This displacement is made possible by the association of Jews with financial dealings: the source o f exploitation and of class antagonism is located not in the basic relation between the working and ruling classes but in the relation between the 'productive' forces (workers, organizers of production...) and the merchants who exploit the 'productive' classes, replacing organic co-operation with class struggle. This displacement is, of course, supported by condensation: the figure of the Jew condenses opposing features, features associated with lower and upper classes: Jews are supposed to be dirty and intellectual, voluptuous and impotent, and so on. What gives energy, so to speak, to the displacement is therefore the way the figure of the Jew condenses a series of heterogeneous antagonisms: economic Uew as profiteer), political Uew as schemer, retainer of a secret power), moral-religious Uew as corrupt antiChristian), sexual Uew as seducer of our innocent girls)... In short, it can easily be shown how the figure of the Jew is a symptom in the sense of a coded message, a cypher, a disfigured representation of social antagonism; by undoing this work of displacement/condensation, we can determine its meaning. But this logic of metaphoric-metonymic displacement is not sufficient to explain how the figure of the Jew captures our desire; to penetrate its fascinating force, we must take into account the way 'Jew' enters the framework of fantasy structuring our enjoyment. Fantasy is basically a scenario filling out the empty space of a fundamental impossibility, a screen masking a void. 'There is no sexual relationship', and this impossibility is filled out by the fascinating fantasy-scenario - that is why fantasy is, in the last resort, always a fantasy of the sexual relationship, a staging of it. As such, fantasy is not to be interpreted, only 'traversed': all we have to do is experience how there is nothing 'behind' it, and how fantasy masks precisely this 'nothing'. (But there is a lot behind a symptom, a whole network of symbolic overdetermination, which is why the symptom involves its interpretation.) It is now clear how we can use this notion of fantasy in the domain of ideology proper: here also 'there is no class relationship', society is always traversed by an antagonistic split which cannot be integrated into symbolic order. And the stake of social-ideological fantasy is to construct a vision of society which does exist, a society which is not split by an antagonistic division, a society in which the relation between its parts is organic, complementary. The clearest case is, of course, the corporatist vision of Society as an organic Whole, a social Body in which the different classes are like extremities, members each contributing to the Whole according to their function - we may say that 'Society as a corporate Body' is the fundamental ideological fantasy. How then do we take account of the distance between this corporatist vision and the factual society split by antagonistic struggles?"
    - paragraph [ref=e752]: "The answer is, of course, the Jew: an external element, a foreign body introducing corruption into the sound social fabric. In short, 'Jew' is a fetish which simultaneously denies and embodies the structural impossibility of 'Society': it is as if in the figure of the Jew this impossibility had acquired a positive, palpable existence - and that is why it marks the eruption of enjoyment in the social field. The notion of social fantasy is therefore a necessary counterpart to the concept of antagonism: fantasy is precisely the way the antagonistic fissure is masked."
    - paragraph [ref=e753]: "In other words, flntasy is a means for an ideology to take its own failure into account in advance. The thesis ofLaclau and Mouffe that 'Society doesn't exist', that the Social is always an inconsistent field structured around a constitutive impossibility, traversed by a central 'antagonism' this thesis implies that every process of identification conferring on us a fixed socio-symbolic identity is ultimately doomed to faiL The function of ideological fantasy is to mask this inconsistency, the fact that 'Society doesn't exist', and thus to compensate us for the failed identification. The 'Jew' is the means, for Fascism, of taking into account, of representing its own impossibility: in its positive presence, it is only the embodiment of the ultimate impossibility of the totalitarian project - of its immanent limit."
    - paragraph [ref=e754]: "This is why it is insufficient to designate the totalitarian project as impossible, utopian, wanting to establish a totally transparent and homogeneous society - the problem is that in a way, totalitarian ideology knows it, recognizes it in advance: in the figure of the 'Jew' it includes this knowledge in its edifice. The whole Fascist ideology is structured as a struggle against the element which holds the place of the immanent impossibility of the very Fascist project: the 'Jew' is nothing but a fetishistic embodiment of a certain fundamental blockage. The 'criticism of ideology' must therefore invert the linking of causality as perceived by the totalitarian gaze: far from being the positive cause of social antagonism, the 'Jew' is just the embodiment of a certain blockage - of the impossibility which prevents the society from achieving its full identity as a closed, homogeneous totality. Far from being the positive cause of social negativity, the Jew' is a point at which social negativity as such assumes positive existence."
    - paragraph [ref=e755]: "In this way we can articulate another formula of the basic procedure of the 'criticism of ideology', supplementing the one given above: to detect, in a given ideological edifice, the element which represents within it its own impossibility. Society is not prevented from achieving its full identity because of Jews: it is prevented by its own antagonistic nature, by its own immanent blockage, and it 'projects' this internal negativity into the figure of the 'Jew'."
    - paragraph [ref=e756]:
      - text: In other words, what is excluded from the Symbolic (from the frame of the corporatist socio-symbolic order) returns in the Real as a paranoid construction of the 'Jew'.
      - superscript [ref=e758]:
        - link "13" [ref=e759]:
          - /url: "#fn-ch3-13"
    - paragraph [ref=e760]: We can also see now how 'going through' the social fantasy is likewise correlative to identification with a symptom.
    - paragraph [ref=e761]: "Jews are clearly a social symptom: the point at which the immanent social antagonism assumes a positive form, erupts on to the social surface, the point at which it becomes obvious that society 'doesn't work', that the social mechanism 'creaks'."
    - paragraph [ref=e762]: "If we look at it through the frame of (corporatist) fantasy, the 'Jew' appears as an intruder who introduces from outside disorder, decomposition and corruption of the social edifice - it appears as an outward positive cause whose elimination would enable us to restore order, stability and identity. But in 'going through the fantasy' we must in the same move identify with the symptom: we must recognize in the properties attributed to 'Jew' the necessary product of our very social system; we must recognize in the 'excesses' attributed to 'Jews' the truth about ourselves. Precisely because of such a notion of social 'excesses', Lacan pointed out that it was Marx who invented the symptom: Marx's great achievement was to demonstrate how all phenomena which appear to everyday bourgeois consciousness as simple deviations, contingent deformations and degenerations of the 'normal' functioning of society (economic crises, wars, and so on), and as such abolishable through amelioration of the system, are necessary products of the system itself - the points at which the 'truth', the immanent antagonistic character of the system, erupts. To 'identify with a symptom' means to recognize in the 'excesses', in the disruptions of the 'normal' way of things, the key offering us access to its true functioning. This is similar to Freud's view that the keys to the functioning of the human mind were dreams, slips of the tongue, and similar 'abnormal' phenomena."
  - region "4. You Only Die Twice" [ref=e763]:
    - heading "4. You Only Die Twice" [level=2] [ref=e764]
    - heading "Between the Two Deaths" [level=3] [ref=e765]
    - paragraph [ref=e766]: "The connection between the death drive and the symbolic order is a constant with Lacan, but we can differentiate the various stages of his teaching precisely by reference to the different modes of articulation of the death drive and the signifier:"
    - paragraph [ref=e767]: "• In the first period (the first seminar, The Function and the Field of Speech and Language...], it is the Hegelian phenomenological idea that the word is a death, a murder of a thing: as soon as the reality is symbolized, caught in a symbolic network, the thing itself is more present in a word, in its concept, than in its immediate physical reality. More precisely, we cannot return to the immediate reality: even if we turn from the word to the thing - from the word 'table' to the table in its physical reality, for example - the appearance of the table itself is already marked with a certain lack - to know what a table really is, what it means, we must have recourse to the word which implies an absence of the thing."
    - paragraph [ref=e768]: "• In the second period (the Lacanian reading of Poe's 'Purloined Letter'), the accent is shifted from the word, speech, to language as a synchronic structure, a senseless autonomous mechanism which produces meaning as its effect. If, in the first period, the Lacanian concept of language is still basically a phenomenological one (Lacan constantly repeats that the field of psychoanalysis is the field of meaning, la signification), here we have a 'structuralist' conception of language as a differential system of elements. The death drive is now identified with the symbolic order itself: in Lacan's own words, it is 'nothing but a mask of the symbolic order'. The main thing here is the opposition between the imaginary level of the experience of meaning and the meaningless signifier/signifying mechanism producing it. The imaginary level is governed by the pleasure principle, it is striving for a homeostatic balance, and the symbolic order in its blind automatism is always troubling this homeostasis: it is 'beyond the pleasure principle'. When the human being is caught in the signifier's network, this network has a mortifying effect on him; he becomes part of a strange automatic order disturbing his natural homeostatic balance (through compulsive repetition, for example)."
    - paragraph [ref=e769]: "• In the third period, in which the main accent of Lacan's teaching is put on the Real as impossible, the death drive again radically changes its signification. This change can be most easily detected through the relationship between the pleasure principle and the symbolic order. Until the end of 1950S, the pleasure principle was identified with the imaginary level: the symbolic order was conceived as the realm 'beyond the pleasure principle'. But starting from the late 1950S (the Seminar on The Ethic of Psychoanalysis), it is, in contrast, the symbolic order itself which is identified with the pleasure principle: the unconscious 'structured like a language', its 'primary process' of metonymic-metaphoric displacement, is governed by the pleasure principle; what lies beyond is not the symbolic order but a real kernel, a traumatic core. To designate it, Lacan uses a Freudian term: das Ding, the Thing as an incarnation of the impossible jouissance (the term Thing is to be taken here with all the connotations it possesses in the domain of horror science fiction: the 'alien' from the film of the same name is a pre-symbolic, maternal Thing par excellence)."
    - paragraph [ref=e770]: "The symbolic order is striving for a homeostatic balance, but there is in its kernel, at its very centre, some strange, traumatic element which cannot be symbolized, integrated into the symbolic order - the Thing. Lacan coined a neologism for it: l'extimite-external intimacy, which served as a title for one of Jacques-Alain Miller's Seminars. And what, at this level, is the death drive? Exactly the opposite of the symbolic order: the possibility of the 'second death', the radical annihilation of the symbolic texture through which so-called reality is constituted. The very existence of the symbolic order implies a possibility of its radical effacement, of 'symbolic death' - not the death of the so-called 'real object' in its symbol, but the obliteration of the signifying network itself"
    - paragraph [ref=e771]: "This distinction between the different stages of Lacan's teaching is not of purely theoretical interest; it has very definite consequences for the determination of the final moment of the psychoanalytic cure:"
    - paragraph [ref=e772]: "• In the first period, in which the emphasis is on the word as a medium of the intersubjective recognition of desire, the symptoms are conceived as white spots, non-symbolized imaginary elements of the history of the subject, and the process of analysis is that of their symbolization - of their integration into the symbolic universe of the subject: the analysis gives meaning, retroactively, to what was in the beginning a meaningless trace. So the final moment of the analysis is reached when the subject is able to narrate to the Other his own history in its continuity; when his desire is integrated, recognized in 'full speech [parole pleine]'."
    - paragraph [ref=e773]: • In the second period, in which the symbolic order is conceived as having a mortifying effect on the subject, as imposing on him a traumatic loss - and the name of this loss, of this lack, is of course symbolic castration - the final moment of analysis is reached when the subject is ready to accept this fundamental loss, to consent to symbolic castration as a price to be paid for access to his desire.
    - paragraph [ref=e774]: "• In the third period we have the big Other, the symbolic order, with a traumatic element at its very heart; and in Lacanian theory the fantasy is conceived as a construction allowing the subject to come to terms with this traumatic kernel At this level, the final moment of the analysis is defined as 'going through the fantasy [la traversee du fantasme],: not its symbolic interpretation but the experience of the fact that the fantasy-object, by its fascinating presence, is merely filling out a lack, a void in the Other. There is nothing 'behind' the fantasy; the fantasy is a construction whose function is to hide this void, this 'nothing' - that is, the lack in the Other. The crucial element of this third period of Lacan's teaching is therefore the shift of emphasis from the symbolic to the Real To exemplify it, let us take the notion of the 'knowledge in the Real': the idea that nature knows its own laws and behaves accordingly. We all know the classical, archetypal cartoon scene: a cat approaches the edge of the precipice but she does not stop, she proceeds calmly, and although she is already hanging in the air, without ground under her feet, she does not fall - when does she fall? The moment she looks down and becomes aware of the fact that she is hanging in the air. The point of this nonsense accident is that when the cat is walking slowly in the air, it is as if the Real has for a moment forgotten its knowledge: when the cat finally looks down, she remembers that she must follow the laws of nature and falls. This is basically the same logic as in the already mentioned dream, reported in Freud's Interpretation of Dreams, of a father who does not know that he is dead: the point is again that because he does not know that he is dead, he continues to live - he must be reminded of his death or, to give this situation a comical twist, he is still living because he has forgotten to die. That is how the phrase memento mori should be read: don't forget to die! This brings us back to the distinction between the two deaths: because of lack of knowledge, the father in Freud's dream is still living, although he is already dead. In a way, everybody must die twice. That is the Hegelian theory of repetition in history: when Napoleon lost for the first time and was consigned to Elba, he did not know that he was already dead, that his historical role was finished, and he had to be reminded of it through his second defeat at Waterloo - at this point, when he died for the second time, he was really dead."
    - paragraph [ref=e775]: "The stimulus for this idea of a second death came from the Marquis de Sade: the Sadeian notion of a radical, absolute crime that liberates nature's creative force, as elaborated in the Pope's long speech in the fifth volume of Juliette, implies a distinction between the two deaths: natural death, which is a part of the natural cycle of generation and corruption, of nature's continual transformation, and absolute death - the destruction, the eradication, of the cycle itself, which then liberates nature from its own laws and opens the way for the creation of new forms of life ex nihilo."
    - paragraph [ref=e776]:
      - text: "This difference between the two deaths can be linked with the Sadeian fantasy revealed by the fact that in his work his victim is, in a certain sense, indestructible: she can be endlessly tortured and can survive it; she can endure any torment and still retain her beauty. It is as though, above and beyond her natural body (a part of the cycle of generation and corruption), and thus above and beyond her natural death, she possessed another body, a body composed of some other substance, one excepted from the vital cycle - a sublime body."
      - superscript [ref=e778]:
        - link "1" [ref=e779]:
          - /url: "#fn-ch4-1"
    - paragraph [ref=e780]: Today, we can find this same fantasy at work in various products of 'mass culture', for example in animated cartoons.
    - paragraph [ref=e781]: "Consider Tom and Jerry, cat and mouse. Each is subjected to frightful misadventures: the cat is stabbed, dynamite goes off in his pocket, he is run over by a steamroller and his body is flattened into a ribbon, and so forth; but in the next scene he appears with his normal body and the game begins again - it is as though he possessed another indestructible body."
    - paragraph [ref=e782]: "Or take the example of video games, in which we deal, literally, with the differences between the two deaths: the usual rule of such games is that the player (or, more precisely, the figure representing him in the game) possesses several lives, usually three; he is threatened by some danger - a monster who can eat him, for example, and if the monster catches him he loses a life - but if he reaches his goal very swiftly he earns one or several supplementary lives. The whole logic of such games is therefore based on the difference between the two deaths: between the death in which I lose one of my lives and the ultimate death in which I lose the game itself"
    - paragraph [ref=e783]: "Lacan conceives this difference between the two deaths as the difference between real (biological) death and its symbolization, the 'settling of accounts', the accomplishment of symbolic destiny (deathbed confession in Catholicism, for example). This gap can be filled in various ways; it can contain either sublime beauty or fearsome monsters: in Antigone's case, her symbolic death, her exclusion from the symbolic community of the city, precedes her actual death and imbues her character with sublime beauty, whereas the ghost of Hamlet's father represents the opposite case - actual death unaccompanied by symbolic death, without a settling of accounts - which is why he returns as a frightful apparition until his debt has been repaid. This place 'between the two deaths', a place of sublime beauty as well as terrifying monsters, is the site of das Ding, of the real-traumatic kernel in the midst of symbolic order. This place is opened by symbolization/ historicization: the process of historicization implies an empty place, a non-historical kernel around which the symbolic network is articulated. In other words, human history differs from animal evolution precisely by its reference to this non-historical place, a place which cannot be symbolized, although it is retroactively produced by the symbolization itself: as soon as 'brute', pre-symbolic reality is symbolized/historicized, it 'secretes', it isolates the empty, 'indigestible' place of the Thing."
    - paragraph [ref=e784]: "It is this reference to the empty place of the Thing which enables us to conceive the possibility of a total, global annihilation of the signifier's network: the 'second death', the radical annihilation of nature's circular movement, is conceivable only in so far as this circular movement is already symbolized/historicized, inscribed, caught in the symbolic web - absolute death, the 'destruction of the universe', is always the destruction of the symbolic universe."
    - paragraph [ref=e785]: The Freudian 'death drive' is nothing but the exact theoretical concept for this Sadeian notion of the 'second death' - the possibility of the total 'wipe-out' of historical tradition opened up by the very process of symbolization/historicization as its radical, self-destructive limit.
    - paragraph [ref=e786]: "In the whole history of Marxism, there is probably only one point at which this non-historical 'ex-timate' kernel of history was touched - at which the reflection of history was brought to the 'death drive' as its degree zero: Theses on the Philosophy of History, the last text by Walter Benjamin, 'fellow-traveller' of the Frankfurt School. The reason for this is of course that it was again Benjamin who - a unique case in Marxism conceived history as a text, as series of events which 'will have been' - their meaning, their historical dimension, is decided afterwards, through their inscription in the symbolic network."
    - heading "Revolution as Repetition" [level=4] [ref=e787]
    - paragraph [ref=e788]: These Theses themselves occupy an 'ex-timate' place; they are like a strange body resisting insertion not only in the frame of the Frankfurt School but in the very continuity of Benjamin's thought.
    - paragraph [ref=e789]: "That is to say, one usually conceives Benjamin's development as a gradual approach to Marxism; in this continuity, the Theses make a clear incision: there, at the very end of his theoretical (and physical) activity, emerges suddenly the problem of theology."
    - paragraph [ref=e790]: "Historical materialism can triumph only if it 'enlists the services of theology' - here is the famous first thesis:"
    - paragraph [ref=e791]:
      - text: The story is told of an automaton constructed in such a way that it could play a winning game of chess, answering each move of an opponent with a countermove. A puppet in Turkish attire and with a hookah in its mouth sat before a chessboard placed on a large table. A system of mirrors created the illusion that this table was transparent from all sides. Actually, a little hunchback who was an expert chess player sat inside and guided the puppet's hand by means of strings. One can imagine a philosophical counterpart to this device. The puppet called 'historical materialism' is to win all the time. It can easily be a match for anyone if it enlists the service of theology, which today, as we know, is wizened and has to keep out of sight.
      - superscript [ref=e793]:
        - link "2" [ref=e794]:
          - /url: "#fn-ch4-2"
    - paragraph [ref=e795]: "What strikes the eye in this fragment is the contradiction between the allegory forming the first part of the thesis and its interpretation in the second part. In the interpretation, it is historical materialism which' enlists the services of theology'; whereas in the allegory itself theology ('a little hunchback') guides the puppet - 'historical materialism' - by means of strings from within. This contradiction is of course the very contradiction between allegory and its meaning, ultimately between signifier and the signified, which pretends to 'enlist the services' of the signifier as its instrument but finds itself quickly entangled in its network The two different levels thus traverse one another: the formal structure of Benjamin's allegory functions in exactly the same way as its 'content', theology in its relationship to historical materialism, which pretends simply to enlist its services but becomes more and more entangled in its strings because - if we may permit ourselves this vorlust, this forepleasure - 'theology' designates here the agency of the signifier."
    - paragraph [ref=e796]: "But let us proceed step by step: how should we conceive the theological dimension referred to by Benjamin? 'Theology' announces here a unique experience, alluded to in the following fragment published after Benjamin's death: 'In Eingedenken, we make an experience which forbids us to conceive history in a fundamentally atheological way.'"
    - paragraph [ref=e797]: We cannot translate this Eingedenken simply by 'remembrance' or 'reminiscence'; the more literal translation, 'to transpose oneself in thoughts/into something', is also inadequate. Although it is really a kind of 'appropriation of the past' which is at stake here, we cannot conceive Eingedenken in an adequate way as long as we stay within the field of hermeneutics - Benjamin's aim is quite the opposite of the fundamental guidance of hermeneutical understanding ('to locate the interpreted text into the totality of its epoch').
    - paragraph [ref=e798]:
      - text: "What Benjamin has in mind is, on the contrary, the isolation of a piece of the past from the continuity of history ('... blasting a specific life out of the era or a specific work out of the lifework' - Thesis XVII): an interpretative procedure whose opposition to hermeneutics recalls immediately the Freudian opposition between interpretation en detail and interpretation en masse. 'What we must take as the object of our attention is not the dream as a whole but the separate portions of its content'."
      - superscript [ref=e800]:
        - link "3" [ref=e801]:
          - /url: "#fn-ch4-3"
    - paragraph [ref=e802]: "This refusal of the hermeneutical approach has, to be sure, nothing whatsoever to do with a simple 'regression' to pre-hermeneutical naivete: the point is not for us to 'accustom ourselves to the past' by abstracting our actual historical position, the place from which we are speaking."
    - paragraph [ref=e803]: "Eingedenken certainly is an appropriation of the past which is 'interested', biased towards the oppressed class: 'To articulate the past historically does not mean to recognize it \"the way it really was'\" (Thesis VI)... 'Not man or men but the struggling, oppressed class itself is the depository of historical knowledge' (Thesis XIII)."
    - paragraph [ref=e804]: "We would none the less falsify the meaning of these lines by reading them in the sense of a Nietzschean historiography, of a 'will to power as interpretation', as the right of the winner to 'write his own history', to impose his 'perspective' - by seeing in them a kind of reference to the struggle between the two classes, the ruling and the oppressed, for 'who will write the history'. Perhaps it is so for the ruling class, but it is certainly not so for the oppressed class; between the two, there is a fundamental asymmetry which Benjamin designates by means of two different modes of temporality: the empty, homogeneous time of continuity (proper to the reigning, official historiography) and the 'filled' time of discontinuity [which defines historical materialism)."
    - paragraph [ref=e805]: "By confining itself to 'the way it really was', by conceiving history as a closed, homogeneous, rectilinear, continuous course of events, the traditional historiographic gaze is a priori, formally, the gaze of 'those who have won': it sees history as a closed continuity of'progression' leading to the reign of those who rule today. It leaves out of consideration what failed in history, what has to be denied so that the continuity of 'what really happened' could establish itself. The reigning historiography writes a 'positive' history of great achievements and cultural treasures, whereas a historical materialist views them with cautious detachment. For without exception the cultural treasures he surveys have an origin which he cannot contemplate without horror. They owe their existence not only to the efforts of the great minds and talents who have created them, but also to the anonymous toil of their contemporaries. There is no document of civilization which is not at the same time a document of barbarism. (Thesis VII) In contrast to the triumphal procession of victors exhibited by official historiography, the oppressed class appropriates the past to itself in so far as it is 'open', in so far as the 'yearning for redemption' is already at work in it - that is to say, it appropriates the past in so far as the past already contains - in the form of what failed, of what was extirpated - the dimension of the future: 'The past carries with it a temporal index by which it is referred to redemption' (Thesis II). To accomplish the appropriation of this stifled dimension of the past in so far as it already contains the future - the future of our own revolutionary act which, by means of repetition, redeems retroactively the past ('There is a secret agreement between past generations and the present one. Our coming was expected on earth' [Thesis II]) - we have to cut through the continuous flow of historical development and make a 'tiger's leap into the past' (Thesis XIV). Only here do we arrive at the fundamental asymmetry between historiographic evolutionism describing history's continuous movement and historical materialism:"
    - paragraph [ref=e806]: A historical materialist cannot do without the notion of a present which is not a transition, but in which time stands still and has come to a stop. For this notion defines the present in which he himself is writing history. (Thesis XVI)
    - paragraph [ref=e807]: Thinking involves not only the flow of thoughts; but their arrest as well. Where thinking suddenly stops in a configuration pregnant with tensions, it gives that configuration a shock, by which it crystallizes into a monad.
    - paragraph [ref=e808]: A historical materialist approaches a historical subject only where he encounters it as a monad. In this structure he recognizes the sign of a Messianic cessation of happening, or, put differently, a revolutionary chance in the fight for the oppressed past. (Thesis XVII)
    - paragraph [ref=e809]: "Here we have the first surprise: what specifies historical materialism - in contrast to the Marxist doxa according to which we must grasp events in the totality of their interconnection and in their dialectical movement is its capacity to arrest, to immobilize historical movement and to isolate the detail from its historical totality."
    - paragraph [ref=e810]: "It is this very crystallization, this 'congelation' of the movement in a monad, which announces the moment of the appropriation of the past: the monad is an actual moment to which is attached directly - bypassing the continuous line of evolution - the past: the contemporary revolutionary situation which conceives itself as a repetition of past failed situations, as their retroactive 'redemption' through the success of its own exploit."
    - paragraph [ref=e811]: "The past itself is here 'filled out with the present', the moment of the revolutionary chance decides not only the lot of the actual revolution but also the lot of all past failed revolutionary attempts:"
    - paragraph [ref=e812]:
      - text: "Historical materialism wishes to retain the image of the past which unexpectedly appears to man singled out by history at a moment of danger. The danger affects both the content of the tradition and its receivers. (Thesis VI) The risk of defeat of the actual revolution endangers the past itself because the actual revolutionary conjunction functions as a condensation of past missed revolutionary chances repeating themselves in the actual revolution: History is the subject of a structure whose site is not homogeneous, empty time, but time filled by the presence of the now [JelZlZeiq. Thus, to Robespierre ancient Rome was a past charged with the time of the now which he blasted out of the continuum of history. The French Revolution viewed itself as Rome reincarnate. It evoked ancient Rome the way fashion evokes costumes of the past. (Thesis XIV) For those acquainted with the Freudian proposition that 'the unconscious is located outside time', all is actually said here: this 'filled-out time', this 'tiger's leap into the past' with which the revolutionary present is charged, announces the compulsion to repeat The arrest of historical movement, the suspension of the temporal continuity mentioned by Benjamin, correspond precisely to the 'short-circuit' between present and past speech which characterizes the transferential situation: Why does the analysis become transformed the moment the transferential situation is analysed through evoking the old situation, when the subject found himself with an entirely different object, one that cannot be assimilated to the present object? Because present speech, like the old speech, is placed within a parenthesis of time, within a form of time, if! can put it that way. The modulation of time being identical, the speech of the analyst [in Benjamin: of the historical materialist] happens to have the same value as the old speech."
      - superscript [ref=e814]:
        - link "4" [ref=e815]:
          - /url: "#fn-ch4-4"
      - text: In the monad, 'time stops' in so far as the actual constellation is directly charged with the past constellation - in other words, in so far as we have to do with a pure repetition.
    - paragraph [ref=e816]: "Repetition is 'located outside time', not in the sense of some pre-logical archaism but simply in the sense of the pure signifier's synchrony: we do not have to look for the connection between past and present constellations in the diachronous time arrow; this connection reinstates itself in the form of an immediate paradigmatic short-circuit."
    - paragraph [ref=e817]:
      - text: "The monad is thus the moment of discontinuity, of rupture, at which the linear 'flow of time' is suspended, arrested, 'coagulated', because in it resounds directly - that is to say: bypassing the linear succession of continuous time - the past which was repressed, pushed out of the continuity established by prevailing history. It is literally the point of 'suspended dialectics', of pure repetition where historical movement is placed within parentheses. And the only field in which we can speak of such an appropriation of the past that the present itself' redeems' it retroactively - where the past itself is thus included in the present - is that of the signifier: the suspension of movement is possible only as the signifier's synchrony, as the synchronization of the past with the present. We can now see what we are dealing with in the isolation of the monad from historical continuity: we isolate the signifier of placing within parentheses the totality of signification. This placing of signification within parentheses is a condition sine qua non of the short-circuit between present and past: their synchronization occurs at the level of the autonomy of the signifier - what is synchronized, superimposed, are two signifiers' networks, not two meanings. Consequently, we should not be surprised to find that this 'insertion [Einschluss] of some past into the present texture' is supported by the metaphor of the text, of history as text: If we are prepared to consider history as a text, we can say about it what some modern author said about a literary text: the past has deposed in it images which could be compared to those retained by a photographic plate. 'Only the future disposes of developers strong enough to make appear the picture with all its details. More than one page of Marivaux or of Rousseau attests to a meaning which their contemporary readers were unable to decipher completely.'"
      - superscript [ref=e819]:
        - link "5" [ref=e820]:
          - /url: "#fn-ch4-5"
      - text: "Here we must refer again to Lacan, who, to explain the return of the repressed, makes use of Wiener' s metaphor of the inverted temporal dimension: we see the square vanishing before we see the square: ... what we see in the return of the repressed is the effaced signal of something which only takes on its value in the future, through its symbolic realization, its integration into the history of the subject. Literally, it will only ever be a thing which, at the given moment of its occurrence, will have been."
      - superscript [ref=e822]:
        - link "6" [ref=e823]:
          - /url: "#fn-ch4-6"
    - paragraph [ref=e824]: So, contrary to the misleading first impression, the actual revolutionary situation is not a kind of'return of the repressed' - rather, the returns of the repressed, the 'symptoms', are past failed revolutionary attempts, forgotten, excluded from the frame of the reigning historical tradition, whereas the actual revolutionary situation presents an attempt to 'unfold' the symptom, to 'redeem' - that is, realize in the Symbolic these past failed attempts which 'will have been' only through their repetition, at which point they become retroactively what they already were.
    - paragraph [ref=e825]: "Apropos of Benjamin's Theses, we can thus repeat Lacan's formula: the revolution accomplishes a 'tiger's leap into the past' not because it is in search of a kind of support in the past, in tradition, but in so far as this past which repeats itself in the revolution 'comes from the future' - was already in itself pregnant with the open dimension of the future."
    - heading "The 'Perspective of the Last Judgement'" [level=4] [ref=e826]
    - paragraph [ref=e827]: "At this precise point we encounter a certain surprising congruence between Benjamin and the Stalinist notion of history: as soon as we conceive history as a text, as 'its own history', its own narration - as something which receives its signification retroactively and where this delay, this effect of apres coup, is inscribed in the actual event itself which, literally, 'is' not but always 'will have been' - we are obliged, implicitly at least, to view the historical process from the perspective of a 'Last Judgement': of a final settling of accounts, of a point of accomplished symbolization/ historicization, of the 'end of history', when every event will receive retroactively its definitive meaning, its final place in the total narration."
    - paragraph [ref=e828]: Actual history occurs, so to speak, on credit; only subsequent development will decide retroactively if the current revolutionary violence will be forgiven, legitimated, or if it will continue to exert a pressure on the shoulders of the present generation as its guilt, as its unsettled debt.
    - paragraph [ref=e829]: Let us recall Merleau-Ponty who, in his Humanism and Terror, defended the Stalinist political trials on the grounds that although their victims were undoubtedly innocent, they would be justified by the subsequent social progress rendered possible through them.
    - paragraph [ref=e830]: "Here we have the fundamental idea of this 'perspective of the Last Judgement' (the expression is Lacan's, from his Seminar on The Ethic of Psychoanalysis): no act, no event falls empty; there is no pure expense, no pure loss in history; everything we do is written down, registered somewhere, as a trace which for the time being remains meaningless but which, in the moment of final settling, will receive its proper place."
    - paragraph [ref=e831]:
      - text: "This is the idealism hidden in the Stalinist logic which, although it denies a personified God, none the less implies a Platonic heaven in the form of the big Other, redoubling empirical, factual history and maintaining its accountancy - that is, determining the 'objective signification' of each event and action. Without this accountancy, without this registration of events and actions in the account of the Other, it would not be discourse, such as 'the objective guilt' - precisely, guilt in the eyes of the big Other of history. At first sight, then, Benjamin is in perfect accord with Stalinism concerning this 'perspective of the Last Judgement'; but here we should follow the same advice as with 'love at first sight': take a second look. If we do, it soon becomes clear how this apparent proximity only confirms that Benjamin has touched the real nerve of the Stalinist symbolic edifice - he was the only one to question radically the very idea of 'progress' implied by the accountancy of the big Other of history and - precursor, in this respect, of the famous Lacanian formula that development 'is nothing but a hypothesis of domination'"
      - superscript [ref=e833]:
        - link "7" [ref=e834]:
          - /url: "#fn-ch4-7"
      - text: "- to demonstrate the uninterrupted connection between progress and domination: 'The concept of the historical progress of mankind cannot be sundered from the concept of its progression through a homogeneous, empty time' Thesis XIII) - that is, from the temporality of the ruling class."
    - paragraph [ref=e835]: "The Stalinist perspective is that of a victor whose final triumph is guaranteed in advance by the 'objective necessity of history'; which is why, in spite of the accent on ruptures, leaps, revolutions, his view on past history is evolutionary throughout. History is conceived as the continuous process of replacing old masters with new: each victor played a 'progressive role' in his time, then lost his purpose because of unavoidable development: yesterday, it was the capitalist who acted in accordance with the necessity of progress; today, it's our turn... In Stalinist accountancy, 'objective guilt' (or contribution) is measured by reference to the laws of historical development - of continuous evolution towards the Supreme Good (Communism). With Benjamin, in contrast, the 'perspective of the Last Judgement' is the perspective of those who have paid the price for a series of great historical triumphs; the perspective of those who had to fail, to miss their aim, so that the series of great historical deeds could be accomplished; the perspective of hopes deceived, of all that have left in the text of history nothing but scattered, anonymous, meaningless traces on the margin of deeds whose 'historical greatness 'was attested to by the 'objective' gaze of official historiography. This is why, for Benjamin, revolution is not part of continuous historical evolution but, on the contrary, a moment of'stasis' when the continuity is broken, when the texture of previous history, that of the winners, is annihilated, and when, retroactively, through the success of the revolution, each abortive act, each slip, each past failed attempt which functioned in the reigning Text as an empty and meaningless trace, will be 'redeemed', will receive its signification. In this sense, revolution is strictly a creationist act, a radical intrusion of the 'death drive': erasure of the reigning Text, creation ex nihilo of a new Text by means of which the stifled past 'will have been'. To refer to the Lacanian reading of Antigone: if the Stalinist perspective is that of Creon, the perspective of the Supreme Good assuming the shape of the Common Good of the State, the perspective of Benjamin is that of Antigone - for Benjamin, revolution is an affair of life and death; more precisely: of the second, symbolic death. The alternative opened by the revolution is that between redemption, which will retroactively confer meaning on the 'scum of history' (to use this Stalinist expression) - on what was excluded from the continuity of Progress - and the apocalypse (its defeat), where even the dead will again be lost and will suffer a second death: 'even the dead will not be safe from the enemy if he wins' (Thesis VI)."
    - paragraph [ref=e836]: "We can thus conceive the opposition between Stalinism and Benjamin as that between evolutionary idealism and creationist materialism. In his Seminar on The Ethic of Psychoanalysis, Lacan pointed out how the ideology of evolutionism always implies a belief in a Supreme Good, in a final Goal of evolution which guides its course from the very beginning. In other words, it always implies a hidden, disavowed teleology, whereas materialism is always creationist - it always includes a retroactive movement: the final Goal is not inscribed in the beginning; things receive their meaning afterwards; the sudden creation of an Order confers backward signification on to the preceding Chaos. At first sight, Benjamin's position is radically anti-Hegelian: is not dialectics the most refined and perfidious version of evolutionism, in which the very ruptures are included in the continuity of progress, in its unavoidable logic? This was probably how Benjamin himself conceived his own position: he designated the point of rupture which cuts into historical continuity as the point of'suspended dialectics', as the intrusion of a pure repetition putting in parentheses the progressive movement of Aufhebung. But it is at this exact juncture that we must stress Hegel's radical anti-evolutionism: the absolute negativity which 'sets in motion' dialectical movement is nothing but the intervention of the 'death drive' as radically non-historical, as the 'zero degree' of history - historical movement includes in its very heart the non-historical dimension of 'absolute negativity'. In other words, the suspension of movement is a key moment of the dialectical process: so-called 'dialectical development' consists in the incessant repetition of a beginning ex nihilo, in the annihilation and retroactive restructuring of the presupposed contents. The vulgar idea of 'dialectical development' as a continuous course of transformations by which the old dies and the new is born, in which all beckons in incessant movement - this idea of nature as a dynamic process of transformation, of generation and corruption, found everywhere from de Sade to Stalin has nothing whatsoever to do with the Hegelian 'dialectical process'. This quasi-'dialectical' vision of nature as an eternal circuit of transformations does not, however, exhaust the whole of Stalinism: what escapes it is precisely the subjective position of the Communist himself And, to put it briefly, the place of the Stalinist Communist is exactly between the two deaths. The somewhat poetic definitions of the figure of a Communist that we find in Stalin's work are to be taken literally. When, for example, in his speech at Lenin's funeral, Stalin proclaims, 'We, the Communists, are people of a special mould. We are made of special stuff,' it is quite easy to recognize the Lacanian name for this special stuff: objet petit a, the sublime object placed in the interspace between the two deaths. In the Stalinist vision, the Communists are 'men of iron will', somehow excluded from the everyday cycle of ordinary human passions and weakness. It is as if they are in a way 'the living dead', still alive but already excluded from the ordinary cycle of natural forces - as if, that is, they possess another body, the sublime body beyond their ordinary physical body. (Is the fact that in Lubitsch's Ninotchka, the role of the high Party apparatchik is played by Bela Lugosi, identified with the figure of Dracula, another 'living dead', expressing a presentiment of the described state of things, or is it just a happy coincidence?) The fantasy which serves as a support for the figure of the Stalinist Communist is therefore exactly the same as the fantasy which is at work in the Tom and Jerry cartoons: behind the figure of the indestructibility and invincibility of the Communist who can endure even the most terrible ordeal and survive it intact, reinforced with new strength, there is the same fantasy-logic as that of a cat whose head is blown up by dynamite and who, in the next scene, proceeds intact his pursuit of his class enemy, the mouse."
    - heading "From the Master to the Leader" [level=4] [ref=e837]
    - paragraph [ref=e838]:
      - text: "The problem is that we already find this notion of a sublime body located between the two deaths with the classical, pre-bourgeois Master: for example, the King - it is as if he possesses, beyond his ordinary body, a sublime, ethereal mystical body personifying the State."
      - superscript [ref=e840]:
        - link "8" [ref=e841]:
          - /url: "#fn-ch4-8"
    - paragraph [ref=e842]: Where, then, lies the difference between the classical Master and the totalitarian Leader?
    - paragraph [ref=e843]: "The transubstantiated body of the classical Master is an effect of the performative mechanism already described by La Boétie, Pascal and Marx: we, the subjects, think that we treat the king as a king because he is in himself a king, but in reality a king is a king because we treat him like one."
    - paragraph [ref=e844]: "And this fact that the charismatic power of a king is an effect of the symbolic ritual performed by his subjects must remain hidden: as subjects, we are necessarily victims of the illusion that the king is already in himself a king."
    - paragraph [ref=e845]: "That is why the classical Master must legitimize his rule with a reference to some non-social, external authority (God, nature, some mythical past event...) - as soon as the performative mechanism which gives him his charismatic authority is demasked, the Master loses his power. But the problem with the totalitarian Leader is that he no longer needs this external point of reference to legitimize his rule. He is not saying to his subjects: 'You must follow me because I'm your Leader', but quite the opposite: 'In myself, I'm nothing, I am what I am only as an expression, an embodiment, an executor of your will, my strength is your strength...' To put it briefly, it is as if the totalitarian Leader is addressing his subjects and legitimizing his power precisely by referring to the above-mentioned Pascalian-Marxian argument - that is, revealing to them, the secret of the classical Master; basically, he is saying to them: 'I'm your Master because you treat me as your Master; it is you, with your activity, who make me your Master!' How, then, can we subvert the position of the totalitarian Leader, if the classical Pascalian-Marxian argument no longer works? Here the basic deception consists in the fact that the Leader's point of reference, the instance to which he is referring to legitimize his rule (the People, the Class, the Nation), does not exist - or, more precisely, exists only through and in its fetishistic representative, the Party and its Leader. The misrecognition of the performative dimension runs here in the opposite direction: the classical Master is Master only in so far as his subjects treat him as Master, but here, the People are the 'real People' only in so far as they are embodied in their representative, the Party and its Leader. The formula of the totalitarian misrecognition of the performative dimension would then be as follows: the Party thinks that it is the Party because it represents the People's real interests, because it is rooted in the People, expressing their will; but in reality the People are the People because - or, more precisely, in so far as - they are embodied in the Party. And by saying that the People do not exist as a support of the Party, we do not mean the obvious fact that the majority of the people do not really support Party rule; the mechanism is a little more complicated. The paradoxical functioning of the 'People' in the totalitarian universe can be most easily detected through analysis of phrases like 'the whole People supports the Party'. This proposition cannot be falsified because behind the form of an observation of a fact, we have a circular definition of the People: in the Stalinist universe, 'supporting the rule of the Party' is 'rigidly designated' by the term 'People' - it is, in the last analysis, the only feature which in all possible worlds defines the People."
    - paragraph [ref=e846]: "That is why the real member of the People is only he who supports the rule of the Party: those who work against its rule are automatically excluded from the People; they became the 'enemies of the People'. What we have here is a somewhat crueller version of a well-known joke: 'My fiancee never misses an appointment with me because the moment she misses one, she is no longer my fiancee' - the People always support the Party because any member of the People who opposes Party rule automatically excludes himself from the People."
    - paragraph [ref=e847]: "The Lacanian definition of democracy would then be: a sociopolitical order in which the People do not exist - do not exist as a unity, embodied in their unique representative."
    - paragraph [ref=e848]:
      - text: That is why the basic feature of the democratic order is that the place of power is, by the necessity of its structure, an empty place.
      - superscript [ref=e850]:
        - link "9" [ref=e851]:
          - /url: "#fn-ch4-9"
    - paragraph [ref=e852]: In a democratic order, sovereignty lies in the People but what is the People if not, precisely, the collection of the subjects of power?
    - paragraph [ref=e853]: Here we have the same paradox as that of a natural language which is at the same time the ultimate, the highest metalanguage.
    - paragraph [ref=e854]: Because the People cannot immediately govern themselves, the place of Power must always remain an empty place; any person occupying it can do so only temporarily, as a kind of surrogate, a substitute for the real-impossible sovereign - 'nobody can rule innocently', as Saint-Just puts it. And in totalitarianism, the Party becomes again the very subject who, being the immediate embodiment of the People, can rule innocently. It is not by accident that the real-socialist countries call themselves 'people's democracies' - here, finally, 'the People' exist again.
    - paragraph [ref=e855]: "It is against the background of this emptying of the place of power that we can measure the break introduced by the 'democratic invention' (Lefort) in the history of institutions: 'democratic society' could be determined as a society whose institutional structure includes, as a part of its 'normal', 'regular' reproduction, the moment of dissolution of the socio-symbolic bond, the moment of irruption of the Real: elections."
    - paragraph [ref=e856]: "Lefort interprets elections (those of'formal', 'bourgeois' democracy) as an act of symbolic dissolution of the social edifice: their crucial feature is the one that is usually made the target for Marxist criticism of' formal democracy' - the fact that we take part as abstract citizens, atomized individuals, reduced to pure Ones without further qualifications."
    - paragraph [ref=e857]: "At the moment of elections, the whole hierarchic network of social relations is in a way suspended, put in parentheses; 'society' as an organic unity ceases to exist, it changes into a contingent collection of atomized individuals, of abstract units, and the result depends on a purely quantitative mechanism of counting, ultimately on a stochastic process: some wholly unforeseeable (or manipulated) event - a scandal which erupts a few days before an election, for example - can add that 'half per cent' one way or the other that determines the general orientation of the country's politics over the next few years... In vain do we conceal this thoroughly 'irrational' character of what we call 'formal democracy': at the moment of an election, the society is delivered to a stochastic process."
    - paragraph [ref=e858]: "Only the acceptance of such a risk, only such a readiness to hand over one's fate to 'irrational' hazard, renders 'democracy' possible: it is in this sense that we should read the dictum of Winston Churchill which I have already mentioned: 'democracy is the worst of all possible political systems, the only problem is that none of the others is better'. It is true that democracy makes possible all sorts of manipulation, corruption, the rule of demagogy, and so on, but as soon as we eliminate the possibility of such deformations, we lose democracy itself - a neat example of the Hegelian Universal which can realize itself only in impure, deformed, corrupted forms; if we want to remove these deformations and to grasp the Universal in its intact purity, we obtain its very opposite. So called 'real democracy' is just another name for non-democracy: if we want to exclude the possibility of manipulation, we must 'verify' the candidates in advance, we must introduce the difference between the 'true interests usually called 'organized democracy', in which the effective elections take place before elections and where the ballot has only plebiscitary value."
    - paragraph [ref=e859]: "In short, 'organized democracy' is a way of excluding the irruption of the Real which characterizes 'formal' democracy: the moment of dissolution of the social edifice into a purely numerical collection of atomized individuals. So although 'in reality' there are only 'exceptions' and 'deformations', the universal notion of 'democracy' is none the less a 'necessary fiction', a symbolic fact in the absence of which effective democracy, in all the plurality of its forms, could not reproduce itself."
    - paragraph [ref=e860]: "Here Hegel is paradoxically close to Jeremy Bentham, to his Theory of Fictions, one of Lacan's constant references: the Hegelian Universal is such a 'fiction' as 'exists nowhere in reality' (there, we have nothing but exceptions) but is none the less implied by 'reality' itself as a point of reference conferring on it its symbolic consistency."