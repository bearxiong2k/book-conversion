    - paragraph [ref=e255]: "3 But is the ultimate goal of the analysis of ideology not practical: to enable us to intervene and change our reality? Does my jumping from one to another example not contradict this professed goal, condemning us to narcissistic pleasure in theory and thus effectively sabotaging the urgency of practical engagement?"
    - paragraph [ref=e256]:
      - text: "A fake sense of urgency pervades the Left-liberal humanitarian discourse—recall rhetorical figures such as “a woman is raped every six seconds in this country,” or “in the time it takes you to read this paragraph, ten children will die of hunger.” Underlying all this is a sentiment of moral outrage. This pseudo-urgency was exploited by Starbucks a couple of years ago, when, at the entrance, posters greeted customers pointing out that half or so of their profits went to the health care of the children of Guatemala (from where their coffee originates), so that, with every cup you drank, you so to speak, saved a child’s life. There is a fundamental anti-theoretical edge to it—the underlying point is here: no time to reflect on all of it, we have to ACT NOW. (See, against this, Marx’s wonderful letter to Engels from 1870, when, for a brief moment, it seemed that a European revolution was again at the gates: in this letter, he conveys his sheer panic—can’t the revolutionaries wait for a couple of years, since he, Marx, had not yet finished his"
      - emphasis [ref=e257]: Capital
      - text: "?). Through this fake sense of urgency, the post-industrial rich, living in their secluded virtual world, not only do not deny or ignore the harsh reality outside their area, they actively refer to it all the time. As Bill Gates recently put it: “What do computers matter when millions are still unnecessarily dying of diarrhea?”"
    - paragraph [ref=e258]: Nothing demonstrates better the fake nature of this sense of urgency than the reverberations of the cover story of the Time magazine in the Summer of 2006, reporting that around four million people died there as the result of political violence in the last decade, and no usual humanitarian uproar followed—as if some kind of filtering mechanism blocks these news from achieving their full impact on our symbolic space. The Congo is today effectively re-emerging as a Conradian “heart of darkness” that no one dares fully to confront. Do we need more proofs that the humanitarian sense of urgency is mediated/overdetermined by clear political considerations—which considerations? To answer this question, we need precisely to step back and take a look.
    - paragraph [ref=e259]: "When, in a critical analysis of the present global constellation, one offers no clear solution, no “practical” advice on what to do, when one paints no light at the end of the tunnel (well aware that this light might belong to a train crashing towards us), one is usually reproached: “So what should we do, nothing? Just sit and wait?” One should gather the courage to answer:"
    - paragraph [ref=e260]:
      - text: YES, precisely that! There are situations where the only truly “practical” thing to do is to resist the temptation to engage immediately, and to “wait and see” by means of a patient critical analysis. Engagement seems to exert its pressure on us from all directions. In a well-known passage from his
      - emphasis [ref=e261]: Existentialism is Humanism
      - text: ", Sartre deployed the dilemma of a young man in France in 1942, torn between the duty to help his lone, ill mother and the duty to enter Resistance and fight the Germans; Sartre’s point is, of course, that there is no a"
      - emphasis [ref=e262]: priori
      - text: "answer to this dilemma—the young man should make a decision grounded only in his own abyssal freedom, assuming full responsibility for it. An obscene third way out of this dilemma would have been to advise the young man to tell his mother that he will join the Resistance, and to tell his Resistance friends that he will take care of his mother, while, in reality, withdrawing to a secluded place and studying. There is more than cheap cynicism in this advice—it brings to mind a well-known Soviet joke about Lenin. Under Socialism, Lenin’s words to young people, his answer to what they should do, “Learn, learn, and learn,” were evoked all the time, displayed on all school walls. So here is how the joke goes: Marx, Engels and Lenin are asked what would they prefer to have: a wife or a mistress. As expected, Marx, rather conservative in private matters, answers “A wife!”, while Engels, more of a"
      - emphasis [ref=e263]: bon vivant
      - text: ", opts for a mistress; however, to everyone’s surprise, Lenin says: “I would like to have both of them!” Why? Is there a hidden strike of decadent"
      - emphasis [ref=e264]: jouisseur
      - text: "to his austere revolutionary image? No—he explains: “So that I can tell my wife that I am going to my mistress, and my mistress that I have to be with my wife.” “And then, what do you do?” “I go to a lone place to learn, learn, and learn!” Is this not exactly what Lenin did after the catastrophe of 1914? He withdrew to a lone place in Switzerland, where he “learned, learned, and learned,” reading Hegel’s logic. And, perhaps, this is what we should do today."
