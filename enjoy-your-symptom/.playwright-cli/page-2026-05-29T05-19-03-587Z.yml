      - emphasis [ref=e791]: Ecole freudienne de Paris
      - text: in 1979, up to the mythical case of the act of transgression, Caesar’s crossing of the Rubicon—all of them gestures of a masculine leader. However, we shouldn’t forget that the paradigmatic case of such an act is
      - emphasis [ref=e792]: feminine
      - text: ": Antigone’s “No!” to Creon, to state power; her act is literally suicidal, she excludes herself from the community, whereby she offers nothing new, no positive program—she just insists on her unconditional demand. Perhaps we should then risk the hypothesis that, according to its inherent logic, the act as real is “feminine,” in contrast to the “masculine” performative, i.e., the great founding gesture of a new order; in the case of Lacan, his dissolution of the"
      - emphasis [ref=e793]: Ecole freudienne
      - text: would be “feminine,” and he would pass over to the “masculine” side only by his gesture of founding the new
      - emphasis [ref=e794]: Ecole de la Cause
      - text: . The line should be drawn from Antigone to Simone Weil, the Catholic mystic and French resistance fighter who ended her life in London by means of suicidal starvation and served Rossellini as the model for Irene in
      - emphasis [ref=e795]: Europa ’
      - text: 51. In this perspective, the difference masculine/feminine no longer coincides with that of active/passive, spiritual/sensual, culture/nature, etc. The very masculine
      - emphasis [ref=e796]: activity
      - text: is already an escape from the abysmal dimension of the feminine
