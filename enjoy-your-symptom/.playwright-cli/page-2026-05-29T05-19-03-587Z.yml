    - heading "“Distributive justice” and its exception" [level=4] [ref=e1029]
    - paragraph [ref=e1030]:
      - text: "This uneasiness betrays the fact that “Sophie’s choice” subverts far more than the hard-boiled universe: it saps the very foundations of the notion of justice which regulates our everyday commerce, namely the notion of “distributive justice.” Let us just recall its most elaborate articulation, John Rawls’s"
      - emphasis [ref=e1031]: Theory of Justice
      - text: ","
      - superscript [ref=e1033]:
        - link "3" [ref=e1034]:
          - /url: "#fn-ch3-3"
      - text: "an attempt to give liberal ethics a radical antiutilitarian, Kantian twist. In a thoroughly Kantian fashion, Rawls “evacuates” the ethical domain, i.e., empties it of all “pathological” (contingent, empirical) objects. That is to say, Rawls’s crucial thesis is his affirmation of the primacy of Justice over the good: justice has to be defined prior to and independently of what we take for good, it cannot be deduced from the notion of good. In contemporary secular societies in which a multitude of world views coexist, every particular, determinate notion of the supreme good is experienced as an ultimately “contingent” entity; consequently, no unity—the ideological “cement” holding them together— can be defined in the terms of some common good. What is thereby refuted is also every form of utilitarianism which renders Justice dependent on the “calculus of pleasures,” on the maximizing of the Good for the greatest possible number of people—to refer to psychoanalytical terminology, Rawls takes up a position “beyond the pleasure principle,” as well as beyond its inherent prolongation, the reality principle. This is what is at stake in the distinction he elaborates between the rational and the reasonable: the Rational consists of the “calculus of pleasures,” of the economy of expenses and gains at the level of the reality principle, it is the agency which tells us when it is profitable to renounce the present pleasure for the sake of the long-term gain, i.e., to obey a social norm although this obedience is detrimental to our short-term interests; whereas Justice concerns ethical principles which are to be followed irrespective of the “rational” consideration of our “pathological,” contingent interests. Rawls’s central notion of the “veil of ignorance” aims precisely at this erasure of the subject’s “pathological” considerations: the ethical subject acts"
      - emphasis [ref=e1035]: as if he does not know where
      - emphasis [ref=e1036]: (which position within society) he speaks from
      - text: ", he is constituted by means of this abstraction from his position of enunciation."
    - paragraph [ref=e1037]:
      - text: "The paradox of the subject of Justice is thus that the total transparency of his object entails the total impenetrability of the place from which he speaks: on the one hand, he is supposed to be totally informed about the society on which he is called to pass a judgment, about the position of all its subjects, about their interests and their views; on the other hand, the reverse of this supposition of total knowledge is a radical ignorance of the way the subject himself is “embedded” in the social universe—a “reasonable” judgment must express a standpoint which the subject would agree with even if his position on the social scale were the lowest."
      - superscript [ref=e1039]:
        - link "4" [ref=e1040]:
          - /url: "#fn-ch3-4"
      - text: This erasure of the “pathological” content of the subject’s position of enunciation can be written in Lacanian mathems as S → $, i.e., the passage from the “pathological” subject full of particular
    - paragraph [ref=e1041]:
      - text: interests to the emptied, “barred,” subject of Justice; in other words, the subject is irreducibly split into the “pathological” subject made of “flesh and blood” and the ethical subject, a kind of symbolic fiction, an abstract participant of the “original situation” in which the social contract was made. The status of this social contract—the symbolic pact
      - emphasis [ref=e1042]: qua
      - text: "original social fact prior to any utilitarian “calculus of interests”—is also that of a symbolic fiction: the only way to pass a coherent ethical judgment on the present state of actual society is to proceed from the fiction of the “original situation” in which the subjects concluded the social contract, covering with the “veil of ignorance” the “pathological” determination of themselves"
      - emphasis [ref=e1043]: qua
      - text: beings of flesh and blood. The Lacanian notion of the Ego-Ideal (as opposed to the ideal ego) is to be located precisely at this fictitious place of the “original situation,” the place from which the subject looks at himself so that he is able to pass ethical judgment—that is to say, judgment on the distribution of goods, since, according to Rawls, Justice ultimately concerns the distribution of goods, i.e., is distributive justice.
    - paragraph [ref=e1044]:
      - text: However, as was demonstrated by Jean-Pierre Dupuy,
      - superscript [ref=e1046]:
        - link "5" [ref=e1047]:
          - /url: "#fn-ch3-5"
      - text: “Sophie’s choice” presents a limit case which, like the apocryphal grain of sand, disturbs the logical mechanism of distributive justice. The crucial point is that “Sophie’s choice” is
      - emphasis [ref=e1048]: not
      - text: "just another case of the standard sacrificial situation in which we sacrifice the rights of the individual for the larger benefit of the community (as in a situation of extreme interethnic tensions where the utilitarian logic tells us that it is “rational” to put to death some innocent individuals since we know that this sacrifice will calm passions and thus spare a far greater number of lives). It is easy to defend the antiutilitarian liberal standpoint against such a logic of the scapegoat into which the collective guilt is projected: one has simply to affirm the right of the individual not to be wronged for the sake of the allegedly higher interests of the community. Yet, in “Sophie’s choice,” nobody is less harmed if she refuses the choice: in this case, both of the children die. In other words, this situation"
      - emphasis [ref=e1049]: does
      - text: "stand Rawls’s test of the “veil of ignorance”: even if one occupies the position of the sacrificed child, the “reasonable” thing to do is to accept the sacrifice since the victim does not lose anything by it, only others gain. As pointed out by Dupuy, what we encounter here is not just the limit of utilitarianism but the limit of reason as such: “Sophie’s choice” is not only “rational” but also “reasonable” in Rawls’s sense, yet our ethical intuition tells us unmistakably that there is something wrong with it … Consequently, the paradox “Sophie’s choice” presents for Rawls’s theory is the following: the fundamental attitude of this theory is “antisacrificial,” i.e., its ultimate aim is to undermine the traditional ethics of the individual’s sacrifice for the benefit of the community and to replace it with the ethics of tolerance, of individual rights, etc.; yet its own axioms, when applied to “Sophie’s choice,” legitimate the sacrificial choice. In this sense, we can say that this version of the sacrificial situation presents a “blind spot” of Rawls’s theory: a strange body which is ultimately incompatible with it, yet which, at the same time, cannot be inherently refuted and therefore has to be excluded (sacrificed?) in advance if the theory is to maintain its consistency. In a somewhat naive formulation, we could say that Rawls’ ethics is “not made for sacrificial situations”: Rawls does not offer a better answer of how to act in a sacrificial situation, what he offers are rather principles which, if followed, prevent the very rise of sacrificial situations."
      - superscript [ref=e1051]:
        - link "6" [ref=e1052]:
          - /url: "#fn-ch3-6"
    - heading "Sacrifice, traditional and utilitarian" [level=4] [ref=e1053]
    - paragraph [ref=e1054]: It may seem that we have condensed in the figure of “sacrificial logic” two incompatible ethical attitudes, the traditional communitarian one and the utilitarian one; however, it can be
    - paragraph [ref=e1055]:
      - text: "shown that we are dealing here with a split inherent to sacrificial logic which concerns a shift in the status of knowledge. The traditional sacrificial logic was described in a paradigmatic way by René Girard:"
      - superscript [ref=e1057]:
        - link "7" [ref=e1058]:
          - /url: "#fn-ch3-7"
      - text: "guilt is projected onto the scapegoat whose sacrifice allows us to establish social peace by localizing violence; as if in recognition of this beneficial role he plays, the victim thus gains the aura of sanctity. The crucial component of this “generative scapegoating” is of course that society “really believes” in the scapegoat’s guilt: the “social function” of the scapegoating lies in its by-product, in the way it guarantees the social pact, yet it can perform this function only insofar as it is not directly posited as its aim. The utilitarian sacrifice implies on the contrary a cynical-manipulative attitude: the organizer of the scape-goating in no way believes in the victim’s guilt, his point is simply that one has to give preference to the interests of the community over the rights of the individual—the individual’s sacrifice is acceptable insofar as it prevents the disintegration of the social fabric. The problem with this cynical-“enlightened” logic of the sacrifice is that it presupposes and needs the “other” (“ordinary people”) in the role of the simpleton who “really believes” in the scapegoat’s guilt—otherwise, there is no point in the sacrifice. To render visible the dubious nature of this presupposition, we have only to think of the Stalinist monster trials as the most explicit form of cynical-utilitarian sacrificial logic (apart from fascist anti-Semitism): the answer to the question “Did the prosecutors really believe in their victim’s guilt?” is far more difficult and ambiguous than it may seem. A “true” Stalinist would probably say: even if, on the level of immediate facts, the accused are innocent, they are all the more guilty on a deeper level of historical responsibility—by the very insistence on their abstract-legal innocence, they have given preference to their individuality over the larger historical interests of the working class expressed in the will of the Party … This argument clearly resumes the paradox of the sacred space at work in traditional sacrificial logic: as soon as a man finds himself occupying the place of the sacred victim, his very being is stigmatized and the more he proclaims his innocence, the more he is guilty—since his guilt resides in his very resistance to the assumption of “guilt,” i.e., the symbolic mandate of the victim conferred on him by the community. What the victim has to do in order to be “equal to his task” is therefore to assume the burden of guilt in full consciousness of his innocence: the more he is innocent, the greater is the weight of his sacrifice."
    - paragraph [ref=e1059]:
      - text: "In other words, the reference to the simpletons who are supposed to “really believe” in the victim’s guilt and for the sake of whom the entire spectacle of scapegoating is staged, is deeply ambiguous: by means of it, the utilitarian manipulator"
      - emphasis [ref=e1060]: transposes onto the other his own
      - emphasis [ref=e1061]: (unconscious) belief
      - text: ", like the parents who “of course do not believe in Santa Claus, we just pretend to believe in order not to disappoint our children …” The break separating the manipulating utilitarian who justifies scapegoating by its social benefits from traditional sacrificial logic is therefore far less clear-cut than it may seem, it is rather a case of continuous gradation: manipulation itself must be supported by the presupposition of a naive believer, and traditional sacrifice itself is never “pure” but contains always an element of “manipulation.” To put it succinctly, the split is inherent to both versions of the sacrifice, both resort to the fetishistic logic of “I know very well (that the victim is innocent), but nevertheless …” This continuous passage is rendered possible by their common feature: the assumption that “sacrifice pays,” which results from the foundation of ethics in the common Good. On the other hand, the Kantian revolution, by repudiating this foundation of ethics in the common Good (and its corollary, the ethical valuation of an act by its actual consequences),"
      - superscript [ref=e1063]:
        - link "8" [ref=e1064]:
          - /url: "#fn-ch3-8"
      - text: breaks without reserve with the sacrificial logic in its traditional as well as its utilitarian versions— from what quarter then do the paradoxes arise with which Rawls becomes entangled in his endeavor to elaborate the contours of an antisacrificial ethics?
