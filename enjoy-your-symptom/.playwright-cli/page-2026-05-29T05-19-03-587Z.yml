    - paragraph [ref=e969]:
      - text: Considering that the voice to which psychoanalysis opens the space to articulate itself by lending an ear to it is precisely that of the victim
      - emphasis [ref=e970]: qua
      - text: "object of fascination (female hysteric), one can only wonder at the fact that even some Lacanians reduce psychoanalysis to a kind of heroic assumption of a necessary, constitutive sacrifice—those for whom psychoanalysis ends when the analysand is able to accept a fundamental renunciation as a condition of access to desire (“symbolic castration”). Lacan is as far as possible from such an ethic of heroic sacrifice: the lack to be assumed by the subject is not its own but that of the Other, which is something incomparably more unbearable. The Other itself doesn’t possess what the subject lacks, and no sacrifice can compensate for this lack of the Other. Now, we can also see how alien is to Lacan any glorification of the “big Other” as the structural order that “pulls the strings” and regulates the subject’s self-experience, i.e., the standard “structuralist” thesis that the subject, in his imaginary self-experience, misrecognizes the signifying mechanism that effectively “runs the show”: the supreme illusion consists precisely in this reliance on the consistency of the “big Other.” The “big Other doesn’t exist,” as Lacan puts it: it is just a subject’s presupposition—the (presup)position of an immaterial, ideal order, i.e., of Another Place that guarantees the ultimate meaning and consistency of the subject’s experience."
