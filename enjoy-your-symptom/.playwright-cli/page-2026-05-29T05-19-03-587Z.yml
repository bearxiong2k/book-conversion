      - text: ". The crucial change brought about by novelization was of course the introduction of the first-person narrative: the story is now told as it is seen through the eyes of Philip Marlowe and thus changed into a “normal” hard-boiled detective novel. Therein consists the ultimate reason of its failure: it endeavors to incorporate into the hard-boiled universe a subjective position (an ethical attitude) which is formally excluded from it, i.e., the presence of which renders visible the falsity of the very perspective from which the story is being told. To put it briefly, the subjective position of Marlowe—a cynical romantic sticking to his values against the wicked world whose corruption is embodied in the"
