    - paragraph [ref=e1718]:
      - text: "gaze, the object-gaze which sees me out there … As a rule, one focuses on the horror of being the object of some invisible, unfathomable, panoptical gaze (the “someone-is-watching me” motif)—yet it is a far more unbearable experience to find oneself at this very point of a pure gaze. The lesson of the dialectic of the double is therefore the discordance between eye and gaze: there certainly is in the mirror image “more than meets the eye,” yet this surplus that eludes the eye, the point in the image which eludes my eye’s grasp, is none other than the"
      - emphasis [ref=e1719]: gaze itself
      - text: ": as Lacan put it, “you can never see me at the point from which I gaze at you.”"
    - paragraph [ref=e1720]:
      - text: "This is the way psychoanalysis subverts the usual opposition of the paternal and the maternal: it brings out what this opposition has to repress, to exclude, in order to establish itself, namely the"
      - emphasis [ref=e1721]: reverse
      - text: of the father, the “anal father” who lurks behind the Name of the Father
      - emphasis [ref=e1722]: qua
      - text: bearer of the symbolic Law. This “anal father” is the third element which disturbs the familiar narrative of the gradual prevalence of the paternal over the maternal in history as well as in the subject’s ontogenesis, the narrative which even Freud seems to follow in his
      - emphasis [ref=e1723]: Moses and Monotheism
      - text: ", at least upon a superficial reading of it. The mad “anal father” is the nauseous debauchee, threatening yet ridiculously impotent, who simply does not fit the frame of the “complementary relationship between"
      - emphasis [ref=e1724]: yin
      - text: and
      - emphasis [ref=e1725]: yang
      - text: ” and the like. A new light is thus shed on the Cartesian
      - emphasis [ref=e1726]: cogito
      - text: ", on its inherent link with the God which guarantees its consistency. The Cartesian God—the correlate of the"
      - emphasis [ref=e1727]: cogito
      - text: —is, of course, none other than Lacan’s “big Other,” the place of the supposed symbolic knowledge (
      - emphasis [ref=e1728]: le sujet supposé savoir
      - text: ) which supplants the primordial Thing, i.e., Father-Enjoyment
      - emphasis [ref=e1729]: qua
      - text: presymbolic Other.
      - emphasis [ref=e1730]: Cogito
      - emphasis [ref=e1731]: ergo sum
      - text: "is thus to be translated as: I think where enjoyment was evacuated; or, to give a deontological twist to it: if I am to think, the Other’s enjoyment has to be suspended."
    - paragraph [ref=e1732]:
      - text: "One can detect this subjective attitude in those moments in Raymond Chandler’s novels when, exhausted by his activity, Philip Marlowe disconnects from the frenetic run of things, lies down and takes a rest. Through the luminescence of advertisements, through the stench of alcohol and garbage, through the intrusive noise of a big city, all the rot and decay from which he has tried to escape by means of activity—in short: the substance of enjoyment— return to strike him in the face. There is nothing calming or reassuring in these moments; passive thought, confronted with the nausea of existence, is, on the contrary, pervaded by paranoia. Marlowe “thinks,” yet his thought is not a free-floating, calming reflection, but rather a sneaking, crawling under the watchful eye of a cruel superego: “I thought, and thought in my mind moved with a kind of sluggish stealthiness, as if it was being watched by bitter and sadistic eyes” ("
      - emphasis [ref=e1733]: Farewell, My Lovely
      - text: ). This would be, then, Marlowe’s
      - emphasis [ref=e1734]: cogito
      - text: ": I think, therefore an obscene, sadistic superego specter is watching me. And what is the “phantom” if not such a stumbling block of the “normal” sexual relationship (in Leroux’s novel, the relationship between Christine Daae and Vicomte de Chagny)? If not the so-called “pregenital” (anal) object which must disappear, pass away, for the “normal” sexual relationship to realize itself? Yet one must avoid here the trap into which Freudian orthodoxy fell, i.e., the fallacy according to which fixation on this object prevents the emergence of the “normal” (genital) sexual relationship: the “phantom”"
      - emphasis [ref=e1735]: qua
      - text: object does nothing but materialize the inherent hindrance, the “original” impossibility that pertains to the sexual relationship.
      - superscript [ref=e1737]:
        - link "22" [ref=e1738]:
          - /url: "#fn-ch4-22"
