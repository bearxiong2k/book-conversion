    - paragraph [ref=e1711]:
      - text: What is crucial here is therefore the radical assymmetry in the relationship
      - emphasis [ref=e1712]: a
      - text: —
      - emphasis [ref=e1713]: a
      - text: "’, i.e., a Dorian Gray-like imbalance between myself and my mirror image: the price to be paid for my image to retain its harmonious consistency is that the entire horror of its amorphous leftover falls into me. This amorphous left over is the material correlative of the gaze; that is to say, when I find myself face to face with with my double, when I “encounter myself” among the objects, when “I myself”"
      - emphasis [ref=e1714]: qua
      - text: subject appear “out there,” what am I at that precise moment as the one who looks at it, as a witness to myself? Precisely the gaze
      - emphasis [ref=e1715]: qua
