    - heading "…ou pire" [level=4] [ref=e1105]
    - paragraph [ref=e1106]:
      - text: Thereby, we have already indicated that Lacan’s last word is not the forced choice. The original position of man
      - emphasis [ref=e1107]: qua
      - text: being of language is decidedly that of
      - emphasis [ref=e1108]: alienation
      - text: "in the signifier (in the symbolic order): the first choice is necessarily that of the Father, which marks the subject with the indelible guilt pertaining to his very (symbolic) existence. This alienation is best exemplified by the Kantian moral subject: the split subject subordinated to the moral imperative, caught in the vicious circle of the superego where he is all the more guilty the more he obeys its command. Yet Lacan’s wager is that it is possible for the subject to get rid of the superego pressure by"
      - emphasis [ref=e1109]: repeating
      - text: the choice and thus exculpating himself of his constitutive
    - paragraph [ref=e1110]:
      - text: "guilt. The price of it is exorbitant: if the first choice is “bad,” its repetition is in its very formal structure “worse” since it is an act of"
      - emphasis [ref=e1111]: separation
      - text: "from the symbolic community: Lacan’s supreme example is here of course Antigone’s suicidal “No!” to Creon."
    - paragraph [ref=e1112]:
      - text: "Therein consists the Lacanian definition of the authentic ethical act: an act which reaches the utter limit of the primordial forced choice and repeats it in the reverse sense. Such an act presents the only moment when we are effectively “free”: Antigone is “free” after she has been excommunicated from the community. In our time, such acts seem almost unthinkable: their pendants are usually disqualified as “terrorism,” like the gesture of Gudrun Ensslin, leader of the “Red Army Faction,” a Maoist “terrorist” organization, who killed herself in the maximum-security prison in 1978. Her story was told in Margaretha von Trotta’s film"
      - emphasis [ref=e1113]: The Times of
      - emphasis [ref=e1114]: Plumb
      - text: (the parallel between her destiny and that of Antigone has already been drawn in Volker Schloendorf’s episode in the omnibus
      - emphasis [ref=e1115]: Germany
      - text: in
      - emphasis [ref=e1116]: Autumn
      - text: "). Today, when Antigone is as a rule “domesticated,” made into a pathetic guardian of the community against tyrannical state power, it is all the more necessary to insist on the scandalous character of her “No!” to Creon: those who do not want to talk about the “terrorist” Gudrun, should also keep quiet about Antigone. Was not Antigone’s gesture repeated by RAF sympathizers who took part in Gudrun’s funeral—masked, since they knew they were being filmed by the police? What was really disturbing about the RAF “terrorism” was not the bombs but the refusal of the forced choice, of the fundamental social pact, implied in their attitude. How, then, should one answer the reproach that RAF members “went too far” when, in the name of their “mad” choice, they suspended the most elementary ethics? One should assume it fully—on condition that “suspension of the ethical” is grasped here in its precise Kierkegaardian sense (the obvious “Kierkegaardian” overtone of the terms we used to determine the act—“repetition,” “choice of freedom,” “guilt”—should suffice to legitimize this turn). The fundamental ethical gesture is the subject’s alienation in the universality of the symbolic pact, whereas the religious marks the suspension of the ethical, i.e., the moment of the “mad” decision when, instead of the I, the symbolic identity, the universal law, we choose"
      - emphasis [ref=e1117]: a
      - text: ", the exception, the particular object that sticks out from the symbolic order. In short, the leap into the religious"
      - emphasis [ref=e1118]: repeats
      - text: the ethical forced choice and thereby exculpates us of the guilt implied in it.
    - 'heading "Repetition: imaginary, symbolic, real" [level=4] [ref=e1119]'
    - paragraph [ref=e1120]:
      - text: Repetition as act is to be distinguished from its other modalities; that is to say, the status of the repetition with Kierkegaard is triple, according to his triad of the
      - emphasis [ref=e1121]: esthetical, ethical
      - text: ", and"
      - emphasis [ref=e1122]: religious
