      - text: O; one is almost embarrassed by the direct way these two books render in naked form the basic matrix of the Lacanian opposition of desire and drive. The first book tells of the adventures of an it, a circle with a point for an eye and a triangular gap for a mouth, a subject in search of a missing piece that would fill in the gap and thus change it into a complete circle, somewhat like the perfect spheric human being preceding sexual difference from Plato’s
      - emphasis [ref=e275]: Symposium
      - text: ": “It was missing a piece. And it was not happy. So it set off in search of its missing piece. And as it rolled it sang this song: ‘Oh I’m lookin’ for my missin’ piece/I’m lookin’ for my missin’ piece/Hi-dee-ho, here I go,/Lookin’ for my missin’ piece.’ ’”"
      - superscript [ref=e277]:
