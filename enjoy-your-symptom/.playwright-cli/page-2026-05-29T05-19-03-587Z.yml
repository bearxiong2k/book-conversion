      - text: ": the subject supposed to choose freely his community (since only a free choice is morally binding) does not exist prior to this choice, he is constituted by means of it. The choice of community, the “social contract,” is a paradoxical choice where I maintain the freedom of choice only if I “make the right choice”: if I choose the “other” of the community, I stand to lose the very freedom, the very possibility of choice (in clinical terms: I choose psychosis). What is sacrificed in the act of choice is of course the Thing, the incestuous Object that embodies impossible enjoyment—the paradox consisting in the fact that the incestuous Object"
      - emphasis [ref=e1070]: comes to
      - emphasis [ref=e1071]: be through being lost
      - text: ", i.e., that it is not given prior to its loss. For that reason, the choice is forced: its terms are incomparable, what I cede in order to gain inclusion in the community of symbolic exchange and distribution of goods is in one sense “all” (the Object of desire) and in another sense “nothing at all” (since it is in itself impossible, i.e., since, in the case of its choice, I lose all). This is the point which clearly marks the specificity of psychoanalysis: all other theories conceive the incest prohibition as a term in an act of exchange which ultimately “pays,” whereby the subject gets something in return (cultural progress, other women, and so forth), whereas psychoanalysis insists that the subject gets nothing in exchange (and also gives nothing)."
      - superscript [ref=e1073]:
