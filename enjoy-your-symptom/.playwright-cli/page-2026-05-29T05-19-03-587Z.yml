      - emphasis [ref=e2608]: Vertigo
      - text: "is of a special interest, insofar as in it the same sinthom of the spiral that draws us into its abyssal depth repeats itself and resonates at a multitude of levels: first as a purely formal motif of the abstract form emerging out of the close-up of the eye in the credits sequence; then as the curl of Carlotta Valdes’ hair"
    - paragraph [ref=e2609]: in her portrait, repeated in Madeleine’s haircut; then as the abyssal circle of the staircase of the church tower; and, finally, in the famous 360 degrees shot around Scottie and Judy/Madeleine who are passionately embracing in the decrepit hotel room, and during which the background changes to the stable of the Juan Batista Mission and then back to the hotel room; perhaps, this last shot offers the key to the temporal dimension of “vertigo”—the self-enclosed temporal loop in which past and present are condensed into the two aspects of the same endlessly repeated circular movement. It is this multiple resonance of surfaces that generates the specific density, the “depth” of the film’s texture.
    - paragraph [ref=e2610]:
      - text: "Here we have a set of (visual, formal, material) motives that “remain the same” across different contexts of meaning. How are we to read such persisting gestures or motifs? One should resist the temptation to treat them as Jungian archetypes with a deep meaning—the raised hand in Wagner expressing threat of the dead person to the living; or the person clinging by another’s hand expressing the tension between spiritual fall and salvation. We are dealing here with the level of material signs that resists meaning and establishes connections not grounded in narrative symbolic structures: they just relate in a kind of presymbolic cross-resonance. They are not signifiers, neither the famous Hitchcockian stains, but elements of what, a decade or two ago, one would have called cinematic writing, écriture. In the last years of his teaching, Jacques Lacan established the difference between symptom, and sinthom: in contrast to symptom which is a cipher of some repressed meaning, sinthom has no determinate meaning; it just gives body, in its repetitive pattern, to some elementary matrix of jouissance, of excessive enjoyment. Although sinthoms do not have sense, they do radiate"
      - emphasis [ref=e2611]: jouis
      - text: "-sense, enjoy-meant."
      - superscript [ref=e2613]:
        - link "4" [ref=e2614]:
          - /url: "#fn-ch6-4"
      - text: "According to Svetlana Alliluyeva, Joseph Stalin’s daughter, the last gesture of the dying Stalin, significantly preceded by the cast of the evil gaze, was the same gesture as in Wagner’s last operas, the gesture of threateningly raising the left hand:"
    - paragraph [ref=e2615]:
      - text: At what seemed like the very last moment [Stalin] suddenly opened his eyes and cast a glance over everyone in the room. It was a terrible glance, insane or perhaps angry and full of fear of death and the unfamiliar faces of the doctors bent over him. The glance swept over everyone in a second. Then something incomprehensible and terrible happened that to this day I can’t forget and don’t understand. He suddenly lifted his left hand as though he were pointing to something up above and bringing down a curse on us all. The gesture was incomprehensible and full of menace, and no one could say to whom or what it might be directed. The next moment, after a final effort, the spirit wrenched itself free of the flesh.
      - superscript [ref=e2617]:
        - link "5" [ref=e2618]:
          - /url: "#fn-ch6-5"
    - paragraph [ref=e2619]:
      - text: What, then, did this gesture mean? The Hitchcockian answer is
      - emphasis [ref=e2620]: nothing
      - text: "—yet this nothing was not an empty nothing, but the fullness of libidinal investment, a tic that gave body to a cipher of enjoyment. Perhaps, the closest equivalent in painting are the protracted stains that “are” the yellow sky in van Gogh, or the water or grass in Munch: this uncanny “massiveness” pertains neither to the direct materiality of the color stains nor to the materiality of the depicted objects; it dwells in a kind of intermediate spectral domain of what Friedrich Schelling called"
      - emphasis [ref=e2621]: geistige Körperlichkeit
      - text: ", the spiritual corporeality. From the Lacanian perspective, it is easy to identify this spiritual corporeality as materialized jouissance, “jouissance which turned into flesh.” Hitchcock’s sinthoms are thus not mere formal patterns: they already condense a certain libidinal investment. As such, they determined his creative process: Hitchcock did not proceed from the plot to its translation in cinematic audio-visual terms. He rather started with a set of (usually visual) motifs that haunted his imagination, that imposed themselves as his sinthoms; he then constructed a narrative that served as the pretext"
    - paragraph [ref=e2622]: "for their use. These sinthoms provide the specific flair, the substantial density of the cinematic texture of Hitchcock’s films: without them we would have a lifeless formal narrative. So all the talk about Hitchcock as the “master of suspense,” about his unique twisted plots, and so forth, misses the key dimension. Fredric Jameson said of Hemingway that he selected his narratives in order to be able to write certain kinds of (tense, masculine) phrases. The same goes for Hitchcock: he invented stories in order to be able to shoot a certain kind of scene. And, while the narratives of his films provide a funny and often perceptive comment of our times, it is in his sinthoms that Hitchcock lives forever. They are the true cause of why his films continue to function as objects of our desire."
    - heading "The case of the missing gaze" [level=4] [ref=e2623]
    - paragraph [ref=e2624]:
      - text: Our next concern is with the status of the gaze. The so-called post-theorists (cognitivist critics of psychoanalytic cinema theory) like to vary the motif of how writers of the theory refer to mythical entities like the (capitalized) Gaze, entities to which no empirical, observable facts (like the actual cinema viewers and their behavior) correspond. The title of one of the essays in David Bordwell and Noel Carroll’s
      - emphasis [ref=e2625]: Post-Theory
      - text: is “The Case of the Missing Spectator.”
      - superscript [ref=e2627]:
        - link "6" [ref=e2628]:
          - /url: "#fn-ch6-6"
      - text: "Posttheory relies here on the commonsense notion of the spectator (the subject who perceives cinematic reality on the screen, equipped with his emotional and cognitive predispositions, etc.) and within this simple opposition between subject and object of cinematic perception, there is, of course, no place for the gaze as the point from which the viewed object itself returns the gaze and regards us, the spectators. That is to say, crucial for the Lacanian notion of the gaze is that it involves the reversal of the relationship between subject and object: as Lacan puts it in volume 11 of his"
      - emphasis [ref=e2629]: Seminar
      - text: series, there is an antinomy between the eye and the gaze—that is, the gaze is on the side of the object, it stands for the blind spot in the field of the visible from which the picture itself photographs the spectator; or, as he puts it in volume 1 of his
      - emphasis [ref=e2630]: Seminar
      - text: series, in a passage which uncannily evokes the central scene of
      - emphasis [ref=e2631]: Rear Window
      - text: ", the film shot in the same year that Lacan’s"
      - emphasis [ref=e2632]: Seminar
      - text: "was held (1954):"
    - paragraph [ref=e2633]:
      - text: I can feel myself under the gaze of someone whose eyes I do not see, not even discern. All that is necessary is for something to signify to me that there may be others there. This window, if it gets a bit dark, and if I have reasons for thinking that there is someone behind it, is straight-away a gaze.
      - superscript [ref=e2635]:
        - link "7" [ref=e2636]:
          - /url: "#fn-ch6-7"
    - paragraph [ref=e2637]: "Is this notion of the gaze not perfectly rendered by the exemplary Hitchcockian scene in which the subject is approaching some uncanny threatening object, usually a house? There we encounter the antinomy between the eye and the gaze at its purest: the subject’s eye sees the house, but the house—the object—seems somehow to return the gaze. No wonder, then, that the posttheorists speak of the “missing gaze,” complaining that the Freudo-Lacanian gaze is a mythical entity nowhere found in the actuality of the spectator’s experience: this gaze effectively is missing, its status is purely fantasmatic. At a more fundamental level, what we are dealing with here is the positivization of an impossibility that gives rise to the fetish object. For example, how does the object/gaze become a fetish? Through the Hegelian reversal from the impossibility to see the object, into an object that gives body to this very impossibility: since the subject cannot directly see that, the true object of fascination, he accomplishes a kind of reflection-into-self by means of which the object that fascinates him becomes the gaze itself. In this sense (although not in an entirely symmetrical way), gaze and"
    - paragraph [ref=e2638]: "voice are “reflective” objects, objects that give body to an impossibility (in Lacanian “mathems“: = ø/a)."
    - paragraph [ref=e2639]:
      - text: In this precise sense, fantasy proper is not the scene itself that attracts our fascination, but the imagined/inexistent gaze observing it, like the impossible gaze from above for which old Aztecs created gigantic figures of birds and animals on the ground, or the impossible gaze for which details of the sculptures on the old aqueduct to Rome were formed, although they were essentially unobservable from the ground. In short, the most elementary fantasmatic scene is not that of a fascinating scene to be looked at, but the notion that “there is someone out there looking at us”; it is not a dream, but the notion that “we are the objects in someone else’s dream.” Milan Kundera, in La Lenteur, presents as the ultimate sign of today’s false aseptic pseudovoluptuous sex the couple feigning to have anal sex at the side of a hotel pool, in view of the guests in the rooms above, faking pleasurable cries but effectively not even accomplishing the penetration; to this he opposes the slow galant intimate erotic games of eighteenth-century France. Did not something similar to the scene from
      - emphasis [ref=e2640]: La Lenteur
      - text: "effectively take place in Khmer Rouge Cambodia where, after too many people died from purges and starvations, the regime, eager to multiply the population, proclaimed the first, tenth and twentieth day of each month the day for copulation: in the evening, the married couples (who otherwise had to sleep in separate barracks) were allowed to sleep together and compelled to make love. Their private space was a small cubicle isolated by a half-transparent bamboo curtain; in front of the row of such cubicles, Khmer Rouge guards walked, verifying that couples were effectively copulating. Since the couples knew that not making love was considered an act of sabotage to be severely punished, and since, on the other hand, after a fourteen-hour workday they were as a rule too tired to effectively have sex, they pretended to make love in order to dupe the guardian’s attention: they made false movements and faked sounds. Is this not the exact inverse of the experience from the prepermissive youth of some of us, when one had to sneak into the bedroom with the partner and do it as silently as possible, so that parents, if they were still awake, would not suspect that sex was going on? What if, then, such a spectacle for the Other’s gaze is part of the sexual act—what if, since there is no sexual relationship, it can only be staged for the Other’s gaze?"
    - paragraph [ref=e2641]:
      - text: Does not the recent trend of “web cam” sites that realize the logic of
      - emphasis [ref=e2642]: The Truman Show
      - text: "(in these sites, we are able to follow continuously some event or place: the life of a person in her apartment, the view on a street, etc.) display this same urgent need for the fantasmatic Other’s gaze serving as the guarantee of the subject’s being? “I exist only insofar as I am looked at all the time.” (Similar to this is the phenomenon, noted by Claude Lefort, of the TV set that is left on all the time, even when no one effectively watches it, serving as the minimum guarantee of the existence of social link.) The situation is here thus the tragicomic reversal of the Bentham-Orwellian notion of panopticon society in which we are (potentially) “observed all the time” and have no place to hide from the omnipresent gaze of the power: here, anxiety arises from the prospect of not being exposed to the Other’s gaze all the time, so that the subject needs the camera’s gaze as a kind of ontological guarantee of his being …"
    - paragraph [ref=e2643]: "As to this paradox of the omnipresent gaze, a funny thing happened not long ago to a friend of mine in Slovenia: he returned to his office late in the night to finish some work; before he put the light on, he observed in the office across the courtyard a senior (married) manager and his secretary copulating on his table. In the midst of their passion, they had forgotten that there is a building across the courtyard, from which they could be clearly seen since their office was brightly lit and there were no curtains on the large windows. My friend phoned this particular office, and when the manager, interrupting his sexual activity for a brief intermission picked up the phone, he whispered ominously into the receiver: “God is"
    - paragraph [ref=e2644]: observing you!” The poor manager collapsed and almost had a heart attack. The intervention of such a traumatic voice that cannot be directly located in reality is perhaps the closest we can come to the experience of the sublime.
    - paragraph [ref=e2645]:
      - text: "And Hitchcock is at its most uncanny and disturbing when he engages us directly with the point of view of this external fantasmatic gaze. One of the standard horror-movie procedures is the “resignification” of the objective into the subjective shot (what the spectator first perceives as an objective shot—say, of a house with a family at dinner—is all of a sudden, by means of such codified markers as the slight trembling of the camera or the “subjectivized” soundtrack, revealed as the subjective shot of a murderer stalking his potential victims). However, this procedure is to be supplemented with its opposite, the unexpected reversal of subjective into objective shot: in the midst of a long shot unambiguously marked as subjective, the spectator is all of a sudden compelled to acknowledge that there is no possible subject within the space of diegetic reality who can occupy the point of view of this shot. So we are not dealing here with the simple reversal of objective into subjective, but in constructing a place of impossible subjectivity, a subjectivity that taints the very objectivity with a flavor of unspeakable, monstrous evil. An entire heretic theology is discernible here, secretly identifying creator himself as the devil (which was already the thesis of the Cathar heresy in twentieth-century France). The exemplary cases of this impossible subjectivity are the “subjective” shot from the standpoint of the murderous thing itself upon the tran-fixed face of the dying detective Arbogast in"
      - emphasis [ref=e2646]: Psycho
      - text: ", or, in"
      - emphasis [ref=e2647]: The Birds
      - text: ", the famous God’s view shot of the burning Bodega Bay, which is then, with the entry into the frame of the birds, resignified, subjectivized into the point of view of the evil aggressors themselves."
    - heading "Multiple endings" [level=4] [ref=e2648]
    - paragraph [ref=e2649]:
      - text: "There is yet another, third, aspect that adds a specific density to Hitchcock’s films: the implicit resonance of multiple endings. The most obvious and well-documented case is, of course, that of"
      - emphasis [ref=e2650]: Topaz
      - text: ": before deciding on the ending that we all know, Hitchcock shot two alternative endings, and my point is that it is not sufficient to say that he simply chose the most appropriate ending—the ending we have now in a way presupposes the two other, with the three endings forming a kind of syllogism, that is Granville, the Russian spy, (Michel Piccoli) telling himself, “They cannot prove anything to me, I can simply leave for Russia” (the first discarded ending); “But the Russians themselves now do not want me, I am now even dangerous to them, so they will probably kill me” (the second discarded meaning); “What can I do then if in France I am outcast as a Russian spy and Russia itself no longer wants me? I can only kill myself” (the ending that was effectively chosen). There are, however, much more refined versions of this implicit presence of alternative endings. I think that"
      - emphasis [ref=e2651]: Notorious
      - text: owes at least a part of its powerful impact to the fact that its denouement should be perceived against the background of at least two other possible outcomes that resonate in it as a kind of alternative history.
      - superscript [ref=e2653]:
        - link "8" [ref=e2654]:
          - /url: "#fn-ch6-8"
      - text: "In the first outline of the story, Alicia wins redemption by the film’s end, but loses Devlin, who is killed rescuing her from the Nazis. The idea was that this sacrificial act should solve the tension between Devlin, who is unable to admit to Alicia his love for her, and Alicia, who is unable to perceive herself as worthy of love: Devlin admits his love for her without words, by dying in order to save her life. In the final scene, we find Alicia back in Miami with her group of drinking friends: although she is more “notorious” than ever, she has in her heart the memory of a man who loved her and died for her, and, as Hitchcock put it in a memo to the producer David. O. Selznick, “to her this is the same as if she had achieved a"
    - paragraph [ref=e2655]: "life of marriage and happiness.” In the second version, the outcome is the opposite; here, we already have the idea of a slow poisoning of Alicia by Sebastian and his mother. Devlin confronts the Nazis and flees with Alicia, but Alicia dies in the process. In the epilogue, Devlin sits alone in the café in Rio, where he used to meet Alicia, and overhears people discussing the death of Sebastian’s wanton and treacherous wife. However, the letter in his hands is a commendation from President Harry Truman citing Alicia’s bravery. Devlin pockets the letter and finishes his drink. Finally, the version we know was arrived at, with a finale that implies that Devlin and Alicia are now married. Hitchcock then left this finale out, to end on a more tragic note, with Sebastian, who truly loved Alicia, left to face the Nazi’s deadly wrath. The point is that both alternative endings are incorporated into the film, as a kind of fantasmatic background of the action we see on the screen: if they are to constitute a couple, both Devlin and Alicia have to undergo the “symbolic death,” so that the happy ending emerges from the combination of two unhappy endings—that is, these two alternative fantasmatic scenarios sustain the denouement we actually see."
    - paragraph [ref=e2656]:
      - text: This feature allows us to insert Hitchcock into the series of artists whose work forecasts today’s digital universe. That is to say, art historians often noted the phenomenon of the old artistic forms pushing against their own boundaries and using procedures that, at least from our retroactive view, seem to point toward a new technology that will be able to serve as a more “natural” and appropriate “objective correlative” to the life experience the old forms endeavored to render by means of their “excessive” experimentations. A whole series of narrative procedures in nineteenth-century novels announce not only the standard narrative cinema (the intricate use of “flashback” in Emily Brontë or of “cross-cutting” and “close-ups” in Charles Dickens), but sometimes even the modernist cinema (the use of “off space” in
      - emphasis [ref=e2657]: Madame Bovary
      - text: )—as if a new perception of life was already here but still struggling to find its proper means of articulation until it finally found it in cinema. What we have here is thus the historicity of a kind of
      - emphasis [ref=e2658]: futur antérieur
      - text: ": it is only once cinema had come about and developed its standard procedures that we could really grasp the narrative logic of Dickens’s great novels or of"
      - emphasis [ref=e2659]: Madame Bovary
      - text: .
    - paragraph [ref=e2660]:
      - text: And is it not that today we are approaching a homologous threshold? A new “life experience” is in the air, a perception of life that explodes the form of the linear, centered narrative and renders life as a multiform flow—even and up to the domain of “hard” sciences (quantum physics and its multiple reality interpretation, or the utter contingency that provided the spin to the actual evolution of life on Earth—as Stephen Jay Gould demonstrated in his
      - emphasis [ref=e2661]: Wonderful Life
      - text: ","
      - superscript [ref=e2663]:
        - link "9" [ref=e2664]:
          - /url: "#fn-ch6-9"
      - text: the fossils of Burgess Shale bear witness to how evolution may have taken a wholly different turn) we seem to be haunted by the chanciness of life and the alternate versions of reality. Either life is experienced as a series of multiple parallel destinies that interact and are crucially affected by meaningless contingent encounters, the points at which one series intersects with and intervenes into another (see Robert Altman’s
      - emphasis [ref=e2665]: Short Cuts
      - text: ), or different versions/outcomes of the same plot are repeatedly enacted (the “parallel universes” or “alternative possible worlds” scenarios—see Krzysztof Kieslowski’s
      - emphasis [ref=e2666]: Chance,
      - emphasis [ref=e2667]: Veronique, and Red
      - text: ; even “serious” historians themselves recently produced a volume,
      - emphasis [ref=e2668]: Virtual
      - emphasis [ref=e2669]: History
      - text: ","
      - superscript [ref=e2671]:
        - link "10" [ref=e2672]:
          - /url: "#fn-ch6-10"
      - text: a reading of crucial modern age events from Oliver Cromwell’s victory over the Stuarts to the American Revolutionary War to the disintegration of Communism as hinging on unpredictable and sometimes even improbable chances). This perception of our reality as one of the possible—often even not the most probable—outcomes of an “open” situation, this notion that other possible outcomes are not simply cancelled out but continue to haunt our “true” reality as a specter of what might have happened, conferring on our reality the status of extreme fragility and contingency, implicitly clashes with the predominant “linear” narrative
    - paragraph [ref=e2673]: "forms of our literature and cinema, they seem to call for a new artistic medium in which they would not be an eccentric excess, but its “proper” mode of functioning. The notion of creation also changes with this new experience of the world: it no longer designates the positive act of imposing a new order, but rather the negative gesture of choice, of limiting the possibilities, of privileging one option at the expense of all others. One can argue that the cyberspace hypertext is the new medium in which this life experience will find its “natural,” more appropriate objective correlative, so that, again, it is only with the advent of cyberspace hypertext that we can effectively grasp what Altman and Kieslowski—and, implicitly, also Hitchcock—were effectively aiming at."
    - heading "The Ideal Remake" [level=4] [ref=e2674]
    - paragraph [ref=e2675]:
      - text: This, perhaps, also points towards what a proper remake of a Hitchcock film would be. To try and imitate Hitchcockian sinthoms is an exercise condemned in advance to failure; to remake the same narrative results in a Shakespeare Made Easy output. So there are only two ways left. One is indicated by Gus van Sant’s remake of
      - emphasis [ref=e2676]: Psycho
      - text: "which, paradoxically, I am inclined to consider a failed masterpiece, rather than a simple failure. The idea of the exact frame-by-frame remake is an ingenious idea, and, in my view, the problem was rather that the film did not go far enough in this direction. Ideally, what the film should strive for is to achieve the uncanny effect of the double: in shooting formally the same film, the difference would have become all the more palpable. Everything would have been the same—same shots, angles, and dialogue—but nonetheless, on account of this very sameness we would all the more powerfully experience that we are dealing with a totally different film. This gap should have been signaled by barely perceptible nuances in the way of acting, in the choice of actors, in the use of color, and so on. Some elements in van Sant’s film already point in this direction: the roles of Norman, Lilah (portrayed as a lesbian) and Marion (a nonmaternal, withdrawn, cold bitch in contrast to the big-breasted and maternal Janet Leigh), even Arbogast and Sam, nicely indicate the shift from the late 1950s to the present. While some added shots are acceptable (like the enigmatic subjective shots of cloudy sky during the two murders), problems resurface with the more brutal changes (like Norman’s masturbating while he spies on Marion before killing her, one is tempted to make the rather obvious point that if he were to be able to arrive at this kind of sexual satisfaction there would have been no need for him to accomplish the violent"
      - emphasis [ref=e2677]: passage à l’acte
      - text: of slaughtering her!); worse yet, some scenes are completely ruined, their impact completely lost, by changing Hitchcock’s precise framing (say, the key scene in which, after leaving her office with the money, Marion, now at home, prepares to escape). Hitchcock’s own remakes (the two versions of
      - emphasis [ref=e2678]: The Man Who Knew Too Much
      - text: ", as well as"
      - emphasis [ref=e2679]: Saboteur
      - text: and
      - emphasis [ref=e2680]: North by Northwest
      - text: ") point in this direction: although the narrative is very similar, the underlying libidinal economy is wholly different in each of the subsequent remakes, as if sameness serves the purpose of marking difference."
      - superscript [ref=e2682]:
        - link "11" [ref=e2683]:
          - /url: "#fn-ch6-11"
    - paragraph [ref=e2684]:
      - text: The second way would be to stage, in a well-calculated strategic move, one of the alternative scenarios that underlie the one actualized by Hitchcock, like the remake of
      - emphasis [ref=e2685]: Notorious
      - text: in which Ingrid Bergman survives alone. This would be a proper way to honor Hitchcock as an artist who belongs to our era. Perhaps, more than Brian de Palma’s and others’ direct homages to Hitchcock, the scenes that announce such a proper remake are to be found in unexpected places, like a scene in the film
      - emphasis [ref=e2686]: The Conversation
      - text: by Francis Ford Coppola, who certainly is not a Hitchcockian director. In it, the investigator inspects a hotel room, the scene of a crime, with a Hitchcockian gaze, like Lilah and Sam do in Marion’s motel room in
    - paragraph [ref=e2687]:
      - emphasis [ref=e2688]: Psycho
      - text: ", moving from the main bedroom to the bathroom and focusing there on the toilet and the shower. This shift from the shower (where there are no traces of the crime, everything is clean) to the toilet, elevating it into the Hitchcockian object that attracts our gaze, fascinating us with its premonition of some unspeakable horror, is crucial here (recall Hitchcock’s battle with censorship to allow the inside view of the toilet, from where Sam picks up a torn piece of paper with Marion’s writing of the amounts of spent money, the proof that she was there). After a series of obvious references to"
      - emphasis [ref=e2689]: Psycho
      - text: apropos the bathroom (quickly pulling open the curtain, inspecting its drain), the investigator focuses on the (allegedly clean) toilet, flushes it, and then the stain appears as if out of nowhere, blood and other traces of the crime overflowing the edge of the toilet bowl. This scene, a kind of
      - emphasis [ref=e2690]: Psycho
      - text: reread through
      - emphasis [ref=e2691]: Marnie
      - text: "(with its red stain blurring the screen) contains the main elements of the Hitchcockian universe: it has the Hitchcockian object that materializes some unspecified threat, functioning as the hole of passage into another abyssal dimension (is flushing the toilet in this scene not like pushing the wrong button that dissolves the entire universe in science fiction novels?); this object, which simultaneously attracts and repels the subject, can be said to be the point from which the inspected setting returns the gaze (is it not that the hero is somehow regarded by the toilet sink?); and, finally, Coppola realizes the alternative scenario of the toilet itself as the ultimate locus of mystery. What makes this mini-remake of a scene so effective is that Coppola suspends the prohibition operative in"
      - emphasis [ref=e2692]: Psycho
      - text: ": the threat"
      - emphasis [ref=e2693]: does
      - text: explode, the camera
      - emphasis [ref=e2694]: does
      - text: show the danger hanging in the air in
      - emphasis [ref=e2695]: Psycho
      - text: ", the chaotic bloody mess erupting from the toilet."
      - superscript [ref=e2697]:
        - link "12" [ref=e2698]:
          - /url: "#fn-ch6-12"
      - text: (And is not the swamp behind the house in which Norman sinks the car with the body of his victim a kind of gigantic pool of excremental mud, so that one can say that he has in a way flushed the car down the toilet? The famous moment, earlier in the film, with the worried expression on Norman’s face as Marion’s car stops its descent into the swamp for a couple of seconds effectively signals the worry that the toilet did not swallow the traces of the crime. The very last shot of
      - emphasis [ref=e2699]: Psycho
      - text: ", in which we see Marion’s car being pulled out of the swamp, is thus a kind of Hitchcockian equivalent to the blood reemerging out of the toilet sink—in short, this swamp is another in the series of the entrance points to the preontological netherworld.)"
    - paragraph [ref=e2700]:
      - text: And is not the same reference to the preontological underworld operative also in the final scene of
      - emphasis [ref=e2701]: Vertigo
      - text: "? In predigital times, when I was in my teens, I remember seeing a bad copy of"
      - emphasis [ref=e2702]: Vertigo
      - text: ". Its last seconds were simply missing, so that the movie appeared to have a happy ending: Scottie reconciled with Judy, forgiving her and accepting her as a partner, the two of them passionately embracing. My point is that such an ending is not as artificial as it may seem: it is rather, in the actual ending, that the sudden appearance of the Mother Superior from the staircase below functions as a kind of negative deus ex machina, a sudden intrusion in no way properly grounded in the narrative logic, that prevents the happy ending."
      - superscript [ref=e2704]:
        - link "13" [ref=e2705]:
          - /url: "#fn-ch6-13"
      - text: Where does the nun appear from? From the same preontological realm of shadows from which Scottie himself secretly observes Madeleine in the florist’s shop.
      - superscript [ref=e2707]:
        - link "14" [ref=e2708]:
          - /url: "#fn-ch6-14"
      - text: It is the reference to this preontological realm that allows us to approach the quintessential Hitchcockian scene that was never shot, precisely because it renders the basic matrix of his work directly, its actual filming undoubtedly would have produced a vulgar, tasteless effect. Here is this scene that Hitchcock wanted to insert in
      - emphasis [ref=e2709]: North by Northwest
      - text: ", as reported in Truffauts’ conversations with the Master:"
    - paragraph [ref=e2710]: I wanted to have a long dialogue between Cary Grant and one of the factory workers [at a Ford automobile plant] as they walk along the assembly line. Behind them a car is being assembled, piece by piece. Finally, the car they’ve seen being put together from a simple nut and bolt is complete, with gas and oil, and all ready to drive off the line. The
    - paragraph [ref=e2711]:
      - text: two men look at each other and say, “Isn’t it wonderful!” Then they open the door of the car and out drops a corpse.
      - superscript [ref=e2713]:
        - link "15" [ref=e2714]:
          - /url: "#fn-ch6-15"
    - paragraph [ref=e2715]:
      - text: Where did this corpse emerge—fall—from? Again, from the very void from which Scottie observes Madeleine in the florist’s shop, or from the void from which blood emerges in
      - emphasis [ref=e2716]: The
      - emphasis [ref=e2717]: Conversation
      - text: ". (One should also bear in mind that what we would have seen in this long shot is the elementary unity of the production process; is then the corpse that mysteriously drops out from nowhere not the perfect stand-in for the surplus value that is generated “out of nowhere” through the production process?) This shocking elevation of the ridiculously lowest (the “beyond” to where excrement disappears) into the metaphysical sublime is perhaps one of the mysteries of Hitchcock’s art. Is not the sublime sometimes part of our most common everyday experience? When, in the midst of accomplishing a simple task (say, climbing the long line of stairs), we are overwhelmed by an unexpected fatigue, it all of a sudden appears as if the simple goal we want to reach (the top of the stairs) is separated from us by an unfathomable barrier and thus changed into a metaphysical object forever out of our reach, as if there is something that forever prevents us from accomplishing it. And the domain to where excrement vanishes after we flush the toilet is effectively one of the metaphors for the horrifyingly sublime “beyond” of the primordial, preontological chaos into which things disappear. Although we rationally know what goes on with the excrement, the imaginary mystery nonetheless persists: shit remains an excess that does not fit our daily reality, and Lacan was right in claiming that we pass from animals to humans the moment an animal has problems with what to do with its excrement, the moment that waste turns into an excess that annoys the animal. What is “Real” in the scene from"
      - emphasis [ref=e2718]: The Conversation
      - text: is thus not primarily the horrifying and disgusting stuff reemerging from the toilet sink, but rather the toilet’s drain itself, the hole that serves as the passage to a different ontological order. The similarity between the empty toilet sink before the remainders of the murder reemerge from it and Kasimir Malevich’s
      - emphasis [ref=e2719]: The Black Square on the White Surface
      - text: "is significant here: does the look from above into the toilet sink not reproduce almost the same minimalist visual scheme, a black (or, at least, darker) square of water framed by the white surface of the sink itself? Again, we of course know that the excrement that disappears is somewhere in the sewage network; what is here “real” is the topological hole or torsion that bends the space of our reality so that we perceive/imagine excrement as disappearing into an alternative dimension that is not part of our everyday reality."
    - paragraph [ref=e2720]:
      - text: "Hitchcock’s obsession with cleansing the bathroom or the toilet after its use is well-known, and it is significant that when, after Marion’s murder, he wants to shift our point of identification to Norman, he does this with a long rendering of the careful process of cleaning the bathroom. This is perhaps the key scene of the film, a scene that provides an uncanny profound satisfaction of the job properly done, of things returning back to normal, of situation being again under control, of the traces of the horrifying netherworld being erased. One is tempted to read this scene against the background of the well-known proposition of Saint Thomas Aquinas according to which a virtue (defined as a proper way to accomplish an act) can also serve evil purposes: one can also be a perfect thief, murderer, extortioner, that is accomplish an evil act in a “virtuous” way. What this scene of cleansing the bathroom in"
      - emphasis [ref=e2721]: Psycho
      - text: "demonstrates is how the “lower” perfection can imperceptibly affect the “higher” goal: Norman’s virtuous perfection in cleaning the bathroom, of course, serves the evil purpose of erasing the traces of the crime; however, this very perfection, the dedication and the thoroughness of his act, seduces us, into assuming that, if someone acts in such a “perfect” way, he should be in his entirety a good and sympathetic person. In short, someone who"
    - paragraph [ref=e2722]:
      - text: cleans the bathroom so thoroughly cannot be really bad, in spite of his other minor peculiarities. (Or, to put it even more pointedly, in a country governed by Norman, trains would certainly run on time!) While watching this scene recently, I caught myself nervously noticing that the bathroom was not properly cleaned—two small stains on the side of the bathtub remained! I almost wanted to shout, Hey, it’s not yet over, finish the job properly! Is it not that
      - emphasis [ref=e2723]: Psycho
      - text: points here towards today’s ideological perception in which work itself (manual labor as opposed to “symbolic” activity), and not sex, becomes the site of obscene indecency to be concealed from the public eye? The tradition, going back to Richard Wagner’s
      - emphasis [ref=e2724]: Rheingold
      - text: and Fritz Lang’s
      - emphasis [ref=e2725]: Metropolis
      - text: ", in which the working process takes place underground, in dark caves, today culminates in the millions of anonymous workers sweating in third world factories, from Chinese gulags to Indonesian or Brazilian assembly lines; in their invisibility, the West can itself afford to babble on about the “disappearing working class.” Yet what is crucial in this tradition is the equation of labor with crime, the idea that labor—hard work—is originally an indecent criminal activity to be hidden from the public eye. The only place in Hollywood films where we see the production process in all its intensity are when the action hero penetrates the master criminal’s secret domain and locates there the site of intense labor (the manufacture and packaging of drugs, the construction of a rocket that will destroy New York). When, in a James Bond movie, the master criminal, after capturing Bond, usually takes him on a tour of his illegal factory, is this not the closest Hollywood comes to the socialist-realist proud presentation of the production in a factory?"
      - superscript [ref=e2727]:
        - link "17" [ref=e2728]:
          - /url: "#fn-ch6-17"
      - text: And the function of Bond’s intervention, of course, is to blow up this site of production, allowing us to return to the daily semblance of our existence in a world with a “disappearing working class.”
    - paragraph [ref=e2729]:
      - text: "And, incidentally, is the same attitude of forceful identification against one’s will not clearly discernible in those leftist cinema theorists who are in a similar way forced to love Hitchcock, to libidinally identify with him, although they are well aware that, measured by the standards of “political correctness,” his work reads as a catalog of sins (obsession with cleanliness and control, women created upon the male image, etc.)? I never found convincing the standard explanation from leftist theorists who cannot help but love Hitchcock: Yes, his universe is a male chauvinist one, but at the same time he renders visible its cracks and as it were subverts it from within. I think the socio-political dimension of Hitchcock’s films is to be sought elsewhere. Let us take the two closures at the end of"
      - emphasis [ref=e2730]: Psycho
      - text: "—first the psychiatrist wraps up the story, then Norman-Mother herself delivers the final monologue, “I wouldn’t even hurt a fly!” This split between the two closures tells more about the deadlock of contemporary subjectivity than a dozen essays in cultural criticism. That is to say, it may appear that we are dealing with the well-known split between expert knowledge and our private solipsistic universes, deplored by many social critics today: common sense, a shared set of ethically engaged presuppositions, is slowly disintegrating, and what we get is, on the one hand, the objectivized language of experts and scientists that can no longer be translated into the common language accessible to everyone but is present in it in the mode of fetishized formulas that no one really understands, but which shape our artistic and popular imaginary (black holes, the big bang theory, superstrings, quantum oscillation …); and, on the other hand, the multitude of life styles that one cannot translate into each other: all we can do is secure the conditions for their tolerant coexistence in a multicultural society. The icon of today’s subject is perhaps the Indian computer programmer who, during the day, excels in his expertise, while in the evening, upon returning home, lights a candle to a Hindu divinity and respects the sacredness of the cow."
    - paragraph [ref=e2731]:
      - text: However, on a closer look, it soon becomes apparent how this opposition is displaced at the end of
      - emphasis [ref=e2732]: Psycho
      - text: ": it is the psychiatrist, the representative of cold objective knowledge, who"
    - paragraph [ref=e2733]:
      - text: "speaks in an engaged, almost warmly human way—his explanation is full of personal tics, sympathetic gestures—while Norman, withdrawn into his private world, is precisely no longer himself, but totally possessed by another psychic entity, the mother’s ghost. This final image of Norman reminds me of the way they are shooting soap operas in Mexico: because of the extremely tight schedule (the studio has to produce each day a half-hour installment of the series), actors do not have time to learn their lines in advance, so they simply have hidden in their ears a tiny voice receiver, and a man in the cabin behind the set simply reads to them the instructions on what they are to do (what words they are to say, what acts they are to accomplish). Actors are trained to enact immediately, with no delay, these instructions. This is Norman at the end of"
      - emphasis [ref=e2734]: Psycho
      - text: ", and this is also a good lesson to those New Agers who claim that we should drop the social masks and set free our “innermost true selves.” We see the final result in Norman who, at the end of"
      - emphasis [ref=e2735]: Psycho
      - text: ", effectively realizes his true self and follows Arthur Rimbaud’s motto from his letter to Demeny (“Car je est un autre. Si le cuivre s’éveille clairon, il n’y a rien de sa faute”): If Norman starts to talk with the strange voice of his mother, it’s not his fault. The price he has to pay in order to become “really himself,” undivided subject, is total alienation, becoming an Other with regard to himself: the obstacle to full self-identity is the very condition of selfhood."
    - paragraph [ref=e2736]:
      - text: "Another aspect of this same antagonism concerns architecture: one can also consider Norman as a subject split between two buildings, the modern horizontal motel and the vertical Gothic mother’s house, forever running between the two, never finding a proper place of his own. In this sense, the"
      - emphasis [ref=e2737]: unheimlich
      - text: character of the film’s end means that, in his full identification with the mother, he has finally found his
      - emphasis [ref=e2738]: heim
      - text: ", his home. In modernist works like"
      - emphasis [ref=e2739]: Psycho
      - text: ", this split is still visible, while the main goal of today’s postmodern architecture is to obfuscate it. Suffice it to recall “new urbanism,” with its return to small family houses in small towns, with front porches, recreating the cozy atmosphere of the local community; clearly this is the case of architecture as ideology at its purest, providing an imaginary (although “real,” materialized in the actual disposition of houses) solution to a real social deadlock that has nothing to do with architecture and all to do with late capitalist dynamics. A more ambiguous case of the same antagonism is the work of Frank Gehry. Why is he so popular, a true cult figure? He takes as the basis one of the two poles of the antagonism, either the old-fashioned family house or a modernist concrete-and-glass building, and then either submits it to a kind of cubist anamorphic distortion (curved angles of walls and windows, etc.) or combines the old family home with a modernist supplement, in which case, as Fredric Jameson has pointed out, the focal point is the place (the room) at the intersection of the two spaces. In short, is Gehry not doing in architecture what the Caduveo Indians (in Claude Levi-Strauss’s magnificent description from his"
      - emphasis [ref=e2740]: Les Tristes Tropiques
      - text: ") were trying to achieve with their tatooed faces: to resolve through a symbolic act the “real” of social antagonism by constructing a utopian solution, a mediation between opposites? So here is my final hypothesis: if the Bates Motel were to be built by Gehry, directly combining the old mother’s house and the flat modern motel into a new hybrid entity, there would have been no need for Norman to kill his victims, since he would have been relieved of the unbearable tension that compels him to run between the two places—he would have a place of mediation between the two extremes."
    - heading "6.2 the Matrix, or the Two Sides of Perversion" [level=3] [ref=e2741]
    - paragraph [ref=e2742]:
      - text: If, then, Hitchcock’s
      - emphasis [ref=e2743]: Psycho
      - text: confronts us with the antagonisms of modernity, how are these antagonisms displaced in our postmodern era? Andy and Larry Wachowski’s
      - emphasis [ref=e2744]: The Matrix
    - paragraph [ref=e2745]:
      - text: unwittingly provides the answer. When I saw this film at a local theater in Slovenia, I had the unique opportunity of sitting close to the ideal spectator of the film—namely, an idiot. A man in his late twenties seated to my right was so immersed in the film that he all the time disturbed other spectators with loud exclamations, like “My God, wow, so there is no reality!” I definitely prefer such naive immersion to the pseudosophisticated intellectualist readings that project into the film the refined philosophical or psychoanalytic conceptual distinctions.
      - superscript [ref=e2747]:
        - link "18" [ref=e2748]:
          - /url: "#fn-ch6-18"
    - paragraph [ref=e2749]:
      - text: It is nonetheless easy to understand this intellectual attraction to
      - emphasis [ref=e2750]: The Matrix
      - text: . Is it not that
      - emphasis [ref=e2751]: The Matrix
      - text: is one of the films that function as a kind of Rorschach test, setting in motion the universalized process of recognition (like the proverbial painting of God that seems always to stare directly at you, from whichever angle you view it), that practically every orientation seems to recognize itself in it? My Lacanian friends are telling me that the authors must have read Lacan; the Frankfurt School partisans see in
      - emphasis [ref=e2752]: The Matrix
      - text: the extrapolated embodiment of Kulturindustrie, the alienated-reified social substance (of capital) directly taking over, colonizing our inner life itself, using us as the source of energy; New Agers see it in the source of speculations on how our world is just a mirage generated by a global Mind embodied in the World Wide Web. This series goes back to Plato’s
      - emphasis [ref=e2753]: Republic
      - text: ": does"
      - emphasis [ref=e2754]: The Matrix
      - text: not repeat exactly Plato’s
      - emphasis [ref=e2755]: dispositif
      - text: "of the cave (ordinary humans as prisoners, tied firmly to their seats and compelled to watch the shadowy performance of what is falsely considered to be reality)? The important difference, of course, is that when some individuals escape their cave predicament and step out to the surface of the Earth, what they find there is no longer the bright surface illuminated by the rays of the sun, the supreme good, but the desolate “desert of the real.” The key opposition is here the one between the Frankfurt school and Lacan: should we historicize"
      - emphasis [ref=e2756]: The Matrix
      - text: into the metaphor of the capital that colonized culture and subjectivity, or is it the reification of the symbolic order
      - emphasis [ref=e2757]: as such
      - text: "? What if, however, this very alternative is false? What if the virtual character of the symbolic order as such is the very condition of historicity?"
    - heading "Reaching the end of the world" [level=4] [ref=e2758]
    - paragraph [ref=e2759]:
      - text: "The idea of the hero living in a totally manipulated and controlled artificial universe is hardly original:"
      - emphasis [ref=e2760]: The Matrix
      - text: just radicalizes it by bringing in virtual reality (VR). The point here is the radical ambiguity of VR with regard to the problematic of iconoclasm. On the one hand, VR marks the radical reduction of the wealth of our sensory experience to not even letters, but the minimal digital series of 0 and 1, of the passing and not-passing of the electrical signal. On the other hand, this very digital machine generates the “simulated” experience of reality that tends to become indiscernible from the “real” reality, with the consequence of undermining the very notion of “real” reality—VR is thus, at the same time, the most radical assertion of the seductive power of images.
    - paragraph [ref=e2761]:
      - text: Is not the ultimate American paranoiac fantasy that of an individual living in a small idyllic Florida city, a consummerist paradise, who suddenly starts to suspect that the world he lives in is a fake, a spectacle staged to convince him that he lives in a real world, while all people around him are effectively actors and extras in a gigantic show? The most recent example of this is Peter Weir’s
      - emphasis [ref=e2762]: The Truman Show
      - text: "(1998), with Jim Carrey playing the small town clerk who gradually discovers that he is the protagonist of a twenty-four-hour TV series: his hometown is constructed on a gigantic studio set, with cameras following him constantly. Peter Sloterdijk’s “sphere” is here literally realized as the gigantic metal sphere that envelopes and isolates Truman’s entire city. This final shot of"
      - emphasis [ref=e2763]: The Truman Show
      - text: may seem to enact the liberating experience of breaking out from the ideological suture of the enclosed universe into
    - paragraph [ref=e2764]:
      - text: "its outside, invisible from the ideological inside. However, what if it is precisely this “happy” denouement of the film (let us not forget: applauded by the millions around the world watching the last minutes of the show), with the hero breaking out and, as we are led to believe, soon to join his true love (so that we have again the formula of the production of the couple!), that is ideology at its purest? What if ideology resides in the very belief that, outside the closure of the finite universe, there is some “true reality” to be entered?"
      - superscript [ref=e2766]:
        - link "19" [ref=e2767]:
          - /url: "#fn-ch6-19"
    - paragraph [ref=e2768]:
      - text: Among the predecessors of this notion, it is worth mentioning Philip K. Dick’s
      - emphasis [ref=e2769]: Time Out of
      - emphasis [ref=e2770]: Joint
      - text: (1959), in which a hero living a modest daily life in a small idyllic California city of the late 1950s gradually discovers that the whole town is a fake staged to keep him satisfied. The underlying experience of
      - emphasis [ref=e2771]: Time Out of Joint
      - text: and of
      - emphasis [ref=e2772]: The Truman Show
      - text: is that the late capitalist consummerist paradise is in its very hyperreality irreal, substanceless, and deprived of material inertia. So it is not only that Hollywood stages a semblance of real life deprived of the weight and inertia of materiality; in the late capitalist consummerist society, “real social life” itself somehow acquires the features of a staged fake, with our neighbors behaving in “real” life as stage actors and extras. The ultimate truth of the capitalist utilitarian despiritualized universe is the dematerialization of the “real life” itself, its reversal into a spectral show.
    - paragraph [ref=e2773]:
      - text: In the realm of science fiction, one should mention also Brian Aldiss’s
      - emphasis [ref=e2774]: Starship
      - text: ", in which members of a tribe live in a closed world of a tunnel in a giant starship, isolated from the rest of the ship by thick vegetation, unaware that there is a universe beyond; finally, some children penetrate the bushes and reach the world beyond, populated by other tribes. Among the older, more “naive” forerunners, one should mention George Seaton’s 36 Hours, a film from the early 1960s about an American officer (James Garner) who knows all the plans for the D-Day invasion of Normandy and is accidentally taken prisoner by Germans just days before the invasion. Since he is unconscious from an explosion when taken prisoner, the Germans quickly construct for him a replica of a small American military hospital resort, trying to convince him that he now lives in 1950, that America won the war and that he has lost memory for the last six years—the idea being that he can now safely tell all about the invasion plans, in order for the Germans to prepare themselves. Cracks soon appear in this carefully constructed edifice. (Did not Vladimir Lenin himself, in the last two years of his life, live in a similarly controlled environment, in which, as we now know, Stalin had printed for him a specially prepared single copy of"
      - emphasis [ref=e2775]: Pravda
      - text: ", censored of all news that would tell Lenin about the political struggles going on, with the justification that Comrade Lenin should take a rest and not be excited by unnecessary provocations?)"
    - paragraph [ref=e2776]:
      - text: "What lurks in the background is, of course, the premodern notion of “arriving at the end of the universe”: in the well-known engravings, the surprised wanderers approach the screen/curtain of heaven, a flat surface with painted stars on it, pierce it and reach beyond—it is exactly this that happens at the end of"
      - emphasis [ref=e2777]: The Truman Show
      - text: . No wonder that the last scene of the film, in which Truman steps up the stairs attached to the wall on which the blue sky horizon is painted and there opens up a door, has a distinct Magrittean touch; is it not that, today, this same sensitivity is returning with a vengeance? Do works like Hans Jürgen Syberberg’s
      - emphasis [ref=e2778]: Parsifal
      - text: ", in which the infinite horizon is also blocked by obviously “artificial” rear projections, not signal that the time of the Cartesian infinite perspective is running out, and that we are returning to a kind of renewed medieval pre-perspective universe? Fredric Jameson has perspicuously drawn attention to the same phenomenon in some of Raymond Chandler’s novels and Hitchcock’s films: the shore of the Pacific Ocean in"
      - emphasis [ref=e2779]: Farewell, My Lovely
      - text: functions as a kind of end/limit of the world, beyond which there is an unknown abyss; and it is similar with the vast open valley that stretches out in front of Mount Rushmore’s heads when, on the run from their pursuers Eva-Marie Saint and Cary Grant reach the peak of the
    - paragraph [ref=e2780]:
      - text: monument (and into which Saint almost falls before being pulled up by Cary Grant); and one is tempted to add to this series the famous battle scene at a bridge on the Vietnamese/Cambodian frontier in
      - emphasis [ref=e2781]: Apocalypse Now
      - text: ", where the space beyond the bridge is experienced as the “beyond of our known universe.” And how not to recall that the idea that our Earth is not the planet floating in the infinite space, but a circular opening, a hole, within the endless compact mass of eternal ice, with the sun in its center, was one of the favorite Nazi pseudoscientific fantasies (according to some reports, they even considered putting some telescopes on the Sylt Islands in order to observe America)?"
    - heading "The “really existing” big Other" [level=4] [ref=e2782]
    - paragraph [ref=e2783]:
      - text: What, then, is
      - emphasis [ref=e2784]: The Matrix
      - text: "? Simply the Lacanian “big Other,” the virtual symbolic order, the network that structures reality for us. This dimension of the “big Other” is that of the constitutive alienation of the subject in the symbolic order: the big Other pulls the strings, the subject doesn’t speak, he “is spoken” by the symbolic structure. In short, this “big Other” is the name for the social substance, for all that on account of which the subject never fully dominates the effects of his acts, that is on account of which the final outcome of his activity is always something else with regard to what he aimed at or anticipated. However, it is here crucial to note that, in the key chapters of volume 11 of his"
      - emphasis [ref=e2785]: Seminar
      - text: ", Lacan struggles to delineate the operation that follows alienation and is in a sense its counterpoint, that of separation: alienation in the big Other is followed by the separation"
      - emphasis [ref=e2786]: from
      - text: "the big Other. Separation takes place when the subject takes note of how the big Other is in itself inconsistent, purely virtual, “barred,” deprived of the thing—and fantasy is an attempt to fill out this lack of the Other, not of the subject (i.e. to (re) constitute the consistency of the big Other). For that reason, fantasy and paranoia are inherently linked: paranoia is at its most elementary a belief into an “Other of the Other”, into another Other who, hidden behind the Other of the explicit social texture, programs what appears to us as the unforeseen effects of social life and thus guarantees its consistency: beneath the chaos of market, the degradation of morals, and so on, there is the purposeful strategy of the Jewish plot. This paranoiac stance acquired a further boost with today’s digitalization of our daily lives: when our entire (social) existence is progressively externalized/materialized in the big Other of the computer network, it is easy to imagine an evil programmer erasing our digital identity and thus depriving us of our social existence, turning us into non-persons."
    - paragraph [ref=e2787]:
      - text: Following the same paranoiac twist, the thesis of
      - emphasis [ref=e2788]: The Matrix
      - text: is that this big Other is externalized in the really existing megacomputer. There is—there
      - emphasis [ref=e2789]: has
      - text: to be—a matrix because “things are not right, opportunities are missed, something goes wrong all the time”; that is, the film’s idea is that it is so because there is the matrix that obfuscates the “true” reality that is behind it all. Consequently, the problem with the film is that it is
      - emphasis [ref=e2790]: not
      - text: "“crazy” enough because it supposes another “real” reality behind our everyday reality sustained by the matrix. However, to avoid the fatal misunderstanding: the inverse notion that “all there is is generated by the matrix,” that there is no ultimate reality just an infinite series of virtual realities mirroring themselves in each other, is no less ideological. (In the sequels to"
      - emphasis [ref=e2791]: The Matrix
      - text: ", we shall probably learn that the very “desert of the real” is generated by another matrix.) Much more subversive than this multiplication of virtual universes would have been the multiplication of realities themselves—something that would reproduce the paradoxical danger that some physicians see in recent high accelerator experiments. As is well known, scientists are now trying to construct the accelerator capable of smashing together the nuclei"
    - paragraph [ref=e2792]: "of very heavy atoms at nearly the speed of light. The idea is that such a collision will not only shatter the atom’s nuclei into their constituent protons and neutrons, but will pulverize the protons and neutrons themselves, leaving a “plasma,” a kind of energy soup consisting of loose quark and gluon particles, the building blocks of matter that have never before been studied in such a state, since such a state only existed briefly after the big bang. However, this prospect has given rise to a nightmarish scenario: What if the success of this experiment will create a doomsday machine, a kind of world-devouring monster that will with inexorable necessity annihilate the ordinary matter around itself and thus abolish the world as we know it? The irony of it is that this end of the world, this disintegration of the universe, would be the ultimate irrefutable proof that the tested theory is true, since it would suck all matter into a black hole and then bring about a new universe, to perfectly recreate the big bang scenario."
    - paragraph [ref=e2793]: "The paradox is thus that both versions—(1) a subject freely floating from one to another VR, a pure ghost aware that every reality is a fake; and (2) the paranoiac supposition of the real reality beneath the Matrix—are false: they both miss the real. The film is not wrong in insisting that there is a real beneath the VR simulation; as Morpheus puts to Neo when he shows him the ruined Chicago landscape, “Welcome to the desert of the real.” However, the real is not the “true reality” behind the virtual simulation, but the void that makes reality incomplete/inconsistent, and the function of every symbolic matrix is to conceal this inconsistency—one of the ways to effect this concealment is precisely to claim that, behind the incomplete/inconsistent reality we know, there is another reality with no deadlock of impossibility structuring it."
    - heading "The big Other doesn’t exist" [level=4] [ref=e2794]
    - paragraph [ref=e2795]:
      - text: "“Big Other” also stands for the field of common sense at which one can arrive after free deliberation; philosophically, its last great version is Jürgen Habermas’s communicative community with its regulative ideal of agreement. And it is this big Other that progressively disintegrates today. The expert jargon is presented as an objective insight with which one cannot really argue, and which is simultaneously untranslatable into our common experience. In short, the gap between scientific insight and common sense is unbridgeable, and it is this very gap that elevates scientists into the popular cult-figures of the “subjects supposed to know” (the Stephen Hawking phenomenon). The strict obverse of this objectivity is the way in which, in the cultural matters, we are confronted with the multitude of lifestyles that one cannot translate into each other. This split is perfectly rendered in the phenomenon of cyberspace. Cyberspace was supposed to bring us all together in a global village; however, what effectively happens is that we are bombarded with the multitude of messages belonging to inconsistent and incompatible universes; instead of the global village, the big Other, we get the multitude of “small others,” of tribal particular identifications at our choice. To avoid a misunderstanding: Lacan is here far from relativizing science into just one of the arbitrary narratives, ultimately on equal footing with “politically correct” myths and the like: science"
      - emphasis [ref=e2796]: does
      - text: “touch the real,” its knowledge is “knowledge in the real”; the deadlock resides simply in the fact that scientific knowledge cannot serve as the
      - emphasis [ref=e2797]: symbolic
      - text: "“big Other.” The gap between modern science and the Aristotelian commonsense philosophical ontology is here insurmountable: it emerges already with Galileo, and is brought to the extreme in quantum physics, where we are dealing with the rules/laws that function, although they cannot ever be retranslated into our experience of representable reality."
    - paragraph [ref=e2798]: The theory of risk society and its global reflexivization is right in its emphasis on how,
    - paragraph [ref=e2799]: "today, we are at the opposite end of the classical Enlightenment universalist ideology that presupposed that, in the long run, fundamental questions can be resolved by way of the reference to the “objective knowledge” of the experts: when we are confronted with the conflicting opinions about the environmental consequences of a certain new product (say, of genetically modified vegetables), we search in vain for the ultimate expert opinion. And the point is not simply that the real issues are blurred because science is corrupted through financial dependence on large corporations and state agencies; even in themselves, sciences cannot provide the answer. Ecologists predicted fifteen years ago the death of our forests—the problem is now a too-large increase of wood. Where this theory of risk society is too short is in emphasizing the irrational predicament into which this puts us, the common subjects: we are again and again compelled to decide, although we are well aware that we are in no position to decide that our decision will be arbitrary. Ulrich Beck and his followers refer here to the democratic discussion of all options and consensus building. However, this does not resolve the immobilizing dilemma: Why should the democratic discussion in which the majority participates lead to better result, when, cognitively, the ignorance of the majority remains? The political frustration of the majority is thus understandable: they are called to decide, while, at the same time, receiving the message that they are in no position effectively to decide, to objectively weigh the pros and cons. The recourse to “conspiracy theories” is a desperate way out of this deadlock, an attempt to regain a minimum of what Fredric Jameson calls “cognitive mapping.”"
    - paragraph [ref=e2800]:
      - text: Jodi Dean
      - superscript [ref=e2802]:
        - link "20" [ref=e2803]:
          - /url: "#fn-ch6-20"
      - text: "drew attention to a curious phenomenon clearly observable in the “dialogue of the mutes” between the official (“serious,” academically institutionalized) science and the vast domain of so-called pseudo-sciences, from ufology to those who want to decipher the secrets of the pyramids: one cannot but be struck by how it is the oficial scientists who proceed in a dogmatic dismissive way, while the pseu-doscientists refer to facts and argumentation deprived of the common prejudices. Of course, the answer will be here that established scientists speak with the authority of the big Other of the scientific institution; but the problem is that, precisely, this scientific big Other is again and again revealed as a consensual symbolic fiction. So when we are confronted with conspiracy theories, we should proceed in a strict homology to the proper reading of Henry James’"
      - emphasis [ref=e2804]: The Turn of the Screw
      - text: ": we should neither accept the existence of ghosts as part of the (narrative) reality nor reduce them, in a pseudo-Freudian way, to the “projection” of the heroine’s hysterical sexual frustrations. Conspiracy theories, of course, are not to be accepted as “fact.” However, one should also not reduce them to the phenomenon of modern mass hysteria. Such a notion still relies on the “big Other,” on the model of “normal” perception of shared social reality, and thus does not take into account how it is precisely this notion of reality that is undermined today. The problem is not that ufologists and conspiracy theorists regress to a paranoiac attitude unable to accept (social) reality; the problem is that this reality itself is becoming paranoiac. Contemporary experience again and again confronts us with situations in which we are compelled to take note of how our sense of reality and normal attitude toward it is grounded in a symbolic fiction, that is how the big Other that determines what counts as normal and accepted truth— what is the horizon of meaning in a given society—is in no way directly grounded in “facts” as rendered by the scientific “knowledge in the real.” Let us take a traditional society in which modern science is not yet elevated into the master discourse: if, in its symbolic space, an individual advocates propositions of modern science, he will be dismissed as “madman.” The key point is that it is not enough to say that he is not “really mad,” that it is merely the narrow ignorant society that puts him in this position—in a certain way, being treated as a madman, being excluded from the social big Other effectively"
      - emphasis [ref=e2805]: equals
      - text: being mad. “Madness” is not the
    - paragraph [ref=e2806]:
      - text: designation that can be grounded in a direct reference to “facts” (in the sense that a madman is unable to perceive things the way they really are, since he is caught in his hallucinatory projections), but only with regard to the way an individual relates to the “big Other.” Lacan usually emphasizes the opposite aspect of this paradox in that “the madman is not only a beggar who thinks he is a king, but also a king who thinks he is a king,” that madness designates the collapse of the distance between the symbolic and the real, an immediate identification with the symbolic mandate; or, to take his other exemplary statement, when a husband is pathologically jealous, obsessed by the idea that his wife sleeps with other men, his obsession remains a pathological feature even if it is proven that he is right and that his wife effectively
      - emphasis [ref=e2807]: does
      - text: "sleep with other men. The lesson of such paradoxes is clear: pathological jealousy is not a matter of getting the facts false, but of the way these facts are integrated into the subject’s libidinal economy. However, what one should assert here is that the same paradox should also be performed as it were in the opposite direction: the society (its socio-symbolic field, the big Other) is “sane” and “normal” even when it is proven factually wrong. (Maybe it was in this sense that Lacan designated himself as “psychotic”: he effectively was psychotic insofar as it was not possible to integrate his discourse into the field of the big Other.)"
    - paragraph [ref=e2808]: "One is tempted to claim, in the Kantian mode, that the mistake of the conspiracy theory is somehow homologous to the “paralogism of the pure reason,” to the confusion between the two levels: the suspicion (of the received scientific, social, etc. common sense) as the formal methodological stance, and the positivation of this suspicion in another all-explaining global paratheory."
    - heading "Screening the real" [level=4] [ref=e2809]
    - paragraph [ref=e2810]:
      - text: From another standpoint,
      - emphasis [ref=e2811]: The Matrix
      - text: "also functions as the “screen” that separates us from the real, that makes the “desert of the real” bearable. However, it is here that we should not forget the radical ambiguity of the Lacanian real: it is not the ultimate referent to be covered/gentrified/domesticated by the screen of fantasy; the real is also and primarily the screen itself as the obstacle that always already distorts our perception of the referent, of the reality “out there.” In philosophical terms, therein resides the difference between Immanuel Kant and G. W. F. Hegel: for Kant, the real is the noumenal domain that we perceive “schematized” through the screen of transcendental categories; for Hegel, on the contrary, if we subtract from the thing the distortion of the screen, we lose the thing itself (in religious terms, the death of Christ is the death of the God in himself, not only of his human embodiment)—which is why, for Lacan, who here follows Hegel, the thing in itself is ultimately the gaze, not the perceived object. So, back to"
      - emphasis [ref=e2812]: The Matrix
      - text: ": the matrix itself is the real that distorts our perception of reality."
    - paragraph [ref=e2813]:
      - text: A reference to Levi-Strauss’s exemplary analysis, from his
      - emphasis [ref=e2814]: Structural Anthropology
      - text: ", of the spatial disposition of buildings in the Winnebago, one of the Great Lake’s tribes, might be of some help here. The tribe is divided into two subgroups ("
      - emphasis [ref=e2815]: moieties
      - text: ), “those who are from above” and “those who are from below”; when we ask an individual to draw on a piece of paper, or on sand, the plan of his village (the spatial disposition of cottages), we obtain two quite different answers, depending on his belonging to one or the other subgroup. Both perceive the village as a circle; but for one subgroup, there is within this circle another circle of central houses, so that we have two concentric circles, while for the other subgroup, the circle is split into two by a clear dividing line. In other words, a member of the first subgroup
    - paragraph [ref=e2816]:
      - text: (let us call it “conservative corporatist”) perceives the plan of the village as a ring of houses more or less symmetrically disposed around the central temple, whereas a member of the second (“revolutionary antagonistic”) subgroup perceives his village as two distinct heaps of houses separated by an invisible frontier.
      - superscript [ref=e2818]:
        - link "21" [ref=e2819]:
          - /url: "#fn-ch6-21"
      - text: "The central point of Levi-Strauss is that this example should in no way entice us into cultural relativism, according to which the perception of social space depends on the observer’s group membership: the very splitting into the two “relative” perceptions implies a hidden reference to a constant—not the objective, “actual” disposition of buildings but a traumatic kernel, a fundamental antagonism that inhabitants of the village were unable to symbolize, to account for, to “internalize,” to come to terms with; an imbalance in social relations that prevented the community from stabilizing itself into a harmonious whole. The two perceptions of the village’s-plan are simply two mutually exclusive endeavors to cope with this traumatic antagonism, to heal its wound via the imposition of a balanced symbolic structure. Is it necessary to add that things stand exactly the same with respect to sexual difference: “masculine” and “feminine” are like the two configurations of houses in the Levi-Straussian village? And in order to dispel the illusion that our “developed” universe is not dominated by the same logic, suffice it to recall the splitting of our political space into left and right: a leftist and a rightist behave exactly like members of the opposite subgroups of the Levi-Straussian village. They not only occupy different places within the political space; each of them perceives differently the very disposition of that space, a leftist as the field that is inherently split by some fundamental antagonism, a rightist as the organic unity of a community disturbed only by foreign intruders."
    - paragraph [ref=e2820]:
      - text: "However, Levi-Strauss makes here a further crucial point: since the two subgroups nonetheless form one and the same tribe, living in the same village, this identity somehow has to be symbolically inscribed, but how, if the entire symbolic articulation, all social institutions, of the tribe are not neutral, but are overdetermined by the fundamental and constitutive antagonistic split? Levi-Strauss’s answer is what he ingeniously calls the “zero-institution,” a kind of institutional counterpart to the famous mana, the empty signifier with no determinate meaning, since it signifies only the presence of meaning as such in opposition to its absence: a specific institution that has no positive, determinate function. Its only function is the purely negative one of signaling the presence and actuality of social institution as such, in opposition to its absence, to presocial chaos. It is the reference to such a zero-institution that enables all members of the tribe to experience themselves as such, as members of the same tribe. Is, then, this zero-institution not ideology at its purest, that is the direct embodiment of the ideological function of providing a neutral all-encompassing space in which social antagonism is obliterated, in which all members of society can recognize themselves? And is the struggle for hegemony not precisely the struggle for how this zero-institution will be over-determined, colored by some particular signification? To provide a concrete example: Is not the modern notion of nation such a zero-institution that emerged with the dissolution of social links grounded in direct family or traditional symbolic matrixes, that is, when with the onslaught of modernization, social institutions were less and less grounded in naturalized tradition and more and more experienced as a matter of “contract”?"
      - superscript [ref=e2822]:
        - link "22" [ref=e2823]:
          - /url: "#fn-ch6-22"
      - text: Of special importance is here the fact that national identity is experienced as at least minimally “natural,” as a belonging grounded in “blood and soil,” and as such opposed to the “artificial” belonging to social institutions proper (state, profession, etc.) premodern institutions functioned as “naturalized” symbolic entities (as institutions grounded in unquestionable traditions), and the moment institutions were conceived as social artifacts the need arose for a “naturalized” zero-institution that would serve as their neutral common ground.
    - paragraph [ref=e2824]: And, back to sexual difference, I am tempted to risk the hypothesis that, perhaps, the same
    - paragraph [ref=e2825]:
      - text: "logic of zero-institution should be applied not only to the unity of a society, but also to its antagonistic split: what if sexual difference is ultimately a kind of zero-institution of the social split of humankind, the naturalized minimal zero-difference—a split that, prior to signaling any determinate social difference, signals this difference as such? The struggle for hegemony is then, again, the struggle for how this zero-difference will be overdetermined by other particular social differences. It is against this background that one should read an important, although usually overlooked, feature of Lacan’s schema of the signifier: Lacan replaces the standard Saussurean scheme—above the bar the word"
      - emphasis [ref=e2826]: arbre
      - text: ", and beneath it the drawing of a tree)—with two words above the bar,"
      - emphasis [ref=e2827]: homme
      - text: and
      - emphasis [ref=e2828]: femme
      - text: ", and, beneath the bar, two identical drawings of a door. In order to emphasize the differential character of the signifier, Lacan first replaces Saussure’s single scheme with a signifier’s couple, with the opposition man/woman, with the sexual difference; but the true surprise resides in the fact that, at the level of the imaginary referent,"
      - emphasis [ref=e2829]: there is no reference
      - text: ; we do not get some graphic index of the sexual difference, the simplified drawing of a man and a woman, as is usually the case in most of today’s restrooms, but
      - emphasis [ref=e2830]: the same
      - text: door reproduced twice). Is it possible to state in clearer terms that sexual difference does not designate any biological opposition grounded in “real” properties, but a purely symbolic opposition to which nothing corresponds in the designated objects—nothing but the real of some undefined X that cannot ever be captured by the image of the signified?
    - paragraph [ref=e2831]:
      - text: Back to Levi-Strauss’s example of the two drawings of the village. It is here that one can see in what precise sense the real intervenes through anamorphosis. We have first the “actual,” “objective” arrangement of the houses, and then two different symbolizations that both distort in an amamorphic way the actual arrangement. However, the “real” is here not the actual arrangement, but the traumatic core of the social antagonism that distorts the tribe members’ view of the actual antagonism. The real is thus the disavowed X on account of which our vision of reality is anamorphically distorted. (And, incidentally, this three-level
      - emphasis [ref=e2832]: dispositif
      - text: "is strictly homologous to Freud’s three-level dispositif of the interpretation of dreams: the real kernel of the dream is not the dream’s latent thought, which is displaced/translated into the explicit texture of the dream, but the unconscious desire that inscribes itself through the very distortion of the latent thought into the explicit texture.)"
    - paragraph [ref=e2833]:
      - text: "And the same goes for today’s art scene: in it, the real does not return primarily in the guise of the shocking brutal intrusion of excremental objects, mutilated corpses, shit, and so on. These objects are, for sure, out of place, but in order for them to be out of place, the (empty) place must already be here, and this place is rendered by “minimalist” art, starting from Malevich. Therein resides the complicity between the two opposed icons of high modernism, Malevich’s"
      - emphasis [ref=e2834]: The Black Square on the White Surface
      - text: and Marcel Duchamp’s display of ready-made objects as works of art. The underlying notion of Duchamp’s elevation of an everyday common object into the work of art is that being a work of art is not an inherent property of the object; it is the artist himself who, by preempting the (or, rather,
      - emphasis [ref=e2835]: any
      - text: ) object and locating it at a certain place, makes it the work of art—being a work of art is not a question of why but where. And what Malevich’s minimalist disposition does is simply to render—to
      - emphasis [ref=e2836]: isolate
      - text: "—this place as such, the empty place (or frame) with the protomagic property of transforming any object that finds itself within its scope into the work of art. In short, there is no Duchamp without Malevich: only after the art practice isolates the frame/place as such, emptied of all its content, can one indulge in the ready-made procedure. Before Malevich, a urinal would have remained just a urinal, even if it were to be displayed in the most distinguished gallery."
    - paragraph [ref=e2837]: The emergence of excremental objects that are out of place is thus strictly correlative to the emergence of the place without any object in it, of the empty frame as such. Consequently, the
    - paragraph [ref=e2838]: "real in contemporary art has three dimensions, which somehow repeat within the real the triad of imaginary/symbolic/real. The real is first here as the anamorphotic stain, the anamorphotic distortion of the direct image of reality—as a distorted image, as a pure semblance that “subjectivizes” objective reality. Then, the real is here as the empty place, as a structure, a construction that is never here, experiences as such, but can only be retroactively constructed and has to be presupposed as such—the real as symbolic construction. Finally, the real is the obscene excremental object out of place, the real “itself.” This last real, if isolated, is a mere fetish whose fascinating/captivating presence masks the structural real—in the same way that in Nazi anti-Semitism, the Jew as excremental object is the real that masks the unbearable “structural” real of the social antagonism. These three dimensions of the real result from the three modes to acquire a distance toward “ordinary” reality: one submits this reality to anamorphic distortion; one introduces an object that has no place in it; one subtracts/erases all content (objects) of reality, so that all that remains is the very empty place these objects were filling in."
    - heading "The Freudian touch" [level=4] [ref=e2839]
    - paragraph [ref=e2840]:
      - text: The falsity of
      - emphasis [ref=e2841]: The Matrix
      - text: is perhaps most directly discernible in its designation of Neo as “the One.” Who is “the One”? He who is able to see that our everyday reality is not real, but just a codified virtual universe, and who therefore is able to unplug from it, to manipulate and suspend its rules (fly in the air, stop bullets). Crucial for the function of
      - emphasis [ref=e2842]: this
      - text: "One is his virtualization of reality: reality is an artificial construct whose rules can be suspended or at least rewritten; therein resides the properly paranoiac notion that the One can suspend the resistance of the real (“I can walk through a thick wall, if I really decide it,” i.e., that the impossibility for most of us in doing this is reduced to the failure of the subject’s will). However, it is here that, again, the film does not go far enough: in the memorable scene in the waiting room of the prophetess who will decide if Neo is the One, a child who is seen twisting a spoon with his mere thoughts tells the surprised Neo that the way to do it is not to convince oneself that one can twist the spoon, but to convince myself that"
      - emphasis [ref=e2843]: there is no spoon
      - text: . However, what about oneself? Is it not that the further step should have been to accept the Buddhist proposition that oneself, the subject, does not exist?
    - paragraph [ref=e2844]:
      - text: In order to further specify what is false in
      - emphasis [ref=e2845]: The Matrix
      - text: ", one should distinguish simple technological impossibility from fantasmatic falsity: time travel is (probably) impossible, but fantasmatic scenarios about it are nonetheless “true” in the way they render libidinal deadlocks. The most improbable narrative twists are usually those which are most strongly libidinally invested. Billy Wilder’s underrated"
      - emphasis [ref=e2846]: Fedora
      - text: "tells the story of an elderly Hollywood star who mysteriously retains the beauty of her youthful appearance; a young actor who falls in love with her finally discovers the secret of her eternal youth: the woman who appeared as Fedora is actually her own look-alike daughter who replaced her at a certain point, while the true Fedora lives a secluded life in a lone villa. Fedora organized this replacement (which condemned her daughter to the total identification with the maternal image) so that her stardom will outlive her and continue to shine even after her physical decline. Both the mother and the daughter are thus thoroughly alienated: the mother is excluded from the public space, since her public self is embodied in her daughter; the daughter is allowed to appear in the public space, but deprived of her symbolic identity. Is the very unpalatable, disturbing, taste of the film not due to the fact that it comes all too close to the fantasy? Do we not get here the distilled fantasmatic scenario that underlies Mike Nichols’ much more"
    - paragraph [ref=e2847]:
      - text: successful
      - emphasis [ref=e2848]: The Graduate
      - text: ", whose hero is also libidinally split between a mother (Mrs. Robinson) and her daughter?"
      - superscript [ref=e2850]:
        - link "23" [ref=e2851]:
          - /url: "#fn-ch6-23"
    - paragraph [ref=e2852]:
      - text: Consequently, the problem with
      - emphasis [ref=e2853]: The Matrix
      - text: "is not the scientific naïveté of its tricks: the idea of passing from reality to VR through the phone makes sense, since all we need is a gap/hole through which one can escape. (Perhaps, an even better solution would have been the toilet, as discussed earlier.) The problem is a more radical fantasmatic inconsistency, which erupts most explicitly when Morpheus (the African-American leader of the resistance group who believes that Neo is the One) tries to explain to the still-perplexed Neo what the matrix is, he quite consequently links it to a failure in the structure of the universe:"
    - paragraph [ref=e2854]: "MORPHEUS: It’s that feeling you have had all your life. That feeling that something was wrong with the world. You don’t know what it is but it’s there, like a splinter in your mind, driving you mad. … The matrix is everywhere, it’s all around us, here even in this room. … It is the world that has been pulled over your eyes to blind you from the truth."
    - paragraph [ref=e2855]: "NEO: What truth? MORPHEUS: That you are a slave, Neo. That you, like everyone else, was born into bondage … kept inside a prison that you cannot smell, taste, or touch. A prison of your mind."
    - paragraph [ref=e2856]: "Here the film encounters its ultimate inconsistency: the experience of the lack/inconsistency/obstacle is supposed to bear witness of the fact that what we experience as reality is a fake. However, toward the end of the film, Smith, the agent of the matrix, gives a different, much more Freudian explanation:"
    - paragraph [ref=e2857]: Did you know that the first Matrix was designed to be a perfect human world? Where none suffered, where everyone would be happy? It was a disaster. No one would accept the program. Entire crops [of humans serving as batteries] were lost. Some believed we lacked the programming language to describe your perfect world. But I believe that, as a species, human beings define their reality through suffering and misery. The perfect world was a dream that your primitive cerebrum kept trying to wake up from. Which is why the matrix was redesigned to this, the peak of your civilization.
    - paragraph [ref=e2858]:
      - text: The imperfection of our world is thus at the same time the sign of its virtuality
      - emphasis [ref=e2859]: and
      - text: "the sign of its reality. One could effectively claim that the agent Smith (let us not forget: not a human being as other, but the direct virtual embodiment of the Matrix—the big Other—itself) is the stand-in for the figure of the analyst within the universe of the film: his lesson is that the experience of an insurmountable obstacle is the positive condition for us, as humans, to perceive something as reality. Reality is ultimately that which resists."
    - heading "Staging the Fundamental Fantasy" [level=4] [ref=e2860]
    - paragraph [ref=e2861]: "The further inconsistency concerns death: Why does one “really” die when one dies only in the VR regulated by the matrix? The film provides the obscurantist answer:"
    - paragraph [ref=e2862]: "NEO: If you are killed in the Matrix, you die here [i.e., not only in the VR, but also in real life]? MORPHEUS: The body cannot live without the mind."
    - paragraph [ref=e2863]:
      - text: "The logic of this solution is that your “real” body can only stay alive (function) in conjunction to the mind, that is, to the mental universe into which you are immersed: so if you are in VR and killed there, this death affects also your real body. The obvious opposite solution (you only really die when you are killed in reality) is also too short. The catch is: is the subject"
      - emphasis [ref=e2864]: wholly
      - text: immersed into the Matrix-dominated VR or does he know or at least
      - emphasis [ref=e2865]: suspect
      - text: the actual state of things? If the answer is yes, then a simple withdrawal into a prelapsarian Adamic state of distance would render us immortal
      - emphasis [ref=e2866]: in VR
      - text: and, consequently, Neo who is already liberated from the full immersion in the VR should
      - emphasis [ref=e2867]: survive
      - text: the struggle with the agent Smith that takes place
      - emphasis [ref=e2868]: within
      - text: the VR controlled by the matrix (in the same way he is able to stop bullets, he should also have been able to derealize blows that wound his body).
    - paragraph [ref=e2869]: It is a well-known fact that the “close door” button in most elevators is a totally disfunctional placebo, placed there just to give the individuals the impression that they are somehow participating, contributing to the speed of the elevator journey. When we push this button, the door closes in exactly the same time as when we just pressed the floor button without “speeding up” the process by pressing also the “close door” button. This extreme and clear case of fake participation is an appropriate metaphor of the participation of individuals in our “postmodern” political process. So we are all the time pressing such buttons, and it is the matrix’s incessant activity that coordinates between them and the event that follows (the door closing), while we think the event results from our pushing the button.
    - paragraph [ref=e2870]:
      - text: The final inconsistency concerns the ambiguous status of the liberation of humanity anounced by Neo in the last scene. As the result of Neo’s intervention, there is a
      - emphasis [ref=e2871]: “system
      - emphasis [ref=e2872]: failure
      - text: ” in the matrix; at the same time, Neo addresses people still caught in the matrix as if he is the savior who will teach them how to liberate themselves from the constraints of the matrix—they will be able to break the physical laws, bend metals, fly in the air. However, the problem is that all these “miracles” are possible only if we remain within the VR sustained by the Matrix and merely bend or change its rules. Our “real” status is still that of slaves of the matrix; we, as it were, are merely gaining additional power to change our mental prison rules. So what about exiting from the Matrix altogether and entering the “real reality” in which we are miserable creatures living on the destroyed earth surface?
    - paragraph [ref=e2873]:
      - text: In an Adornian way, one should claim that these inconsistencies
      - superscript [ref=e2875]:
        - link "24" [ref=e2876]:
          - /url: "#fn-ch6-24"
      - text: "are the film’s moment of truth: they signal the antagonisms of our late-capitalist social experience, antagonisms concerning basic ontological pairings like"
      - emphasis [ref=e2877]: reality and pain
      - text: (reality as that which disturbs the reign of the pleasure principle),
      - emphasis [ref=e2878]: freedom and system
      - text: (freedom is only possible within the system that hinders its full deployment). However, the ultimate strength of the film is nonetheless to be located at a different level. Years ago, a series of science fiction films like
      - emphasis [ref=e2879]: Zardoz
      - text: and
      - emphasis [ref=e2880]: Logan’s Run
      - text: "forecast today’s postmodern predicament: the isolated group living an aseptic life in a secluded area longs for the experience of the real world of material decay. Till postmodernism, utopia was an endeavor to break out of the real of historical time into a timeless otherness. With postmodern overlapping of the “end of history” with full disposability of the past in digitalized memory, in this time where we live the atemporal utopia as everyday ideological experience, utopia becomes the longing for the real of history itself, for memory, for the traces of the real past, the attempt to break out of the closed dome into smell and decay of the raw reality."
      - emphasis [ref=e2881]: The Matrix
      - text: "gives the final twist to this reversal, combining utopia with dystopia: the very reality we live in, the atemporal utopia staged here is in place so that we can be effectively reduced to a passive state of living batteries providing the matrix with the energy."
    - paragraph [ref=e2882]: The unique impact of the film thus resides not so much in its central thesis (what we
    - paragraph [ref=e2883]:
      - text: "experience as reality is an artificial virtual reality generated by the matrix, the megacomputer directly attached to all our minds), but in its central image of the millions of human beings leading claustrophobic lives in water-filled cradles, kept alive in order to generate the energy (electricity) for the matrix. So when (some of the) people “awaken” from their immersion into Matrix-controlled virtual reality, this awakening is not the opening into the wide space of the external reality, but first the horrible realization of this enclosure, where each of us is effectively just a foetus-like organism, immersed in the prenatal fluid. The first association that imposes itself here, of course, is the miserable position of human as the self-reflective allegory of the very position of the cinema viewer: Are we all not, when we sit in the cinema, in the position of humans in"
      - emphasis [ref=e2884]: The Matrix
      - text: ", tied to chairs, immersed in the spectacle run by a machine? However, a more appropriate allegory is that of the viewer himself: beneath the illusion that we “just look” at the perceived objects from a safe distance, freely sliding along them, there is the reality of the innumerable ties that bind us to what we perceive. While just looking, we are always hunting among objects, looking for what we desire or fear, endeavoring to recognize some pattern; on the other hand, objects themselves always “stare back,” vie for our attention, throw at us their lures and endeavor to entrap us. As James Elkins explains,"
    - paragraph [ref=e2885]:
      - text: There is also something quietly hypnotic about just looking, something less like hunting and more like dreaming. It is as if the looker were Gulliver, tied to the beach by the Lilliputians but still dreaming he’s in England having a nice time, perhaps out for a stroll, but beginning to notice in some dull way that it’s hard to move—it’s inexplicably difficult to just walk down that street in London, to reach out and turn that doorknob—and then waking up and discovering himself in a much worse nightmare. But unlike Gulliver, I never really wake up. Just looking is like dreaming, but dreaming fitfully, tossing and turning and not knowing quite what’s happening.”
      - superscript [ref=e2887]:
        - link "25" [ref=e2888]:
          - /url: "#fn-ch6-25"
    - paragraph [ref=e2889]:
      - text: Does this phenomenological description of the stance of “just looking” not uncannily echo the dispositif of humans in
      - emphasis [ref=e2890]: The Matrix
      - text: "?"
    - paragraph [ref=e2891]:
      - text: However, one is tempted to reverse the relationship between “illusion” and “reality” implied by this description and to claim that the utter passivity of humans in
      - emphasis [ref=e2892]: The Matrix
      - text: stages the foreclosed fantasy that sustains our conscious experience as active, self-positing subjects—it renders the ultimate perverse fantasy, the notion that we are ultimately instruments of the Other’s (the matrix’s) jouissance, sucked of our life substance like batteries. Therein resides the true libidinal enigma of this
      - emphasis [ref=e2893]: dispositif
      - text: ": Why does the matrix need human energy? The purely energetic solution is, of course, meaningless: the matrix could have easily found another, more reliable, source of energy that would not have demanded the extremely complex arrangement of the virtual reality coordinated for millions of human units. (Another inconsistency is discernible here: Why does the matrix not immerse each individual into her own solipsistic artificial universe? Why complicate matters with coordinating the programs so that the entire humanity inhabits one and the same virtual universe?) The only consistent answer is: the matrix feeds on the human’s jouissance—so we are here back at the fundamental Lacanian thesis that the big Other itself, far from being an anonymous machine, needs the constant influx of jouissance."
    - paragraph [ref=e2894]: "The intimate connection between perversion and cyberspace is today a commonplace. According to the standard view, the perverse scenario stages the “disavowal of castration”: perversion can be seen as a defense against the motif of death and sexuality, against the threat of mortality as well as the contingent imposition of sexual difference. What the pervert enacts"
    - paragraph [ref=e2895]:
      - text: "is a universe in which, as in cartoons, a human being can survive any catastrophe; in which adult sexuality is reduced to a childish game; in which one is not forced to die or to choose one of the two sexes. As such, the pervert’s universe is the universe of pure symbolic order, of the signifier’s game running its course, unencumbered by the real of human finitude. In a first approach, it may seem that our experience of cyberspace fits perfectly this universe: Isn’t cyberspace also a universe unencumbered by the inertia of the real, constrained only by its self-imposed rules? And is it not the same with virtual reality in"
      - emphasis [ref=e2896]: The Matrix
      - text: "? The “reality” in which we live loses its inexorable character, becomes a domain of arbitrary rules (imposed by the matrix) that one can violate if one’s will is strong enough. However, according to Lacan, what this standard notion leaves out of consideration is the unique relationship between the Other and the jouissance in perversion. What, exactly, does this mean?"
    - paragraph [ref=e2897]:
      - text: In “Le prix du progres,” one of the fragments that conclude
      - emphasis [ref=e2898]: The Dialectic of Enlightenment
      - text: ", Theodor Adorno and Max Horkheimer quote the argumentation of the nineteenth century French physiologist Pierre Flourens against medical anesthesia with chloroform: Flourens claims that it can be proven that the anaesthetic works only on our memory’s neuronal network. In short, while we are butchered alive on the operating table, we fully feel the terrible pain, but later, after awakening, we do not remember it. For Adorno and Horkheimer, this, of course, is the perfect metaphor of the fate of reason based on the repression of nature in itself: his body, the part of nature in the subject, fully feels the pain; it is only that, due to repression, the subject does not remember it. Therein resides the perfect revenge of nature for our domination over it: unknowingly, we are our own greatest victims, butchering ourselves alive. Isn’t it also possible to read this as the perfect fantasy scenario of interpassivity, of the Other scene in which we pay the price for our active intervention into the world? There is no active free agent without this fantasmatic support, without this Other scene in which one is totally manipulated by the Other."
      - superscript [ref=e2900]:
        - link "26" [ref=e2901]:
          - /url: "#fn-ch6-26"
      - text: A sadomasochist willingly assumes this suffering as the access to being.
    - paragraph [ref=e2902]: "Perhaps, it is along these lines that one can also explain the obsession of Adolf Hilter’s biographers with his relationship to his niece Geli Raubal who was found dead in Hitler’s Munich appartment in 1931, as if Hitler’s alleged sexual perversion will provide the “hidden variable,” the intimate missing link, the fantasmatic support that would account for his public personality. Here is this scenario as reported by Otto Strasser:"
    - paragraph [ref=e2903]:
      - text: Hitler made her undress [while] he would lie down on the floor. Then she would have to squat down over his face where he could examine her at close range, and this made him very excited. When the excitement reached its peak, he demanded that she urinate on him, and that gave him his pleasure.”
      - superscript [ref=e2905]:
        - link "27" [ref=e2906]:
          - /url: "#fn-ch6-27"
    - paragraph [ref=e2907]: Crucial is here the utter passivity of Hitler’s role in this scenario as the fantasmatic support that pushed him into his frenetically destructive public political activity; no wonder Geli was desperate and disgusted at these rituals.
    - paragraph [ref=e2908]:
      - text: Therein resides the correct insight of
      - emphasis [ref=e2909]: The Matrix
      - text: ": in its juxtaposition of the two aspects of perversion—on the one hand, reduction of reality to a virtual domain regulated by arbitrary rules that can be suspended, and on the other the concealed truth of this freedom, the reduction of the subject to an utter instrumentalized passivity. In other words,"
      - emphasis [ref=e2910]: The Matrix
      - text: "gets it right, but in a wrong (inverted) way. That is, we just have to turn around the terms in order to get at the true state of things: what the film renders as the scene of our awakening into our true situation is effectively its exact opposition, the very fundamental fantasy that sustains our being. We are not dreaming in VR that we are free agents in our everyday common reality,"
    - paragraph [ref=e2911]: while we are actually passive prisoners in the prenatal fluid exploited by the matrix; it is rather that our reality is that of the free agents in the social world we know, but in order to sustain this situation, we have to supplement it with the disavowed, terrible, impending fantasy of being passive prisoners in the prenatal fluid exploited by the matrix. The mystery of the human condition, of course, is why the subject needs this obscene fantasmatic support of his existence.
