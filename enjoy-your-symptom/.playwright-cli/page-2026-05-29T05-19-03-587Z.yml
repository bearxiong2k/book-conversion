      - emphasis [ref=e1370]: Philosophical Fragments
      - text: ", Kierkegaard points out how it is not enough to know all the details of the teacher’s (Christ’s) life, all he has done and all his personal features, in order to be entitled to consider oneself his pupil—such a description of Christ’s features and deeds, even if truly complete, still misses what makes Him an authority; no better is the fare of those who leave out of consideration Christ"
      - emphasis [ref=e1371]: qua
      - text: person and concentrate on His teaching, endeavoring to grasp the meaning of every word he ever uttered—this way, Christ is simply reduced to Socrates, to a simple middleman enabling us the access to the eternal truth. If, consequently, Christ’s authority is contained neither in his personal qualities nor in the content of his teaching, in what
      - emphasis [ref=e1372]: does
      - text: "it reside? The only possible answer is: in the empty space of"
      - emphasis [ref=e1373]: intersection
      - text: between the two sets, that of his personal features and that of his teaching, in the unfathomable X which is “in Christ more than Himself”—in this intersection which corresponds exactly to what Lacan called
      - emphasis [ref=e1374]: objet petit a
