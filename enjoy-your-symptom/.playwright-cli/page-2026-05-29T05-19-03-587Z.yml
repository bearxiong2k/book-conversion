    - heading "3.2 Identity and Authority" [level=3] [ref=e1194]
    - heading "The “exception reconciled in the universal”" [level=4] [ref=e1195]
    - paragraph [ref=e1196]:
      - text: "What one should not miss here is the inherent link between this suspension of the Ethical and Kierkegaard’s notion of authority: by means of his readiness to sacrifice his beloved son, Abraham attests his unconditional submission to God’s authority; if he would judge God’s demand as to its content (“How can He demand of me something so atrocious?”), God’s authority would be submitted to his judgment and thereby devalorized. In other words, God’s proper authority is experienced only in the religious suspension of the Ethical: if God would only be a power which confers supplementary authority on ethical commands, he would lose his proper authority and function as an"
      - emphasis [ref=e1197]: esthetical supplement to the ethics
      - text: ", i.e., a kind of imaginary creature procuring ordinary people, enslaved to imagination, to obey the abstract ethical imperatives. As we have already pointed out, this religious suspension of the Ethical is not its simple external abolition but its inherent condition of possibility, i.e., precisely that which confers on the Ethical its"
      - emphasis [ref=e1198]: identity
      - text: ". The same point can be rendered also in terms of the universal and its constitutive exception: the religious “suspension of the Ethical” refers to an exception which does not relate to the universal as its external transgression but, precisely"
      - emphasis [ref=e1199]: qua
      - text: "exception, founds it:"
    - paragraph [ref=e1200]:
      - text: The rigorous and determinate exception who although he is in conflict with the universal still is an offshoot of it, sustains himself … The exception who thinks the universal in that he thinks himself through; he explains the universal in that he explains himself. Consequently, the exception explains the universal and himself, and if one really wants to study the universal, one only needs to look around for a legitimate exception. The legitimate exception is reconciled in the universal.
      - superscript [ref=e1202]:
        - link "19" [ref=e1203]:
          - /url: "#fn-ch3-19"
    - paragraph [ref=e1204]:
      - text: "At the very point at which Kierkegaard opposes himself most violently to the alleged Hegelian “tyranny of the Universal,” he is of course at his closest to Hegel: what is the Hegelian “concrete Universal” if not the “exception reconciled in the Universal,” i.e., the unity of the abstract Universal with its constitutive exception? The most ill-famed Hegelian example here is of course that of the state"
      - emphasis [ref=e1205]: qua
      - text: "a rational totality of individuals who “made” themselves by means of their labor: the State achieves its actuality in the person of the monarch who is immediately, i.e., in his very nature, what he is in his symbolic determination (one becomes King by birth, not by one’s merits). The King’s exception is therefore an exception “reconciled in the Universal” since it founds it; the abstract, prereligious ethical republicanism"
      - emphasis [ref=e1206]: à la
      - text: Fichte would of course protest against this royal exception, condemning it as an unbearable affront to republican principles, it would call upon us to treat the King the same way we treat other citizens, whereas the Hegelian speculation demonstrates how the very ethical universality, in order to sustain itself, requires an exception, a point at which it is suspended.
      - superscript [ref=e1208]:
        - link "20" [ref=e1209]:
          - /url: "#fn-ch3-20"
      - text: Yet to avoid repeating over again such commonplaces, let us refer to an entirely different domain, to a certain peculiarity of Theodor W. Adorno’s style. As was pointed out by Fredric Jameson, the rhythm of his essays always contains a sudden halt, the refined dialectical analysis is abruptly cut off with a proposition which clearly recalls the good old Marxist invectives (“ideology of late capitalism,” “expression of the class position of big capital,” etc.). Where does the necessity of these repeated lapses into “vulgar sociologism” come from? Far from attesting to Adorno’s theoretical weakness, they present the way thought’s constitutive limit is inscribed within the thought itself; that is to say, such a “vulgar-sociological” reference
    - paragraph [ref=e1210]:
      - text: gestures towards an outside of thinking—whether system itself in the form of rationalization, or totality as a socioeconomic mechanism of domination and exploitation —which escapes representation by the individual thinker or the individual thought. The function of the impure, extrinsic reference is less to interpret, then, than to rebuke interpretation as such and to include within the thought the reminder that it is itself inevitably the result of a system that escapes it and which it perpetuates.
      - superscript [ref=e1212]:
        - link "21" [ref=e1213]:
          - /url: "#fn-ch3-21"
    - paragraph [ref=e1214]:
      - text: The crucial point here is that these “vulgar-sociological” references concern the level of
      - emphasis [ref=e1215]: content
      - text: ", they point toward the “social content” of the interpreted phenomena—thereby, we finally reached the paradox we were aiming at all the time. Dialectical analysis is ultimately analysis of form, it endeavors to dissolve the positivity of its object in the totality of its formal mediations. Within the standard “poststructuralist” perspective, it would therefore seem that such “vulgar” references denote the moment of “closure,” the moment when the given field is “sutured” and blinds itself to its constitutive outside. Jameson’s point is on the contrary that it is"
      - emphasis [ref=e1216]: precisely such “vulgar-sociological” references which keep the field of the analysis of form
      - emphasis [ref=e1217]: open, i.e., which prevent the thought from falling into the
      - emphasis [ref=e1218]: trap of identity and mistaking its
      - emphasis [ref=e1219]: limited form of reflection for the unattainable form of thought as such
      - text: ". In other words, the function of the “vulgar-sociological” reference is to represent within the notional content what eludes notion as such, namely the totality of its own form: in it, that which escapes reflection, the form of its own totality, acquires positive existence under the guise of its opposite. Is it"
    - paragraph [ref=e1220]:
      - text: "necessary to point out how it is precisely here, where Adorno purports to break the closed circle of the Hegelian self-transparency of the notion, that he remains thoroughly Hegelian? More precisely: it is only here that he attains the proper level of the Hegelian speculative identity: what Hegel calls “speculative identity” is precisely the identity of the form, of the totality of dialectical mediation which eludes the thought’s grasp, with some unmediated bit of content referred to in the “vulgar-sociological” gesture (or, in the case of the state, the identity of the state"
      - emphasis [ref=e1221]: qua
      - text: rational totality with the “irrational,” biological positivity of the King’s body). The proper dialectical approach therefore includes its
      - emphasis [ref=e1222]: own suspension
      - text: ", a point of exception which is constitutive of the dialectical analysis."
    - paragraph [ref=e1223]:
      - text: "That is the ill-famed dialectical “coincidence of the opposites”: the pure form of dialectical mediation maintains its distance from the positive content it mediates only by means of its coincidence with the most inert, “nonmediated,” remainder of this content; and the Lacanian “Real” ultimately denotes such a nonmediated leftover which serves as a support of the symbolic structure in its formal pureness."
      - superscript [ref=e1225]:
        - link "22" [ref=e1226]:
          - /url: "#fn-ch3-22"
      - text: Yet the paradox of identity resides in the fact that it is precisely through this remainder of the Real—through this supplementary remark which maintains its nonidentity and openness—that the system (Hegelian state, Adorno’s theoretical edifice)
      - emphasis [ref=e1227]: achieves its identity with itself
      - text: ": as Hegel puts it, a state without the monarch at its head is not actually a state, and the same goes for Adorno’s theory which, devoid of the “vulgar-sociological” sallies, would remain a maze of disconnected associations."
    - heading "The vicious circle of dialectics and its remainder" [level=4] [ref=e1228]
    - paragraph [ref=e1229]:
      - text: By means of taking into account this paradox of the Hegelian notion of identity, one can prove false the extremely influential critique of the logic of self-reflection proposed in the 1960s by Dieter Henrich; its basic argument is that the self-reflective model of self-consciousness necessarily implicates us in a vicious circle.
      - superscript [ref=e1231]:
        - link "23" [ref=e1232]:
          - /url: "#fn-ch3-23"
      - text: "According to Henrich, the self-reflective model of self-consciousness conceives the relationship of consciousness to itself as that of mirroring self-objectivization: the consciousness makes itself its own object; this capacity to make oneself one’s own object by way of reflection distinguishes man from animal. In self-consciousness, the I splits into the I-subject and the I-object which are at the same time identical (self-consciousness consists in their coincidence). Problems arise as soon as we consider the fact that self-consciousness does not exist prior to self-reflection—the “object” comprehended by consciousness in the act of self-consciousness is the very consciousness conscious of itself. This way, one necessarily gets entangled in an impasse: if what the I comprehends, makes its object in the act of self-reflection is already in itself self-consciousness, then self-reflection does not explain self-consciousness, does not render its inherent structure, since it presupposes it as something already there; if, on the contrary, the I-object is not in itself self-consciousness, then the I-subject and the I-object are not identical and we do not have to do with self-consciousness … Self-reflection is thus either superfluous (it presupposes as already there what it purports to explain, i.e., self-consciousness) or it destroys the phenomenon to be explained (insofar as it implies the nonidentity of the I-subject and the I-object)."
    - paragraph [ref=e1233]: "Against the background of this critique, Henrich redefines the standard textbook image of the relationship between Fichte’s and Hegel’s philosophy: the fundamental insight of Fichte’s thought, its permanent living source, is an awareness of this impasse of self-reflection, and his entire philosophical development bears witness to the effort to find a way out of it. The successive stages of Fichte’s philosophy, the new and newer drafts of the “doctrine of science"
    - paragraph [ref=e1234]:
      - text: (
      - emphasis [ref=e1235]: Wissenschaftslehre
      - text: "),” are so many attempts to tackle an insistent traumatic kernel which “returns as the same.” Fichte first endeavors to extricate himself from it by means of the notion of the pure self-positing of the I: he conceives the identity of the I with itself (I = I) as the absolute starting point of philosophy. The “I” is an activity which coincides absolutely with its own self-positing, it “is” only insofar as it posits itself by means of its consciousness of itself; as such, it is the original unity of subject and object, of being and doing. In more contemporary terms, one could say that what Fichte aims at here is the notion of a pure performative: I = I designates the absolute coincidence of the enunciated (the propositional content) with its process of enunciation, i.e., a content which consists of nothing but the act of its own positing. Here, however, one encounters the first difficulty: the absolute identity of the I with itself"
      - emphasis [ref=e1236]: qua
      - text: self-positing, this point of pure self-transparency, is something that forever eludes the empirical I, since the latter is forever entangled in a network of relations to the “non-I,” to the objects around it—in Hegelese,
      - emphasis [ref=e1237]: the self-positing
      - text: I
      - emphasis [ref=e1238]: remains forever a
      - emphasis [ref=e1239]: presupposition
      - text: ": something that is never “posited as such,” present in the transparency of an actual I. What right do we have then to attribute to this pure performative self-positing the character of an “I,” if, precisely, it never possesses its fundamental characteristic, the transparent self-presence? In his late philosophy, Fichte draws the appropriate conclusion from the fact that the point which is forever inaccessible to the actual subject is the very point of his absolute self-identity, and conceives the absolute as transsubjective, as a foundation out of which the I emerges … It is not difficult to see how this failed encounter (I = I is first presupposed, then dethroned and conceived as a moment of some trans-subjective absolute) repeats the fundamental deadlock of self-reflection."
      - superscript [ref=e1241]:
        - link "24" [ref=e1242]:
          - /url: "#fn-ch3-24"
    - paragraph [ref=e1243]:
      - text: "The gist of Henrich’s critique of Hegel is that this insight into the constitutive impasse of self-reflection gets lost with Hegel: Hegel reaffirms self-reflection as “absolute,” as a circular movement capable of positing its own presuppositions, of “sublating” them without rest."
      - superscript [ref=e1245]:
        - link "25" [ref=e1246]:
          - /url: "#fn-ch3-25"
      - text: "The price Hegel has to pay for this is numerous nonthematized equivocations, hidden shifts of meaning, which blur the vicious circle of the movement of reflection: according to Henrich, the only way out of this vicious circle is to presuppose a kind of “self-acquaintance (Selbstver-trautheit)” of the I which precedes self-reflection, i.e., to avoid reducing self-consciousness to self-reflection. However, the notion of dialectical identity whose contours we already designated enables us to point out exactly where this criticism misfires: the vicious circle of reflection cannot be an argument"
      - emphasis [ref=e1247]: against
      - text: Hegel, since Hegel—like Henrich—is not ignorant of the necessity to presuppose some surplus which eludes dialectical mediation. Their crucial difference lies elsewhere, it concerns the fact that
      - emphasis [ref=e1248]: Hegel locates this surplus on the opposite
      - emphasis [ref=e1249]: end from
      - emphasis [ref=e1250]: Henrich
      - text: ": not in an inner “self-acquaintance,” prior to reflective, self-objectivizing distance of the subject from itself, but in a radically contingent externality of some material, inert, nonrational remainder. This object is the correlate of the subject: it confers on the subject the minimum of consistency and thereby prevents the subject from collapsing into the vicious circle’s abyss. Let us recall again the above-mentioned examples: Adorno’s dialectical edifice would crumble into its vicious circle without the support in the “dogmatic,” “vulgar-sociological” propositions; the state"
      - emphasis [ref=e1251]: qua
      - text: a rational totality would disintegrate without the body of the monarch
      - emphasis [ref=e1252]: qua
      - text: "an idiotic remainder of nonmediated nature … All these (and numerous other) examples follow the same fundamental logic whose most concise expression is the Hegelian paradox of phrenology “the Spirit is a Bone”:"
      - superscript [ref=e1254]:
        - link "26" [ref=e1255]:
          - /url: "#fn-ch3-26"
      - text: the true speculative identity is not a sublation of all particular moments in a spiritual totality, but the identity of this very totality of rational mediation with an inert, immediate, nonrational “piece of the real”—what Lacan would call the collapse of the big Other (the rational symbolic order) into petit a, the inert leftover.
    - paragraph [ref=e1256]:
      - text: In other words,
      - emphasis [ref=e1257]: rational totality clings to an inert “piece of the real” precisely insofar as it is
      - emphasis [ref=e1258]: caught in a vicious circle
      - text: . For that reason, Hegel converts the Fichtean I = I into the absolute contradiction Spirit = Bone, i.e., into the
      - emphasis [ref=e1259]: point of absolute nonmirroring
      - text: ", the identity of the subject"
      - emphasis [ref=e1260]: qua
      - text: "void with the element in which he cannot recognize his mirror image, with the inert leftover, the bone, the rock, the hindrance which prevents the absolute self-transparency of the pure performative: the subject is posited as correlative to an object which precisely cannot be conceived as the subject’s objectivization. And what Henrich calls “prereflective self-acquaintance” designates simply the gesture of “subjectivization” by means of which the subject “forgets” how his existence clings on an external piece of contingent reality and thereby establishes himself as self-present inwardness. The step accomplished by Hegel is then to conceive the Fichtean deadlock as its own solution: it is not difficult to notice how the paradoxical logic of this inert surplus feature repeats the deadlock of reflection: this feature is stricto"
      - emphasis [ref=e1261]: sensu
      - text: superfluous (added to the reflective totality of self-mediation), yet simultaneously a foreign body which undermines its consistency.
    - heading "Identity and fantasy" [level=4] [ref=e1262]
    - paragraph [ref=e1263]: "Thereby we reach the paradox of a universal feature (quality) the suspension of which maintains its field—the paradox which is ultimately that of identity itself: the identity of a state resides in the monarch, this “irrational” supplement which “sticks out” and suspends its essential quality (its rational character); the identity of a dialectical analysis resides in the “vulgar” lapses which suspend its essential quality (the delicacy of dialectical stratagems) … Therein consists the crucial shift that has to be made with reference to the “deconstructionist” commonplaces about identity: indeed, identity is impossible, inherently hindered, its constitutive gap is always already sutured by some supplementary feature—yet one should add that identity “itself” is ultimately nothing but a name for such a supplementary feature which “sticks out” and suspends the essential quality of the domain whose identity it constitutes. It is therefore not sufficient to present “identity of the opposites” as a paradoxical kind or species of identity: identity as such is ultimately always already “identity of the opposites.”"
    - paragraph [ref=e1264]:
      - text: And is not the same paradox of identity at work in the way
      - emphasis [ref=e1265]: fantasy
      - text: "guarantees the consistency of a socio ideological edifice? That is to say, “fantasy” designates an element which “sticks out,” which cannot be integrated into the given symbolic structure, yet which, precisely as such, constitutes its identity. The psychoanalytic clinic detects its fundamental matrix in the so-called “pregenital” (anal) object: according to Freudian orthodoxy, the fixation on it prevents the emergence of the “normal” (genital) sexual relationship; in the Lacanian theory, however, the “object is not what hinders the advent of the sexual relationship, as a kind of perspective error makes us believe. The object is on the contrary a filler, that which fills in the relationship which does not exist and bestows on it its fantasmatic consistency.”"
      - superscript [ref=e1267]:
        - link "27" [ref=e1268]:
          - /url: "#fn-ch3-27"
      - text: Sexual relationship is in itself impossible, hindered, and the object does nothing but materialize this “original” impossibility, this inherent hindrance; the “perspective error” consists in conceiving it as a stumbling block to the emergence of the “full” sexual relationship—as if, without this troublesome intruder, the sexual relationship would be possible in its intact fullness. What we encounter here is the paradox of the
      - emphasis [ref=e1269]: sacrifice
      - text: "in its purest: the illusion of the sacrifice is that renunciation of the object will render accessible the intact whole. In the ideological field, this paradox finds its clearest articulation in the anti-Semitic concept of the Jew: the Nazi has to sacrifice the Jew in order to be able to maintain the"
    - paragraph [ref=e1270]:
      - text: illusion that it is only the “Jewish plot” which prevents the establishment of the “class relationship,” of society as a harmonious, organic whole. Which is why, in the last pages of
      - emphasis [ref=e1271]: Seminar XI
      - text: ", Lacan is fully justified to designate the Holocaust as a “gift of reconciliation”: is not the Jew the anal object"
      - emphasis [ref=e1272]: par excellence
      - text: ", i.e., the partial object-stain which disturbs the harmony of the class relationship? One is tempted, here, to paraphrase the above-quoted Jacques-Alain Miller’s proposition: “The Jew is not what hinders the advent of the class relationship, as the anti-Semitic perspective error makes us believe. The Jew is on the contrary a filler, that which fills in the relationship which does not exist and bestows on it its fantasmatic consistency.”"
      - superscript [ref=e1274]:
        - link "28" [ref=e1275]:
          - /url: "#fn-ch3-28"
      - text: "In other words, what appears as the hindrance to society’s full identity with itself is actually its positive condition: by transposing onto the Jew the role of the foreign body which introduces in the social organism disintegration and antagonism, the fantasy-image of society"
      - emphasis [ref=e1276]: qua
      - text: consistent, harmonious whole is rendered possible.
    - paragraph [ref=e1277]:
      - text: "One of the lessons to be drawn from this notion of antagonism is that the concept of ideology must be disengaged from the “representationalist” problematic:"
      - emphasis [ref=e1278]: ideology has nothing
      - emphasis [ref=e1279]: to do with “illusion
      - text: ",” with a wrong, distorted representation of its social content. To put it succinctly: a political standpoint can be quite accurate (“true”) as to its objective content and yet thoroughly ideological, and vice versa, the idea it gives of its social content can prove totally wrong, and yet there is absolutely nothing “ideological” about it. Let us take the case of the “vanishing mediator” of the process of democratization in the former East Germany,"
      - emphasis [ref=e1280]: Neues
      - emphasis [ref=e1281]: Forum. Neues Forum
      - text: "consisted of groups of passionate intellectuals who “took socialism seriously” and were prepared to put all at stake in order to destroy the compromised system and replace it with the utopian “third way” beyond capitalism and “really existing” socialism. Their sincere belief and insistence that they were not working for the restoration of Western capitalism, of course, proved to be nothing but an insubstantial illusion: with regard to the “factual truth,” the position of"
      - emphasis [ref=e1282]: Neues Forum
      - text: —the position of conceiving the disintegration of the Communist regime as the opening up of a possibility to invent some new form of social space that would reach beyond the confines of capitalism—was doubtless illusory; however, we could say that precisely as such (as a thorough illusion without substance) it was
      - emphasis [ref=e1283]: stricto
      - emphasis [ref=e1284]: sensu nonidelogical
      - text: .
      - emphasis [ref=e1285]: Neues Forum
      - text: was opposed by the forces who put all their bets on the quickest possible annexation to West Germany, i.e., on the inclusion of their country into the world capitalist system; for them, the people around Neues Forum were nothing but a bunch of heroic daydreamers. This position proved accurate—
      - emphasis [ref=e1286]: yet it is nonetheless thoroughly
      - emphasis [ref=e1287]: ideological
      - text: ". Why? The conformist adoption of the West German model implied the ideological belief in the unproblematic, nonantagonistic functioning of late-capitalist “social state,” whereas the first stance, although illusionary as to its factual content (its “enunciated”), by means of its “scandalous” and exorbitant position of enunication attested to an awareness of the antagonism that pertains to late capitalism. This is one of the ways to conceive the Lacanian thesis according to which truth has the structure of a fiction: in those confused months of the passage of “really existing socialism” into capitalism,"
      - emphasis [ref=e1288]: the fiction of a “third way”
      - emphasis [ref=e1289]: was the only point at which social antagonism was not obliterated
      - text: ". Therein consists one of the tasks of the “postmodern” criticism of ideology: to designate the elements within an existing social order which—in the guise of “fiction,” i.e., of the “utopian” narratives of possible but failed alternative histories—point toward its antagonistic character and thus “estrange” us to the self-evidence of its established identity."
    - paragraph [ref=e1290]:
      - text: "What we have to be attentive to is the inherently authoritarian character of this feature, that is to say, the inherent link of identity with authority: the monarch performs his role as a figure of pure authority, as the one who, by means of his “Such is my will!” i.e., of his abysmal decision, cuts through the endless series of"
      - emphasis [ref=e1291]: pro et contra
      - text: . And does not the same hold for
    - paragraph [ref=e1292]:
      - text: "Adorno’s “vulgar-sociological” outbursts, do they not perform the same authoritarian gesture of reference to the Marxist dogma which breaks the endless thread of dialectical argumentation? It is by no means accidental that tautologies—statements which purport the identity with itself of its subject—are the clearest example of ascertaining authority: “Law is law!” “It is so because I say so!” etc.—identity becomes “authoritarian” the moment we overlook, in a kind of illusory perspective, that it is nothing but the inscription of pure difference, of a lack."
      - superscript [ref=e1294]:
        - link "29" [ref=e1295]:
          - /url: "#fn-ch3-29"
      - text: "In this sense, authority is far from being a kind of leftover of the pre-Enlightenment: it is inscribed in the very heart of the Enlightenment project. Not till the Enlightenment did the structure of authority come into sight as such, against the background of rational argumentation as the foundation of enlightened knowledge. It is a symptomatic fact that the first to render visible the outlines of “pure” authority was precisely Kierkegaard, one of the great critics of Hegel."
    - paragraph [ref=e1296]:
      - text: What one should bear in mind here is that, according to Lacan,
      - superscript [ref=e1298]:
        - link "30" [ref=e1299]:
          - /url: "#fn-ch3-30"
      - text: "Antigone’s defense against Creon’s accusations ultimately consists in precisely such an “authoritarian” tautology: she does not counter Creon’s arguments with the arguments of her own (she does"
      - emphasis [ref=e1300]: not
      - text: oppose to Creon’s law of
      - emphasis [ref=e1301]: polis
      - text: the subterranean divine law protecting the right of the deceased, as Hegel wrongly assumed), she simply interrupts his flow of argumentation by insisting that “It is so because it is so!” that “My brother is my brother!” … The best way to render visible the logic of her defense is perhaps to evoke Saul Kripke’s notion of the “rigid designator,” of a signifier which designates the same object “in all possible worlds,” i.e., even if all of its positive properties were changed.
      - superscript [ref=e1303]:
        - link "31" [ref=e1304]:
          - /url: "#fn-ch3-31"
      - text: "The “rigid designator” thus fixes the real kernel of the designated object, what, in it, “always returns to its place” (Lacan’s definition of the real)—in the case of Polynices, it designates his absolute individuality that remains the same beyond the changing properties that characterize his person (his good or evil deeds). The “law” in the name of which Antigone insists on Polynices’s right to burial is this law of the “pure” signifier, prior to every positive law that judges our deeds: it is the law of the Name which fixes our identity beyond the eternal flow of generation and corruption."
      - superscript [ref=e1306]:
        - link "32" [ref=e1307]:
          - /url: "#fn-ch3-32"
    - heading "Socrates versus Christ" [level=4] [ref=e1308]
    - paragraph [ref=e1309]:
      - text: The crucial text in which Kierkegaard delineates the break between the traditional and the “modern” (i.e., for him, Christian) status of knowledge is his
      - emphasis [ref=e1310]: Philosophical Fragments
      - text: ". At first sight, this text does not belong to philosophy but rather to an intermediate domain between philosophy proper and theology: it endeavors to delimitate the Christian religious position from the Socratic philosophical one. Yet its externality to philosophy is of the same kind as that of Plato’s"
      - emphasis [ref=e1311]: Symposion
      - text: ": it circumscribes the discourse’s frame, i.e., the intersubjective constellation, the relationship toward the teacher, toward authority, which renders possible the philosophical (or Christian) discourse. In this sense, the"
      - emphasis [ref=e1312]: Fragments
      - text: are to be read as the
      - emphasis [ref=e1313]: repetition
      - text: of Plato’s
      - emphasis [ref=e1314]: Symposion
      - text: "(repetition in the precise meaning this term receives with Kierkegaard): their aim is to perform Plato’s gesture in new circumstances, within the new status that knowledge acquired with the advent of Christianity. Both texts,"
      - emphasis [ref=e1315]: Symposion
      - text: as well as
      - emphasis [ref=e1316]: Philosophical Fragments
      - text: ", are texts on love and transference which form the basis of every relationship with the teacher"
      - emphasis [ref=e1317]: qua
      - text: "“subject supposed to know.” Kierkegaard’s starting point is that all of philosophy from Plato to Hegel is “pagan,” i.e., embedded in the pagan (pre-Christian) logic of knowledge and remembrance: our life as that of finite individuals by definition takes place in an aftermath, since all that really matters has always already happened; up till the Hegelian"
      - emphasis [ref=e1318]: Er-Innerung
      - text: ", knowledge is therefore always conceived as a"
    - paragraph [ref=e1319]:
      - text: retrospective remembrance/internalization, a return to the “timelessly past being,” “
      - emphasis [ref=e1320]: das zeitlos
      - emphasis [ref=e1321]: gewesene Sein
      - text: "” (Hegel’s determination of essence). True, the transient, finite subjects attain eternal truth at some determinate instant in the time of their lives; once the subject enters the truth, however, this instant is abrogated, cast away like a useless ladder. Which is why Socrates is quite justified in comparing himself with a midwife: his job is just to enable the subject to give birth to the knowledge already present in him, so the supreme recognition one can grant to Socrates is to say he was forgotten the moment we found ourselves face to face with truth. With Christ, it is just the opposite which holds: the Christian truth, no less eternal than the Socratic one, is indelibly branded with an historical event, the moment of God’s incarnation. Consequently, the object of Christian faith is not the teaching, but the teacher: a Christian believes in Christ as a person, not immediately in the content of his statements; Christ is not divine because He uttered such deep truths, His words are true because they were spoken by Him. The paradox of Christianity consists in this bond linking the eternal truth to an historical event: I can know eternal truth only insofar as I"
      - emphasis [ref=e1322]: believe
      - text: that the miserable creature who two thousand years ago walked around Palestine was God.
    - paragraph [ref=e1323]:
      - text: Motifs which, according to the philosophical common knowledge, define the post-Hegelian reversal—the affirmation of the event, of the instant, as opposed to the timeless, immovable truth; the priority of existence (of the fact
      - emphasis [ref=e1324]: that
      - text: a thing exists) over essence (over
      - emphasis [ref=e1325]: what
      - text: this thing is); etc.—acquire here their ultimate background. That which is “eternal” in a statement is its meaning, abstracted from the event of its enunciation, from its enunciation
      - emphasis [ref=e1326]: qua
      - text: "event: within the Socratic perspective, the truth of a statement resides in its universal meaning; as such, it is in no way affected by its position of enunciation, by the place from which it was enunciated. The Christian perspective, on the other hand, makes the truth of a statement dependent on the event of its enunciation: the ultimate guarantee of the truth of Christ’s words is their utterer’s authority, i.e., the fact"
      - emphasis [ref=e1327]: that
      - text: they were uttered by Christ, not the profundity of their content, i.e.,
      - emphasis [ref=e1328]: what
      - text: "they say:"
    - paragraph [ref=e1329]:
      - text: When Christ says, “There is an eternal life”; and when a theological student says, “There is an eternal life”; both say the same thing, and there is no more deduction, development, profundity, or thoughtfulness in the first expression than in the second; both statements are, judged aesthetically, equally good. And yet there is an eternal qualitative difference between them! Christ, as God-Man, is in possession of the specific quality of authority.
      - superscript [ref=e1331]:
        - link "33" [ref=e1332]:
          - /url: "#fn-ch3-33"
    - paragraph [ref=e1333]:
      - text: "Kierkegaard develops this “qualitative difference” apropos of the abyss that separates a “genius” from an “apostle”: “genius” represents the highest intensification of the immanent human capacities (wisdom, creativity, and so forth), whereas an “apostle” is sustained by a transcendent authority which a genius lacks. This abyss is best exemplified by the very case where it seems to disappear, namely the poetic exploitation of religious motifs: Richard Wagner, for example, in his"
      - emphasis [ref=e1334]: Parsifal
      - text: ", used Christian motifs as means to invigorate his artistic vision; he thereby"
      - emphasis [ref=e1335]: estheticized
      - text: them in the strict Kierkegaardian sense of the term, i.e., made use of them with their “artistic efficacy” in mind—religious rituals like the uncovering of the Grail fascinate us with their breathtaking beauty, yet their religious authority is suspended, bracketed.
      - superscript [ref=e1337]:
        - link "34" [ref=e1338]:
          - /url: "#fn-ch3-34"
    - heading "The paradoxes of authority" [level=4] [ref=e1339]
    - paragraph [ref=e1340]: If, however, the truth claim of a statement cannot be authorized by means of its inherent
    - paragraph [ref=e1341]:
      - text: "content, what is then the foundation of its authority? Kierkegaard is here quite outspoken:"
      - emphasis [ref=e1342]: the
      - emphasis [ref=e1343]: ultimate and only support of a statement of authority is its own act of enunciation
      - text: ": “But now how can an Apostle prove that he has authority? If he could prove it physically, then he would not be an Apostle. He has no other proof than his own statement. That has to be so; for otherwise the believer’s relationship to him would be direct instead of being paradoxical.”"
      - superscript [ref=e1345]:
        - link "35" [ref=e1346]:
          - /url: "#fn-ch3-35"
      - text: "When authority is backed up by an immediate physical compulsion, what we are dealing with is not authority proper (i.e., symbolic authority), but simply an agency of brute force: authority proper is at its most radical level always"
      - emphasis [ref=e1347]: powerless
      - text: ", it is a certain “call” which “cannot effectively force us into anything,” and yet, by a kind of inner compulsion, we feel obliged to follow it unconditionally. As such, authority is inherently paradoxical; first, as we have just seen, authority is vested in a certain statement insofar as the immanent value of its content is suspended—we obey a statement of authority because it has authority, not because its content is wise, profound, etc.:"
    - paragraph [ref=e1348]:
      - emphasis [ref=e1349]: Authority is a specific quality which, coming from elsewhere, becomes qualitatively
      - emphasis [ref=e1350]: apparent when the content of the message or of the action is posited as indifferent
      - text: . … To be prepared to obey a government department if it can be clever is really to make a fool of it. To honor one’s father because he is intelligent is impiety.
      - superscript [ref=e1352]:
        - link "36" [ref=e1353]:
          - /url: "#fn-ch3-36"
    - paragraph [ref=e1354]:
      - text: "Yet at the same time Kierkegaard seems to purport the exact opposite of this priority of the teacher over the teaching: an apostle—a person in whom God’s authority is vested—is reduced to his role of a carrier of some"
      - emphasis [ref=e1355]: foreign
      - text: "message, he is totally abrogated as a person, all that matters is the content of the message:"
    - paragraph [ref=e1356]:
      - text: "Just as a man, sent into the town with a letter, has nothing to do with its contents, but has only to deliver it; just as a minister who is sent to a foreign court is not responsible for the content of the message, but has only to convey it correctly: so, too, an Apostle has really only to be faithful in his service, and to carry out his task. Therein lies the essence of an Apostle’s life of self-sacrifice, even if he were never persecuted, in the fact that he is “poor, yet making many rich.”"
      - superscript [ref=e1358]:
        - link "37" [ref=e1359]:
          - /url: "#fn-ch3-37"
    - paragraph [ref=e1360]:
      - text: An apostle therefore corresponds perfectly to the function of the signifying
      - emphasis [ref=e1361]: Repräsentanz;
      - text: "the invalidation of all “pathological” features (his psychological propensities, etc.) makes out of him a pure representative whose clearest case is a diplomat:"
    - paragraph [ref=e1362]:
      - text: We mean by representatives what we understand when we use the phrase, for example, the representative of France. What do diplomats do when they address one another? They simply exercise, in relation to one another, that function of being pure representatives and, above all, their own signification must not intervene. When diplomats are addressing one another, they are supposed to represent something whose signification, while constantly changing, is, beyond their own persons, France, Britain, etc. In the very exchange of views, each must record only what the other transmits in his pure function as signifier, he must not take into account what the other is,
      - emphasis [ref=e1363]: qua
      - text: presence, as a man who is likable to a greater or lesser degree. Interpsychology is an impurity in this exchange. The term
      - emphasis [ref=e1364]: Repräsentanz
      - text: is to be taken in this sense. The signifier has to be understood in this way, it is at the opposite pole from signification.
      - superscript [ref=e1366]:
        - link "38" [ref=e1367]:
          - /url: "#fn-ch3-38"
    - paragraph [ref=e1368]: "Therein consists the paradox of authority: we obey a person in whom authority is vested irrespective of the content of his statements (authority ceases to be what it is the moment we"
    - paragraph [ref=e1369]:
