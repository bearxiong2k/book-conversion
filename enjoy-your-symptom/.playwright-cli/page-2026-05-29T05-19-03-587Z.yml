    - paragraph [ref=e1126]:
      - text: In the
      - emphasis [ref=e1127]: esthetical
      - text: stage, the impossibility of repetition is experienced under the guise of the imaginary deadlocks that the subject encounters when he endeavors to resuscitate the fullness of past pleasures. In his
      - emphasis [ref=e1128]: Repetition
      - text: ", Kierkegaard exemplifies this deadlock by means of the failure of his (i.e., the narrator’s) return to Berlin: every attempt to restore some past intense experience is doomed to result in an anticlimax—even if, on the level of “reality,” the thing is exactly the same (Kierkegaard goes to the same restaurants and theaters, visits the same friends), it now leaves him cold and indifferent …"
    - paragraph [ref=e1129]:
      - text: In the
      - emphasis [ref=e1130]: ethical
      - text: "stage, repetition assumes the form of the universal norms of conduct: instead of chasing the elusive moments of esthetical pleasure, we rely upon the certitude of repetition. Repetition is a sign of maturity when the subject has learned to avoid the twin traps of impatient hope in the New and of nostalgic memory of the Old: we find satisfaction in the"
    - paragraph [ref=e1131]:
      - text: "return of the Same, like the happy marital couple who has overcome the yearning for exotic adventures, yet is still able to avoid melancholic remembrance of past passions. The deadlock which pushes Kierkegaard toward the next (religious) stage is of course the experience of how, at this stage too, repetition is impossible: the ideal point at which we overcome the futile yearning for the New without falling into a nostalgic backward-directed attitude, is never present as such. The structure of subjective time is such that, from hopeful expectations, from “too early,” we are thrown all of a sudden into melancholic remembrance, into “too late.” In other words, the self-referential paradox consists in the fact that the ideal point between hope and memory is"
      - emphasis [ref=e1132]: present precisely and only in the mode of hope or memory
      - text: ": in youthful zeal we hope to find peace in a beloved spouse one never gets tired of; in old age we remember the happy time fulfilled with the reliable rhythm of repetition …"
    - paragraph [ref=e1133]:
      - text: The most succinct determination of the status of repetition in the
      - emphasis [ref=e1134]: religious
      - text: stage is of course its
      - emphasis [ref=e1135]: reflection into itself
      - text: ": insofar as repetition is not possible, it is possible to repeat this very experience of impossibility, i.e., the failure to attend the Object. This is how Lacan conceives the difference between repetition of a signifier and repetition"
      - emphasis [ref=e1136]: qua
      - text: "traumatic encounter with the Real: the repetition of a signifier repeats the symbolic"
      - emphasis [ref=e1137]: trait unaire
      - text: ", the mark to which the object is reduced, and thus constitutes the ideal order of the Law, whereas “traumatism” designates precisely the reemergent failure to integrate some “impossible” kernel of the Real. What Kierkegaard has in mind here is, ultimately, the well-known opposition of two attitudes to history: when we are thrown into historical “becoming,” caught in its flow, we experience the abyss of history’s “openness,” we are forced to choose; afterward, when we cast a retrospective gaze on it, its course loses the character of “becoming” and appears as the manifestation of some “eternal” necessity. It is therefore in the name of this abyss of free decision that Kierkegaard turns against the retrospective “comprehension of history” which endeavors to account for the necessity of what took place: those who “comprehend history” are nothing but “backward-turned prophets,” they are no better than those who pass forward prophecies—both are forgetful of the free decision involved in the act of becoming: if we observe the past as necessary, we forget that it is something that came into existence."
      - superscript [ref=e1139]:
        - link "14" [ref=e1140]:
          - /url: "#fn-ch3-14"
      - text: By means of the repetition of the past, we undermine this image of history
      - emphasis [ref=e1141]: qua
      - text: "the linear process of the unfolding of an underlying necessity and unearth its process of becoming: to “repeat” the October Revolution, for example, means not to look at it as a link in the chain of historical necessity but to render visible the existential deadlock of its participants, the weight of decisions they were forced to assume within that unique constellation."
    - paragraph [ref=e1142]:
      - text: "Kierkegaard’s crucial point is that what we have here is precisely repetition, not remembrance: we do not “transpose ourselves into the spirit of the past” from a standpoint of an external, neutral gaze; the past appears in its “openness,” in its possibility, only to those whose present situation is threatened by the same abyss, who are caught in the same deadlock. In this sense Kierkegaard conceives the Christian attitude as the experience of our “simultaneousness with the humiliated Christ of the Gospel”: in the act of repetition by means of which we became Christians we do not identify with Christ"
      - emphasis [ref=e1143]: qua
      - text: Master but with a humiliated originator of a scandalous act. The same “simultaneousness” with the past of catastrophic failures and humiliations is referred to in Walter Benjamin’s
      - emphasis [ref=e1144]: Theses on the
      - emphasis [ref=e1145]: Philosophy of History
      - text: "where he determines revolution as repetition which suspends linear historical progress: when a revolution conceives itself as repetition of past failed revolutionary attempts, these attempts are rendered visible in their very “openness,” as desperate acts to break the “great chain of (historical) being.” Revolution “delivers” the past failed attempts by"
      - emphasis [ref=e1146]: repeating them in their “possibility
      - text: ",” it retroactively realizes their potentials which were crushed in the victorious course of “official” history."
      - superscript [ref=e1148]:
        - link "15" [ref=e1149]:
          - /url: "#fn-ch3-15"
      - text: The specific dimension of this
    - paragraph [ref=e1150]: repetition, in which, to the gaze of those stigmatized by the utmost actual threat, the past appears in its “possibility,” is that of theology—it is perhaps somewhat easier to understand thus why the concept of repetition was eminently theological for Kierkegaard.
    - heading "Repetition and postmodernity" [level=4] [ref=e1151]
    - paragraph [ref=e1152]:
      - text: Now we can approach from a new perspective also the ill-famed problem of the postmodern loss of proper historical sense, i.e., its lack of appreciation of the common tradition which unites us with our past. The experience of how we are “embedded” in a historical continuum is allegedly superseded by the logic of
      - emphasis [ref=e1153]: nostalgia
      - text: ", by the fascination with an etheric image of the past wrested from its historical context. Benjamin’s concept of repetition"
      - emphasis [ref=e1154]: qua
      - text: "stasis, suspension of the historical continuum, forms an appropriate antidote to this reproach, since, in it the two terms exchange their respective “value”: for Benjamin, “truth” lies on the side of the anhistorical stasis, whereas History is always “false,” a narrative of the victor who legitimizes his victory by presenting the previous development as the linear continuum leading to his own final triumph. How, then, should we deal with this antagonism of the two perspectives on history, of the partisans of historicity who deplore the loss of historical sensitivity in the postmodern nostalgia and of the Benjaminian reliance upon the delivering power of the “anhistorical” repetition which interrupts the historical continuum? The first step is of course to grasp this antagonism as inherent to each of the two terms, historicity and anhistorical repetition. The “historical sense” is inherently torn between awareness of the way the very place from which we speak is determined by a “decentered” historical tradition, and between “historicism,” i.e., the Master’s gaze which, viewing history from a safe metalanguage distance, constructs the linear narrative of “historical evolution.” The postmodern anhistorical stasis, on the other hand, is torn between repetition"
      - emphasis [ref=e1155]: qua
      - text: suspension of movement by means of which we “synchronize” our menaced position with that of our predecessors, and between repetition
      - emphasis [ref=e1156]: qua
      - text: aced position with that of our predecessors, and between repetition
      - emphasis [ref=e1157]: qua
      - text: nostalgia, the proper object of which is not the image of the past but rather the very gaze enraptured by this image—nostalgia always relies on such a reflexive turn, what really fascinates us in it is the gaze still able to immerse itself “naively” in the etheric image of the lost past. In both cases, the logic of the “fall” (from historical awareness into historicism; from repetition
      - emphasis [ref=e1158]: qua
      - text: stasis into nostalgia) is the same, it implies our exclusion from the process, our acquiring an external distance; yet the crucial thing is that in the double form in which this antagonism is experienced, the terms are linked diagonally (historicity proper is opposed to nostalgia and historicism to repetition), so that we obtain a kind of Greimasian semiotic square.
    - paragraph [ref=e1159]:
      - text: "The key to this enigma consists in the basic paradox of historicity as opposed to historicism: what distinguishes it is precisely the presence of an"
      - emphasis [ref=e1160]: unhistorical kernel
