      - text: ", the clown on the stage is mute, while the resigned old man behind the stage speaks …"
    - paragraph [ref=e335]:
      - text: "Chaplin’s well-known aversion to sound is thus not to be dismissed as a simple nostalgic commitment to a silent paradise; it reveals a far deeper than usual knowledge (or at least presentiment) of the disruptive power of the voice, of the fact that the voice functions as a foreign body, as a kind of parasite introducing a radical split: the advent of the Word throws the human animal off balance and makes of him a ridiculous, impotent figure, gesticulating and striving desperately for a lost balance. Nowhere is this disruptive force of the voice made clearer than in"
      - emphasis [ref=e336]: City Lights
      - text: ", in this paradox of a silent movie with a sound track: a sound track without words, just music and a few typified noises of the objects. It is precisely here that death and the sublime erupt with full force."
    - heading "The tramp’s interposition" [level=4] [ref=e337]
    - paragraph [ref=e338]:
      - text: In the whole history of cinema,
      - emphasis [ref=e339]: City Lights
      - text: is perhaps the purest case of a film which, so to speak, stakes everything on its final scene—the entire film serves ultimately only to prepare for the final, concluding moment, and when this moment arrives, when (to use the final phrase of Lacan’s “Seminar On ‘The Purloined Letter’”) “the letter arrives at its destination,”
      - superscript [ref=e341]:
        - link "4" [ref=e342]:
          - /url: "#fn-ch1-4"
      - text: "the film can end at once. The film is thus structured in a strictly “teleological” manner, all its elements point toward the final moment, the long-awaited culmination; which is why we could also use it to question the usual procedure of the deconstruction of teleology: perhaps it announces a kind of movement toward the final denouement which escapes the teleological economy as depicted (one is even tempted to say: reconstructed) in deconstructionist readings."
      - superscript [ref=e344]:
        - link "5" [ref=e345]:
          - /url: "#fn-ch1-5"
    - paragraph [ref=e346]:
      - emphasis [ref=e347]: City Lights
      - text: is a story about a tramp’s love for a blind girl selling flowers on a busy street who mistakes him for a rich man. Through a series of adventures with an eccentric millionaire who, when drunk, treats the tramp extremely kindly, but when sober fails even to recognize him (was it here that Brecht found the idea for his
      - emphasis [ref=e348]: Puntilla and his
      - emphasis [ref=e349]: Servant Matti
      - text: "?), the tramp gets his hands on the money needed for an operation to restore the poor girl’s sight; whereupon he is arrested for theft and sentenced to prison. After he has done his time, he wanders around the city, alone and desolate; suddenly, he comes across a florist’s shop where he sees the girl. The operation was successful and she now runs a thriving business, but still awaits the Prince Charming of her dreams, whose chivalrous gift enabled her sight to be restored. Every time a handsome young customer enters her shop, she is filled with hope; and time and again disappointed on hearing the voice. The tramp immediately recognizes her, whereas she doesn’t recognize him, because all she knows of him is his voice and the touch of his hand: all she sees through the window (separating them like a screen) is the ridiculous figure of a tramp, a social outcast. Upon seeing him lose his rose (a souvenir of her), she"
    - paragraph [ref=e350]: "nevertheless takes pity on him, his passionate and desperate gaze stirs her compassion; so, not knowing who or what awaits her, still in a cheerful and ironic mood (she comments to her mother in the store: “I’ve made a conquest!”), she steps out on the pavement, gives him a new rose and presses a coin into his hand. At this precise moment, as their hands meet, she finally recognizes him by his touch. She is immediately sobered and asks him: “You?” The tramp nods and, pointing to her eyes, asks her: “You can see now?” The girl answers: “Yes, I can see now”; the film then cuts to a medium close-up of the tramp, his eyes filled with dread and hope, smiling shyly, uncertain what the girl’s reaction will be, satisfied and at the same time insecure at being so totally exposed to her—and this is the end of the movie."
    - paragraph [ref=e351]:
      - text: "On the most elementary level, the poetic effect of this scene is based on the double meaning of the final exchange: “I can see now” refers to the restored physical sight as well as to the fact that the girl sees now her Prince Charming for what he really is, a miserable tramp."
      - superscript [ref=e353]:
        - link "6" [ref=e354]:
          - /url: "#fn-ch1-6"
      - text: "This second meaning sets us at the very heart of the Lacanian problem: it concerns the relation between symbolic identification and the leftover, the remainder, the object-excrement that escapes it. We could say that the film stages what Lacan, in his"
      - emphasis [ref=e355]: Four Fundamental Concepts of
      - emphasis [ref=e356]: Psychoanalysis
      - text: ", calls “separation,” namely the separation between I and a, between the Ego Ideal, the subject’s symbolic identification, and the object: the falling out, the segregation of the object from the symbolic order."
      - superscript [ref=e358]:
        - link "7" [ref=e359]:
          - /url: "#fn-ch1-7"
    - paragraph [ref=e360]:
      - text: As Michel Chion pointed out in his brilliant interpretation of
      - emphasis [ref=e361]: City Lights
      - text: ","
      - superscript [ref=e363]:
        - link "8" [ref=e364]:
          - /url: "#fn-ch1-8"
      - text: the fundamental feature of the figure of the tramp is his
      - emphasis [ref=e365]: interposition
      - text: ": he is always interposed between a gaze and its “proper” object, fixating upon himself a gaze destined for another, ideal point or object —a stain which disturbs “direct” communication between the gaze and its “proper” object, leading the straight gaze astray, changing it into a kind of squint. Chaplin’s comic strategy consists in variations of this fundamental motif: the tramp accidentally occupies a place which is not his own, which is not destined for him—he is mistaken for a rich man or for a distinguished guest; on the run from his pursuers, he finds himself on a stage, all of a sudden the center of the attention of numerous gazes … In Chaplin’s films, we even find a kind of wild theory of the origins of comedy from the blindness of the audience, i.e., from such a split caused by the mistaken gaze: in The Circus, for example, the tramp, on the run from the police, finds himself on a rope at the top of the circus tent; he starts to gesticulate wildly, trying to keep his balance, while the audience laughs and applauds, mistaking his desperate struggle for survival for a comedian’s virtuosity—the origin of comedy is to be sought precisely in such cruel blindness, unawareness of the tragic reality of a situation."
      - superscript [ref=e367]:
        - link "9" [ref=e368]:
          - /url: "#fn-ch1-9"
    - paragraph [ref=e369]:
      - text: In the very first scene of
      - emphasis [ref=e370]: City Lights
      - text: ", the tramp assumes such a role of stain in the picture: in front of a large audience, the mayor of the city unveils a new monument; when he pulls off the white cover, the surprised audience discovers the tramp, sleeping calmly in the lap of the gigantic statue; awakened by the noise, aware that he is the unexpected focus of attention of thousands of eyes, the tramp attempts to descend the statue as quickly as possible, his bumbling efforts triggering bursts of laughter … The tramp is thus an object of a gaze aimed at something or somebody else: he is mistaken for somebody else and accepted as such, or else— as soon as the audience becomes aware of the mistake—he turns into a disturbing stain one tries to get rid of as quickly as possible. His basic aspiration (which serves as a clue also for the final scene of"
      - emphasis [ref=e371]: City Lights
      - text: ) is thus finally to be accepted as “himself,” not as another’s substitute —and, as we shall see, the moment when the tramp exposes himself to the gaze of the other, offering himself without any support in ideal identification, reduced to his bare existence of objectal remainder, is far more ambiguous and risky than it may appear.
    - paragraph [ref=e372]:
      - text: The accident in
      - emphasis [ref=e373]: City Lights
      - text: that triggers the mistaken identification occurs shortly after the
    - paragraph [ref=e374]:
      - text: beginning. Running from the police, the tramp crosses the street by passing through cars that are blocking it in a traffic jam; when he steps out of the last car and slams its rear door, the girl automatically associates this sound—the slam—with him; this and the rich payment—his last coins—that the tramp gives to her for a rose, generate in her the image of a benevolent and rich owner of a luxury car. Here, a homology with the no-less-famous initial misunderstanding in Hitchcock’s
      - emphasis [ref=e375]: North by Northwest
      - text: "offers itself automatically, i.e., the scene where, because of a contingent coincidence, Roger O. Thornhill is mistakenly identified as the mysterious American agent George Kaplan (he makes a gesture toward the hotel clerk exactly as the clerk enters the saloon and cries out: “Phone call for Mr. Kaplan!”): here also, the subject accidentally finds himself occupying a certain place in the symbolic network. However, the parallel goes even further: as is well known, the basic paradox of the plot in"
      - emphasis [ref=e376]: North by
      - emphasis [ref=e377]: Northwest
      - text: is that Thornhill is not simply mistaken for another person; he is mistaken for
      - emphasis [ref=e378]: somebody who doesn’t exist at all
      - text: ", for a fictitious agent concocted by the CIA to divert attention from its real agent; in other words, Thornhill finds himself occupying, filling out, a certain empty place in the structure. And this was also the problem which caused so many delays when Chaplin was shooting the scene of the mistaken identification: the shooting dragged on for months and months. The result didn’t satisfy Chaplin’s demands as long as Chaplin insisted on depicting the rich man for whom the tramp is mistaken as a “real person,” as another subject in the film’s diegetic reality; the solution came about when Chaplin realized, in a sudden insight, that the rich man didn’t have to exist at all, that it was enough for him to be the poor girl’s fantasy formation, i.e., that in reality, one person (the tramp) was enough. This is also one of the elementary insights of psychoanalysis. In the network of intersubjective relations, every one of us is identified with, pinned down to, a certain fantasy place in the other’s symbolic structure. Psychoanalysis sustains here the exact opposite of the usual, commonsense opinion according to which fantasy figures are nothing but distorted, combined, or otherwise concocted figures of their “real” models, of people of flesh and blood that we’ve met in our experience. We can relate to these “people of flesh and blood” only insofar as we are able to identify them with a certain place in our symbolic fantasy space, or, to put it in a more pathetic way, only insofar as they fill out a place preestablished in our dream—we fall in love with a woman insofar as her features coincide with our fantasy figure of a Woman, the “real father” is a miserable individual obliged to sustain the burden of the Name of the Father, never fully adequate to his symbolic mandate, and so forth."
      - superscript [ref=e380]:
        - link "10" [ref=e381]:
          - /url: "#fn-ch1-10"
    - paragraph [ref=e382]: "The function of the tramp is thus literally that of an intercessor, middleman, purveyor: a kind of go-between, love messenger, intermediary between himself (i.e., his own ideal figure: the fantasy figure of the rich Prince Charming in the girl’s imagination) and the girl. Or, insofar as this rich man is ironically embodied in the eccentric millionaire, the tramp mediates between him and the girl—his function is ultimately to transfer the money from the millionaire to the girl (which is why it is necessary, from the point of view of the structure, that the millionaire and the girl never meet). As Chion showed, this intermediary function of the tramp can be detected through the metaphoric interconnection between two consecutive scenes which have nothing in common on the diegetic level. The first takes place in the restaurant where the tramp is treated by the millionaire: he eats spaghetti in his own way, and when a coil of confetti falls on his plate, he mistakes it for spaghetti and swallows it continuously, rising up, standing on his toes (the confetti hangs from the ceiling like a kind of heavenly manna), until the millionaire cuts it off; an elementary Oedipal scenario is thus staged—the confetti band is a metaphorical umbilical cord linking the tramp to the maternal body, and the millionaire acts as a substitute father, cutting his links with the mother. In the next scene, we see the tramp at the girl’s place, where she asks him to hold the wool for her to"
    - paragraph [ref=e383]: "coil into a ball; in her blindness, she accidentally grabs the tip of his woollen underwear which projects from his jacket and starts to unfold it by pulling the thread and rolling it up. The connection between the two scenes is thus clear: what he received from the millionaire, the swallowed food, the endless spaghetti band, he now secrets from his belly and gives to the girl."
    - paragraph [ref=e384]:
      - text: And—herein consists our thesis—for that reason, in
      - emphasis [ref=e385]: City Lights
      - text: ", the letter twice arrives at its destination, or, to put it another way, the postman rings twice: first, when the tramp succeeds in handing over to the girl the rich man’s money, i.e., when he successfully accomplishes his mission as the go-between; and second, when the girl recognizes in his ridiculous figure the benefactor who rendered possible her operation. The letter definitely arrives at its destination when we are no longer able to legitimize ourselves as mere mediators, purveyors of the messages of the big Other, when we cease to fill out the place of the Ego Ideal in the other’s fantasy space, when a separation is achieved between the point of ideal identification and the massive weight of our presence outside symbolic representation, when we cease to act like placeholders of the Ideal for the other’s gaze—in short, when the other is confronted with the remainder left over after we have lost our symbolic support. The letter arrives at its destination when we are no longer “fillers” of the empty places in another’s fantasy structure, i.e., when the other finally “opens his eyes” and realizes that the real letter is not the message we are supposed to carry but our being itself, the object in us that resists symbolization. And it is precisely this separation that takes place in the final scene of"
      - emphasis [ref=e386]: City Lights
      - text: .
    - heading "The separation" [level=4] [ref=e387]
    - paragraph [ref=e388]:
      - text: "Up to the end of the film, the tramp is confined to the role of mediator, circulating between the two figures who, put together, would form an ideal couple (the rich man and the poor girl) and thus enabling communication between them but at the same time being an obstacle to their immediate communication, the stain preventing their immediate contact, the intruder who is never in his own place. With the final scene, however, this game is over: the tramp finally exposes himself in his presence, here he is, representing nothing, holding the place of nobody, we must accept him or refuse him. And the genius of Chaplin is attested by the fact that he decided to end the movie in such a brusque, unexpected way, at the very moment of the tramp’s exposure: the film does"
      - emphasis [ref=e389]: not
      - text: "answer the question “Will the girl accept him or not?”—The idea that she will and that the two of them will live happily ever after has no foundation whatsoever in the film. That is to say, for the usual happy ending, we would need an additional countershot to that of the tramp looking with hope and tremor at the girl: a shot of the girl returning a sign of acceptance, for example, and then, perhaps, a shot of the two of them embracing. We find nothing of the sort in the film: it is over at the moment of absolute uncertainty and openness when the girl—and, together with her, we the spectators—is confronted directly with the question of the “love for her neighbor”. Is this ridiculous, clumsy creature whose massive presence strikes us all of a sudden with an almost unbearable proximity really worthy of her love? Will she be able to accept, to take upon herself this social outcast that she has got in answer to her ardent desire? And—as was pointed out by William Rothman"
      - superscript [ref=e391]:
        - link "11" [ref=e392]:
          - /url: "#fn-ch1-11"
      - text: "—the same question has to be asked also in the opposite direction: not only “is there a place in her dreams for this ragged creature?” but also “is there still a place in his dreams for her, who is now a normal, healthy girl running a successful business?”—in other words, didn’t the tramp feel such a compassionate love for her precisely because she was blind, poor, and utterly helpless, needing his protective care? Will he still be prepared to accept her"
      - emphasis [ref=e393]: now
      - text: when she has every reason to patronize
      - emphasis [ref=e394]: him
      - text: "? When in his"
      - emphasis [ref=e395]: L’éthique de la psychanalyse
      - text: ","
      - superscript [ref=e397]:
        - link "12" [ref=e398]:
          - /url: "#fn-ch1-12"
      - text: Lacan
    - paragraph [ref=e399]:
      - text: "emphasizes Freud’s restraint toward the Christian “love for one’s neighbor,” he has in mind precisely such embarrassing dilemmas: it is easy to love the idealized figure of a poor, helpless neighbor, the starving African or Indian, for example; in other words, it is easy to love one’s neighbor as long as he stays far enough from us, as long as there is a proper distance separating us. The problem arises at the moment when he comes too near us, when we start to feel his suffocating proximity—at this moment when the neighbor exposes himself to us too much, love can suddenly turn into hatred."
      - superscript [ref=e401]:
        - link "13" [ref=e402]:
          - /url: "#fn-ch1-13"
    - paragraph [ref=e403]:
      - emphasis [ref=e404]: City Lights
      - text: ends at the very moment of this absolute undecidability when, confronted with the other’s proximity as an object, we are forced to answer the question “Is he worthy of our love?” or, to use the Lacanian formulation, “Is there in him something more than himself,
      - emphasis [ref=e405]: objet
      - emphasis [ref=e406]: petit a
      - text: ", a hidden treasure?” We can see here how far we are, at this moment when “the letter arrives at its destination,” from the usual notion of teleology: far from realizing a predestined telos, this moment marks the intrusion of a radical openness in which every ideal support of our existence is suspended. This moment is the moment of death and sublimation: when the subject’s presence is exposed outside the symbolic support, he “dies” as a member of the symbolic community, his being is no longer determined by a place in the symbolic network, it materializes the pure Nothingness of the hole, the void in the Other (the symbolic order), the void designated, in Lacan, by the German word das Ding, the Thing, the pure substance of enjoyment resisting symbolization. The Lacanian definition of the sublime object is precisely “an object elevated to the dignity of the Thing.”"
      - superscript [ref=e408]:
        - link "14" [ref=e409]:
          - /url: "#fn-ch1-14"
    - paragraph [ref=e410]: "When the letter arrives at its destination, the stain spoiling the picture is not abolished, effaced: what we are forced to grasp is, on the contrary, the fact that the real “message,” the real letter awaiting us is the stain itself. We should perhaps reread Lacan’s “Seminar on ‘The Purloined Letter’” from this aspect: is not the letter itself ultimately such a stain—not a signifier but rather an object resisting symbolization, a surplus, a material leftover circulating among the subjects and staining its momentary possessor?"
    - paragraph [ref=e411]:
      - text: Now, to conclude, we can return to the introductory scene of
      - emphasis [ref=e412]: City Lights
      - text: "where the tramp figures as the spot disturbing the picture, as a kind of blot on the white marble surface of the statue: in the Lacanian perspective, the subject is strictly correlative to this stain on the picture. The only proof we have that the picture we are looking at is subjectified is not meaningful signs in it but rather the presence of some meaningless stain disturbing its harmony. Let us recall what is a kind of counterpart to the first scene of"
      - emphasis [ref=e413]: City Lights
      - text: ", the final scene of Chaplin’s"
      - emphasis [ref=e414]: Limelight
      - text: ", another scene in which Chaplin’s body is covered by a white cloth. This scene is unique insofar as it marks the point at which Chaplin and Hitchcock, two authors whose artistic universes appear wholly incompatible at the level of both form and content, finally meet. That is to say, it seems as if Chaplin in"
      - emphasis [ref=e415]: Limelight
      - text: "finally discovered the Hitchcockian tracking shot: the very first shot of the film is a long tracking shot progressing from the establishing shot of an idyllic London street to a closed apartment door which leaks deadly gas (signaling the attempted suicide of the young girl who lives in the apartment), whereas the last scene of the film contains a magnificent backward tracking shot from the close-up of the dead clown Calvero behind the stage to the establishing shot of the entire stage where the same young girl, now a successful ballerina and his great love, is performing. Just before this scene, the dying Calvero expresses to the attending doctor his desire to see his love dancing; the doctor taps him gently on the shoulders and comforts him: “You shall see her!” Thereupon Calvero dies, his body is covered by a white sheet, and the camera withdraws so that it embraces the dancing girl on the stage, while Calvero is reduced to a tiny, barely visible white stain in the background. What is here of special significance is the way the ballerina enters the frame: from behind the camera, like the birds in the famous “God’s-view” shot of"
    - paragraph [ref=e416]:
      - text: Bodega Bay in Hitchcock’s
      - emphasis [ref=e417]: Birds
      - text: —yet another white stain which materializes out of the mysterious intermediate space separating the spectator from the diegetic reality on the screen … We encounter here the function of the gaze
      - emphasis [ref=e418]: qua
      - text: "object-stain at its purest: the doctor’s forecast is fulfilled, precisely insofar as he is dead, i.e., insofar as he cannot"
      - emphasis [ref=e419]: see
      - text: her anymore, Calvero
      - emphasis [ref=e420]: looks at her
      - text: ". For that reason, the logic of this backward tracking shot is thoroughly Hitchcockian: by way of it, a piece of reality is transformed into an amorphous stain (a white blot in the background), yet a stain around which the entire field of vision turns, a stain which “smears over” the entire field (as in the backward tracking shot in"
      - emphasis [ref=e421]: Frenzy
      - text: )—the ballerina is dancing for it, for that stain.
      - superscript [ref=e423]:
        - link "15" [ref=e424]:
          - /url: "#fn-ch1-15"
    - heading "1.2 Imaginary, Symbolic, Real" [level=3] [ref=e425]
    - paragraph [ref=e426]:
      - text: So why does the letter always arrive at its destination? Why could it not—sometimes, at least —also fail to reach it?
      - superscript [ref=e428]:
        - link "16" [ref=e429]:
          - /url: "#fn-ch1-16"
      - text: Far from attesting to a refined theoretical sensitivity, this Derridean reaction to the famous closing statement of Lacan’s “Seminar on ‘The Purloined Letter’”
      - superscript [ref=e431]:
        - link "17" [ref=e432]:
          - /url: "#fn-ch1-17"
      - text: "rather exhibits what we could call a primordial response of common sense: what if a letter does"
      - emphasis [ref=e433]: not
      - text: reach its destination? Isn’t it always possible for a letter to go astray?
      - superscript [ref=e435]:
        - link "18" [ref=e436]:
          - /url: "#fn-ch1-18"
      - text: If, however, the Lacanian theory insists categorically that a letter
      - emphasis [ref=e437]: does
      - text: "always arrive at its destination, it is not because of an unshakable belief in teleology, in the power of a message to reach its preordained goal: Lacan’s exposition of the way a letter arrives at its destination"
      - emphasis [ref=e438]: lays bare the
      - emphasis [ref=e439]: very mechanism of teleological illusion
      - text: ". In other words, the very reproach that “a letter can also miss its destination” misses its own destination: it misreads the Lacanian thesis, reducing it to the traditional teleological circular movement, i.e., to what is precisely called in question and subverted by Lacan. A letter always arrives at its destination—especially when we have the limit case of a letter"
      - emphasis [ref=e440]: without
      - text: addressee, of what is called in German
      - emphasis [ref=e441]: Flaschenpost
      - text: ", a message in a bottle thrown into the sea from an island after shipwreck. This case displays at its purest and clearest how a letter reaches its true destination the moment it is delivered, thrown into the water—its true addressee is namely not the empirical other which may receive it or not, but the big Other, the symbolic order itself, which receives it"
      - emphasis [ref=e442]: the moment the letter is
      - emphasis [ref=e443]: put into circulation
      - text: ", i.e., the moment the sender “externalizes” his message, delivers it to the Other, the moment the Other takes cognizance of the letter and thus disburdens the sender of responsibility for it."
      - superscript [ref=e445]:
        - link "19" [ref=e446]:
          - /url: "#fn-ch1-19"
      - text: How, then,
      - emphasis [ref=e447]: specifically
      - text: ", does a letter arrive at its destination? How should we conceive this thesis of Lacan which usually serves as the crowning evidence for his alleged “logocentrism”? The proposition “a letter always arrives at its destination” is far from being univocal: it offers itself to a series of possible readings"
      - superscript [ref=e449]:
        - link "20" [ref=e450]:
          - /url: "#fn-ch1-20"
      - text: which could be ordered by means of reference to the triad Imaginary, Symbolic, Real.
    - heading "Imaginary (mis)recognition" [level=4] [ref=e451]
    - paragraph [ref=e452]:
      - text: In a first approach, a letter which “always arrives at its destination” points to the logic of recognition/misrecognition (
      - emphasis [ref=e453]: reconnaissance/méconnaissance
      - text: ") elaborated in detail by Louis Althusser and his followers (Michel Pêcheux):"
      - superscript [ref=e455]:
        - link "21" [ref=e456]:
          - /url: "#fn-ch1-21"
      - text: "the logic by means of which one (mis)recognizes oneself as the addressee of ideological interpellation. This illusion constitutive of the ideological order could be succintly rendered by paraphrasing a formula of Barbara Johnson:"
      - superscript [ref=e458]:
        - link "22" [ref=e459]:
          - /url: "#fn-ch1-22"
      - text: “A letter always arrives at its destination
      - emphasis [ref=e460]: since its destination is wherever it
      - emphasis [ref=e461]: arrives
      - text: ".” Its underlying mechanism was elaborated by Pêcheux apropos of jokes of the type: “Daddy was born in Manchester, Mummy in Bristol and I in London: strange that the three of us should have met!”"
      - superscript [ref=e463]:
        - link "23" [ref=e464]:
          - /url: "#fn-ch1-23"
      - text: In short, if we look at the process backward, from its (contingent)
    - paragraph [ref=e465]: "result, the fact that “events took precisely this turn” couldn’t but appear as uncanny, concealing some fateful meaning—as if some mysterious hand had taken care that “the letter arrived at its destination,” i.e., that my father and my mother met … What we have here is, however, more than a shallow joke, as is attested by contemporary physics, where we encounter precisely the same mechanism under the name of the “anthropocentric principle”: life emerged on Earth due to numerous contingencies which created the appropriate conditions (if, for example, in Earth’s primeval time the composition of soil and air had differed by a small percentage, no life would have been possible); so, when physicists endeavor to reconstruct the process culminating in the appearance of intelligent living beings on Earth, they either presuppose that universe was created in order to render possible the formation of intelligent beings (the “strong,” overtly teleological anthropocentric principle) or accept a “circular” methodological rule requiring us to always posit such hypotheses about the primeval state of universe as to enable us to deduce its further development toward the conditions for the emergence of life (the “weak” version)."
    - paragraph [ref=e466]:
      - text: The same logic is also at work in the well-known accident from the
      - emphasis [ref=e467]: Arabian Nights
      - text: ": the hero, lost in the desert, quite by chance enters a cave; there he finds three old wise men, awoken by his entry, who say to him: “Finally, you have arrived! We have been waiting for you for the last three hundred years,” as if, behind the contingencies of his life, there was a hidden hand of fate which directed him toward the cave in the desert. This illusion is produced by a kind of “short circuit” between a place in the symbolic network and the contingent element which occupies it:"
      - emphasis [ref=e468]: whosoever
      - text: finds himself at this place is the addressee since the addressee is not defined by his positive qualities but by the very contingent fact of finding himself at this place. Although the religious idea of
      - emphasis [ref=e469]: predestination
      - text: "seems to be the very exemplar of the delusive “short circuit”, it simultaneously intimates a foreboding of radical contingency: if God has decided in advance who will be saved and who will be damned, then my salvation or perdition do not depend on my determinate qualities and acts but on the place in which—"
      - emphasis [ref=e470]: "independently of my qualities, that is to say: totally by chance, in"
      - emphasis [ref=e471]: so far as I’m concerned
      - text: "—I find myself within the network of God’s plan. This contingency manifests itself in a paradoxical inversion: I’m not damned because I act sinfully, trespassing His Commandments, I act sinfully because I’m damned … So, we can easily imagine God easing His mind when some big sinner commits his crime: “Finally, you did it! I have been waiting for it for the whole of your miserable life!” And to convince oneself of how this problematic bears on psychoanalysis, one has only to remember the crucial role of contingent encounters in triggering a traumatic crackup of our psychic balance: overhearing a passing remark by a friend, witnessing a small unpleasant scene, and so forth, can awaken long-forgotten memories and shatter our daily life—as Lacan put it, the unconscious trauma repeats itself"
      - emphasis [ref=e472]: by means
      - text: "of some small, contingent bit of reality. “Fate” in psychoanalysis always asserts itself through such contingent encounters, giving rise to the question: “What if I had missed that remark? What if I had taken another route and avoided that scene?” Such questioning is, of course, deceitful since “a letter"
      - emphasis [ref=e473]: always
      - text: "arrives at its destination”: it waits for its moment with patience—if not this, then another contingent little bit of reality will sooner or later find itself at this place that awaits it and fire off the trauma. This is, ultimately, what Lacan called “the arbitrariness of the signifier.”"
      - superscript [ref=e475]:
        - link "24" [ref=e476]:
          - /url: "#fn-ch1-24"
    - paragraph [ref=e477]:
      - text: To refer to the terms of speech-act theory, the illusion proper to the process of interpellation consists in the overlooking of its
      - emphasis [ref=e478]: performative
      - text: "dimension: when I recognize myself as the addressee of the call of the ideological big Other (Nation, Democracy, Party, God, and so forth), when this call “arrives at its destination” in me, I automatically misrecognize that it is this very act of recognition which makes me what I have recognized myself as—I don’t"
    - paragraph [ref=e479]:
      - text: "recognize myself in it because I’m its addressee, I become its addressee the moment I recognize myself in it. This is the reason why a letter always reaches its addressee: because one becomes its addressee when one is reached. The Derridean reproach that a letter can also miss its addressee is therefore simply beside the point: it makes sense only insofar as I presuppose that I can be its addressee"
      - emphasis [ref=e480]: before
      - text: the letter reaches me—in other words, it presupposes the traditional teleological trajectory with a preordained goal. Translated into the terms of the joke about my father from Manchester, my mother from Bristol, and me from London, the Derridean proposition that a letter can also go astray and miss its destination discloses a typical obsessionnal apprehension of what would happen if my father and mother had
      - emphasis [ref=e481]: not
      - text: come across each other—all would have gone wrong, I would not exist … So, far from implying any kind of teleological circle, “a letter always arrives at its destination” exposes the very mechanism which brings about the amazement of “Why me? Why was I chosen?” and thus sets in motion the search for a hidden fate that regulates my path.
    - 'heading "Symbolic circuit I: “There is no metalanguage”" [level=4] [ref=e482]'
    - paragraph [ref=e483]:
      - text: "On a symbolic level, “a letter always arrives at its destination” condenses an entire chain (a “family” in the Wittgensteinian sense) of propositions: “the sender always receives from the receiver his own message in reverse form,” “the repressed always returns,” “the frame itself is always being framed by part of its content,” “we cannot escape the symbolic debt, it always has to be settled,” which are all ultimately variations on the same basic premise that “there is no metalanguage.” So let us begin by explaining the impossibility of metalanguage apropos of the Hegelian figure of the “Beautiful Soul,” deploring the wicked ways of the world from the position of an innocent, impassive victim. The “Beautiful Soul” pretends to speak a pure metalanguage, exempted from the corruption of the world, thereby concealing the way its own moans and groans"
      - emphasis [ref=e484]: partake actively
      - text: in the corruption it denounces. In his “Intervention on Transference,”
      - superscript [ref=e486]:
        - link "25" [ref=e487]:
          - /url: "#fn-ch1-25"
      - text: "Lacan relies on the dialectic of the “Beautiful Soul” to designate the falsity of the hysterical subjective position: “Dora,” Freud’s famous analysand, complains of being reduced to a pure object in a play of intersubjective exchanges (her father is allegedly offering her to Mister K. as if in compensation for his own flirtation with Miss K.), i.e., she presents this exchange as an objective state of things in the face of which she is utterly helpless; Freud’s answer is that the function of this stance of passive victimization by cruel circumstances is just to conceal her complicity and collusion—the square of intersubjective exchanges can only sustain itself insofar as Dora"
      - emphasis [ref=e488]: assumes actively
      - text: her role of victim, of an object of exchange, in other words, insofar as she finds libidinal satisfaction in it, insofar as this very renunciation procures for her a kind of perverse surplus enjoyment. A hysteric continually complains of how he cannot adapt himself to the reality of cruel manipulation, and the psychoanalytic answer to it is not “give up your empty dreams, life is cruel, accept it as it is” but quite the contrary “your moans and groans are false since, by means of them, you are
      - emphasis [ref=e489]: only too well adapted
      - text: to the reality of manipulation and exploitation:” by playing the role of helpless victim, the hysteric assumes the subjective position which enables him to “blackmail emotionally his environs,” as we would put it in today’s jargon.
      - superscript [ref=e491]:
        - link "26" [ref=e492]:
          - /url: "#fn-ch1-26"
    - paragraph [ref=e493]: "This answer, in which the “Beautiful Soul” is confronted with how it actually partakes of the wicked ways of the world, closes the circuit of communication: in it, the subject/sender receives from the addressee his own message in its true form, i.e., the true meaning of his moans and groans. In other words, in it, the letter that the subject put into circulation “arrives at its destination,” which was from the very beginning the sender himself: the letter arrives at"
    - paragraph [ref=e494]:
      - text: its destination when the subject is finally forced to assume the true consequences of his activity. This is how Lacan, in the early 1950s, interpreted the Hegelian
      - emphasis [ref=e495]: dictum
      - text: "about the rationality of the real (“What is rational is actual and what is actual is rational”):"
      - superscript [ref=e497]:
        - link "27" [ref=e498]:
          - /url: "#fn-ch1-27"
      - text: the true meaning of the subject’s words or deeds—their
      - emphasis [ref=e499]: reason
      - text: —is disclosed by their actual consequences, so the subject has no right to shrink back from them and say “But I didn’t mean it!” In this sense, we may say that Hitchcock’s
      - emphasis [ref=e500]: Rope
      - text: "is an inherently Hegelian film: the homosexual couple strangles their best friend to win recognition from professor Caddell, their teacher who preaches the right of Supermen to dispose of the useless and weak; when Caddell is confronted with the verbatim realization of his doctrine—when, in other words, he gets back from the other his own message in its inverted, true form, i.e., when the true dimension of his own “letter” (teaching) reaches its proper addressee, namely himself—he is shaken and shrinks back from the consequence of his words, unprepared to recognize in them his own truth. Lacan defines “hero” as the subject who (unlike Caddell and like Oedipus, for example) fully assumes the consequences of his act, that is to say, who does not step aside when the arrow that he shot makes its full circle and flies back at him—unlike the rest of us who endeavor to realize our desire without paying the price for it: revolutionaries who want Revolution without revolution (its bloody reverse). Hitchcock’s benevolent-sadistic playing with the spectator takes into account precisely this halfway nature of our desiring: he makes the spectator shrink back by confronting him with the full consequence of the realization of his desire (“you want this evil person killed? OK, you will have it—with all the nauseating details you wanted to pass over in silence …”). In short, Hitchcock’s “sadism” corresponds exactly to the superego’s “malevolent neutrality:” he is nothing but a neutral “purveyor of truth,” giving us only what we wanted, but including in the package the part of it that we prefer to ignore."
    - paragraph [ref=e501]:
      - text: This reverse of the subject’s message is its
      - emphasis [ref=e502]: repressed
      - text: "; so it is not difficult to see how the impossibility of metalanguage is linked to the return of the repressed. “There is no metalanguage” insofar as the speaking subject is always already spoken, i.e., insofar as he cannot master the effects of what he is saying: he always says more than he “intended to say,” and this surplus of what is effectively said over the intended meaning puts into words the repressed content—in it, “the repressed returns.”"
      - superscript [ref=e504]:
        - link "28" [ref=e505]:
          - /url: "#fn-ch1-28"
      - text: What are symptoms
      - emphasis [ref=e506]: qua
      - text: “returns of the repressed” if not such slips of the tongue by means of which “the letter arrives at its destination,” i.e., by means of which the big Other returns to the subject his own message in its true form? If, instead of saying “Thereby I proclaim the session open,” I say “Thereby I proclaim the session closed,” do I not get, in the most literal sense, my own message back in its true, inverted form? So what could, at this level, the Derridean notion that a letter can also miss its destination mean? That the repressed can also not return—yet by claiming this, we entangle ourselves in a naive substantialist notion of the unconscious as a positive entity ontologically preceding its “returns,” i.e., symptoms qua compromise formations, a notion competently called in question by Derrida himself.
      - superscript [ref=e508]:
        - link "29" [ref=e509]:
          - /url: "#fn-ch1-29"
      - text: "Here, we cannot but repeat after Lacan: there is no repression previous to the return of the repressed; the repressed content does not precede its return in symptoms, there is no way to conceive it in its purity undistorted by “compromises” that characterize the formation of the symptoms."
      - superscript [ref=e511]:
        - link "30" [ref=e512]:
          - /url: "#fn-ch1-30"
    - paragraph [ref=e513]:
      - text: This brings us to the third variation, that of the frame always being framed by part of its content; this formula
      - superscript [ref=e515]:
        - link "31" [ref=e516]:
          - /url: "#fn-ch1-31"
      - text: "is crucial insofar as it enables us to oppose the “logic of the signifier” to hermeneutics. The aim of the hermeneutical endeavor is to render visible the contours of a “frame,” a “horizon” that, precisely by staying invisible, by eluding the subject’s grasp, in advance determines its field of vision: what we can see, as well as what we cannot see, is always given to us through a historically mediated frame of preconceits. There is of course nothing pejorative in the use of the term “preconceit” here: its status is transcendental, i.e., it"
    - paragraph [ref=e517]:
      - text: "organizes our experience into a meaningful totality. True, it involves an irreducible limitation of our vision, but this finitude is in itself ontologically constitutive: the world is open to us only within radical finitude. At this level, the impossibility of metalanguage equals the impossibility of a neutral point of view enabling us to see things “objectively,” “impartially”: there is no view that is not framed by a historically determined horizon of “preunderstanding”. Today, for example, we can ruthlessly exploit nature only because nature itself is disclosed to us within a horizon that gives it to be seen as raw material at our disposal, in contrast to the Greek or medieval notion of nature. The Lacanian “logic of the signifier” supplements this hermeneutical thesis with an unheard-of inversion: the “horizon of meaning” is always linked, as if by a kind of umbilical cord, to a point within the field disclosed by it; the frame of our view is always already framed (re-marked) by a part of its content. We can easily recognize here the topology of the Moebius band where, as in a kind of abyssal inversion, the envelope itself is encased by its interior."
      - superscript [ref=e519]:
        - link "32" [ref=e520]:
          - /url: "#fn-ch1-32"
    - paragraph [ref=e521]: "The best way to exemplify this inversion is via the dialectic of view and gaze: in what I see, in what is open to my view, there is always a point where “I see nothing,” a point which “makes no sense,” i.e., which functions as the picture’s stain—this is the point from which the very picture returns the gaze, looks back at me. “A letter arrives at its destination” precisely in this point of the picture: here I encounter myself, my own objective correlative—here I am, so to speak, inscribed in the picture; this ontic “umbilical cord” of the ontological horizon is what is unthinkable for the entire philosophical tradition, Heidegger included. Therein lies the reason of the uncanny power of psychoanalytical interpretation: the subject pursues his everyday life within its closed horizon of meaning, safe in his distance with respect to the world of objects, assured of their meaning (or their insignificance), when, all of a sudden, the psychoanalyst pinpoints some tiny detail of no significance whatsoever to the subject, a stain in which the subject “sees nothing”—a small, compulsive gesture or tic, a slip of the tongue or something of that order—and says: “You see, this detail is a knot which condenses all you had to forget so that you can swim in your everyday certainty, it enframes the very frame which confers meaning on your life, it structures the horizon within which things make sense to you; if we unknot it, you will lose the ground from under your very feet!” It is an experience not unlike that rendered in the old Oriental formula: “Thou art that!”—“Your entire fate is decided in this idiotic detail!” Or, if we keep ourselves to a more formal level of the set theory: among the elements of a given set, there is always One which overdetermines the specific weight and color of the set as such; among the species of a genus, there is always One which overdetermines the very universality of the genus. Apropos of the relationship of different kinds of production within its articulated totality, Marx wrote:"
    - paragraph [ref=e522]:
      - text: In all forms of society there is one specific kind of production which predominates over the rest, whose relations thus assign rank and influence to the others. It is a general illumination which bathes all the other colours and modifies their particularity. It is a particular ether which determines the specific gravity of every being which has materialized within it.
      - superscript [ref=e524]:
        - link "33" [ref=e525]:
          - /url: "#fn-ch1-33"
    - paragraph [ref=e526]: Do not these propositions amount to the fact that the very frame of production (its totality) is always enframed by a part of its content (by one specific kind of production)?
    - 'heading "Symbolic circuit II: Fate and repetition" [level=4] [ref=e527]'
    - paragraph [ref=e528]:
      - text: "The encounter with “Thou art that!” is of course experienced as an encounter with the knot which condenses one’s fate; this brings us to the last variation on the theme “a letter always arrives at its destination”: one can never escape one’s fate, or, to replace this rather obscurantist formulation with a more appropriate psychoanalytic one, the symbolic debt has to be repaid. The letter which “arrives at its destination” is also a letter of request for outstanding debts; what propels a letter on its symbolic circuit is always some outstanding debt. This dimension of fate is at work in the very formal structure of Poe’s “The Purloined Letter”: isn’t there something distinctly “fateful” in the way the self-experience of the main character in Poe’s story is determined by the simple “mechanical” shift of their positions within the intersubjective triad of the three glances (the first which sees nothing; the second which sees that the first sees nothing and deludes itself as to the secrecy of what it hides; the third which sees that the two first glances leave what should be hidden exposed to whomever would seize it)? In the way, for example, the minister’s fate is sealed not because of his personal miscalculation or oversight but because the simple shift of his position from the third to the second glance in the repetition of the initial triad causes his structural blindness? Here, we encounter again the mechanism of imaginary (mis) recognition: the participants in the play automatically perceive their fate as something that pertains to the letter as such in its immediate materiality (“This letter is damned, whosoever comes into possesion of it is brought to ruin!”)—what they misrecognize is that the “curse” is not in the letter as such but in the intersubjective network organized around it. However, to avoid repeating the played-out analysis of Poe’s story, let us address a formally similar case, the classical Bette Davis melodrama"
      - emphasis [ref=e529]: Now, Voyager
      - text: ", the story of Charlotte Vale, a frustrated spinster, the “ugly duckling” of the family, who is pushed into a nervous breakdown by her domineering mother, a rich widow."
      - superscript [ref=e531]:
        - link "34" [ref=e532]:
          - /url: "#fn-ch1-34"
      - text: "Under the guidance of the benevolent Doctor Jacquith, she is cured to emerge as a poised and beautiful woman; following his advice, she decides to see life and takes a trip to South America. There, she has an affair with a charming married man; he is, however, unable to leave his family for her because of his daughter who is on the brink of madness, so Charlotte returns home alone. Soon afterward, she falls into depression and is hospitalized again; in the mental asylum, she encounters the daughter of her lover who immediately develops a traumatic dependence on her. Dr. Jacquith informs Charlotte that her lover’s wife died recently, so that they are now free to marry; yet he is quick to add that this marriage would be an unbearable shock for the daughter—Charlotte is her only support, the only thing standing between her and the final slip into madness. Charlotte decides to sacrifice her love and to dedicate her life to mothering the unfortunate child; when, at the end of the film, her lover asks her for her hand, she promises him just deep friendship, refusing his offer with the phrase: “Why reach for the moon, when we can have the stars?”—one of the purest and therefore most efficient nonsenses in the history of cinema."
    - paragraph [ref=e533]: "When her lover shows to Charlotte a picture of his family, her attention is drawn to a girl sitting aside and staring sadly into the camera; this figure arouses her immediate compassion and Charlotte wants to know all about her. Why? She identifies with her because she recognizes in her her own position, that of the neglected “ugly duckling.” So when, at the film’s end, Charlotte sacrifices her love life for the poor girl’s rescue, she does not do it out of an abstract sense of duty: the point is rather that she conceives the girl’s present situation, when her very survival depends on Charlotte, as the exact repetition of her own situation years ago when she was at her mother’s mercy. Therein consists the structural homology between this film and “The Purloined Letter”: in the course of the story, the same intersubjective network is repeated, with the subjects shifting to different positions—in both cases, an omnipotent mother holds in her hands the daughter’s fate, with the one difference"
    - paragraph [ref=e534]:
      - text: that in the first scene it was an evil mother driving the daughter to madness, while in the second scene a good mother is given a chance to redeem herself by pulling the daughter from the brink. The film displays poetic
      - emphasis [ref=e535]: finesse
      - text: "by conferring a double role on Doctor Jacquith: the same person who, in the first scene, “sets free” Charlotte, i.e., opens up to her the perspective of an unchained sexual life, appears in the second scene as the bearer of prohibition who prevents her marriage by reminding her of her debt. Here, we have the “compulsion to repeat” at its purest: Charlotte cannot afford marriage since she must"
      - emphasis [ref=e536]: honor her debt
      - text: ". When, finally, she seems freed from the nightmare, “fate” (the big Other) confronts her with the price of this freedom by putting her into a situation where she herself can destroy the young girl’s life. If Charlotte would not sacrifice herself, she would be persecuted by the “demons of the past”: her happy marital life would be spoiled forever by the memory of the unfortunate child in the asylum paying the price, a reminder of how she betrayed her own past. In other words, Charlotte does not “sacrifice herself for the other’s happiness”: by sacrificing herself, she honors her debt to"
      - emphasis [ref=e537]: herself
      - text: . So, when she finds herself face to face with a broken girl who can be saved only by means of her sacrifice, we could again say that “a letter arrives at its destination.”
      - superscript [ref=e539]:
        - link "35" [ref=e540]:
          - /url: "#fn-ch1-35"
    - paragraph [ref=e541]:
      - text: "Within this dimension of the outstanding debt, the role of the letter is assumed by an object that circulates among the subjects and, by its very circulation, makes out of them a closed intersubjective community. Such is the function of the Hitchcockian object: not the decried MacGuffin but the tiny “piece of the real” which keeps the story in motion by finding itself “out of place” (stolen, etc.): from the ring in"
      - emphasis [ref=e542]: Shadow of a Doubt
      - text: ", the cigarette lighter in"
      - emphasis [ref=e543]: Strangers on a Train
      - text: ", up to the child in The Man Who Knew Too Much who circulates between the two couples. The story ends the moment this object “arrives at its destination,” i.e., returns to its rightful owner: the moment Guy gets back the lighter (the last shot of"
      - emphasis [ref=e544]: Strangers on a Train
      - text: where the lighter falls out of dead Bruno’s unclasped hand), the moment the abducted child returns to the American couple (in
      - emphasis [ref=e545]: The Man Who Knew Too Much
      - text: "), etc. This object embodies, gives material existence to the lack in the Other, to the constitutive inconsistency of the symbolic order: Claude Lévi-Strauss pointed out how the very fact of exchange attests a certain structural flaw, an imbalance that pertains to the Symbolic, which is why the Lacanian mathem for this object is S("
    - paragraph [ref=e546]:
      - text: ), the signifier of the barred Other. The supreme exemplar of such an object is the ring from Richard Wagner’s
      - emphasis [ref=e547]: Ring des Nibelungen
      - text: ", this gigantic drama of the unbalanced symbolic exchange. The story opens with Alberich stealing the ring from the Rhine maidens, whereby it becomes the source of a curse for its possessors; it ends when the ring is thrown back into the Rhine to its rightful owners—the Gods, however, pay for this reestablishment of the balance with their twilight, since their very existence was founded upon an unsettled debt."
    - paragraph [ref=e548]: "The imaginary and the symbolic dimension of “a letter always reaching its destination” are thus in their very opposition closely connected: the first is defined by the imaginary (mis)recognition (a letter arrives at its destination insofar as I recognize myself as its addressee, i.e., insofar as I find myself in it), whereas the second comprises the concealed truth that emerges in the “blind spots” and flaws of the imaginary circle. Let us just recall so-called “applied psychoanalysis,” the standard “psychoanalytic interpretation” of works of art: this procedure always “finds itself,” and the propositions on Oedipus complex, on sublimation, etc., are again and again confirmed since the search moves in an imaginary closed circle and finds only what it is already looking for—what, in a sense, it already has (the network of its theoretical preconceits). A letter traversing the symbolic circuit “arrives at its destination” when we experience the utmost futility of this procedure, its utmost failure to touch the inherent logic of its object. The way “a letter arrives at its destination” within the symbolic"
    - paragraph [ref=e549]:
      - text: "circuit therefore implies the structure of a slip, of “success through failure”: it reaches us unbeknownst to us. In Agatha Christie’s"
      - emphasis [ref=e550]: Why Didn’t They Ask Evans
      - text: "?, the young hero and his girl friend find a mortally wounded man on the links who, seconds before his death, raises his head and says “Why didn’t they ask Evans?” They set out to investigate the murder and, long afterward, when the dead man’s mysterious phrase is completely forgotten, they concern themselves with the somewhat peculiar circumstances of the certification of a dying country gentleman’s will: the relatives called as a witness a distant neighbor instead of using the servant Evans who was present in the house, so … “Why didn’t they ask Evans?” Instantaneously, the hero and his girl friend realize that their question reproduces verbatim the phrase of the man who died on the links—therein consists the clue for his murder. What we have here is an exemplary case of how “a letter arrives at its destination”: when, in a totally contingent way, it finds its proper place."
    - paragraph [ref=e551]:
      - text: This reference to the letter and its itinerary enables us to distinguish between the two modalities of the crowd. When, apropos of his interpretation of the Freudian dream of Irma’s injection, Lacan speaks of “l’immixion des sujets,” “the inmixing of subjects,” of the moment when the subjects lose their individuality by being reduced to little wheels in a nonsubjective machinery (in the dream itself, the moment of this reversal is the appearance of the three professors who exculpate Freud by enumerating mutually exclusive reasons for the failure of Irma’s treatment), this machine is of course synonymous with the
      - emphasis [ref=e552]: symbolic order
      - text: . This mode of the crowd is exemplarily depicted in the paintings of Pieter Brueghel from the years 1559 and 1560 (
      - emphasis [ref=e553]: Dutch Proverbs, Fight between Carnival and Lent, Child Games
      - text: "): the subject is here “beheaded,” “lost in the crowd,” yet the transsubjective mechanism which regulates the process (games, proverbs, carnivals) is clearly of a symbolic nature: it can be unearthed by means of the act of interpretation. In other words, it is the signifier which runs the show— through this very confusion and blind automatism, the letter nevertheless “arrives at its destination.” How? Let us recall Eric Ambler’s spy novel"
      - emphasis [ref=e554]: Passage of Arms
      - text: ", the story of a poor Chinese in Malaya in the early 1950s, after the breakdown of the Communist insurgency: upon discovering a forgotten hideout of Communist arms in the jungle, he plans to sell them in order to buy an old bus and thus become a small-scale capitalist. He thereby sets in motion an unforeseen chain of events which exceed by far his original intent: the rich Chinese who buys the arms resells them to an Indonesian pro-Communist guerilla, the transaction involves an “innocent” American tourist couple, the story moves from Malaya to Bangkok, then to Sumatra, yet all this improvisatory texture of accidental encounters brings us back to our starting point: at the end, the Chinese becomes the owner of an old, ramshackle bus, “the letter arrives at its destination,” as if some hidden “cunning of Reason” regulated the chaotic flow of events. Something not dissimilar to this is at work in the quartets and quintets of Mozart’s great operas; it suffices to mention the finale of"
      - emphasis [ref=e555]: Le Nozze di Figaro
      - text: ": the persons speak and sing over one another, there is an entire network of misapprehensions and false identifications, yet this chaos of comic encounters seems to be run by the hidden hand of a benevolent destiny which provides for the final reconciliation. An abyss separates this “immixture” from, say, the quintet in the third act of Wagner’s"
      - emphasis [ref=e556]: Meistersinger von Nürnberg
      - text: where all the voices efface their differences and yield to the same pacifying flow—not to mention the brutal irruption of the crowd that follows Hagen’s “call to men (
      - emphasis [ref=e557]: Männerruf
      - text: )” in the second act of
      - emphasis [ref=e558]: Die
      - emphasis [ref=e559]: Götterdämmerung
      - text: . The point here is the link between this crowd and the prelude to the opera with the sibyls no longer able to decipher the future course of events, since the cord of destiny is cut—the crowd enters the stage when history is no longer regulated by the texture of symbolic destiny, i.e., when the father’s phallic authority is broken (one should remember that, the previous evening, Siegfried broke Wotan’s spear). This crowd, the modern crowd,
    - paragraph [ref=e560]:
      - text: "appeared for the first time in Edgar Allan Poe’s “The Man of the Crowd”: the anonymous observer watches through the windowpane of a cafe (this frame that introduces the distance between “inside” and “outside” is crucial here) the turmoil of the London evening crowd and decides to follow an old man; at dawn, after long hours of walking, it becomes clear that there is nothing to discover: “It will be in vain to follow; I shall learn no more of him, nor of his deeds.” The old man is thus exposed as the “man of the crowd,” the epitome of evil, precisely insofar as he embodies something that “doesn’t allow itself to be read”—"
      - emphasis [ref=e561]: es lässt sich
      - text: nicht lesen, as Poe himself puts it in German. This “resistance to being read” of the crowd designates of course the passage from the symbolic register to that of the Real.
      - superscript [ref=e563]:
        - link "36" [ref=e564]:
          - /url: "#fn-ch1-36"
    - heading "The real encounter" [level=4] [ref=e565]
    - paragraph [ref=e566]: "The motif of fate has brought us to the very brink of the third level, that of the Real; here, “a letter always arrives at its destination” equals what “meeting one’s fate” means: “we will all die.” A common pretheoretical sensitivity enables us to detect the ominous undertone that sticks to the proposition “a letter always arrives at its destination”: the only letter that nobody can evade, that sooner or later reaches us, i.e., the letter which has each of us as its infallible addressee, is death. We can say that we live only in so far as a certain letter (the letter containing our death warrant) still wanders around, looking for us. Let us recall the ill-famed “poetic” statement of the Iranian president Ali Hamnei apropos of the sentence of death pronounced on Salman Rushdie: nothing can stop its execution, the bullet is already on its way, sooner or later, it will hit its mark—such is the fate of all and each of us, the bullet with our name on it is already shot. Derrida himself emphasizes the lethal dimension of writing: every trace is condemned to its ultimate effacement. Note the fundamental ambiguity of the very word “end”: “aim” and “annihilation”—the closing of the letter’s circuit equals its consumption. The crucial point here is that the imaginary, the symbolic, and the real dimension of “a letter always arrives at its destination” are not external to each other: at the end of the imaginary as well as the symbolic itinerary, we encounter the Real. As was demonstrated by Lacan apropos of Freud’s dream of Irma’s injection, the dual mirror relationship culminates in the horrifying confrontation with the abyss of the Real, exemplified by the flesh of Irma’s throat:"
    - paragraph [ref=e567]:
      - text: the flesh one never sees, the foundation of things, the other side of the head, of the face, the secretory glands
      - emphasis [ref=e568]: par excellence
      - text: ", the flesh from which everything exudes, at the very heart of the mystery, the flesh in as much as it is suffering, is formless, in as much as its form in itself is something which provokes anxiety."
      - superscript [ref=e570]:
        - link "37" [ref=e571]:
          - /url: "#fn-ch1-37"
    - paragraph [ref=e572]: "The fascinating image of a double is therefore ultimately nothing but a mask of horror, its delusive front: when we encounter ourselves, we encounter death. The same horror emerges with the fulfillment of symbolic “destiny,” as is attested by Oedipus: when, at Colonnus, he closed the circuit and paid all his debts, he found himself reduced to a kind of soap bubble burst asunder—a scrap of the real, the leftover of a formless slime without any support in the symbolic order. Oedipus realized his destiny"
    - paragraph [ref=e573]:
      - text: to that final point which is nothing more than something strictly identical to a striking down, a tearing apart, a laceration of himself—he is no longer, no longer anything, at all. And it is at that moment that he says the phrase I evoked last time—
      - emphasis [ref=e574]: Am I made man in
    - paragraph [ref=e575]:
      - emphasis [ref=e576]: the hour when I cease to
      - text: be?
      - superscript [ref=e578]:
        - link "38" [ref=e579]:
          - /url: "#fn-ch1-38"
    - paragraph [ref=e580]: "The unpaid symbolic debt is therefore in a way constitutive of our existence: our very symbolic existence is a “compromise formation,” the delaying of an encounter. In Max Ophuls’s melodrama Letter from an Unknown Woman, this link connecting the symbolic circuit with the encounter of the Real is perfectly exemplified. At the very beginning of the film “a letter arrives at its destination,” confronting the hero with the disavowed truth: what was for him a series of unconnected, ephemeral love affairs that he only vaguely remembered destroyed a woman’s life. He assumes responsibility for this by means of a suicidal gesture: by deciding not to escape and to attend the duel he is certain to lose."
    - paragraph [ref=e581]:
      - text: "However, as is indicated in Lacan’s above-quoted reading of the dream of Irma’s injection, the Real is not only death but also life: not only the pale, frozen, lifeless immobility but also ‘the flesh from which everything exudes,” the life substance in its mucous palpitation. In other words, the Freudian duality of life and death drives is not a symbolic opposition but a tension, and antagonism, inherent to the presymbolic Real. As Lacan points out again and again, the very notion of life is alien to the symbolic order. And the name of this life substance that proves a traumatic shock for the symbolic universe is of course enjoyment. The ultimate variation on the theme of a letter that always arrives at its destination reads therefore: “you can never get rid of the stain of enjoyment”—the very gesture of renouncing enjoyment produces inevitably a surplus enjoyment that Lacan writes down as the “object small a.” Examples offer themselves in abundance, from the ascetic who can never be sure he does not repudiate all worldly goods because of the ostentatious and vain satisfaction procured by this very act of sacrifice, to the “sense of fulfillment” that overwhelms us when we submit to the totalitarian appeal: “Enough of decadent enjoyment! It’s time for sacrifice and renunciation!” This dialectic of enjoyment and surplus enjoyment—i.e., the fact that there is no “substantial” enjoyment preceding the excess of surplus enjoyment, that enjoyment itself is a kind of surplus produced by renunciation—is perhaps what gives a clue to so-called “primal masochism.”"
      - superscript [ref=e583]:
        - link "39" [ref=e584]:
          - /url: "#fn-ch1-39"
    - paragraph [ref=e585]:
      - text: Such a reading, however, leads beyond Lacan’s “Seminar on ‘The Purloined Letter,’” which stays within the confines of the “structuralist” problematic of a senseless, “mechanical” symbolic order regulating the subject’s innermost self-experience. From the perspective of the last years of Lacan’s teaching, the letter which circulates among the subjects in Poe’s story, determining their position in the intersubjective network, is no longer the materialized agency of the
      - emphasis [ref=e586]: signifier
      - text: but rather an
      - emphasis [ref=e587]: object
      - text: "in the strict sense of materialized enjoyment—the stain, the uncanny excess that the subjects snatch away from each other, forgetful of how its very possession will mark them with a passive, “feminine” stance that bears witness to the confrontation with the object-cause of desire. What ultimately interrupts the continuous flow of words, what hinders the smooth running of the symbolic circuit, is the traumatic presence of the Real: when the words suddenly stay out, we have to look not for imaginary resistances but for the object that came too close."
    - heading "2 WHY IS WOMAN A SYMPTOM OF MAN?" [level=2] [ref=e588]
    - heading "2.1 Why is Suicide the Only Successful Act?" [level=3] [ref=e589]
    - heading "The act as an answer of the real" [level=4] [ref=e590]
    - paragraph [ref=e591]:
      - text: "The miracle of Roberto Rossellini’s encounter with Ingrid Bergman, this true act of grace that stirred his creativity and caused it to take another direction, exemplifies in an almost uncanny way how “a letter always arrives at its destination.” The background of the story is well known: in 1947, at the height of her fame as the leading Hollywood star, Ingrid Bergman saw Rossellini’s"
      - emphasis [ref=e592]: Open City
      - text: and
      - emphasis [ref=e593]: Paisan
      - text: ", his two neorealist masterpieces, in a small New York theater. Deeply affected, she wrote a letter to Rossellini which attests to her transferential relationship with him even before the two of them met personally—a case of love"
      - emphasis [ref=e594]: before
      - text: "first sight. She was obsessed by the idea of helping Rossellini gain well-deserved international fame by putting her stardom at his disposal; so she offered herself for any role, if he had any use for a Swedish actress who spoke fluent English, some German and only two words of Italian: “Ti amo!” (I love you!) However, a series of accidents almost prevented her letter from reaching him:"
    - paragraph [ref=e595]:
      - text: An Italian she met in America told her she could reach Rossellini by writing to Minerva Studios. Then, the studio headquarters burnt down just after her letter arrived; sifting through the ashes, they found the letter, but when the studio tried to contact Rossellini, he kept hanging up, since he was in a dispute with them at the time. When the letter finally managed to get to him, he had to have his secretary translate it from English—and then asked her who Ingrid Bergman was. Once apprised of her international fame, he quickly responded with an urgent telegram on May 8, his birthday, that it was “absolutely true that I dreamed to make a film with you.” …
      - superscript [ref=e597]:
        - link "1" [ref=e598]:
          - /url: "#fn-ch2-1"
    - paragraph [ref=e599]:
      - text: A lie pure and simple, opportunistic flattery, or was it? What to think then of the fact that in Rossellini’s most famous film,
      - emphasis [ref=e600]: Open City
      - text: from 1945, the two central negative characters, the lesbian Nazi and the Gestapo torturer, are named
      - emphasis [ref=e601]: Ingrid
      - text: and
      - emphasis [ref=e602]: Bergmann
      - text: "? In a way, Rossellini effectively"
      - emphasis [ref=e603]: had
      - text: already had dreams on the “Ingrid Bergman” theme … What were his thoughts upon receiving a letter signed by a person whose name condensed two utter impersonations of evil from his film?
      - superscript [ref=e605]:
        - link "2" [ref=e606]:
          - /url: "#fn-ch2-2"
      - text: "Wasn’t this a kind of “answer of the Real” to his reckless playing with film illusion, an experience close to that of Casanova when, as if in response to his magic prattle, nature reacted with a violent thunderstorm? Ingrid Bergman thus entered Rossellini’s life with the traumatic impact of an act: although her letter appeared as a shock, the place for her within Rossellini’s symbolic space had already been carved out far in advance."
    - paragraph [ref=e607]:
      - text: How should we conceive the notion of act at work here, i.e., the act in its suicidal dimension?
      - superscript [ref=e609]:
        - link "3" [ref=e610]:
          - /url: "#fn-ch2-3"
      - text: Today, it is already part of received wisdom, a sign of good manners so to speak, to reject with derision the supposedly “naive,” “commonsensical” opposition of words and acts or things, an opposition upon which phrases of the type “you only talk instead of acting!” “not only in words, but also in deeds,” and so forth are based. Everybody now knows that “we can
    - paragraph [ref=e611]:
      - text: "do things with words”: more than forty years have passed since J. L. Austin wrote his standard manual on this theme. And indeed, is not the very kernel of psychoanalysis embedded in the dimension of language as speech"
      - emphasis [ref=e612]: act
      - text: "? Is it not confined to this dimension by the very fact that it is a"
      - emphasis [ref=e613]: talking cure
      - text: ", an attempt to reach and transform the real of the symptom solely by means of words, i.e., without having recourse to an immediate operation on the body (via electrotherapy, pharmacotherapy, etc.)? (We can thus determine with precision the moment when Wilhelm Reich ceased to be a psychoanalyst: when he abandoned the medium of the word and started to rely on bodily massage to release neurotic tensions.) And, closer to our domain, does not Lacan, at the very moment when he elaborated his notion of the autonomous symbolic order, formulate a kind of theory of the speech act (performative)"
      - emphasis [ref=e614]: avant
      - emphasis [ref=e615]: la lettre
      - text: "? Is not the fundamental proposition of his first"
      - emphasis [ref=e616]: Seminars
      - text: that intersubjective reality is composed of utterances which, by means of their very act of enunciation,
      - emphasis [ref=e617]: make
      - text: "the subject what it asserts to be—utterances of the type “you are my wife, my teacher,” and so forth, in other words: interpellations, utterances whereby the subject, by recognizing itself in their call, becomes what they purport it to be? And is not herein also the accent of Lacan’s conception of the functional role of remembering past traumas? The point is not to arrive at the factual truth of some long-forgotten event—what is effectively at stake here is, quite literally, the recollection of the past, i.e., the way this remembrance of the past bears on the subject’s present position of enunciation, how it transforms the very place from which the subject speaks (is spoken). Herein lies the “effect of truth” intended by the psychoanalytic cure: when I draw a childhood trauma out of the shadowy world of “repression” and integrate it with my knowledge, this radically transforms the symbolic horizon that determines my present “self-understanding”—after accomplishing it, I am not the same subject as before."
    - paragraph [ref=e618]: "However, it is obvious that Lacan’s thesis on suicide as the only successful act doesn’t enter this frame: the matrix of the act enabling us to grasp suicide as the act par excellence is definitely not that of a speech act, of a performative. Which is then this matrix? Instead of risking an immediate answer, let us return to Rossellini, since his central obsession was precisely that of a suicidal, “impossible” act of freedom beyond the scope of a performative."
    - 'heading "Germany, Year Zero: The word no longer obliges" [level=4] [ref=e619]'
    - paragraph [ref=e620]:
      - text: "Rossellini was perfectly aware of the crucial role of the performative dimension in structuring intersubjective space: an entire series of his films is centered on the dialectic of “playing a role,” of assuming performatively a symbolic mandate. This dialectic was taken to its extreme in"
      - emphasis [ref=e621]: General della Rovere
      - text: ", a tragicomic story about Bertone, a petty thief and swindler (played by Vittorio de Sica). The story takes place during the German occupation of Italy; Bertone is arrested by the Gestapo and forced to collaborate. Because of his resemblance to General della Rovere, the legendary partisan leader, he is obliged to pass himself off as della Rovere in a prison full of members of the resistance (unbeknownst to the partisans, the real della Rovere had already been caught and shot by the Germans). The idea of the Germans is that Bertone, posing as della Rovere, should make inquiries among the prisoners about the organization of the resistance and its other leaders. However, events take an unforeseen turn when Bertone becomes more and more accustomed to his role and ends by insisting on it even at the price of his life: rather than give the Germans the names they seek, he lets them shoot him as “General della Rovere” … As Leo Braudy succinctly put it, “the importance of the film lies in its acceptance of artifice—role-playing, the assumption of disguise—as a way toward moral truth … [This film] introduces the idea that role-playing and disguise can lead to a liberation and"
    - paragraph [ref=e622]:
      - text: realization of the self.”
      - superscript [ref=e624]:
        - link "4" [ref=e625]:
          - /url: "#fn-ch2-4"
      - text: "The dialectic at work here is that of symbolic identification, of assuming a symbolic mandate: insisting on a false mask brings us nearer to a true, authentic subjective position than throwing off the mask and displaying our “true face.” As long as poor Bertone, under the pressure of circumstances, just pretends to be della Rovere, we have the comic situation of a common little man occupying by chance the hero’s place; as soon as he is prepared to forfeit his very life for this “role,” the situation acquires tragic dimensions, his very insistence on the mask becomes an authentic ethical deed. Such a dialectic—developed by Rossellini even more pointedly in his"
      - emphasis [ref=e626]: Rise to Power of Louis XIV
      - text: "—implies that there is more truth in a mask than in what is hidden beneath it: a mask is never simply “just a mask” since it determines the actual place we occupy in the intersubjective symbolic network; what is effectively false and null is our “inner distance” from the mask we wear (the “social role” we play), our “true self” hidden beneath it. The path to an authentic subjective position runs therefore “from the outside inward”: first, we pretend to be something, we just act as if we are that, till, step by step, we actually become it—it is not difficult to recognize in this paradox the Pascalian logic of “custom” (“act as if you believe and belief will come by itself”). The performative dimension at work here consists of the symbolic efficiency of the “mask”: wearing a mask actually"
      - emphasis [ref=e627]: makes
      - text: "us what we feign to be. In other words, the conclusion to be drawn from this dialectic is the exact opposite of the common wisdom by which every human act (achievement, deed) is ultimately just an act (posture, pretense): the only authenticity at our disposal is that of impersonation, of “taking our act (posture) seriously.”"
      - superscript [ref=e629]:
        - link "5" [ref=e630]:
          - /url: "#fn-ch2-5"
    - paragraph [ref=e631]:
      - text: This logic of act
      - emphasis [ref=e632]: qua
      - text: identification with a mask,
      - emphasis [ref=e633]: qua
      - text: assuming a symbolic mandate is, however, overshadowed in Rossellini’s films by another, radically heterogeneous logic that comes forth in the moments of
      - emphasis [ref=e634]: epiphany
      - text: "; as a rule, these epiphanies are read in a Christian perspective, as moments of grace that agitate and illuminate the hero—but is this really the right way to approach them? Let us take a closer look at this question by focusing upon three films, all of which are structured as a preparation or a reaction to the traumatic moment of epiphany:"
      - emphasis [ref=e635]: Germany, Year Zero
      - text: ;
      - emphasis [ref=e636]: Stromboli; Europa
      - text: "’51. Each of these films is characterized by a certain structure of lure: it sets a trap to be avoided, i.e., if we perceive it in a “spontaneous” way, we are inevitably led astray."
    - paragraph [ref=e637]:
      - emphasis [ref=e638]: Germany, Year Zero
      - text: "is a story about Edmund, a boy of ten living with his elder sister and sickly father in the ruins of occupied Berlin in the summer of 1945. He is left to the street and keeps his family by way of petty street crimes and black-market peddling. He falls more and more under the influence of his homosexual Nazi teacher, Henning, who fills him with lessons on how life is a cruel struggle for survival where one must deal mercilessly with the weaklings who are just a burden to us. Edmund decides to apply this lesson to his father who constantly moans and groans that he will never recover his health and that he wants to die, since he is only a burden to his family: granting his request, he mixes a fatal dose of medicine into the father’s glass of milk. After the father’s death, he wanders around aimlessly among the ruins of the Berlin streets; a group of children refuse to let him join their game, as if they have somehow guessed his horrible deed, so he awkwardly plays hopscotch alone for a few moments, but he is unable to let himself go in the game—childhood is lost for him, he is already cut off from human community. His sister calls him, but he can no longer accept her solace, so he hides from her in an abandoned, half-ruined apartment house, walks to the second floor, closes his eyes and jumps. The last shot of the film shows his tiny body lying amidst the concrete ruins. The scene for which the entire film was shot is of course the final wandering of Edmund in the ruins of Berlin and his suicide. Wherein lies the meaning of this act? The reading which offers itself immediately is quite obvious: the film is a story of how the morally corrupted Nazi ideology can spoil even a child’s innocence and induce him to"
    - paragraph [ref=e639]: accomplish parricide. Once he becomes aware of the true dimension of his deed, he kills himself under the pressure of unbearable guilt.
    - paragraph [ref=e640]:
      - text: Is this reading the only one possible? A closer examination quickly reveals a series of uneasy details that disturb this image. True, Edmund acts, he passes over to the act, while the teacher just chatters pathetically about the right of the strong, so that when Edmund tells him about his parricide, the teacher shrinks back in horror. Are we, however, for all that, justified in asserting that Edmund simply took the lesson of his teacher literally and consequently acted upon it? Was his act really caused by the teacher’s word, so that we are concerned with a causal chain linking words and deeds? The least we can add is that, by means of his act, Edmund not only complies with the teacher’s lesson, “applying” it to his own family, but at the same time meets his father’s explicit will to die. His act is therefore somehow indeterminable, it cannot be properly located, being at the same time an act of supreme cruelty and cold distance
      - emphasis [ref=e641]: and
      - text: an act of boundless love and tenderness, attesting that he is prepared to go to extremes to comply with his father’s wishes. This coincidence of opposites (cold, methodical cruelty and boundless love) is
      - emphasis [ref=e642]: a point at which every “foundation” of acts in
      - emphasis [ref=e643]: “words,” in ideology, fails
      - text: ": this “foundation” simply falls short of the abyss announced in it. Edmund’s act, far from “taking literally” and realizing the most corrupted and cruel ideology, implies a certain surplus which eludes the domain of ideology as such—it is an act of “absolute freedom” which momentarily suspends the field of ideological meaning, i.e., which interrupts the link between “words” and “deeds.” Precisely by being emptied of every “positive” (ideological, psychological) content, Edmund’s act is an act of freedom as defined by F. W. J. Schelling: an act founded only in itself, not in any kind of ideological “sufficient grounds.”"
      - superscript [ref=e645]:
        - link "6" [ref=e646]:
          - /url: "#fn-ch2-6"
      - text: "It is for this reason that in Edmund’s parricide, pure evil coincides with the most perfect childish innocence: in the very act of murdering his father, Edmund becomes a saint. The use of the term “saint” is here not careless: a couple of years after"
      - emphasis [ref=e647]: Germany, Year Zero
      - text: ", Rossellini shot"
      - emphasis [ref=e648]: Francesco, giullare di Dio
      - text: ", a film on Saint Francis, in which he put the break of Saint Francis with all worldly institutional ties, his return to the state of blessed innocence where we “have all” precisely insofar as we have “lost all,” in line with Edmund’s voidance of and isolation from ordinary human community."
      - superscript [ref=e650]:
        - link "7" [ref=e651]:
          - /url: "#fn-ch2-7"
      - text: "Edmund’s radical “emptying” is displayed by his very reticent way of acting, especially in the scene in which he provides his father with the glass of poisoned milk. Edmund watches his father with an inexpressive, tired, pale gaze, with no trace of fear, compassion, regret, or any other sentiment. Any kind of “identification” with Edmund is thereby thwarted—we, the viewers, cannot shiver with Edmund, feel his tension, regret, or horror at his act: “Edmund, who in a more conventional film would be the focus of audience identification, here seems rather a kind of null set, an empty integer, a focal point of effects.”"
      - superscript [ref=e653]:
        - link "8" [ref=e654]:
          - /url: "#fn-ch2-8"
      - text: The null set, the empty integer, these are Lacanian names for the subject of the signifier, i.e., for the subject, insofar as it is reduced to an empty place without support in imaginary or symbolic identification.
      - superscript [ref=e656]:
        - link "9" [ref=e657]:
          - /url: "#fn-ch2-9"
      - text: Edmund is in fact pure, “demonic” evil, but what we must bear in mind is that precisely for this reason, he embodies the pure spirituality of a will delivered from every “pathological” motivation.
    - paragraph [ref=e658]:
      - text: "Edmund is excluded from community, “symbolically dead”: not only does he find himself excluded from concrete human community, what is at stake here is a far more radical experience of exclusion from—of asserting a distance with respect to—the big Other itself, the symbolic order. What propels him into act is an awareness of the ultimate insufficiency and nullity of every ideological foundation: he succeeds in occupying that impossible/real empty place where"
      - emphasis [ref=e659]: words no longer oblige
      - text: ", where their performative power is suspended. This is “Germany, Year Zero”: Germany in the year of absolute freedom when the intersubjective bond, the engagement of the Word is broken. True, we can call this—the distance taken from"
    - paragraph [ref=e660]:
      - text: the Other—also “psychosis,” but what is “psychosis” here if not another name for freedom?
      - superscript [ref=e662]:
        - link "10" [ref=e663]:
          - /url: "#fn-ch2-10"
      - text: "So when, after the parricide, Edmund tells his teacher: “You just talked about it, I did it!” this utterance in no way suggests a shift of responsibility to the teacher, i.e., an argument in the manner of “Don’t blame me, it was you who told me to proceed this way!” but quite to the contrary, a cold, impassionate ascertaining of the above-mentioned absolute"
      - emphasis [ref=e664]: gap
      - text: "that separates words and deeds. And, following the immanent logic of the film, the acceptance of this gap is the very opposite of evil embodied in a corrupting, all-pervading voice, most forcefully in the famous scene of Edmund trying to sell the record of one of Hitler’s speeches to two British soldiers: he puts the record on a portable phonograph and, all of a sudden, Hitler’s voice resounds through the debris-filled hallways; the accidental passersby grow stiff, marveling at the sudden reappearance of this uncannily familiar voice … It is such a disembodied voice that materializes the invisible pervasiveness of the corrupt Nazi ideology, while the entire accent of the scene is precisely on the fact that Edmund is not enchanted by this or by any of the other ideological voices which bombard him from all sides: not only the teacher’s voice, but also his sister’s voice offering him the haven of family just before his suicide. What propels him to act is no voice, no superego imperative, but precisely the accepted distance from all voices."
      - superscript [ref=e666]:
        - link "11" [ref=e667]:
          - /url: "#fn-ch2-11"
    - paragraph [ref=e668]:
      - text: In this sense,
      - emphasis [ref=e669]: Germany, Year Zero
      - text: is the exact opposite of Hitchcock’s
      - emphasis [ref=e670]: Rope
      - text: "(shot only a year later). The fundamental problem of both films is the same: that of the relationship of words and deeds, as exemplified by the realization of a dreadful ideology; both films occur as a reaction to the traumatic experience of Nazism: the realization of such a monstrous ideology, how was it possible? At least in"
      - emphasis [ref=e671]: Rope
      - text: ", Hitchcock shrinks from the abyss Rossellini was able to confront (which is why Rope is to be counted among Hitchcock’s failures): what is wrongly attributed to"
      - emphasis [ref=e672]: Germany, Year Zero
      - text: is effectively the thesis of
      - emphasis [ref=e673]: Rope
      - text: . When the homosexual couple strangles their best friend, they do it to win recognition from professor Caddell, their teacher who preaches the right of Supermen to dispose of the useless and weak (the same as Henning in
      - emphasis [ref=e674]: Germany
      - text: "); when Caddell is confronted with the literal realization of his doctrine— when, following the Lacanian definition of communication, he gets back from the other his own message in its inverted, true form—he is shaken and shrinks back from the consequence of his words, i.e., he is not prepared to recognize in them his own truth (again, the same as Henning in Germany). Hitchcock, however, remains at this insight: the “rope” from the film’s title is the rope linking words and deeds, and the film turns out to be an admonition against “playing with words”—never play with dangerous ideas since you can never be sure that there won’t be a psychotic taking them “literally”; nobody in the film, neither the professor nor the murderous couple, is capable of breaking this bond and attaining the point of freedom."
      - superscript [ref=e676]:
        - link "12" [ref=e677]:
          - /url: "#fn-ch2-12"
    - 'heading "Europa ’51: Escape into guilt" [level=4] [ref=e678]'
    - paragraph [ref=e679]:
      - text: "Edmund’s suicide has therefore nothing whatsoever to do with remorse: he just lets himself be drawn into the vertiginous abyss he discovered in committing the parricide. And it is the same abyss that swallows the child in"
      - emphasis [ref=e680]: Europa ’
      - text: 51, a film which is in many aspects complementary to
      - emphasis [ref=e681]: Germany
      - text: ": in"
      - emphasis [ref=e682]: Germany
      - text: ", the moment of epiphany arrives at the end, it functions as the dénouement, whereas the entire story of"
      - emphasis [ref=e683]: Europa
      - text: consists of the display of consequences for its characters of a traumatic “encounter with the Real” which takes place at the very beginning.
    - paragraph [ref=e684]:
      - emphasis [ref=e685]: Europa ’
      - text: 51 is the story of Irene, the wife in a rich Roman family, whose young son desperately seeks contact with her, while she is more interested in receptions and social life. Her son suddenly attempts suicide (by throwing himself into the void in the middle of a spiral staircase) and soon afterward dies from a blood clot. His death brings about in Irene an all-
    - paragraph [ref=e686]:
      - text: "pervasive feeling of guilt, as if it had been her insipid life and neglect of her son which drove him to death; she breaks completely with her former way of life and sets out to search for new meaning in sacrifice and helping people: following the advice of her cousin, a Communist, she gets a low-paid job in a factory; she seeks an answer in the Church and tries helping the poor and working among them, but nothing can satisfy or appease her. When she tries to persuade a small robber from the neighborhood to surrender to the police instead of reporting him herself, she finally transgresses the law; the court of law finds her irresponsible due to the shock caused by the death of her child and sends her to a psychiatric ward for observation. After a series of tests, a cold and distanced psychiatrist proclaims her insane; the family leaves her and, at the end of the film, we see her alone in a sterile cell, while in front of the hospital, the poor whom she tried to help gather and hail her as a new saint…"
      - superscript [ref=e688]:
        - link "13" [ref=e689]:
          - /url: "#fn-ch2-13"
    - paragraph [ref=e690]:
      - text: "The trap laid by the film is the very “obvious” reading according to which Irene breaks down because of the unbearable pressure of guilt that weighs upon her as soon as she becomes aware that she was deaf to her son’s desperate appeal. Read this way, the film is reduced to the usual criticism of the so-called “alienation of contemporary society” where the noise of bustling social life renders us deaf to the desperate cry of our neighbor. If, however, the end of the film, when Irene breaks off all worldly family ties and assumes a “saintly” attitude of abandonment, is to have any sense, then we must question the authenticity of the very guilt which emerges apropos of the son’s suicide: this guilt, far from being authentic, functions already as an escape, i.e., it conceals a far more radical traumatism. In psychoanalytic theory, one talks a lot about the transference or the “projection” of guilt, i.e., about the way the subject gets rid of his responsibility via a paranoiac “projection” of guilt onto the Other (the Jew, for example); perhaps, we should rather reverse the relationship and conceive the very act of assuming guilt as an escape from the real traumatism—we don’t only escape from guilt but also escape into guilt, take refuge in it. To grasp this paradox, we must relate the subjective experience of guilt to the inconsistency of the big Other (the symbolic order), i.e., to the fact that the big Other is “always already dead.” It is in this sense that we should interpret the famous Freudian dream about the father who doesn’t know he is dead: his figure persists, retains its consistency, till he is told the truth. Therefrom the typical obsessional compulsion: I must prevent at any price the Other from learning (that it is dead, impotent)—better for me to die than for the Other to get to know the horrible truth … In short, the subject takes the guilt upon himself: insofar as he sacrifies himself by assuming the guilt, the Other is saved from the devastating knowledge of its inconsistency, impotence, inexistence. Who among us has not had this experience apropos of a person toward whom we are in a relationship of transference: better for me to assume guilt quickly than for the other’s (father’s, the loved woman’s) stupidity, impotence, etc., to come into public view—love is easily recognizable precisely by way of this readiness to assume the role of the scapegoat."
      - superscript [ref=e692]:
        - link "14" [ref=e693]:
          - /url: "#fn-ch2-14"
      - text: The proper way to determine more closely this logic of guilt in its relation to the big Other’s inconsistency is via the contradictory nature of the very notion of big Other. That is to say, in ideological discourse, the agency of the big Other is present in two mutually exclusive modes.
    - paragraph [ref=e694]: "First of all, the “big Other” appears as a hidden agency “pulling the strings,” running the show behind the scenes: divine Providence in Christian ideology, the Hegelian “cunning of Reason” (or, rather, the popular version of it), the “invisible hand of the market” in the commodity economy, the “objective logic of History” in Marxism-Leninism, the “Jewish conspiracy” in Nazism, etc. In short, the distance between what we wanted to achieve and the effective result of our activity, the surplus of the result over the subject’s intention, is again embodied in another agent, in a kind of meta subject (God, Reason, History, Jew). This reference to the big Other is of course in itself radically ambivalent. It can function as a"
    - paragraph [ref=e695]:
      - text: quieting and strengthening reassurance (religious confidence in God’s will; the Stalinist’s conviction that he is an instrument of historical necessity) or as a terrifying paranoiac agency (as in the case of the Nazi ideology recognizing behind economic crisis, national humiliation, moral degeneration, etc., the same hidden hand of the Jew). These two contradictory aspects are united in the figure of the psychoanalyst
      - emphasis [ref=e696]: qua
      - text: "“subject supposed to know” (Lacan): in the psychoanalytic cure, his very presence functions as a kind of pawn, it guarantees that the inconsistent string of “free associations” will retroactively receive meaning. At the same time, however, the presence of the analyst materializes a menace to the analysand’s enjoyment, it threatens to rob him of his enjoyment through the dissolution of his symptoms—when the analytic cure approaches its final stage, it usually provokes in the analysand a paranoiac fear that the analyst is after his innermost treasure, his kernel of secret enjoyment … As can immediately be perceived, the reassuring and the threatening aspects are not symmetrically disposed: the supposed subject"
      - emphasis [ref=e697]: assures
      - text: the analysand of the meaning and
      - emphasis [ref=e698]: menaces
      - text: his enjoyment. Both aspects are actually already present in the anti-Semitic figure of the Jew who
      - emphasis [ref=e699]: simultaneously
      - text: guarantees meaning—if we accept the premise of the Jewish conspiracy, things suddenly “become clear,” we are able to recognize a unique pattern behind the apparent economic and moral chaos—and deprives us of our rightful enjoyment.
    - paragraph [ref=e700]:
      - text: "The crucial point not to be overlooked is, however, that the ideological “big Other” functions at the same time as the precise opposite of the hidden agent pulling the strings: the agency of pure semblance, of an appearance which is nevertheless essential, i.e., which should be preserved at any price. This logic of the essential appearance was carried to the extreme in “real socialism,” in which the whole system aimed at maintaining the appearance of the people united in their support of the Party and in the enthusiastic construction of Socialism— ritualized spectacles followed one after another in which nobody “really believed” and everybody knew that nobody believed, but the Party bureaucrats were nonetheless uncommonly frightened by the possibility that the appearance of belief would disintegrate. They perceived this disintegration as a total catastrophe, as the dissolution of the entire social order. The question to be asked here is simply: if nobody “really believed,” and if everybody knew that nobody believed, what was then the agency, the gaze for whom the spectacle of belief was staged? It is here that we encounter the function of the “big Other” at its purest. In everyday reality, life may be dreadful and dull, but all is well as long as all this remains hidden from the gaze of the “big Other.” It is for his gaze that the spectacle of the happy and enthusiastic people must be staged again and again. If the “big Other” in the first meaning of the term functions as a “subject supposed to know,” here it functions on the contrary as the “subject supposed not to know,” as the agency from which vulgar everyday reality must be hidden."
      - superscript [ref=e702]:
        - link "15" [ref=e703]:
          - /url: "#fn-ch2-15"
      - text: In short, to recall again the Freudian dream of the father who does not know that he is dead, what must be kept from the big Other (incarnated in the gaze of the leader) is the simple fact that he is dead.
    - paragraph [ref=e704]:
      - text: The last terrifying and spectacular example of this compulsive logic of the pure appearance is the fall of Ceaucescu. His crucial mistake, probably the immediate cause of his downfall, was his decision, after the slaughter in Timisoara, to organize a gigantic old-style rally of support in Bucharest to prove to the “big Other” that the appearance was still maintained. The crowd, however, was no longer prepared to play the game and the spell was broken … The usual explanation, according to which Ceaucescu was a megalomaniac who lost contact with reality, was sincerely convinced about popular support for his regime and
      - emphasis [ref=e705]: therefore
      - text: organized the rally obviously falls short. As if the ramified network of the Securitate is not evidence enough that, for years, he was systematically preparing to crush popular revolt against his rule! Ceaucescu definitely did not believe in the support of the people. What he did believe in
    - paragraph [ref=e706]:
      - text: was the big Other.
      - superscript [ref=e708]:
        - link "16" [ref=e709]:
          - /url: "#fn-ch2-16"
      - text: Moments like the mass rally in Bucharest when “the spell was broken,” i.e., when the “big Other” disintegrated, exemplify perfectly how we can
      - emphasis [ref=e710]: lose something we
      - emphasis [ref=e711]: never possessed
      - text: ". Was not the crucial turning point in the decomposition of Eastern European “really existing socialism” the sudden awareness of the subjects that, in spite of the tremendous force of the apparatuses of repression, the Communist party is actually powerless, that it is only as strong as they, the subjects, make it, that its strength is their belief in it? And is this turning point not best rendered by the paradox that the Party thus lost what it never had? The paradox to be explained is namely the following: the subjects, of course, never really believed in the Party, in communism, etc., Party rule was from the very beginning experienced as an imposed dictature—if, however, the Party"
      - emphasis [ref=e712]: never possessed legitimacy
      - text: in the eyes of the people, how to account for the fact that the above-described moment when “the spell was broken” was, for all that, experienced as
      - emphasis [ref=e713]: a loss of legitimacy
      - text: "? The key lies in the status of the “big Other” qua the order of “essential appearance”: although the subjects “never really believed in it,” they nevertheless"
      - emphasis [ref=e714]: acted as
      - text: if they believed,
      - emphasis [ref=e715]: as if
      - text: the Party ruled with full legitimacy, they followed the “external” ritual, made the proper acclamations when it was necessary, etc. In other words, what is lost in a loss of what we never possessed is the “essential appearance” which ruled our lives.
    - paragraph [ref=e716]:
      - text: "It is therefore here, in the relationship to the Communist leader, that we encounter the link connecting the guilt with the Other’s inconsistency at its purest: if something goes wrong, we can attest our devotion to the cause by readily assuming responsibility for the failure and so saving the purity of the revolutionary project itself. Perhaps therein consisted also the logic of the Stalinist purges, i.e., the mystery of the dedicated Communists who unhesitatingly confessed to the most horrid counterrevolutionary crimes: their maneuver was to keep intact the communist idea, to prevent the Other from learning the truth and disintegrating. According to Lacan, the same mechanism is at work in the experience of “original sin”: God did not only die, He was always already dead, He only did not always know about it, and the sense of man’s “original sin” is precisely to spare Him the experience of his “inexistence” (inconsistency, impotence) by assuming guilt. The logic of “original sin” is therefore again: better for me to be throughout guilty than for Him to learn about His death."
      - superscript [ref=e718]:
        - link "17" [ref=e719]:
          - /url: "#fn-ch2-17"
    - paragraph [ref=e720]:
      - text: This “inexistence of the Other” that we conceal by all too willingly assuming guilt is thus what is at stake in
      - emphasis [ref=e721]: Europa ’
      - text: "51: at the end of the film, Irene doesn’t simply get rid of her guilt, rather, she experiences her guilt itself as a kind of delusive maneuver destined to conceal the ontological void that swallowed her son. Her attempt to take refuge in communism and Christianity, the two main ideologies of “Europe ’51,” is thus nothing but a desperate attempt to recover the traumatic encounter of the Real (her son’s suicidal act) by means of integrating it into a symbolic universe of guilt, locating it within an ideological field, and thus conferring meaning upon it: “Irene is therefore attracted by ideological constellations which fascinate her as, for the moment, at least, they enable her to integrate the scandal of her son’s death into a transcendent logic.”"
      - superscript [ref=e723]:
        - link "18" [ref=e724]:
          - /url: "#fn-ch2-18"
      - text: And what takes place toward the end of the film when Irene assumes the subjective position of the saint, i.e., of an objectival remainder-excrement, is precisely
      - emphasis [ref=e725]: separation
      - text: "in the strict Lacanian meaning of the term: separation of a (object) from I (symbolic identity), a falling out of the object from the symbolic network, the assumption of a distance from the symbolic universe."
    - 'heading "Stromboli: The act of freedom" [level=4] [ref=e726]'
    - paragraph [ref=e727]:
      - text: Separation is also enacted toward the end of
      - emphasis [ref=e728]: Stromboli
      - text: ", the first of Rossellini’s Bergman"
    - paragraph [ref=e729]:
      - text: movies.
      - emphasis [ref=e730]: Stromboli
      - text: "is a story about Karin, an Estonian émigrée who, at the end of the Second World War, finds herself in a refugee camp in Italy. After repeated failures to obtain an Argentinian visa, she marries a poor Italian fisherman from the volcanic island of Stromboli as a last desperate attempt to escape the camp. Life on the island goes on within the confines of a closed community where a primitive patriarchal atmosphere reigns: there is “authentic” contact with nature, but also customary beating of women … Karin is soon stifled by her new life and resolves to run away: she takes a long walk across the mountain with the crater to the island’s other shore, where a boat leaves for the mainland. As Karin ascends the volcano, however, smoke and fumes from the crater surround and choke her and she fades away. After this terrifying “encounter with the Real,” the American and Italian versions of the film distinctly divide. In the American version (put together by RKO against Rossellini’s will), Karin later wakes up to a bright morning and descends back toward the village, while an obtrusive voiceover tells us exactly what to think: “Out of her terror and her suffering, Karin had found a great need for God. And she knew now that only in her return to the village could she hope for peace.” The Italian version, however, where the last word was Rossellini’s, leaves the dilemma open: the film ends with Karin repeating offscreen “My God! Oh merciful God!” and with a shot of the billowing smoke of the volcano. Asked if she is leaving or returning to the village at the end, Rossellini replied."
    - paragraph [ref=e731]:
      - text: I don’t know. That would be the beginning of another film…. There is a turning point in every human experience in life—which isn’t the end of the experience or of the man, but a turning point. My finales are turning points. Then it begins again—but as for what it is that begins, I don’t know.
      - superscript [ref=e733]:
        - link "19" [ref=e734]:
          - /url: "#fn-ch2-19"
    - paragraph [ref=e735]:
      - text: By this very irresolution of its ending,
      - emphasis [ref=e736]: Stromboli
      - text: "marks the proper dimension of the act: it ends at the precise point at which the"
      - emphasis [ref=e737]: act
      - text: is already accomplished, although no
      - emphasis [ref=e738]: action
      - text: "is yet performed. The act done (or, more appropriately: endured) by Karin is that of"
      - emphasis [ref=e739]: symbolic suicide
      - text: ": an act of “losing all,” of withdrawing from symbolic reality, that enables us to begin anew from the “zero point,” from that point of absolute freedom called by Hegel “abstract negativity.” The moment of this symbolic suicide can be located in a precise way: it takes place between the two mentions of God. Karin reaches her lowest point of despair and dejection when, on running from the village (the social link), she finds herself surrounded by the volcano’s smoke and fumes. In the face of the primordial power of the volcano, all social ties pale into insignificance, she is reduced to her bare “being there”: running away from the oppressive social"
      - emphasis [ref=e740]: reality
      - text: ", she encounters something incomparably more horrifying, the"
      - emphasis [ref=e741]: Real
      - text: ". Sobbing wildly, she cries out: “I’ll finish it, but I haven’t the courage; I’m afraid.” Then she cries out the name of God twice, but as an expression of extreme frustration and exhaustion, and breaks down. Fade in to a shot of a quiet, sunny morning; Karin, who fell asleep on the crater’s brink, awakens and again says “Oh God!” twice, but the same words are now “transformed into an act of homage to the magnificent stillness all around her.”"
      - superscript [ref=e743]:
        - link "20" [ref=e744]:
          - /url: "#fn-ch2-20"
      - text: "To use Hegelian terms: the previous experience of a loss is converted into the"
      - emphasis [ref=e745]: loss of a loss itself
      - text: "— now, she is aware that what, a moment ago, she was so afraid to lose, is totally null, i.e., is already in itself a kind of a loss. We could also say that Karin experiences the meaning of God’s tautology: her entire experience could be written down as “God is … God,” denoting the ultimate coincidence of God"
      - emphasis [ref=e746]: qua
      - text: all-destructive fury and God
      - emphasis [ref=e747]: qua
      - text: blissful serenity. After we pass through the “zero point” of the symbolic suicide, what a moment ago appeared as the whirlpool of rage sweeping away all determinate existence changes miraculously into supreme bliss—
      - emphasis [ref=e748]: as soon as we renounce all symbolic ties
      - text: . And the act in the Lacanian sense is
    - paragraph [ref=e749]:
      - text: nothing but this withdrawal by means of which
      - emphasis [ref=e750]: we renounce renunciation itself
      - text: ", becoming aware of the fact that we have nothing to lose in a loss."
      - superscript [ref=e752]:
        - link "21" [ref=e753]:
          - /url: "#fn-ch2-21"
      - text: What Karin didn’t have the courage to finish the previous night is precisely this act of symbolic suicide, this withdrawal
      - emphasis [ref=e754]: from
      - text: "symbolic reality which is to be opposed strictly to the suicide “in reality.” The latter remains caught in the network of symbolic communication: by killing himself, the subject attempts to send a message to the Other, i.e., it is an act that functions as an acknowledgment of guilt, a sobering warning, a pathetic appeal (like the recent Lithuanian political self-incinerations), whereas the symbolic suicide aims to exclude the subject from the very intersubjective circuit."
    - paragraph [ref=e755]:
      - text: The trap laid by
      - emphasis [ref=e756]: Stromboli
      - text: "consists therefore in the reading of its end that offers itself as “obvious”: through the experience of epiphany, Karin becomes aware of the frivolity and pointlessness of her aversion to the damp life in the village; reborn, she calmly accepts her destiny … However, as we have seen, the whole point of Rossellini’s ending is that it stops short of this conclusion. What lies ahead of Karin is undoubtedly what, in a vulgarly pathetic way, we call “a new life”: sooner or later, she will return to the village, make peace with her husband or return to the mainland and assume new symbolic mandates, a new place in the community, in one way or another, she will begin again to be active—but the film ends"
      - emphasis [ref=e757]: before
      - text: Karin finds her place in a new symbolic identity (or reassumes the old one),
      - emphasis [ref=e758]: before
      - text: the new performative, the new “founding word.”
      - superscript [ref=e760]:
        - link "22" [ref=e761]:
          - /url: "#fn-ch2-22"
      - text: "There is of course something exceptional, excessive even, in such an encounter with the Real, with the abyss of the “abstract freedom”: it takes place only in the utmost intimacy of what some call the “mystic experience.” The emphasis of Lacan is, however, that such a passage through the “zero point” of symbolic suicide is at work in"
      - emphasis [ref=e762]: every
      - text: act worthy of this name. What is namely an act?
      - superscript [ref=e764]:
        - link "23" [ref=e765]:
          - /url: "#fn-ch2-23"
      - text: Why is suicide the act
      - emphasis [ref=e766]: par
      - emphasis [ref=e767]: excellence
      - text: "? The act differs from an active intervention (action) in that it radically transforms its bearer (agent): the act is not simply something I “accomplish”—after an act, I’m literally “not the same as before.” In this sense, we could say that the subject “undergoes” the act (“passes through” it) rather than “accomplishes” it: in it, the subject is annihilated and subsequently reborn (or not), i.e., the act involves a kind of temporary eclipse,"
      - emphasis [ref=e768]: aphanisis
      - text: ", of the subject. Which is why every act worthy of this name is “mad” in the sense of radical"
      - emphasis [ref=e769]: unaccountability
      - text: ": by means of it, I put at stake everything, including myself, my symbolic identity; the act is therefore always a “crime,” a “transgression,” namely of the limit of the symbolic community to which I belong. The act is defined by this irreducible risk: in its most fundamental dimension, it is always"
      - emphasis [ref=e770]: negative
      - text: ", i.e., an act of annihilation, of wiping out—we not only don’t know what will come out of it, its final outcome is ultimately even insignificant, strictly secondary in relation to the NO! of the pure act."
      - superscript [ref=e772]:
        - link "24" [ref=e773]:
          - /url: "#fn-ch2-24"
    - paragraph [ref=e774]:
      - text: Today, as communism falls apart everywhere, it is worth recalling the act which started it all, an act contemporary to
      - emphasis [ref=e775]: Germany, Year Zero and Stromboli
      - text: ": Tito’s “No!” to Stalin in 1948, i.e., the split of Yugoslav Communists with the Moscow-dominated international communist movement. The negative dimension was here far more decisive than its positive outcome or motivation: what really counted was simply the fact that a Communist party which held power said “No!” to Stalin’s hegemony. The positive reasons in the name of which this break was accomplished were probably not clear to its bearers themselves; we could even risk a cynical hypothesis that all later inventions because of which Yugoslavia is today in such a mess (worker’s self-management) sprang from the desperate attempts of the Party ideologues to “rationalize” the “No!” of the pure act, to found it upon some positive ideological project. What we must bear in mind here is this hiatus: the break with Stalin was not a break in the name of worker’s self-management (as was claimed by later apologists), it was an act of pure risk, of refusal, of “persisting on one’s own,” and it was only later that this refusal assumed positive, determinate existence in the ideological project of self-management. With their “No!”"
    - paragraph [ref=e776]:
      - text: "to Stalin, Tito and his companions crossed their Rubicon without being sure of what awaited them on the other bank, of what would become of them. It should also be clear, now, why an act, although it belongs to the Real, is possible only against the background of the symbolic order: the greatness of an act depends strictly on the place from which it was accomplished. In other words, as it has already been pointed out by numerous political historians, Tito’s “No!” had such a subversive impact only because it was pronounced"
      - emphasis [ref=e777]: by a
      - text: Communist, only because he resisted Stalin
      - emphasis [ref=e778]: as a Communist
      - text: ". (For this reason, there was no great pressure on Yugoslavia to become part of Western political or military alliances.) If Tito had “changed sides,” passed over to the West and “restored capitalism,” nothing really subversive would have happened: we would simply have had a case of communist defeat in the Cold War, the West would have appropriated a part of Stalin’s empire; it was precisely by his insistence that he was acting"
      - emphasis [ref=e779]: as a
      - text: Communist that Tito made a breach into the communist monolith.
      - superscript [ref=e781]:
        - link "25" [ref=e782]:
          - /url: "#fn-ch2-25"
      - text: One of the usual Habermasian reproaches to the Lacanian ethic concerns its alleged incompatibility with the spirit of
      - emphasis [ref=e783]: polis
      - text: ", of community: is not, in the eyes of Lacan, the ultimate ethical achievement the suicidal ecstasy, the full acceptance of our “being toward death” which evidently suspends the social dimension? Is not every public deed as such a kind of betrayal of the subject’s “authentic” desire, i.e., the death drive? We can see, now, where this reproach runs short: the “authentic” suicidal gesture and the public deed are not to be opposed in an external way, since a “suicidal” gesture, an"
      - emphasis [ref=e784]: act
      - text: ", is at the very foundation of a new social link."
    - paragraph [ref=e785]:
      - text: With an act, stricto
      - emphasis [ref=e786]: sensu
      - text: ", we can therefore never fully foresee its consequences, i.e., the way it will transform the existing symbolic space: the act is a rupture after which “nothing remains the same.” Which is why, although History can always be explained, accounted for, afterward, we can never, as its agents, caught in its flow, foresee its course in advance: we cannot do it insofar as it is not an “objective process” but a process continuously interrupted by the scansion of acts. The new (the symbolic reality that emerges as the aftermath of an act) is always a “state that is essentially a by-product,”"
      - superscript [ref=e788]:
        - link "26" [ref=e789]:
          - /url: "#fn-ch2-26"
      - text: "never the result of advance planning. There are numerous examples of such acts: From de Gaulle’s “No!” to"
      - emphasis [ref=e790]: Pétain
