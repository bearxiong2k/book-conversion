      - emphasis [ref=e1703]: unheimliches
      - text: surplus forever missing in the mirror image, i.e., “unspecularizable,” yet precisely as such present in it in the shape of that unfathomable X on account of which the mirror image obtains its
      - emphasis [ref=e1704]: unheimliches
      - text: character—the double is “the same as me,” yet totally strange; his sameness all the more accentuates his uncanniness. This is why the image of a double so easily turns into its opposite, so that, instead of experiencing the radical otherness of his similar, the subject recognizes
      - emphasis [ref=e1705]: himself
