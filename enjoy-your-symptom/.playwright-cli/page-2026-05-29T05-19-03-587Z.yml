    - heading "2.2 the “Night of the World”" [level=3] [ref=e798]
    - heading "Psychoanalysis and German idealism" [level=4] [ref=e799]
    - paragraph [ref=e800]: By identifying the act as a suspension of constituted reality, as the subject’s withdrawal from it, we attain the level at which it becomes possible to elaborate the link that connects the psychoanalytic theory of drives and the philosophy of German idealism (Fichte, Schelling, Hegel), the latter’s notion of reality as something constituted, “posited” by the subject.
    - paragraph [ref=e801]:
      - text: The dimension of psychoanalytic theory lost with the ascent of positivist
      - emphasis [ref=e802]: ego psychology
      - text: is the former’s opposition to the common-sensical (and at the same time scientific) approach which accepts so-called “external reality” as such, as something
      - emphasis [ref=e803]: given
      - text: "in advance, and reduces the problem of the “psychical apparatus” to the question of how (if at all) this apparatus succeeds in accommodating itself to reality, in connecting, “coupling” with it. In this perspective, the definition of “normalcy” is a psychical apparatus open to reality, whereas the psyche is “pathogenic” if, instead of establishing proper contact with reality, it builds its own “disjointed” universe. It was of course the classical Marxist criticism of “conformist” psychoanalysis which opposed itself to such a notion of reality: the “reality” to which conformist psychoanalysis refers as a norm of psychic “sanity” is not neutral reality as such, but the historically specified form of"
      - emphasis [ref=e804]: social
      - text: reality. By offering as its ideal the subject “adjusted to reality,” conformist psychoanalysis makes itself subservient to existing social reality, to its relations of domination, categorizing critical distance from it as “pathological.”
    - paragraph [ref=e805]:
      - text: "The scope of this criticism is, however, limited by the fact that it still retains the notion of accordance of psychic apparatus with reality, although only as a “regulative idea” to be realized in the nonalienated society to come. A step further (or a step backward into a nonhistorical absolutization of the split, if we look at it with the eyes of the above-mentioned Marxist criticism) was already accomplished by Freud himself, whose theoretical starting point was an original, irreducible, so to speak constitutive discord between the logic of the psychic apparatus and the demands of reality: it is because of this discord that “discontent in civilization” is something that defines the"
      - emphasis [ref=e806]: condition humaine
      - text: "as such. “By its own nature,” the psychic apparatus is not adjusted to reality: it runs following the “pleasure principle,” which cares nothing for the limitations imposed by reality; thereupon, the conditions of self-preservation enforce upon the psychic apparatus a renunciation of the absolute predominance of the “pleasure principle,” its transformation into the “reality principle.” The point not to be missed here is that the reign of the “reality principle” is not something that the psychic apparatus could arrive at following the immanent, spontaneous path of “maturation,” but something imposed, extorted by means of a series of traumatic cuts (“complexes,” integrations of losses): our most “natural” openness to reality implies that the prohibitions which exert pressure upon the inherent logic of the psychic apparatus have successfully broken it down and become our “second nature.”"
    - paragraph [ref=e807]:
      - text: However, even such a notion of the irreducible discord between the psychic apparatus “spontaneously” striving for the reign of a pure “pleasure principle” and the demands of reality still accepts “reality” as something simply given in advance, as a positive entity independent of the psychic apparatus, which, from
      - emphasis [ref=e808]: without
      - text: ", exerts its pressure and disturbs the balanced functioning of the psyche. True, we are thus far from any kind of preestablished harmony between the psychic apparatus and reality: the focal object of psychoanalytic theory is the traumatic process by means of which the psychic apparatus is forced out of the closed circuit of the “pleasure principle” and into connecting with reality; yet “reality” is still simply here, given in advance as that to which the psyche must adjust itself. By introducing the dimension of “beyond the pleasure principle,” the late Freud accomplishes here two further steps which—insofar as we think out all their consequences, as was done by Lacan—change"
    - paragraph [ref=e809]:
      - text: "completely the picture presented above. The hypothesis of a “death drive” concerns directly this point: its implication is that the foreign body, the intruder which disturbs the harmonious circuit of the psychic apparatus run by the “pleasure principle,” is not something external to it but strictly inherent to it: there is something in the very immanent functioning of the psyche, notwithstanding the pressure of “external reality,” which resists full satisfaction. In other words, even if the psychic apparatus is entirely left to itself, it will not attain the balance for which the “pleasure principle” strives, but will continue to circulate around a traumatic intruder in its interior—the limit upon which the “pleasure principle” stumbles is internal to it."
      - superscript [ref=e811]:
        - link "27" [ref=e812]:
          - /url: "#fn-ch2-27"
      - text: The Lacanian mathem for this foreign body, for this “internal limit,” is of
      - emphasis [ref=e813]: course object
      - emphasis [ref=e814]: "petit a: objet a"
      - text: "is the reef, the obstacle which interrupts the closed circuit of the “pleasure principle” and derails its balanced movement—or, to refer to Lacan’s elementary scheme:"
    - paragraph [ref=e815]:
      - text: And the final step to be taken is to grasp this inherent impediment in its
      - emphasis [ref=e816]: positive
      - text: "dimension: true, the"
      - emphasis [ref=e817]: objet a
      - text: prevents the circle of pleasure from closing, it introduces an irreducible displeasure, but the psychic apparatus finds a sort of perverse pleasure
      - emphasis [ref=e818]: in this displeasure
      - emphasis [ref=e819]: itself
      - text: ", in the neverending, repeated circulation around the unattainable, always missed object. The Lacanian name for this “pleasure in pain” is of course enjoyment ("
      - emphasis [ref=e820]: jouissance
      - text: ), and the circular movement which finds satisfaction in failing again and again to attain the object, the movement whose true aim coincides therefore with its very path toward the goal, is the Freudian
      - emphasis [ref=e821]: drive
      - text: ". The space of the drive is such a paradoxical, curved space: the"
      - emphasis [ref=e822]: object a
      - text: is not a positive entity existing in space, it is ultimately nothing but a certain
      - emphasis [ref=e823]: curvature of the space
      - emphasis [ref=e824]: itself
      - text: "which causes us to make a bend precisely when we want to get directly at the object. It is for this reason that Lacan was so fascinated by the paradoxes of courtly love: the lady is such a paradoxical object which curves the space of desire, i.e., which offers us as the way to attain it only endless detours and ordeals—more precisely, the lady is in herself nothing at all, a pure semblance which just materializes the curvature of the space of desire."
      - superscript [ref=e826]:
        - link "28" [ref=e827]:
          - /url: "#fn-ch2-28"
      - text: "The resemblance of the depicted Lacanian scheme to a cross section of an eye is by no means accidental:"
      - emphasis [ref=e828]: object a
      - text: effectively functions as a rift in the closed circle of the psychic apparatus governed by the “pleasure principle,” a rift which “derails” it and forces it to “cast a look on the world,” to take into account reality. This is how we should conceive Lacan’s thesis that
      - emphasis [ref=e829]: object a
      - text: "serves as a support to reality: access to what we call “reality” is open to the subject via the rift in the closed circuit of the “pleasure principle,” via the embarrassing intruder in its midst. The place of “reality” within the psychic economy is that of an “excess,” of a surplus which disturbs and blocks from within the autarky of the self-contained balance of the psychic apparatus—“reality” as the external necessity which forces the psychic apparatus to renounce the exclusive rule of the “pleasure principle” is correlative to this inner stumbling block."
      - superscript [ref=e831]:
        - link "29" [ref=e832]:
          - /url: "#fn-ch2-29"
    - paragraph [ref=e833]:
      - text: How should we then conceive the relationship between
      - emphasis [ref=e834]: object a
      - text: ", this strange body in the very heart of the psychic apparatus, and so-called “external reality”? The crucial point not to be missed is that"
      - emphasis [ref=e835]: objet a
      - text: functions as the inherent, internal “excess” which impedes from within the “smooth running” of the psychic apparatus, as its immanent antagonism, whereas
    - paragraph [ref=e836]:
      - text: reality always, by definition, appears as an
      - emphasis [ref=e837]: external
      - text: limit; the Lacanian name for such an internal self-impediment is, of course, the
      - emphasis [ref=e838]: Real
      - text: ". The radical conclusion to be drawn from it is that—contrary to the commonsensical external opposition of “pleasure principle” and “reality principle” (upheld also by the early Freud)—“reality” is not something given in advance but something the ontological status of which is in a way secondary, in other words: something"
      - emphasis [ref=e839]: constituted
      - text: in the precise meaning this term acquired in German idealism. What we call “(external) reality”
      - emphasis [ref=e840]: constitutes
      - text: "itself by means of a primordial act of “rejection”: the subject “rejects,” “externalizes” its immanent self-impediment, the vicious circle of the drive antagonism, into the “external” opposition between the demand of its drives and those of the opposed reality. It is here that, within psychoanalysis, the achievement of German idealism “returns” what was “repressed” in post-Hegelian thought: the process of constitution"
      - emphasis [ref=e841]: qua
      - text: the subject’s
      - emphasis [ref=e842]: prehistory
      - text: ", i.e., what must have gone on"
      - emphasis [ref=e843]: before
      - text: the subject could establish a relationship with “external reality”—the process which, with Fichte, acquires the form of the I’s absolute act of positing (of itself as) the object, and which, with Schelling, appears as the antagonism of God’s prehistory, resolved when God speaks out his Word.
    - heading "The fiction of reality" [level=4] [ref=e844]
    - paragraph [ref=e845]:
      - text: Psychoanalysis thus conceives “reality” as something constituted, “posited” by the subject, in the precise meaning this term acquired in German idealism. The “year zero” from the title of the Rossellini’s film is that “dark passage” through the zero point, that “eclipse of (constituted) reality,” that withdrawal of the subject into itself, that “night of the world,” the experience of the pure self
      - emphasis [ref=e846]: qua
      - text: “abstract negativity,” about which Hegel speaks in a manuscript for the
      - emphasis [ref=e847]: Realphilosophie
      - text: "of 1805–1806:"
    - paragraph [ref=e848]:
      - text: The human being is this night, this empty nothing, that contains everything in its simplicity—an unending wealth of many presentations, images, of which none happens to occur to him—or which are not present. This night, the inner of nature, that exists here —pure self—in phantasmagorical presentations, is night all around it, here shoots a bloody head—there another white shape, suddenly here before it, and just so disappears. One catches sight of this night when one looks human beings in the eye—into a night that becomes awful …
      - superscript [ref=e850]:
        - link "30" [ref=e851]:
          - /url: "#fn-ch2-30"
    - paragraph [ref=e852]:
      - text: And the symbolic order, the universe of the Word, emerges only against the background of the experience of this abyss, as is demonstrated by Hegel in the same manuscripts, when he points out that this inwardness of the pure self “must enter also into existence, object becoming, opposite this innerness to be external; return to being. This is language as name-giving power … Through the name the object as individual being is born out of the I.”
      - superscript [ref=e854]:
        - link "31" [ref=e855]:
          - /url: "#fn-ch2-31"
    - paragraph [ref=e856]:
      - text: "The first association that comes to mind apropos of these fragments is of course the traditional “deconstructionist” reproach to Hegel: true, Hegel acknowledges this radical withdrawal of the subject into itself, this “night of the world,” but only as a passing moment which is quickly sublated ("
      - emphasis [ref=e857]: aufgehoben
      - text: ") in a new spiritual reality of names—negativity is thus again reduced to a vanishing point within the self-mediation of the Spirit … However, such a reading, in spite of its convincing, even self-evident character—in a series of his statements, Hegel seems to purport it in an unequivocal way—falls short of the crucial accent of Hegel: the experience of “abstract negativity,” the “psychotic” withdrawal of the subject into self (the “night of the world”), is not a passing moment, sublated in the final result of the dialectical"
    - paragraph [ref=e858]:
      - text: movement, the positive articulation of concrete content—the point is rather that this very concrete articulation of the positive spiritual content is nothing but
      - emphasis [ref=e859]: a form in which the
      - emphasis [ref=e860]: radical negativity (the “night of the world”) assumes determinate being
      - text: . In the famous paragraph 32 of the
      - emphasis [ref=e861]: Preface
      - text: to the
      - emphasis [ref=e862]: Phenomenology of Spirit
      - text: ", Hegel says precisely this when he praises the power of Understanding;"
    - paragraph [ref=e863]:
      - text: the most astonishing and mightiest of powers, or rather the absolute power. The circle that remains self-enclosed and, like substance, holds its moments together, is an immediate relationship, one therefore which has nothing astonishing about it. But that an accident as such, detached from what circumscribes it, what is bound and is actual only in its context with others, should attain an existence of its own and a separate freedom— this is the tremendous power of the negative; it is the energy of thought, of the pure “I.” Death, if that is what we want to call this non-actuality, is of all things the most dreadful, and to hold fast what is dead requires the greatest strength … [The life of Spirit] is this power, not as something positive, which closes its eyes to the negative, as when we say of something that it is nothing or is false, and then, having done with it, turn away and pass on to something else; on the contrary, Spirit is this power only by looking the negative in the face, and tarrying with it. This tarrying with the negative is the magical power that converts it into being.
      - superscript [ref=e865]:
        - link "32" [ref=e866]:
          - /url: "#fn-ch2-32"
    - paragraph [ref=e867]:
      - text: "We already know how the negative is converted into being: through language as name-giving power, i.e., through the emergence of the symbolic order. Hegel’s statements on how understanding breaks up the living organic whole and confers autonomous existence on what is effective only as a moment of concrete totality are to be read against the background of the fundamental Lacanian notion of the signifier"
      - emphasis [ref=e868]: qua
      - text: the power which mortifies/disembodies the life substance, “dissects” the body and subordinates it to the constraint of the signifying network. Word is murder of a thing, not only in the elementary sense of implying its absence —by naming a thing, we treat it as absent, as dead, although it is still present—but above all in the sense of its radical
      - emphasis [ref=e869]: dissection
      - text: ": the word “quarters” the thing, it tears it out of the embedment in its concrete context, it treats its component parts as entities with an autonomous existence: we speak about color, form, shape, etc., as if they possessed self-sufficient being. The power of understanding consists in this capacity to reduce the organic whole of experience to an appendix to the “dead” symbolic classification. In our everyday attitude, we are “spontaneous Bergsonians”: we bemoan the fate of immediate life experience, we point out how the fullness of life flow escapes forever the network of language categories, we laugh at those who become so entangled in the fictitious world of symbols that they lose the taste of effective life. Hegel is, on the contrary, full of wonder for this mortifying faculty of understanding before which the living substance is utterly helpless, for this tremendous power that tears apart what “naturally” belongs together and is thus able to subordinate the very reality of the life process to symbolic “fictions”; for him, this inversion where fiction subjugates reality rather proves"
      - emphasis [ref=e870]: the inherent ontological nullity of what we call “reality
      - text: ".” For what is the “life of Spirit” if not a life process governed by (what appears to our everyday view as) fictitious nonentities? Let us just take the case of the ethical-political arrangement of a given community: its symbolic identity is bestowed upon it by a series of legal, religious, and other values which regulate its life; these values are literally “fictions,” they exist nowhere, they possess no substantial ontological consistency, they are present only in the form of symbolic rituals which enact them. The entire legal order, for example, is founded upon fictions concerning “moral,” physically nonexistent persons which appear as entities with their"
    - paragraph [ref=e871]:
      - text: own will, and rights, entities which declare wars, and make treaties, etc. (“our state concluded peace with its neighbor,” “the company bought raw materials,” “the Fatherland is humiliated” …). The point here is not the cynical insipidity that “these are all just fictions” but the fact that because of these “fictions” thousands die in wars, lose their jobs … In other words, although such a “fiction” effectively exists only in its real effects (the state is actual only in the real activity of its citizens, the Fatherland only in the patriotic feeling and acting of those who recognize themselves in its call), we cannot
      - emphasis [ref=e872]: reduce
      - text: it to these effects and purport that, for example, “the Fatherland is
      - emphasis [ref=e873]: nothing but
      - text: "the sum of these actual individual deeds”—on the contrary, these very deeds assume their ontological consistency only by way of reference to the symbolic fiction “Fatherland.” The Fatherland as the cause for which we fight “is nowhere in reality,” but in spite of this, we cannot explain the very “material” reality of fights and sufferings without reference to it. To resort to the traditional philosophical terms, Lacans avoids here the idealist as well as the nominalist trap: the “big Other” (the symbolic order) of course possesses no substantial actuality, it doesn’t exist as a Platonic world apart, yet neither can it be reduced to a nominalistically conceived “abbreviation” for the multitude of individual, really existing entities. Precisely insofar as it is a “dead scheme,” we must presuppose it as an ideal point of reference which, in spite of its inexistence, is “valid,” i.e., dominates and regulates our actual lives. In a somewhat poetic manner we could say that man is the animal whose life is governed by symbolic fictions."
      - emphasis [ref=e874]: This is the way “tarrying with the
      - emphasis [ref=e875]: "negative” takes place, this is the way negativity as such acquires positive, determinate being:"
      - emphasis [ref=e876]: when the very actual life of a community is structured by reference to symbolic fictions
      - text: . In our everyday lives, we accept this as something so self-evident that we don’t even notice the oddness of what is going on—to become fully aware of it, a philosophical experience of “wondering” is necessary.
    - paragraph [ref=e877]:
      - text: "One of the lessons of Lacanian psychoanalysis—and at the same time the point at which Lacan rejoins Hegel—is the radical discontinuity between the organic immediacy of “life” and the symbolic universe: the “symbolization of reality” implies the passage through the zero point of the “night of the world.” What we forget, when we pursue our daily life, is that our human universe is nothing but an embodiment of the radically inhuman “abstract negativity,” of the abyss we experience when we face the “night of the world.” And what is the act if not the moment when the subject who is its bearer"
      - emphasis [ref=e878]: suspends
      - text: the network of symbolic fictions which serve as a support to his daily life and confronts again the radical negativity upon which they are founded?
      - superscript [ref=e880]:
        - link "33" [ref=e881]:
          - /url: "#fn-ch2-33"
    - paragraph [ref=e882]:
      - text: In other words, Hegelian “absolute negativity”
      - emphasis [ref=e883]: coincides thoroughly
      - text: with the abyss which separates the Kantian subject’s phenomenal experience from the thing in itself. Hegel’s aim is not to prove that we can attain the thing in itself, that we can overcome the barrier which to Kant appeared untraversable; what he accomplishes is just a kind of shift of perspective by means of which this abyss is no longer conceived as a barrier limiting our powers, separating us from the thing itself, but as the very power of separation, of introducing a radical split into the thing itself. Another way to approach the same problem is
      - emphasis [ref=e884]: via
      - text: "the relationship language/reality. For traditional philosophy, their disjunction goes unsaid: to speak about a thing is not the same as to do it. One of the main endeavors of contemporary philosophy is to undermine the self-evident character of this disjunction by way of showing how speech is in itself a species of activity, even a privileged one. The principal thesis of philosophical hermeneutics, for example, is that the “reality” which we encounter within our practical, active relationship to the objects around us is always already disclosed through the symbolic medium: reality “is” only as interpreted by language, language is its ultimate ontological horizon. The late-Wittgensteinian approach, on the other hand, conceives language directly as"
    - paragraph [ref=e885]: a form of activity, as “expressive behavior” embedded in a specific life form—we “do things with words”; etc. It is the merit of these orientations to invalidate the com-monsense attitude best rendered by phrases like “empty words are not enough, we must set to work, do it instead of just talking about it”; against such platitudes, one is tempted to propose the opposite motto “enough of empty acts, it is time we pass from acts to words!” That is to say, every activity is situated in some horizon of meaning which alone renders it possible, so that by “pronouncing the right word” which introduces a break in this symbolic background, one cannot continue to act in the same way as before.
    - paragraph [ref=e886]:
      - text: Yet what all these orientations have in common is that they perceive the abyss which separates “things” from “words” as
      - emphasis [ref=e887]: a problem
      - text: ", as something one has to overcome—Hegel, on the contrary, perceives it as the Spirit’s supreme accomplishment, he sees in it the Spirit’s “infinite” power to disengage itself from the immediacy of what is simply given, to break up its organic unity. For him, the true theoretical problem is not how to leap over the abyss which separates acts from words, but how to conceive this abyss itself: the absolute act, the act stronger than all interventions in reality, is the act by means of which we disjoin the “great chain of being” and acquire distance from it. The only way to “overcome” the abyss that separates acts from words is to thematize the act which opens up this abyss, i.e., to render visible the radical"
      - emphasis [ref=e888]: violence
      - text: ", the breach in the Real, which forms the hidden reverse of the calm contemplative distance from reality."
      - emphasis [ref=e889]: This
      - text: "act is overlooked by the traditional contemplative attitude as well as by post-Hegelian attempts to overcome this distance by conceiving speech as a modality of acting. Or, to put it in Kierkegaardian terms: we effectively “overcome” the abyss that separates words from acts only by way of experiencing the word in its violent and contingent “becoming,” before it acquires the features of"
      - emphasis [ref=e890]: logos
      - text: ", the universe of symbolic necessity."
      - superscript [ref=e892]:
        - link "34" [ref=e893]:
          - /url: "#fn-ch2-34"
    - paragraph [ref=e894]:
      - text: What we call “culture” is therefore, in its very ontological status,
      - emphasis [ref=e895]: the
      - emphasis [ref=e896]: reign of the dead over
      - emphasis [ref=e897]: life
      - text: ", i.e., the form in which the “death drive” assumes positive existence. Herein lies also the fundamental “Hegelian” lesson of Rossellini’s films: the act"
      - emphasis [ref=e898]: qua
      - text: "real, transgression of a symbolic limit, does not enable us to (re) establish a kind of immediate contact with the presymbolic life substance, it throws us, on the contrary, back into that abyss of the Real out of which our symbolic reality emerged. Now we can further specify the lure of Rossellini’s Bergman films: they always contain some picture of “authentic,” substantial life, and it seems as if the heroine’s salvation depends on her ability to immerge into this substantial “authenticity”: Karin in"
      - emphasis [ref=e899]: Stromboli
      - text: must accept life in the closed island community; Irene in
      - emphasis [ref=e900]: Europa ’
      - text: 51 should find herself in the naive but authentic faith of the poor who at the end proclaim her a saint; the English couple in
      - emphasis [ref=e901]: Voyage
      - text: to
      - emphasis [ref=e902]: Italy
      - text: "overcome the restraint of their relationship through contact with the spontaneous life feeling of the Italian crowd … The strategy of these films is precisely to denounce this lure as such, to present it in its falseness: Karin in"
      - emphasis [ref=e903]: Stromboli
      - text: is “reborn” by experiencing a horror before which the misery of the island community pales—the life of the fishermen is thus exposed in all its nullity; at the end of
      - emphasis [ref=e904]: Europa ’
      - text: 51, Irene definitely renounces religious ideology—her beatification by the poor outcasts is just a cruel irony, proof of a missed encounter between her and them; what the English couple cruising Italy come across behind the vivacious Italian crowd is the inert presence of ancient statues and ruins. In all three cases, we have therefore a movement
      - emphasis [ref=e905]: from
      - emphasis [ref=e906]: reality to the Real
      - text: ", to what, in reality itself, is “more than reality”: the volcano is what is “on the island more than island itself,” its excess of the Real, just as sainthood is what is “in religious ideology more than ideology,” the nonideological kernel in its heart, and, finally, the same as the old ruins which are what is “in Italy more than Italy,” a mute witness to some past, long-lost enjoyment."
      - superscript [ref=e908]:
        - link "35" [ref=e909]:
          - /url: "#fn-ch2-35"
      - text: In all three cases, the heroine is able to perceive this fissure of the
    - paragraph [ref=e910]:
      - text: “substance” insofar as she occupies the position of a
      - emphasis [ref=e911]: stranger
      - text: ", i.e., insofar as her gaze is"
      - emphasis [ref=e912]: external
      - text: ": those who find themselves within the substance are necessarily blinded. The mechanism that renders them blind is that of the"
      - emphasis [ref=e913]: sacrifice
      - text: ": the elementary function of the sacrifice is"
      - emphasis [ref=e914]: to heal the fissure of the Other
      - text: . What holds together a “substantial” (“primordial”) community is its rite of sacrifice, and the position of a “stranger” is defined precisely by his refusal to partake in this rite.
    - heading "The fascination of the sacrifice" [level=4] [ref=e915]
    - paragraph [ref=e916]:
      - text: In the last pages of his
      - emphasis [ref=e917]: Four Fundamental Concepts of Psycho
      - text: "-"
      - emphasis [ref=e918]: Analysis
      - text: ", Lacan directly opposes psychoanalytic experience to the fascination of the sacrifice: the heroism demanded by psychoanalysis is not the heroic gesture of assuming upon oneself the sacrifice, of accepting the role of sacrificial victim but, on the contrary, the heroism of"
      - emphasis [ref=e919]: resisting the temptation of the
      - emphasis [ref=e920]: sacrifice
      - text: ", of confronting what the fascinating image of the sacrifice"
      - emphasis [ref=e921]: conceals
      - text: ". Lacan himself draws our attention to the political dimension of the sacrificial logic, pointing out how the drama of Nazism reenacts:"
    - paragraph [ref=e922]:
      - text: the most monstrous and supposedly superseded forms of the holocaust…. [T]he offering to obscure gods of an object of sacrifice is something to which few subjects can resist succumbing, as if under some monstrous spell. … But for whoever is capable of turning a courageous gaze towards this phenomenon—and, once again, there are certainly few who do not succumb to the fascination of the sacrifice in itself—the sacrifice signifies that, in the object of our desires, we try to find evidence for the presence of the desire of this Other that
      - emphasis [ref=e923]: I call here the dark God
      - text: .
      - superscript [ref=e925]:
        - link "36" [ref=e926]:
          - /url: "#fn-ch2-36"
    - paragraph [ref=e927]:
      - text: What is then concealed by the fascinating spectacle of the sacrifice? Lacan relates the sacrifice to the
      - emphasis [ref=e928]: desire of the Other
      - text: ", to the enigmatic"
      - emphasis [ref=e929]: Che vuoi
      - text: "? What does the Other want of me? In its most fundamental dimension, sacrifice is a “gift of reconciliation” to the Other, destined to appease its desire. Sacrifice conceals the abyss of the Other’s desire, more precisely: it conceals the Other’s lack, inconsistency, “inexistence,” that transpires in this desire."
      - emphasis [ref=e930]: Sacrifice is a
      - emphasis [ref=e931]: guarantee that “the Other exists
      - text: "”: that there is an Other who can be appeased by means of the sacrifice. The trick of the sacrifice consists therefore in what the speech-act theorists would call its “pragmatic presupposition”:"
      - emphasis [ref=e932]: by the very act of sacrifice, we (presup) pose the existence
      - emphasis [ref=e933]: of its addressee
      - text: that guarantees the consistency and meaningfulness of our experience—so, even if the act fails in its proclaimed goal, this very failure can be read from within the logic of sacrifice as
      - emphasis [ref=e934]: our
      - text: failure to appease the Other. Insofar as this abyss of the Other’s desire emerged in all its violence with the Jewish religion—i.e., insofar as the fundamental position of the Jewish believer is that of a perplexed
      - emphasis [ref=e935]: Che vuoi
      - text: "?—What does He want of me?—it was unavoidable for it to break with the logic of sacrifice: sacrifice would mean that we betrayed the abyss of"
      - emphasis [ref=e936]: Che vuoi
      - text: "? and translated God’s desire into a demand that can be appeased by means of a sacrifice. And—at this point, we can follow René Girard"
      - superscript [ref=e938]:
        - link "37" [ref=e939]:
          - /url: "#fn-ch2-37"
      - text: —it was precisely for this reason that we encounter in the Jewish religion the first appearance of a subject who
      - emphasis [ref=e940]: resists
      - text: "assuming the role of a scapegoat/victim: Job. Job’s refusal to play his part in the sacrificial rite is the exact reverse of his perplexion in front of his calamities: instead of identifying heroically with his evil fate, he continues to raise the question of the meaning of it all, of what God wants of him with it. We witness here what is perhaps the greatest ethical revolution in the history of mankind: the moment when the subject refuses the allotted role of the victim, the"
    - paragraph [ref=e941]:
      - text: moment when the social perspective of sacrificing the scape-goat is confronted with the perspective of the victim itself; what is here so subversive and pathbreaking, what confers upon the story of Job its dramatic tension and at the same time its truth, is the very
      - emphasis [ref=e942]: confrontation
      - text: "of the two perspectives. That is to say, if we were to dispose only of the point of view of the community demanding sacrifice, we would remain within the “totalitarian” universe; if, on the other hand, we were to be limited to the victim’s voice, we would have a subjective point of view with nothing attesting to its truth. The effect of truth proceeds solely from the confrontation of the two perspectives: first, the sacrificial discourse places the subject in the position of a sacred victim, depicting him as an untouchable, horrendous entity, in short: as an"
      - emphasis [ref=e943]: object
      - text: in the psychoanalytical sense, with all the transferential energy invested in it; then, we are all of a sudden transposed into his own perspective, brought face to face with the uncanny scene in which it is not simply a subject but the thing itself which starts to talk.
    - paragraph [ref=e944]:
      - text: Today, in our universe of mass culture, the figure which comes closest to this role of a scapegoat embodying sacred violence is the “serial killer,” the madman who, with no “rational ground,” compulsively repeats murderous acts.
      - superscript [ref=e946]:
        - link "38" [ref=e947]:
          - /url: "#fn-ch2-38"
      - text: It is for this reason that Fred Walton’s
      - emphasis [ref=e948]: When
      - emphasis [ref=e949]: a Stranger Calls
      - text: ", perhaps the best variation on a theme of anonymous phone menaces, is of special interest. The first part of the film is narrated from the point of view of a young girl baby-sitting in a suburban family mansion: the children are asleep on the first floor, while she watches television in the sitting room. After the first threatening calls repeating the demand “Did you check the children?” she alerts the police who advise her to lock all the doors firmly, not to allow anybody to enter the house and to try to engage the molester in long conversation enabling the police to trace the call. Soon afterward, the police locate their source: another telephone within the same house … The molester was there all the time and has already killed the children. The killer appears thus as an unfathomable object with whom no identification is possible, a pure Real provoking unspeakable terror. At this point in the story, however, the film takes an unexpected turn: we are suddenly transposed into the perspective of the killer himself, witnessing the miserable everyday existence of this lonely and desperate individual—he sleeps in an asylum, wanders around decrepit cafes, and attempts in vain to establish contact with his neighbors; so that when the detective hired by the murdered children’s father prepares to stab him, our sympathies are wholly on the poor killer’s side."
    - paragraph [ref=e950]:
      - text: "Again, there is nothing subversive about the two points of view in themselves: if the story were narrated from the sole perspective of the young baby-sitter, we would have the standard case of a victim threatened by a phantom-like, bodyless and, for that reason, all the more horrifying menace; if we were limited to the murderer’s self-experience, we would have the standard rendition of the murderer’s pathological universe. The entire subversive effect hangs upon the rupture, the passage from one perspective to the other, the change which confers upon the hitherto impossible/unattainable object a body, which gives the untouchable thing a voice and makes it speak—in short, which"
