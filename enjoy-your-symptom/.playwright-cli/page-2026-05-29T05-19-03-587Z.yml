      - text: ",” “the Father or worse”—the choice is not between good and bad but between bad and worse. The forced choice of community, i.e., the subordination to the authority of the Name of the Father, is “bad” since, by means of it, the subject “gives way as to his desire,” and thus contracts an indelible guilt (as Lacan says, the only thing that the subject can be guilty of in psychoanalysis is to give way as to his desire)."
      - superscript [ref=e1080]:
        - link "10" [ref=e1081]:
          - /url: "#fn-ch3-10"
      - text: "This guilt constitutive of the subject, which is at the root of what Freud calls the “discontent” that pertains to culture, can help us to explain why the Lacanian mathem for the subject is $, that is to say: the subject crossed off, evacuated, reduced to the empty gesture of a forced choice. Which is why the time for the subject is never present: the subject constitutes himself when, all of a sudden, the presubjective X is posited as the one who has already chosen; social reality is “subjectivized” when, all of a sudden, it is imputed to the subject as something that he has freely chosen."
      - superscript [ref=e1083]:
        - link "11" [ref=e1084]:
