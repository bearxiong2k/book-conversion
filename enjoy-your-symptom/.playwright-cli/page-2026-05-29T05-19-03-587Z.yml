    - paragraph [ref=e1161]:
      - text: with the same “unhistorical” traumatic kernel (in Marxism, this kernel is of course the class struggle, class antagonism)—in short, to conceive the founding gesture of each new epoch as
      - emphasis [ref=e1162]: repetition
      - text: "in the precise Kierkegaardian-Benjaminian sense. The most succinct definition of historicism is therefore: historicity"
      - emphasis [ref=e1163]: minus
      - text: the unhistorical kernel of the Real—and the function of the nostalgic image is precisely to fill out the empty place of this exclusion, i.e., the blind spot of historicism. In other words, what the nostalgic image conceals is not the historical mediation but on the contrary the unhistorical traumatic kernel which returns as the Same through all historical epochs (in Marxist terms, the nostalgic image of idyllic precapitalist society as opposed to capitalist antagonism ultimately conceals the class struggle which is what
      - emphasis [ref=e1164]: remains the same
