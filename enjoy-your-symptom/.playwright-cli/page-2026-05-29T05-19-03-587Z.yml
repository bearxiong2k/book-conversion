    - heading "“Either/or” redoubled" [level=4] [ref=e1165]
    - paragraph [ref=e1166]:
      - text: "The double opposition (historicity vs. nostalgia, historicism vs. repetition) can be arranged into a narrative succession: in a first moment, we refuse nostalgic stasis in the name of historical sense; in a second moment, we become aware of how this historical sense itself turns into its opposite, into historicism, if we do not take into account the unhistorical kernel in its midst— the affirmation of historical sense proper implies its punctual suspension. This narrative succession offers us also the matrix of Kierkegaard’s triad"
      - emphasis [ref=e1167]: esthetical, ethical, religious
      - text: ", where the middle term ("
      - emphasis [ref=e1168]: ethical
      - text: ") undergoes the same split, which is why the very affirmation of a proper ethical attitude entails its punctual suspension. The crucial point is that the three moments cannot be “synchronized”: we never choose among the three positions simultaneously, we choose either within the first “either/or,” i.e., between the"
      - emphasis [ref=e1169]: esthetical
      - text: and the
      - emphasis [ref=e1170]: ethical
      - text: ", or within the second “either/or,” i.e., between the"
      - emphasis [ref=e1171]: ethical
      - text: and the
      - emphasis [ref=e1172]: religious
      - text: . First, one has to choose either to yield to the pleasure of the moment or to opt for the universality of moral law; then, one has to choose either to accept the universality of moral law as the ultimate horizon or to be prepared to suspend it for the sake of the religious demand. That is to say, the problem of the
      - emphasis [ref=e1173]: religious
      - text: suspension of the
      - emphasis [ref=e1174]: ethical
      - text: emerges only
      - emphasis [ref=e1175]: after we have
      - emphasis [ref=e1176]: already chosen the ethical
      - text: .
      - superscript [ref=e1178]:
        - link "16" [ref=e1179]:
          - /url: "#fn-ch3-16"
    - paragraph [ref=e1180]: "The shift of perspective at work here can be exemplified by means of the dialectic of law and violence: first, law appears as opposed to particular acts of violence that subvert it, the subject is torn between “pathological” impulses to transgress law and between the ethical injunction to obey it; then, the ground is suddenly swept from under his feet when he experiences how the reign of law itself is founded upon violence, i.e., how the imposition of the reign of law consists in the universalization of a violence which thereby becomes “legal.” This violent reverse of the law is—to put it in Kierkegaard’s terms—“the law in becoming.” The experience of this reversal can be rendered palpable apropos of today’s spontaneous ideological perception of the threats to the existing world order: now, with the disintegration of “really existing socialism,” the neutral, universal medium, the presupposed measure of the “normal” state of things, is organized around the notion of capitalist democracy (the market, pluralism, etc.), whereas those who oppose it are more and more reduced to “irrational,” marginal positions (“terrorists,” “fundamentalist fanatics”). As soon as some political force threatens too much the circulation of capital—even if it is, for example, a benign ecological protest against woodcutting—it is instantly labeled “terrorist,” “irrational,” etc. Perhaps, our very survival depends on our capacity to perform the above-described reversal and to locate the true source of madness in the allegedly neutral measure of “normalcy” which enables us to perceive all opposition to it as “irrational.” Today when the media bombard us with shocking"
    - paragraph [ref=e1181]: revelations about different versions of “madness” that threaten the “normal” circuit of our everyday lives, from serial killers to religious fundamentalists, from Saddam Hussein to narco-cartels, one has to rely more than ever on Hegel’s dictum that the true source of evil is the very neutral gaze which perceives Evil all around.
    - paragraph [ref=e1182]:
      - text: In a first approach, all this has nothing to do with Kierkegaard’s notion of the
      - emphasis [ref=e1183]: religious
      - text: ; yet things become clearer as soon as we consider that Kierkegaard’s aim was to reaffirm the Christian attitude in its “scandalous” reverse, before it settled down into a force of law and order, i.e., to reaffirm it as an act, as was the very appearance of Christ in the eyes of the keepers of the old law, before Christ was “christianized,” made part of the new law of Christian tradition. This scandalous “suspension of the Ethical” (of the old Jewish law) inherent to the Christian attitude is what Kierkegaard wants to resuscitate in his furious polemics against institutionalized Christianity (“Christendom”) that occupied the last years of his life. One is here tempted to reread Kierkegaard’s insistence that every believer must “repeat” Christ’s scandal—i.e., Christianity in its “becoming,” before it turned into an established necessity—through the perspective of G. K. Chesterton’s perspicacious remark about how the detective story “keeps in some sense before the mind the fact that civilization itself is the most sensational of departures and the most romantic of rebellions … It is based on the fact that morality is the most dark and daring of conspiracies.”
      - superscript [ref=e1185]:
        - link "17" [ref=e1186]:
          - /url: "#fn-ch3-17"
      - text: This is what is ultimately at stake in the
      - emphasis [ref=e1187]: second
