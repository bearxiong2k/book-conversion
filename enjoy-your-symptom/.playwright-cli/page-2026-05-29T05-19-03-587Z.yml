      - text: "In short, this renunciation is “pure,” a pure negative gesture of withdrawal which constitutes the space of possible gains and losses, i.e., of the distribution of goods: women become an object of exchange and distribution only after the “mother thing” is posited as prohibited. Therein consists the psychoanalytic reading of Kant: the primacy of Justice over the Good implies that the supreme Good (the Thing in itself"
      - emphasis [ref=e1075]: qua
