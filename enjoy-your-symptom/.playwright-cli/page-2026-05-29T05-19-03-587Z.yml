      - text: "the greatest MacGuffin of all times?). In his last two operas, the same gesture is performed: toward the end of"
      - emphasis [ref=e2578]: Götterdämmerung
      - text: ", the dead Siegfried, when Hagen approaches him in order to snatch the ring from his hand, threateningly raises his hand; toward the end of"
      - emphasis [ref=e2579]: Parsifal
      - text: ", in the midst of Amfortas’s lament and refusal to perform the ritualistic unveiling of the Grail, his dead father Titurel also miraculously lifts his hand. Features like this attest to the fact that Wagner was a Hitchcockian"
      - emphasis [ref=e2580]: avant la lettre
      - text: ": in Hitchcock’s films, we also find the same visual or other motif that insists, imposing itself through an uncanny compulsion and repeating itself from one film to another, in totally different narrative contexts. Best known is the motif of what Sigmund Freud called"
