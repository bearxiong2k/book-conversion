      - emphasis [ref=e1699]: a
      - text: ’) from “myself” (
      - emphasis [ref=e1700]: a
      - text: "): this apostrophe later (i.e., when a is no longer conceived as an imaginary other, but as the real object-cause of desire) becomes the"
      - emphasis [ref=e1701]: objet petit a
