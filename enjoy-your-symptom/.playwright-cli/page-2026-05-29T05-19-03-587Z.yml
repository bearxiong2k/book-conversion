      - emphasis [ref=e986]: qua
      - text: "Master: ultimately, nothing liberates as well as a good Master, since “liberation” consists precisely in our shifting the burden onto the Other/Master. So-called “free associations” in a psychoanalytic cure are the supreme proof of it: by means of them, the analysand liberates himself from the pressures and constraints of censorship, he can prattle freely—but only because he can rely on the analyst, the “subject supposed to know,” the “master of signification” (as Lacan put it in the 1950s) whose very presence guarantees him that retroactively, at the end, his prattle will obtain meaning and consistency. The freedom attained by the act is the very opposite of this freedom: by undergoing it, all the burden falls back upon the subject since he renounces any support in the Other."
    - paragraph [ref=e987]:
      - text: "In conclusion, we can now also define the trap laid by Rossellini’s films on the level of their form. It is already a commonplace of cinema theorists to oppose Rossellini to “manipulators” who create meaning by artificial interventions in the cinematic material (e.g., montage): in contrast to such a procedure, Rossellini is supposed to let the unorganized material itself speak, i.e., to renounce the position of the artist"
