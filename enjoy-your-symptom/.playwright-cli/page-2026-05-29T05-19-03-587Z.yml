      - text: "sign of the incestuous link. As Gilles Deleuze puts it:"
      - emphasis [ref=e1761]: “Si vous êtes pris dans le rêve de l’autre, vous êtes foutu
      - text: "” (“If you are caught in another’s dream, you are done for”). The revealed phallus, the phallic-anamorphotic distortion of the face, is a kind of brand attesting that the subject is caught in the desire of the other (mother), entrapped in her dream. In this precise sense, phallus “appears” in the obscene protuberance on the “elephant man” ’s forehead and marks it with the brand of mother’s desire, as if striking it with the whip of her gaze. What Lacan calls “phallic identification” is, on the contrary, the exact opposite of this “revelation of the phallus”: it is the identification with the phallus"
      - emphasis [ref=e1762]: qua
      - text: signifier of desire, i.e., the paradox of
      - emphasis [ref=e1763]: identification with nonidentity
      - text: ", with the gap which maintains the desire. In the phallic identification proper, we identify with the element which functions as the signifier of its own opposite (in short, as signifier"
      - emphasis [ref=e1764]: tout
      - emphasis [ref=e1765]: court
      - text: "). Let us just recall the Hitchcockian blonde (Grace Kelly, e.g.): in her figure, the external opposition of frigid blonde and hot brunette is surmounted (“sublated,”"
      - emphasis [ref=e1766]: aufgehoben
      - text: ", in the precise Hegelian sense), so that the very surface coldness functions as a sign of its opposite— the more calm she is, the more this restraint attests to an underlying passion … It is the same with fury: we enter the phallic dimension when we surmount the external opposition of outbursts of noisy rage and of restrained silence, so that cold silence itself starts to function as something infinitely more threatening than violent roars. On another level, it is the same with the dialectic of the leader: political hagiographers know very well that the leader is to be depicted as fundamentally"
      - emphasis [ref=e1767]: alone
      - text: "in his heights, since it is precisely in these moments of absolute solitude that, in a “deeper” sense, “he is with us all”: the leader is “us all” precisely as absolutely alone, as one. This is what Hegel calls “self-relating negation”: the way effectively to negate and surmount frigidity is not to"
      - emphasis [ref=e1768]: supplant
      - text: it by its external opposite (passion), but to make it
      - emphasis [ref=e1769]: designate
      - text: this opposite. Therein consists the ultimate paradox of what Lacan calls “the
      - emphasis [ref=e1770]: dialectic
      - text: of desire”—the renunciation of desire as the very form of appearance of its fulfillment —the paradox which gets lost as soon as the phallus begins to “appear.”
    - paragraph [ref=e1771]:
      - text: In postmodernism, this “apparition” of the phallus is
      - emphasis [ref=e1772]: universalized
      - text: . David Lynch, whose
      - emphasis [ref=e1773]: Elephant Man
      - text: features the above-mentioned historical case of the phallophany at the onset of modernism, developed in
      - emphasis [ref=e1774]: Blue Velvet
      - text: and
      - emphasis [ref=e1775]: Wild at Heart
      - text: "a style whose underlying premise is the expanse of the anamorphotic distortion, still localized in the case of the “elephant man,” into the ontological condition of reality as such: at the very beginning of"
      - emphasis [ref=e1776]: Blue Velvet
      - text: ", the suspension of the paternal function (epitomized by the father’s heart attack) is immediately followed by the intrusion of the Real in the shape of a fragment of reality (a cut-off ear) which, as soon as one approaches it too closely, turns into a nauseating, crawling life substance (ants swarming in the ear). In Lynch’s “ontology,” the universe is a palpitating slime that continually threatens to blow up the settled frame of everyday reality. The counterpart to"
    - paragraph [ref=e1777]:
      - text: the cut-off ear in
      - emphasis [ref=e1778]: Wild at Heart
      - text: is a repeated close shot of lighting a cigarette which then dissolves into raging fire—through this opening in reality the substance of the Real breaks in. All that remains of diegetic “reality” in
      - emphasis [ref=e1779]: Wild at Heart
      - text: is narrative fragments from old cinematic genres (
      - emphasis [ref=e1780]: film noir
      - text: ", soft porn, musical comedy, etc.)—a patchwork designed to prevent us from “burning our fingers” too much on the Real."
    - paragraph [ref=e1781]:
      - text: "Therein consists the fundamental ambiguity of the image in postmodernism: it is a kind of barrier enabling the subject to maintain distance from the Real, protecting him/her against its irruption, yet its very obtrusive “hyperrealism” evokes the nausea of the Real. Some of today’s commonplaces are phrases on the postmodern “society of the spectacle” whose reality is supplanted by an image of itself, and where, consequently, individuals more and more lose the character of agents, embedded in social reality, and are reduced to external observers of the spectacle. Yet the reverse of this “derealization” is the hypersensitivity to reality as something that can be hurt, for the inherently painful dimension of our contact with reality even at the most microscopic level—as if the subject is reduced to a pure receptive gaze precisely because he is aware of how every encroachment upon the world, even the most benevolent, cuts into the world, hurts it. “Edward Scissorhands” from Tim Burton’s film of the same name, a failed, aborted, Franken-steinian monster with scissor-like hands, epitomizes the postmodern subject: a melancholic subject condemned to pure gaze since he knows that touching the beloved one equals causing him/her unbearable pain. This inherent link between “scopic drive” and violence characterizes also the figure of Norman Bates from"
      - emphasis [ref=e1782]: Psycho
      - text: ": the reverse of his “voyeurism” is that the only proper “act” of which he is capable is slaughtering his neighbor."
      - superscript [ref=e1784]:
        - link "26" [ref=e1785]:
          - /url: "#fn-ch4-26"
    - paragraph [ref=e1786]:
      - text: In the Lacanian notion of the Real, the hard kernel which resists symbolization coincides with its opposite, the so-called “inner,” “psychic” reality;
      - superscript [ref=e1788]:
        - link "27" [ref=e1789]:
          - /url: "#fn-ch4-27"
      - text: "within postmodernism, the same ambiguity is reproduced in the shape of the tension between the obtrusive bodily density (one is tempted to say: the Heideggerian “earth”) which overshadows the narrative frame, and the opposite attitude which,"
      - emphasis [ref=e1790]: vulgari eloquentia
      - text: ", reduces reality itself to “something that exists only in our heads,” a “product of the delirium of our brain”: “The most prudent and effective method of dealing with the world around us is to assume that it is a complete fiction— conversely, the one small node of reality left to us is inside our own heads.”"
      - superscript [ref=e1792]:
        - link "28" [ref=e1793]:
          - /url: "#fn-ch4-28"
      - text: One should recall here the series of great “postmodern”
      - emphasis [ref=e1794]: mise-en-scènes
      - text: "of Wagner’s operas which transpose part of the action or even all of it into the “head” of one of its protagonists: in Jean-Pierre Ponelle’s"
      - emphasis [ref=e1795]: Tristan
      - text: ", the action following Tristan’s death (Isolde’s return, etc.) is staged as the delusion of the dying Tristan; at the end of Hans-Juergen Syberberg’s film version of"
      - emphasis [ref=e1796]: Parsifal
      - text: ", the entire content is twice “subjectivized,” located first in Kundry’s head, then in the head of Wagner himself."
      - superscript [ref=e1798]:
        - link "29" [ref=e1799]:
          - /url: "#fn-ch4-29"
      - text: The most indicative is here, however, Harry Kupfer’s staging of
      - emphasis [ref=e1800]: Fliegende Hollaender
      - text: "(Bayreuth 1977–1985): the Dutchman is presented as Senta’s hysterical delusion, as the mode by which Senta “does not give way as to her desire” and refuses the poor and faithful Eric, the sexual partner at her disposal in “reality.” Her final suicidal gesture is thus reinterpreted as a kind of reflective redoubling: Senta does not sacrifice herself for the Dutchman, she sacrifices herself to keep alive the fantasy of the Dutchman which gives consistency to her desire—she chooses death rather than accepting the dreadful reality of the provincial town where she “really” lives. The screen onto which Senta’s fantasy is projected consists of a big black hulk strangely resembling the hulk in the above-mentioned shot from Hitchcock’s"
      - emphasis [ref=e1801]: Marnie
      - text: "; this hulk is located at the back of the stage, in the very place where the viewer’s eye expects to meet the imaginary point of the infinite axis of perspective, i.e., the Other’s gaze which confers on the field of vision its depth: the specter of the Dutchman appears when the gigantic hands that form the hulk spread and allow a view to its interior, the folded vividly red Real, the space of enjoyment not yet “colonized” by the sociosymbolic"
    - paragraph [ref=e1802]:
      - text: order.
      - superscript [ref=e1804]:
        - link "30" [ref=e1805]:
          - /url: "#fn-ch4-30"
    - heading "Class struggle in the opera" [level=4] [ref=e1806]
    - paragraph [ref=e1807]:
      - text: "Is not then the Flying Dutchman—again, like Leroux’s phantom, an intruder preventing the “normal” sexual relationship between Senta and her poor Eric—literally a “phantom in the opera,” a phantom-like apparition on the stage? The fantasy screen in the background holds the space open for the “ghosts of the past” for whom there is no place in the grey utilitarian bourgeois everyday life which forecloses the very possibility of a heroic sacrifice: Senta yearns for a world in which something akin to the Dutchman’s tragedy is still conceivable. Yet if one is to avoid the historicist trap, one must learn the materialist lesson of the antievolutionist creationism which resolves the contradiction between literal meaning of the Scripture (according to which the universe was created ca. 5000 years ago) and irrefutable proofs of its greater age (million-years-old fossils, etc.) not via the usual indulging in the delicacies of the allegorical reading of the Scripture (“Adam and Eve are not really the first couple but a metaphor for the early stages of humanity …”) but by sticking to the literal truth of the Scripture: the universe was created recently, i.e., only 5000 years ago,"
      - emphasis [ref=e1808]: yet with inbuilt false
      - emphasis [ref=e1809]: traces of the past
      - text: (God directly created fossils, e.g.).
      - superscript [ref=e1811]:
        - link "31" [ref=e1812]:
          - /url: "#fn-ch4-31"
      - text: The past is always strictly “synchronous,” with the present,
      - emphasis [ref=e1813]: it is the way the synchronous universe thinks its antagonism
      - text: —it suffices to recall the infamous role of the “remnants of the past” in accounting for the difficulties of the “construction of socialism.”
    - paragraph [ref=e1814]:
      - text: "In this sense, the Phantom and his sexual rival, Vicomte de Changy, form a kind of Kleinian opposition of “bad” and “good” aristocratic object: the Phantom embodies the excess aristocracy has to renounce in order to become integrated into bourgeois society. In other words, he is a kind of “fossil” created by the Enlightenment itself as a distorted index of its inherent antagonism: what was, prior to the advent of Enlightenment, a sovereign expenditure, a glitter of those in power, an inherent moment of their symbolic status, now undergoes a kind of anamorphotic distortion, falls out from the social space whose contours are defined by utilitarian ideology, and is perceived as decadent debauchery epitomized in the bourgeois myth of a corrupted demonic aristocrat."
      - superscript [ref=e1816]:
        - link "32" [ref=e1817]:
          - /url: "#fn-ch4-32"
      - text: The notion of “decadence” acquires here its full weight as the concept which “fantasizes the return of all the weirdest religious sects and cults, after the triumph of the secular, of
      - emphasis [ref=e1818]: homo oeconomicus
      - text: "and of utilitarianism: it is thus the ghost of the superstructure, of cultural autonomy itself, that haunts the omnipotence of the base.”"
      - superscript [ref=e1820]:
        - link "33" [ref=e1821]:
          - /url: "#fn-ch4-33"
      - text: This superego side of the Phantom
      - emphasis [ref=e1822]: qua
      - text: "return of an archaic enjoyment is, however, supplemented by its opposite which is inscribed into Leroux’s novel by means of its very topography—although “apolitical,” the novel nevertheless establishes a mysterious link between the Phantom and the Paris Commune, this ultimate trauma of the French bourgeois society of the late nineteenth-century: deep under the Opera, where the Phantom has his premises, there were the secret torture chambers of the Communards … The political topography of"
      - emphasis [ref=e1823]: Phantom of the Opera
      - text: "thus consists of an extimate field, a field whose innermost center meets its radical exterior: the very heart of the Parisian high society, the building of the Opera with its luxurious staircases, reveals—the moment we dive into its foundations—the traces of the traumatic “repressed” past, i.e., of the historical moment which shook the foundations of the bourgeois state."
    - paragraph [ref=e1824]:
      - text: "Such is then the social-ideological topography of the Phantom: his figure constitutes an impossible “point of passage” at which the subversive power of the new (the working class) rejoins the return of the old (aristocratic decadence). In this precise sense, the Phantom is"
      - emphasis [ref=e1825]: a
    - paragraph [ref=e1826]:
      - emphasis [ref=e1827]: fetishistic representative of (a stand-in for) the class struggle
      - text: ": it disavows it by condensing into one both of its extremes which undermine the established bourgeois order, aristocratic decadence as well as the coming proletarian subversion. It is therefore wrong to ask directly “which is the class equivalent of the Phantom?”: its “class meaning” is contained in the very distortion that results from the “impossible” conjunction of opposites (as in fascist anti-Semitism where the “Jew” condenses in a unique figure the excessive nature of capitalism—its wild profiteering, etc.—and its proletarian subversion, i.e., the “Jewish-Communist plot”). This distortion betrays the work of “class desire,” its effort to render invisible the actual contours of social antagonism and thereby pave the way for its “imaginary solution”: by means of his transformation from malefactor to donator, the Phantom becomes the “vanishing mediator” rendering possible the final reconciliation."
    - paragraph [ref=e1828]:
      - text: "Convincing as it may appear, such a direct analysis of “ideological content” is nevertheless marked by a brand of ultimate arbitrariness; and the same goes for all analyses of this kind: Dr. Frankenstein’s creature can be a metaphor for the monstrous results of man’s manipulation with nature, for the horrors of the French revolution, etc.; Kaspar Hauser can epitomize the catastrophic results of the lack of family education; the elephant man can be cathexed by the ideological problematic of the body-soul relationship (“Such a horrible body, and yet such a great soul!”); the killer shark in"
      - emphasis [ref=e1829]: Jaws
      - text: "can signify anything from repressed sexuality to unbriddled capitalism and the threat of the Third World to America … The way out of this deadlock is not via deciding which of the multiple meanings is “true” (“Is the shark a representative of the repressed drives of the late-capitalist subject, or does it epitomize the destructive nature of capitalism itself?”); what one should do is rather to conceive the monster as a kind of fantasy screen where this very multiplicity of meanings can appear and fight for hegemony. In other words, the error of direct content analysis is to proceed too quickly and to presuppose as self-evident the fantasy surface itself, the empty form/frame which offers space for the appearance of monstrous content: the crucial question is not “What does the Phantom signify?” but “How is the very space constituted where entities like the Phantom can emerge?” Or, to return to Kupfer’s"
      - emphasis [ref=e1830]: Fliegende Holländer
      - text: ", the crucial question is not the meaning of Senta’s fantasies but rather “Where does the black hulk at the background of the stage come from, so that Senta has a surface onto which she can project her fantasies?” What we have here is the same disjunction as that of the well-known visual paradox of the vase/two faces: as we perceive meaning(s), the form"
      - emphasis [ref=e1831]: qua
      - text: place of their inscription becomes invisible—and the fundamental gesture of a dialectical analysis is precisely a step back from content to form, i.e., a suspension of content which renders visible anew form as such. The elementary ideological operation consists in this very “conversion of the form” by means of which the possible space for ideological meanings emerges—or, as Fredric Jameson put it apropos of
      - emphasis [ref=e1832]: Jaws
      - text: ":"
    - paragraph [ref=e1833]:
      - text: … the vocation of the symbol—the killer shark—lies less in any single message or meaning than in its very capacity to absorb and organize all of these quite distinct anxieties together. As a symbolic vehicle, then, the shark must be understood in terms of its essentially polysemous function rather than any particular content attributable to it by this or that spectator. Yet it is precisely this polysemousness which is profoundly ideological, insofar as it allows essentially social and historical anxieties to be folded back into apparently “natural” ones, both to express and to be recontained in what looks like a conflict with other forms of biological existence.
      - superscript [ref=e1835]:
        - link "34" [ref=e1836]:
          - /url: "#fn-ch4-34"
    - paragraph [ref=e1837]:
      - text: This “folding back” is what Lacan calls a
      - emphasis [ref=e1838]: “point de capiton
      - text: "”: the emergence of the shark as symbol does not add any new meaning, it simply reorganizes meanings which were already"
    - paragraph [ref=e1839]:
      - text: there by binding them to the same signifier—ideology is at work in this purely symbolic gesture, in the addition of a signifier which “quilts” the floating plurality of anxieties.
      - superscript [ref=e1841]:
        - link "35" [ref=e1842]:
          - /url: "#fn-ch4-35"
      - text: What remains outside this formal symbolic gesture, what resists absorption into meaning, is, however, the horrifying power of fascination that pertains to the presence of the shark—its
      - emphasis [ref=e1843]: enjoyment
      - text: ", to use the Lacanian term for it. One should therefore reformulate the above-mentioned disjunction between content and form:"
      - emphasis [ref=e1844]: you cannot have both meaning and
      - emphasis [ref=e1845]: enjoyment
      - text: . The analysis focused on the “ideological meaning” of monsters overlooks the fact that, previous to signifying something, previous even to serving as an empty vessel of meaning, monsters embody enjoyment
      - emphasis [ref=e1846]: qua
      - text: the limit of interpretation, that is to say,
      - emphasis [ref=e1847]: nonmeaning as such
      - text: .
    - heading "The subject of the enlightenment" [level=4] [ref=e1848]
    - paragraph [ref=e1849]:
      - text: "This empty form, this black stain in the very heart of reality, is ultimately the “objective correlative” of the subject himself (if one is allowed to transplant T. S. Eliot’s term into another context):"
      - emphasis [ref=e1850]: by means of anamorphotic stains, “reality” indexes the presence of the
      - emphasis [ref=e1851]: subject
      - text: . The emergence of the empty surface on which phantasmagorical monsters appear is therefore strictly correlative to what Heidegger calls “the advent of the Modern-Age subjectivity,” i.e., to the epoch in which the symbolic “substance” (the “big Other”
      - emphasis [ref=e1852]: qua
      - text: texture of symbolic tradition) can no longer contain the subject, can no longer bind him to his symbolic mandate. This cutting off of substantial tradition is the constitutive gesture of Enlightenment; in this sense, the
      - emphasis [ref=e1853]: “monster” is the subject of the Enlightenment
      - text: ", that is to say, the mode in which the subject of the Enlightenment acquires his impossible positive existence. A new light is thus shed on the ill-famed problem of the “death of the subject”: the “eclipse” of the subject in front of the Thing—what one (mis)perceives as his “death”—is strictly equal to his emergence, i.e.,"
      - emphasis [ref=e1854]: the “subject” is precisely the void which remains after the entire substantial
      - emphasis [ref=e1855]: content is taken away
      - text: ". The source of this customary confounding of the “death of the subject” with its very emergence lies in the fact that the motif of the “death of the subject” stands in for another motif, that of the “death of man”: “subject” and “human person” are strictly opposed, i.e., “subjectivization” entails a radical “evacuation,” emptying, of “man”"
      - emphasis [ref=e1856]: qua
      - text: substantial “person.”
    - paragraph [ref=e1857]: "To exemplify this split between “subject” and “person,” one has only to evoke one further figure in the series of legendary “monsters”: Kaspar Hauser. On 26 May 1828, a young man appeared in the central square of Nuremberg, singularily dressed, of stiff, unnatural gestures; his entire language consisted of a few fragments of the Lord’s prayer learned by heart and pronounced with grammatical errors, and of the enigmatic phrase “I want to become such a knight as was my father,” the design of an identification with the Ego Ideal; in his left hand, he carried a paper with his name—Kaspar Hauser—and the address of a captain in the Nuremberg cavalry. Later, when he learned to speak “properly,” Kaspar told his story: he had spent all his life alone in a “dark cave” where a mysterious “black man” procured food and drink for him, until the very day when he dressed him and took him to Nuremberg, teaching him on the way a few phrases … He was confided to the Daumer family, quickly “humanized” himself and became a celebrity: an object of philosophical, psychological, pedagogical, and medical researches, even the object of political speculation about his origin (was he the missing Prince of Baden?). After a couple of quiet years, on the afternoon of 14 December 1833, he was found mortally wounded with a knife; on his deathbed, he announced that his murderer was the same “black man” who had brought him to the central square of Nuremberg"
    - paragraph [ref=e1858]:
      - text: five years ago …
      - superscript [ref=e1860]:
        - link "36" [ref=e1861]:
          - /url: "#fn-ch4-36"
    - paragraph [ref=e1862]:
      - text: Although the sudden apparition of Kaspar Hauser provoked a shock that pertains to this kind of brutal encounter with a real/impossible which seems to interrupt the symbolic circuit of cause and effect, the most surprising thing about it was that, in a sense,
      - emphasis [ref=e1863]: his arrival was
      - emphasis [ref=e1864]: awaited
      - text: ": precisely as a surprise, he arrived in time. It is not only that Kaspar realized the millenary myth of a child of royal origins abandoned in a wild place and then found at the age of adolescence (cf. the rumor that he was the Prince of Baden), or that the fact that the only objects in his “dark cave” were a couple of figures of wooden animals pathetically realizes the myth of a hero saved by the animals who take care of him. The point is rather that toward the end of the eighteenth-century, the theme of a child living excluded from human community became the object of numerous literary and scientific texts: it staged in a pure, “experimental” way the theoretical question of how to distinguish in man the part of culture from the part of nature. (A couple of decades earlier, Frederick, the “enlightened” king of Prussia, was directly involved in a similar experiment: on a fenced country estate, he and his assistants isolated a couple of children and secretly observed how they found their way without any help from educated adults.) What is therefore crucial about the figure of Kaspar Hauser is that he appeared as the subject of the Enlightenment at its purest: as the very embodiment of the ideological problematic that pertains to the Enlightenment project. This “Thing which speaks” with its “mechanical,” abrupt, doll-like gestures, lacking the “depth” that defines someone as a person, was the pure subject ($) prior to subjectivization, freed from all imaginary lures. (Even the “black man,” Kaspar’s paternal substitute, was devoid of any positive features.) Its most succinct Lacanian diagnosis is therefore that Kaspar Hauser was the subject lacking the mirror captivation, in other words,"
      - emphasis [ref=e1865]: the subject without the ego
      - text: ": he was directly thrown into the symbolic network, bypassing the imaginary (mis)recognition which enables one to experience oneself as a “person.” (As it is known from his story, Kaspar Hauser was not able to relate to his mirror image, i.e., he did not recognize “himself” in it—the same as with all monster figures, real or “fictitious,” from Dr. Frankenstein’s creature to the elephant man, who could not stand their mirror images.)"
    - paragraph [ref=e1866]:
      - text: "This is the way the Enlightenment project has gone wrong: the Enlightenment philosophers wanted to pour out of the bathtub the dirty water of corrupted civilization and to retain only the healthy, unspoiled, natural child-ego, yet what they inadvertently threw out in the process was precisely the ego, so that they were left with the dirty water of a monster."
      - superscript [ref=e1868]:
        - link "37" [ref=e1869]:
          - /url: "#fn-ch4-37"
      - text: "In short: the pure “subject of the Enlightenment” is a monster which gives body to the surplus that escapes the vicious circle of the mirror relationship. In this sense, monsters can be defined precisely as the fantasmatic appearance of the “missing link” between nature and culture: as a kind of “answer of the real” to the Enlightenment’s endeavor to find the bridge that links culture to nature, to produce a “man/woman of culture” who would simultaneously conserve his/her unspoiled nature. Therein consists the ambiguity of the Enlightenment: the question of “origins” (origins of language, of culture, of society) which emerged in all its stringency with it, is nothing but the reverse of a fundamental prohibition, the prohibition to probe too deeply into the obscure origins, which betrays a fear that by doing so, one might uncover something monstrous …"
      - superscript [ref=e1871]:
        - link "38" [ref=e1872]:
          - /url: "#fn-ch4-38"
    - paragraph [ref=e1873]:
      - text: If, consequently, one bears in mind the fact that, according to Lacan, the ego is an
      - emphasis [ref=e1874]: object
      - text: ", a substantial “res,” one can easily grasp the ultimate sens of Kant’s transcendental turn: it desubstantializes the subject (which, with Descartes, still remained “res cogitans,” i.e., a substantial “piece of reality”)—"
      - emphasis [ref=e1875]: and it is this very desubstantialization which opens up the
      - emphasis [ref=e1876]: empty space (the “blank surface”) onto which fantasies are projected, where monsters emerge
      - text: ". To put it in Kantian terms: because of the inaccessibility of the Thing in itself, there is always"
    - paragraph [ref=e1877]:
      - text: "a gaping hole in (constituted, phenomenal) reality, reality is never “all,” its circle is never closed, and this void of the inaccessible Thing is filled out with phantasmagorias through which the transphenomenal Thing enters the stage of phenomenal presence—in short, prior to the Kantian turn, there can be no black hulk at the background of the stage. It was, of course, well before Kant that philosophers doubted the capacity of man to know the Infinite and affirmed that we can only conjecture the Infinite by means of improper metaphors. Yet Kant adds to it the crucial twist: man’s finitude is not the simple finitude of an inner-worldly entity lost in the overwhelming totality of the universe. The knowing subject is a substanceless point of pure self-relating (the “I think”) which is"
      - emphasis [ref=e1878]: not
      - text: "“part of the world” but is, on the contrary, correlative to “world” as such and therefore ontologically constitutive: “world,” “reality,” as we know them, can appear only within the horizon of the subject’s finitude. The black space of the Thing in itself is therefore something extremely dangerous to approach—if one gets too close to it, “world” itself loses its ontological consistency, like the anamorphotic stain on Holbein’s"
      - emphasis [ref=e1879]: Ambassadors
      - text: ": when we shift our perspective and perceive it “as it is” (as a skull),"
      - emphasis [ref=e1880]: all
      - emphasis [ref=e1881]: remaining reality loses its consistency and turns into an amorphous stain
      - text: .
    - paragraph [ref=e1882]:
      - text: The subject is the nonsubstance, he exists only as nonsubstantial self-relating which maintains its distance from inner-worldly objects; yet in monsters, this subject encounters the Thing which is his impossible equivalent—
      - emphasis [ref=e1883]: the monster is the subject himself, conceived as
      - emphasis [ref=e1884]: Thing
      - text: ". Therein consists the paradox of the Lacanian mathem $ a: what we have here is not the relationship of two entities but rather the two sides, the two “slopes,” of one and the same entity. The subject is “the same” as the Thing, he is so to speak its negative (the trace of its absence) within the symbolic network—Lacan’s obsession with topological models of the “folded” space in the last years of his teaching (the Moebius band, the inverted 8, etc.) attests to his effort to articulate clearly this folding back wherein the subject encounters its own reverse. Hegel radicalized Kant by conceiving the void of the Thing (its inaccessibility) as equivalent to the very negativity that defines the subject; the place where phantasmagorical monsters emerge is thus identified as the void of the pure Self: “This night, the inner of nature, that exists here—pure self—in phantasmagorical presentations, is night all around it, here shoots a bloody head—there another white shape, suddenly before it, and just so disappears.”"
      - superscript [ref=e1886]:
        - link "39" [ref=e1887]:
          - /url: "#fn-ch4-39"
    - paragraph [ref=e1888]:
      - text: From here, one can return to
      - emphasis [ref=e1889]: Scream
      - text: "for the last time: the standard modernist reading which conceives it as the manifestation of a monadic subject, desperate at his inability to establish contact with the world, condemned to solipsistic void, etc., falls short insofar as it continues to conceive the subject as substance, as a positive entity whose adequate expression is hindered. We enter postmodernism the moment we get rid of this perspective illusion: what appears, within modernism, as the limit impeding the subject’s self-expression, is actually"
      - emphasis [ref=e1890]: the
      - emphasis [ref=e1891]: subject himself
      - text: .
      - superscript [ref=e1893]:
        - link "40" [ref=e1894]:
          - /url: "#fn-ch4-40"
      - text: In other words, we enter postmodernism when we pass from the “emptied subject” to the subject
      - emphasis [ref=e1895]: qua
      - text: the emptiness of substance (homologous to the reversal from the matter
      - emphasis [ref=e1896]: qua
      - text: substance which curves space into matter
      - emphasis [ref=e1897]: qua
      - text: "the curvature of space in the theory of relativity): in its most radical dimension, the “subject” is"
      - emphasis [ref=e1898]: nothing but
      - text: this dreaded “void”—in
      - emphasis [ref=e1899]: horror vacui
      - text: ", the subject simply fears himself, his constitutive void."
      - superscript [ref=e1901]:
        - link "41" [ref=e1902]:
          - /url: "#fn-ch4-41"
      - text: Far from displaying the subject’s horror at the prospect of losing himself, the scream is therefore the very gesture by means of which the dimension of subjectivity is inaugurated—(what, through the scream, will become) the subject shrinks from what is “in him more than himself,” from the Thing in himself, i.e., he assumes a minimal distance from it.
    - paragraph [ref=e1903]: In this precise sense, subject and object are correlative in Lacanian theory, but in a way which is the reverse of their epistemological correlation in transcendental philosophy. According to the worn-out commonplace, the Lacanian subject is $, a barred and barren, crossed-out subject, its hindrance, its failed status, is constitutive, etc.—what one should add to
    - paragraph [ref=e1904]:
      - text: it is just that
      - emphasis [ref=e1905]: “object” in the Lacanian sense is a name for this inherent impediment, for the
      - emphasis [ref=e1906]: “bone in the throat” which hinders the subject’s full realization—therefore
      - text: "$ a. In other words: object is “correlative” to the subject"
      - emphasis [ref=e1907]: qua
      - text: barred, to the very bar that prevents its realization. It is for that reason that, in his Seminar on
      - emphasis [ref=e1908]: Transference
      - text: "(1960–1961), Lacan renounced the motif of intersubjectivity: what is lost in it is the fact that, to a subject, another subject is first and foremost an"
      - emphasis [ref=e1909]: object
      - text: (a), that which prevents him from fully realizing himself, or (the reverse of the same) that which possesses what the subject constitutively lacks—a
      - emphasis [ref=e1910]: Master
      - text: ", in short. The aim of the analysis is to undermine this illusion: the analyst occupies the place of the Master, but does not “play his role,” thereby rendering visible the Master’s imposture—the lack always already pertains to the Other itself."
      - superscript [ref=e1912]:
        - link "42" [ref=e1913]:
          - /url: "#fn-ch4-42"
    - paragraph [ref=e1914]: The ultimate “social mediation” of the monster figure is therefore to be sought in the social
    - paragraph [ref=e1915]:
      - text: "impact of capital, this terrifying force of “deterritorialization” which dissolves all traditional (“substantial”) symbolic links and marks the entire social edifice with an irreducible structural imbalance—it is by no accident that “monsters” appear at every break which announces a new epoch of capital: its rise (Frankenstein, Kaspar Hauser); its transformation into imperialism (the elephant man, the phantom of the opera); today’s emergence of the “postindustrial” society (the revival of the motif of the “living dead”). This structural imbalance is inscribed into the very form of anamorphosis, namely in its radical ambiguity: anamorphotic distortions of reality may function as repellent horror, like the forehead protuberance of the “elephant man,” yet phallophany may also occasion an effect of sublime beauty. Let us just recall the face of Virginia Woolf: its ethereal, refined sublimity pertains to its anamorphotic extension, as if the reality of her face itself were protracted by a crooked mirror. To ascertain this link between anamorphosis and sublimity, it suffices to “retrench” this face to its “normal” measure by means of a simple computer treatment, i.e., to accomplish an operation homologous to that of reshaping the soft, “melted” watches from Dali’s famous painting back into their “normal” contours—what we get is, of course, a “healthy,” chubby face without any trace of the unretouched photo’s sublimity. The status of sublimity is therefore ultimately that of a “grimace of reality” (as Lacan puts it in"
      - emphasis [ref=e1916]: Television
      - text: "); Lacan’s definition of the sublime (“an object elevated to the level of the Thing”) could be rendered as “the sublime is an object, a piece of reality, upon which the Real of desire is inscribed by means of an anamorphotic grimace.” The boundary that separates beauty from disgust is for that reason far more unstable than it may seem, since it is always contingent on a specific cultural space: the “anamorphotic” torture of the body which can exert such a fascination within some cultural spaces (from the bandaging of female feet in China, the Indo-Chinese tribe whose women put tight rings on their necks in order to protract them, etc., up to"
      - emphasis [ref=e1917]: erection
      - text: itself, the paradigm of anamorphotic protraction of a piece of reality), can evoke nothing but disgust in a foreign gaze. Have we not thus also delineated the contours of a
      - emphasis [ref=e1918]: postmodern
      - text: critique of ideology which instructs us to assume such a foreign gaze upon one’s own ideological field, whereby the ideological anamorphosis loses its power of fascination and changes into a disgusting protuberance?
    - heading "5 WHY ARE THERE ALWAYS TWO FATHERS?" [level=2] [ref=e1919]
    - 'heading "5.1 at the Origins of Noir: the Humiliated Father" [level=3] [ref=e1920]'
    - heading "The paranoiac Other" [level=4] [ref=e1921]
    - paragraph [ref=e1922]:
      - text: "In today’s popular culture, there are two phenomena which exert an everlasting power of fascination on so-called “postmodern” theory: Alfred Hitchcock and"
      - emphasis [ref=e1923]: film noir
      - text: ". Yet in the two cases, the fascination works in a wholly different way: Hitchcock’s"
      - emphasis [ref=e1924]: oeuvre
      - text: unleashes a flood of interpretations, for the most part mutually exclusive (psychoanalytic, hermeneutic, deconstructivist, feminist, religious, semiotic, and so on), a wealth of ingenious interpretive moves which endeavor to turn into successes even his obvious failures,
      - superscript [ref=e1926]:
        - link "1" [ref=e1927]:
          - /url: "#fn-ch5-1"
      - text: whereas the first feature that strikes the eye apropos of the texts on
      - emphasis [ref=e1928]: film noir
      - text: is their unusual theoretical poverty and uniformity. That is to say, the bulk of what is being written on
      - emphasis [ref=e1929]: film noir
      - text: "consists of cliché-ridden variations on its visual style (the influence of German expressionism: the interplay of lights and shadows, the unusual angles, and so on); on its narrative procedures (flashback, voiceover, etc.); on its social background (the corruption of the American megalopolis; the social impact of the Second World War; the emancipation of women as the basis of the"
      - emphasis [ref=e1930]: femme fatale
      - text: figure which gives expression to the instability of the male identity); on the noir existential vision (inexorable fate and its paradoxical interconnection with freedom, e.g.); etc.
      - superscript [ref=e1932]:
        - link "2" [ref=e1933]:
          - /url: "#fn-ch5-2"
      - text: The will to put into words the obvious fascination with
      - emphasis [ref=e1934]: film noir
      - text: ", to translate it into positive theoretical accomplishments, seems somehow inherently hindered, doomed to fail: as if the opposition Hitchcock/"
      - emphasis [ref=e1935]: film noir
      - text: repeats the classic Lacanian opposition of the symptom which gives rise to interpretations and the fantasy which blocks them. Instead of deploring the weaknesses of writings on
      - emphasis [ref=e1936]: film noir
      - text: ", instead of directly trying to supplant them with a new, better theory, our first step should therefore be a kind of “metacommentary” which elucidates the very opposition of Hitchcock and"
      - emphasis [ref=e1937]: film noir
      - text: .
    - paragraph [ref=e1938]:
      - text: "One of the quintessential Hitchcockian scenes is the hero’s “solitude in the crowd”: the hero and his adversary exchange blows in full view of an ignorant public which does not (and should not) know the true stakes of the confrontation; both have to confine their moves to what fits the frame of the publicly admissible. The three versions of this scene are, of course, the political rally in"
      - emphasis [ref=e1939]: The Thirty-Nine Steps
      - text: (1934), the charity ball in
      - emphasis [ref=e1940]: Saboteur
      - text: (1942), and the auction in
      - emphasis [ref=e1941]: North by Northwest
      - text: "(1959): in the latter, Cary Grant causes a public scandal in order to be taken away by the police and thus elude the grasp of Russian spies who control the building; the spies can only observe the spectacle passively, since any open action of theirs would alert the ignorant public. We have here three gazes, three subjective positions: the actant who makes a move; his opponent against whom this move is intended, who clearly recognizes its meaning, yet who can only observe it helplessly; and the ignorant Other, the public present."
      - superscript [ref=e1943]:
        - link "3" [ref=e1944]:
          - /url: "#fn-ch5-3"
      - text: The crucial feature, the structural condition, of this interplay is the
      - emphasis [ref=e1945]: benevolent
      - emphasis [ref=e1946]: ignorance of the Other
      - text: ": the Other epitomizes public opinion in its inherent innocence, and it is due to this innocence that the three scenes function as comic interludes."
    - paragraph [ref=e1947]:
      - text: Yet let us recall the final scene of
      - emphasis [ref=e1948]: Notorious
      - text: "(1946): Devlin elopes with the poisoned Alicia from Sebastian’s house in full view of the latter’s Nazi collaborators. What we have here is a"
    - paragraph [ref=e1949]:
      - text: "homologous underlying structure of the three gazes, of the three subjective positions: the ignorant Other is here the members of the Nazi ring who do not know that Alicia is an American spy and that Sebastian knows it (the reason why he is slowly poisoning her with his mother’s help); the actants are Devlin and Alicia—Devlin escorts her down the staircase, posing as her friend who will take her to the hospital, with Sebastian’s agreement; the helpless opponents are Sebastian and his mother, reduced to the role of passive observers—although Devlin’s act is directed against them, any public countermove of theirs would instantly reveal to the members of the Nazi gang present that Alicia is an American spy and that Sebastian knows it, whereby Sebastian would sign his death warrant. What makes this scene different from the three above-mentioned comic interludes is the character of the third agency, the ignorant big Other, the public which witnesses the duel of the actant and his opponent: the Other loses here its benevolent innocence and assumes features of a threatening paranoiac agency. Those who range"
      - emphasis [ref=e1950]: Notorious
      - text: among the few Hitchcock’s films which display
      - emphasis [ref=e1951]: noir
      - text: "sensibility are therefore in the right: one of the features which characterize the noir universe is precisely this mutation in the status of the big Other."
    - paragraph [ref=e1952]:
      - text: This changed vision of the universe enables us to define the gap that separates the classical (logic-and-deduction) detective novel from the hard-boiled novel.
      - superscript [ref=e1954]:
        - link "4" [ref=e1955]:
          - /url: "#fn-ch5-4"
      - text: "That is to say, the logic-and-deduction novel still relies on the consistent big Other: the moment, at the novel’s end, when the flow of events is integrated into the symbolic universe, narrativized, told in the form of a linear story (the last pages of the novel when, upon identifying the murderer, the detective reconstructs the true course of events), brings about an effect of pacification, order and consistency are reinstated, whereas the"
      - emphasis [ref=e1956]: noir
      - text: "universe is characterized by a radical split, a kind of structural imbalance, as to the possibility of narrativization: the integration of the subject’s position into the field of the big Other, the narrativization of his fate, becomes possible only when the subject is in a sense already dead, although still alive, when “the game is already over,” in short: when the subject finds himself at the place baptized by Lacan “the in-between-two-deaths” ("
      - emphasis [ref=e1957]: l’entre-deux-morts
      - text: ).
      - superscript [ref=e1959]:
        - link "5" [ref=e1960]:
          - /url: "#fn-ch5-5"
      - text: Here, we have only to recall Rudolph Mate’s
      - emphasis [ref=e1961]: DOA
      - text: "(1949): the hero is notified by the doctor that he has been mortally poisoned and has only a day or two to live; he spends his remaining time in a frenetic search for his own murderer, i.e., in reconstructing the story which led to his murder."
      - superscript [ref=e1963]:
        - link "6" [ref=e1964]:
          - /url: "#fn-ch5-6"
      - text: "Insofar as the subject does not assume this stature of the “living dead,” every attempt at narrativization, at the integration of his fate into the symbolic texture, is by definition lethal: a deadly menace looms over his endeavor to “tell the entire story” about himself. The putting into words does not bring about pacification, reconciliation with one’s symbolic community (as in the classical detective novel), but rather gives rise to a mortal danger. Among the numerous cases of it, here are the four most eloquent:"
    - paragraph [ref=e1965]:
      - text: 1)
      - emphasis [ref=e1966]: The Big Clock
      - text: (1947, John Farrow). What confers on this story its noir character? Ray Milland, an investigative journalist, is hired by a corrupted press tycoon (Charles Laughton) to identify the unknown individual who secretly left the house of a murdered girl the previous evening and is thus the prime suspect; what only the journalist knows is that this unknown individual is none other than
      - emphasis [ref=e1967]: himself
      - text: —he is thereby forced to set in motion the investigative machinery which, sooner or later, will point its finger at him. The
      - emphasis [ref=e1968]: noir
      - text: flavor pertains to this position of the subject who can only observe helplessly how the trap set by the investigative— i.e., discursive—machinery, nominally led by himself, tightens around him …
    - paragraph [ref=e1969]:
      - text: 2)
      - emphasis [ref=e1970]: Sorry, Wrong Number
      - text: (1948, Anatole Litvak), is the story of an arrogant rich woman, tied to bed because of her paralytic legs, who accidentally overhears a phone conversation about a planned murder;she sets out to investigate the affair and, after a whole day of phoning, finally establishes that the victim of the intended murder is herself—too late, since the murderer is
    - paragraph [ref=e1971]: "already on the way … The film is a textbook example of the Lacanian thesis on how the subject’s truth is constituted by the discourse of the Other: the narratrice gradually puts all the pieces together and (re)constructs the events, realizing that she was unknowingly the central piece of an intricate plot—in short, she finds her truth outside herself, in the intersubjective network whose effects elude her grasp."
    - paragraph [ref=e1972]:
      - text: 3) The Window (1949, Ted Tetzlaff). This is an exemplary case of what Gilles Deleuze calls
      - emphasis [ref=e1973]: “le flagrant délit de légender
      - text: ",”"
      - superscript [ref=e1975]:
        - link "7" [ref=e1976]:
          - /url: "#fn-ch5-7"
      - text: the story of a boy, inclined to inventing stories, who one night witnesses an actual murder taking place in the neighboring apartment. When he reports on it to his parents, they naturally take it for another of his fantasies and, as a punishment, force him to tell the neighbors what lies he was divulging about them; the neighbors thus learn that the boy is a dangerous witness and set to kill him when the parents leave him alone in the apartment for a weekend …
    - paragraph [ref=e1977]:
      - text: 4) Orson Welles’s
      - emphasis [ref=e1978]: Mr. Arkadin
      - text: (or
      - emphasis [ref=e1979]: Confidential Report
      - text: ", 1955), the story of an immensely rich man who, feigning amnesia, hires a journalist to unearth details about his past. Step by step, the journalist reconstructs the truth, a dark story of murder, betrayal, and fraud, yet all witnesses of Arkadin’s past whom the journalist contacted are soon afterward found dead. Finally, the journalist grasps the true aim of his research: Arkadin hired him to locate all remaining witnesses to his criminal past—by disposing of them and, in the end, of the journalist himself, his past would be buried forever … The irony of it, of course, is that remembrance (unearthing of the truth about the past) is here directly in the service of oblivion —and is not this story also a succinct metaphor of a capitalism characterized (as one knows from Marx onward) by a structural asymmetry between synchrony and diachrony: it can establish itself as a synchronous totality only by effacing the traces of its traumatic diachronous past?"
    - paragraph [ref=e1980]:
      - text: "What do these (as well as numerous other) examples have in common? The intersubjective, “public” symbolic space has lost its innocence: narrativization, integration into the symbolic order, into the big Other, opens up a mortal threat, far from leading to any kind of reconciliation."
      - superscript [ref=e1982]:
        - link "8" [ref=e1983]:
          - /url: "#fn-ch5-8"
      - text: What one should bear in mind here is that this
      - emphasis [ref=e1984]: neutrality
      - text: of the symbolic order functions as the ultimate guarantee for the so-called “
      - emphasis [ref=e1985]: sense of reality
      - text: "”: as soon as this neutrality is smeared, “external reality” itself loses the self-evident character of something present “out there” and begins to vacillate, i.e., is experienced as delimited by an invisible frame: the paranoia of the noir universe is primarily visual, based upon the suspicion that our vision of reality is always already distorted by some invisible frame behind our backs—which is why Edward Hopper should also be included among the"
      - emphasis [ref=e1986]: noir
      - text: auteurs. What we have in mind here is neither the fact that, prior to his fame, Hopper earned his living by drawing cover designs for hard-boiled pulp novels, nor the fact that a lot of his drawings, above all his etchings (
      - emphasis [ref=e1987]: Night Shadows
      - text: (1921), for example), contain motifs which evoke the
      - emphasis [ref=e1988]: noir
      - text: "universe (the play of shadows, strange point-of-view angles, lone scenes from the nocturnal megalopolis, and so on). The case is somewhat more refined: it concerns primarily the way the"
      - emphasis [ref=e1989]: frame
      - text: operates in his paintings (taking into account the fundamental ambiguity of this term in the
      - emphasis [ref=e1990]: noir
      - text: universe).
    - paragraph [ref=e1991]:
      - text: That is to say, it is as if, in his paintings, the frame “unglued,” came off, extended, or contracted with regard to its actual boundaries. On the one hand, his paintings enforce the idea of spaces and elements beyond the limits of the scene itself, as if envisageing a wider field than the sphere the picture can surround. Apropos of Hopper’s paintings, Pascal Bonitzer spoke about “a semblance of off-field” (
      - emphasis [ref=e1992]: “un semblant de hors-champ
      - text: "”): Hopper’s paintings function as fragments in the interplay of"
      - emphasis [ref=e1993]: champ
      - text: and
      - emphasis [ref=e1994]: hors-champ
      - text: ", they always refer to an"
    - paragraph [ref=e1995]:
      - text: external, absent supplement; as Bonitzer points out, this effect of “contingent and nomadic framing” is possible only against the background of cinema, i.e., it presents the way painting reflected the advent of cinema, the fact that the “moving camera” captures a reality which is in itself contingent and ultimately meaningless.
      - superscript [ref=e1997]:
        - link "9" [ref=e1998]:
          - /url: "#fn-ch5-9"
      - text: On the other hand, there is the opposite effect of the contracted frame; what we have in mind here is the fact, noted by numerous art historians, that Hopper’s paintings render visible the interior and the exterior of a building simultaneously (say, an illuminated room with a lonely person, seen from outside, through the window of an otherwise dark house)—far from being suspended, their antagonistic tension is thereby staged as such. Even when the “official” content of a painting is limited to the interior, it seems as if the depicted scene is viewed through an invisible window which enframes it. Suffice it to recall his
      - emphasis [ref=e1999]: Office at Night
      - text: "(1940): although the “official” point of view is internal to the illuminated office (close to its ceiling), one cannot elude the effect that an invisible (window) frame separates us from the interior of the office (an effect confirmed by the sketches for this painting where the traces of a window frame are clearly discernible). On a thematic level, the"
      - emphasis [ref=e2000]: hors-champ
      - text: "effect manifests itself in Hopper’s two constant motifs:"
    - paragraph [ref=e2001]: • a woman or a couple whose gaze is transfixed on some point external to the painting (in Hopper, the couple never looks straight into each other’s eyes—a kind of visual equivalent to the “modernist” couples in Marguerite Duras’s novels who can find love only by concentrating on some external task—the search for a third person, e.g.); • the limitation of the depicted content to a fragmentary reflection of an external source of light (the illuminated part of the room close to the open window, for example).
    - paragraph [ref=e2002]:
      - text: The inscription of the frame into the picture, on the other hand, makes itself palpable in Hopper’s obsession with the motif of the window
      - emphasis [ref=e2003]: qua
      - text: boundary and link between the interior and the exterior. This surplus/lack of the frame with regard to the actual sphere of the painting introduces an inherent
      - emphasis [ref=e2004]: instability of vision
      - text: ": the effect obtained is that what we see is always a fragment—the crucial X always eludes us, our vision is always “framed,” by definition, it implies a minimal"
      - emphasis [ref=e2005]: “Realitätsverlust
      - text: ",” “loss of reality.”"
    - heading "“Woman as the symptom of man” revisited" [level=4] [ref=e2006]
    - paragraph [ref=e2007]:
      - text: Where are we to look for the key to this shift, to this disturbance in the “big Other” which causes the loss of reality? In the
      - emphasis [ref=e2008]: noir
      - text: universe is evil not epitomized by the
      - emphasis [ref=e2009]: femme fatale
      - text: who poses a threat not only to the hero’s moral integrity, but to his very ontological identity? Is the axis of the noir universe not therefore to be sought in the relationship of the male detective to the woman
      - emphasis [ref=e2010]: qua
      - text: his
      - emphasis [ref=e2011]: symptom
      - text: "?"
    - paragraph [ref=e2012]:
      - text: "“Woman is a symptom of man” seems to be one of the most notoriously “antifeminist” theses of the late Lacan. There is, however, a fundamental ambiguity as to how we are to read it: this ambiguity reflects the shift in the notion of the symptom within the Lacanian theory."
      - superscript [ref=e2014]:
        - link "10" [ref=e2015]:
          - /url: "#fn-ch5-10"
      - text: If we conceive the symptom as it was articulated by Lacan in the 1950s—namely as a
      - emphasis [ref=e2016]: cyphered
      - emphasis [ref=e2017]: message
      - text: "—then, of course, woman-symptom appears as the sign, the embodiment of man’s fall, attesting to the fact that man “gave way as to his desire.” For Freud, the symptom is a compromise formation: in the symptom, the subject gets back, in the form of a cyphered, unrecognized message, the truth about his desire, the truth that he was not able to confront, that he betrayed. So, if we read the thesis of “woman as a symptom of man” against this background, we inevitably approach the position that was most forcefully articulated by Otto"
    - paragraph [ref=e2018]:
      - text: Weininger, Freud’s contemporary, a notorious Viennese antifeminist and anti-Semite from the turn of the century, who wrote the extremely influential bestseller
      - emphasis [ref=e2019]: Sex
      - text: and
      - emphasis [ref=e2020]: Character
      - superscript [ref=e2022]:
        - link "11" [ref=e2023]:
          - /url: "#fn-ch5-11"
      - text: "and then commited suicide at the age of twenty-four. Weininger’s position is that, according to her very ontological status, woman is nothing but a materialization, an embodiment of man’s sin: in herself, she doesn’t exist, which is why the proper way to get rid of her is not to fight her actively or to destroy her—it is enough for man to purify his desire, to rise to pure spirituality, and, automatically, woman loses the ground under her feet, disintegrates. Note here Richard Wagner’s"
      - emphasis [ref=e2024]: Parsifal
      - text: ", the basic reference of Weininger: when Parsifal purifies his desire and rejects Kundry, she loses her speech, changes into a mute shadow and finally drops dead—she existed only insofar as she attracted the male gaze. Here, it would be possible to articulate a general theory of the “Wagnerian performative”: when, at the end of"
      - emphasis [ref=e2025]: The Flying Dutchman
      - text: ", the offended unknown captain publicly announces that he is the “flying Dutchman” wandering around oceans for centuries in search of a faithful wife, Senta throws herself from a cliff to her death; in Lohengrin, after the mysterious knight reveals his true identity in the Grail narrative (“…"
      - emphasis [ref=e2026]: ich bin Lohengrin genannt
      - text: "!”), the unfortunate Elsa collapses (“"
      - emphasis [ref=e2027]: Mir
      - emphasis [ref=e2028]: schwankt das Boden! Luft!
      - text: ”); when, at the end of
      - emphasis [ref=e2029]: Parsifal
      - text: ", Parsifal takes over the ritual function of the king and reveals the Grail, Kundry drops dead … In all three cases, the performative gesture by means of which the hero openly assumes his symbolic mandate, reveals his symbolic identity, proves incompatible with the very being of woman."
      - superscript [ref=e2031]:
        - link "12" [ref=e2032]:
          - /url: "#fn-ch5-12"
    - paragraph [ref=e2033]:
      - text: This tradition, which may appear extravagant and outdated, reemerges precisely in
      - emphasis [ref=e2034]: film
      - emphasis [ref=e2035]: noir
      - text: where the
      - emphasis [ref=e2036]: femme fatale
      - text: also changes into a formless, mucous slime without proper ontological consistency the moment the hard-boiled hero rejects her, i.e., breaks her spell upon him—witness the final confrontation of Sam Spade with Brigid O’Shaughnessy in Hammett’s
      - emphasis [ref=e2037]: Maltese Falcon
      - text: . We have thus the male world of pure spirituality and undistorted communication, communication without constraint (if we may be permitted to use this Habermasian syntagm), the universe of ideal intersubjectivity, and woman is not an external, active cause which lures man into a fall—she is just a
      - emphasis [ref=e2038]: consequence
      - text: ", a result, a materialization of man’s fall. So, when man purifies his desire of the pathological remainders, woman disintegrates in precisely the same way a symptom dissolves after successful interpretation, after we have symbolized its repressed meaning. Does not Lacan’s other notorious thesis—the claim that “woman doesn’t exist”—point in the same direction? Woman doesn’t exist in herself, as a positive entity with full ontological consistency, but only as a symptom of man. Weininger was also quite outspoken about the desire compromised, betrayed when man falls prey to a woman: the death drive; after all the talk about man’s superior spirituality, inaccessible to woman, and so on, he proposes, in the last pages of"
      - emphasis [ref=e2039]: Sex and Character
      - text: ", collective suicide as the only path of salvation for humanity."
    - paragraph [ref=e2040]:
      - text: If, however, we conceive the symptom as it was articulated in Lacan’s last writings and seminars—as, for example, when he speaks about “Joyce the symptom”—namely as a particular signifying formation which confers on the subject its very ontological consistency, enabling it to structure its basic, constitutive relationship to
      - emphasis [ref=e2041]: enjoyment
      - text: (
      - emphasis [ref=e2042]: jouissance
      - text: "), then the entire relationship is reversed: if the symptom is dissolved, the subject itself loses the ground under his feet, disintegrates. In this sense, “woman is a symptom of man” means that"
      - emphasis [ref=e2043]: man
      - emphasis [ref=e2044]: himself exists only through woman qua his symptom
      - text: ": all his ontological consistency hangs on, is suspended from his symptom, is “externalized” in his symptom. In other words, man literally"
      - emphasis [ref=e2045]: ex-sists
      - text: ": his entire being lies “out there,” in woman. Woman, on the other hand, does"
      - emphasis [ref=e2046]: not
      - text: exist, she
      - emphasis [ref=e2047]: insists
      - text: ", which is why she does not come to be through man only—there is something in her that escapes the relation to man, the reference to the phallic signifier; and, as is well known, Lacan attempted to capture this excess by the notion of a"
      - emphasis [ref=e2048]: “not-all” feminine
    - paragraph [ref=e2049]:
      - emphasis [ref=e2050]: jouissance
      - text: ". In this way, the relationship to the death drive is also reversed: woman, taken “in herself,” outside the relation to man, embodies the death drive, apprehended as a radical, most elementary ethical attitude of uncompromising insistence, of “not giving way as to …” Woman is therefore no longer conceived as fundamentally “passive” in contrast to male activity: the act as such, in its most fundamental dimension, is “feminine.” Is not the act"
      - emphasis [ref=e2051]: par excellence
      - text: Antigone’s act, her act of defiance, of resistance? The suicidal dimension of this act is self-evident, so that when Lacan says, in another provocative statement, that the only act which is not a failure, the only act stricto
      - emphasis [ref=e2052]: sensu
      - text: ", is suicide, he thereby reconfirms the “feminine” nature of act as such: men are “active,” they take refuge in relentless activity in order to escape the proper dimension of the act. The retreat of man from woman (the retreat of the hard-boiled detective from the"
      - emphasis [ref=e2053]: femme fatale
      - text: in
      - emphasis [ref=e2054]: film noir
      - text: ", for example), is thus effectively a retreat from the death drive as a radical ethical stance: we are now at the exact opposite of Weininger’s image of woman as incapable of a proper ethical attitude."
      - superscript [ref=e2056]:
        - link "13" [ref=e2057]:
          - /url: "#fn-ch5-13"
    - heading "From Ned Beaumont to Philip Marlowe" [level=4] [ref=e2058]
    - paragraph [ref=e2059]:
      - text: "This answer, however, cannot be considered satisfactory: the"
      - emphasis [ref=e2060]: femme fatale qua
      - text: embodiment of the universe’s corruption is clearly a male fantasy, she materializes its inner antagonisms, which is why she cannot be made into the
      - emphasis [ref=e2061]: cause
      - text: "of the “loss of reality,” of the paranoiac mutation of the Other. Consequently, we have to return to our initial question: “What change had to befall the symbolic order, so that woman finds herself occupying the place of a traumatic Thing?” As we know from Lacanian psychoanalysis, the ultimate guarantor of the “neutral” stature of the symbolic Law within the subjective economy is the father"
      - emphasis [ref=e2062]: qua
      - text: "symbolic function, the Name of the Father, what Lacan calls the “paternal metaphor”: Master Signifier, the “empty” signifier without a signified. The Law which is “in running order” is by definition “blind,” ignorant, raised above particular passions: a community is ultimately held together through a signifier which “means everything” insofar as it does not mean anything in particular and thereby enables everyone to recognize himself/herself in it."
      - superscript [ref=e2064]:
        - link "14" [ref=e2065]:
          - /url: "#fn-ch5-14"
      - text: "For that reason, our next step should be to look for eventual mutations in the stature of the paternal function. The proper place to begin is the very beginning, more precisely: the point just prior to it, the ultimate stage of the “prehistory” of the hard-boiled novel where things are still visible which, a moment later, will become invisible—not Chandler, but Hammett."
    - paragraph [ref=e2066]:
      - text: "In the glare of Chandler’s everlasting glory, Dashiell Hammett is today somehow forgotten: all attempts at a revival by way of pocket-book reprints of his novels, of new biographies, etc., seem doomed to fail. In view of this persistent failure, one is tempted to risk the hypothesis that its ultimate reason is not the lower quality of Hammett’s writing but a structural break between his and a fully established noir universe. There is obviously something in the inherent logic of Hammett’s work that resists serialization: his five novels are five"
      - emphasis [ref=e2067]: hapaxes
      - text: ", each of them is unique. It did set off a series, but with"
      - emphasis [ref=e2068]: other
      - text: writers (
      - emphasis [ref=e2069]: Red Harvest
      - text: opened up a series on a recluse detective who intervenes in a town devastated by the war of rival gangs; after cleansing the town by pitting one gang against another, he leaves alone as he came—a series which runs across genre boundaries from Akira Kurosawa’s
      - emphasis [ref=e2070]: Yojimbo
      - text: to Sergio Leone’s
      - emphasis [ref=e2071]: For a Fistful of Dollars; The Dain Curse
      - text: opened up a series of detective novels in which the source of evil operates under the guise of obscure religious cults;
      - emphasis [ref=e2072]: The Maltese Falcon
      - text: combined the detective novel with the formula of the “search for the lost treasure”;
      - emphasis [ref=e2073]: The Glass Key
      - text: gave the detective story a flavor of “corrupted politics”;
      - emphasis [ref=e2074]: The Thin Man
      - text: inscribed the detective novel into the tradition of high-circle “comedies of manners”). Upon exhausting this matrix of
    - paragraph [ref=e2075]: combinations, Hammett simply ceased to write—a gesture almost unique in its radicality.
    - paragraph [ref=e2076]:
      - text: "For that reason, and in spite of the fact that in most of his stories and in two of his novels the same nameless private eye appears (“Continental Op”), Hammett’s narrative universe is the very opposite of Chandler’s, in which the private eye’s subjective point of view offers to the reader a recurrent point of identification. This—as well as the fact that Hammett sticks to the third-person narrative, whereas Chandler’s universe is unthinkable without the first-person narrative—indicates clearly the locus of their divergence: the status of the detective. Chandler himself, on praising Hammett for introducing into the detective novel the reality of “mean streets,” qualifies his panegyric with “But all this (and Hammett too) is for me not quite enough”: “But down these mean streets a man must go who is not himself mean, who is neither tarnished nor afraid. The detective in this kind of story must be such a man. He is the hero, he is everything. He must be a complete man and a common man and yet an unusual man. …”"
      - superscript [ref=e2078]:
        - link "15" [ref=e2079]:
          - /url: "#fn-ch5-15"
      - text: In short, what Hammett’s detective lacks is precisely the dimension of imaginary identification, of the ideal ego, of an image in which the detective can “see himself as likeable to himself” (a
      - emphasis [ref=e2080]: bricolage
      - text: "of contradictory features which define the impossible ideal: common, yet unusual; loser, yet successful; cynic, yet believing in justice)."
    - paragraph [ref=e2081]:
      - text: Let us take Hammett’s masterpiece,
      - emphasis [ref=e2082]: The Glass Key
      - text: ": in what consists the difference between Ned Beaumont, its principal character, and Philip Marlowe? Marlowe is a cynical romantic, full of wisecracks, inviting the reader to identify with his subjective perspective, whereas Beaumont is somehow “empty,” a kind of blank page: his “inner self-experience” remains totally inaccessible. (The very style of"
      - emphasis [ref=e2083]: The Glass Key
      - text: "is “ascetic,” limited to a scarce designation of external objects and gestures, avoiding even evocative predicates.) The crucial point is, however, that this blank fulfills a precise and necessary function, since the novel’s central libidinal tension hangs on it: Ned agrees to collaborate with the gang in conflict with Paul Madvig, his boss and paternal figure, yet he ultimately returns to Paul and organizes his victory, and"
      - emphasis [ref=e2084]: The Glass Key
      - text: "in its entirety pivots on the following question: when Ned consented to collaborate with the enemy, did he really betray Paul or was it all a kind of squared double cross devised to obtain the much-needed information on the enemy plans? Because of Ned’s “blank,” this question remains forever without answer, undecided."
    - paragraph [ref=e2085]:
      - text: In contrast to Ned’s “introverted,” inhibited attitude, Paul Madvig epitomizes the obscene-licentious display of power.
      - superscript [ref=e2087]:
        - link "16" [ref=e2088]:
          - /url: "#fn-ch5-16"
      - text: "Thereby, we have reached the looked-for mutation in the paternal figure: instead of the traditional father—guarantor of the rule of Law, i.e., the father who exerts his power as fundamentally"
      - emphasis [ref=e2089]: absent
      - text: ", whose fundamental feature is not an open display of power but the threat of potential power—we obtain an excessively"
      - emphasis [ref=e2090]: present
      - text: father who, as such, cannot be reduced to the bearer of a symbolic function. Ned’s “blank,” his inhibitory attitude, is therefore
      - emphasis [ref=e2091]: stricto sensu
      - text: "a reaction to the excessive presence of the obscene father: this presence sets off a compulsion to forsake, even betray, the father, to turn against him by putting to trial his power. The betrayal of the father is a desperate attempt to test his (im)potence, sustained by a contradictory desire: a desire to catch him in his impotence, to denounce his imposture, yet simultaneously a desire to see him undergo successfully the ordeal and thus belie our doubt."
      - superscript [ref=e2093]:
        - link "17" [ref=e2094]:
          - /url: "#fn-ch5-17"
    - paragraph [ref=e2095]:
      - text: This figure of the “other father”—the obscene, uncanny, shadowy double of the Name of the Father—emerged for the first time in all its force in the novels of Joseph Conrad; what we have in mind here, of course, are figures like Kurtz in
      - emphasis [ref=e2096]: Heart of Darkness
      - text: or Mister Brown in
      - emphasis [ref=e2097]: Lord
      - emphasis [ref=e2098]: Jim
      - text: . In the midst of the African jungle, in the very “heart of darkness,” the hero—whose name is again Marlow, yet without the last
      - emphasis [ref=e2099]: e
      - text: —encounters Kurtz, a kind of “master of enjoyment,” a paternal figure which comes closest to the impossible representation of what Kant called
    - paragraph [ref=e2100]:
      - text: “radical evil,” evilness
      - emphasis [ref=e2101]: qua
      - text: ethical attitude,
      - emphasis [ref=e2102]: qua
      - text: "pure spirituality. This father is distinguished by a series of features: he is all-powerful and cruel to the utmost, an absolute Master for whom there are no limits; yet, simultaneously, he possesses an insight into the very kernel of our (subject’s) being, our desire has no secret for him, he knows we are here to kill him and is resigned to it (in Coppola’s"
      - emphasis [ref=e2103]: Apocalypse Now
      - text: ", based upon"
      - emphasis [ref=e2104]: The Heart of Darkness
      - text: ", Kurtz (Brando) knows that Martin Sheen has come to kill him and, in effect, comes forward, submits himself to his fate). Perhaps, the contemporaneousness of these works with the moment when, in"
      - emphasis [ref=e2105]: Totem and Taboo
      - text: ", Freud proposed his theory on the “primordial father,” is not a mere external coincidence: one is tempted to say that Conrad depicted what remained hidden to Freud (insofar as we read him on the level of what he explicitly said, at least)—the fact, namely, that the “primordial father” is not a primitive figure of pure, presymbolic, brute force, but a"
      - emphasis [ref=e2106]: father who knows
      - text: . The ultimate secret of the parricide is that the father knows the son has come to kill him and accepts his death obediently. In his interpretation of Hamlet, Lacan pointed out the crucial fact that, in contrast to Oedipus (who does not know what he is doing), Hamlet’s father
      - emphasis [ref=e2107]: knows
      - text: "what befell him and who is the murderer—it is precisely on account of this knowledge that the father returns in the guise of a ghost and charges Hamlet with revenge. This knowledge concerns a dark, licentious side of the father-king who is otherwise presented as an ideal figure: he was murdered in full blossom of his sins … It is therefore a very special kind of knowledge, a"
      - emphasis [ref=e2108]: knowledge of enjoyment
      - text: ", i.e., the knowledge which is by definition excluded from the Law in its universal-neutral guise: it pertains to the very stature of Law that it is “blind” to this knowledge."
    - paragraph [ref=e2109]:
      - text: Now we can return to Wagner’s
      - emphasis [ref=e2110]: Parsifal
      - text: ": here, also, the libidinal “center of gravity” of the action, its true axis, is not Parsifal-Kundry, but rather the relationship of Parsifal to Amfortas, the king unable to perform his symbolic-ritual function—he was wounded in the midst of sin and only wants to die (the two Amfortas “laments” are indubitably the opera’s highlights). Amfortas, the humiliated, suffering king, and his counteragent, the evil magician Klingsor, himself impotent (castrated), though he dominates Kundry—does not their opposition form a matrix of figures which emerge later in the noir universe (Masters who are humiliated because of their attachment to the"
      - emphasis [ref=e2111]: femme fatale
      - text: ; asexual-impotent masters who exert power over the
      - emphasis [ref=e2112]: femme fatale
      - text: )? In other words, the allegedly archaic figure of the “primordial father” is actually a thoroughly
      - emphasis [ref=e2113]: modern
      - text: entity, a result of the
      - emphasis [ref=e2114]: decline
      - text: of the paternal metaphor.
      - superscript [ref=e2116]:
        - link "18" [ref=e2117]:
          - /url: "#fn-ch5-18"
    - paragraph [ref=e2118]:
      - text: In the very last page of his
      - emphasis [ref=e2119]: Seminar XI
      - text: ", Lacan says that “any shelter in which may be established a viable, temperate relation of one sex to the other necessitates the intervention— this is what psychoanalysis teaches us—of that medium known as the paternal metaphor.”"
      - superscript [ref=e2121]:
        - link "19" [ref=e2122]:
          - /url: "#fn-ch5-19"
      - text: "This is what is ultimately at stake in the noir universe: the failure of the paternal metaphor (i.e., the emergence of the obscene father who supplants the father living up to his symbolic function) renders impossible a viable, temperate relation with a woman; as a result, woman finds herself occupying the impossible place of the traumatic Thing. The"
      - emphasis [ref=e2123]: femme fatale
      - text: is nothing but a lure whose fascinating presence masks the true traumatic axis of the noir universe, the relationship to the obscene father, i.e., the default of the paternal metaphor—all the usual babble about “latent homosexuality” misses completely the primordial dimension of this relationship.
      - superscript [ref=e2125]:
        - link "20" [ref=e2126]:
          - /url: "#fn-ch5-20"
    - paragraph [ref=e2127]:
      - text: The crucial point not to be missed here is that the
      - emphasis [ref=e2128]: femme fatale
      - text: "and the obscene-knowing father cannot appear simultaneously, within the same narrative space: as long as the obscene-knowing father is still present, the woman is not yet fatal, she remains an"
      - emphasis [ref=e2129]: object of exchange
      - text: between father and son—father
      - emphasis [ref=e2130]: qua
      - text: “Master of Enjoyment” disposes of the woman.
      - emphasis [ref=e2131]: The Glass
      - emphasis [ref=e2132]: Key
      - text: is unique insofar as it renders visible this hidden “genesis” of the femme fatale. That is to say, the
      - emphasis [ref=e2133]: femme fatale
      - text: (Janet Henry, the senator’s daughter, a woman torn between Paul and
    - paragraph [ref=e2134]:
      - text: Ned, loved by both men) is already there, yet in a kind of prenatal state, as that which will become the femme fatale—like the hard-boiled detective himself who is also already there, yet lacking “it,” his crucial feature, the form of subjectivization that defines him.
      - superscript [ref=e2136]:
        - link "21" [ref=e2137]:
          - /url: "#fn-ch5-21"
      - text: "The last lines of Glass Key, after Ned announces to Paul his intention of leaving him together with Janet, are therefore a true antipode to the standard ending of a hard-boiled novel: in contrast to the standard dénouement of the hero’s relationship to the"
      - emphasis [ref=e2138]: femme fatale
      - text: (either his definitive succumbing to her power which ends in a paroxysm of their common death—
      - emphasis [ref=e2139]: Double
      - emphasis [ref=e2140]: Indemnity, Out of the Past
      - text: ", etc.—or his repudiation of her which changes her into a mucous slime—"
      - emphasis [ref=e2141]: The Maltese Falcon
      - text: ", e.g.), the (future)"
      - emphasis [ref=e2142]: femme fatale
      - text: "serves here as an instrument to deal the final blow to the paternal figure, turning him into a living wreck:"
    - paragraph [ref=e2143]:
      - text: "Ned Beaumont said: “Janet is going away with me.” Madvig’s lips parted. He looked dumbly at Ned Beaumont and as he looked the blood went out of his face again. When his face was quite bloodless he mumbled something of which only the word “luck” could be understood, turned clumsily around, went to the door, opened it, and went out, leaving it open behind him. Janet Henry looked at Ned Beaumont. He stared fixedly at the door."
      - superscript [ref=e2145]:
        - link "22" [ref=e2146]:
          - /url: "#fn-ch5-22"
    - paragraph [ref=e2147]:
      - text: "This interplay of gazes whereby—at the very moment of what, “officially” at least, purports to be a kind of happy ending—Ned does not return the loving gaze, since his gaze remains transfixed on the empty frame of the open door, throws the cards of the happy ending on the table:"
      - superscript [ref=e2149]:
        - link "23" [ref=e2150]:
          - /url: "#fn-ch5-23"
      - text: the couple will “live happily forever,” yet at the price of the broken, humiliated, removed father—all that remains after him is the empty frame, the trace of the retracted
      - emphasis [ref=e2151]: objet
      - emphasis [ref=e2152]: a
      - text: which, by means of its withdrawal, renders possible the stabilization of reality. The price to be paid for the happy ending is thus the radical violation of the symbolic alliance which leaves the Other shattered and for which “betrayal” is all too kind a word. This broken word is the hidden truth concealed by the traditional hard-boiled detective’s narcissistic claim for “authenticity.” All this suggests the hypothesis that the Hammettian type of hero (whose clearest expression is Ned Beaumont, not Sam Spade or the nameless Continental Op) functions as a kind of
      - emphasis [ref=e2153]: “vanishing mediator” between the classical and the hard-boiled
      - emphasis [ref=e2154]: detective
      - text: ": what emerges for a brief moment in the interspace between the two narcissisms, between the two figures enamored of their own ideal ego (self-admiration of one’s own “grey little cells” with the “logic-and-deduction” detective; self-admiration of one’s “authenticity” with the hard-boiled detective), is a unique figure, “empty” insofar as it lacks imaginary identification—the figure of the noir subject prior to his subjectivization."
    - heading "From Philip Marlowe to Dale Cooper" [level=4] [ref=e2155]
    - paragraph [ref=e2156]:
      - text: "The “blank,” the staying out of imaginary identification, is constitutive for the Hammettian subject: he is able to confront his “repressed,” to overcome his indecision and to accomplish the act destined to elucidate his ambiguous relationship with the obscene paternal figure, only at the price of his"
      - emphasis [ref=e2157]: aphanisis
      - text: "(eclipse, blackout). This accounts for one of the fundamental motifs of the noir universe, the “loss of memory” which threatens the subject’s self-identity: there is always a margin of uncertainty that sticks to the very ontological status of the noir subject—is he “truly himself”? Is he not the unconscious tool of an alien force which acts through him? An exemplary case of it is Cornell Woolrich’s"
      - emphasis [ref=e2158]: Black Curtain
      - text: ": following a minor street accident, the hero awakens from (what he assumes to have been) a brief spell of"
    - paragraph [ref=e2159]:
      - text: unconsciousness and learns that four years have passed; he is totally unaware of what he was doing during this time, yet he soon catches sight of policemen in civil clothes tailing him—he is suspected of murder; so he sets out to discover the truth about himself … There is a similar blackout in the very center of
      - emphasis [ref=e2160]: Red Harvest
      - text: ", Hammett’s first novel: a dead-drunk Continental Op falls asleep in the apartment of the local"
      - emphasis [ref=e2161]: femme fatale
      - text: ; on awakening, he finds her at his side with a knife in her back, and for a brief moment, a radical uncertainty springs up—did he himself kill her during his blackout?
      - superscript [ref=e2163]:
        - link "24" [ref=e2164]:
          - /url: "#fn-ch5-24"
      - text: What, then, is the precise nature of this
      - emphasis [ref=e2165]: aphanisis
      - text: "? Here, Richard Rorty’s reading of Orwell’s 1984 can perhaps be of some help: apropos of Winston’s breakdown in the hands of O’Brien, his torturer, Rorty points out that people can experience"
    - paragraph [ref=e2166]:
      - text: the ultimate humiliation of saying to themselves, in retrospect, “Now that I have believed or desired
      - emphasis [ref=e2167]: this
      - text: ", I can never be what I hoped to be, what I thought I was. The story I have been telling myself about myself … no longer makes sense. I no longer have a self to make sense of. There is no world in which I can picture myself as living, because there is no vocabulary in which I can tell a coherent story about myself.” For Winston, the sentence he could not utter sincerely and still be able to put himself back together was “Do it to Julia!” and the worst thing in the world happened to be rats. But presumably each of us stands in the same relations to some sentence, and to some thing."
      - superscript [ref=e2169]:
        - link "25" [ref=e2170]:
          - /url: "#fn-ch5-25"
    - paragraph [ref=e2171]:
      - text: "One of the fundamental propositions of Lacanian psychoanalysis is that this sentence or thing which encapsulates the kernel of the subject’s being beyond imaginary identifications, is in an irreducible way decentered with regard to the symbolic texture which defines the subject’s identity: the subject can confront this extimate kernel only at the price of his temporary"
      - emphasis [ref=e2172]: aphanisis
      - text: ". This is what Lacan’s formula of fantasy—$ a—designates: the subject’s self-erasure in the face of this strange body (belief, desire, proposition) which forms the core of his/her being. In other words,"
      - emphasis [ref=e2173]: aphanisis
      - text: "bears witness to the irreducible discord between the fantasmatic hard core and the texture of symbolic narrative: when I risk confrontation with this hard core, “the story I have been telling myself about myself no longer makes sense,” “I no longer have a self to make sense of,” or, as Lacan puts it in his"
      - emphasis [ref=e2174]: Seminar VIII
      - text: ", the big Other (the symbolic order) collapses into the small other,"
      - emphasis [ref=e2175]: objet petit a
      - text: ", the fantasy object. The extraction of"
      - emphasis [ref=e2176]: objet a
      - text: "from the field of reality confers on this field its consistency: in"
      - emphasis [ref=e2177]: aphanisis
      - text: ", the"
      - emphasis [ref=e2178]: objet a
      - text: is no longer extracted, it acquires full presence—in consequence of this, the symbolic texture which constituted my reality disintegrates.
    - paragraph [ref=e2179]:
      - text: Alan Parker’s
      - emphasis [ref=e2180]: Angel Heart
      - text: ", centered upon this motif of"
      - emphasis [ref=e2181]: aphanisis
      - text: ", is perhaps the key film of the postmodern"
      - emphasis [ref=e2182]: noir
      - text: "renaissance in the 1980s. Its hero is also a pathologically split subject, a private eye (Mickey Rourke) hired by the mysterious Louis Cipher (Robert de Niro) to elucidate the fate of a jazz musician who disappeared years ago; all witnesses contacted by the detective are soon thereafter mysteriously and brutally murdered—the dénouement: Louis Cipher is actually the devil himself (Lucifer) who has hired the detective to “expose himself,” since, years ago, the detective exchanged his identity for that of the jazz musician in an occult ritual and then disposed of the witnesses in a state of"
      - emphasis [ref=e2183]: aphanisis
      - text: … The theme of occult rituals which play with supernatural forces is of course a constant of the noir universe (first introduced by Hammett in
      - emphasis [ref=e2184]: The Dain Curse
      - text: ); however, with rare exceptions (among them Cornell Woolrich’s
      - emphasis [ref=e2185]: The Night Has a Thousand Eyes
      - text: ), the supernatural reference turns out to be a mask concealing some mundane greedy plot.
      - emphasis [ref=e2186]: Angel Heart
      - text: "reverses this relationship: what at first purports to be the standard noir probing into a nest of corruption whose roots reach far into the past, suddenly mutates into a tale of the supernatural. The same mutation of the"
    - paragraph [ref=e2187]:
      - text: theme of “social corruption” into the “supernatural” is at work in
      - emphasis [ref=e2188]: Twin Peaks
      - text: ": in spite of periodic “supernatural” hints (whose exact status is unclear: are they ironic or to be taken seriously?), the first half of the series remains a variation (albeit a peculiar one) on the standard"
      - emphasis [ref=e2189]: noir
      - text: theme of unmasking the corruption that lurks behind the small-town idyllic surface; in the second half, it turns out that the murderer of Laura Palmer (her father) was an unconscious tool of “Bob,” the evil spirit which dwells in “Red Lodge.”
      - superscript [ref=e2191]:
        - link "26" [ref=e2192]:
          - /url: "#fn-ch5-26"
    - paragraph [ref=e2193]:
      - text: "One should recall here the reproach of Jean Renault, the ultimate embodiment of “mundane” evil, to Dale Cooper: “Before you arrived, life in Twin Peaks went on quietly and smoothly, we were selling drugs, we organized prostitution, everybody was content—once you were here, everything went wrong, the normal run of things was derailed …” In short, in Twin Peaks, the logic of unveiling the corruption which lurks under the idyllic surface no longer works, since corruption is already part of this idyllic everyday life. The only thing that can effectively derange the normal circuit is therefore an intervention of pure, saintly innocence (Cooper) whose counterpoint cannot any longer be mundane, social evil, but externalized “supernatural” evil. For that reason, the “human” counteragent to Cooper in the second half of the series, his ex-colleague Wyndom Earle, can only be somebody in search of a contact with the source of this supernatural evil (the “Red Lodge”), and who, furthermore, accomplishes his crimes in an artificial, estheticist way (e.g., clad in chess symbols)—in pure contrast with the brutal, impulsive violence of the hard-boiled novels. The circle is thus in a way closed—that is to say, we all remember Chandler’s famous words by means of which he defined the way Hammett pulverized the universe of the classical logic-and-deduction novel: “Hammett gave murder back to the kind of people that commit it for reasons, not just to provide a corpse; and with the means at hand, not with handwrought duelling pistols, curare, and tropical fish.”"
      - superscript [ref=e2195]:
        - link "27" [ref=e2196]:
          - /url: "#fn-ch5-27"
      - text: In
      - emphasis [ref=e2197]: Twin Peaks
      - text: ", Lynch traversed the same path backward: he took murder back from the streets and returned it to the kind of people who do not commit it for (vulgar-acquisitive) reasons, but precisely to provide a corpse in an estheticist game; who do not commit it with the means at hand, but with ancient crossbows and venomous spiders in a cage above the victim’s head …"
    - paragraph [ref=e2198]:
      - text: In order to conceive the logic of this shift, one has to turn to Kant’s
      - emphasis [ref=e2199]: Critique of Judgment
      - text: ", more precisely, to the difference between the beautiful and the sublime deployed in its first part. What concerns us here is their opposition as to the possibility of representation and/or symbolization: although the suprasensible Idea/Thing cannot be represented in a direct, immediate way, one can represent the Idea “symbolically,” in the guise of beauty (in other words, the beautiful is a way to represent to ourselves “analogically” the good in the phenomenal world); what the chaotic shapelessness of sublime phenomena renders visible, on the contrary, is the very"
      - emphasis [ref=e2200]: impossibility
      - text: "of representing the suprasensible Idea/Thing. The sublime thereby reveals itself as something uncannily close to evil: the dimension that announces itself in the sublime chaos (the rough sea, mountain rocks, and so forth) is the very dimension of radical evil, i.e., of an evil whose nature is purely “spiritual,” suprasensible, not “pathological.” What one should bear in mind here is the asymmetry between good and evil: the fact that “evil is not beautiful” means that it cannot be represented, not even symbolically, in an intermediate way, by means of an analogy, i.e., that it is in a sense more purely “spiritual,” more suprasensible than good—radical evil is something so terrible that it is barely conceivable as a pure mental possibility and not in any way representable:"
    - paragraph [ref=e2201]: … by means of the sentiment of beauty, we can represent to ourselves in an intermediate, symbolic way our freedom, our destiny which consists in our being free, whereas by means of the sentiment of the sublime, we experience the impossibility of representing to
    - paragraph [ref=e2202]:
      - text: ourselves—although analogically—radical evil, the alterity and the conflict of freedom. Every symbolization of evil externalizes it in its relationship to the subject, while every sublimation of the good exposes us to the danger of mysticism, to the illusion of omnipotence which, in the practical domain, is called the delirium of holiness.
      - superscript [ref=e2204]:
        - link "28" [ref=e2205]:
          - /url: "#fn-ch5-28"
    - paragraph [ref=e2206]:
      - text: Is not precisely this inversion of the symbolization of good and the sublimation of evil into the symbolization of evil and the sublimation of good which defines the ideological coordinates of the universe of
      - emphasis [ref=e2207]: Twin Peaks
      - text: "? In it, evil is externalized—it appears as a supernatural, external force which takes possession of the individuals—and, by the same token, symbolized, i.e., posited as an invisible entity which can be represented “analogically,” in the guise of the possessed individuals. The reverse of the same operation is the sublimation of the good: the good is epitomized by the saintly Cooper, a mystical dream seer full of what Kant would call metaphysical"
      - emphasis [ref=e2208]: Schwärmereien
      - text: . In this sense, the figure of Dale Cooper is to be conceived as the final term in the series
      - emphasis [ref=e2209]: Ned Beaumont, Philip Marlowe, Dale Cooper
      - text: which designates the three stages of the
      - emphasis [ref=e2210]: noir
      - text: "hero: the cold, distanced Ned, the romantic, cynical Philip, the “innocent,” saintly Dale, to whom correspond the three figures of evil: the obscene-impotent father, the"
      - emphasis [ref=e2211]: femme fatale
      - text: ", the supernatural/externalized impersonal Force."
    - heading "5.2 Die Versagung" [level=3] [ref=e2212]
    - heading "The “sacrifice of the sacrifice”" [level=4] [ref=e2213]
    - paragraph [ref=e2214]:
      - text: How is our common ideological notion of man’s division between profession and woman structured? An exemplary case of it is
      - emphasis [ref=e2215]: Rhapsody
      - text: "(1954, Charles Vidor), a melodrama about a rich girl (Elizabeth Taylor) who oscillates between her two loves, an arrogant violinist and an emotional pianist. She leaves the violinist when he lets her know that his career as a virtuoso has priority in his life and that she has to subordinate herself to its demands; she disdains the pianist whom she marries out of revenge and drives him to the brink of a breakdown precisely because he neglects his career on account of his blind devotion to her—she returns to him only after he stands the ordeal by proving that he is capable of surviving without her (he performs successfully on his debut although, immediately before it, she let him know she is leaving him for good). This is, then, what “a woman wants” (within this fantasy logic): neither a man to whom his profession means more than she, nor a man who neglects his profession because of her, but a man to whom she means most, more than his profession, yet who, for all that, is prepared to sacrifice her on account of allegiance to his profession."
      - superscript [ref=e2217]:
        - link "29" [ref=e2218]:
          - /url: "#fn-ch5-29"
    - paragraph [ref=e2219]:
      - text: The point not to be missed here, again, is the necessity of the
      - emphasis [ref=e2220]: repeated
      - text: "choice. The pianist’s first choice (of a woman against his career) is “pathological” in the Kantian sense: a choice between two worldly, contingent, empirical goods (and the same goes for the violinist’s choice of career against woman). It is only when the pianist chooses for the second time—i.e., when he chooses to endure the ordeal, to assume the loss of the woman—that his object choice, the woman, loses her “pathological” character and becomes a sublime Thing. At the same time, his profession also acquires a non-“pathological” status: performing becomes for him a “duty for the sake of a duty” precisely insofar as it is"
      - emphasis [ref=e2221]: separated
      - text: from the Thing, insofar as it implies the integration of its loss. Cheaply melodramatic as it may seem, such an act of renunciation is eminently
      - emphasis [ref=e2222]: modern
      - text: ": it implies a split—the split between duty (responsibility to one’s profession) and the supreme good (the beloved woman)—which defines the modern subject. That is to say, the renunciation assumed by the pianist has the structure of what Freud called"
      - emphasis [ref=e2223]: die Versagung
      - text: ; as Lacan points out, this
      - emphasis [ref=e2224]: Versagung
      - text: is not a simple “frustration” but an abjuration which
    - paragraph [ref=e2225]:
      - text: announces a tragic dimension even more devastating than the antique
      - emphasis [ref=e2226]: ate
      - text: .
    - paragraph [ref=e2227]: "The antique tragedy occurs against the background of fate in the guise of “family curse,” i.e., a symbolic debt which, following an initial trespass, is carried over from one generation to another: Oedipus, Eteocles and Polynices, Antigone, etc., are nothing but links in the chain of the Labdaid family curse. This fate operates unconsciously, as a blind, “impulsive” force: individuals fly in the face of fate precisely insofar as it operates behind their backs—the only way for them to preserve their dignity is to assume unreservedly their assigned place in this succession. What we encounter here is the fundamental dimension of the subject’s “alienation” in the signifier: without any active guilt or knowledge on his part, the subject contracts a debt which weighs down on him and outlines his fate. Is there anything more horrifying than this? Lacan’s answer is: yes, the tragedy of the modern, “new-age” subject. Its presupposition is the Christian principle of the Word: the final outcome of its consummation is that the obscure, “underground,” blind machinery of antique fate is expounded, unearthed, brought into the light of day."
    - paragraph [ref=e2228]:
      - text: What Lacan has in mind here is that Christianity is the religion of revelation. As Hegel points out, in the content revealed by Christ we look in vain for any new elements, for any elements not already contained in the preceding religious tradition—the only thing “revealed” is ultimately
      - emphasis [ref=e2229]: the necessity of revelation itself
      - text: . Every religion purports to reveal to humanity the divine truth; yet it is only Christianity which repudiates the idea of some transcendent truth to be revealed—in it, the revealed truth coincides with the act of revelation. Ironically, one is tempted to conceive the Christian revelation as the first formulation of the Freudian maxim
      - emphasis [ref=e2230]: Wo es war, soll ich werden
      - text: —where it was (the God-Father who still belongs to the Real), I (Christ) shall become … In a way, God
      - emphasis [ref=e2231]: will have been
      - text: ": he must reveal himself in order to become God. In other words, the inversion of Christianity with regard to Judaism consists in the “reflection into itself” of the split between God and man: this split is reflected into God himself as his own lack. A God which appears to humans as an inaccessible, transcendent Master, as an impenetrable enigma, is in himself a failed God, an enigma also to himself."
    - paragraph [ref=e2232]:
      - text: "For that reason, Christ’s death on the cross has quite another significance than the divine self-sacrifice in pagan religions where God’s death designates a stage in the cyclic movement of divine expiration and rebirth. If this were also the case in Christianity, the role of the Holy Spirit would become totally incomprehensible: Christ’s death would simply announce the insufficient, transitory, ephemeral character of the Incarnation, one would remain within the confines of the pagan notion of a God who, from time to time, incarnates himself and then strips off his incarnation, withdrawing again to his Beyond. In the case of Christianity, however, the death of Christ does not announce the return to the Father but the arrival of the Holy Spirit: God continues to live eternally after his death in the community of believers, in its symbolic ritual. Hegel is thus quite justified in saying that, paradoxically, what expires on the cross is not an ephemeral, transitory incarnation of God but the God of Beyond himself, i.e., the notion of God"
      - emphasis [ref=e2233]: qua
      - text: "inaccessible, transcendent, nonrevealed entity—in other words, the God which belongs to the Real, the antique God. In Christianity, God ceases to be a transcendent entity who incarnates himself in a finite human figure, he becomes a name for this very movement of incarnation/revelation: his existence is purely “performative,” an effect of his own relevation in the Word."
    - paragraph [ref=e2234]:
      - text: In this way, i.e., once fate is transformed into a revealed Word, the possibility is opened up for the subject to acquire a “reflected” distance from fate, to refuse to assume the place assigned to him in the texture of fate. And, according to Lacan, this is what the Freudian
      - emphasis [ref=e2235]: Versagung
      - text: "ultimately is about: by means of it, we renounce the very symbolic mandate for the"
    - paragraph [ref=e2236]: "sake of which we were prepared to put everything at stake. Therein consists the constitutive, fundamental guilt attested to by the neurotic symptoms which pertain to the very being of what we call “the modern man”: the fact that, ultimately, there is no agency in the eyes of which he can be guilty weighs upon him as a redoubled guilt. The “death of God”—another name for this retreat of fate—makes our guilt absolute."
    - paragraph [ref=e2237]:
      - text: "What Lacan says here seems a philosophical commonplace: by means of the reflective distance toward the substantial content, the modern subject disengages himself from the constraints of fate; in contrast to the traditional individual wholly determined by the blind circuit of fate, he “reflects,” brings into the light of day, the implicit presuppositions that delineate the contours of his life behind his back—a motif varied by all proponents of modernity up to Habermas. This self-evidence, however, is deeply misleading: what Lacan renders visible is a radical, redoubled, self-referring renunciation by means of which the dimension of subjectivity emerges. The first level is the symbolic pact: the subject identifies the kernel of his being with a symbolic feature to which he is prepared to subordinate his entire life, for the sake of which he is prepared to sacrifice everything—in short, the alienation in the symbolic mandate. The second level consists in sacrificing this sacrifice itself: in a most radical sense, we “break the word,” we renounce the symbolic alliance which defines the very kernel of our being—the abyss, the void in which we find ourselves thereby, is what we call “modern-age subjectivity.” This void opens up only insofar as, prior to it, we subordinated the entire wealth of our being to the symbolic obligation affected by"
      - emphasis [ref=e2238]: Versagung
      - text: —in other words, our “betrayal” counts only insofar as we renounce the object of our highest love and devotion; otherwise our act of betrayal is not the “sacrifice of the sacrifice,” but simply reinstates the primacy of “pathological” pleasures which we were not prepared to renounce, i.e., to sacrifice for the sake of the symbolic obligation. It is not difficult to discern in these two stages of renunication the duality of alienation and separation that Lacan elaborated later in his
      - emphasis [ref=e2239]: Seminar XI
      - text: ": the sacrifice of all “pathological” content for the Cause is the alienation in the signifier (in the symbolic mandate), whereas the sacrifice of this mandate itself involves a gesture of separation, of gaining a distance from the symbolic order."
    - paragraph [ref=e2240]:
      - text: "The ultimate example of this sacrifice, of course, is the Stalinist monster trials (a phenomenon contemporary to the rise of the hard-boiled novel): the accused finds himself in an absolute void insofar as he is compelled to authenticate his devotion to the communist cause by confessing his betrayal. In this sense, one could say that the accused who confesses his betrayal of the communist cause is the Cartesian subject at its purest: at the end of the age of modernity, its truth comes to light, reduced to its bare essential. That is to say, Lacan’s thesis is here very precise: the Cartesian subject, this substanceless void of the pure"
      - emphasis [ref=e2241]: cogito
      - text: ", constitutes himself by way of such a dreadful “betrayal.” It is the paternal metaphor, the Name of the Father, which determines the place of the subject within the symbolic network; consequently, the most elementary form of"
      - emphasis [ref=e2242]: Versagung
      - text: "is the “betrayal of the father”: withdrawal from the symbolic pact, from the most fundamental alliance that links us with the father’s Name. The subject of psychoanalysis, as Lacan puts it, is the Cartesian subject."
    - paragraph [ref=e2243]:
      - text: This is, then, how we are to interpret Ned’s “blank” in
      - emphasis [ref=e2244]: The Glass Key
      - text: ": in"
      - emphasis [ref=e2245]: Seminar VIII
      - text: ","
      - superscript [ref=e2247]:
        - link "30" [ref=e2248]:
          - /url: "#fn-ch5-30"
      - text: Lacan himself conceives the subject-son’s
      - emphasis [ref=e2249]: Versagung
      - text: "as the structural incidence of the emergence of the obscene-knowing father. And the shift from the Hammettian to the Chandlerian subject marks precisely the moment of subjectivization of this “blank” subject of renunciation: certainly, Philip Marlowe is also characterized by a fundamental renunciation (he can fulfill his ethical mission only in the guise of a “loser,” i.e., in his corrupted environs, he can only be successful insofar as he remains socially"
      - emphasis [ref=e2250]: unrecognized
      - text: ), yet this renunciation functions as a source of narcissistic satisfaction, as a sign of his “authenticity.” The crucial
    - paragraph [ref=e2251]:
      - text: point here, however, is that this shift from the “blank” subject to his subjectivization, to the imaginary identification which fills out the void of the Hammettian subject, is strictly correlative to the shift in the libidinal center of gravity from the obscene father to the
      - emphasis [ref=e2252]: femme
      - emphasis [ref=e2253]: fatale
      - text: . The word
      - emphasis [ref=e2254]: fatale
      - text: is to be taken here as literally as possible—we are again within the confines of destiny, of fate, from which the Hammettian hero disengaged himself. In the classical hard-boiled novel and
      - emphasis [ref=e2255]: film noir
      - text: ", the"
      - emphasis [ref=e2256]: femme fatale
      - text: "is an agent of (evil) fate: the moment she appears (and these moments of her first appearance are perhaps the most sublime in"
      - emphasis [ref=e2257]: film noir
      - text: ": the entry of Barbara Stanwyck in"
      - emphasis [ref=e2258]: Double Indemnity
      - text: ", of Jane Greer in"
      - emphasis [ref=e2259]: Out of the
      - emphasis [ref=e2260]: Past
      - text: ", of Lana Turner in"
      - emphasis [ref=e2261]: The Postman Always Rings Twice
      - text: ", of Yvonne de Carlo in Criss-Cross …), the hero’s fate is sealed, events take their inexorable course. As a rule, the “blackness,” the “"
      - emphasis [ref=e2262]: noir
      - text: ” character of the
      - emphasis [ref=e2263]: noir
      - text: "universe, is affiliated to this inexorable fate epitomized by the woman-Thing: in her face, the hero can read the foreboding of his future doom. Our thesis, however, is here the exact opposite: the lowest ebb, the point of true horror, is the moment of"
      - emphasis [ref=e2264]: Versagung
      - text: when the subject finds himself face to face with the groundless abyss of his lack of being. With regard to this moment, the entry of the
      - emphasis [ref=e2265]: femme fatale
      - text: "already brings a kind of relief, we can take refuge again within “narrative closure”: the subject eludes anew the confrontation with his lack of being. In this sense, Lacan’s thesis on woman as “one of the Names of the Father” fully applies to the"
      - emphasis [ref=e2266]: femme fatale
      - text: in the
      - emphasis [ref=e2267]: noir
      - text: "universe: the function she performs is exactly homologous to that of the Name of the Father, i.e., she renders it possible for the subject to locate himself again within the texture of symbolic fate."
    - heading "Die Versagung, castration, alienation" [level=4] [ref=e2268]
    - paragraph [ref=e2269]:
      - text: It is against the background of this notion of
      - emphasis [ref=e2270]: Versagung
      - text: that one has to conceive also the
      - emphasis [ref=e2271]: Verzicht
      - text: "from the famous verses of Georg Trakl:"
      - emphasis [ref=e2272]: "“So lern’ich traurig den Verzicht: Kein Ding"
      - emphasis [ref=e2273]: sei wo das Wort gebricht
      - text: "” (So sadly I learned renunciation: Where the word breaks up no thing can be) interpreted by Heidegger in"
      - emphasis [ref=e2274]: Unterwegs zur Sprache
      - text: .
      - superscript [ref=e2276]:
        - link "31" [ref=e2277]:
          - /url: "#fn-ch5-31"
      - text: "We can distinguish three levels, three ways to read them. The first is to conceive of them as a paraphrase of the fundamental thesis of Gadamer’s hermeneutics: being “is” only as understood, articulated in language; i.e., language forms the (historically mediated) transcendental horizon of the disclosure of being. However, as was pointed out by Gianni Vattimo,"
      - superscript [ref=e2279]:
        - link "32" [ref=e2280]:
          - /url: "#fn-ch5-32"
      - text: "what we get in Gadamer is an “urbanized” (domesticated, “gentrified”) Heidegger, a Heidegger purified of disagreeable excesses which do not enter the frame of the academic circuit: he passes over in silence those features of Heidegger’s thought which, although they may appear to belong to the mythological register of “blood and soil,” actually announce the dimension of the"
      - emphasis [ref=e2281]: real
      - text: ", of what cannot be reduced to the problematic of language"
      - emphasis [ref=e2282]: qua
      - text: transcendental horizon (
      - emphasis [ref=e2283]: das Ding
      - text: ", the opposition of sky and earth, etc.). It is precisely in this direction that Heidegger’s reading of Trakl’s verses points: true, things are only where there is a word, yet what really matters to Heidegger is the reverse of this thesis—the spoken word always revolves on the unspeakable, the ineffable kernel of the Thing which we experience as such when the word fails, when we confront silence. At the very point at which the word breaks up, at which there are no things (ontical objects), we encounter the Thing, the true “matter of thought” ("
      - emphasis [ref=e2284]: Sache des Denkens
      - text: ).
    - paragraph [ref=e2285]:
      - text: There is, however, a third reading which, following Heidegger’s steps, centers on the difference between a Thing and things
      - emphasis [ref=e2286]: qua
      - text: "inner-worldly, ontical objects. An ontical object is not the same as a Thing: a Thing is an “auratic” object, an object in which there is “something more than itself” (for that reason, man is a thing"
      - emphasis [ref=e2287]: par excellence
      - text: ). This “something more,” this sublime, indefinable X which cannot be located in any of the positive features of the object,
    - paragraph [ref=e2288]:
      - text: yet the presence of which makes a Thing out of the object, is engendered by the word which names the object. In this precise sense, word is a
      - emphasis [ref=e2289]: Vorstellungs-Repräsentanz
      - text: ", a placeholder for the (lacking) representation, i.e., for the representation of that which is “unrepresentable” in the object and which, as such, makes a Thing out of it. This is how what Heidegger calls “word” differs from a mere sign: a sign designates positive properties of the object, whereas a word captures, encircles, precisely the elusive"
      - emphasis [ref=e2290]: je ne sais quoi
      - text: "beyond positive properties. In this perspective, “Where the word breaks up no thing can be” means: it is only the word which opens up the sublime, “ineffable” dimension and thus makes a Thing out of an object. Bearing in mind Lacan’s definition of the Sublime as “an object elevated to the dignity of the Thing,” one is tempted to propose the following translation of Trakl’s verse in Lacanese:"
      - emphasis [ref=e2291]: where the
      - emphasis [ref=e2292]: place-holder of the (missing) representation fails to intervene, no object can be elevated to the
      - emphasis [ref=e2293]: dignity of the Thing
      - text: .
    - paragraph [ref=e2294]:
      - text: And where, precisely, is
      - emphasis [ref=e2295]: Verzicht
      - text: ", renunciation, here? In the fact that the Thing remains forever unrepresentable: the"
      - emphasis [ref=e2296]: je ne sais quoi
      - text: which makes all the difference between the sublime and the ordinary can never be represented, every object is split into an ordinary ontical entity and the sublime X. The usual psychoanalytical name for this
      - emphasis [ref=e2297]: Versagung
      - text: ", for the loss of the Thing, of course, is “symbolic castration.” Yet in order to avoid the misapprehensions which abound even with authors who proclaim themselves Lacanian, it is crucial to bear in mind the above-described “self-reflective” structure of the renunciation: “castration” is always a “renunciation of renunciation,” i.e., a reflection into itself of a renunciation, never a simple renunciation of something. The most succinct definition of castration is found in Lacan’s Seminar on"
      - emphasis [ref=e2298]: Transference
      - text: ", toward the end of his interpretation of Paul Claudel’s Coufontaine trilogy: “castration is ultimately structured like this—we take away from somebody his desire, and in exchange for it we hand him over to somebody else— in this case, to the social order.”"
      - superscript [ref=e2300]:
        - link "33" [ref=e2301]:
          - /url: "#fn-ch5-33"
      - text: "A couple of lines later, there is another formulation: “we deprive the subject of his desire, and in exchange for it we send him to the market where he becomes the object of general auction.”"
      - superscript [ref=e2303]:
        - link "34" [ref=e2304]:
          - /url: "#fn-ch5-34"
      - text: "At the bottom of the same page, the third and more general formulation: “The effects on a human being of the fact that he becomes a subject of law are, in short, that he is deprived of what matters to him most, and in exchange for it, he is himself delivered to the texture which is woven between generations.”"
      - superscript [ref=e2306]:
        - link "35" [ref=e2307]:
          - /url: "#fn-ch5-35"
    - paragraph [ref=e2308]:
      - text: The first thing which strikes the eye here is the asymmetry, i.e., as Lacan puts it, the “strange conjugation of a minus which is not redoubled by any plus.”
      - superscript [ref=e2310]:
        - link "36" [ref=e2311]:
          - /url: "#fn-ch5-36"
      - text: That is to say, insofar as “castration” is defined as an act of exchange, one would expect the subject to obtain something in exchange for the renunciation (cultural progress, symbolic recognition, material goods, or the like); yet all that the second part of this strange act of exchange brings about is an additional loss—in thanks for handing over “everything,” for sacrificing the very kernel of his being, the object in himself, i.e., that which is “in himself more than himself,”
      - emphasis [ref=e2312]: the subject
      - emphasis [ref=e2313]: himself is made into an object
      - text: ", becomes an object of exchange. Such a formulation as qualifies the sacrificed object as"
      - emphasis [ref=e2314]: objet petit a
      - text: ", the object in the subject, the hidden treasure,"
      - emphasis [ref=e2315]: agalma
      - text: ", which confers dignity upon the subject, makes somewhat clearer the sense in which castration, after all, is an act of exchange: the exchange of an object for another—in exchange for the lost object-cause of desire, the subject himself becomes object."
      - superscript [ref=e2317]:
        - link "37" [ref=e2318]:
          - /url: "#fn-ch5-37"
    - paragraph [ref=e2319]:
      - text: We can see, now, why castration is
      - emphasis [ref=e2320]: symbolic
      - text: ": by means of it, the subject exchanges his being (an object) for a place in the symbolic exchange, for a signifier which represents him. Conceived in this way, castration is strictly homologous to alienation—not only in the Lacanian sense of alienation in the signifier’s order, but also in the Marxian sense of alienation which pertains to the status of a proletarian. A proletarian is deprived of the very kernel of his being, of his productivity, of the surplus value brought about by it (Lacan modeled the term"
    - paragraph [ref=e2321]:
      - emphasis [ref=e2322]: plus de jouir
      - text: ", surplus enjoyment, after the Marxian surplus value), and in exchange for it he gets what? He is himself reduced to labor force, an exchangeable object-commodity that can be bought on the market. To a connoisseur of structuralism, it is not difficult to discover the homology between this paradox of “castration” and the elementary formula of the transformation of myths proposed by Claude Lévi-Strauss:"
      - superscript [ref=e2324]:
        - link "38" [ref=e2325]:
          - /url: "#fn-ch5-38"
      - text: "the two subjects/agents not only exchange an object, one of them is himself exchanged, i.e., he passes from the status of subject to that of object. In the act of “castration,” the subject donates all to the Other, and in exchange for it he is himself exchanged/donated: as if, in Hegelese, exchange, by a kind of “reflection into itself,” would render exchangeable the very subject of exchange. This is what we encounter in the case of the proletarian: the proletarian designates the moment of “reflection into itself” of the exchange society, i.e., the moment when the subject of exchange offers on the market not only an object (his product/commodity), but"
      - emphasis [ref=e2326]: himself as a commodity
      - text: ". Dialectical analysis conceives such a reflective inversion as a necessary consequence of the universalization of the exchange function: as soon as the exchange of commodities becomes universal and predominant, the labor force itself must appear on the market as a commodity. The crucial point not to be missed here, however, is that"
      - emphasis [ref=e2327]: this becoming an object of exchange
      - emphasis [ref=e2328]: coincides with the emergence of pure subjectivity
      - text: ". That is to say, the whole point of Marx is that, in the opposition between the capitalist and the proletarian, it is the proletarian who stands for the pure subjectivity: it is precisely because he is reduced to pure, substanceless subjectivity (i.e., because he is devoid of all objective conditions of the productive process—all he owns is his labor power) that the proletarian has to exchange himself (his labor power) on the market. As a good Hegelian, Marx knew that pure subjectivity is strictly correlative to becoming an exchangeable object—in other words, the paradox is that what is alienated (the dimension of subjectivity) is literally constituted by way of the process of alienation."
    - paragraph [ref=e2329]:
      - text: "An even more fundamental case of this inversion of the subject into the object of exchange, of course, is the status of women within the (patriarchal) symbolic order: according to Claude Lévi-Strauss, their reduction to an object of exchange between men (one of the three types of “objects” that are exchanged: women, words, material goods) pertains to the very notion of the symbolic order. If we bear in mind that, for a human being, “to become an object of exchange” implies the above-described structure of"
      - emphasis [ref=e2330]: Versagung
      - text: "where, in exchange for the sacrifice of the kernel of his/her being, the subject is reduced to an object of exchange—in other words, if we bear in mind that this becoming an object of exchange is strictly correlative to the emergence of subjectivity—the Lacanian thesis according to which woman epitomizes castration appears in a new light: the reduction of the woman to an object of exchange means that"
      - emphasis [ref=e2331]: woman
      - text: —
      - emphasis [ref=e2332]: not
      - emphasis [ref=e2333]: man
      - text: —
      - emphasis [ref=e2334]: is the subject at its purest
      - text: ", i.e., the Cartesian"
      - emphasis [ref=e2335]: cogito qua
      - text: void, emptied by way of
      - emphasis [ref=e2336]: Versagung
      - text: . In other words, men possess and exchange objects, whereas it is only women who designate the point at which this exchange (i.e., the external relationship between the subject and object of exchange) is “reflected into itself,” brought to the point of its self-reference, so that the subject of exchange so to speak “exchanges himself/herself” and becomes the object of exchange. In this precise sense, woman is “the symptom of man,” of man
      - emphasis [ref=e2337]: qua
      - text: "Cartesian subject: she marks the “return” of his “repressed,” i.e., she epitomizes what the Cartesian male subject, in his everyday self-understanding, is compelled to “repress,” namely the"
      - emphasis [ref=e2338]: Versagung
