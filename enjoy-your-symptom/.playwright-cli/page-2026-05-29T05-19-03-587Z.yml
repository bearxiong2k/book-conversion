    - paragraph [ref=e2339]:
      - text: In order to specify this aspect of the feminine ethical attitude Hollywood, for the last time, can be of some help. What we have in mind, of course, is King Vidor’s
      - emphasis [ref=e2340]: Stella Dallas
      - text: (1937), a true counterpart to the male
      - emphasis [ref=e2341]: Versagung
      - text: in
      - emphasis [ref=e2342]: Rhapsody
      - text: "by reference to which we opened this section: the story of a mother who deliberately assumes the role of a vulgar debauchee so that her daughter can leave her and marry her high-society fiancé with a clear conscience. When,"
    - paragraph [ref=e2343]:
      - text: "at the very end of the film, the mother (Barbara Stanwyck) observes the marriage ceremony, anonymous in the crowd near the church fence, and then leaves with a blissful expression on her face, we find ourselves at the delicate turning point at which what appears to be the lowest level of patriarchal subordination of the woman turns into its opposite. That is to say, the first reading of the film which imposes itself is radically antifeminist: the mother finds the fulfillment of her feminine mission in the ultimate sacrifice for the sake of her child’s (patriarchal-heterosexual) happiness. Yet the renunciation at work here is so radical that it is brought to the extreme of self-negation: the mother has to renounce the very effect of renunciation, the big Other (the public) does not perceive her gesture as a noble sacrifice, i.e., she is compelled to present her sacrifice as its opposite, as an act of loathsome corruption, so that she is deprived of the minimal narcissistic satisfaction. The void that the mother finds herself in at the end of the film is therefore simply the void of freedom: she is released from the burden of motherhood, the possibility of a new life opens up for her, of a new beginning from the zero point."
      - superscript [ref=e2345]:
        - link "39" [ref=e2346]:
          - /url: "#fn-ch5-39"
    - paragraph [ref=e2347]:
      - text: "What we encounter here, again, is the opposition between the hard-boiled detective’s and the woman’s renunciation: the first renunciation remains within the narcissistic economy, it always counts on a “deeper” recognition from the big Other, whereas only a woman is capable of renunciation, the result of which is that one is thrown upon oneself, absolutely. The Nietzschean subtitle of"
      - emphasis [ref=e2348]: Stella Dallas
      - text: could have been “the birth of the
      - emphasis [ref=e2349]: cogito
      - text: from the spirit of melodramatic renunciation.”
    - heading "“Subjective destitution”" [level=4] [ref=e2350]
    - paragraph [ref=e2351]:
      - text: It should be clear, now, why this reference to
      - emphasis [ref=e2352]: Versagung
      - text: "does not entail any kind of “regression” to a pre-Enlightenment, quasi-ritual idolatry of a primordial sacrifice:"
      - emphasis [ref=e2353]: Versagung
      - text: designates “Enlightenment in becoming” in the precise Kierkegaardian sense, i.e., a founding gesture which disappears, becomes invisible, once the symbolic space of Enlightenment is established. We have already indicated how the purest realization of the paradox of
      - emphasis [ref=e2354]: Versagung
      - text: is the victim in the Stalinist trials; no wonder, then, that in the domain of literature, one encounters the structure of
      - emphasis [ref=e2355]: Versagung
      - text: in Bertolt Brecht’s “learning plays” (Lehrstücke) from the late 1920s and early 1930s, a kind of literary counterpart to the Stalinist trials. Lacan takes as the third term that concludes the “trilogy of desire” in the Western drama, i.e., that comes after
      - emphasis [ref=e2356]: Antigone
      - text: and
      - emphasis [ref=e2357]: Hamlet
      - text: ", the Coufontaine trilogy of Paul Claudel;"
      - emphasis [ref=e2358]: The Measure Taken
      - text: ", the crucial “learning play,” serves perhaps even better to exemplify the tragic dimension of modern subjectivity."
    - paragraph [ref=e2359]:
      - text: Brecht’s “learning plays” were motivated by his encounter with the universe of Noh plays— what we encroach upon thereby is the relationship of the West with Japan
      - emphasis [ref=e2360]: qua
      - text: fantasy object. That is to say, the history of the so-called cultural exchange between Europe and Japan is a long story of missed encounters epitomized by the fate of Kurosawa’s
      - emphasis [ref=e2361]: Rashomon
      - text: ": in Europe it was celebrated as a discovery of Japan, whereas in Japan it failed, since it was perceived as all too European … In Europe, Japan functions as a kind of fantasy screen onto which one projects one’s “repressed.”"
      - superscript [ref=e2363]:
        - link "40" [ref=e2364]:
          - /url: "#fn-ch5-40"
      - text: "This fantasy image of Japan is ramified into two main branches: the “fanatic” Japan (kamikaze, samurai, the code of honor—Japan as the ethics of unconditional obedience) and the “semiotic” Japan (from Eisenstein to Barthes: kabuki, the Japanese art of painting—Japan as an empire of signs delivered from Western logo-centrism). The first fantasy is usually appropriated by the political Right and the second by the Left— with one significant exception: Bertolt Brecht’s “learning plays”; the play which starts the"
    - paragraph [ref=e2365]:
      - text: series,
      - emphasis [ref=e2366]: Jasager
      - text: (
      - emphasis [ref=e2367]: The One Who Says Yes
      - text: ") (1929), is a revised translation of an old Noh play, and the paradox is here double. First, Brecht—a radical Leftist—appropriated a problematic which, usually, was the domain of the Right: since its theme is sacrifice, both the Left and the liberals attacked it as an unwelcome infusion of the authoritarian oriental attitude into the Western universe of democratic and rational openness. Yet, second point, things get complicated precisely apropos of this alleged import of the oriental attitude: upon a closer comparison of the Japanese original with Brecht’s version, it is easy to ascertain that precisely the features which troubled liberal critics so much"
      - emphasis [ref=e2368]: were added by Brecht himself
      - text: —we look in vain for them in the Japanese original.
      - superscript [ref=e2370]:
        - link "41" [ref=e2371]:
          - /url: "#fn-ch5-41"
    - paragraph [ref=e2372]:
      - emphasis [ref=e2373]: Jasager
      - text: is a story of a village boy who voluntarily joins an expedition bound for a city beyond the high mountains in order to fetch medicine against a disease which is raging in the village. Up in the mountains, the boy falls ill and thus prevents the further progress of the expedition; so the other members put him to death, yet only after the boy has accepted his death, i.e., has agreed with the custom which says that those who obstruct an expedition should be thrown over a precipice.
      - emphasis [ref=e2374]: Die Massnahme
      - text: (
      - emphasis [ref=e2375]: The Measure Taken
      - text: ", 1930) transposes the same matrix into the communist revolution: a group of communist agitators bound for a Chinese city where they are to organize revolution is joined by a young zealot. At the crucial moment, the young comrade breaks down: overcome by compassion toward those who suffer, he takes off the mask and displays his face in public. The revolutionary conspiracy is thereby broken, a defeat ensues, and the group has to withdraw. On their escape, the young comrade is severely wounded; after obtaining his agreement, the group kills him and throws him into lime so that no trace of him will remain. The play is structured as a kind of flashback/voiceover narrative: the four agitators describe their acts at a Party tribunal (“Control Chorus”); at the end, the tribunal declares them innocent since their “measure” was justified."
    - paragraph [ref=e2376]:
      - text: Brecht’s learning plays were an exercise in what he called the “large pedagogics” (
      - emphasis [ref=e2377]: die grosse
      - emphasis [ref=e2378]: Pädagogik
      - text: "); later, he abandoned this approach and devised the “small pedagogics” of the “epic theatre,” which for him was not a further step in a progressive development, but precisely a compromise formation: up to his death, Brecht insisted that the only part of his work which actualized the “theater of the future” was the learning plays. In the “large pedagogics,” the partition that separates the actors from the public has to fall: those who “learn” are the actors themselves, not the public—how? It is here that we encounter the first Foucauldian element: apropos of"
      - emphasis [ref=e2379]: Lehrstücke
      - text: ", Brecht spoke about “bodily semiotics” ("
      - emphasis [ref=e2380]: körperliche Semiotik
      - text: ")—learning plays are to denounce and undermine the ruling ideology not on the level of its general theoretical propositions, but on the level of the “microphysics of power,” of patterns of behavior, of the rituals which materialize ideological propositions. What we have here is the reverse of the Kantian freedom to argue—within the confines of the “public use of reason,” argue as much as you want, but, insofar as you are a cog in the (social) machine, obey: Brecht’s aim was to render visible this logic of “private” obedience."
      - superscript [ref=e2382]:
        - link "42" [ref=e2383]:
          - /url: "#fn-ch5-42"
      - text: Herefrom his request that the actors interchange parts, each of them successively assuming the role of the young comrade—does this request not bring to mind Foucault’s fascination with the homosexual sado-masochist practices whose crucial feature is precisely the interchangeability of roles?
    - paragraph [ref=e2384]:
      - text: "Yet—in a way Foucault would undoubtedly find cognate to his endeavor—what was truly at stake in this interchanging of roles was a certain ethical gesture that appealed to Brecht in that period, the gesture of renunciation, of self-sacrifice: of saying Yes to one’s self-annihilation. This gesture is indicated by the very title of the first learning play,"
      - emphasis [ref=e2385]: Jasager
      - text: ": there is a certain Yes which has to be"
      - emphasis [ref=e2386]: repeated
      - text: . The boy from
      - emphasis [ref=e2387]: Jasager
      - text: "says Yes twice: his first Yes is the Yes to the cause, to the mission he wants to join, while the second Yes affirms his agreement to his"
    - paragraph [ref=e2388]:
      - text: death, i.e., to the “valley-hurling.” It is the same with
      - emphasis [ref=e2389]: The Measure Taken
      - text: ","
      - superscript [ref=e2391]:
        - link "43" [ref=e2392]:
          - /url: "#fn-ch5-43"
      - text: "where the first Yes is:"
    - paragraph [ref=e2393]: In the interests of communism, agreeing to the advance of the proletarian masses of all lands, saying Yes to the revolutionizing of the world. (82)
    - paragraph [ref=e2394]: "And the second Yes:"
    - paragraph [ref=e2395]: "FIRST AGITATOR: We must shoot you and throw you in the lime pit so the lime will burn you. And we ask you: do you agree to this? COMRADE: Yes. (106)"
    - paragraph [ref=e2396]:
      - text: Two features have to be kept in mind here if one is to avoid totally missing the point by making out of this Yes an ordinary case of heroic sacrifice for the cause. The second Yes is of a strictly formal nature, an empty gesture, since (in
      - emphasis [ref=e2397]: Jasager
      - text: as well as in
      - emphasis [ref=e2398]: The Measure Taken
      - text: ") the chorus in the background somewhat cynically emphasizes that the young man will be put to death irrespective of his answer:"
    - paragraph [ref=e2399]: "FIRST AGITATOR: We are going to ask him if he agrees, for he was a brave fighter. SECOND AGITATOR: But even if he does not agree, he must disappear, and totally. (106)"
    - paragraph [ref=e2400]:
      - text: "Furthermore, the requested sacrifice is not a simple case of the sacrifice for a cause, but far more radical: the subject must “disappear,” die, yet his sacrifice will not become a myth, it will not be remembered, he will not be inscribed into the register of historical memory as a hero. He must disappear “totally”—although, in Brecht’s text, “totally” refers to the destruction of the young comrade’s body in the lime, it is not difficult to discern in the background what Jacques Lacan baptized"
      - emphasis [ref=e2401]: l’entre-deuxmorts
      - text: ",” the difference between the two deaths, real and symbolic: “he must disappear,”"
      - emphasis [ref=e2402]: and totally
      - text: ", i.e., it is not enough for him to be put to death, the very trace of his existence in the symbolic order must be obliterated, he must become a “nonperson.” This second “Yes,” the Yes to one’s own disappearance, the acceptance of one’s “second death,” designates the eruption of what Freud called"
      - emphasis [ref=e2403]: Todestrieb
      - text: ", death drive;"
      - superscript [ref=e2405]:
        - link "44" [ref=e2406]:
          - /url: "#fn-ch5-44"
      - text: it ultimately equals
      - emphasis [ref=e2407]: die Versagung
      - text: .
    - paragraph [ref=e2408]:
      - text: It is precisely today, when the communist cause has failed, that one has to return to Brecht in order to delineate the gesture of
      - emphasis [ref=e2409]: Versagung
      - text: ", of renunciation, in its formal purity, as a subject position implied by his learning plays. In Kierkegaardian terms: the first Yes remains at the level of ethical mission, it designates the act of assuming an ethical mandate, whereas the second Yes points toward the “religious suspension of the ethical,” of the latter’s universal dimension."
      - superscript [ref=e2411]:
        - link "45" [ref=e2412]:
          - /url: "#fn-ch5-45"
      - text: "The “Yes” to the ethical, brought to its extreme, sooner or later compels us to assume another, more radical Yes, a Yes which cuts the ground from under our feet, the Yes to the religious suspension of the ethical; the “Yes” to truth compels us to lie in the service of truth; the Yes to fight compels us to escape—in short, the Yes to a rule brings us to its founding exception, or, as Brecht himself puts it:"
    - paragraph [ref=e2413]: "Who fights for communism must be able to fight and not to fight; to speak the truth and not to speak the truth; to perform services and not to perform services, to keep promises and not to keep promises; to go into danger and to keep out of danger; to be recognizable and not to be recognizable. Who fights for communism has only one of all the virtues: that he fights for communism. (82)"
    - paragraph [ref=e2414]:
      - text: The subject “is” only insofar as there is this “ply” of the universal which emerges not
      - emphasis [ref=e2415]: against
    - paragraph [ref=e2416]:
      - text: the ethical obligation but as its ultimate
      - emphasis [ref=e2417]: fulfillment
      - text: . In other words, what Brecht is aiming at is not the standard opportunist attitude which compels us to follow our interests, to tell the truth when it does not hurt, to tell a lie when the lie profits us, etc., but an inherent self-negation of ethics, i.e., an
      - emphasis [ref=e2418]: ethical
      - text: injunction which suspends ethical universality. It is precisely because of this “suspension of the ethical,” because of this split between honor and ethics (an ethical injunction to behave dishonorably), that
      - emphasis [ref=e2419]: Versagung
      - text: is an eminently
      - emphasis [ref=e2420]: modern
      - text: "phenomenon. Consequently, when Brecht asserts that, in saying Yes to the Revolution, one must “blot out one’s face,” achieve the state in which “you are yourself no longer” (82), what we have here is not the usual ethics of self-obliteration for the sake of the cause: one must, so to speak, effectuate another turn of the screw and"
      - emphasis [ref=e2421]: obliterate the obliteration itself
      - text: ", i.e., renounce the obliteration"
      - emphasis [ref=e2422]: qua
      - text: "pathetic gesture of self-sacrifice—this supplementary renunciation is what Lacan called “destitution subjective.” The young comrade runs to his ruin by capitulating to the logic of the pathetic sacrifice: he tears up the mask put on upon making a vow to the Revolution and begins to speak as “what he truly is,” as a human being full of compassion:"
    - paragraph [ref=e2423]: "“YOUNG COMRADE: I have seen too much."
    - paragraph [ref=e2424]: I shall therefore go before them As what I am And state What is. …
    - paragraph [ref=e2425]: "FOUR AGITATORS: And we saw him in the twilight saw"
    - paragraph [ref=e2426]: His naked face, human, open, guileless. He had torn up his mask. (102)
    - paragraph [ref=e2427]:
      - text: The fundamental lesson of it is that
      - emphasis [ref=e2428]: there is more truth in the mask than in the face beneath it
      - text: ": the young comrade is lost (politically and ethically) the moment he takes off the mask. Is not this very prevalence of the mask the lesson that we, Europeans, can get from Japan? In this sense, Japanese civilization, the civilization of the mask, of “keeping one’s face,” functions as the very contrast of, say, the American ethics of the 1970s—the latter is quick to denounce this obsession with “keeping one’s face” as a “repressive” attitude that prevents us from giving free expression to our “true self,” i.e., it compels us to bear every abasement only to attain the “true self’s authentic expression.”"
      - superscript [ref=e2430]:
        - link "46" [ref=e2431]:
          - /url: "#fn-ch5-46"
      - text: "Foucault was adamantly opposed to this ethics of true self-expression: he strictly delimited his ethics of the subject’s self-construction from what he called the “Californian ethics” still subordinated to the truth regime—some expert or initiatic knowledge tells us “what we truly are” and thus impels us to realize our “true self.”"
      - superscript [ref=e2433]:
        - link "47" [ref=e2434]:
          - /url: "#fn-ch5-47"
    - paragraph [ref=e2435]:
      - text: "Which subject position, attitude, is therefore implied by this second Yes, by this acceptance of one’s disappearance? An identification with what psychoanalysis calls the “anal object,” a remainder, an amorphous leftover of some harmonious Whole—Lacan quotes Luther’s sermons: “You are the excrement which fell on the earth through the Devil’s anus.”"
      - superscript [ref=e2437]:
        - link "48" [ref=e2438]:
          - /url: "#fn-ch5-48"
      - text: In
      - emphasis [ref=e2439]: The
      - emphasis [ref=e2440]: Measure Taken
      - text: ", this identification with excrement is carried to the extreme in the precise sense of identification with the paradoxical position of the legendary member of a cannibal tribe who ate the last cannibal so that there would be no cannibalism:"
    - paragraph [ref=e2441]: Who are you? Stinking, be gone from The room that has been cleaned! Would that
    - paragraph [ref=e2442]: You were the last of the filth which You had to remove! (97)
    - paragraph [ref=e2443]:
      - text: "This excrement—this “impossible” object, this exception by means of which universality is simultaneously established and suspended—is the objectal equivalent of the Lacanian subject: what we have here is the subjective position of a “vanishing mediator,” of somebody who in advance takes into account that the process he initiated will ultimately sweep him away. And it is precisely this notion of the subject"
      - emphasis [ref=e2444]: qua
      - text: constitutive suspension of universality which enables us to approach in a new way the relationship between Foucault and Lacan.
    - paragraph [ref=e2445]:
      - text: Contemporary
      - emphasis [ref=e2446]: doxa
      - text: "conceives them as the two exemplary representatives of anti-Enlightenment “postmodernism” (Foucault: the mechanisms of discipline and control, Panopticon, etc., as the hidden reverse or the actual content of the Enlightenment’s universal Reason; Lacan: the"
      - emphasis [ref=e2447]: “décentrement
      - text: ” of the Cartesian subject). Yet both of them inscribed their theoretical activity within the confines of the Enlightenment project (Foucault in his last years; Lacan constantly—suffice it to mention the cover text of Ecrits which locates Lacan’s endeavor in the continuation of le
      - emphasis [ref=e2448]: débat des lumières
      - text: ). In both cases, the crucial reference is Kant’s transcendental turn as the apogee of the Enlightenment (Foucault elaborates it in his essay “What is Enlightenment?”; Lacan in his écrit “Kant avec Sade” in which Kant is explicitly conceived as the starting point of the process in the “history of ideas” which led to the emergence of psychoanalysis).
      - superscript [ref=e2450]:
        - link "49" [ref=e2451]:
          - /url: "#fn-ch5-49"
      - text: "In both cases, this reference to Kant hinges upon the notion of the subject; yet the elaboration of this notion brings about two completely different, mutually exclusive results: with Foucault, we get a subject who shapes himself without guarantee in a heteronomous, superior universal Reason—implying an ethics of “proper measure,” of self-masterhood, of the self"
      - emphasis [ref=e2452]: qua
      - text: harmonization of the antagonistic forces; with Lacan, we get $, a split/barred subject, subjected to an impossible imperative—implying an ethics of the incommensurate, of a constitutive imbalance, in short, of the real-impossible. Foucault quotes as one of the historical prototypes of his ethics of the “care for the self” the Renaissance ideal of the personality
      - emphasis [ref=e2453]: qua
      - text: work of art; in this sense, one is tempted to conceive the opposition of Foucault and Lacan as the repetition of another opposition, that between Renaissance humanism and Protestantism, or, to fill in the names, between Erasmus of Rotterdam and Martin Luther. For that very reason, Lacan in his
      - emphasis [ref=e2454]: Ethics of Psychoanalysis
      - text: refers to Luther who (as we have already seen) counters Erasmus’s humanism with the identification of man to God’s excrement—what we have here is the opposition between a harmonious work of art and the queer remainder which sticks out.
    - paragraph [ref=e2455]:
      - text: Our aim here, of course, is not to judge “who is right,” i.e., simply to opt for one of the two possible readings of Kant, but rather to delineate
      - emphasis [ref=e2456]: the feature, the characteristic, by way of
      - emphasis [ref=e2457]: which Kant’s philosophy, viz. the Kantian ethical-philosophical attitude, opens up the field of
      - emphasis [ref=e2458]: both possibilities
      - text: .
      - superscript [ref=e2460]:
        - link "50" [ref=e2461]:
          - /url: "#fn-ch5-50"
      - text: "This feature, of course, is the suspension of the universal: what Foucault and Lacan see in Kant is not an affirmation of the universal tribunal of Reason but, quite to the contrary, the affirmation of a certain fissure in the midst of this universality—in both cases, “subject” is a name for such a fissure. They both repudiate what Foucault succinctly baptized “the Enlightenment’s blackmail” (if you refuse universal Reason and progress, you necessarily succumb to irrationalist obscurantism, etc.) by means of drawing a line of distinction between the “official” image of the Enlightenment—the ideology of universal Reason and the progress of humanity, etc.—and its reverse."
    - paragraph [ref=e2462]: "In the case of Foucault, this reverse of the Enlightenment to be asserted is the “ontology of the present”: once support in the universal order of things is lost, once we are no longer able to rely on a preordained place in the all-embracing “chain of being,” the subject is “left to his"
    - paragraph [ref=e2463]: own self”—he has to concoct autonomously the universality he is to follow. The fatal enchainment of power and knowledge is thereby broken, i.e., the matrix, in force from the Christian practice of confession to psychoanalysis, which compels the subject to attain the truth in himself and of himself—ultimately the truth about sex—by way of its verbalization, of its translation into the language of an expert invested with power (theologian, psychoanalyst) who locates our proper place in the universal frame of knowledge and thereby tells us “what we really are.” The very idea of such a truth is a kind of performative fiction at the service of power, i.e., legitimizing its exercise; the subject dwells in a void, he has so to speak to compose himself performatively, not just to arrive at his truth, not just to ascertain what he always already was. In this sense, one could say that Foucault’s implicit model is Kant’s critique of judgment, in which the subject confronts an object to which he cannot apply some preestablished rule or concept, but has himself to invent, to lay down, the universal rule under which this object falls—Foucault would probably endorse those new interpretations of Kant’s philosophy which emphasize the paradigmatic status of the third critique as the key offering a model to conceive adequately the first two.
    - paragraph [ref=e2464]:
      - text: "We can see, now, how Foucault is thoroughly justified in comparing his “esthetics of existence” to the Kantian turn: in his"
      - emphasis [ref=e2465]: Critique of Judgment
      - text: ", Kant diagnoses esthetic judgments as a case of “universality without concept”—although without the guarantee in a previously established concept, they contain a claim to universal validity (when we say that something is beautiful, we do not know why it is beautiful, and yet we implicitly claim that"
      - emphasis [ref=e2466]: everybody
      - text: "should find it beautiful). This is, then, the Foucauldian subject: a capacity of “self-relating,” of shaping out of one’s life an esthetic object, a “work of art,” of instigating out of oneself the universal rule one is to follow—the aim is no longer to recognize one’s place in the preordained structure of the cosmos, since every positing of a norm has its ground in the subject’s self-constitution, it manifests a specific way the subject relates to himself. In other words, every ontology is ultimately an “ontology of the present”: as universal and supratemporal as it may appear, it hinges upon the subject’s incessant (re)construction of his own present, of the present historical moment. For that reason, the Olympian elevation and inner peace irradiated by the style of Foucault’s last two books on antique ethical attitudes"
      - superscript [ref=e2468]:
        - link "51" [ref=e2469]:
          - /url: "#fn-ch5-51"
      - text: "should not lead us astray: their ultimate aim is to instigate us, via their exemplary value, to"
      - emphasis [ref=e2470]: repeat
      - text: "today the antique gesture and thereby deliver ourselves of the Christian frame. There certainly is a deep link connecting Foucault’s notion that Greek ethics strives toward a “universality without law” and Kant’s notion of the esthetic judgment as a “universality without concept.” In the case of Lacan, in contrast, this reverse of the Enlightenment is best epitomized by the title of one of his écrits: “Kant avec Sade”—as he says in the last page of"
      - emphasis [ref=e2471]: The
      - emphasis [ref=e2472]: Four Fundamental Concepts
      - text: ", the truth of the Kantian moral law is"
    - paragraph [ref=e2473]:
      - text: desire in its pure state, that very desire that culminates in the sacrifice, strictly speaking, of everything that is the object of love in one’s human tenderness—I would say, not only in the rejection of the pathological object, but also in its sacrifice and murder. That is why I wrote
      - emphasis [ref=e2474]: Kant avec Sade
      - text: .
      - superscript [ref=e2476]:
        - link "52" [ref=e2477]:
          - /url: "#fn-ch5-52"
    - paragraph [ref=e2478]:
      - text: "Therein consists, according to Lacan, Kant’s ultimate lesson: the subject “is” only insofar as the Thing (the Kantian Thing in itself as well as the Freudian impossible-incestuous object,"
      - emphasis [ref=e2479]: das Ding
      - text: ) is sacrificed, “primordially repressed”—we are again at the motif of
      - emphasis [ref=e2480]: Versagung
      - text: ". This “primordial repression” introduces a fundamental imbalance in the universe: the symbolically structured universe we live in is organized around a void, an impossibility (the inaccessibility of the Thing in itself). The Lacanian notion of the split subject is to be conceived against this"
    - paragraph [ref=e2481]:
      - text: "background: the subject can never fully “become himself,” he can never fully realize himself, he only ex-sists as the void of a distance from the Thing. The split thus divides the subject in his positive (i.e., “pathological,” empirical-contingent) features from the subject"
      - emphasis [ref=e2482]: qua
      - text: 0, the mark of the absent, “sacrificed” Thing. The Kantian overtones of this splitting are easy to recognize, since what we have here is the split between the subject
      - emphasis [ref=e2483]: qua
      - text: the empty, substanceless “I think” of the transcendental apperception, and the subject
      - emphasis [ref=e2484]: qua
      - text: fullness of “person,” the pile of positive features of a phenomenal entity.
    - paragraph [ref=e2485]:
      - text: This way, the splitting of the Kantian ethical subject also appears in a new light. That is to say, in the standard version of Kant’s philosophy, the ethical subject is torn between the universal moral law and particular “pathological” impulses; he appears condemned to a continuous inner struggle between complying with the law and succumbing to “pathological” temptations, dedicated to the unending task of obliterating the pathological. However, the moment we take into account the crucial fact that the “sacrifice of the Thing” restricts us to the form of law, to the law
      - emphasis [ref=e2486]: qua
      - text: "empty form (for Kant, the place of the supreme good is by definition empty), this standard version loses ground: the subject is split, yet the place of the split shifts, the split traverses the within of Law and of the domain of pleasures, imposing on each of them the loop-like structure of a Moebius band. Concerning the law: Enlightenment relies on the subject’s maturity and autonomy, it demands that the subject renounce his unqualified obedience to heteronomous laws; yet at this very moment the subject encounters in his midst an incomparably more rigorous command which unconditionally claims its part, paying no regard to his actual abilities (“You can because you must!”). At the very moment of achieving autonomy, of suspending the hold of heteronomous, externally imposed laws, the subject is thus forced to confront a far more severe Master whose injunction decenters him from within."
      - superscript [ref=e2488]:
        - link "53" [ref=e2489]:
          - /url: "#fn-ch5-53"
      - text: "A homologous inversion takes place in the domain of pleasures: the very renunciation to pleasures brings about a paradoxical surplus enjoyment, an “enjoyment in pain,” in displeasure, baptized by Lacan"
      - emphasis [ref=e2490]: jouissance
      - text: ", the “impossible”/traumatic/painful enjoyment beyond the pleasure principle. If we read these two theoretical gestures together, the conclusion which imposes itself, of course, is that Law, in its most radical dimension, is the “superego,” i.e., an injunction to enjoyment with which it is impossible to comply. Foucault’s implicit reproach to Lacan concerns the latter’s allegedly negative conception of Law as the force of prohibition"
      - superscript [ref=e2492]:
        - link "54" [ref=e2493]:
          - /url: "#fn-ch5-54"
      - text: —yet Lacan’s concept of the superego designates precisely law in its positive, productive dimension.
      - superscript [ref=e2495]:
        - link "55" [ref=e2496]:
          - /url: "#fn-ch5-55"
      - text: "The split, therefore, does not take place between moral law and pathological desires, but between enjoyment and pleasure: on the one hand, there is the mad-obscene law which is"
      - emphasis [ref=e2497]: incommensurate
      - text: with our well-being insofar as it derails the psychic equilibrium by way of ordering enjoyment; on the other hand, there is the tension between the pleasure principle and its externally imposed limitations, i.e., the dialectic of the pleasure and reality principles, the art of the “proper measure” of containing pleasure which assures its long-term preservation.
    - paragraph [ref=e2498]:
      - text: "It may seem paradoxical to evoke a “crack in the universality” apropos of Kant: was Kant not obsessed by the Universal, was not his fundamental aim to establish the universal form (constitutive) of knowledge, does his ethics not propose the universal form of the rule which regulates our activity as the sole criterion of morality, etc.? Yet as soon as the Thing in itself is posited as unattainable,"
      - emphasis [ref=e2499]: every universality is potentially suspended
      - text: ", it implies a point of exception at which its validity, its hold, is canceled, or, to put it in the language of contemporary physics, a point of singularity—this “singularity” is ultimately"
      - emphasis [ref=e2500]: the Kantian
      - emphasis [ref=e2501]: subject himself
      - text: ", namely the empty subject of the transcendental apperception. The crack in the universality finds its clearest expression in the hypothesis of “radical evil,” i.e., in the paradoxical possiblity, envisaged by Kant (later taken over and further elaborated by"
    - paragraph [ref=e2502]:
      - text: Schelling), of evilness
      - emphasis [ref=e2503]: qua
      - text: ethical attitude, of our being evil on account of the principle, not because we succumbed to “pathological” impulses.
      - superscript [ref=e2505]:
        - link "56" [ref=e2506]:
          - /url: "#fn-ch5-56"
      - text: In his
      - emphasis [ref=e2507]: Political Unconscious
      - text: ", Fredric Jameson quotes Brecht’s famous lines on the mask of the Japanese demon, its swollen veins and hideous grimace"
    - paragraph [ref=e2508]:
      - text: all betokening What an exhausting effort it takes To be evil.
      - superscript [ref=e2510]:
        - link "57" [ref=e2511]:
          - /url: "#fn-ch5-57"
    - paragraph [ref=e2512]:
      - text: "It is here, apropos of a Japanese mask, that Brecht and Kant unexpectedly meet: in this notion of evil as a pure spiritual attitude, far more “suprasensible” than good. Therein consists, ultimately, the secret of the Kantian sublime: if beauty is a symbol of morality (of the good), the sublime announces evilness"
      - emphasis [ref=e2513]: qua
      - text: "ethical stance—this is the power discernible in what Kant calls the “dynamical sublime,” the power that an image of terrifying unruly nature evokes by way of its very failure to represent it adequately: an ethical (principled, implacable), yet radically evil rage. It is easy to follow one’s natural impulses of compassion and be good, help a neighbor in distress, etc.; how much more difficult it is to be truly evil! And is Foucault’s image of antiquity ultimately not the mythical notion of an age in which we had a subject not yet caught in these annoying paradoxes of surplus enjoyment, a subject still capable of finding peace and harmony in the esthetic formation of his self?"
      - superscript [ref=e2515]:
        - link "58" [ref=e2516]:
          - /url: "#fn-ch5-58"
      - text: That is to say, is not the fundamental paradox of the Christian logic of confession which Foucault wanted to get rid of that it extracts enjoyment out of the very renunciation/denunciation of the “pleasures of the flesh,” is not this surplus enjoyment what drives a Christian believer into ever new renunciations?
    - paragraph [ref=e2517]:
      - text: "Perhaps, these two notions of the subject, the Foucauldian and the Lacanian, are not after all so exclusive as it may appear: the construction of the self without a guarantee in the universality of Reason is possible only against the background of"
      - emphasis [ref=e2518]: Versagung
      - text: . If there was ever a theoretician sensitive to the latent
      - emphasis [ref=e2519]: ascetic
      - text: "dimension of the “esthetics of existence,” it was Foucault: the Foucauldian “culture of the self” is ultimately nothing but a constant endeavor to"
      - emphasis [ref=e2520]: set measures
      - text: "to the monstrous excess called “the Kantian subject,” to introduce a semblance of harmonious design into it, i.e., to master, to contain, to reduce to a bearable level its incommensurability. The problem, of course, is that this endeavor is ultimately doomed to fail since the imbalance is constitutive: the Foucauldian subject is synonymous with the successful subjectivization, with the formation of the self"
      - emphasis [ref=e2521]: qua
      - text: an esthetic whole; the Lacanian subject is synonymous with its failure, i.e., it is correlative to the anal object, to the excrement which is the leftover of every subjectivization.
    - heading "“Tarrying with the negative”" [level=4] [ref=e2522]
    - paragraph [ref=e2523]:
      - text: "A crucial misunderstanding must be avoided here: thus conceived,"
      - emphasis [ref=e2524]: Versagung
      - text: is not something that arises in a second time, after a long period of our total imprisonment within the texture of symbolic destiny—it is, on the contrary, “originary,” i.e., what we call “new-age subjectivity” actualized, brought to the light of the day, something that was contained in
      - emphasis [ref=e2525]: potentia
      - text: "in the most elementary relationship of the subject to the signifier. What we have here is an exemplary case of the difference between dialectical historicity proper and “historicism”: in historicism, the paradox of historicity (the thing in question becomes—reveals itself, proves itself to be—what"
      - emphasis [ref=e2526]: it always already was
      - text: ) is somehow “flattened,” reduced to a linear
    - paragraph [ref=e2527]:
      - text: succession of “epochs” (first the all-powerful fate whose puppets we are; then the subject capable of disengaging himself from it, of assuming distance from it, and so on). To elucidate this crucial distinction, let us recall two examples. According to the famous proposition from Marx’s
      - emphasis [ref=e2528]: Communist Manifesto
      - text: ", all hitherto history is a history of class struggles; yet—in an apparently contradictory move—Marx never ceases to insist that the bourgeoisie is the first “class” stricto"
      - emphasis [ref=e2529]: sensu
      - text: ": the antagonism between bourgeoisie and proletariat is the first class antagonism which “appears as such,” not camouflaged by the rich texture of casts, guilds, etc. —thus, it enables us to decipher the preceding social antagonisms as concealed forms of class struggle. It is similar with Claude Lefort’s famous definition of democracy as a system in which the locus of power is “empty,” i.e., a system founded on an unsurpassable gap separating the symbolic locus of power from real political agents who, temporarily, occupy it (“exert power”): Lefort’s point is not that it was only with democracy that the locus of power was evacuated—"
      - emphasis [ref=e2530]: it always already was empty
      - text: ", anyone who purported to be its possessor always already was an impostor, yet this void became actual and visible only by the advent of democracy. This is, ultimately, what the Hegelian couple"
      - emphasis [ref=e2531]: in itself
      - text: —
      - emphasis [ref=e2532]: for itself
      - text: is about, i.e., it is in this sense that the dialectical process forms a “closed circle” where a thing “becomes what it already was.”
    - paragraph [ref=e2533]:
      - text: "Consequently, our position here is radically “Eurocentric”: the break of the Enlightenment is irreversible, the epoch of the Enlightenment is “an epoch to end all epochs,” i.e., by means of the"
      - emphasis [ref=e2534]: Versagung
      - text: which constitutes the subject of the Enlightenment, an abyss becomes visible against the background of which all other epochs can be experienced in their epochal closure, as something ultimately contingent.
      - superscript [ref=e2536]:
        - link "59" [ref=e2537]:
          - /url: "#fn-ch5-59"
      - text: "The point is simply that the Enlightenment, like a cancerous tissue, contaminates all preceding organic unity and changes it retroactively into an affected pose. In Hegelese: as soon as we enter the Enlightenment, every presupposition (of an organic ground) is suspected of being “posited.” Suffice it to recall the returns to oriental wisdom, the rejections of the so-called “Western Protestant-Cartesian imperialist paradigm,” which abound today. Apropos of them, one usually emphasizes the need to distinguish authentic cases of such “returns” from their commercialized distortions (newspaper ads for “transcendental meditation,” e.g.). Yet perhaps such an opposition is all too naive; perhaps what appears as a commercialized distortion of the authentic oriental wisdom is today its truth; perhaps the very “return to the lost oriental wisdom” is already in service of the late-capitalist social machine, facilitating the untroubled run of its nuts and bolts—perhaps we betrayed “oriental wisdom” the moment we uprooted it from its pretechnological life world and transfunctionalized it into an individual therapeutic means. In other words, here, also, the dialectical maxim “the cleaner you are, the dirtier you are” is in force: the more “truly” you return to oriental wisdom, the more your effort contributes to the transformation of oriental wisdom into a cog in the Western social machine … The reverse of it is that those who preach “multicultural decenterment,” “openness toward non-European cultures,” etc., thereby unknowingly affirm their “Eurocentrism,” since what they demand is imaginable only within the “European” horizon: the very idea of cultural pluralism relies on the Cartesian experience of the empty, substanceless subjectivity—it is only against the background of this experience that every determinate form of substantial unity can appear as something ultimately contingent."
    - paragraph [ref=e2538]: "All this has radical consequences for the problem which undoubtedly is the problem of our time: the ecological crisis. The most “natural” reaction to it—something akin to a “spontaneous philosophy of ecologists”—consists in the above-mentioned ideological gesture usually referred to as the “shift from the Protestant-Cartesian (mechanistic, anthropocentric) to a new post-Cartesian (holistic, organic) paradigm.” According to it, the contemporary ecological"
    - paragraph [ref=e2539]:
      - text: crisis has its roots in modern-age subjectivism with its manipulative relationship to nature
      - emphasis [ref=e2540]: qua
      - text: object of technological domination—so, to get out of the crisis, one has to commit oneself to a new attitude of assent, of complying with things instead of exerting control over them, to an attitude which conceives nature as a living organism (the earth as Gaia, a living body, etc.) and man as its subordinated part … What we have here is a desperate endeavor to return to the pre-Enlightenment, to a world in which the split between facts and meaning has not yet taken place, to a world where a deep sense inheres to nature itself, to a world animated by an invisible soul, to a world of a preestablished harmony between man, society, and cosmos, guaranteed by a set of metaphorical equivalences (society as a corporate body, e.g.)—an endeavor problematic not because of its utopian nature but due to the fact that, once the bacillus of Enlightenment has infected us, its very success corroborates subjectivism.
      - superscript [ref=e2542]:
        - link "60" [ref=e2543]:
          - /url: "#fn-ch5-60"
      - text: That is to say, the more we emphasize the break with anthropocentrism, man’s subordination to the totality of nature, etc.,
      - emphasis [ref=e2544]: the more this totality of nature is perceived, in an implicit way, from the
      - emphasis [ref=e2545]: standpoint of the human interest
      - text: ": there is no purely “natural” equilibrium, clean rivers and air, etc., are desirable only if, underhand, we observe nature"
      - emphasis [ref=e2546]: sub specie
      - text: man’s survival. In other words, such an ecologically oriented “decenterment” already relies on a surreptitious
      - emphasis [ref=e2547]: teleological
      - text: subordination of nature to man; if, consequently, we are to accept Heidegger’s warning about “modern-age subjectivity” as the site of the ultimate “danger,” we must add that this danger consists precisely in our unwillingness to confront the abyss of the subject, i.e., in our unquestioned acceptance of some self-posited ground authorizing us to exert power, be it nation or Earth as an organism. For that reason, the celebrated “postmodern” return to transsubjective roots (from discovering one’s ethnic origins to identifying with the “space-ship Earth”) remains thoroughly within the confines of the “modern age subjectivity”— the very remedy against ecological catastrophe regenerates its alleged cause.
    - paragraph [ref=e2548]:
      - text: The crucial point is to conceive the relationship between subject and subjectivization as an
      - emphasis [ref=e2549]: antagonistic
      - text: "one. By means of “subjectivization,” the subject (presup)poses the existence of a symbolic network which enables him to experience the universe as a meaningful totality, as well as to locate his place in it, i.e., to identify himself with a place in the symbolic space: say, in the predominant ecological ideology, the gesture by means of which the subject assumes the “new holistic paradigm” and is interpellated as the one who should not disturb the natural balance … In other words, subjectivization designates what, in “deconstructionism,” one calls assuming a determinate subject position, recognizing oneself as a socially defined “somebody”; in this way, the chaos of the encounter of the real is transformed into a meaningful narrative. The counterpoint to this process of subjectivization, the encounter of the real in its senselessness, however, is not a “process without the subject,” but"
      - emphasis [ref=e2550]: the subject itself
      - text: ": what the subjectivization renders invisible is"
      - emphasis [ref=e2551]: die Versagung
      - text: ", its void—subjectivization is a way to elude the void which “is” the subject, it is ultimately a defense mechanism against the subject."
      - superscript [ref=e2553]:
        - link "61" [ref=e2554]:
          - /url: "#fn-ch5-61"
    - paragraph [ref=e2555]:
      - text: Paradoxically, therefore, the only true step out of “modern-age subjectivism” is to acknowledge fully die
      - emphasis [ref=e2556]: Versagung
      - text: constitutive of Cartesian subjectivity.
    - heading "6 WHY IS REALITY ALWAYS MULTIPLE?" [level=2] [ref=e2557]
    - heading "6.1 is There a Proper Way to Remake a Hitchcock Film?" [level=3] [ref=e2558]
    - paragraph [ref=e2559]:
      - text: In any large American bookstore, it is possible to purchase some volumes of the unique series
      - emphasis [ref=e2560]: Shakespeare Made Easy
      - text: ","
      - superscript [ref=e2562]:
        - link "1" [ref=e2563]:
          - /url: "#fn-ch6-1"
      - text: "a “bilingual” edition of Shakespeare’s plays, with the original archaic English on the left page and the translation into common contemporary English on the right page. The obscene satisfaction provided by reading these volumes resides in how what purports to be a mere translation into contemporary English turns out to be much more: as a rule, Durband tries to formulate directly, in everyday locution, what he considers to be the thought expressed in Shakespeare’s metaphoric idiom; “To be or not to be, that is the question” becomes something like, “What’s bothering me now is: Shall I kill myself or not?” And my idea is, of course, that the standard remakes of Alfred Hitchcock’s films are precisely something like “Hitchcock Made Easy”: although the narrative is the same, the “substance,” the flair that accounts for Hitchcock’s uniqueness, evaporates. Here, however, one should avoid the jargon-laden talk on Hitchcock’s unique touch, and approach the difficult task of specifying what gives Hitchcock’s films their unique flair."
    - paragraph [ref=e2564]: "Or, what if this uniqueness is a myth, the result of our (spectators) transference, elevation of Hitchcock into the Subject Supposed to Know? What I have in mind is the attitude of overinterpretation: everything in a Hitchcock film has to have a meaning—there are no contingencies—so that when something doesn’t fit, it’s not his fault, but ours—we didn’t really get it. While watching Psycho for the twentieth time, I noticed a strange detail during the final psychiatrist’s explanation: Lilah (Vera Miles) listens to him, rapt, and nods two times with a deep satisfaction, instead of being shaken by the final confirmation of her sister’s meaningless death. Was this a pure contingency, or did Hitchcock want to suggest a strange libidinal ambiguity and rivalry between the two sisters? Or the scene of Marion driving in the night on her escape from Phoenix: just before reaching the Bates motel, when she listens to the imagined voices of her boss and the millionaire who bought the house, furious at her deception, her expression is no longer anguished; what we perceive is a strange manic smile of a deeply perverse satisfaction, an expression that uncannily resembles the very last shot of Norman-mother, just before it dissolves into the skull and then the car appearing out of the swamp. So, in a way, even before actually meeting him, Marion already becomes Norman: a further feature that confirms this point is that her expression emerges when she is listening to the voices in her head, exactly like Norman in his final appearance. Or—the supreme example —the scene in which Marion checks in at the Bates Motel: while Norman has his back turned to her, inspecting the row of keys to the rooms, she furtively looks around to get an idea which city to put down as her residence, sees the words “Los Angeles” as part of a newspaper headline and writes them down. Here two hesitations coincide: while Marion hesitates as to which town to write (which lie to tell), Norman hesitates as to which unit to put her in (if it’s number 1, this means that he will be able to observe her secretly through a peephole). When, after some hesitation, she tells him “Los Angeles,” Norman picks up and gives her the key of"
    - paragraph [ref=e2565]:
      - text: the number 1 unit. Is his hesitation a simple sign that he was considering her sexual attraction and then finally opted to pursue her, or is it that, at a more refined level, he detected in her hesitation that she is about to tell him a lie, and then countered her lie with an illegal act of his own, finding in her small crime the justification for his own? (Or is it rather that, upon hearing that she is from Los Angeles, he thinks that the girl from such a decadent town can be an easy pick?) Although Joseph Stefano, who wrote the scenario, claims
      - superscript [ref=e2567]:
        - link "2" [ref=e2568]:
          - /url: "#fn-ch6-2"
      - text: the creators had in mind only the growing sexual attraction that Norman felt for Marion, there remains the shadow of a doubt that the coincidence of two hesitations cannot be purely contingent … This is called “true love” in theory. So, out of this true love, I claim that there is a unique Hitchcockian dimension.
    - heading "The Hitchcockian sinthom" [level=4] [ref=e2569]
    - paragraph [ref=e2570]:
      - text: My first thesis is that this unique dimension is not to be sought primarily at the level of the narrative content; its original locus is elsewhere, but where? Let me begin by contrasting two scenes from two non-Hitchcockian films. There is one memorable scene in the otherwise dull and pretentious Robert Redford’s
      - emphasis [ref=e2571]: A River Runs through It
      - text: ". Of the two preacher’s sons, we are all the time aware that the younger one (Brad Pitt) is on a path to self-destruction, approaching catastrophe because of his compulsive gambling, drinking, and womanizing. The thing that keeps the two sons together with their father is fly fishing in the wild Montana rivers—these Sunday fishing expeditions are a kind of sacred family ritual, a time when the threats of the life outside family are temporarily suspended. So when they go fishing for the last time, Pitt achieves perfection: he adroitly catches the biggest fish ever; however, the way he proceeds is presented with a shadow of constant threat: will the dark river bend where he spots the great trout swallow him, will he reappear after he slips into the fast water? It is as if this potential threat announces the final tragedy that occurs shortly afterward (Pitt is found dead, with his fingers broken, a result of his gambling debts)."
    - paragraph [ref=e2572]:
      - text: What renders this scene from
      - emphasis [ref=e2573]: A River Runs through It
      - text: rather ordinary is that the underlying threatening dimension is directly reinscribed into the main narrative line, as an index pointing toward the final catastrophe. In contrast to it, Peter Yates’ outstanding
      - emphasis [ref=e2574]: Breaking Away
      - text: "(1979), a gentle comedy/drama about the coming of age of four high school kids in Bloomington, Indiana, in the final summer before they face the inexorable choices of jobs or college or the Army, resisted this temptation. In one of the memorable small sequences, Dave, one of the kids, on a racing bicycle engages in a high-speed highway duel with a semitrailer truck. The uneasy effect is here the same as in a couple of scenes involving swimming in an abandoned quarry, in which kids jump into deep dark water with bits of sharp stones hidden beneath the surface: Yates suggests the constant possibility of sudden catastrophe. We wait for the terrible accident to happen, for Dave to be hit and crushed by the truck, for one of the kids to drown in the dark water or to hit some sharp stone when jumping into it. None does, but the hints of one (its threatening shadow evoked just by the general atmosphere of the way the scene is shot, not by any direct psychological references, like the uneasiness felt by the kids) make the characters seem strangely vulnerable. It is as if these hints lay the ground for the very end of the film, when we learn, from the legend on the screen, that, afterwards, one of these kids died in Vietnam, another had a different accident. This tension between the two levels is what I want to focus on: the gap that separates the explicit narrative line from the diffused threatening message delivered between the lines of the story."
    - paragraph [ref=e2575]: Let me introduce here a parallel with Richard Wagner (is not the ring from Wagner’s
    - paragraph [ref=e2576]:
