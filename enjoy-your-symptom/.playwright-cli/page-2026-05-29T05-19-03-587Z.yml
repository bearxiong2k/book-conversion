    - paragraph [ref=e271]:
      - text: Whatever the vicissitudes and deformations of Lacan in cultural studies, one should focus on what happens with children in their early age, following the wise Jesuit motto, “Give me a child till he is seven, and afterward you can do with him whatever you want.” So I am tempted to claim that there is hope for us Lacanians as long as American children are massively exposed to Shel Silverstein’s two classic books,
      - emphasis [ref=e272]: The Missing Piece
