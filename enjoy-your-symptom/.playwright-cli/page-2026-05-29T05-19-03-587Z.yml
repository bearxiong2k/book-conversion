    - heading "PREFACE TO THE ROUTLEDGE CLASSICS EDITION" [level=2] [ref=e218]
    - paragraph [ref=e219]: Enjoy Your Symptom—or Your Fetish?
    - paragraph [ref=e220]:
      - text: "1 There are two ways to understand the thesis that we live in a post-ideological world: either we take it in a naive post-political sense (finally liberated from the burden of great ideological narratives and causes, we can dedicate ourselves to solving pragmatically real problems), or, in a more critical way, as a sign of today’s predominant cynicism (today’s power no longer needs a consistent ideological edifice to legitimize its rule; it can afford to state directly the obvious truth—search for profits, brutal imposition of economic interests). According to the second reading, there is no longer a need for refined procedure of"
      - emphasis [ref=e221]: Ideologiekritik
      - text: ", for a “symptomal reading” that detects the faults in an ideological edifice: such a procedure knocks on an open door, since the thoroughly cynical power-discourse concedes all this in advance, like today’s analysant who calmly accepts the analyst’s suggestions about his innermost obscene desire, no longer being shocked by anything."
    - paragraph [ref=e222]:
      - text: Is this, however, effectively the case? If it is, then
      - emphasis [ref=e223]: Ideologiekritik
      - text: and psychoanalysis are today ultimately of no use, since the wager of their interpretive procedure is that the subject CANNOT openly admit and really assume the truth about what s/he is doing. However, psychoanalysis opens up a way to unmask this apparent proof of its uselessness, by way of detecting, beneath the deceiving openness of post-ideological cynicism, the contours of fetishism, and thus to oppose the
      - emphasis [ref=e224]: fetishist
      - text: mode of ideology, which predominates in our allegedly “post-ideological” era, to its traditional
      - emphasis [ref=e225]: symptomal
      - text: mode, in which the ideological lie which structures our perception of reality is threatened by symptoms,
      - emphasis [ref=e226]: qua
      - text: “returns of the repressed,” cracks in the fabric of the ideological lie. Fetish is effectively a kind of
      - emphasis [ref=e227]: envers
      - text: "of the symptom. That is to say, symptom is the exception which disturbs the surface of the false appearance, the point at which the repressed Other Scene erupts, while fetish is the embodiment of the Lie which enables us to sustain the unbearable truth. Let us take the case of the death of a beloved person: in the case of a symptom, I “repress” this death, I try not to think about it, but the repressed trauma returns in the symptom; in the case of a fetish, on the contrary, I “rationally” fully accept this death, and yet I cling to the fetish, to some feature that embodies for me the disavowal of this death. In this sense, a fetish can play a very constructive role of allowing us to cope with the harsh reality: fetishists are not dreamers lost in their private worlds, they are thoroughly “realists,” able to accept the way things effectively are—since they have their fetish to which they can cling in order to cancel the full impact of reality. There is a wonderful early short story by Patricia Highsmith, “Button,” about a middle-class New Yorker who lives with a mongoloid nine-year-old son who babbles meaningless sounds all the time and smiles, while saliva is running out of his open mouth; one late evening, unable to endure the situation, he decides to take a walk on the lone Manhattan streets where he stumbles upon a destitute homeless beggar who pleadingly extends his hand towards him; in an act of inexplicable fury, the hero beats the beggar to death and tears off"
    - paragraph [ref=e228]: from his jacket a button. Afterwards, he returns home a changed man, enduring his family nightmare without any traumas, capable of even a kind smile towards his mongoloid son; he keeps this button all the time in the pocket of his trousers—a perfect fetish, the embodied disavowal of his miserable reality, the constant remainder that, once at least, he did strike back against his miserable destiny.
    - paragraph [ref=e229]:
      - text: "In psychiatric circles, there is a story told about a man whose wife was diagnosed with acute breast cancer and died three months afterwards; the husband survived her death unscathed, being able to talk coolly about his traumatic last moments with her—how? Was he a cold distanced monster with no feelings? Soon, his friends noticed that, while talking about his deceased wife, he always held in his hands a hamster, her pet object: his fetish, the embodied disavowal of her death. No wonder that, when, a couple of months later, the hamster died, the guy broke down and had to be hospitalized for a long period, treated for acute depression. So, when we are bombarded by claims that in our post-ideological cynical era nobody believes in the proclaimed ideals, when we encounter a person who claims he is cured of any beliefs, accepting social reality the way it really is, one should always counter such claims with the question: OK, but"
      - emphasis [ref=e230]: where is your hamster—the fetish which enables you to
      - text: (
      - emphasis [ref=e231]: pretend to
      - text: )
      - emphasis [ref=e232]: accept reality “the way it is”?
    - paragraph [ref=e233]: "2"
    - paragraph [ref=e234]: The way I proceed to analyze this impregnation of our daily lives by ideology is through the reference to numerous examples—so a note about my (often criticized) use of examples is, perhaps, appropriate here.
    - paragraph [ref=e235]:
      - text: The difference between the idealist and the materialist use of examples is that, in the Platonic-idealist approach, examples are always imperfect, they never perfectly render what they are supposed to exemplify, so that we should take care not to take them too literally, while, for a materialist, there is always more in the example than in what it exemplifies, i.e., an example always threatens to undermine what it is supposed to exemplify since it gives body to what the exemplified notion itself represses, is unable to cope with. (Therein resides Hegel’s materialist procedure in his
      - emphasis [ref=e236]: Phenomenology
      - text: ": each “figure of consciousness” is first staged-exemplified and then undermined through its own example.) This is why the idealist approach always demands a multitude of examples—since no single example is fully fitting, one has to enumerate them to indicate the transcendent wealth of the Idea they exemplify, the Idea being the fixed point of reference of the floating examples. A materialist, on the contrary, tends to repeat one and the same example, to return to it obsessively: it is the particular example which remains the same in all symbolic universes, while the universal notion it is supposed to exemplify continually changes its shape, so that we get a multitude of universal notions circulating, like flies around the light, around a single example. Is this not what Lacan is doing, returning to the same exemplary cases (the guessing-game with five hats, the dream of Irma’s injection), each time providing a new interpretation? Such an example is the"
      - emphasis [ref=e237]: universal Singular
      - text: ": a singular entity which persists as the universal in the multitude of its interpretations."
    - paragraph [ref=e238]: "In a recent conversation, Hanif Kureishi was telling me about his new novel, whose narrative is different from what he wrote hitherto; I ironically asked him: “But the hero is nonetheless an immigrant with a Pakistani father who is a failed writer …” He replied: “What’s the problem? Do we not all have Pakistani fathers who are failed writers?” He was right—and this is what Hegel meant by singularity elevated into universality: the pathological twist that Hanif Kureishi experienced in his father is part of EVERY father, there is no normal"
    - paragraph [ref=e239]: father, everybody’s father is a figure who failed to live up to his mandate and thus left to his son the task to settle his symbolic debts. In this sense, again, Kureishi’s Pakistani failed writer is a universal singular, a singular standing in for the universality.
    - paragraph [ref=e240]: "This is what hegemony is about, this short-circuit between the universal and its paradigmatic case (in the precise Kuhnian sense of the term): it is not enough to say that Kureishi’s own case is one in the series of the cases exemplifying the universal fact that father is yet another “impossible profession”—one should make a step further and claim that, precisely, we all have Pakistani fathers who are failed writers. In other words, let us imagine being-a-father as a universal ideal which all empirical fathers endeavor to approach and ultimately fail to do: what this means is that the true universality is not that of the ideal being-a-father, but that of failure itself."
