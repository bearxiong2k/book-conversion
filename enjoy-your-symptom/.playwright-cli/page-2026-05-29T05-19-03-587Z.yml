    - heading "The “impossible” performative" [level=4] [ref=e1375]
    - paragraph [ref=e1376]:
      - text: As it is clear from the quoted passage from Lacan’s
      - emphasis [ref=e1377]: Four Fundamental Concepts
      - text: ", the paradox of this double suspension is ultimately the paradox of the signifier itself. A signifier is by definition a pure representative which “has nothing to do with its signified content, but has only to deliver it” (to conceive the meaning of the word “fish,” one has to obliterate all its immediate physical features); the necessary reverse of this is, however, the signifier’s constitutive authority: in the symbolic order, the purely formal network of differential features has priority over the content (the “signified”) of its individual components, i.e., its “signified” is ultimately posited as secondary and indifferent. To refer to the terms of speech-acts theory, this paradox is the “impossible” point of intersection between constative and performative— the true stumbling block of this theory. That is to say, already in John Austin’s"
      - emphasis [ref=e1378]: How to Do
      - emphasis [ref=e1379]: Things with Words
      - text: ", the passage from the opposition performative/constative to the triad locution/illocution/perlocution and to the subsequent classification of illocutionary acts betrays a fundamental theoretical deadlock. Far from being a simple elaboration of the original insight into how one can “do things with words,” the transposal of performative into illocutionary act entails a certain radical loss: already at the level of an immediate, “naive” approach, one cannot avoid the impression that, in the course of this passage, what was truly subversive in the notion of performative somehow gets lost. On the other hand, it is clear that Austin was impelled to accomplish this passage from performative to illocutionary act by an insufficiency of the couple performative/constative itself. The taxonomy of illocutionary acts proposed by John Searle"
      - superscript [ref=e1381]:
        - link "39" [ref=e1382]:
          - /url: "#fn-ch3-39"
      - text: has the advantage of enabling us to locate this lack by producing
    - paragraph [ref=e1383]: "the point of intersection between Austin I and Austin II: one of the species of illocution (“declarations”) coincides with the “pure” performative."
    - paragraph [ref=e1384]:
      - text: "The starting point of Searle’s taxonomy is the “direction of fit” between words and the world implied by the different species of speech acts: in the case of"
      - emphasis [ref=e1385]: assertives
      - text: ", the direction of fit is words to world (when I say “There is a table in the room next door,” the condition of satisfaction of this proposition is that the content of the utterance corresponds to the designated state of things, i.e., that there really is a table in the room next door); in the case of directives, the direction of fit is world to words (when I say “Shut the door!” the condition of satisfaction of this proposition is that the act in the world follows, realizes, the uttered command, i.e., that the addressee effectively shuts the door and that he does it because of my command and not for other reasons). The “trickiest case,” as Searle puts it, is, however,"
      - emphasis [ref=e1386]: declarations
      - text: ": their direction of fit is double, world to words as well as words to world. Let us take the proposition “The meeting is closed”—what does the speaker accomplish by pronouncing it? He brings about a new state of things in the world (the fact that the meeting is closed), the direction of fit is therefore world to words—yet how, precisely, does he effectuate it? By stating that the meeting is closed, i.e.,"
      - emphasis [ref=e1387]: by presenting, in his utterance, this
      - emphasis [ref=e1388]: state of things as already accomplished
      - text: —in short, he effectuates the act by describing it as effectuated. In the declarations, the speaker “is trying to cause something to be the case by representing it as being the case. … [I]f he succeeds he will have changed the world by representing it as having been so changed.”
      - superscript [ref=e1390]:
        - link "40" [ref=e1391]:
          - /url: "#fn-ch3-40"
    - paragraph [ref=e1392]:
      - text: "Every utterance, to be sure, accomplishes the act defined by the illocutionary force that pertains to it; there is, however, a crucial difference between declarations and, say, directives. By saying “Shut the door!” I accomplish the act of command, but it remains to the addressee to carry it out and effectuate the new state of things (to shut the door), whereas by saying “The meeting is closed” I effectively close the meeting—only declarations contain this “magical power” of effectuating their propositional content. The direction of fit world to words is here not limited to the fact that a new state of things in the world has to follow the utterance, since the causality is so to speak immediate: utterance itself brings about the new state of things. Yet, as we have just seen, the price to be paid for this “magic of the verb” is its “repression”: one closes the meeting by"
      - emphasis [ref=e1393]: stating
      - text: that it is closed, i.e., one pretends to describe an already-given state of things—in order to be effective, the “pure” performative (the speech act which brings about its own propositional content) has to endure an inner split and assume the form of its opposite, of a constative.
    - paragraph [ref=e1394]:
      - text: "It is in the light of this split that one has to interpret Searle’s theory of “indirect speech acts,” i.e., of the propositions of the type “Can you pass the salt?” where the primary illocutionary act (the directive, the demand to the addressee to pass the salt) is accomplished by means of a secondary illocutionary act (the interrogation concerning the addressee’s ability to comply with the demand). Searle conceives such propositions as “parasitic”: their nature is secondary, they presuppose some logically prior illocutionary act (in the case of “Can you pass the salt?” the direct command “Pass the salt!”). Yet do not “declarations” denote the case where “parasitism” is in a way"
      - emphasis [ref=e1395]: original
      - text: "? Their primary illocutionary dimension (the “magical power” to bring about the propositional content) can manifest itself only under the guise of the assertive, of a statement that “it is like that.” This paradox offers us a clue to Lacan’s thesis according to which ontology pertains to the “discourse of the Master”: the (philosophical) discourse of being"
    - paragraph [ref=e1396]:
      - text: is simply being on thrust [
      - emphasis [ref=e1397]: à la botte
      - text: "], being on order, what will have been if you have understood what I have ordered you. The entire dimension of being is produced within"
    - paragraph [ref=e1398]:
      - text: the movement of the discourse of the Master, of the one who, uttering a signifier, expects from it what is one of its effects of link not to be neglected, namely that the signifier commands. The signifier is first of all imperative.
      - superscript [ref=e1400]:
        - link "41" [ref=e1401]:
          - /url: "#fn-ch3-41"
    - paragraph [ref=e1402]:
      - text: "The discourse of ontology is thus sustained by an “indirect speech act”: its assertive surface, its stating that the world “is like that,” conceals a performative dimension, i.e., ontology is constituted by the misrecognition of how its enunciation brings about its propositional content. The only way to account for this “magical power” of declarations is by having recourse to the Lacanian hypotheses of the “big Other”: Searle himself has a presentiment of it when he points out that “it is only given such institutions as the church, the law, private property, the state and a special position of the speaker and hearer within these institutions”"
      - superscript [ref=e1404]:
        - link "42" [ref=e1405]:
          - /url: "#fn-ch3-42"
      - text: that one can accomplish a declaration. In Hans Christian Andersen’s
      - emphasis [ref=e1406]: Emperor’s New Clothes
      - text: ", all the world knows that the emperor has no clothes, and everybody knows that all the world knows it—why, then, does a simple public statement that “the emperor has no clothes” blow up the entire established network of intersubjective relations? In other words: if everybody knew it,"
      - emphasis [ref=e1407]: who did not know it
      - text: "? The Lacanian answer is, of course: the big Other (in the sense of the field of socially recognized knowledge). Declarations imply the same logic: the meeting is closed when, by means of the utterance, “The meeting is closed,” this"
      - emphasis [ref=e1408]: fact comes to the big
      - emphasis [ref=e1409]: Other’s knowledge
      - text: .
    - paragraph [ref=e1410]:
      - text: When, in his
      - emphasis [ref=e1411]: Four Fundamental Concepts
      - text: ", Lacan specifies the Freudian “primordial repression” as the “fall of the binary signifier,”"
      - superscript [ref=e1413]:
        - link "43" [ref=e1414]:
          - /url: "#fn-ch3-43"
      - text: he seems to allude precisely to this inherent split of the “pure” performative (of the declaration), i.e., to the fact that it can actualize itself only under the guise of its opposite. What is “originally repressed,” what, in accordance with a structural necessity, has to disappear in order that the symbolic network can establish itself, is a signifier of the “pure” performative, i.e., of a performative which would
      - emphasis [ref=e1415]: not
      - text: "assume the form of its opposite, of a constative. In this split, in this impossibility of a “pure” performative, the subject of the signifier emerges: his place is the void opened up by the fall of the “impossible” binary signifier. That is to say, the gesture which constitutes the subject is the empty gesture of a forced choice: reality is “subjectivized” when the subject posits as his free choice what is forced upon him, i.e., what he encounters as given, positive reality. This formal act of conversion of reality"
      - emphasis [ref=e1416]: qua
      - text: given into reality
      - emphasis [ref=e1417]: qua
      - text: "produced is founded precisely in the above-described coincidence of “pure” performative with its opposite (constative): the performative production of reality necessarily assumes the form of stating that “it is so.” Because of this split, the Lacanian mathem for the subject is $: an empty gesture of consenting to what is given as if to one’s free choice."
      - superscript [ref=e1419]:
        - link "44" [ref=e1420]:
          - /url: "#fn-ch3-44"
    - paragraph [ref=e1421]:
      - text: The Lacanian S
      - subscript [ref=e1422]: "1"
      - text: ", the “Master signifier” which represents the subject for other signifiers, is therefore the point of intersection between performative and constative, i.e., the point at which the “pure” performative coincides with (assumes the form of) its opposite. We can see, now, what is lacking to Austin I (that of the “performative”) as well as to Austin II (that of the “illocutionary force”): a kind of paradoxical, inward-inverted topological model where the extreme interior of the “pure” performative coincides with the exterior of the constative. This “extimate” point of intersection is of course that of authority; its immanent split is best rendered by the ambiguity of the verb “to establish”: authority is ultimately the name of a gesture which “establishes (constitutes, creates, sets up)” a certain state of things in the very act of “establishing (certifying, stating, ascertaining)” that “things are thus.”"
    - heading "Kierkegaard’s “materialist reversal of Hegel”" [level=4] [ref=e1423]
    - paragraph [ref=e1424]:
      - text: "Such an assertion of authority seems to be the very opposite of the Enlightenment whose fundamental aim is precisely to render truth independent of authority: truth is arrived at by means of the critical procedure which questions the"
      - emphasis [ref=e1425]: pro et contra
      - text: "of a proposition irrespective of the authority that pertains to its place of enunciation … To undermine the false evidence of this incompatibility between authority and Enlightenment, it suffices to recall how the two supreme achievements of the unmasking of ideological prejudices that grew out of the project of the Enlightenment, Marxism and psychoanalysis, both refer to the authority of their respective founders (Marx, Freud). Their structure is inherently “authoritarian”: since Marx and Freud opened up a new theoretical field which sets the very criteria of veracity, their words cannot be put to the test the same way one is allowed to question the statements of their followers; if there is something to be refuted in their texts, these are simply statements which precede the “epistemological break,” i.e., which do not belong under the field opened up by the founder’s discovery (Freud’s writings prior to the discovery of the unconscious, for example). Their texts are thus to be read the way one should read the text of a dream, according to Lacan: as “sacred” texts which are in a radical sense “beyond criticism” since they constitute the very horizon of veracity. For that reason, every “further development” of Marxism or psychoanalysis necessarily assumes the form of a “return” to Marx or Freud: the form of a (re)discovery of some hitherto overlooked layer of their work, i.e., of bringing to light what the founders “produced without knowing what they produced,” to invoke Althusser’s formula. In his article on Chaplin’s"
      - emphasis [ref=e1426]: Limelight
      - text: ", André Bazin recommends the same attitude as the only one which befits Chaplin’s genius: even when some details in"
      - emphasis [ref=e1427]: Limelight
      - text: appear to us aborted and dull (the tedious first hour of the film; Calvero’s pathetic vulgar-philosophical outbursts; etc.), we have to put the blame on us and ask ourselves what was wrong with our approach to the film—such an attitude clearly articulates the
      - emphasis [ref=e1428]: transferential
      - text: "relationship of the pupil to the teacher: the teacher is by definition “supposed to know,” the fault is always ours … The disturbing scandal authenticated by the history of psychoanalysis and Marxism is that such a “dogmatic” approach proved far more productive than the “open,” critical dealing with the founder’s text: how much more fecund was Lacan’s “dogmatic” return to Freud than the American academic machinery which transformed Freud’s oeuvre into a collection of positive scientific hypotheses to be tested, refuted, combined, developed, and so on! Lacan’s scandal, the dimension of his work which resists incorporation into the academic machinery, can be ultimately pinned down to the fact that he openly and shamelessly posited himself as such an authority, i.e., that he repeated the Kierkegaardian gesture in relationship to his followers: what he demanded of them was not fidelity to some general theoretical propositions, but precisely fidelity to his person—which is why, in the circular letter announcing the foundation of"
      - emphasis [ref=e1429]: La Cause freudienne
      - text: ", he addresses them as “those who love me.” This unbreakable link connecting the doctrine to the contingent person of the teacher, i.e., to the teacher"
      - emphasis [ref=e1430]: qua
      - text: "material surplus that sticks out from the neutral edifice of knowledge, is the scandal everybody who considers himself Lacanian has to assume: Lacan was not a Socratic master obliterating himself in front of the attained knowledge, his theory sustains itself only through the transferential relationship to its founder. In this precise sense, Marx, Freud, and Lacan are not “geniuses,” but “apostles”: when somebody says “I follow Lacan because his reading of Freud is the most intelligent and persuasive,” he immediately exposes himself as non-Lacanian."
      - superscript [ref=e1432]:
        - link "45" [ref=e1433]:
          - /url: "#fn-ch3-45"
    - paragraph [ref=e1434]:
      - text: "This “scandal” of the spot of contingent individuality which smears over the neutral field of knowledge points toward what we could designate as Kierkegaard’s “materialist reversal of Hegel.” Hegel ultimately stays within the boundary of the “Socratic” universe: in his"
      - emphasis [ref=e1435]: Phenomenology of Spirit
      - text: ", consciousness arrives at the Truth, recollects it and internalizes it,"
    - paragraph [ref=e1436]:
      - text: "via its own effort, by comparing itself with its own immanent Notion, by confronting the positive content of its statements with its own place of enunciation, by working through its own split, without any external support or point of reference. The standpoint of dialectical truth (the “for us”) is not added to the consciousness as a kind of external standard by which the consciousness’ progress is then measured: “we,” dialecticians, are nothing but passive observers who retroactively reconstruct the way consciousness itself arrived at the Truth (i.e., the “absolute” standpoint without presuppositions). When, at some point of the consciousness’ journey, Truth effectively appears as a positive entity possessing an independent existence, as an “in itself” assuming the role of the external measure of the consciousness’s “working through,” this is simply a necessary self-deception “sublated” in the further succession of the “experiences of consciousness.” In other words—in the words of the relationship between belief and knowledge: the subject’s belief in an (external) authority which is to be accepted unconditionally and “irrationally,” is nothing but a transitional stage “sublated” by the passage into reflected knowledge. For Kierkegaard, on the contrary, our belief in the person of the Savior is the absolute, not abolishable condition of our access to truth: eternal truth itself clings to this contingent material externality—the moment we lose this “little piece of the real” (the historical fact of Incarnation), the moment we cut our link with this material fragment (reinterpreting it as a parable of man’s affinity with God, for example), the entire edifice of Christian knowledge crumbles."
      - superscript [ref=e1438]:
        - link "46" [ref=e1439]:
          - /url: "#fn-ch3-46"
      - text: "On another level, the same goes for psychoanalysis: in the psychoanalytic cure, there is no knowledge without the “presence of the analyst,” without the impact of his dumb material weight. Here we encounter the inherent limitation of all attempts to conceive psychoanalytic cure on the model of the Hegelian reflective movement in the course of which the subject becomes conscious of his own “substantial” content, i.e., arrives at the repressed truth which dwells deep in him."
      - superscript [ref=e1441]:
        - link "47" [ref=e1442]:
          - /url: "#fn-ch3-47"
      - text: If such were the case, psychoanalysis would be the ultimate stage of the Socratic “Know thyself!” and the psychoanalyst’s role would be that of an
      - emphasis [ref=e1443]: accoucheur
      - text: ", a kind of “vanishing mediator” enabling the subject to achieve communication with himself by finding access to its repressed traumas."
    - paragraph [ref=e1444]:
      - text: This dilemma comes forth at its clearest apropos of the role of
      - emphasis [ref=e1445]: transference
      - text: "in psychoanalytic cure. Insofar as we remain within the domain of the Socratic logic of remembrance, transference is not an “effective” repetition but rather a means of recollection: the analysand “projects” past traumas which unconsciously determine his present behavior (the repressed and unresolved conflicts with his father, for example) onto his relationship to the analyst; by means of the deft manipulation of the transferential situation, the analyst then enables the analysand to recall the traumas which were hitherto “acted out” blindly—in other words, the task of the analyst is to make evident to the analysand how “he (the analyst) is not really the father,” i.e., how the analysand, caught in the transference, used his relationship to the analyst to stage the past traumas … Lacan’s emphasis is, on the contrary, throughout Kierkegaardian: transferential repetition cannot be reduced to remembrance, transference is not a kind of “theater of shadows” where we settle with past traumas in"
      - emphasis [ref=e1446]: effigia
      - text: ", it is repetition in the full meaning of the term, i.e., in it, the past trauma is literally repeated, “actualized.” The analyst is not father’s “shadow,” he is a presence in front of which the past battle has to be fought out “for real.”"
    - heading "Lacan versus Habermas" [level=4] [ref=e1447]
    - paragraph [ref=e1448]:
      - text: The point of the preceding argumentation, of course, is not to defend blind submission to authority, but the fact that
      - emphasis [ref=e1449]: discourse itself is in its fundamental structure “authoritarian
      - text: ” (for
    - paragraph [ref=e1450]: "that reason, the “discourse of the Master” is the first, “founding” discourse in the Lacanian matrix of the four discourses; or, as Derrida would say in his writings of the last years, every discursive field is founded on some “violent” ethicopolitical decision). Out of the free-floating dispersion of signifiers, a consistent field of meaning emerges through the intervention of a Master Signifier—why? The answer is contained in the paradox of the “finite infinity/totality” which, as one knows from Claude Lévi-Strauss onward, pertains to the very notion of the signifier: the symbolic order in which the subject is embedded is simultaneously “finite” (it consists in a limited and ultimately contingent network which never overlaps with the Real) and “infinite,” or, to use a Sartrean term, “totalizing” (in any given language, “everything can be told,” there is no external standpoint from which one can judge its limitations). Because of this inherent tension, every language contains a paradoxical element which, within its field, stands in for what eludes it—in Lacanese, in every set of signifiers, there is always “at least one” which functions as the signifier of the very lack of the signifier. This signifier is the Master Signifier: the “empty” signifier which totalizes (“quilts”) the dispersed field—in it, the infinite chain of causes (“knowledge”) is interrupted with an abyssal, nonfounded, founding act of violence."
    - paragraph [ref=e1451]:
      - text: The philosophical term for this inversion of the impotence into a constitutive power is, of course, the notion of the
      - emphasis [ref=e1452]: transcendental
      - text: "with all its inherent paradoxes: the subject experiences as his constitutive power the very horizon which frames his vision due to his finitude. For that reason, it is precisely the notion of the transcendental which enables us to distinguish Lacan from, say, Habermas. With Habermas, the status of the “disturbances” which vitiate the course of “rational argumentation” by way of a nonreflected constraint is ultimately contingent/empirical, these “disturbances” emerge as empirical impediments on the path of the gradual realization of the transcendental regulative Idea. Whereas with Lacan, the status of the Master Signifier, the signifier of the symbolic authority founded only in itself (in its own act of enunciation), is strictly transcendental: the gesture which “distorts” a symbolic field, which “curves” its space by introducing in it a nonfounded violence, is stricto"
      - emphasis [ref=e1453]: sensu
      - text: correlative to its very establishment—in other words, the moment we subtract from a discursive field its “distortion,” the field itself disintegrates (“dequilts”). Lacan’s position is therefore the very opposite of that of Habermas according to whom the inherent pragmatic presuppositions of a discourse are “nonauthoritarian” (the notion of discourse implies the idea of a communication free of constraint where only rational argumentation counts, etc.).
    - paragraph [ref=e1454]:
      - text: Lacan’s fundamental thesis is that the Master is by definition an
      - emphasis [ref=e1455]: impostor
      - text: ": the Master is somebody who, upon finding himself at the place of the constitutive lack in the structure, acts as if he holds the reins of that surplus, of the mysterious X which eludes the grasp of the structure. This accounts for the difference between Habermas and Lacan as to the role of the Master: with Lacan, the Master is an impostor, yet the"
      - emphasis [ref=e1456]: place
      - text: occupied by him—the place of the lack in the structure—cannot be abolished, since the very finitude of every discursive field imposes its structural necessity. The unmasking of the Master’s imposture does not abolish the place he occupies, it just renders it visible in its original emptiness, i.e., as preceding the element which fills it out. Therefrom the Lacanian notion of the analyst
      - emphasis [ref=e1457]: qua envers
      - text: "(reverse) of the Master: of somebody who holds the place of the Master, yet who, by means of his (non)activity, undermines the Master’s charisma, suspends the effect of “quilting,” and thus renders visible the distance that separates the Master from the place it occupies, i.e., the radical"
      - emphasis [ref=e1458]: contingency
      - text: of the subject who occupies this place.
    - paragraph [ref=e1459]: For that reason, their strategy of subverting symbolic authority is also fundamentally different. Habermas simply relies on the gradual reflective elucidation of the implicit, nonreflected, prejudices which distort communication, i.e., on the asymptotic approaching to
    - paragraph [ref=e1460]:
      - text: "the regulative ideal of free, unconstrained communication. Lacan is also “antiauthoritarian,” he is as far as possible from any kind of obscurantism of the “ineffable,” he too remains thoroughly attached to the space of “public communication”—this unexpected proximity of Lacan to Habermas is corroborated by a procedure, proposed by Lacan, which caused a great amount of resistance even among some of his closest followers:"
      - emphasis [ref=e1461]: la passe
      - text: ", the “passage,” of an analysand into the place of the analyst. Its crux is the intermediate role of the so-called"
      - emphasis [ref=e1462]: passeurs
      - text: ": the analysand (the"
      - emphasis [ref=e1463]: passant
      - text: ) narrates the results of his analysis, the insights he arrived at, to the two
      - emphasis [ref=e1464]: passeurs
      - text: ", his peers, who thereupon report on it to the committee ("
      - emphasis [ref=e1465]: comité
      - emphasis [ref=e1466]: de la passe
      - text: )—the committee then decides on the analysand’s “passage” into the place of the analyst. The idea of these two middlemen who channel every contact between the
      - emphasis [ref=e1467]: passant
      - text: "and the committee is very “Habermasian” indeed: they are here to prevent any kind of “initiatic” relationship between the"
      - emphasis [ref=e1468]: passant
      - text: and the committee, i.e., to prevent
      - emphasis [ref=e1469]: la passe
      - text: "from functioning as the transmission of an initiatic knowledge, after the model of secret cults: the analysand must be able to formulate the results of his analysis in such a way that the two"
      - emphasis [ref=e1470]: passeurs
      - text: ", these two average men who stand in for the common knowledge, are able to transmit it integrally to the committee—in other words, the detour through the field of public knowledge must not affect the “message” in any way."
    - paragraph [ref=e1471]:
      - text: "The contrast between Habermas and Lacan finds its clearest expression apropos of the notion of the “ideal speech situation”: Habermas conceives it as the asymptotic ideal of intersubjective communication free of constraint, where the participants arrive at consensus by means of rational argumentation. Contrary to the common opinion, Lacan also knows of an “ideal speech situation” which undermines the imposture of the Master Signifier: it is none other than the"
      - emphasis [ref=e1472]: analytic situation
      - text: "itself—here, the abyss that separates Lacan from Habermas strikes the eyes. In the process of psychoanalysis, we also have two subjects speaking to each other; yet instead of facing each other and exchanging arguments, one of them lies on the couch, stares into thin air and throws out disconnected prattle, whereas the other mostly stays silent and terrorizes the first by the weight of his oppressive mute presence … This situation is “free of constraint” in the precise meaning of suspending the structural role of the Master Signifier: the analytic discourse"
      - emphasis [ref=e1473]: qua envers
      - text: of the discourse of the Master transposes us into a state of undecidability, previous to the “quilting” of the discursive field by a Master Signifier, i.e., in the state of the “free floating” of signifiers—what is “repeated” in it is ultimately the very contingency which engendered the analysand’s symbolic space.
    - paragraph [ref=e1474]:
      - text: "And, to conclude by uniting the two slopes of our argumentative edifice, is not “exception reconciled in the universal” the most succinct definition of act? In this precise sense, an act is always “beyond good and evil”: it suspends the given ethical standards of good, yet it does so in a way that is inherent to the very maintenance of good. In other words, an act does not only apply the given ethical standards but redefines them. As to the problem of choice, this means that"
      - emphasis [ref=e1475]: choice becomes an act when its effectuation changes the value of its terms
      - text: . In a long note to the first chapter of
      - emphasis [ref=e1476]: Philosophical Fragments
      - text: ", Kierkegaard exemplifies it by means of the choice between freedom and nonfreedom (fall into sin): at the beginning, it is possible for me to choose equally between the two terms; however, as soon as I choose nonfreedom (sin), I am no longer in a position to exchange it for freedom, i.e., I lose the very freedom of choice."
      - superscript [ref=e1478]:
        - link "48" [ref=e1479]:
          - /url: "#fn-ch3-48"
      - text: "The same goes for all ethical acts: once the decision is taken, the very field of choice is transformed. Is it necessary to add how it is precisely this paradox of an act of choice changing the value of its terms which escapes distributive justice?"
    - heading "4 WHY DOES THE PHALLUS APPEAR?" [level=2] [ref=e1480]
    - heading "4.1 Grimaces of the Real" [level=3] [ref=e1481]
    - 'heading "The “phantom of the opera”: A spectroscopy" [level=4] [ref=e1482]'
    - paragraph [ref=e1483]:
      - text: "The coincidence of motifs between high art (and theory) and mass culture is today a theoretical commonplace: is not the clearest figuration of the famous"
      - emphasis [ref=e1484]: je est un autre
      - text: to be found in the mass-culture tradition of vampires and living dead who “decenter” the subject, undermining from within his consistency and self-control?
      - superscript [ref=e1486]:
        - link "1" [ref=e1487]:
          - /url: "#fn-ch4-1"
      - text: The main problem with this resonance, which is a constant from the outset of the modern to the relationship between postmodern theory and today’s popular culture, is how to elude the notion of some common
      - emphasis [ref=e1488]: Zeitgeist
      - text: as its interpretive device. One way to avoid this deadlock is to take into account the antagonism which makes it possible to play high art and mass culture against each other, i.e., to interpret alternately one with the help of the other, as in Lévi-Straus’s
      - emphasis [ref=e1489]: mythologiques
      - text: "in which myths interpret one another. Let us take the “phantom of the opera,” undoubtedly mass culture’s most renowned specter, which has kept the popular imagination occupied from Gaston Leroux’s novel at the turn of the century through a series of movie and television versions up to the recent triumphant musical: in what consists, on a closer look, the repulsive horror of his face? The features which define it are four:"
    - paragraph [ref=e1490]:
      - text: 1) the
      - emphasis [ref=e1491]: eyes
      - text: ": “His eyes are so deep that you can hardly see the fixed pupils. All you can see is two big black holes, as in a dead man’s skull.”"
      - superscript [ref=e1493]:
        - link "2" [ref=e1494]:
          - /url: "#fn-ch4-2"
      - text: To a connoisseur of Alfred Hitchcock, this image instantly recalls
      - emphasis [ref=e1495]: The Birds
      - text: ", namely the corpse with the pecked-out eyes upon which Mitch’s mother (Jessica Tandy) stumbles in a lonely farmhouse, its sight causing her to emit a silent scream. When, occasionally, we do catch the sparkle of these eyes, they seem like two candles lit deep within the head perceivable only in the dark: these two lights somehow at odds with the head’s surface, like lanterns burning at night in a lonely, abandoned house, are responsible for the uncanny effect of the “living dead.” The first “free association” from the domain of high culture is here Edvard Munch’s paintings from the same period, primarily his"
      - emphasis [ref=e1496]: Spring Evening on Karl Johan
      - text: (1892) where the stream of ghostlike pedestrians move toward the spectator, their goggling eyes at odds with the death-mask faces.
    - paragraph [ref=e1497]:
      - text: 2) the
      - emphasis [ref=e1498]: nose
      - text: ": “His nose is so little worth talking about that you can’t see it side-face: and the"
      - emphasis [ref=e1499]: absence
      - text: of that nose is a horrible thing to
      - emphasis [ref=e1500]: look at
      - text: .”
      - superscript [ref=e1502]:
        - link "3" [ref=e1503]:
          - /url: "#fn-ch4-3"
      - text: "Is it necessary to recall how Freud, in his article on fetishism, uses exactly the same words to describe the horror of castration: what horrifies the child is the very"
      - emphasis [ref=e1504]: absence
      - text: of the penis, i.e., the fact that there is nothing to see where the gaze expects something? (The corresponding feature in Munch’s paintings—if we are to continue the homology—is the absence of nose and ears from the homunculus’s head in his most famous painting
      - emphasis [ref=e1505]: Scream
      - text: "(1893).) As to this point, there is an interesting divergence between Leroux’s novel and the recent television mini-series on the “phantom”: in the novel, the phantom’s primordial trauma was that, as a child, he was so ugly that even his own mother found him repulsive (when he approached her for an embrace, she pushed him aside with disgust and asked him to put on his mask),"
      - superscript [ref=e1507]:
        - link "4" [ref=e1508]:
          - /url: "#fn-ch4-4"
      - text: whereas in the television series, nobody could stand his distorted face—
      - emphasis [ref=e1509]: with the exception of his mother
      - text: to whom he seemed nice and
    - paragraph [ref=e1510]:
      - text: "normal and who constantly caressed his face, while entertaining him with her heavenly voice (this is why he is later obsessed with opera: he is desperately seeking the repetition of his mother’s voice among the singers). Here, one has to avoid the pseudo problem of which version is “proper”: they are to be read in the Lévi-Straussian manner, as two complementary versions of the same myth which interpret each other. That is to say, what did his mother see on his face (in the second, television version) that she found so irresistibly attractive, while the same feature was so repugnant to all others? There is only one answer possible:"
      - emphasis [ref=e1511]: the exact
      - emphasis [ref=e1512]: opposite of the first version
      - text: ", i.e., an excessive phallic protuberance, repulsive to a “normal” gaze, in place of the nose—so to speak, the accomplishment of her (maternal) desire to obtain in the child her missing phallus, something resembling a famous case of the eighteenth-century monster analyzed by Alain Grosrichard."
      - superscript [ref=e1514]:
        - link "5" [ref=e1515]:
          - /url: "#fn-ch4-5"
    - paragraph [ref=e1516]:
      - text: 3)
      - emphasis [ref=e1517]: the amorphous distortion of the face
      - text: ": the flesh has not yet assumed definite features, it dwells in a kind of preontological state, as if “melted,” as if having undergone an anamorphotic deformation; the horror lies not in his death mask, but rather in what is concealed beneath it, in the palpitating skinned flesh—everyone who catches sight of this amorphous life substance has entered the forbidden domain and must therefore be excluded from the community … Therein consists the ultimate paradox of the “living dead”: as if death, the death-stench it spreads, is a mask sheltering a life far more “alive” than our ordinary daily life. The place of the “living dead” is not somewhere between the dead and the living: precisely as dead, they are in a way “more alive than life itself,” having access to the life substance prior to its symbolic mortification."
      - superscript [ref=e1519]:
        - link "6" [ref=e1520]:
          - /url: "#fn-ch4-6"
      - text: "Lacanian psychoanalysis locates the cause of this deformity in the anamorphotic gaze, i.e., the gaze sustained by an incestuous enjoyment: the anamorphotic distortion of reality is the way the gaze is inscribed onto the object’s surface. One should recall here another case from the same period, that of the “elephant man” immortalized by David Lynch in the film of the same name: according to the mythology surrounding this figure, the grotesque protophallic protuberance on his forehead (the “elephant’s nose”), as well as the general deformity of his body, designates the inscription of the maternal gaze onto the bodily surface. The myth of the “elephant man” goes as follows: during a circus parade watched by his pregnant mother, an elephant went berserk and almost trampled her down; this “view from below” on the mad elephant affected the mother and caused the elephant-like distortion of the embryo."
      - superscript [ref=e1522]:
        - link "7" [ref=e1523]:
          - /url: "#fn-ch4-7"
      - text: Again, we encounter the same anamorphotic deformity of the face in a series of Munch’s paintings where the face seems to lose its contours and “melt down” into a whitish slime (let it suffice to mention
      - emphasis [ref=e1524]: Ashes,
      - emphasis [ref=e1525]: Vampire
      - text: and
      - emphasis [ref=e1526]: The Kiss
      - text: ", three drawings in which, during sexual intercourse or in its aftermath, the man literally “loses his face”)."
    - paragraph [ref=e1527]:
      - text: 4) the exceptional status of his
      - emphasis [ref=e1528]: voice
      - text: ": the phantom of the opera is first of all a being of voice, in the novel he is regularily addressed as “the man’s voice,” as if the “normal” relationship of voice and its bearer (its source) were inverted: instead of the voice appertaining to the body as one of its properties, it is the body itself which, in its distortion, materializes an “impossible,” originally bodiless and as such all-powerful (all-present) voice baptized by Michel Chion as “"
      - emphasis [ref=e1529]: la
      - emphasis [ref=e1530]: voix acousmatique
      - text: ”.
      - superscript [ref=e1532]:
        - link "8" [ref=e1533]:
          - /url: "#fn-ch4-8"
      - text: "The first association here is, of course, again Munch’s Scream: in it, the energy of the hindered scream—which cannot burst out and release itself in sound—finds an outlet (one is almost tempted to say: “is acted out”) in the anamorphotic distortion of the body, in its “unnatural” serpentine windings, and of the coast and water beyond the bridge—as if these spiral lines are here to materialize sound vibrations, in a kind of effect of"
      - emphasis [ref=e1534]: conversion
      - text: of the hindered sound into a distortion of matter.
    - heading "The voice qua object" [level=4] [ref=e1535]
    - paragraph [ref=e1536]:
      - text: In his seminar on
      - emphasis [ref=e1537]: anxiety
      - text: (1960–1961, unpublished), Lacan referred to Munch’s
      - emphasis [ref=e1538]: Scream
      - text: in order to exemplify the status of the voice
      - emphasis [ref=e1539]: qua
      - text: object. That is to say, the crucial feature of the
    - paragraph [ref=e1540]:
      - text: painting is the fact that the
      - emphasis [ref=e1541]: scream is not heard
      - text: ". What we aim at here is not the obvious fact that “paintings do not speak”: there are paintings which are definitely “resonant” and “call to mind sounds”—the paintings of street scenes bursting with life, of dancing, of stormy nature, etc.; whereas here, it pertains to the very essence of the depicted content that the scream we perceive is mute, since the anxiety is too stringent for it to find an outlet in vocalization (August Strindberg totally missed the point when he prattled on about how, in order to enjoy properly Munch’s paintings, one should imagine appropriate music to accompany them). As we have already pointed out, this structural muteness is indexed within the painting itself by the absence of ears in the desperate homunculus’s head: as if these ears, foreclosed from the (symbolic) reality of the face, return in the Real of the anamorphotic stain the form of which recalls a gigantic ear … In everyday language, one could say that the scream “got stuck in the throat”: the voice"
      - emphasis [ref=e1542]: qua
      - text: object is precisely what is “stuck in the throat,” what cannot burst out, unchain itself and thus enter the dimension of subjectivity. It is by no accident that, in his
      - emphasis [ref=e1543]: Four Fundamental Concepts
      - text: ", Lacan determines the"
      - emphasis [ref=e1544]: object small a
      - text: "as the bone which got stuck in the subject’s throat: if the exemplary case of the gaze"
      - emphasis [ref=e1545]: qua
      - text: object is a blind man’s eyes, i.e., eyes which
      - emphasis [ref=e1546]: do not see
      - text: (we experience the gaze
      - emphasis [ref=e1547]: qua
      - text: object when a partner in conversation suddenly takes off his black glasses, exposing us to the uneasy depthless white of his eyes), then the exemplary case of the voice
      - emphasis [ref=e1548]: qua
      - text: object is a voice which remains silent, i.e., which we
      - emphasis [ref=e1549]: do not hear
      - text: .
      - superscript [ref=e1551]:
        - link "9" [ref=e1552]:
          - /url: "#fn-ch4-9"
    - paragraph [ref=e1553]:
      - text: "It should be of no surprise, then, that the most famous scream in the history of cinema is also silent: the scream of a mother who watches powerlessly her son being shot down by soldiers, in the scene at Odessa’s staircase from Eisenstein’s"
      - emphasis [ref=e1554]: Battleship Potemkin
      - text: . When, in a tracking shot, the camera approaches the mother who desperately grasps her head, and almost enters the black hole of her open mouth, its entire effect is again based on the fact that we do not hear her scream, i.e., that it “gets stuck in her throat”—as in the above-mentioned scene from Hitchcock’s
      - emphasis [ref=e1555]: Birds
      - text: where Mitch’s mother, upon encountering the corpse with pecked-out eyes, utters her silent scream. To this silent scream which bears out the horror-stricken encounter with the real of enjoyment, one has to oppose the scream of release, of decision, of
      - emphasis [ref=e1556]: choice
      - text: ", the scream by means of which the unbearable tension finds an outlet: we so to speak “spit out the bone” in the relief of vocalization; in Hitchcock’s"
      - emphasis [ref=e1557]: oeuvre
      - text: ", its most famous case is Doris Day’s scream from his second version of"
      - emphasis [ref=e1558]: The Man Who Knew Too Much
      - text: which, at the last moment, prevents the murder in Albert Hall. What one has to bear in mind here is the contrast between this scream and the silent mother’s scream from
      - emphasis [ref=e1559]: Potemkin
      - text: ": they are both placed within the mother-son relationship; the silent scream manifests her resistance to cutting the umbilical cord that links her with the son, whereas the scream from"
      - emphasis [ref=e1560]: The Man Who
      - emphasis [ref=e1561]: Knew Too Much
      - text: "signals that the mother, driven into the corner by a forced choice between her son and the community, renounced the child and chose the community—this scream is therefore in its very coarseness “an act of civilization.” In other words, the opposition of silent and vocalized screams coincides with that of enjoyment and Other: the silent scream attests to the subject’s clinging to enjoyment, to his/her unreadiness to exchange enjoyment (i.e., the object which gives body to it) for the Other, for the Law, for the paternal metaphor, whereas the vocalization as such corroborates that the choice is already made and that the subject finds himself/herself within the community."
      - superscript [ref=e1563]:
        - link "10" [ref=e1564]:
          - /url: "#fn-ch4-10"
    - paragraph [ref=e1565]:
      - text: "The voice which obsesses the phantom is, however, not a scream, but a hypnotic operatic air: he falls in love with Christine after he recognizes in her seductive singing the resonance of the lost maternal voice. In"
      - emphasis [ref=e1566]: The Man Who Knew Too Much
      - text: ", this incestuous song which links the subject to the Thing (the maternal body), i.e., by means of which the Thing catches him with its tentacles, is, of course, none other than the notorious “Che sara, sara” sung by Doris"
    - paragraph [ref=e1567]:
      - text: Day in the embassy where her son is kept prisoner. It is, as said above, a song through which
      - emphasis [ref=e1568]: the mother reaches, “catches,” her son
      - text: ", that is to say, a song which expressly establishes the incestuous umbilical link (here, Hitchcock makes use of a formal procedure whose audacity has not yet been fully perceived: the camera directly “tracks” the voice, “shows” its resonance on the staircase and its climb to the attic room where the son is locked up). Another crucial feature of this scene is the accentuated vulgarity and obscenity of Doris Day’s singing: her voice is far too noisy, so that the distinguished guests in the reception room avoid each other’s gaze and stare down, as if embarrassed by such an obscene exhibition. The third and final feature not to be missed is the song’s content itself which directly exhibits its"
      - emphasis [ref=e1569]: superego
      - text: "status: “Che sara, sara,” what will be, will be—how could one avoid noticing, in this answer to the child’s question as to what will become of him when he grows up, the malevolent indifference that pertains to the very notion of superego. This superego status is further confirmed if one locates “Che sara, sara” in the context of other Hitchcock films, as the middle term between"
      - emphasis [ref=e1570]: Rear Window and Psycho
      - text: . What we have in mind is, of course, a peculiarity of the
      - emphasis [ref=e1571]: Rear
      - emphasis [ref=e1572]: Window’s
      - text: "soundtrack:"
      - superscript [ref=e1574]:
        - link "11" [ref=e1575]:
          - /url: "#fn-ch4-11"
      - text: when, late in the evening, Grace Kelly approaches James Stewart who is taking a nap on his wheelchair (first as an ominous shadow which overflows his face, then as “herself”), the background sounds—the rich texture of everyday noises—are suddenly suspended, and all we hear is the voice of an unknown soprano practicing scales, as if mother is yet learning to sing (which is why she still tolerates the exchange of kisses between Stewart and Kelly). In
      - emphasis [ref=e1576]: The Man Who Knew Too Much
      - text: mother already knows how to sing, her voice finally reaches the son—the ultimate result of which is then shown in
      - emphasis [ref=e1577]: Psycho
      - text: ": a son dominated by the mother’s voice, so that one is tempted to risk the thesis that the boy from"
      - emphasis [ref=e1578]: The Man Who
      - emphasis [ref=e1579]: Knew Too Much
      - text: is none other than Norman Bates in his childhood. In other words, the answer to the question “what will be,” what will become of the boy from
      - emphasis [ref=e1580]: The Man Who Knew Too
      - emphasis [ref=e1581]: Much
      - text: ", is contained in"
      - emphasis [ref=e1582]: Psycho
      - text: . In order to avoid the danger of the so-called “psychoanalytic interpretation of art” which lurks here (maternal superego as the “secret” of the voice-stain …), one has to accomplish the properly dialectical
      - emphasis [ref=e1583]: reversal of the explanans into explanandum
      - text: ": the point is not to interpret the unfathomable"
      - emphasis [ref=e1584]: “acousmatique
      - text: ” voice as the maternal superego, but rather its opposite, i.e., to explain the very logic of the maternal superego by means of this vocal stain—what we call “maternal superego” is
      - emphasis [ref=e1585]: nothing but
      - text: "such a voice which smears the picture and disturbs its transparency. Our procedure is therefore strictly allegorical: the “mother”"
      - emphasis [ref=e1586]: qua
      - text: a diegetic personality is ultimately an agency which, within the narrative content of Hitchcock’s films, stands in for, holds the place of, a certain formal disturbance, a stain which blurs the field of vision.
    - paragraph [ref=e1587]:
      - text: "The scream and the song thus form an opposition: the status of the song is that of a stain which materializes incestuous enjoyment, whereas the scream is—to put it simply—a horrified reaction to this stain. A cursory glance at Munch’s"
      - emphasis [ref=e1588]: Scream
      - text: "reveals how its surface is “drawn”: the right half is far more anamorphotically distorted than the left half, i.e., the painting is “sucked” toward its center of gravity somewhere around two-thirds the height of its right side —the homunculus is seized with horror at being drawn into this whirlpool. The spiral lines of the distorted reality form a new shape vaguely remindful of a gigantic ear or eye, a kind of paranoiac agency which “sees all and hears all”—how not to recall here Syberberg’s"
      - emphasis [ref=e1589]: Parsifal
      - text: where the depth of the visual field (the background) is often filled out by a flat
      - emphasis [ref=e1590]: rear projection
      - text: which deliberately destroys the effect of perspective and sometimes directly figures a gigantic eye (like the eye frescos from Eisenstein’s
      - emphasis [ref=e1591]: Ivan the Terrible
      - text: —or, of course, the background with painted eyes in Salvador Dali’s dream sequence from Hitchcock’s
      - emphasis [ref=e1592]: Spellbound
      - text: ).
      - superscript [ref=e1594]:
        - link "12" [ref=e1595]:
          - /url: "#fn-ch4-12"
      - text: In Hitchcock’s
      - emphasis [ref=e1596]: Marnie
      - text: ", the same role of a fantasy element which patches up the hole (the blank) in reality is played by the gigantic black hulk at the end of the street where Marnie’s mother"
    - paragraph [ref=e1597]:
      - text: "lives: it is evidently drawn and thus destroys the depth effect. Therein consists the most elementary formal definition of psychosis: the massive presence of some Real which fills out and blocks the perspective openness constitutive of “reality.”"
      - superscript [ref=e1599]:
        - link "13" [ref=e1600]:
          - /url: "#fn-ch4-13"
      - text: "This magnetic force which distorts the linear perspective on reality is of course enjoyment: Munch’s"
      - emphasis [ref=e1601]: Scream
      - text: depicts the intrusion of enjoyment into reality. The more we approach its vortex, the more the painting loses its “realist” character, i.e., the more its spiral lines of color strike us with the weight of their material presence; the illusion of “reality” of the depicted content is thereby not simply undermined—it is far more appropriate to say that the depicted reality loses its free-floating, ethereal character and becomes loaded with a kind of substantial density (considering that, according to Lacan, the only substance ascertained by psychoanalysis is enjoyment, it is thus not difficult to conceive how the material weight of Munch’s stains bears out the density of enjoyment).
    - heading "From the modernist sinthome …" [level=4] [ref=e1602]
    - paragraph [ref=e1603]:
      - text: The standard designation by which
      - emphasis [ref=e1604]: Scream
      - text: conveys anxiety is therefore appropriate—provided that we conceive the notion of anxiety in its strict Lacanian sense, i.e., as the affect which registers the subject’s panic reaction to the
      - emphasis [ref=e1605]: overproximity
      - text: "of the object-cause of desire: the little man’s features clearly recall a homunculus or a fetus, that is to say, a subject not yet torn from the mother’s body (the same homunculus is depicted in the lower left corner of Munch’s"
      - emphasis [ref=e1606]: Madonna
      - text: (1895/1902), as part of the frame otherwise ornamented by spermatic trickles).
      - superscript [ref=e1608]:
        - link "14" [ref=e1609]:
          - /url: "#fn-ch4-14"
      - text: The general conclusion to be drawn from it is that the stain as such has the status of the
      - emphasis [ref=e1610]: objet petit
      - emphasis [ref=e1611]: a
      - text: (surplus enjoyment). Aside from
      - emphasis [ref=e1612]: Starlit Night
      - text: (1893) where the substantial mass of dark earth in the foreground directly evokes a blurred stain, the same effect occurs at its clearest in two paintings from the turn of the century,
      - emphasis [ref=e1613]: Girls on the Bridge
      - text: (1899) and
      - emphasis [ref=e1614]: The Dance of Life
      - text: "(1900): the background earth and trees in the first case, the contours of the dancing bodies in the second, transmute into extended sperm-like stains which encumber reality with the substance of enjoyment. As to their status, these stains present therefore a kind of visual correlate to the"
      - emphasis [ref=e1615]: “voix acousmatique
      - text: ” in the cinema, the voice which transgresses the boundary outside/inside, since it belongs neither to diegetic reality nor to the external vocal accompaniment, but lurks in the in-between space, like a mysterious foreign body which disintegrates from within the consistency of “reality.”
    - paragraph [ref=e1616]:
      - text: "On this basis, one could risk some passing general remarks concerning the relationship between modernism and postmodernism. The modernist procedure is that of a “symptomal reading”: confronted with the totality, modernism endeavors to subvert it by detecting the traces of its hidden truth in the details which “stick out” and belie its “official” truth, in the margins which point toward what has to be “repressed” so that the “official” totality could establish itself—modernism’s elementary axiom is that details always contain some surplus which undermines the universal frame of the “official” Truth. What characterizes a typical modernist film is therefore the fact that its material texture (“writing”) in a way tells another story which, by means of its lateral links and resonances, redoubles and undermines the “official” story. An exemplary case of it is to be found in the excellent early Blake Edwards thriller"
      - emphasis [ref=e1617]: Experiment In Terror
      - text: ", the story of a young bank teller (Lee Remick), victim of an asthmatic blackmailer. One of a multitude of motifs which resound in it beneath the “official” narrative line is the melancholic, inanimate gaze: first the gaze of the hanged woman hidden between the dolls, then the doll of a tiger with a sad face, a gift from the blackmailer to his lover’s son—although these elements have nothing whatsoever in common on the level of the"
    - paragraph [ref=e1618]:
      - text: “official” narrative, they nonetheless constitute the same sinthome, the uncanny gaze which subverts the border between life and death, since it belongs to a “dead” object (corpse, doll), which nonetheless possesses a gaze of melancholic expressiveness. This gaze of a “living dead” is of course a metonymy of the status of the blackmailer himself, who functions as an
      - emphasis [ref=e1619]: “acousmatique
      - text: "” entity in Chion’s meaning of the term: the horror of an all-present voice whose body all of a sudden emerges “out of nothing.” When, at the very end of the film, the police shoot him down in the empty, illuminated stadium, it is by no accident that the blackmailer, with his asthmatic wheeze, recalls a fish choking on dry land, out of its “natural element”: he is effectively like an octopus who, once out of water, loses its terrifying fascination and changes into a powerless slime—this is the fate which befalls the phantom-like,"
      - emphasis [ref=e1620]: “acousmatique
      - text: ” being as soon as it is reduced to its ordinary corporeity.
    - paragraph [ref=e1621]:
      - text: "How, then, does postmodernism subvert this modernist frame? Let us take a novel which, although still modernist, approaches the very border of postmodernism:"
      - emphasis [ref=e1622]: The Handmaid’s Tale
      - text: "by Margaret Atwood, a dystopian vision of the near future when, in the USA, the Moral Majority takes over and establishes a new state, the “Republic Gilead,” based on severe patriarchal order (women are not allowed to read or write, etc.). What we have here is, ostensibly, an extrapolation and thereby a clear condemnation of tendencies which are detectable in today’s late capitalism, i.e., a kind of feminist version of 1984. Such a reading, obvious as it may seem, nevertheless misses the crucial point of the novel: the extraordinary libidinal cathexis of the scenes where the heroine—“Offred,” Fred’s girl—alone in the room allotted to her in the master’s house, gradually discovers material details of the objects around her, looks for the traces of past experiences inscribed in them, learns how to notice microscopic features of her body which have previously gone unnoticed … One is tempted to say that the novel was written in order to put in words this experience of discovering the material weight and density of our immediate surroundings: the ultimate function of the plot of the Moral Majority’s"
      - emphasis [ref=e1623]: coup d’état
      - text: is simply to serve as a narrative frame which impels the heroine toward such a microscopic experience (the same as with “space operas” whose intermingled plots of planetary battles ultimately serve as a pretext for rendering the experience of floating freely in empty space without gravitation). The true “feminine” subject position thus comes forth not so much in the novel’s “official” ideological content (the condemnation of Moral Majority rule) as in this attitude of microscopic probing, and the ambiguity of the novel is that, in order to give expression to the “feminine” position, it must construct a grandiose fantasy of patriarchal totalitarianism.
    - paragraph [ref=e1624]:
      - text: Here we have again the difference between
      - emphasis [ref=e1625]: meaning
      - text: and what Lacan calls
      - emphasis [ref=e1626]: sinthome
      - text: ": on the level of meaning,"
      - emphasis [ref=e1627]: The Handmaid’s Tale
      - text: "is a straightforward case of dystopia depicting a possible new form of “closed society,” yet this level is underpinned with the traces of feminine enjoyment. What is crucial here, however, is that this feminine “writing” cannot be staged directly, bypassing the circuitous route of meaning: it can be rendered only as a by-product of the story whose “official” content is the totalitarian universe of the Moral Majority. The same dialectic is at work in Chandler’s hard-boiled novels: the insipid view that Chandler took advantage of the detective narrative, using it as a frame that he filled out with a wealth of detailed observations and insights about the corruption of California-style wild capitalism and its psychic impact, overlooks the crucial fact that such detailed observations are artistically “effective” only as marginal by-products of a text which “officially” purports to be a detective story centered on revealing the mystery of who-dunit, etc. This, precisely, is the reason why"
      - emphasis [ref=e1628]: The Handmaid’s Tale
      - text: remains a
      - emphasis [ref=e1629]: modernist
      - text: "novel: it would become “postmodern” the moment it posited an undercurrent of paradoxical codependence, complicity even, between this feminine “writing” and the totalitarian universe of the Moral Majority, introducing thereby a"
    - paragraph [ref=e1630]: moment of ambiguity into its univocal condemnation—the step accomplished, among others, by Kafka whose great novels are haunted with the secret complicity that links the bureaucratic Thing (castle, court) to feminine enjoyment.
    - heading "…to the postmodernist Thing" [level=4] [ref=e1631]
    - paragraph [ref=e1632]:
      - text: What characterizes postmodernism is therefore an obsession with Thing, with a foreign body within the social texture, in all its dimensions that range from woman
      - emphasis [ref=e1633]: qua
      - text: the unfathomable element that undermines the rule of the “reality principle” (
      - emphasis [ref=e1634]: Blue Velvet
      - text: ), through science-fiction monsters (
      - emphasis [ref=e1635]: Alien
      - text: ) and autistic aliens (
      - emphasis [ref=e1636]: Elephant Man
      - text: ), up to the paranoiac vision of social totality itself as the ultimate fascinating Thing, a vampire-like specter which marks even the most idyllic everyday surface with signs of latent corruption. (In this sense, one could say that, today more than ever, capital is the Thing
      - emphasis [ref=e1637]: par excellence
      - text: ": a chimeric apparition which, although it can nowhere be spotted as a positive, clearly delimited entity, nonetheless functions as the ultimate Thing regulating our lives.) The ambiguity of the postmodern relationship to the Thing pertains to the fact that the Thing is not simply a foreign body, an intruder which disturbs the harmony of the social bond: precisely as such, the Thing is what “holds together” the social edifice by means of guaranteeing its fantasmatic consistency. Within modernism, the Thing assumes either the form of “remnants of the past,” of the inertia of prejudices to be cast away, or the form of the repressed life power to be unchained (as in the naive psychoanalytical ideology of the liberation of drive potentials from the constraints of social repression); we enter postmodernism when our relationship to the Thing becomes"
      - emphasis [ref=e1638]: antagonistic
      - text: ": we abjure and disown the Thing, yet it exerts an irresistible attraction on us; its proximity exposes us to a mortal danger, yet it is simultaneously a source of power … One is even tempted to propose a reading of Schopenhauer and Marx as postmodern philosophers, insofar as perhaps the most distinctive feature of their thought is a radical hatred for its object —the will (interpreted by Schopenhauer as the “secret” of the Kantian"
      - emphasis [ref=e1639]: Ding-an-sich
      - text: ), capital.
    - paragraph [ref=e1640]:
      - text: "Postmodernism thus accomplishes a kind of shift of perspective in relation to modernism: what in modernism appeared as the subversive margin—symptoms in which the repressed truth of the “false” totality emerges—is now displaced into the very heart, as the hard core of the Real that different attempts of symbolization endeavor in vain to integrate and to “gentrify.” In short, it is as if the universal and the particular paradoxically"
      - emphasis [ref=e1641]: exchange places
      - text: ": what one encounters in the center instead of the universal is a kind of “particular absolute” (to use Jacques-Alain Miller’s term), a particular traumatic kernel, while the various universals are all of a sudden reduced to the role of species of an impossible-un-fathomable genus, i.e., they start to function as a series of specific, ultimately failed attempts to symbolize (transpose into the medium of symbolic universality) and thus to “neutralize” the traumatic core of the Real. The theoretical antagonism thus shifts from the axis Imaginary-Symbolic to the axis Symbolic-Real: the aim of the modernist “symptomal reading” is to ferret out the texture of discursive (symbolic) practices whose imaginary effect is the substantial totality, whereas postmodernism focuses on the traumatic Thing which resists symbolization (symbolic practices)."
    - paragraph [ref=e1642]:
      - text: This shift comes forth exemplarily apropos of Foucault’s profoundly
      - emphasis [ref=e1643]: modernist
      - text: treatment of the relation between sexuality and sex—in what consisted the reversal in their relation that exerted such fascination on the theoretical public? Instead of reducing sexuality (i.e., the series of discursive—legal, medical, ethical, economical, etc.—practices in which sex is “actualized”) to the external secondary effect of a unique cause (“sex”
      - emphasis [ref=e1644]: qua
      - text: substantial entity), Foucault
    - paragraph [ref=e1645]:
      - text: "conceived sex as the effect of this series of practices. “Sex” is not an object given in advance, prior to its discursive actualizations and guaranteeing their consistency: it comes to be as a constructed unique reference of these practices, as a result of their hegemonic articulation: “The notion of ‘sex’ made it possible to group together, in an artificial unity, anatomical elements, biological functions, conducts, sensations, pleasures, and it enabled the use of this fictitious unity as a causal principle.”"
      - superscript [ref=e1647]:
        - link "15" [ref=e1648]:
          - /url: "#fn-ch4-15"
      - text: From the Lacanian perspective, however, Foucault overlooks here the inherently “antagonistic” status of sex, the “antagonistic” relation between sex and sexuality
      - emphasis [ref=e1649]: qua
      - text: "plurality of discursive practices: these practices endeavor again and again to integrate, to dominate, to neutralize, “sex”"
      - emphasis [ref=e1650]: qua
      - text: traumatic core which eludes their grasp. “Sex” is therefore not the universality, the neutral common ground of discursive practices which constitute “sexuality,” but rather
      - emphasis [ref=e1651]: their common stumbling block
      - text: ", their common point of failure. In other words, “sex” pertains to the register of the Real: it is an “effect” of sexuality (of symbolic practices), but its"
      - emphasis [ref=e1652]: antagonistic
      - text: effect—there is no sex prior to sexuality, sexuality itself produces (“secrets” in all the meanings of the term) sex as its inherent stumbling block (the same as with the notion of trauma in psychoanalysis, which is a retroactive effect of its failed symbolization). Therein consists the ultimate paradox of the Lacanian notion of the cause
      - emphasis [ref=e1653]: qua
      - text: "real: it is produced (“secreted”) by its own effects."
      - superscript [ref=e1655]:
        - link "16" [ref=e1656]:
          - /url: "#fn-ch4-16"
    - heading "4.2 Phallophany of the Anal Father" [level=3] [ref=e1657]
    - heading "The anal father" [level=4] [ref=e1658]
    - paragraph [ref=e1659]:
      - text: "This postmodern shift affects radically the status of paternal authority: modernism endeavors to assert the subversive potential of the margins which undermine the Father’s authority, of the enjoyments which elude the Father’s grasp, whereas postmodernism"
      - emphasis [ref=e1660]: focuses on the father
      - emphasis [ref=e1661]: himself and conceives him as “alive,” in his obscene dimension
      - text: . The phantom-like object which hinders a “normal” sexual relationship therefore is a paternal figure, yet not the father who was sublated [
      - emphasis [ref=e1662]: aufgehoben
      - text: "] in his Name, i.e., the dead-symbolic father, but the father who is"
      - emphasis [ref=e1663]: still alive
      - text: —father insofar as he is not yet “transubstantiated” into a symbolic function and remains what psychoanalysis calls a “partial object.” That is to say, the father
      - emphasis [ref=e1664]: qua
      - text: Name of the Father, reduced to a figure of symbolic authority, is “dead” (also) in the sense that
      - emphasis [ref=e1665]: he does not
      - emphasis [ref=e1666]: know anything about enjoyment
      - text: ", about life substance: the symbolic order (the big Other) and enjoyment are radically incompatible."
      - superscript [ref=e1668]:
        - link "17" [ref=e1669]:
          - /url: "#fn-ch4-17"
      - text: Which is why the famous Freudian dream of a son who appears to his father and reproaches him with “Father, can’t you see I’m burning?” could be simply translated into
      - emphasis [ref=e1670]: “Father, can’t you see I’m enjoying
      - text: "?”—can’t you see I’m alive, burning with enjoyment? Father cannot see it since he is dead, whereby the possibility is open to me to enjoy not only"
      - emphasis [ref=e1671]: outside
      - text: his knowledge, i.e., unbeknownst to him, but also
      - emphasis [ref=e1672]: in his very
      - emphasis [ref=e1673]: ignorance
      - text: . The other, no less known Freudian dream, that about the father who does not know he is dead, could thus be supplemented with “(
      - emphasis [ref=e1674]: I, the dreamer, enjoy the fact that
      - text: ) father does not know he is dead.”
      - superscript [ref=e1676]:
        - link "18" [ref=e1677]:
          - /url: "#fn-ch4-18"
      - text: What emerges under the guise of the phantom-like “living dead”—of the specter which hinders “normal” sexual relationship—is, however, the reverse of the Name of the Father, namely the “anal father” who definitely
      - emphasis [ref=e1678]: does
      - text: "enjoy: the obscene little man who is the clearest embodiment of the phenomenon of the “uncanny” ("
      - emphasis [ref=e1679]: Unheimliche
      - text: ). He is the subject’s double who accompanies him like a shadow and gives body to a certain surplus, to what is “in the subject more than subject himself”; this surplus represents what the subject must renounce, sacrifice even, the part in himself that the subject must murder in order to start to live as a “normal” member of the community. The crucial point here is therefore that this “anal father” is Father-Enjoyment (
      - emphasis [ref=e1680]: le Père-Jouissance
      - text: ", as Michel Silvestre calls it):"
      - superscript [ref=e1682]:
        - link "19" [ref=e1683]:
          - /url: "#fn-ch4-19"
      - text: it is
    - paragraph [ref=e1684]:
      - text: not the agency of symbolic Law, its “repression,” which hinders the sexual relationship (according to a Lacanian commonplace, the role of the Name of the Father is precisely to
      - emphasis [ref=e1685]: enable
      - text: the semblance of a sexual relationship), its stumbling block is on the contrary a certain excessive “sprout of enjoyment” materialized in the obscene figure of the “anal father.”
      - superscript [ref=e1687]:
        - link "20" [ref=e1688]:
          - /url: "#fn-ch4-20"
      - text: A whole series of Munch’s paintings are to be conceived as variations on this motif, first of all the two
      - emphasis [ref=e1689]: Mephistopheles
      - text: from 1935.
      - emphasis [ref=e1690]: Mephistopheles
      - text: "I:"
      - emphasis [ref=e1691]: The Duel
      - text: depicts a dark figure in the act of killing his white, shadow-like double, whereas in
      - emphasis [ref=e1692]: "Mephistopheles II: Split Personality"
      - text: "the same dark figure walks down the same street arm in arm with his almost transparent double and ignores a girl who turns round to cast a seductive glance at him. Here, one has to go beyond the standard “Lacanian” reduction of the motif of a double to imaginary mirror relationship: at its most fundamental, the double embodies the phantom-like Thing in me; that is to say, the dissymmetry between me and my double is ultimately that between the (ordinary) object and the (sublime) Thing. In my double, I don’t simply encounter myself (my mirror image), but first of all what is “in me more than myself”: the double is “myself,” yet—to put it in Spinozian terms—conceived under another modality, under the modality of the other, sublime, ethereal body, a pure substance of enjoyment exempted from the circuit of generation and corruption. Prior to his being “sublated” in his Name, “father” designates such a Thing which is “in me more than myself.”"
      - superscript [ref=e1694]:
        - link "21" [ref=e1695]:
          - /url: "#fn-ch4-21"
    - paragraph [ref=e1696]:
      - text: It would be, however, wrong to draw the conclusion that the relationship to the double
