      - text: ", which narrates the myth of how the it (the Lacanian lamella) constitutes itself as desiring subject through a lack, was followed six years later by"
      - emphasis [ref=e287]: The
      - emphasis [ref=e288]: Missing Piece Meets the Big O
      - text: ", which tells the story as it were from the opposite end: not from the standpoint of the desiring subject looking for its missing piece, but from the standpoint of the missing piece itself. This piece is not the Freudian partial object satisfied to remain its own piece, like the first piece encountered by the it in the first book, but the piece that is sitting alone, waiting for someone to take it. Here, of course, problems emerge: some who come along fit but cannot roll, others can roll but do not fit; some are too delicate; some put the piece on a pedestal and leave it there; some have too many pieces missing; some have “too many pieces, period”; some look too closely at the piece, while others roll by without even noticing it. The piece tries to make itself more attractive, but it doesn’t help; it tries being flashy, but this just frightens away the shy ones. At last one it comes along that fits just right, looking like the it from the first book, so, as in the first book, they form a perfect sphere and start to roll happily. However, once inserted into the it, the missing piece begins to grow and grow; the it drops the piece out and goes away, complaining “‘I’m lookin’ for my missin’ piece, one that that won’t increase.’” Then, one day, an it comes along that looks different: a perfect circle in itself. The piece, a good Lacanian partial object, asks the it the obvious"
