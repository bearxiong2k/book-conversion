    - paragraph [ref=e295]:
      - text: Such a shift of accent (an exemplary case of what Freud called “displacement”) underlies the comical effect of
      - emphasis [ref=e296]: understatement
      - text: ", allegedly characteristic of the English sense of humor and so much admired by Hitchcock. Yet we are here far from indulging in affected wisecracking: the point is rather that this de Quinceyian “displacement” enables us to discern the logic of a split which, as a kind of fatal flaw, is at work in the Enlightenment from its very beginning. That is to say, when, in his programmatic text"
      - emphasis [ref=e297]: What Is Enlightenment
      - text: "?, Immanuel Kant provides the famous definition of Enlightenment as “man’s release from his self-incurred tutelage,” i.e., his courage to make use of his understanding without direction from another, he supplements the motto “Argue freely!” by “Argue as much as you will, and about what you will, but obey!” This and not “Do not obey but argue!” is, according to Kant, the Enlightenment’s answer to the demand of traditional authority, “Do not argue but obey!” We must be careful here not to miss what Kant is aiming at—he is not simply restating the common motto of conformism, “In private, think whatever you want, but in public, obey the authorities!” but rather its opposite: in public, “as a scholar before the reading public,” use your reason freely, yet in private (at your post, in your family, i.e., as a cog in the social machine) obey authority! This split underlies the famous Kantian “conflict of the faculties” between the faculty of philosophy (free to indulge in arguing about what it will, yet for that reason cut off from social power—the performative force of its discourse being so to speak suspended) and the faculties of law and theology (which articulate the principles of ideological and political power and are therefore devoid of the freedom to argue). The same split occurs already in Descartes who, prior to entering the way of universal doubt, established a “provisional morality,” a set of rules regulating his everyday existence for the time of his philosophical journey: the very first rule emphasizes the need to obey the customs and laws of the country into which he was born without questioning their authority … In short, I am free to entertain doubts about anything, about the very existence of the universe, yet for all that I am compelled to obey the Master— or, as the de Quinceyian version of it would run: “How many people have entered the way of perdition with some innocent doubt about the existence of the world around them, which at the time was of no great importance to them, and ended by treating their superiors with"
    - paragraph [ref=e298]: insufficient respect!”
    - paragraph [ref=e299]:
      - text: "The ideological attitude opened up by this split, of course, is that of cynicism, of cynical distance which pertains to the very notion of Enlightenment and which today seems to have reached its apogee: although officially undermined, devalorized, authority returns through the sidedoor—“we know there is no truth in authority, yet we continue to play its game and to obey it in order not to disturb the usual run of things …” Truth is suspended in the name of efficiency: the ultimate legitimization of the system is that it works. In Eastern Europe’s now-defunct “really existing socialism,” the split was that between a public ritual of obedience and private cynical distance, whereas in the West, the cynicism is in a way redoubled: we publicly pretend to be free, whereas privately we obey. In both cases, we are victims of authority precisely when we think we have duped it: the cynical distance is empty, our true place is in the ritual of obeying—or, as Kurt Vonnegut put it in his"
      - emphasis [ref=e300]: Mother Night
