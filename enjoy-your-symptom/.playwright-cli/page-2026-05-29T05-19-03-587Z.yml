      - text: "So after a long journey full of adventurous encounters, one day it finds a triangular missing piece that will fill its void; however, the piece tells him, “Wait a minute! I am not your missing piece. I am nobody’s piece. I am my own piece. And even if I was somebody’s missing piece I don’t think I’d be yours!” So it sadly rolls on, finds another piece that is too small, another that is too big, another too sharp, another too square, another that it doesn’t hold tightly enough and thus loses, another that it holds too tightly and thus breaks. Finally it encounters a triangular piece that seems to be just right and asks, “‘Are you anybody else’s missing piece?’” The piece answers, “‘Not that I know of.’” “‘Well, maybe you want to be your own piece?’” “‘I can be someone’s and still be my own.’” So they get together and they fit perfectly, forming a perfect sphere. Because it is now complete, it rolls faster and faster, but, for that reason, it cannot smell a flower or talk to a worm. Could it still sing? It began to sing: “‘I’ve frown my nizzin’ geez/Uf vroun my mitzin’ brees.’” Now that it was complete, it could not sing at all! So it stopped rolling, set the piece down gently, rolled away and started to sing softly “‘Oh I’m lookin’ for my missin’ piece/I’m lookin’ for my missin’ piece.’ “It is the paradox of desire at its"
