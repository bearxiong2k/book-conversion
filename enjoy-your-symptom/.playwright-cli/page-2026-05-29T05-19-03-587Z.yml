      - text: The obvious failure of Raymond Chandler’s last novel, Playback (1958), is usually explained by the decline of his creative impetus which is then tracked down to his alcoholism, born of despair after his wife’s death; yet the function of this escape into psychology is, as always, to allow us to elude the inherent logic of the failure. In order to detect it, one has to bear in mind that
      - emphasis [ref=e1008]: Playback
