      - emphasis [ref=e1188]: ethical
      - text: attitude is the only true subversion. To paraphrase Chesterton, when the true Christian believer stands alone, fearless amid the knives and fists of the servants of established necessity, it does certainly serve to remind us that it is the agent of belief who is the original and subversive figure, while the esthetic footpads yielding to pleasures are merely placid old cosmic conservatives, happy in the immemorial respectability of apes and wolves. Or, to paraphrase Brecht from his
      - emphasis [ref=e1189]: Three-
      - emphasis [ref=e1190]: Penny Opera
      - text: ": we enter the religious when we say to ourselves “What is a transgression of the law against the transgression that pertains to the law itself? What are the petty human crimes against the voice of God ordering Abraham the senseless sacrifice of his son? Which human crime can approach the cruelty of God’s trifling with human destiny?”"
      - superscript [ref=e1192]:
