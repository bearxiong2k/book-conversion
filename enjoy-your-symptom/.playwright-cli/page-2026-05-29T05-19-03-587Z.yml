    - paragraph [ref=e293]:
      - text: "I have always found extremely repulsive the common practice of sharing the main dishes in a Chinese restaurant. So when, recently, I gave expression to this repulsion and insisted on finishing my plate alone, I became the victim of an ironic “wild psychoanalysis” on the part of my table neighbor: is not this repulsion of mine, this resistance to sharing a meal, a symbolic form of the fear of"
